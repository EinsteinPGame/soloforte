<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SG Boba Map - Find Bubble Tea Near Any MRT Station</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --border: #2a2a4a;
      --text: #e0e0f0;
      --text-muted: #8888aa;
      --accent: #f0a500;
      --accent2: #e8638c;

      --nsl: #d42e12;
      --ewl: #009645;
      --ccl: #fa9e0d;
      --dtl: #005ec4;
      --nel: #9b0fac;
      --tel: #9d5b25;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }
    .header-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .legend-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .legend-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== LEGEND ===== */
    #legend {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: none;
      flex-wrap: wrap;
      gap: 10px;
    }
    #legend.open { display: flex; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ===== MAP CONTAINER ===== */
    #map-wrapper {
      width: 100%;
      overflow: hidden;
      position: relative;
      background: var(--bg);
      touch-action: none;
    }
    #map-svg-container {
      width: 100%;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: 0 0;
    }
    #map-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ===== STATION PANEL ===== */
    #station-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 2px solid var(--accent);
      border-radius: 20px 20px 0 0;
      padding: 0;
      max-height: 75vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      z-index: 200;
    }
    #station-panel.open {
      transform: translateY(0);
    }
    .panel-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .panel-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    .panel-station-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }
    .panel-station-code {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .panel-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .panel-close:hover { border-color: var(--accent2); color: var(--accent2); }

    .shops-container {
      padding: 16px 20px 24px;
    }
    .shops-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* ===== SHOP CARDS ===== */
    .shop-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .shop-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .shop-card:hover, .shop-card:active {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .shop-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .shop-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .shop-location {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ===== DETAIL PANEL ===== */
    #detail-panel {
      position: fixed;
      inset: 0;
      background: var(--surface);
      z-index: 300;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #detail-panel.open {
      transform: translateX(0);
    }
    .detail-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    .detail-back {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .detail-back:hover { border-color: var(--accent); }
    .detail-title-block { flex: 1; }
    .detail-shop-name {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .detail-shop-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .detail-body {
      padding: 20px;
    }

    .section-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      margin-top: 22px;
    }
    .section-title:first-child { margin-top: 0; }

    /* Menu items */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .menu-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .menu-item-name {
      font-size: 0.9rem;
      color: var(--text);
    }
    .menu-item-price {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      margin-left: 10px;
    }

    /* Options chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Location block */
    .location-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .location-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .location-pin {
      font-size: 1.1rem;
      line-height: 1.4;
      flex-shrink: 0;
    }
    .location-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .location-floor {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }
    .location-directions {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }

    /* ===== SVG STATION STYLES (applied via JS) ===== */
    .station-dot {
      cursor: pointer;
      transition: r 0.15s;
    }
    .station-dot:hover { opacity: 0.85; }

    /* ===== BACKDROP ===== */
    #backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 150;
    }
    #backdrop.visible { display: block; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (min-width: 600px) {
      #station-panel {
        max-width: 500px;
        left: auto;
        right: 20px;
        bottom: 20px;
        border-radius: 16px;
        border: 1px solid var(--accent);
        max-height: 80vh;
      }
      #detail-panel {
        max-width: 500px;
        left: auto;
        right: 0;
        border-left: 1px solid var(--border);
      }
      .shop-cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

const seenIds = new Set();
const UNIQUE_STATIONS = STATIONS.filter(s => {
  if (seenIds.has(s.id)) return false;
  seenIds.add(s.id);
  return true;
});

  "jurong-east","woodlands","ang-mo-kio","bishan","toa-payoh","orchard","somerset",
  "dhoby-ghaut","city-hall","raffles-place","marina-bay","bugis","tampines",

const LINE_COLORS = {
  nsl: "#d42e12",
  ewl: "#009645",
  ccl: "#fa9e0d",
  dtl: "#005ec4",
  nel: "#9b0fac",
  tel: "#9d5b25"
};

// ============================================================
// RENDER STATIONS
// ============================================================
function renderStations() {
  const stLayer = document.getElementById("stations-layer");
  const lblLayer = document.getElementById("labels-layer");

  // Render a representative set to avoid extreme clutter
  const toRender = UNIQUE_STATIONS.filter(s => KEY_STATIONS.has(s.id));

  toRender.forEach(station => {
    const isInterchange = station.lines.length > 1;
    const hasShops = station.shops && station.shops.length > 0;
    const primaryColor = LINE_COLORS[station.lines[0]] || "#888";

    // Outer glow for shops
    if (hasShops) {
      const glow = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      glow.setAttribute("cx", station.x);
      glow.setAttribute("cy", station.y);
      glow.setAttribute("r", isInterchange ? 14 : 10);
      glow.setAttribute("fill", "none");
      glow.setAttribute("stroke", "#f0a500");
      glow.setAttribute("stroke-width", "2");
      glow.setAttribute("opacity", "0.6");
      stLayer.appendChild(glow);
    }

    // Main dot
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", station.x);
    circle.setAttribute("cy", station.y);
    circle.setAttribute("r", isInterchange ? 9 : 6);
    circle.setAttribute("fill", isInterchange ? "#fff" : primaryColor);
    circle.setAttribute("stroke", primaryColor);
    circle.setAttribute("stroke-width", isInterchange ? 3 : 0);
    circle.setAttribute("class", "station-dot");
    circle.setAttribute("data-id", station.id);
    circle.style.cursor = "pointer";
    stLayer.appendChild(circle);

    // Boba indicator dot
    if (hasShops) {
      const bobaIndicator = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      bobaIndicator.setAttribute("cx", station.x + (isInterchange ? 9 : 6));
      bobaIndicator.setAttribute("cy", station.y - (isInterchange ? 9 : 6));
      bobaIndicator.setAttribute("r", 4);
      bobaIndicator.setAttribute("fill", "#f0a500");
      bobaIndicator.style.pointerEvents = "none";
      stLayer.appendChild(bobaIndicator);
    }

    // Label
    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", station.x + 13);
    text.setAttribute("y", station.y + 4);
    text.setAttribute("font-size", "9");
    text.setAttribute("fill", "#c0c0d0");
    text.setAttribute("font-family", "system-ui, sans-serif");
    text.setAttribute("pointer-events", "none");
    text.textContent = station.name;
    lblLayer.appendChild(text);

    // Click handler
    circle.addEventListener("click", () => openStation(station.id));

    // Touch handler
    circle.addEventListener("touchend", (e) => {
      e.preventDefault();
      openStation(station.id);
    });
  });
}

// ============================================================
// PANEL LOGIC
// ============================================================
let currentStation = null;

function openStation(stationId) {
  const station = UNIQUE_STATIONS.find(s => s.id === stationId);
  if (!station) return;
  currentStation = station;

  document.getElementById("panel-station-name").textContent = station.name;
  document.getElementById("panel-station-code").textContent = station.code;

  const container = document.getElementById("shops-container");
  container.innerHTML = "";

  if (!station.shops || station.shops.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🧋</div>
        <p>No bubble tea data yet for this station.<br>Spotted a shop here? Suggest it!</p>
      </div>`;
  } else {
    const label = document.createElement("div");
    label.className = "shops-label";
    label.textContent = `${station.shops.length} shop${station.shops.length > 1 ? "s" : ""} nearby`;
    container.appendChild(label);

    const grid = document.createElement("div");
    grid.className = "shop-cards";

    station.shops.forEach((shopData, idx) => {
      const brand = BRANDS[shopData.brand];
      if (!brand) return;
      const card = document.createElement("div");
      card.className = "shop-card";
      card.innerHTML = `
        <div class="shop-badge" style="background:${brand.bg};color:${brand.color};border:1px solid ${brand.color}40">
          ${brand.icon} ${brand.name}
        </div>
        <div class="shop-name">${brand.name}</div>
        <div class="shop-location">📍 ${shopData.location}</div>
      `;
      card.addEventListener("click", () => openDetail(shopData.brand, shopData.location, station.name, shopData.loc));
      grid.appendChild(card);
    });

    container.appendChild(grid);
  }

  document.getElementById("station-panel").classList.add("open");
  document.getElementById("backdrop").classList.add("visible");
}

  document.getElementById("station-panel").classList.remove("open");
  document.getElementById("backdrop").classList.remove("visible");
  closeDetail();
}

// ============================================================
// MAP HEIGHT
// ============================================================
function setMapHeight() {
  const header = document.querySelector("header");
  const h = window.innerHeight - header.offsetHeight;
  document.getElementById("map-wrapper").style.height = h + "px";
}

// ============================================================
// PINCH-ZOOM + PAN
// ============================================================
let scale = 1, minScale = 0.5, maxScale = 4;
let panX = 0, panY = 0;
let lastDist = 0, isDragging = false;
let dragStartX, dragStartY, panStartX, panStartY;

function applyTransform(animate) {
  const el = document.getElementById("map-svg-container");
  el.style.transition = animate ? "transform 0.3s ease" : "none";
  el.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

const mapWrapper = document.getElementById("map-wrapper");

mapWrapper.addEventListener("wheel", (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(maxScale, Math.max(minScale, scale * delta));
  const rect = mapWrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  applyTransform(false);
}, { passive: false });

mapWrapper.addEventListener("mousedown", (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
});
window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  applyTransform(false);
});
window.addEventListener("mouseup", () => { isDragging = false; });

// Touch pan + pinch
let lastTouchX, lastTouchY, touchStartPanX, touchStartPanY;

mapWrapper.addEventListener("touchstart", (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastDist = Math.hypot(dx, dy);
  } else if (e.touches.length === 1) {
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    touchStartPanX = panX;
    touchStartPanY = panY;
  }
}, { passive: true });

mapWrapper.addEventListener("touchmove", (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const pinchScale = dist / lastDist;
    const newScale = Math.min(maxScale, Math.max(minScale, scale * pinchScale));
    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const rect = mapWrapper.getBoundingClientRect();
    const cx = mx - rect.left;
    const cy = my - rect.top;
    panX = cx - (cx - panX) * (newScale / scale);
    panY = cy - (cy - panY) * (newScale / scale);
    scale = newScale;
    lastDist = dist;
    applyTransform(false);
  } else if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - lastTouchX;
    const dy = e.touches[0].clientY - lastTouchY;
    panX = touchStartPanX + (e.touches[0].clientX - lastTouchX + (panX - touchStartPanX));
    panY = touchStartPanY + (e.touches[0].clientY - lastTouchY + (panY - touchStartPanY));
    // simpler:
    panX += dx * 0.5;
    panY += dy * 0.5;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    applyTransform(false);
  }
}, { passive: false });

// ============================================================
// SEARCH
// ============================================================
const LINE_NAMES = { nsl: "North-South", ewl: "East-West", ccl: "Circle", dtl: "Downtown", nel: "North East", tel: "Thomson-East Coast" };

function handleSearch(query) {
  const clearBtn = document.getElementById("search-clear");
  const resultsDiv = document.getElementById("search-results");
  query = query.trim().toLowerCase();
  clearBtn.style.display = query ? "block" : "none";

  if (!query) { resultsDiv.style.display = "none"; resultsDiv.innerHTML = ""; return; }

  const results = [];

  // Search brands
  Object.keys(BRANDS).forEach(key => {
    const brand = BRANDS[key];
    if (brand.name.toLowerCase().includes(query) || key.includes(query)) {
      // Find all stations with this brand
      const stationsWithBrand = UNIQUE_STATIONS.filter(s => s.shops && s.shops.some(sh => sh.brand === key));
      const lineSet = new Set();
      stationsWithBrand.forEach(s => s.lines.forEach(l => lineSet.add(l)));
      results.push({ type: "brand", key, name: brand.name, icon: brand.icon, color: brand.color, stations: stationsWithBrand, lines: Array.from(lineSet) });
    }
  });

  // Search stations
  UNIQUE_STATIONS.forEach(s => {
    if (s.shops && s.shops.length > 0 && (s.name.toLowerCase().includes(query) || s.code.toLowerCase().includes(query))) {
      results.push({ type: "station", station: s });
    }
  });

  if (results.length === 0) {
    resultsDiv.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;padding:8px 0">No results found</div>';
    resultsDiv.style.display = "block";
    return;
  }

  let html = "";
  results.forEach(r => {
    if (r.type === "brand") {
      const lineBadges = r.lines.map(l => `<span style="display:inline-block;background:${LINE_COLORS[l]}33;color:${LINE_COLORS[l]};border:1px solid ${LINE_COLORS[l]}66;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:600">${LINE_NAMES[l] || l}</span>`).join(" ");
      const stationList = r.stations.map(s => `<span style="color:var(--text-muted);font-size:0.78rem;cursor:pointer;text-decoration:underline" onclick="clearSearch();openStation('${s.id}')">${s.name}</span>`).join(", ");
      html += `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:1.1rem">${r.icon}</span>
          <span style="font-weight:700;color:${r.color}">${r.name}</span>
          <span style="color:var(--text-muted);font-size:0.78rem">${r.stations.length} stations</span>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">${lineBadges}</div>
        <div style="line-height:1.8">${stationList}</div>
      </div>`;
    } else {
      const s = r.station;
      const brands = s.shops.map(sh => `<span style="font-size:0.78rem">${BRANDS[sh.brand]?.icon || "🧋"} ${BRANDS[sh.brand]?.name || sh.brand}</span>`).join(" · ");
      html += `<div style="padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="clearSearch();openStation('${s.id}')">
        <div style="font-weight:600;color:var(--accent)">${s.name} <span style="color:var(--text-muted);font-weight:400;font-size:0.78rem">${s.code}</span></div>
        <div style="margin-top:4px">${brands}</div>
      </div>`;
    }
  });

  resultsDiv.innerHTML = html;
  resultsDiv.style.display = "block";
}

function clearSearch() {
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").style.display = "none";
  document.getElementById("search-results").style.display = "none";
  document.getElementById("search-results").innerHTML = "";
}
