const SFX={
  ctx:null,
  _init(){if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},
  _tone(freq,dur,type,vol,delay){
    this._init();if(!this.ctx)return;
    const t=this.ctx.currentTime+(delay||0);
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol||0.15,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(this.ctx.destination);
    o.start(t);o.stop(t+dur);
  },
  _noise(dur,vol){
    this._init();if(!this.ctx)return;
    const bufSz=this.ctx.sampleRate*dur;const buf=this.ctx.createBuffer(1,bufSz,this.ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<bufSz;i++)d[i]=(Math.random()*2-1)*(vol||0.1);
    const s=this.ctx.createBufferSource();const g=this.ctx.createGain();
    s.buffer=buf;g.gain.setValueAtTime(vol||0.1,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    s.connect(g);g.connect(this.ctx.destination);s.start();s.stop(this.ctx.currentTime+dur);
  },
  click(){this._tone(800,0.05,'square',0.06)},
  hit(){this._tone(200,0.12,'sine',0.18);this._noise(0.1,0.1)},
  crit(){this._tone(600,0.08,'sawtooth',0.25);this._tone(900,0.1,'square',0.22,0.04);this._noise(0.06,0.1)},
  // Mantis = SWORD slash — sharp metallic shing with harmonics
  slash(){this._tone(1200,0.04,'sawtooth',0.2);this._tone(2400,0.03,'sawtooth',0.12,0.01);this._tone(800,0.06,'square',0.15,0.02);this._noise(0.04,0.08)},
  // Gorilla = HAMMER impact — deep boomy thud with sub bass
  punch(){this._tone(55,0.25,'sine',0.35);this._tone(90,0.18,'sine',0.25,0.02);this._tone(180,0.08,'square',0.12,0.04);this._noise(0.15,0.2)},
  // Monowire = STRING twang — vibrating wire with pitch bend
  whip(){this._tone(600,0.12,'sawtooth',0.15);this._tone(1200,0.08,'triangle',0.1,0.02);this._tone(300,0.15,'sine',0.12,0.05);this._tone(900,0.06,'sawtooth',0.08,0.03)},
  // PLS = STAFF whoosh — filtered sweep with impact
  missile(){this._tone(400,0.1,'triangle',0.15);this._tone(200,0.12,'sine',0.12,0.03);this._noise(0.08,0.1);this._tone(600,0.06,'sawtooth',0.08,0.05)},
  // Explosions — MASSIVE layered boom
  explode(){this._tone(40,0.35,'sine',0.4);this._tone(80,0.25,'sine',0.3,0.02);this._tone(120,0.15,'sawtooth',0.2,0.05);this._noise(0.25,0.25);this._tone(200,0.1,'square',0.12,0.08)},
  special(){this._tone(500,0.08,'square',0.2);this._tone(700,0.1,'square',0.18,0.06);this._tone(1000,0.1,'square',0.15,0.12);this._noise(0.08,0.1)},
  relicActivate(){[300,500,700,900,1100].forEach((f,i)=>this._tone(f,0.15,'square',0.22,i*0.05));this._noise(0.12,0.18)},
  elementActivate(){[440,660,880,1100].forEach((f,i)=>this._tone(f,0.15,'triangle',0.18,i*0.07))},
  victory(){[523,659,784,1047].forEach((f,i)=>this._tone(f,0.25,'sine',0.18,i*0.12))},
  ko(){this._tone(300,0.15,'sine',0.25);this._tone(200,0.2,'sine',0.18,0.12);this._tone(100,0.35,'sine',0.12,0.3)},
  stun(){this._tone(1000,0.06,'square',0.12);this._tone(1200,0.05,'square',0.1,0.04)},
  burn(){this._tone(200,0.12,'sawtooth',0.1);this._noise(0.08,0.08)},
  freeze(){this._tone(1200,0.18,'sine',0.12);this._tone(1400,0.12,'sine',0.1,0.08)},
  wallBounce(){this._tone(500,0.04,'sine',0.06)},
  // Parry = SWORD CLASH — metallic ring with harmonic series
  clash(){this._tone(800,0.15,'sawtooth',0.25);this._tone(1200,0.12,'square',0.2,0.02);this._tone(1600,0.1,'sawtooth',0.15,0.04);this._tone(400,0.08,'square',0.12,0.01);this._noise(0.1,0.15)},
  bleed(){this._tone(350,0.1,'sawtooth',0.12);this._tone(180,0.12,'sine',0.1,0.03)},
  capture(){this._tone(600,0.15,'sine',0.15);this._tone(800,0.12,'sine',0.12,0.06);this._tone(400,0.2,'sine',0.1,0.12)},
  quickhack(){this._tone(1200,0.06,'square',0.18);this._tone(900,0.06,'square',0.15,0.05);this._tone(1400,0.06,'square',0.12,0.1)},

};

// ============================================================
// CHAOS SCALING — hits + low HP = faster attacks + bigger effects
// ============================================================
function getChaosLevel(f){
  const hitChaos=f.totalHits*0.015;
  const hpRatio=1-f.hp/f.maxHp;
  const hpChaos=Math.max(0,hpRatio)*2.5;
  return Math.min(hitChaos+hpChaos,8); // cap at 8x
}

function getAttackInterval(f){
  const chaos=getChaosLevel(f);
  const base=f.char.baseAtkInterval;
  return Math.max(4, base/(1+chaos*0.5));
}

// ============================================================
// PHYSICS — Random bouncing
// ============================================================
function updatePhysics(f,dt){
  if(!f.alive)return;
  let spdMult=1;
  if(f.sandyTimeScale<1)spdMult*=f.sandyTimeScale; // Sandevistan slow
  if(f.stunTimer>0)spdMult=0.15;
  if(f.freezeTimer>0)spdMult=0.08;
  if(f.slowTimer>0)spdMult*=0.55;
  if(f.captureTimer>0)spdMult=0.05; // nearly immobile when captured

  // Monowire stays near captured enemy
  if(f.char.id==='monowire'){
    const enemy=fighters[1-f.side];
    if(enemy&&enemy.captureTimer>0&&enemy._capturedBy===f){
      const d=dist(f,enemy);
      if(d>100){
        const a=angle(f,enemy);
        f.vx+=Math.cos(a)*0.5;f.vy+=Math.sin(a)*0.5;
      }
    }
  }

  // Relic dash override
  if(f.relicDashing&&f.relicDashTarget){
    const t=f.relicDashTarget;
    const a=angle(f,t);
    f.vx=Math.cos(a)*12;
    f.vy=Math.sin(a)*12;
    spdMult=1;
  }

  f.x+=f.vx*spdMult*dt;
  f.y+=f.vy*spdMult*dt;

  let bounced=false;
  if(f.x-f.radius<ARENA.x){f.x=ARENA.x+f.radius;f.vx=Math.abs(f.vx)+(Math.random()-0.5)*0.8;bounced=true;}
  if(f.x+f.radius>ARENA.x+ARENA.w){f.x=ARENA.x+ARENA.w-f.radius;f.vx=-Math.abs(f.vx)+(Math.random()-0.5)*0.8;bounced=true;}
  if(f.y-f.radius<ARENA.y){f.y=ARENA.y+f.radius;f.vy=Math.abs(f.vy)+(Math.random()-0.5)*0.8;bounced=true;}
  if(f.y+f.radius>ARENA.y+ARENA.h){f.y=ARENA.y+ARENA.h-f.radius;f.vy=-Math.abs(f.vy)+(Math.random()-0.5)*0.8;bounced=true;}
  if(bounced){
    // Keep spin direction on wall bounce — only add slight variation, don't reverse
    f.spinSpeed+=((Math.random()-0.5)*0.03);
    SFX.wallBounce();
    spawnSparks(f.x,f.y,'#555',3);
    // Sandy+toxic: wall bounce shoots poison orbs in all directions
    if(f.char.id==='sandy'&&f.elementActive&&f.elem.id==='toxic'){
      for(let i=0;i<8;i++){
        const pa=Math.PI*2*i/8;
        projectiles.push({
          x:f.x+Math.cos(pa)*f.radius,y:f.y+Math.sin(pa)*f.radius,
          vx:Math.cos(pa)*4,vy:Math.sin(pa)*4,
          owner:f,target:null,color:'#aa44cc',life:40,radius:5,
          dmg:f.atk*0.25,explosive:false,homing:false,
        });
      }
      spawnBurst(f.x,f.y,'#aa44cc',12,5);
    }
  }

  if(Math.random()<0.03){f.vx+=(Math.random()-0.5)*1.2;f.vy+=(Math.random()-0.5)*1.2;}

  const spd=Math.hypot(f.vx,f.vy);
  const targetSpd=2.5+f.speed*0.5;
  if(spd<targetSpd*0.6){const boost=targetSpd*0.8/Math.max(spd,0.1);f.vx*=boost;f.vy*=boost;}
  else if(spd>targetSpd*1.8){const damp=targetSpd*1.4/spd;f.vx*=damp;f.vy*=damp;}

  f.rotation+=f.spinSpeed*dt;
  f.weaponAngle+=f.spinSpeed*dt;
  // Weapons always at full length — no mysterious extending/retracting
  f.weaponExtend=1;
  if(f.weaponFlash>0)f.weaponFlash-=dt;
  if(f.attackAnim>0)f.attackAnim-=dt;
}

// ============================================================
// BALL COLLISION — Elastic bounce + weapon deflect
// ============================================================
function checkBallCollision(f1,f2){
  if(!f1.alive||!f2.alive)return;
  const d=dist(f1,f2);
  const minD=f1.radius+f2.radius;
  if(d>=minD)return;

  const overlap=minD-d;
  const nx=(f2.x-f1.x)/(d||1);
  const ny=(f2.y-f1.y)/(d||1);
  f1.x-=nx*overlap*0.5;f1.y-=ny*overlap*0.5;
  f2.x+=nx*overlap*0.5;f2.y+=ny*overlap*0.5;

  // Elastic collision
  const dvx=f1.vx-f2.vx,dvy=f1.vy-f2.vy;
  const dot=dvx*nx+dvy*ny;
  f1.vx-=dot*nx*0.8;f1.vy-=dot*ny*0.8;
  f2.vx+=dot*nx*0.8;f2.vy+=dot*ny*0.8;
  f1.vx+=(Math.random()-0.5)*2;f1.vy+=(Math.random()-0.5)*2;
  f2.vx+=(Math.random()-0.5)*2;f2.vy+=(Math.random()-0.5)*2;

  f1.spinSpeed=(Math.random()-0.5)*0.22;
  f2.spinSpeed=(Math.random()-0.5)*0.22;

  // Weapon deflect visuals — keep natural spin angle, don't snap to enemy
  f1.weaponExtend=1;f2.weaponExtend=1;
  f1.weaponFlash=15;f2.weaponFlash=15;

  const mx=(f1.x+f2.x)/2,my=(f1.y+f2.y)/2;
  spawnBurst(mx,my,'#ffffff',10,5);
  spawnBurst(mx,my,f1.char.color,6,3);
  spawnBurst(mx,my,f2.char.color,6,3);
  spawnSparks(mx,my,'#ffcc00',6); // weapon deflect sparks
  shakeTimer=8;shakeAmt=5;
  SFX.clash();

  // Sandevistan deals body collision damage (speed-based) — with cooldown to prevent corner stunlock
  [f1,f2].forEach(sandy=>{
    if(sandy.char.id!=='sandy')return;
    if(sandy._bodyHitCD>0)return; // cooldown prevents rapid corner bouncing
    const enemy=sandy===f1?f2:f1;
    const spd=Math.hypot(sandy.vx,sandy.vy);
    const spdDmg=sandy.atk*(0.4+spd*0.25);
    dealDamage(sandy,enemy,spdDmg);
    sandy._bodyHitCD=18; // ~0.3 sec cooldown between body hits
    SFX.punch();
    spawnBurst(mx,my,'#4488ff',12,5);
    shakeTimer=Math.max(shakeTimer,8);shakeAmt=Math.max(shakeAmt,5);
    // Sandy bounces away after body hit
    const ka=angle(enemy,sandy);
    sandy.vx=Math.cos(ka)*7;sandy.vy=Math.sin(ka)*7;
  });
  // Non-sandy body collision: no damage
}

// ============================================================
// DAMAGE SYSTEM
// ============================================================
function dealDamage(attacker,defender,baseDmg,canCrit){
  if(!defender.alive)return 0;
  // Captured enemies cannot damage the monowire that captured them
  if(attacker.captureTimer>0&&defender===attacker._capturedBy)return 0;
  if(canCrit===undefined)canCrit=true;
  // Dodge check (Sandevistan)
  const totalDodge=defender.dodgeChance+defender.sandyDodgeBoost;
  if(totalDodge>0&&Math.random()<totalDodge){
    spawnDmgNum(defender.x,defender.y-defender.radius-15,'DODGE','#4488ff',true);
    spawnBurst(defender.x,defender.y,'#4488ff',8,4);
    return 0;
  }
  const isCrit=canCrit&&Math.random()*100<attacker.crit;
  let dmg=baseDmg*(isCrit?2:1);
  const actualDef=Math.max(0,defender.def-defender.defReduction);
  dmg=Math.max(1,dmg-actualDef*0.3);

  // Chaos scaling: more damage at higher chaos — very aggressive
  const chaos=getChaosLevel(attacker);
  dmg*=(1+chaos*0.15);

  if(attacker.elementActive&&attacker.elem.id!=='none')applyElementEffect(attacker,defender);
  defender.hp-=dmg;
  defender.hitFlash=8;
  attacker.totalHits++;

  if(isCrit){SFX.crit();spawnBurst(defender.x,defender.y,'#ffff00',12,4);addLog((attacker.side===0?'P1':'P2')+' CRIT! '+Math.round(dmg));}
  spawnDmgNum(defender.x+rand(-15,15),defender.y-defender.radius-10,dmg,isCrit?'#ffff00':'#fff',isCrit);
  spawnBurst(defender.x,defender.y,defender.char.color,4,2);

  if(attacker.side===0){battleStats.p1Hits++;battleStats.p1Dmg+=dmg;if(isCrit)battleStats.p1Crits++;}
  else{battleStats.p2Hits++;battleStats.p2Dmg+=dmg;if(isCrit)battleStats.p2Crits++;}

  attacker.specialBar=Math.min(attacker.specialMax,attacker.specialBar+(6+Math.random()*2)*(attacker.char.relicChargeRate||1));
  defender.specialBar=Math.min(defender.specialMax,defender.specialBar+(2+Math.random())*(defender.char.relicChargeRate||1));

  if(dmg>20){shakeTimer=Math.max(shakeTimer,6);shakeAmt=Math.max(shakeAmt,dmg>40?6:3);}

  if(defender.hp<=0){
    defender.hp=0;defender.alive=false;defender.deathAnim=60;
    battleOver=true;winner=attacker;
    addLog((attacker.side===0?'P1':'P2')+' '+attacker.char.name+' WINS!');
    SFX.ko();setTimeout(()=>SFX.victory(),500);
  }
  return dmg;
}

// ============================================================
// WEAPON ATTACK SYSTEM — Weapons only attack when they spin to face enemy
// ============================================================
// Check if weapon's natural spin angle is pointing at the enemy (within an arc)
function isWeaponFacingEnemy(f,enemy){
  const toEnemy=angle(f,enemy);
  let diff=f.weaponAngle-toEnemy;
  while(diff>Math.PI)diff-=Math.PI*2;
  while(diff<-Math.PI)diff+=Math.PI*2;
  // Arc depends on weapon type — wider arcs so attacks connect more often
  const arc=f.char.id==='pls'?0.7:f.char.id==='gorilla'?0.65:f.char.id==='monowire'?0.6:f.char.id==='sandy'?0.9:0.55;
  return Math.abs(diff)<arc;
}

function performWeaponAttack(f,enemy){
  if(!f.alive||!enemy.alive)return;
  if(f.captureTimer>0)return;
  if(f.stunTimer>0||f.freezeTimer>0)return;
  // Monowire+electric: short circuit makes attacks miss sometimes
  if(f.missChance>0&&Math.random()<f.missChance){
    spawnDmgNum(f.x,f.y-f.radius-10,'MISS','#ffcc00',false);
    spawnSparks(f.x,f.y,'#ffcc00',3);
    f.attackAnim=8;return;
  }

  const chaos=getChaosLevel(f);
  // DON'T snap weapon to enemy — use natural spin angle
  f.attackAnim=12;

  switch(f.char.id){
    case 'mantis':attackMantis(f,enemy,chaos);break;
    case 'gorilla':attackGorilla(f,enemy,chaos);break;
    case 'monowire':attackMonowire(f,enemy,chaos);break;
    case 'pls':attackPLS(f,enemy,chaos);break;
    case 'sandy':attackSandy(f,enemy,chaos);break;
    case 'throw':attackThrow(f,enemy,chaos);break;
  }
}

function attackMantis(f,enemy,chaos){
  // Alternating left/right slash — uses current weapon facing
  f.attackSide*=-1;
  f.weaponExtend=1;
  f.weaponFlash=12;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*8;
  const facing=isWeaponFacingEnemy(f,enemy);

  SFX.slash();
  if(d<effectiveRange){
    const dmg=dealDamage(f,enemy,f.atk);
    const bleedChance=0.10+chaos*0.02;
    if(Math.random()<bleedChance&&dmg>0){
      applyBleed(enemy,f.atk*0.35,50);
    }
    // Big slash arc visual toward enemy
    const sa=f.weaponAngle;
    for(let i=0;i<10;i++){
      const spread=(Math.random()-0.5)*1.2;
      const speed=3+Math.random()*4;
      spawnParticle(f.x+Math.cos(sa)*f.radius,f.y+Math.sin(sa)*f.radius,
        pick(['#ff6644','#ff4422','#ffaa44']),Math.cos(sa+spread)*speed,Math.sin(sa+spread)*speed,16,3);
    }
    spawnBurst(enemy.x,enemy.y,'#ff4422',8,4);
    shakeTimer=Math.max(shakeTimer,5);shakeAmt=Math.max(shakeAmt,3);
  } else {
    // Whiff — visible slash arc
    const whiffX=f.x+Math.cos(f.weaponAngle)*f.radius*1.5;
    const whiffY=f.y+Math.sin(f.weaponAngle)*f.radius*1.5;
    spawnSparks(whiffX,whiffY,'#ff3333',5);
    spawnBurst(whiffX,whiffY,'#ff6644',4,2);
  }
}

function attackGorilla(f,enemy,chaos){
  f.attackPhase=(f.attackPhase+1)%3; // 0=left, 1=right, 2=downslam
  f.weaponExtend=1;
  f.weaponFlash=15;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*5;
  const isDownslam=f.attackPhase===2;
  const facing=isWeaponFacingEnemy(f,enemy);

  if(isDownslam){
    // Downslam — MASSIVE AoE ground crack
    SFX.punch();SFX.thunderclap();
    const aoeRadius=75+chaos*15;
    const kbMult=f.gorillaKnockbackMult||1;
    if(d<aoeRadius){
      dealDamage(f,enemy,f.atk*1.5);
      const ka=angle(f,enemy);
      enemy.vx+=Math.cos(ka)*8*kbMult;
      enemy.vy+=Math.sin(ka)*8*kbMult;
    }
    spawnBurst(f.x,f.y+f.radius,'#ff8800',30,10);
    spawnBurst(f.x,f.y,'#ffcc00',15,7);
    for(let i=0;i<18;i++){
      const a=Math.PI*2*i/18;
      spawnParticle(f.x,f.y,'#996600',Math.cos(a)*5,Math.sin(a)*5,30,4);
    }
    // Ground crack lines radiating out
    for(let i=0;i<8;i++){
      const a=Math.PI*2*i/8;
      for(let j=0;j<4;j++){
        spawnParticle(f.x+Math.cos(a)*j*12,f.y+Math.sin(a)*j*12,'#ffaa00',Math.cos(a)*2,Math.sin(a)*2,20,2);
      }
    }
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:aoeRadius,color:'#ff8800',life:20,maxLife:20,dmg:0,owner:f,target:null,hit:true});
    spawnWallCrack(f.x,f.y,f); // ground crack at slam point
    shakeTimer=18;shakeAmt=12;
  } else {
    // Left/right heavy punch
    SFX.punch();
    const kbMult2=f.gorillaKnockbackMult||1;
    if(d<effectiveRange){
      dealDamage(f,enemy,f.atk);
      const ka=angle(f,enemy);
      enemy.vx+=Math.cos(ka)*3*kbMult2;
      enemy.vy+=Math.sin(ka)*3*kbMult2;
    }
    spawnBurst(f.x+Math.cos(f.weaponAngle)*f.radius,f.y+Math.sin(f.weaponAngle)*f.radius,'#ff8800',6,3);
  }
}

function attackMonowire(f,enemy,chaos){
  f.weaponExtend=1;
  f.weaponFlash=15;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*10;
  const facing=isWeaponFacingEnemy(f,enemy);

  SFX.whip();
  if(d<effectiveRange){
    dealDamage(f,enemy,f.atk);
    let captureChance=0.30+chaos*0.04;
    const captureDuration=90+chaos*15;
    // Monowire+cryo: slowed enemies are easier to capture
    if(f.elementActive&&f.elem.id==='cryo'&&enemy.slowTimer>0)captureChance+=0.20;
    if(Math.random()<captureChance&&enemy.captureTimer<=0){
      applyCaptureWrap(enemy,captureDuration);
    }
  }
  // Wire launch visual in weapon facing direction (not toward enemy)
  const wa=f.weaponAngle;
  for(let i=0;i<8;i++){
    const t=i/8;
    spawnParticle(
      lerp(f.x,f.x+Math.cos(wa)*effectiveRange,t),
      lerp(f.y,f.y+Math.sin(wa)*effectiveRange,t),
      '#00ddff',0,0,15,1.5);
  }
}

function attackPLS(f,enemy,chaos){
  // Staff launches energy orb toward enemy (fires on interval, not facing)
  f.weaponExtend=0.6;
  f.weaponFlash=12;
  const a=angle(f,enemy)+(Math.random()-0.5)*0.2;
  const speed=6+chaos*0.6;
  const explosionRadius=f.plsExplosionRadius+chaos*10;

  projectiles.push({
    x:f.x+Math.cos(a)*f.radius,
    y:f.y+Math.sin(a)*f.radius,
    vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,
    owner:f,target:enemy,
    color:'#33cc33',life:120,radius:16+chaos*2,
    dmg:f.atk*(1+chaos*0.12),
    explosive:true,explosionRadius:explosionRadius*1.8,
    homing:false,
  });
  SFX.missile();
  // Staff launch burst at tip
  spawnBurst(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#66ff66',8,4);

  // PLS scaling: hits = faster fire + bigger explosions
  f.plsExplosionRadius=35+f.totalHits*0.4;
}

function attackSandy(f,enemy,chaos){
  // Unarmed — speed = damage. Hits when facing and in range, then bounces away
  f.weaponFlash=12;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*5;
  const facing=isWeaponFacingEnemy(f,enemy);
  const spd=Math.hypot(f.vx,f.vy);
  // Damage scales with speed — faster = harder hit
  const spdDmg=f.atk*(0.5+spd*0.3)+chaos*2;

  SFX.punch();
  if(d<effectiveRange){
    dealDamage(f,enemy,spdDmg);
    // Bounce away after hitting — prevents stunlock
    const ka=angle(enemy,f);
    f.vx=Math.cos(ka)*7;f.vy=Math.sin(ka)*7;
    // Knockback enemy slightly
    const ka2=angle(f,enemy);
    enemy.vx+=Math.cos(ka2)*2;enemy.vy+=Math.sin(ka2)*2;
    spawnBurst(enemy.x,enemy.y,'#4488ff',10,4);
    shakeTimer=6;shakeAmt=4;
    // Sandy+cryo: faster = more slow on enemy
    if(f.elementActive&&f.elem.id==='cryo'){
      const slowAmt=Math.min(120,30+spd*10);
      enemy.slowTimer=Math.max(enemy.slowTimer,slowAmt);
      spawnDmgNum(enemy.x,enemy.y-enemy.radius-20,'SLOW','#77ddff',false);
    }
  } else {
    // Whiff
    spawnSparks(f.x+Math.cos(f.weaponAngle)*f.radius,f.y+Math.sin(f.weaponAngle)*f.radius,'#4488ff',3);
  }

  // Kerenzikov dodge scaling — increases with hits, caps lower
  f.dodgeChance=Math.min(0.18,0.02+f.totalHits*0.002);
}

function attackThrow(f,enemy,chaos){
  // Throwing weapons — fires projectile at enemy, uses active weapon
  const tw=f.throwWeapons[f.throwActiveIdx];
  if(!tw||!tw.available)return;
  f.weaponFlash=12;
  const a=angle(f,enemy)+(Math.random()-0.5)*0.1;
  const speed=8+chaos*0.5;
  const dmg=f.atk*tw.dmgMult*(1+chaos*0.1);
  // Fire rate bonus from fire element
  const fireBonus=f.elementActive&&f.elem.id==='fire'?0.7:1;

  projectiles.push({
    x:f.x+Math.cos(a)*f.radius,y:f.y+Math.sin(a)*f.radius,
    vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,
    owner:f,target:enemy,color:tw.color,life:180,radius:10,
    dmg:dmg,explosive:tw.id==='agaou',
    explosionRadius:tw.id==='agaou'?60+chaos*8:0,
    homing:false,throwWeaponId:tw.id,throwIdx:f.throwActiveIdx,
    isThrowWeapon:true,
  });
  tw.available=false;
  SFX.missile();
  spawnBurst(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,tw.color,6,3);
}

// ============================================================
// STATUS EFFECTS
// ============================================================
function applyBleed(target,dmg,duration){
  target.bleedTimer=duration;
  target.bleedDmg=dmg;
  target.bleedIcon=true;
  SFX.bleed();
  addLog((target.side===0?'P1':'P2')+' BLEEDING!');
  spawnDmgNum(target.x,target.y-target.radius-25,'BLEED','#cc0000',false);
}

function applyCaptureWrap(target,duration){
  target.captureTimer=duration;
  target._capturedBy=null; // track who captured for proximity
  // Find the monowire that captured
  fighters.forEach(f=>{if(f.char.id==='monowire'&&f.side!==target.side)target._capturedBy=f;});
  SFX.capture();
  addLog((target.side===0?'P1':'P2')+' CAPTURED!');
  spawnDmgNum(target.x,target.y-target.radius-25,'WRAPPED','#00ddff',false);
  spawnBurst(target.x,target.y,'#00aacc',15,5);
}

function applyQuickhack(attacker,target){
  // Pick a quickhack based on chances
  const roll=Math.random();
  let hack=QUICKHACKS[0]; // overheat default
  let cumulative=0;
  for(const qh of QUICKHACKS){
    cumulative+=qh.chance;
    if(roll<cumulative){hack=qh;break;}
  }
  // Start quickhack progress bar
  quickhackDisplay={fighter:attacker,target,progress:0,maxProgress:90,hack};
  SFX.quickhack();
  addLog((target.side===0?'P1':'P2')+' QUICKHACK: '+hack.name+'!');
}

function triggerQuickhack(qd){
  if(!qd||!qd.target.alive)return;
  const hack=qd.hack;
  const dmg=qd.fighter.atk*hack.dmgMult;

  // Screen flash black/red like blackwall for ALL quickhacks
  quickhackFlashTimer=25;
  quickhackFlashColor=hack.color;
  shakeTimer=15;shakeAmt=hack.id==='black_wall'?12:6;

  dealDamage(qd.fighter,qd.target,dmg,false);
  spawnDmgNum(qd.target.x,qd.target.y-qd.target.radius-30,hack.name,hack.color,true);

  switch(hack.id){
    case 'overheat':
      qd.target.burnTimer=180;qd.target.burnDmg=3;
      spawnBurst(qd.target.x,qd.target.y,'#ff4400',20,6);
      break;
    case 'short_circuit':
      qd.target.stunTimer=60;
      spawnBurst(qd.target.x,qd.target.y,'#ffcc00',25,7);
      for(let i=0;i<8;i++){
        const a=Math.PI*2*i/8;
        spawnParticle(qd.target.x,qd.target.y,'#ffff00',Math.cos(a)*5,Math.sin(a)*5,20,3);
      }
      break;
    case 'black_wall':
      spawnBurst(qd.target.x,qd.target.y,'#ff00ff',30,8);
      spawnBurst(qd.target.x,qd.target.y,'#000000',20,6);
      for(let r=0;r<3;r++){
        explosions.push({x:qd.target.x,y:qd.target.y,radius:0,maxRadius:50+r*30,color:'#ff00ff',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
      }
      break;
  }
  // Keep quickhackDisplay alive until flash finishes (cleared in drawBattle when quickhackFlashTimer hits 0)
}

// ============================================================
// ELEMENT EFFECTS — 16 unique weapon+element combos
// ============================================================
function applyElementEffect(attacker,defender){
  const wep=attacker.char.id;
  const elem=attacker.elem.id;
  const comboKey=wep+'_'+elem;

  switch(comboKey){
    // === MANTIS BLADES ===
    case 'mantis_fire':
      // Burn mark makes bleed do MORE damage
      defender.burnTimer=120;defender.burnDmg=2;
      if(defender.bleedTimer>0)defender.bleedDmg*=1.5; // boost active bleed
      attacker.mantisFireBurnBoost=true;
      spawnBurst(defender.x,defender.y,'#ff4400',5,2);
      break;
    case 'mantis_toxic':
      // Hit again before bleed timer expires = reapply bleed
      if(defender.bleedTimer>0){
        defender.bleedTimer=60;defender.bleedDmg+=attacker.atk*0.15;
        spawnDmgNum(defender.x,defender.y-defender.radius-20,'BLEED STACK','#aa44cc',false);
        spawnBurst(defender.x,defender.y,'#aa44cc',6,3);
      } else {
        applyBleed(defender,attacker.atk*0.25,50);
        spawnBurst(defender.x,defender.y,'#aa44cc',4,2);
      }
      break;
    case 'mantis_electric':
      // Hitting walls makes mantis move faster for a bit
      attacker.speed=attacker.baseSpeed*1.4;
      attacker.slowTimer=0; // clear any slow
      // Speed boost decays via element check in updateBattle (120 frames ~2s)
      attacker._elecSpeedBoost=120;
      spawnBurst(defender.x,defender.y,'#ffcc00',4,2);
      break;
    case 'mantis_cryo':
      // Every 2 hits, ice shards snap onto enemy making them slower
      attacker.mantisIceHitCount++;
      if(attacker.mantisIceHitCount>=2){
        attacker.mantisIceHitCount=0;
        defender.slowTimer=Math.max(defender.slowTimer,90);
        SFX.freeze();
        spawnDmgNum(defender.x,defender.y-defender.radius-20,'ICE SHARD','#77ddff',false);
        spawnBurst(defender.x,defender.y,'#77ddff',8,3);
        // Ice shard visual
        for(let i=0;i<6;i++){
          const a=Math.random()*Math.PI*2;
          spawnParticle(defender.x+Math.cos(a)*defender.radius,defender.y+Math.sin(a)*defender.radius,'#aaeeff',Math.cos(a)*-1,Math.sin(a)*-1,25,3);
        }
      } else {
        spawnBurst(defender.x,defender.y,'#77ddff',3,1);
      }
      break;

    // === PLS ===
    case 'pls_fire':
      // Explosions leave lingering fire zone matching explosion radius
      const plsFireR=(attacker.plsExplosionRadius||35)+getChaosLevel(attacker)*10;
      fireZones.push({x:defender.x,y:defender.y,radius:plsFireR*1.8,life:60,maxLife:60,owner:attacker,dmg:attacker.atk*0.3});
      spawnBurst(defender.x,defender.y,'#ff4400',10,5);
      SFX.burn();
      break;
    case 'pls_electric':
      // If hits wall, explodes TWICE — handled in projectile wall collision code
      // Here just add stun chance on direct hit
      if(Math.random()<0.15){defender.stunTimer=25;SFX.stun();spawnBurst(defender.x,defender.y,'#ffcc00',6,3);}
      spawnBurst(defender.x,defender.y,'#ffcc00',4,2);
      break;
    case 'pls_toxic':
      // Direct hit makes enemy move slower
      defender.slowTimer=Math.max(defender.slowTimer,75);
      spawnBurst(defender.x,defender.y,'#aa44cc',5,2);
      spawnDmgNum(defender.x,defender.y-defender.radius-15,'SLOWED','#aa44cc',false);
      break;
    case 'pls_cryo':
      // Vulnerability zone — enemies in area take MORE damage
      vulnZones.push({x:defender.x,y:defender.y,radius:35+getChaosLevel(attacker)*4,life:60,maxLife:60,owner:attacker});
      spawnBurst(defender.x,defender.y,'#77ddff',6,3);
      SFX.freeze();
      break;

    // === GORILLA ARMS ===
    case 'gorilla_fire':
      // Greatly increased knockback + enemies take damage if knocked into walls
      defender.burnTimer=60;defender.burnDmg=1.5;
      attacker.gorillaKnockbackMult=2.5;
      spawnBurst(defender.x,defender.y,'#ff4400',6,3);
      break;
    case 'gorilla_electric':
      // Slightly increases attack speed
      attacker.attackTimer=Math.max(0,attacker.attackTimer-8);
      spawnBurst(defender.x,defender.y,'#ffcc00',4,2);
      break;
    case 'gorilla_toxic':
      // Leaves poison bubbles on enemy — wall collisions deal extra damage
      poisonBubbles.push({x:defender.x,y:defender.y,life:180,maxLife:180,target:defender,owner:attacker,dmg:attacker.atk*0.4});
      spawnBurst(defender.x,defender.y,'#aa44cc',5,2);
      break;
    case 'gorilla_cryo':
      // Greatly reduces knockback so enemy stays close, easier to hit
      attacker.gorillaKnockbackMult=0.3;
      defender.slowTimer=Math.max(defender.slowTimer,45);
      spawnBurst(defender.x,defender.y,'#77ddff',4,2);
      break;

    // === MONOWIRE ===
    case 'monowire_fire':
      // Wraps twirl enemies — damage if they collide with walls
      defender.burnTimer=90;defender.burnDmg=2;
      // Spin the enemy — make them bounce around
      defender.vx+=(Math.random()-0.5)*6;defender.vy+=(Math.random()-0.5)*6;
      defender.spinSpeed=(Math.random()-0.5)*0.3;
      spawnBurst(defender.x,defender.y,'#ff4400',5,3);
      break;
    case 'monowire_electric':
      // Short circuits enemy — their attacks have a small chance to miss
      defender.missChance=Math.min(0.35,defender.missChance+0.1);
      spawnBurst(defender.x,defender.y,'#ffcc00',5,2);
      spawnDmgNum(defender.x,defender.y-defender.radius-15,'SHORT CIRCUIT','#ffcc00',false);
      break;
    case 'monowire_toxic':
      // Longer enemy is wrapped, more damage they take
      if(defender.captureTimer>0){
        defender.monowireWrapDmgAccum+=attacker.atk*0.2;
        spawnBurst(defender.x,defender.y,'#aa44cc',4,2);
      }
      defender.defReduction=Math.min(8,defender.defReduction+2);
      defender.defReductionTimer=120;
      spawnBurst(defender.x,defender.y,'#aa44cc',3,2);
      break;
    case 'monowire_cryo':
      // Slowed enemies have higher chance of getting wrapped/captured
      defender.slowTimer=Math.max(defender.slowTimer,60);
      spawnBurst(defender.x,defender.y,'#77ddff',4,2);
      // Capture chance boost handled in attackMonowire when enemy is slowed
      break;

    // === SANDEVISTAN ===
    case 'sandy_fire':
      // Fire trail — handled in updateBattle physics
      defender.burnTimer=90;defender.burnDmg=2.5;
      spawnBurst(defender.x,defender.y,'#ff4400',8,3);
      break;
    case 'sandy_electric':
      // Rotating orbs hit enemies — handled in updateBattle
      if(Math.random()<0.25){defender.stunTimer=25;SFX.stun();}
      spawnBurst(defender.x,defender.y,'#ffcc00',6,3);
      break;
    case 'sandy_toxic':
      // Wall bounce = poison scatter — handled in physics
      defender.defReduction=Math.min(8,defender.defReduction+3);
      defender.defReductionTimer=120;
      spawnBurst(defender.x,defender.y,'#aa44cc',6,3);
      break;
    case 'sandy_cryo':
      // Faster speed = more slow — handled in attackSandy
      spawnBurst(defender.x,defender.y,'#77ddff',6,3);
      break;

    // === THROWING WEAPONS ===
    case 'throw_fire':
      // Faster aim & throw — reduce attack timer
      attacker.attackTimer=Math.max(0,attacker.attackTimer-15);
      spawnBurst(defender.x,defender.y,'#ff4400',5,3);
      break;
    case 'throw_electric':
      // Auto-return handled in projectile miss logic
      spawnBurst(defender.x,defender.y,'#ffcc00',5,2);
      break;
    case 'throw_toxic':
      // Phantom dagger from opposite side — VISIBLE with trail
      if(Math.random()<0.35){
        const oa=angle(attacker,defender)+Math.PI;
        const phantomDmg=attacker.atk*attacker.throwWeapons[attacker.throwActiveIdx].dmgMult*0.08;
        projectiles.push({
          x:defender.x+Math.cos(oa)*150,y:defender.y+Math.sin(oa)*150,
          vx:-Math.cos(oa)*10,vy:-Math.sin(oa)*10,
          owner:attacker,target:defender,color:'#dd55ee',life:60,radius:10,
          dmg:phantomDmg,explosive:false,explosionRadius:0,homing:false,isPhantom:true,
        });
        // Visible spawn flash
        spawnBurst(defender.x+Math.cos(oa)*150,defender.y+Math.sin(oa)*150,'#dd55ee',8,4);
        spawnDmgNum(defender.x+Math.cos(oa)*120,defender.y+Math.sin(oa)*120,'PHANTOM','#dd55ee',false);
      }
      break;
    case 'throw_cryo':
      // Missed weapons spin on ground — handled in projectile miss logic
      spawnBurst(defender.x,defender.y,'#77ddff',5,3);
      break;

    // Fallback: generic element effects
    default:
      switch(attacker.elem.id){
        case 'fire':defender.burnTimer=120;defender.burnDmg=2;spawnBurst(defender.x,defender.y,'#ff4400',4,2);break;
        case 'electric':if(Math.random()<0.2){defender.stunTimer=30;SFX.stun();spawnBurst(defender.x,defender.y,'#ffcc00',8,3);}break;
        case 'toxic':defender.defReduction=4;defender.defReductionTimer=180;spawnBurst(defender.x,defender.y,'#aa44cc',4,2);break;
        case 'cryo':defender.slowTimer=90;if(Math.random()<0.12){defender.freezeTimer=45;SFX.freeze();spawnBurst(defender.x,defender.y,'#77ddff',10,3);}break;
      }
  }
}

// ============================================================
// RELIC SPECIALS — Auto-trigger when bar full
// ============================================================
function useSpecial(f,enemy){
  f.specialBar=0;f.specialActive=true;
  showRelicText(f.char.specialName,f.char.color);
  addLog((f.side===0?'P1':'P2')+' '+f.char.specialName+'!');
  shakeTimer=15;shakeAmt=8;

  switch(f.char.id){
    case 'mantis':relicMantis(f,enemy);break;
    case 'gorilla':relicGorilla(f,enemy);break;
    case 'monowire':relicMonowire(f,enemy);break;
    case 'pls':relicPLS(f,enemy);break;
    case 'sandy':relicSandy(f,enemy);break;
    case 'throw':relicThrow(f,enemy);break;
  }
}

function relicMantis(f,enemy){
  // MB Relic: pull back blades → homing dash → high bleed chance — DRAMATIC
  f.specialTimer=120;
  f.relicDashing=false;
  f.relicDashTarget=enemy;
  f.relicDashTimer=50; // 50 frames charge (longer charge-up), then dash

  // Dramatic pull-back — big reverse + blade glow burst
  f.vx*=-0.8;f.vy*=-0.8;
  spawnBurst(f.x,f.y,'#ff3333',20,5);
  spawnBurst(f.x,f.y,'#ffcc00',10,4);
  shakeTimer=10;shakeAmt=6;
  // Ring of blade particles
  for(let i=0;i<16;i++){
    const a=Math.PI*2*i/16;
    spawnParticle(f.x+Math.cos(a)*f.radius*1.5,f.y+Math.sin(a)*f.radius*1.5,'#ff6644',Math.cos(a)*-2,Math.sin(a)*-2,20,3);
  }
}

function relicGorilla(f,enemy){
  // GA Relic: thunder clap shockwaves for 5-7 seconds
  f.specialTimer=360; // 6 seconds
  f.relicShockwaveTimer=0;
  f.relicShockwaveCount=0;
  spawnBurst(f.x,f.y,'#ff8800',25,8);
  // Fists up animation
  for(let i=0;i<20;i++){
    const a=Math.PI*2*i/20;
    spawnParticle(f.x,f.y-f.radius,'#ffcc00',Math.cos(a)*3,Math.sin(a)*3-2,25,3);
  }
}

function relicMonowire(f,enemy){
  // MW Relic: BB-8 whip spin + capture → quickhack
  f.specialTimer=180; // 3 seconds spin
  f.relicWhipSpinTimer=180;
  spawnBurst(f.x,f.y,'#00ddff',20,6);
}

function relicPLS(f,enemy){
  // PLS Relic: smart lock → brief charge → 10 rapid homing shots in ~1-2 sec
  f.specialTimer=120;
  f.relicLockTarget=enemy;
  f.relicChargeTimer=30; // brief charge-up (~0.5 sec)
  f.relicHomingShots=10;
  // Targeting reticle visual starts — big lock-on announcement
  spawnBurst(f.x,f.y,'#33cc33',20,6);
  spawnBurst(enemy.x,enemy.y,'#ff3333',15,5);
  addLog((f.side===0?'P1':'P2')+' PLS LOCK ON!');
  SFX.relicActivate();
}

function relicSandy(f,enemy){
  // Sandevistan: slow enemy time 75%, +30% dodge, speed boost, afterimage trail
  f.specialTimer=360; // ~6 seconds
  f.sandyActive=true;
  f.sandyTimer=360;
  f.sandyDodgeBoost=0.18; // +18% dodge
  // Slow enemy
  enemy.sandyTimeScale=0.25; // 75% slow
  // Speed boost
  f.speed=f.baseSpeed*1.5;
  const spd=Math.hypot(f.vx,f.vy);
  if(spd>0){f.vx=f.vx/spd*f.speed*2;f.vy=f.vy/spd*f.speed*2;}
  // MASSIVE blue activation burst — very obvious
  spawnBurst(f.x,f.y,'#4488ff',50,12);
  spawnBurst(f.x,f.y,'#88bbff',35,9);
  spawnBurst(f.x,f.y,'#aaccff',25,7);
  spawnBurst(f.x,f.y,'#ffffff',15,5);
  // Blue shockwave rings
  for(let r=0;r<3;r++){
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:60+r*30,color:'#4488ff',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
  }
  shakeTimer=25;shakeAmt=14;
}

function relicThrow(f,enemy){
  // Optical Camo: invisible, faster, auto-throw constantly, dodge boost
  f.specialTimer=420; // 7 seconds
  f.throwCamoActive=true;
  f.throwCamoTimer=420;
  f.dodgeChance=0.25;
  f.speed=f.baseSpeed*1.6;
  // Return all weapons immediately
  f.throwWeapons.forEach(tw=>{tw.available=true;tw.returnCD=0;});
  f.throwActiveIdx=0;
  spawnBurst(f.x,f.y,'#cc66ff',40,10);
  spawnBurst(f.x,f.y,'#ffffff',20,6);
  for(let r=0;r<2;r++){
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:50+r*25,color:'#cc66ff',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
  }
  shakeTimer=20;shakeAmt=10;
}

// ============================================================
// RELIC UPDATE — per-frame logic for active relic specials
// ============================================================
function updateRelicMantis(f,enemy,dt){
  if(f.relicDashTimer>0){
    f.relicDashTimer-=dt;
    // Pull-back phase — blades glow
    f.weaponFlash=10;
    spawnParticle(f.x+rand(-5,5),f.y+rand(-5,5),'#ff3333',0,0,10,2);
    if(f.relicDashTimer<=0){
      // Launch dash!
      f.relicDashing=true;
      SFX.dashHit();
    }
  }
  if(f.relicDashing&&enemy.alive){
    const d=dist(f,enemy);
    f.weaponAngle=angle(f,enemy);
    f.weaponExtend=1;f.weaponFlash=5;
    // Trail particles
    spawnParticle(f.x,f.y,'#ff6644',(-f.vx)*0.3,(-f.vy)*0.3,15,3);
    spawnParticle(f.x,f.y,'#ff0000',0,0,8,2);
    if(d<f.radius+enemy.radius+15){
      // DRAMATIC IMPACT!
      f.relicDashing=false;
      const dmg=dealDamage(f,enemy,f.atk*3.5,true);
      // Very high bleed chance on relic dash
      if(enemy.alive&&Math.random()<0.8){
        applyBleed(enemy,f.atk*0.7,120);
      }
      shakeTimer=25;shakeAmt=14;
      // Massive slash cross visual
      spawnBurst(enemy.x,enemy.y,'#ff0000',35,8);
      spawnBurst(enemy.x,enemy.y,'#ffcc00',20,6);
      spawnBurst(enemy.x,enemy.y,'#ffffff',10,4);
      // X-slash particle lines
      for(let i=0;i<20;i++){
        const t=i/20;
        spawnParticle(lerp(enemy.x-40,enemy.x+40,t),lerp(enemy.y-40,enemy.y+40,t),'#ff4444',0,0,18,2);
        spawnParticle(lerp(enemy.x+40,enemy.x-40,t),lerp(enemy.y-40,enemy.y+40,t),'#ff4444',0,0,18,2);
      }
      explosions.push({x:enemy.x,y:enemy.y,radius:0,maxRadius:80,color:'#ff3333',life:18,maxLife:18,dmg:0,owner:null,target:null,hit:true});
      f.specialTimer=0;f.specialActive=false;
      // Scatter away after hit
      const ka=angle(enemy,f);
      f.vx=Math.cos(ka)*8;f.vy=Math.sin(ka)*8;
    }
  }
}

function updateRelicGorilla(f,enemy,dt){
  f.relicShockwaveTimer-=dt;
  if(f.relicShockwaveTimer<=0&&f.relicShockwaveCount<8){
    f.relicShockwaveTimer=45;
    f.relicShockwaveCount++;
    SFX.thunderclap();
    // Punch in weapon facing direction — launch directional shockwave (NOT homing)
    const swAngle=f.weaponAngle;
    const swSpeed=6;
    const swSize=30+f.relicShockwaveCount*5;
    shockwaveProjectiles.push({
      x:f.x+Math.cos(swAngle)*f.radius,
      y:f.y+Math.sin(swAngle)*f.radius,
      vx:Math.cos(swAngle)*swSpeed,
      vy:Math.sin(swAngle)*swSpeed,
      owner:f,target:enemy,
      size:swSize,dmg:f.atk*1.2,
      life:60,maxLife:60,hit:false,
      color:'#ffaa00',
    });
    // Visual: shockwave ring at punch origin
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:swSize,color:'#ffaa00',life:12,maxLife:12,dmg:0,owner:f,target:null,hit:true});
    spawnBurst(f.x,f.y,'#ff8800',12,5);
    shakeTimer=8;shakeAmt=6;
    f.weaponExtend=1;f.weaponFlash=15;
  }
}

function spawnWallCrack(x,y,owner){
  // Pre-generate crack line lengths so they don't flicker each frame
  const crackLines=[];for(let i=0;i<10;i++){crackLines.push(0.5+Math.random()*0.5);}
  wallCracks.push({x,y,size:50+Math.random()*40,life:500,maxLife:500,owner:owner||null,dmgCooldown:0,crackLines});
  // Visual impact burst at crack point
  spawnBurst(x,y,'#ffaa00',14,6);
  spawnSparks(x,y,'#ffdd44',10);
  SFX.thunderclap();
}

function updateRelicMonowire(f,enemy,dt){
  if(f.relicWhipSpinTimer>0){
    f.relicWhipSpinTimer-=dt;
    f.rotation+=0.25*dt; // fast spin
    f.weaponExtend=1;

    // BB-8 whip spin — extended wires hit everything nearby
    const spinRange=110;
    const d=dist(f,enemy);
    // Strike every 12 frames
    if(Math.floor(f.relicWhipSpinTimer)%12===0&&d<spinRange&&enemy.alive){
      dealDamage(f,enemy,f.atk*0.6,true);
      SFX.whip();
      // Capture chance converts to quickhack chance during relic
      if(Math.random()<0.40&&!quickhackDisplay&&enemy.alive){
        applyQuickhack(f,enemy);
      }
      // Higher parry — deflect incoming projectiles
      spawnBurst(f.x,f.y,'#00ddff',6,4);
    }
    // Spin visual
    if(f.relicWhipSpinTimer%3<1){
      const a=f.rotation*3;
      spawnParticle(f.x+Math.cos(a)*spinRange*0.8,f.y+Math.sin(a)*spinRange*0.8,'#00ffff',0,0,10,2);
      spawnParticle(f.x+Math.cos(a+Math.PI)*spinRange*0.8,f.y+Math.sin(a+Math.PI)*spinRange*0.8,'#00aaff',0,0,10,2);
    }
  }
}

function updateRelicPLS(f,enemy,dt){
  if(f.relicChargeTimer>0){
    // Charging phase — big visible targeting reticle on enemy
    f.relicChargeTimer-=dt;
    f.weaponAngle=angle(f,enemy);
    // Lock-on lines from PLS to enemy
    if(battleTime%3<1){
      const a=angle(f,enemy);
      spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#ff3333',
        Math.cos(a)*5,Math.sin(a)*5,20,3);
    }
    // Swirling charge particles around PLS ball
    for(let i=0;i<2;i++){
      const a=battleTime*0.2+i*Math.PI;
      const cx=f.x+Math.cos(a)*35;
      const cy=f.y+Math.sin(a)*35;
      spawnParticle(cx,cy,'#33ff33',(f.x-cx)*0.15,(f.y-cy)*0.15,12,2);
    }
    // Red pulsing brackets on enemy
    if(battleTime%4<1){
      spawnParticle(enemy.x-enemy.radius-10,enemy.y,'#ff3333',0,0,10,3);
      spawnParticle(enemy.x+enemy.radius+10,enemy.y,'#ff3333',0,0,10,3);
      spawnParticle(enemy.x,enemy.y-enemy.radius-10,'#ff3333',0,0,10,3);
      spawnParticle(enemy.x,enemy.y+enemy.radius+10,'#ff3333',0,0,10,3);
    }
    if(f.relicChargeTimer<=0){
      // Start rapid fire
      SFX.special();
      addLog((f.side===0?'P1':'P2')+' PLS RAPID FIRE!');
    }
    return;
  }
  // Rapid-fire homing shots — all 10 in ~1-2 seconds (fire every 3 frames instead of 6)
  if(f.relicHomingShots>0&&battleTime%3<1){
    f.relicHomingShots--;
    const a=angle(f,enemy)+(Math.random()-0.5)*0.3;
    projectiles.push({
      x:f.x+Math.cos(a)*f.radius,
      y:f.y+Math.sin(a)*f.radius,
      vx:Math.cos(a)*8,vy:Math.sin(a)*8,
      owner:f,target:enemy,
      color:'#66ff66',life:120,radius:8,
      dmg:f.atk*0.6,
      explosive:true,explosionRadius:25+getChaosLevel(f)*4,
      homing:true,homingStrength:0.25,
    });
    SFX.missile();
    f.weaponFlash=6;f.weaponExtend=0.5;
    shakeTimer=3;shakeAmt=2;
    if(f.relicHomingShots<=0){
      f.specialTimer=0;f.specialActive=false;
    }
  }
}

function updateRelicSandy(f,enemy,dt){
  f.sandyTimer-=dt;
  // Afterimage trail — spawn ghostly copies
  if(battleTime%3<1){
    sandyAfterimages.push({x:f.x,y:f.y,radius:f.radius,rotation:f.rotation,color:f.char.color,life:20,maxLife:20});
  }
  // Blue glow particles
  if(battleTime%2<1){
    const a=Math.random()*Math.PI*2;
    spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#4488ff',Math.cos(a)*1.5,Math.sin(a)*1.5,15,3);
  }
  // Speed-based damage when hitting — handled by attackSandy already
  // Sandy+fire: leave fire trail
  if(f.elementActive&&f.elem.id==='fire'&&battleTime%4<1){
    fireTrails.push({x:f.x,y:f.y,life:45,maxLife:45,radius:12,owner:f,dmg:f.atk*0.15});
  }
  // Sandy+electric: rotating orbs
  if(f.elementActive&&f.elem.id==='electric'){
    f.sandyOrbAngle+=0.12*dt;
    // Check orb hits
    for(let oi=0;oi<2;oi++){
      const oa=f.sandyOrbAngle+oi*Math.PI;
      const ox=f.x+Math.cos(oa)*55,oy=f.y+Math.sin(oa)*55;
      if(enemy.alive&&dist({x:ox,y:oy},enemy)<enemy.radius+8&&battleTime%10<1){
        dealDamage(f,enemy,f.atk*0.4,false);
        spawnBurst(ox,oy,'#ffcc00',6,3);
      }
    }
  }
  // End of Sandevistan
  if(f.sandyTimer<=0){
    f.sandyActive=false;
    f.sandyDodgeBoost=0;
    f.speed=f.baseSpeed;
    enemy.sandyTimeScale=1;
    f.specialTimer=0;f.specialActive=false;
    addLog((f.side===0?'P1':'P2')+' Sandevistan ended');
    spawnBurst(f.x,f.y,'#4488ff',10,4);
  }
}

function updateRelicThrow(f,enemy,dt){
  f.throwCamoTimer-=dt;
  // Subtle ripple particles (not obvious)
  if(battleTime%8<1){
    spawnParticle(f.x+rand(-15,15),f.y+rand(-15,15),'rgba(180,200,255,0.3)',0,-0.5,10,1);
  }
  // Auto-face enemy constantly during camo
  f.weaponAngle=angle(f,enemy);
  // Normal attack cycle handles throwing during camo — no machine gun override
  // Rush to pick up embedded weapons
  f.throwEmbedded.forEach(emb=>{
    if(!emb.active)return;
    const d=dist(f,emb);
    if(d<f.radius+20){
      // Pick up
      f.throwWeapons[emb.weaponIdx].available=true;
      f.throwWeapons[emb.weaponIdx].returnCD=0;
      emb.active=false;
      spawnBurst(emb.x,emb.y,f.throwWeapons[emb.weaponIdx].color,6,3);
    }
  });
  // End optical camo
  if(f.throwCamoTimer<=0){
    f.throwCamoActive=false;
    f.dodgeChance=0;
    f.speed=f.baseSpeed;
    f.specialTimer=0;f.specialActive=false;
    addLog((f.side===0?'P1':'P2')+' Optical Camo ended');
    spawnBurst(f.x,f.y,'#cc66ff',10,4);
  }
}

// ============================================================
// BATTLE UPDATE
// ============================================================
function updateBattle(dt){
  if(battleOver)return;
  battleTime+=dt;
  const f1=fighters[0],f2=fighters[1];

  [f1,f2].forEach((f,i)=>{
    const enemy=i===0?f2:f1;
    if(!f.alive)return;

    // Timers
    if(f.hitFlash>0)f.hitFlash-=dt;
    if(f._bodyHitCD>0)f._bodyHitCD-=dt;
    if(f.stunTimer>0)f.stunTimer-=dt;
    if(f.slowTimer>0)f.slowTimer-=dt;
    if(f.freezeTimer>0)f.freezeTimer-=dt;
    if(f.captureTimer>0){
      f.captureTimer-=dt;
      // Captured enemies take constant crush damage
      if(battleTime%10<dt&&f._capturedBy&&f._capturedBy.alive){
        const crushDmg=f._capturedBy.atk*0.25;
        f.hp-=crushDmg;f.hitFlash=4;
        spawnDmgNum(f.x+rand(-10,10),f.y-f.radius-10,crushDmg,'#00ddff',false);
        spawnParticle(f.x+rand(-20,20),f.y+rand(-20,20),'#00ddff',0,-1,12,2);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;battleOver=true;winner=f._capturedBy;addLog((f._capturedBy.side===0?'P1':'P2')+' '+f._capturedBy.char.name+' WINS!');SFX.ko();setTimeout(()=>SFX.victory(),500);}
      }
    }
    if(f.defReductionTimer>0)f.defReductionTimer-=dt;else f.defReduction=0;
    if(f.specialTimer>0)f.specialTimer-=dt;else if(f.specialActive){f.specialActive=false;f.relicDashing=false;}

    // Bleed DOT
    if(f.bleedTimer>0){
      f.bleedTimer-=dt;
      if(!f._bleedTickCD)f._bleedTickCD=0;f._bleedTickCD-=dt;
      if(f._bleedTickCD<=0){f._bleedTickCD=15;
        f.hp-=f.bleedDmg;
        spawnParticle(f.x+rand(-8,8),f.y+rand(-8,8),'#cc0000',rand(-1,1),-1,12,2);
        spawnDmgNum(f.x+rand(-10,10),f.y-f.radius-5,f.bleedDmg,'#cc0000',false);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;battleOver=true;winner=enemy;addLog((enemy.side===0?'P1':'P2')+' '+enemy.char.name+' WINS! (bleed)');SFX.ko();setTimeout(()=>SFX.victory(),500);}
      }
    } else {f.bleedIcon=false;}

    // Burn DOT
    if(f.burnTimer>0){
      f.burnTimer-=dt;
      if(!f._burnTickCD)f._burnTickCD=0;f._burnTickCD-=dt;
      if(f._burnTickCD<=0){f._burnTickCD=10;
        f.hp-=f.burnDmg;
        spawnParticle(f.x+rand(-10,10),f.y-f.radius,'#ff4400',0,-1,15,2);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;battleOver=true;winner=enemy;addLog((enemy.side===0?'P1':'P2')+' '+enemy.char.name+' WINS! (burn)');SFX.ko();setTimeout(()=>SFX.victory(),500);}
      }
    }

    // Element activation at 25% HP
    if(!f.elementActive&&f.elem.id!=='none'&&f.hp<=f.maxHp*0.25){
      f.elementActive=true;f.elementFlash=30;
      SFX.elementActivate();
      const comboKey=f.char.id+'_'+f.elem.id;
      addLog((f.side===0?'P1':'P2')+' '+f.elem.name+' ELEMENT ACTIVATED!');
      addLog('  >> '+(COMBO_EFFECTS[comboKey]||''));
      spawnBurst(f.x,f.y,f.elem.color,20,5);
      switch(f.elem.id){
        case 'fire':f.atk=f.baseAtk*1.3;break;
        case 'electric':f.speed=f.baseSpeed*1.2;f.crit+=8;break;
        case 'toxic':f.atk=f.baseAtk*1.15;break;
        case 'cryo':f.def=f.baseDef+5;break;
      }
    }
    if(f.elementFlash>0)f.elementFlash-=dt;

    // Special bar passive fill (slow time-based + attack bonus is the main driver)
    f.specialBar=Math.min(f.specialMax,f.specialBar+0.025*(f.char.relicChargeRate||1)*dt);

    // Check if should use relic special
    if(f.specialBar>=f.specialMax&&!f.specialActive&&enemy.alive){
      useSpecial(f,enemy);
    }

    // Update active relic special
    if(f.specialActive){
      switch(f.char.id){
        case 'mantis':updateRelicMantis(f,enemy,dt);break;
        case 'gorilla':updateRelicGorilla(f,enemy,dt);break;
        case 'monowire':updateRelicMonowire(f,enemy,dt);break;
        case 'pls':updateRelicPLS(f,enemy,dt);break;
        case 'sandy':updateRelicSandy(f,enemy,dt);break;
        case 'throw':updateRelicThrow(f,enemy,dt);break;
      }
    }

    // Throwing weapon management
    if(f.char.id==='throw'){
      const chaos=getChaosLevel(f);
      // Update return cooldowns
      f.throwWeapons.forEach((tw,idx)=>{
        if(!tw.available&&tw.returnCD>0){
          tw.returnCD-=dt;
          if(tw.returnCD<=0){tw.available=true;tw.returnCD=0;}
        }
      });
      // Auto-switch to strongest available weapon
      const avail=f.throwWeapons.filter(tw=>tw.available);
      if(avail.length>0){
        const strongest=avail.sort((a,b)=>b.dmgMult-a.dmgMult)[0];
        const sIdx=f.throwWeapons.indexOf(strongest);
        if(sIdx!==f.throwActiveIdx&&f.throwSwitchCD<=0){
          f.throwActiveIdx=sIdx;
          f.throwSwitchCD=60; // 1 second switch
        }
      }
      if(f.throwSwitchCD>0)f.throwSwitchCD-=dt;
      // Pickup embedded weapons when near
      f.throwEmbedded.forEach(emb=>{
        if(!emb.active)return;
        emb.life-=dt;
        if(emb.life<=0){emb.active=false;f.throwWeapons[emb.weaponIdx].available=true;return;}
        // Can pick up if within range and <180 frames left
        if(emb.life<180&&dist(f,emb)<f.radius+25){
          f.throwWeapons[emb.weaponIdx].available=true;
          f.throwWeapons[emb.weaponIdx].returnCD=0;
          emb.active=false;
          spawnBurst(emb.x,emb.y,f.throwWeapons[emb.weaponIdx].color,6,3);
        }
        // Ice element: spinning embedded weapons damage enemies
        if(f.elementActive&&f.elem.id==='cryo'&&enemy.alive){
          if(dist(enemy,emb)<enemy.radius+15&&battleTime%12<dt){
            dealDamage(f,enemy,f.atk*0.2,false);
            spawnBurst(emb.x,emb.y,'#77ddff',4,2);
          }
        }
      });
      // Melee when enemy is close — use strongest available
      const d=dist(f,enemy);
      if(d<f.radius+enemy.radius+30&&avail.length>0&&!f.specialActive){
        // Melee swing with available weapon (less damage than ranged)
        if(f.attackTimer<=0){
          const meleeW=avail.sort((a,b)=>{
            // For melee: agaou (fists) best, fang second, punkblade worst
            const order={agaou:3,fang:2,punk:1};
            return (order[b.id]||0)-(order[a.id]||0);
          })[0];
          const meleeDmg=f.atk*meleeW.dmgMult*0.6;
          dealDamage(f,enemy,meleeDmg);
          f.attackTimer=getAttackInterval(f)*0.8;
          f.weaponFlash=12;f.weaponExtend=1;
          SFX.slash();
          spawnBurst(enemy.x,enemy.y,meleeW.color,6,3);
          shakeTimer=5;shakeAmt=3;
        }
      }
    }

    // Weapon attack — PLS fires on interval only, others need facing
    // Throw char keeps normal attack cycle during Optical Camo (no machine gun)
    if(!f.specialActive||f.char.id==='gorilla'||f.char.id==='throw'){
      if(f.attackTimer>0)f.attackTimer-=dt*f.sandyTimeScale; // slowed by Sandevistan
      if(f.attackTimer<=0){
        // PLS fires purely on interval — projectile aims toward enemy
        // Throw needs facing (but ult handles auto-throw separately)
        // Others need weapon to face enemy
        // Throw: skip if no weapon available
        if(f.char.id==='throw'&&!f.throwWeapons[f.throwActiveIdx].available){/* wait */}
        else if(f.char.id==='pls'||isWeaponFacingEnemy(f,enemy)){
          f.attackTimer=getAttackInterval(f);
          performWeaponAttack(f,enemy);
        }
      }
    }

    // Physics movement
    updatePhysics(f,dt);
  });

  // Ball-to-ball collision
  checkBallCollision(f1,f2);

  // Weapon parry check — every frame, check if weapon tips are close
  // Sandy can't parry (no weapon)
  if(f1.alive&&f2.alive&&f1.char.id!=='sandy'&&f2.char.id!=='sandy'){
    const tipDist1=Math.min(f1.range*0.7,80);
    const tipDist2=Math.min(f2.range*0.7,80);
    const w1={x:f1.x+Math.cos(f1.weaponAngle)*tipDist1,y:f1.y+Math.sin(f1.weaponAngle)*tipDist1};
    const w2={x:f2.x+Math.cos(f2.weaponAngle)*tipDist2,y:f2.y+Math.sin(f2.weaponAngle)*tipDist2};
    if(dist(w1,w2)<35&&!f1._parryCooldown&&!f2._parryCooldown){
      const cx=(w1.x+w2.x)/2,cy=(w1.y+w2.y)/2;
      // MASSIVE parry spark explosion
      spawnBurst(cx,cy,'#ffffff',30,9);
      spawnBurst(cx,cy,'#ffcc00',25,7);
      spawnBurst(cx,cy,'#ffaa00',15,5);
      spawnSparks(cx,cy,'#ffdd44',18);
      // Spark lines radiating from clash point
      for(let i=0;i<12;i++){const a=Math.PI*2*i/12;spawnParticle(cx,cy,'#ffcc00',Math.cos(a)*5,Math.sin(a)*5,14,3);}
      shakeTimer=16;shakeAmt=10;
      SFX.clash();
      const ka=angle(f2,f1);
      f1.vx+=Math.cos(ka)*5;f1.vy+=Math.sin(ka)*5;
      f2.vx-=Math.cos(ka)*5;f2.vy-=Math.sin(ka)*5;
      f1.specialBar=Math.min(f1.specialMax,f1.specialBar+8*(f1.char.relicChargeRate||1));
      f2.specialBar=Math.min(f2.specialMax,f2.specialBar+8*(f2.char.relicChargeRate||1));
      addLog('WEAPON CLASH!');
      spawnDmgNum(cx,cy-15,'PARRY!','#ffcc00',true);
      f1._parryCooldown=30;f2._parryCooldown=30;
    }
    if(f1._parryCooldown>0)f1._parryCooldown-=dt;
    if(f2._parryCooldown>0)f2._parryCooldown-=dt;
  }

  // Update projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];

    // Homing behavior
    if(p.homing&&p.target&&p.target.alive){
      const da=angle(p,p.target);
      const currentAngle=Math.atan2(p.vy,p.vx);
      let diff=da-currentAngle;
      while(diff>Math.PI)diff-=Math.PI*2;
      while(diff<-Math.PI)diff+=Math.PI*2;
      const turn=diff*p.homingStrength;
      const spd=Math.hypot(p.vx,p.vy);
      const na=currentAngle+turn;
      p.vx=Math.cos(na)*spd;
      p.vy=Math.sin(na)*spd;
    }

    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    spawnParticle(p.x,p.y,p.color,0,0,8,2);

    // Check hit on target (or any enemy if no target)
    let hit=false;
    if(p.target&&p.target.alive&&dist(p,p.target)<p.target.radius+p.radius){hit=true;}
    else if(!p.target){
      // No specific target — check both fighters
      [fighters[0],fighters[1]].forEach(f=>{
        if(f&&f.alive&&f!==p.owner&&dist(p,f)<f.radius+p.radius){
          p.target=f;hit=true;
        }
      });
    }

    // Check wall hit (for explosive projectiles)
    let wallHit=false;
    if(p.x<ARENA.x||p.x>ARENA.x+ARENA.w||p.y<ARENA.y||p.y>ARENA.y+ARENA.h){wallHit=true;}

    if(hit){
      if(p.explosive){
        spawnExplosion(p.target.x,p.target.y,p.explosionRadius,p.color,p.dmg,p.owner,p.target);
        dealDamage(p.owner,p.target,p.dmg);
      } else {
        dealDamage(p.owner,p.target,p.dmg);
        spawnBurst(p.target.x,p.target.y,p.color,8,3);
      }
      // Throwing weapon on hit: return instantly
      if(p.isThrowWeapon&&p.owner){
        p.owner.throwWeapons[p.throwIdx].available=true;
        p.owner.throwWeapons[p.throwIdx].returnCD=0;
      }
      projectiles.splice(i,1);continue;
    }

    if(wallHit&&p.explosive){
      // PLS orbs explode even on walls
      const ex=clamp(p.x,ARENA.x,ARENA.x+ARENA.w);
      const ey=clamp(p.y,ARENA.y,ARENA.y+ARENA.h);
      spawnExplosion(ex,ey,p.explosionRadius,p.color,p.dmg*0.5,p.owner,p.target);
      // Check if target is in explosion radius
      if(p.target&&p.target.alive&&dist({x:ex,y:ey},p.target)<p.explosionRadius){
        dealDamage(p.owner,p.target,p.dmg*0.5);
      }
      // PLS+electric: wall hit = explode TWICE — second explosion immediately offset
      if(p.owner&&p.owner.elementActive&&p.owner.elem.id==='electric'&&p.owner.char.id==='pls'){
        const ex2=ex+(Math.random()-0.5)*25,ey2=ey+(Math.random()-0.5)*25;
        spawnExplosion(clamp(ex2,ARENA.x,ARENA.x+ARENA.w),clamp(ey2,ARENA.y,ARENA.y+ARENA.h),p.explosionRadius*0.8,'#ffcc00',p.dmg*0.3,p.owner,p.target);
        if(p.target&&p.target.alive&&dist({x:ex2,y:ey2},p.target)<p.explosionRadius*0.8){
          dealDamage(p.owner,p.target,p.dmg*0.3);
        }
        SFX.explode();
      }
      // PLS+fire: leave fire zone at wall
      if(p.owner&&p.owner.elementActive&&p.owner.elem.id==='fire'&&p.owner.char.id==='pls'){
        fireZones.push({x:ex,y:ey,radius:25,life:60,maxLife:60,owner:p.owner,dmg:p.owner.atk*0.2});
      }
      projectiles.splice(i,1);continue;
    }

    if(p.life<=0||wallHit){
      // Throwing weapon missed — embed on ground, start return cooldown
      if(p.isThrowWeapon&&p.owner){
        const tw=p.owner.throwWeapons[p.throwIdx];
        // Electric element: 15-30% chance auto-return
        if(p.owner.elementActive&&p.owner.elem.id==='electric'&&Math.random()<(0.15+getChaosLevel(p.owner)*0.03)){
          tw.available=true;tw.returnCD=0;
          spawnBurst(p.x,p.y,'#ffcc00',8,3);
          spawnDmgNum(p.x,p.y-15,'AUTO-RETURN','#ffcc00',false);
        } else if(wallHit&&tw.id==='agaou'){
          // Agaou wall explosion — explode only, don't embed
          const ex=clamp(p.x,ARENA.x,ARENA.x+ARENA.w),ey=clamp(p.y,ARENA.y,ARENA.y+ARENA.h);
          spawnExplosion(ex,ey,p.explosionRadius||60,p.color,p.dmg*0.4,p.owner,p.target);
          if(p.target&&p.target.alive&&dist({x:ex,y:ey},p.target)<(p.explosionRadius||60)){
            dealDamage(p.owner,p.target,p.dmg*0.4);
          }
          SFX.explode();
          // Agaou returns after wall explosion with normal miss cooldown
          const chaos=getChaosLevel(p.owner);
          const scaledCD=Math.max(tw.missCD*0.3,tw.missCD/(1+chaos*0.3));
          tw.returnCD=scaledCD;tw.available=false;
        } else {
          // Embed weapon on ground
          const ex=clamp(p.x,ARENA.x+5,ARENA.x+ARENA.w-5);
          const ey=clamp(p.y,ARENA.y+5,ARENA.y+ARENA.h-5);
          const chaos=getChaosLevel(p.owner);
          const scaledCD=Math.max(tw.missCD*0.3,tw.missCD/(1+chaos*0.3)); // faster returns at higher chaos
          p.owner.throwEmbedded.push({x:ex,y:ey,weaponIdx:p.throwIdx,active:true,life:scaledCD,color:tw.color});
          tw.returnCD=scaledCD;
          tw.available=false;
        }
      }
      projectiles.splice(i,1);
    }

    // Weapons don't deflect projectiles — only clash with other weapons
  }

  // Update explosions
  for(let i=explosions.length-1;i>=0;i--){
    const e=explosions[i];
    e.life-=dt;
    e.radius=lerp(0,e.maxRadius,1-e.life/e.maxLife);
    if(e.life<=0)explosions.splice(i,1);
  }

  // Update gorilla shockwave projectiles (directional, non-homing)
  for(let i=shockwaveProjectiles.length-1;i>=0;i--){
    const sw=shockwaveProjectiles[i];
    sw.x+=sw.vx*dt;sw.y+=sw.vy*dt;sw.life-=dt;
    // Visual trail
    spawnParticle(sw.x,sw.y,sw.color,(Math.random()-0.5)*2,(Math.random()-0.5)*2,12,sw.size/8);
    // Check hit on enemy
    if(!sw.hit&&sw.target&&sw.target.alive&&dist(sw,sw.target)<sw.target.radius+sw.size*0.5){
      sw.hit=true;
      dealDamage(sw.owner,sw.target,sw.dmg,false);
      // Push enemy to nearest wall
      const ex=sw.target.x,ey=sw.target.y;
      const dL=ex-ARENA.x,dR=ARENA.x+ARENA.w-ex,dT=ey-ARENA.y,dB=ARENA.y+ARENA.h-ey;
      const minD=Math.min(dL,dR,dT,dB);
      let wallX,wallY;
      if(minD===dL){sw.target.vx=-8;wallX=ARENA.x;wallY=ey;}
      else if(minD===dR){sw.target.vx=8;wallX=ARENA.x+ARENA.w;wallY=ey;}
      else if(minD===dT){sw.target.vy=-8;wallX=ex;wallY=ARENA.y;}
      else{sw.target.vy=8;wallX=ex;wallY=ARENA.y+ARENA.h;}
      // Wall crack at impact point
      spawnWallCrack(wallX,wallY,sw.owner);
      spawnBurst(sw.target.x,sw.target.y,'#ffaa00',15,6);
      shakeTimer=10;shakeAmt=8;
      SFX.thunderclap();
      shockwaveProjectiles.splice(i,1);continue;
    }
    // Check wall hit — crack on miss
    if(sw.x<ARENA.x||sw.x>ARENA.x+ARENA.w||sw.y<ARENA.y||sw.y>ARENA.y+ARENA.h){
      const wx=clamp(sw.x,ARENA.x,ARENA.x+ARENA.w);
      const wy=clamp(sw.y,ARENA.y,ARENA.y+ARENA.h);
      spawnWallCrack(wx,wy,sw.owner);
      spawnBurst(wx,wy,'#ffaa00',10,4);
      SFX.punch();
      shockwaveProjectiles.splice(i,1);continue;
    }
    if(sw.life<=0){shockwaveProjectiles.splice(i,1);}
  }

  // Update fire zones (PLS+fire lingering fire)
  for(let i=fireZones.length-1;i>=0;i--){
    const fz=fireZones[i];fz.life-=dt;
    if(fz.life<=0){fireZones.splice(i,1);continue;}
    // Damage enemy if inside zone
    [f1,f2].forEach(f=>{
      if(f.alive&&f!==fz.owner&&dist(f,fz)<fz.radius+f.radius&&battleTime%10<dt){
        f.hp-=fz.dmg;f.hitFlash=5;
        spawnParticle(f.x+rand(-8,8),f.y+rand(-8,8),'#ff4400',0,-1,10,2);
        spawnDmgNum(f.x,f.y-f.radius-10,fz.dmg,'#ff4400',false);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;battleOver=true;winner=fz.owner;SFX.ko();setTimeout(()=>SFX.victory(),500);}
      }
    });
    // Visual
    if(battleTime%4<dt)spawnParticle(fz.x+rand(-fz.radius/2,fz.radius/2),fz.y+rand(-fz.radius/2,fz.radius/2),pick(['#ff4400','#ff6600','#ffaa00']),0,-1,12,2);
  }

  // Update vulnerability zones (PLS+cryo)
  for(let i=vulnZones.length-1;i>=0;i--){
    const vz=vulnZones[i];vz.life-=dt;
    if(vz.life<=0){vulnZones.splice(i,1);continue;}
    // Enemies in zone take more damage (reduce def)
    [f1,f2].forEach(f=>{
      if(f.alive&&f!==vz.owner&&dist(f,vz)<vz.radius+f.radius){
        f.defReduction=Math.max(f.defReduction,6);f.defReductionTimer=Math.max(f.defReductionTimer,15);
      }
    });
  }

  // Update poison bubbles (gorilla+toxic)
  for(let i=poisonBubbles.length-1;i>=0;i--){
    const pb=poisonBubbles[i];pb.life-=dt;
    if(pb.life<=0){poisonBubbles.splice(i,1);continue;}
    // Follow target
    if(pb.target&&pb.target.alive){pb.x=pb.target.x;pb.y=pb.target.y;}
    // Wall collision = extra poison damage
    if(pb.target&&pb.target.alive){
      const t=pb.target;
      if(t.x-t.radius<=ARENA.x+2||t.x+t.radius>=ARENA.x+ARENA.w-2||t.y-t.radius<=ARENA.y+2||t.y+t.radius>=ARENA.y+ARENA.h-2){
        if(battleTime%15<dt){
          t.hp-=pb.dmg;t.hitFlash=5;
          spawnDmgNum(t.x,t.y-t.radius-15,pb.dmg,'#aa44cc',false);
          spawnBurst(t.x,t.y,'#aa44cc',5,2);
          if(t.hp<=0){t.hp=0;t.alive=false;t.deathAnim=60;battleOver=true;winner=pb.owner;SFX.ko();setTimeout(()=>SFX.victory(),500);}
        }
      }
    }
    // Visual
    if(battleTime%5<dt)spawnParticle(pb.x+rand(-12,12),pb.y+rand(-12,12),'#aa44cc',0,0.5,15,2);
  }

  // Monowire+toxic: release accumulated wrap damage when capture ends
  [f1,f2].forEach(f=>{
    if(f.monowireWrapDmgAccum>0&&f.captureTimer<=0){
      const dmg=f.monowireWrapDmgAccum;
      f.monowireWrapDmgAccum=0;
      f.hp-=dmg;f.hitFlash=8;
      spawnDmgNum(f.x,f.y-f.radius-20,dmg,'#aa44cc',true);
      spawnBurst(f.x,f.y,'#aa44cc',10,4);
      addLog((f.side===0?'P1':'P2')+' TOXIC RELEASE! '+Math.round(dmg));
      if(f.hp<=0){const enemy=f===f1?f2:f1;f.hp=0;f.alive=false;f.deathAnim=60;battleOver=true;winner=enemy;SFX.ko();setTimeout(()=>SFX.victory(),500);}
    }
  });

  // Gorilla+fire: wall collision damage
  [f1,f2].forEach(f=>{
    if(!f.alive)return;
    const enemy=f===f1?f2:f1;
    if(enemy.alive&&enemy.elementActive&&enemy.char.id==='gorilla'&&enemy.elem.id==='fire'){
      if(f.x-f.radius<=ARENA.x+2||f.x+f.radius>=ARENA.x+ARENA.w-2||f.y-f.radius<=ARENA.y+2||f.y+f.radius>=ARENA.y+ARENA.h-2){
        if(Math.hypot(f.vx,f.vy)>4&&battleTime%8<dt){
          const wallDmg=enemy.atk*0.5;
          f.hp-=wallDmg;f.hitFlash=5;
          spawnDmgNum(f.x,f.y-f.radius-10,wallDmg,'#ff4400',false);
          spawnBurst(f.x,f.y,'#ff4400',6,3);
          SFX.burn();
          if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;battleOver=true;winner=enemy;SFX.ko();setTimeout(()=>SFX.victory(),500);}
        }
      }
    }
  });

  // Decay miss chance over time
  [f1,f2].forEach(f=>{
    if(f.missChance>0)f.missChance=Math.max(0,f.missChance-0.001*dt);
    // Mantis+electric speed boost decay
    if(f._elecSpeedBoost>0){f._elecSpeedBoost-=dt;if(f._elecSpeedBoost<=0)f.speed=f.baseSpeed;}
  });

  // Update quickhack progress
  if(quickhackDisplay){
    quickhackDisplay.progress+=dt;
    if(quickhackDisplay.progress>=quickhackDisplay.maxProgress){
      triggerQuickhack(quickhackDisplay);
    }
  }

  // Quickhack screen flash
  if(quickhackFlashTimer>0){quickhackFlashTimer-=dt;if(quickhackFlashTimer<=0)quickhackDisplay=null;}
  // Wall crack decay + hazard damage
  for(let i=wallCracks.length-1;i>=0;i--){
    const wc=wallCracks[i];
    wc.life-=dt;
    if(wc.life<=0){wallCracks.splice(i,1);continue;}
    if(wc.dmgCooldown>0)wc.dmgCooldown-=dt;
    // Cracks damage enemies who walk over them
    if(wc.owner&&wc.dmgCooldown<=0){
      fighters.forEach(f=>{
        if(f.side===wc.owner.side||!f.alive)return;
        if(dist(f,wc)<wc.size*0.7){
          const crackDmg=wc.owner.atk*0.3;
          f.hp-=crackDmg;f.hitFlash=4;
          spawnDmgNum(f.x+rand(-10,10),f.y-f.radius-10,crackDmg,'#ffaa00',false);
          spawnParticle(f.x,f.y+f.radius,'#ffaa00',0,-2,10,2);
          f.slowTimer=Math.max(f.slowTimer,20);
          wc.dmgCooldown=25;
          if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;battleOver=true;winner=wc.owner;addLog((wc.owner.side===0?'P1':'P2')+' '+wc.owner.char.name+' WINS!');SFX.ko();setTimeout(()=>SFX.victory(),500);}
        }
      });
    }
  }

  // Relic text timer
  if(relicTextTimer>0)relicTextTimer-=dt;

  // Update fire trails (sandy+fire)
  for(let i=fireTrails.length-1;i>=0;i--){
    const ft=fireTrails[i];ft.life-=dt;
    if(ft.life<=0){fireTrails.splice(i,1);continue;}
    [f1,f2].forEach(f=>{
      if(f.alive&&f!==ft.owner&&dist(f,ft)<ft.radius+f.radius&&battleTime%8<dt){
        f.hp-=ft.dmg;f.hitFlash=5;
        spawnParticle(f.x+rand(-5,5),f.y+rand(-5,5),'#ff4400',0,-1,8,2);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;battleOver=true;winner=ft.owner;SFX.ko();setTimeout(()=>SFX.victory(),500);}
      }
    });
    if(battleTime%4<dt)spawnParticle(ft.x+rand(-ft.radius/2,ft.radius/2),ft.y+rand(-ft.radius/2,ft.radius/2),pick(['#ff4400','#ff6600','#ffaa00']),0,-0.5,10,2);
  }

  // Update sandy afterimages
  for(let i=sandyAfterimages.length-1;i>=0;i--){
    sandyAfterimages[i].life-=dt;
    if(sandyAfterimages[i].life<=0)sandyAfterimages.splice(i,1);
  }

  // Sandy+fire: fire trail during movement (non-special too if element active)
  [f1,f2].forEach(f=>{
    if(f.alive&&f.char.id==='sandy'&&f.elementActive&&f.elem.id==='fire'&&!f.sandyActive&&battleTime%6<1){
      fireTrails.push({x:f.x,y:f.y,life:30,maxLife:30,radius:10,owner:f,dmg:f.atk*0.1});
    }
  });

  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.96;p.vy*=0.96;p.life-=dt;if(p.life<=0)particles.splice(i,1);}
  // Damage numbers
  for(let i=dmgNums.length-1;i>=0;i--){const d=dmgNums[i];d.y+=d.vy;d.vy*=0.95;d.life-=dt;if(d.life<=0)dmgNums.splice(i,1);}
  if(shakeTimer>0)shakeTimer-=dt;
}

// ============================================================
// DRAWING — UTILITY
// ============================================================
function drawRoundRect(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath()}
function drawBtn(b){X.save();drawRoundRect(b.x,b.y,b.w,b.h,6);X.fillStyle=b.hover?b.color+'44':'#0a0a2a';X.fill();X.strokeStyle=b.color;X.lineWidth=b.hover?3:2;X.stroke();X.fillStyle=b.hover?'#fff':b.color;X.font='bold '+(b.h>40?'16':'13')+'px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';X.fillText(b.label,b.x+b.w/2,b.y+b.h/2);X.restore()}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}
function darken(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}

// ============================================================
// DRAWING — BALL / FIGHTER
// ============================================================
function drawBall(f){
  if(!f.alive&&f.deathAnim<=0)return;
  X.save();
  let alpha=f.alive?1:Math.max(0,f.deathAnim/60);
  // Optical Camo: nearly invisible
  if(f.throwCamoActive)alpha*=0.12;
  X.globalAlpha=alpha;

  // Shadow
  X.beginPath();X.ellipse(f.x,f.y+f.radius+8,f.radius*0.7,6,0,0,Math.PI*2);
  X.fillStyle='rgba(0,0,0,0.3)';X.fill();

  // Element aura
  if(f.elementActive){
    const pulse=Math.sin(battleTime*0.1)*0.3+0.7;
    X.beginPath();X.arc(f.x,f.y,f.radius+8+pulse*4,0,Math.PI*2);
    X.fillStyle=f.elem.color+'33';X.fill();
    X.strokeStyle=f.elem.color+'88';X.lineWidth=2;X.stroke();
    if(battleTime%3<1){
      switch(f.elem.id){
        case 'fire':for(let i=0;i<2;i++){const a=Math.random()*Math.PI*2;spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,pick(['#ff4400','#ff6600','#ffaa00']),Math.cos(a)*0.5,-1.5,15,3);}break;
        case 'electric':if(Math.random()<0.3){const a=Math.random()*Math.PI*2;spawnParticle(f.x+Math.cos(a)*(f.radius+5),f.y+Math.sin(a)*(f.radius+5),'#ffcc00',Math.cos(a)*2,Math.sin(a)*2,8,2);}break;
        case 'toxic':{const a=Math.random()*Math.PI*2;spawnParticle(f.x+Math.cos(a)*f.radius,f.y+f.radius,'#aa44cc',0,1,20,2);break;}
        case 'cryo':if(Math.random()<0.4){const a=Math.random()*Math.PI*2;spawnParticle(f.x+Math.cos(a)*(f.radius+3),f.y+Math.sin(a)*(f.radius+3),'#77ddff',Math.cos(a)*0.3,Math.sin(a)*0.3,20,2);}break;
      }
    }
  }

  // Element activation flash
  if(f.elementFlash>0){X.beginPath();X.arc(f.x,f.y,f.radius+20*(f.elementFlash/30),0,Math.PI*2);X.fillStyle=f.elem.color+(Math.floor(f.elementFlash/30*80).toString(16).padStart(2,'0'));X.fill();}

  // Capture/wrap visual — monowire wrapped around ball like real wire
  if(f.captureTimer>0){
    // Multiple wire strands wrapping tightly
    X.shadowColor='#ff8800';X.shadowBlur=8;
    for(let w=0;w<6;w++){
      const baseA=battleTime*0.03+w*Math.PI*2/6;
      const r=f.radius+2+Math.sin(w*1.7)*2;
      // Wire strand
      X.strokeStyle='rgba(255,160,40,0.8)';X.lineWidth=2;
      X.beginPath();X.arc(f.x,f.y,r,baseA,baseA+0.9);X.stroke();
      // Hot center of wire
      X.strokeStyle='rgba(255,240,180,0.5)';X.lineWidth=0.8;
      X.beginPath();X.arc(f.x,f.y,r,baseA+0.1,baseA+0.8);X.stroke();
    }
    X.shadowBlur=0;
    // Connected wire line to captor
    if(f._capturedBy&&f._capturedBy.alive){
      const cap=f._capturedBy;
      X.strokeStyle='rgba(255,140,30,0.4)';X.lineWidth=2;
      X.beginPath();X.moveTo(f.x,f.y);X.lineTo(cap.x,cap.y);X.stroke();
      X.strokeStyle='rgba(255,200,80,0.6)';X.lineWidth=1;
      X.beginPath();X.moveTo(f.x,f.y);X.lineTo(cap.x,cap.y);X.stroke();
    }
    // Constriction glow
    X.beginPath();X.arc(f.x,f.y,f.radius+5,0,Math.PI*2);
    X.fillStyle='rgba(255,140,30,0.1)';X.fill();
  }

  // Freeze visual
  if(f.freezeTimer>0){X.beginPath();X.arc(f.x,f.y,f.radius+4,0,Math.PI*2);X.fillStyle='rgba(119,221,255,0.4)';X.fill();X.strokeStyle='#77ddff';X.lineWidth=3;X.stroke();}

  // Stun stars
  if(f.stunTimer>0){const st=battleTime*0.3;for(let i=0;i<3;i++){const sa=st+i*Math.PI*2/3;X.fillStyle='#ffcc00';X.font='bold 12px Consolas,monospace';X.textAlign='center';X.fillText('*',f.x+Math.cos(sa)*20,f.y-f.radius-10+Math.sin(sa*2)*3);}}

  // Ball body
  const grad=X.createRadialGradient(f.x-f.radius*0.3,f.y-f.radius*0.3,f.radius*0.1,f.x,f.y,f.radius);
  let baseColor=f.char.color;
  if(f.hitFlash>0)baseColor='#ffffff';
  grad.addColorStop(0,lighten(baseColor,50));
  grad.addColorStop(0.6,baseColor);
  grad.addColorStop(1,darken(baseColor,40));
  X.beginPath();X.arc(f.x,f.y,f.radius,0,Math.PI*2);
  X.fillStyle=grad;X.fill();
  X.strokeStyle=darken(baseColor,20);X.lineWidth=2;X.stroke();

  // Spin lines
  X.save();
  X.beginPath();X.arc(f.x,f.y,f.radius,0,Math.PI*2);X.clip();
  X.strokeStyle='rgba(255,255,255,0.12)';X.lineWidth=1.5;
  for(let i=0;i<4;i++){
    const a=f.rotation+i*Math.PI/2;
    const lx=Math.cos(a)*f.radius*1.2;
    const ly=Math.sin(a)*f.radius*1.2;
    X.beginPath();X.moveTo(f.x+lx,f.y+ly);X.lineTo(f.x-lx,f.y-ly);X.stroke();
  }
  X.restore();

  // Shine highlight
  X.beginPath();X.arc(f.x-f.radius*0.25,f.y-f.radius*0.25,f.radius*0.2,0,Math.PI*2);
  X.fillStyle='rgba(255,255,255,0.35)';X.fill();

  // HP text in center
  X.font='bold 13px Consolas,monospace';X.textAlign='center';X.textBaseline='middle';
  X.strokeStyle='#000';X.lineWidth=3;
  X.strokeText(Math.ceil(f.hp),f.x,f.y);
  X.fillStyle='#fff';
  X.fillText(Math.ceil(f.hp),f.x,f.y);

  // Draw weapon (drawWeapon dispatches to drawSandy for Sandy's special effect)
  drawWeapon(f);

  // Bleed icon
  if(f.bleedIcon&&f.bleedTimer>0){
    const bx=f.x+f.radius+5,by=f.y-f.radius-5;
    X.font='bold 12px Consolas,monospace';X.fillStyle='#cc0000';X.textAlign='center';
    // Blood drop icon
    X.beginPath();X.moveTo(bx,by-6);X.quadraticCurveTo(bx+5,by,bx,by+4);X.quadraticCurveTo(bx-5,by,bx,by-6);X.closePath();
    X.fillStyle='#cc0000';X.fill();
  }

  // Special meter below ball
  const spW=f.radius*2.2,spH=4,spX=f.x-spW/2,spY=f.y+f.radius+10;
  const spR=f.specialBar/f.specialMax;
  X.fillStyle='#111';X.fillRect(spX,spY,spW,spH);
  X.fillStyle=spR>=1?'#ffcc00':'#7b68ee';X.fillRect(spX,spY,spW*spR,spH);
  X.strokeStyle='#333';X.lineWidth=0.5;X.strokeRect(spX,spY,spW,spH);
  if(spR>=1){X.font='bold 7px Consolas,monospace';X.fillStyle='#ffcc00';X.textAlign='center';X.fillText('RELIC',f.x,spY+spH+8);}

  // Character-specific scaling stats (Earclak style)
  const chaos=getChaosLevel(f);
  const statY=spY+spH+(spR>=1?17:8);
  X.font='bold 7px Consolas,monospace';X.textAlign='center';
  X.fillStyle=chaos>4?'#ff4444':chaos>2?'#ffaa00':'#aaa';
  switch(f.char.id){
    case 'mantis':{
      const spdVal=(f.baseSpeed*(1+chaos*0.1)).toFixed(1);
      const bleedPct=Math.round((0.10+chaos*0.02)*100);
      X.fillText('Spd:'+spdVal+' Bleed:'+bleedPct+'%',f.x,statY);
      break;}
    case 'gorilla':{
      const atkMult=Math.round((1+chaos*0.15)*100);
      const aoeR=Math.round(75+chaos*15);
      X.fillText('ATK:'+atkMult+'% AoE:'+aoeR,f.x,statY);
      break;}
    case 'monowire':{
      const capPct=Math.round((0.30+chaos*0.04)*100);
      const hackPct=Math.round(40);
      X.fillText('Cap:'+capPct+'% Hack:'+hackPct+'%',f.x,statY);
      break;}
    case 'pls':{
      const expR=Math.round(f.plsExplosionRadius+chaos*10);
      const dmgMult=Math.round((1+chaos*0.12)*100);
      X.fillText('Exp:'+expR+' DMG:'+dmgMult+'%',f.x,statY);
      break;}
    case 'sandy':{
      const minSpd=(f.baseSpeed*0.6).toFixed(1);
      const maxSpd=(f.baseSpeed*(1+chaos*0.15)).toFixed(1);
      const dodgePct=Math.round((f.dodgeChance+f.sandyDodgeBoost)*100);
      X.fillText('Spd:'+minSpd+'-'+maxSpd+' Dodge:'+dodgePct+'%',f.x,statY);
      break;}
  }

  // Burn visual
  if(f.burnTimer>0){for(let i=0;i<3;i++){const ba=battleTime*0.2+i*2;X.beginPath();X.arc(f.x+Math.cos(ba)*f.radius*0.6,f.y+Math.sin(ba)*f.radius*0.6-2,3,0,Math.PI*2);X.fillStyle='#ff4400';X.fill();}}

  X.restore();
}

// ============================================================
// DRAWING — WEAPONS (Cyberpunk cyberware)
// ============================================================
function drawWeapon(f){
  X.save();
  X.translate(f.x,f.y);
  X.rotate(f.weaponAngle);
  const r=f.radius;
  const ext=f.weaponExtend;
  const flash=f.weaponFlash>0;
  switch(f.char.id){
    case 'mantis':drawMantisBlades(r,ext,flash,f);break;
    case 'gorilla':drawGorillaArms(r,ext,flash,f);break;
    case 'monowire':drawMonowire(r,ext,flash,f);break;
    case 'pls':drawPLS(r,ext,flash,f);break;
    case 'sandy':drawSandy(r,ext,flash,f);break;
    case 'throw':drawThrowWeapon(r,ext,flash,f);break;
  }
  X.restore();
}

function drawMantisBlades(r,ext,flash,f){
  const bladeLen=55; // proportional to arena
  const extLen=18; // visible extension arm

  // === FOREARM HOUSING — dark chrome rectangular housing on the arm ===
  const hx=r-10, hw=28, hh=18;
  const hg=X.createLinearGradient(hx,-hh/2,hx,hh/2);
  hg.addColorStop(0,'#3a3a40');hg.addColorStop(0.3,'#252530');hg.addColorStop(0.7,'#252530');hg.addColorStop(1,'#3a3a40');
  X.fillStyle=hg;X.fillRect(hx,-hh/2,hw,hh);
  X.strokeStyle='#4a4a50';X.lineWidth=1;X.strokeRect(hx,-hh/2,hw,hh);
  // Panel seams
  X.strokeStyle='#333';X.lineWidth=0.6;
  for(let i=1;i<4;i++){X.beginPath();X.moveTo(hx+hw*i/4,-hh/2);X.lineTo(hx+hw*i/4,hh/2);X.stroke();}
  // Red LED strip on housing
  X.fillStyle=flash?'#ff4444':'#cc2222';
  X.fillRect(hx+2,-hh/2,hw-4,1.5);
  X.fillRect(hx+2,hh/2-1.5,hw-4,1.5);
  if(flash){X.shadowColor='#ff2020';X.shadowBlur=6;X.fillRect(hx+2,-hh/2,hw-4,1.5);X.fillRect(hx+2,hh/2-1.5,hw-4,1.5);X.shadowBlur=0;}
  // Ejection slots
  X.fillStyle='#0a0a0e';X.fillRect(hx+hw-3,-hh/2+2,3,5);X.fillRect(hx+hw-3,hh/2-7,3,5);

  // === EXTENSION MECHANISM — twin rails/pistons from housing to blade ===
  const ex0=hx+hw; // where extension starts
  [-1,1].forEach(dir=>{
    const ry=dir*5; // rail Y offset
    // Outer rail — dark metallic track
    X.fillStyle='#1e1e25';
    X.fillRect(ex0,ry-2.5,extLen,5);
    X.strokeStyle='#3a3a44';X.lineWidth=0.8;
    X.strokeRect(ex0,ry-2.5,extLen,5);
    // Piston rod sliding inside — chrome, extends with weapon
    const pistonExt=extLen*(0.3+ext*0.7);
    const pg=X.createLinearGradient(ex0,ry-1.5,ex0,ry+1.5);
    pg.addColorStop(0,'#888');pg.addColorStop(0.5,'#bbb');pg.addColorStop(1,'#777');
    X.fillStyle=pg;
    X.fillRect(ex0+2,ry-1.5,pistonExt,3);
    // Piston joint ring
    X.fillStyle='#555';X.fillRect(ex0+pistonExt-2,ry-3,4,6);
    X.strokeStyle='#666';X.lineWidth=0.5;X.strokeRect(ex0+pistonExt-2,ry-3,4,6);
  });
  // Center spine connecting rails
  X.fillStyle='#1a1a22';X.fillRect(ex0+extLen*0.3,-1.5,extLen*0.4,3);

  // === BLADE — single wide blade, side-profile, metallic silver/chrome ===
  const bx=ex0+extLen; // blade starts where extension ends
  // Blade back (straight-ish top edge)
  X.beginPath();
  X.moveTo(bx,-7);
  // Spine — slight upward curve then taper to sharp point
  X.lineTo(bx+bladeLen*0.15,-8);
  X.quadraticCurveTo(bx+bladeLen*0.4,-9,bx+bladeLen*0.6,-7);
  X.quadraticCurveTo(bx+bladeLen*0.85,-4,bx+bladeLen,-0.5);
  // Sharp tip
  X.lineTo(bx+bladeLen+2,0);
  // Belly — curved cutting edge (bottom)
  X.quadraticCurveTo(bx+bladeLen*0.85,4,bx+bladeLen*0.6,6);
  X.quadraticCurveTo(bx+bladeLen*0.35,7,bx+bladeLen*0.1,5);
  X.lineTo(bx,4);
  X.closePath();

  // Metallic chrome/silver gradient — NOT gold
  const bg=X.createLinearGradient(bx,-9,bx+bladeLen,0);
  bg.addColorStop(0,'#667');bg.addColorStop(0.1,'#99a');bg.addColorStop(0.3,'#ccd');
  bg.addColorStop(0.5,'#eef');bg.addColorStop(0.65,'#bbc');bg.addColorStop(0.85,'#889');bg.addColorStop(1,'#556');
  X.fillStyle=bg;X.fill();
  X.strokeStyle='#445';X.lineWidth=1;X.stroke();

  // Highlight along spine
  X.strokeStyle='rgba(220,230,255,0.6)';X.lineWidth=0.8;
  X.beginPath();X.moveTo(bx+2,-6.5);
  X.quadraticCurveTo(bx+bladeLen*0.4,-8.5,bx+bladeLen*0.7,-5);
  X.quadraticCurveTo(bx+bladeLen*0.9,-2,bx+bladeLen,-0.3);
  X.stroke();

  // Cutting edge glow — red/orange on inner edge
  X.strokeStyle=flash?'rgba(255,80,40,0.9)':'rgba(255,50,30,0.3)';
  X.lineWidth=flash?2.5:1.2;
  X.beginPath();X.moveTo(bx+3,4);
  X.quadraticCurveTo(bx+bladeLen*0.35,7,bx+bladeLen*0.7,4);
  X.quadraticCurveTo(bx+bladeLen*0.9,2,bx+bladeLen+1,0);
  X.stroke();
  if(flash){X.shadowColor='#ff4020';X.shadowBlur=8;X.stroke();X.shadowBlur=0;}

  // Blood groove / fuller — dark line along blade center
  X.strokeStyle='rgba(60,65,80,0.5)';X.lineWidth=0.7;
  X.beginPath();X.moveTo(bx+10,-1);
  X.quadraticCurveTo(bx+bladeLen*0.4,-2,bx+bladeLen*0.8,-1);
