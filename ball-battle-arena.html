    X.font='bold 12px Consolas,monospace';X.textAlign='center';X.fillStyle='#fff';
    X.fillText('BOSS: '+boss.char.name+' — '+Math.ceil(boss.hp)+'/'+boss.maxHp,W/2,barY+13);
    if(boss.elem.id!=='none'){X.font='bold 9px Consolas,monospace';X.fillStyle=boss.elementActive?boss.elem.color:boss.elem.color+'aa';X.fillText('['+boss.elem.name+']',W/2,barY-3);}
    // Boss relic bar
    const bspBarY=barY+barH+6,bspBarH=6;
    X.fillStyle='#111';X.fillRect(bossBx,bspBarY,bossBarW,bspBarH);
    const bsp=boss.specialBar/boss.specialMax;X.fillStyle=bsp>=1?'#ffcc00':'#7b68ee';X.fillRect(bossBx,bspBarY,bossBarW*bsp,bspBarH);
    X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(bossBx,bspBarY,bossBarW,bspBarH);
    if(bsp>=1){X.font='bold 7px Consolas,monospace';X.fillStyle='#fff';X.fillText('RELIC READY!',W/2,bspBarY+5);}
    // Team HP bars — side by side below boss (3 bars for 3v1)
    const tBarY=bspBarY+bspBarH+8;
    const tCount=team.length;
    const tGap=isMobile?6:10;
    const tBarW=isMobile?Math.floor((W-40-(tCount-1)*tGap)/tCount):Math.floor((W-100-(tCount-1)*tGap)/tCount);
    team.forEach((t,ti)=>{
      const tx=isMobile?20+ti*(tBarW+tGap):50+ti*(tBarW+tGap);
      X.fillStyle='#222';X.fillRect(tx,tBarY,tBarW,barH-2);
      const tr=Math.max(0,t.hp/t.maxHp);
      X.fillStyle=tr>0.6?'#44bb44':tr>0.3?'#ccaa00':'#cc3333';
      X.fillRect(tx,tBarY,tBarW*tr,barH-2);X.strokeStyle='#555';X.lineWidth=1;X.strokeRect(tx,tBarY,tBarW,barH-2);
      X.font='bold '+(isMobile?'8':'10')+'px Consolas,monospace';X.textAlign='left';X.fillStyle='#fff';X.fillText(Math.ceil(t.hp)+'/'+t.maxHp,tx+3,tBarY+11);
      X.fillStyle=t.char.color;X.fillText(t.char.name.length>(isMobile?7:14)?t.char.name.slice(0,isMobile?7:14):t.char.name,tx,tBarY-3);
      // Show element name on mobile
      if(t.elem.id!=='none'){X.font='bold '+(isMobile?'7':'9')+'px Consolas,monospace';X.textAlign='right';X.fillStyle=t.elementActive?t.elem.color:t.elem.color+'bb';X.fillText(t.elem.name,tx+tBarW,tBarY-3);X.textAlign='left';}
      if(!t.alive){X.globalAlpha=0.5;X.fillStyle='#ff0000';X.font='bold '+(isMobile?'8':'10')+'px Consolas,monospace';X.fillText('KO',tx+tBarW-16,tBarY+11);X.globalAlpha=1;}
    });
  } else {
    const barW=isMobile?150:300;
    const p1bx=isMobile?10:40;
    // P1 HP bar with damage decay
    drawHPBar(p1bx,barY,barW,barH,f1,false);
    X.font='bold 11px Consolas,monospace';X.textAlign='left';X.fillStyle='#fff';X.fillText(Math.ceil(f1.hp)+'/'+f1.maxHp,p1bx+4,barY+12);
    // P1 name + mini weapon icon
    X.fillStyle=f1.char.color;X.fillText(f1.char.name,p1bx,barY-3);
    if(f1.elem.id!=='none'){X.fillStyle=f1.elementActive?f1.elem.color:f1.elem.color+'aa';X.fillText('['+f1.elem.name+']',p1bx+barW-60,barY-3);}

    const p2bx=isMobile?W-10-barW:W-40-barW;
    // P2 HP bar with damage decay
    drawHPBar(p2bx,barY,barW,barH,f2,true);
    X.font='bold 11px Consolas,monospace';X.textAlign='right';X.fillStyle='#fff';X.fillText(Math.ceil(f2.hp)+'/'+f2.maxHp,p2bx+barW-4,barY+12);
    X.fillStyle=f2.char.color;X.fillText(f2.char.name,p2bx+barW,barY-3);
    if(f2.elem.id!=='none'){X.fillStyle=f2.elementActive?f2.elem.color:f2.elem.color+'aa';X.textAlign='left';X.fillText('['+f2.elem.name+']',p2bx,barY-3);}

    // Special bars top
    const spBarY=barY+barH+4,spBarH=8;
    X.fillStyle='#111';X.fillRect(p1bx,spBarY,barW,spBarH);
    const sp1=f1.specialBar/f1.specialMax;X.fillStyle=sp1>=1?'#ffcc00':'#7b68ee';X.fillRect(p1bx,spBarY,barW*sp1,spBarH);
    X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(p1bx,spBarY,barW,spBarH);
    if(sp1>=1){X.font='bold 8px Consolas,monospace';X.textAlign='left';X.fillStyle='#fff';X.fillText('RELIC READY!',p1bx+3,spBarY+7);}
    X.fillStyle='#111';X.fillRect(p2bx,spBarY,barW,spBarH);
    const sp2=f2.specialBar/f2.specialMax;X.fillStyle=sp2>=1?'#ffcc00':'#7b68ee';X.fillRect(p2bx+barW*(1-sp2),spBarY,barW*sp2,spBarH);
    X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(p2bx,spBarY,barW,spBarH);
    if(sp2>=1){X.font='bold 8px Consolas,monospace';X.textAlign='right';X.fillStyle='#fff';X.fillText('RELIC READY!',p2bx+barW-3,spBarY+7);}

    // Round indicator & win buffs
    if(roundNumber>1){
      X.font='bold 9px Consolas,monospace';X.textAlign='center';X.fillStyle='#666';
      X.fillText('R'+roundNumber+' | '+p1RoundWins+'-'+p2RoundWins,W/2,barY+6);
      if(p1WinBuffs.length>0){X.textAlign='left';X.fillStyle='#ffcc00cc';X.font='bold 9px Consolas,monospace';X.fillText(p1WinBuffs[p1WinBuffs.length-1].name+(p1WinBuffs.length>1?' x'+p1WinBuffs.length:''),p1bx,spBarY+spBarH+10);}
      if(p2WinBuffs.length>0){X.textAlign='right';X.fillStyle='#ffcc00cc';X.font='bold 9px Consolas,monospace';X.fillText(p2WinBuffs[p2WinBuffs.length-1].name+(p2WinBuffs.length>1?' x'+p2WinBuffs.length:''),p2bx+barW,spBarY+spBarH+10);}
    }
    // Sponsor bars (only show if char has a lore combo)
    const lbY=spBarY+spBarH+2,lbH=6;
    if(f1.selectedSponsor&&!f1.sponsorUsed){
      const lr1=f1.sponsorBar/f1.sponsorMax;
      const sc1=CHARS.find(c=>c.id===f1.selectedSponsor);
      const isLore1=!!findLoreCombo(f1.char.id)&&findLoreCombo(f1.char.id).pair.includes(f1.selectedSponsor);
      X.fillStyle='#0a0a0a';X.fillRect(p1bx,lbY,barW,lbH);
      const lbg1=X.createLinearGradient(p1bx,lbY,p1bx+barW*lr1,lbY);
      lbg1.addColorStop(0,'#664422');lbg1.addColorStop(1,lr1>=1?'#ff8800':'#885522');
      X.fillStyle=lbg1;X.fillRect(p1bx,lbY,barW*lr1,lbH);
      X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(p1bx,lbY,barW,lbH);
      if(lr1>=1){X.font='bold 8px Consolas,monospace';X.textAlign='left';X.fillStyle='#ff8800';X.fillText(isLore1?'LORE COMBO!':'SPONSOR!',p1bx+2,lbY+5.5);}
      else if(sc1){X.font='7px Consolas,monospace';X.textAlign='left';X.fillStyle='#886644';X.fillText((isLore1?'\u26D3':'')+sc1.name,p1bx+2,lbY+5);}
    }
    if(f2.selectedSponsor&&!f2.sponsorUsed){
      const lr2=f2.sponsorBar/f2.sponsorMax;
      const sc2=CHARS.find(c=>c.id===f2.selectedSponsor);
      const isLore2=!!findLoreCombo(f2.char.id)&&findLoreCombo(f2.char.id).pair.includes(f2.selectedSponsor);
      X.fillStyle='#0a0a0a';X.fillRect(p2bx,lbY,barW,lbH);
      const lbg2=X.createLinearGradient(p2bx+barW*(1-lr2),lbY,p2bx+barW,lbY);
      lbg2.addColorStop(0,lr2>=1?'#ff8800':'#885522');lbg2.addColorStop(1,'#664422');
      X.fillStyle=lbg2;X.fillRect(p2bx+barW*(1-lr2),lbY,barW*lr2,lbH);
      X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(p2bx,lbY,barW,lbH);
      if(lr2>=1){X.font='bold 8px Consolas,monospace';X.textAlign='right';X.fillStyle='#ff8800';X.fillText(isLore2?'LORE COMBO!':'SPONSOR!',p2bx+barW-2,lbY+5.5);}
      else if(sc2){X.font='7px Consolas,monospace';X.textAlign='right';X.fillStyle='#886644';X.fillText((isLore2?'\u26D3':'')+sc2.name,p2bx+barW-2,lbY+5);}
    }

    X.font='bold '+(isMobile?'12':'16')+'px Consolas,monospace';X.textAlign='center';X.fillStyle='#444';X.fillText('VS',W/2,barY+12);
  }

  // Speed controls
  const spdCtrlY=gameMode==='boss'?barY+66:barY+barH+16;
  const sbX=W/2-60;
  [{l:'1x',s:1},{l:'2x',s:2},{l:'3x',s:3}].forEach((sb,i)=>{
    addBtn('spd'+i,sbX+i*42,spdCtrlY,38,18,sb.l,battleSpeed===sb.s?'#ffcc00':'#555',()=>{battleSpeed=sb.s;});
  });

  // Info panel below arena
  const infoY=ARENA.y+ARENA.h+6,infoH=70;
  drawRoundRect(ARENA.x,infoY,ARENA.w,infoH,6);X.fillStyle='#0a0a20';X.fill();X.strokeStyle='#1a1a4a';X.lineWidth=1;X.stroke();
  if(gameMode==='boss'){
    // Boss mode info: show all fighters
    const infoW=(ARENA.w-20)/Math.min(fighters.length,4);
    fighters.forEach((f,fi)=>{
      drawFighterInfo(f,ARENA.x+10+fi*infoW,infoY+8,infoW-5,'left');
      if(fi<fighters.length-1){X.strokeStyle='#1a1a4a';X.beginPath();X.moveTo(ARENA.x+10+(fi+1)*infoW,infoY+5);X.lineTo(ARENA.x+10+(fi+1)*infoW,infoY+infoH-5);X.stroke();}
    });
  } else {
    X.strokeStyle='#1a1a4a';X.beginPath();X.moveTo(W/2,infoY+5);X.lineTo(W/2,infoY+infoH-5);X.stroke();
    drawFighterInfo(f1,ARENA.x+10,infoY+8,(ARENA.w-20)/2,'left');
    drawFighterInfo(f2,W/2+10,infoY+8,(ARENA.w-20)/2,'right');
  }

  // Battle log
  const logY=infoY+infoH+4;
  X.font='9px Consolas,monospace';X.textAlign='left';
  for(let i=0;i<Math.min(battleLog.length,isMobile?3:4);i++){
    X.fillStyle='rgba(200,200,200,'+(1-i*0.2)+')';X.fillText(battleLog[i],ARENA.x+8,logY+10+i*12);
  }

  // Victory overlay — CINEMATIC
  if(battleOver&&winner){
    if(Math.random()<0.4)spawnBurst(winner.x+rand(-40,40),winner.y+rand(-40,40),winner.char.color,4,5);
    if(Math.random()<0.15)spawnBurst(rand(ARENA.x,ARENA.x+ARENA.w),rand(ARENA.y,ARENA.y+ARENA.h),pick(['#ffcc00','#ffffff',winner.char.color]),6,4);
    X.save();
    // Full screen dark overlay
    X.fillStyle='rgba(0,0,0,0.55)';X.fillRect(0,0,W,H);
    // Cinematic letterbox bars
    const barH=isMobile?18:28;
    X.fillStyle='rgba(0,0,0,0.85)';X.fillRect(0,0,W,barH);X.fillRect(0,H-barH,W,barH);
    // Radial glow behind winner
    const rg=X.createRadialGradient(winner.x,winner.y,10,winner.x,winner.y,120);
    rg.addColorStop(0,winner.char.color+'44');rg.addColorStop(1,'transparent');
    X.fillStyle=rg;X.fillRect(0,0,W,H);
    // Winner text
    X.font='bold '+(isMobile?'28':'42')+'px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
    X.shadowColor=winner.char.color;X.shadowBlur=30;X.fillStyle=winner.char.color;
    X.fillText(winner.char.name+' WINS!',W/2,ARENA.y+ARENA.h/2-30);
    X.strokeStyle='#000';X.lineWidth=3;X.strokeText(winner.char.name+' WINS!',W/2,ARENA.y+ARENA.h/2-30);
    X.fillText(winner.char.name+' WINS!',W/2,ARENA.y+ARENA.h/2-30);
    // Tier labels — both winner and loser
    const winTier=getTierLetter(winner.char.id);
    const loser=fighters.find(f=>f!==winner);
    const loseTier=loser?getTierLetter(loser.char.id):'?';
    X.font='bold '+(isMobile?'13':'16')+'px Consolas,monospace';
    X.shadowBlur=10;X.fillStyle='#aaa';
    X.fillText('['+winTier+'] vs ['+loseTier+(loser?' '+loser.char.name:'')+']',W/2,ARENA.y+ARENA.h/2-5);
    X.shadowBlur=0;
    addBtn('result',W/2-80,ARENA.y+ARENA.h/2+20,160,40,'Continue','#7b68ee',()=>{screen='result';});
    X.restore();
  }
  buttons.forEach(drawBtn);
}

function drawFighterInfo(f,px,py,maxW,align){
  const isL=align==='left';
  drawMiniWeapon(px+(isL?8:maxW-8),py+6,f.char.id,14);
  const tierTag=getTierLetter(f.char.id);
  const tierTagCol=tierTag.startsWith('S')?'#ffcc00':tierTag.startsWith('A')?'#44cc88':tierTag.startsWith('B')?'#6688cc':'#888';
  X.font='bold 11px Consolas,monospace';X.textAlign=isL?'left':'right';X.fillStyle=f.char.color;
  X.fillText(f.char.name,px+(isL?20:maxW-20),py+10);
  // Tier tag
  X.font='bold 8px Consolas,monospace';X.fillStyle=tierTagCol;
  X.fillText('['+tierTag+']',px+(isL?20:maxW-20),py+20);

  // Status effects
  const ex=px+(isL?5:maxW-5),ey=py+26;
  const statuses=[];
  if(f.bleedTimer>0)statuses.push({t:'BLEED',c:'#cc0000'});
  if(f.captureTimer>0)statuses.push({t:'WRAPPED',c:'#00ddff'});
  if(f.burnTimer>0)statuses.push({t:'BURN',c:'#ff4400'});
  if(f.stunTimer>0)statuses.push({t:'STUN',c:'#ffcc00'});
  if(f.freezeTimer>0)statuses.push({t:'FROZEN',c:'#77ddff'});
  if(f.projectionFrozenTimer>0)statuses.push({t:'FRAME LOCK',c:'#00ffaa'});
  if(f.elementActive)statuses.push({t:f.elem.name,c:f.elem.color});

  X.font='bold 9px Consolas,monospace';X.textAlign=isL?'left':'right';
  statuses.forEach((s,i)=>{
    X.fillStyle=s.c;X.fillText(s.t,ex+(isL?i*50:-i*50),ey);
  });
  if(statuses.length===0){
    if(f.elem.id!=='none'){X.fillStyle='#666';X.fillText(f.elem.name+' @25%',ex,ey);}
    else{X.fillStyle='#555';X.fillText('No Element',ex,ey);}
  }

  // Character-specific scaling stats (Earclak style)
  const chaos=getChaosLevel(f);
  X.font='bold 11px Consolas,monospace';X.textAlign=isL?'left':'right';
  X.fillStyle=chaos>4?'#ff4444':chaos>2?'#ffaa00':chaos>0.5?'#888':'#444';
  let statLine='';
  switch(f.char.id){
    case 'mantis':statLine='Spd:'+(f.baseSpeed*(1+chaos*0.1)).toFixed(1)+' Bleed:'+Math.round((0.10+chaos*0.02)*100)+'%';break;
    case 'gorilla':statLine='ATK:'+Math.round((1+chaos*0.15)*100)+'% AoE:'+Math.round(75+chaos*15);break;
    case 'monowire':statLine='Cap:'+Math.round((0.30+chaos*0.04)*100)+'% Hack:40%';break;
    case 'pls':statLine='Exp:'+Math.round(f.plsExplosionRadius+chaos*10)+' DMG:'+Math.round((1+chaos*0.12)*100)+'%';break;
    case 'sandy':statLine='Spd:'+(f.baseSpeed*0.6).toFixed(1)+'-'+(f.baseSpeed*(1+chaos*0.15)).toFixed(1)+' Dodge:'+Math.round((f.dodgeChance+f.sandyDodgeBoost)*100)+'%';break;
    case 'throw':{const avl=f.throwWeapons.filter(tw=>tw.available).length;const cur=f.throwWeapons[f.throwActiveIdx];statLine=(cur?cur.name:'---')+' '+avl+'/3';break;}
    case 'katana':statLine=(f.katanaDeflecting>0?'DEFLECT! ':f.katanaDashing?'COUNTER ':f.katanaPostDashTimer>0?'80%RED ':'GUARD ')+'DEF:'+(f.katanaDeflectCount||0);break;
    case 'berserk':statLine='x'+Math.floor(6+chaos*0.8)+' Spread:'+Math.round(Math.max(15,60-chaos*4))+'%';break;
    case 'smasher':statLine='RKT:'+Math.round(f.atk*(1.8+chaos*0.2))+' BOSS';break;
    case 'gojo':statLine='INF:'+f.gojoInfinityCharges+'/'+f.gojoInfinityMax+(f.gojoAwakened?' AWK':' BOSS');break;
    case 'choso':{const mode=f.chosoBloodEdge?(f.chosoEdgeForm==='sword'?'SWORD':'DAGGER'):'BEAM';const orbs=f.chosoOrbs?f.chosoOrbs.filter(o=>o.alive).length:0;statLine=mode+(f.chosoRedScaleActive?' RDS':'')+(orbs>0?' Orb:'+orbs:'');break;}
    case 'toji':statLine=f.tojiStaffSection.toUpperCase()+(f.tojiTriActive?' TRI':'');break;
    case 'mechamaru':statLine='P'+f.mechaPhase+(f.mechaPhase===2?' ULT':'')+(f.mechaUltShield?' SHD':'')+(f.mechaPhase===3?' '+Math.ceil(f.mechaTrueFormTimer/60)+'s':'');break;
    case 'kashimo':statLine=(f.kashimoDartPhase!=='idle'?'DART ':'STAFF ')+(f.kashimoAmberUsed?'':'AMBER');break;
    case 'nanami':{const chaos=getChaosLevel(f);let cr=f.crit+chaos*1.5;if(f.nanamiOvertimeActive)cr=Math.min(90,cr+35);const cm=f.nanamiOvertimeActive?2.4:(f.elementActive&&f.elem.id==='electric'?1.4:1.8);statLine=(f.nanamiOvertimeActive?'OT ':'')+(f.nanamiIceShattered?'FIST ':'')+Math.round(cr)+'%cr '+cm.toFixed(1)+'x'+(f.nanamiCritStreak>=3?' x'+f.nanamiCritStreak:'');break;}
    case 'ryu':statLine='CANNON';break;
    case 'higuruma':statLine=f.higurumaNextSword?'SWORD READY':'HAMMER';break;
    case 'yuji':{const bf=f.yujiBlackFlashActive?'BF RUSH ':f.yujiIcePermanentBF?'PERM BF ':'';const ghosts=f.yujiGhostFists?f.yujiGhostFists.length:0;statLine=bf+'FIST'+(ghosts>0?' x'+ghosts:'');break;}
    case 'naoya':{const mode=f.naoyaFrameBurned?'BURNOUT':f.naoyaDashing?'DASH':f.naoyaSlowActive?'24F':'PROJ';const stk=f.naoyaFrameStack>0?' STK:'+f.naoyaFrameStack:'';statLine=mode+stk;break;}
    case 'yuta':{const cp=f.yutaCopiedTech?f.yutaCopiedTech.name+' '+Math.round(f.yutaCopiedTech.potency*100)+'%':'---';const dom=f.yutaDomainActive?'DOMAIN ':'';statLine=dom+'COPY:'+cp;break;}
    case 'todo':{const storm=f.todoSpecialActive?'STORM ':'';const stk=f.todoBuffStacks>0?'x'+f.todoBuffStacks:'';statLine=storm+'SWAP'+stk;break;}
    case 'yuki':{const bh=f.yukiBHActive?'BH ':'';const ovr=f.yukiOverloaded?'OVR ':'';statLine=bh+ovr+'Mass:'+Math.round(f.yukiMass||0);break;}
    case 'megumi':{const dom=f.megumiDomainActive?'DOMAIN ':'';const shiki=f.megumiActiveShikigami?(f.megumiActiveShikigami.toUpperCase()+' '):'';const dogs=f.megumiTotality?'TOT':(f.megumiDog1.alive&&f.megumiDog2.alive?'DD':(f.megumiDog1.alive||f.megumiDog2.alive?'D1':'--'));statLine=dom+shiki+dogs+' M:'+Math.floor(f.megumiShadowMeter);break;}
    case 'mahito':{const dom=f.mahitoDomainActive?'DOMAIN ':'';const isb=f.mahitoPassiveTriggered?'ISB ':'';statLine=dom+isb+'Hits:'+f.mahitoHitCount+'/5';break;}
  }
  X.fillText(statLine,px+(isL?5:maxW-5),py+42);

  // Relic status
  X.font='9px Consolas,monospace';X.fillStyle=f.specialActive?'#ffcc00':'#7b68ee';
  X.fillText(f.specialActive?'>> RELIC ACTIVE':'Relic: '+(f.specialBar>=f.specialMax?'READY':Math.floor(f.specialBar/f.specialMax*100)+'%'),px+(isL?5:maxW-5),py+56);
}

// ============================================================
function drawBossSelect(){
  clearBtns();X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);

  // Page indicator dots + arrows (all pages)
  const dotY=isMobile?H-16:H-20;
  for(let p=1;p<=3;p++){
    const dx=W/2+(p-2)*20;
    X.beginPath();X.arc(dx,dotY,_bossSelPage===p?5:3,0,Math.PI*2);
    X.fillStyle=_bossSelPage===p?'#4488ff':'#444';X.fill();
  }
  // Always-visible arrow navigation
  const arrowY=isMobile?H-48:H-55;
  const arrowH=isMobile?32:38;
  if(_bossSelPage>1)addBtn('bossArrowL',10,arrowY,isMobile?50:70,arrowH,'← Back','#666',()=>{_bossSelPage--;});
  if(_bossSelPage<3)addBtn('bossArrowR',W-(isMobile?60:80),arrowY,isMobile?50:70,arrowH,'Next →','#4488ff',()=>{_bossSelPage++;});
  addBtn('bossHome',isMobile?65:85,arrowY,isMobile?40:50,arrowH,'Title','#555',()=>{screen='title';});

  if(_bossSelPage===1){
    // ===== PAGE 1: PICK YOUR TEAM (characters only) =====
    X.font='bold '+(isMobile?'16':'22')+'px Consolas,Courier New,monospace';
    X.textAlign='center';X.fillStyle='#cc4444';
    X.fillText('BOSS FIGHT — PICK YOUR TEAM (1/3)',W/2,isMobile?22:28);
    const selectableChars=CHARS.filter(c=>!c.isBoss);
    const gapX=isMobile?5:10,gapY=isMobile?5:6,padX=isMobile?5:15;
    const availW=W-padX*2;
    const n=selectableChars.length;
    const maxCols=Math.floor((availW+gapX)/((isMobile?120:115)+gapX));
    const cols=Math.min(n,Math.max(2,Math.min(maxCols,Math.ceil(Math.sqrt(n)))));
    const rows=Math.ceil(n/cols);
    const cardW=Math.floor((availW-(cols-1)*gapX)/cols);
    const bottomSpace=isMobile?70:85;
    const cardH=Math.min(Math.floor(((H-50-bottomSpace)-(rows-1)*gapY)/rows),isMobile?90:130);
    const totalW=cols*cardW+(cols-1)*gapX;
    const startX=(W-totalW)/2;
    const gridStartY=isMobile?32:40;
    X.font='bold '+(isMobile?'9':'11')+'px Consolas,monospace';X.textAlign='center';
    X.fillStyle='#4488ff';X.fillText('Tap to assign: T1 (blue) / T2 (green) / T3 (orange)',W/2,gridStartY);
    const charGridY=gridStartY+8;
    selectableChars.forEach((ch,i)=>{
      const origIdx=CHARS.indexOf(ch);
      const row=Math.floor(i/cols),col=i%cols;
      const cx=startX+col*(cardW+gapX),cy=charGridY+row*(cardH+gapY);
      const isT1=teamChar1===origIdx,isT2=teamChar2===origIdx,isT3=teamChar3===origIdx;
      drawRoundRect(cx,cy,cardW,cardH,isMobile?5:8);
      X.fillStyle=isT1?'#112244':isT2?'#113322':isT3?'#221a11':'#111128';X.fill();
      X.strokeStyle=isT1?'#4488ff':isT2?'#33cc66':isT3?'#ff8833':ch.color+'66';X.lineWidth=isT1||isT2||isT3?3:1.5;X.stroke();
      if(isT1){X.font='bold '+(isMobile?'9':'10')+'px Consolas,monospace';X.fillStyle='#4488ff';X.textAlign='left';X.fillText('T1',cx+5,cy+14);}
      if(isT2){X.font='bold '+(isMobile?'9':'10')+'px Consolas,monospace';X.fillStyle='#33cc66';X.textAlign='center';X.fillText('T2',cx+cardW/2,cy+14);}
      if(isT3){X.font='bold '+(isMobile?'9':'10')+'px Consolas,monospace';X.fillStyle='#ff8833';X.textAlign='right';X.fillText('T3',cx+cardW-5,cy+14);}
      const compact=cardH<80;
      const ballR=isMobile?(compact?9:12):(cardH>120?22:16);
      drawBallPreview(cx+cardW/2,cy+(isMobile?(compact?20:28):cardH>120?35:28),ballR,ch);
      X.font='bold '+(isMobile?(compact?'8':'9'):'10')+'px Consolas,monospace';X.textAlign='center';X.fillStyle='#fff';
      X.fillText(ch.name,cx+cardW/2,cy+(isMobile?(compact?34:46):cardH>120?62:50));
      X.font=(isMobile?'7':'9')+'px Consolas,monospace';X.fillStyle=ch.color;
      X.fillText(ch.playstyle,cx+cardW/2,cy+(isMobile?(compact?44:56):cardH>120?74:60));
      if(!isMobile&&cardH>70){
        X.font='8px Consolas,monospace';X.textAlign='left';X.fillStyle='#888';
        X.fillText('HP:'+ch.stats.hp+' ATK:'+ch.stats.atk+' SPD:'+ch.stats.speed.toFixed(1),cx+8,cy+(cardH>120?90:74));
      }
      addBtn('bsel_'+i,cx,cy,cardW,cardH,'','transparent',()=>{
        if(origIdx===teamChar1||origIdx===teamChar2||origIdx===teamChar3)return;
        if(!_bossSelSlot)_bossSelSlot=1;
        if(_bossSelSlot===1){teamChar1=origIdx;_bossSelSlot=2;}
        else if(_bossSelSlot===2){teamChar2=origIdx;_bossSelSlot=3;}
        else{teamChar3=origIdx;_bossSelSlot=1;}
      });
    });

  } else if(_bossSelPage===2){
    // ===== PAGE 2: SELECT BOSS =====
    X.font='bold '+(isMobile?'16':'22')+'px Consolas,Courier New,monospace';
    X.textAlign='center';X.fillStyle='#cc4444';
    X.fillText('SELECT BOSS (2/3)',W/2,isMobile?22:28);
    // Show team summary at top
    let sumY=isMobile?38:45;
    X.font='bold '+(isMobile?'9':'11')+'px Consolas,monospace';X.textAlign='center';X.fillStyle='#aaa';
    X.fillText('YOUR TEAM: '+CHARS[teamChar1].name+' / '+CHARS[teamChar2].name+' / '+CHARS[teamChar3].name,W/2,sumY);
    sumY+=isMobile?16:22;
    // Boss cards — large, detailed
    const bosses=CHARS.filter(c=>c.isBoss);
    const bCardW=isMobile?Math.min(W-40,300):320;
    const bCardH=isMobile?80:100;
    const bGap=isMobile?10:15;
    const bTotalH=bosses.length*bCardH+(bosses.length-1)*bGap;
    const bStartY=sumY;
    bosses.forEach((bch,bi)=>{
      const bIdx=CHARS.indexOf(bch);
      const bx=(W-bCardW)/2;
      const by=bStartY+bi*(bCardH+bGap);
      const isSel=bossChar===bIdx;
      drawRoundRect(bx,by,bCardW,bCardH,8);
      X.fillStyle=isSel?'#1a0a1a':'#111128';X.fill();
      X.strokeStyle=isSel?bch.color:'#333';X.lineWidth=isSel?3:1.5;X.stroke();
      if(isSel){X.shadowColor=bch.color;X.shadowBlur=10;X.stroke();X.shadowBlur=0;}
      // Large ball preview
      const ballR=isMobile?16:22;
      drawBallPreview(bx+ballR+15,by+bCardH/2,ballR,bch);
      // Boss info
      const infoX=bx+ballR*2+30;
      X.font='bold '+(isMobile?'12':'14')+'px Consolas,monospace';X.textAlign='left';X.fillStyle='#fff';
      X.fillText(bch.name,infoX,by+(isMobile?22:28));
      const tierTag=typeof getTierLetter==='function'?getTierLetter(bch.id):'S';
      X.font='bold '+(isMobile?'9':'10')+'px Consolas,monospace';X.fillStyle=tierTag.startsWith('S')?'#ffcc00':'#ff8844';
      X.fillText('['+tierTag+']',infoX+X.measureText(bch.name).width+8,by+(isMobile?22:28));
      X.font=(isMobile?'9':'10')+'px Consolas,monospace';X.fillStyle=bch.color;
      X.fillText(bch.playstyle,infoX,by+(isMobile?36:44));
      X.font=(isMobile?'8':'9')+'px Consolas,monospace';X.fillStyle='#888';
      X.fillText('HP:'+bch.stats.hp+' ATK:'+bch.stats.atk+' SPD:'+bch.stats.speed.toFixed(1)+' DEF:'+bch.stats.def,infoX,by+(isMobile?50:58));
      X.fillText('RNG:'+bch.stats.range+' CRIT:'+bch.stats.crit+'%',infoX,by+(isMobile?62:72));
      if(isSel){
        X.font='bold '+(isMobile?'10':'12')+'px Consolas,monospace';X.fillStyle='#cc4444';
        X.textAlign='right';X.fillText('SELECTED',bx+bCardW-10,by+(isMobile?22:28));X.textAlign='left';
      }
      addBtn('boss_sel_'+bi,bx,by,bCardW,bCardH,'','transparent',()=>{bossChar=bIdx;});
    });

  } else {
    // ===== PAGE 3: ELEMENTS =====
    X.font='bold '+(isMobile?'16':'22')+'px Consolas,Courier New,monospace';
    X.textAlign='center';X.fillStyle='#cc4444';
    X.fillText('PICK ELEMENTS (3/3)',W/2,isMobile?22:28);
    // Show selected team + boss summary at top
    let sumY=isMobile?38:46;
    X.font='bold '+(isMobile?'9':'11')+'px Consolas,monospace';X.textAlign='center';
    X.fillStyle='#aaa';X.fillText('YOUR TEAM vs '+CHARS[bossChar].name.toUpperCase(),W/2,sumY);
    sumY+=isMobile?14:18;
    const teamLabels=[{idx:teamChar1,c:'#4488ff',l:'T1'},{idx:teamChar2,c:'#33cc66',l:'T2'},{idx:teamChar3,c:'#ff8833',l:'T3'}];
    const sumCardW=isMobile?Math.floor((W-30)/3):150;
    const sumTotalW=3*sumCardW+20;
    const sumStartX=(W-sumTotalW)/2;
    teamLabels.forEach((t,ti)=>{
      const sx=sumStartX+ti*(sumCardW+10);
      const ch=CHARS[t.idx];
      drawRoundRect(sx,sumY,sumCardW,isMobile?36:42,5);
      X.fillStyle='#111128';X.fill();
      X.strokeStyle=t.c;X.lineWidth=2;X.stroke();
      const ballR=isMobile?7:9;
      drawBallPreview(sx+ballR+6,sumY+(isMobile?18:21),ballR,ch);
      X.font='bold '+(isMobile?'8':'9')+'px Consolas,monospace';X.textAlign='left';
      X.fillStyle=t.c;X.fillText(t.l,sx+ballR*2+12,sumY+(isMobile?13:15));
      X.fillStyle='#fff';X.fillText(ch.name.length>12?ch.name.slice(0,11)+'…':ch.name,sx+ballR*2+12,sumY+(isMobile?26:30));
    });
    sumY+=isMobile?44:52;

    // Element pickers
    if(isMobile){
      const elemRows=[
        {label:'T1 ELEMENT',color:'#4488ff',sel:teamElem1,pfx:'be1',cb:(i)=>{teamElem1=i;},char:CHARS[teamChar1]},
        {label:'T2 ELEMENT',color:'#33cc66',sel:teamElem2,pfx:'be2',cb:(i)=>{teamElem2=i;},char:CHARS[teamChar2]},
        {label:'T3 ELEMENT',color:'#ff8833',sel:teamElem3,pfx:'be3',cb:(i)=>{teamElem3=i;},char:CHARS[teamChar3]},
        {label:'BOSS ELEMENT',color:'#cc4444',sel:bossElem,pfx:'beb',cb:(i)=>{bossElem=i;},char:CHARS[bossChar]},
      ];
      elemRows.forEach((er,ri)=>{
        const ey=sumY+ri*55;
        X.font='bold 9px Consolas,monospace';X.textAlign='left';
        X.fillStyle=er.color;
        X.fillText(er.label+' ('+er.char.name+')',10,ey);
        const pickerW=5*(37+3)-3;
        const pickerX=Math.floor((W-pickerW)/2);
        drawElementPickerMobile(pickerX,ey+6,er.sel,er.pfx,er.cb);
        const selElem=ELEMENTS[er.sel];
        if(selElem&&selElem.id!=='none'){
          const key=er.char.id+'_'+selElem.id;
          const desc=COMBO_EFFECTS[key]||'';
          if(desc){X.font='8px Consolas,monospace';X.textAlign='center';X.fillStyle=selElem.color+'cc';X.fillText(desc,W/2,ey+44);}
        }
      });
    } else {
      X.font='bold 12px Consolas,monospace';X.textAlign='center';
      const eColW=Math.floor(W/3)-10;
      X.fillStyle='#4488ff';X.fillText('T1 ELEM ('+CHARS[teamChar1].name+')',eColW/2+5,sumY);
      X.fillStyle='#33cc66';X.fillText('T2 ELEM ('+CHARS[teamChar2].name+')',W/2,sumY);
      X.fillStyle='#ff8833';X.fillText('T3 ELEM ('+CHARS[teamChar3].name+')',W-eColW/2-5,sumY);
      drawElementPicker(5,sumY+8,teamElem1,'be1',(i)=>{teamElem1=i;});
      drawElementPicker(W/3+5,sumY+8,teamElem2,'be2',(i)=>{teamElem2=i;});
      drawElementPicker(W*2/3+5,sumY+8,teamElem3,'be3',(i)=>{teamElem3=i;});
      sumY+=58;
      const teamElems=[{idx:teamChar1,sel:teamElem1,c:'#4488ff'},{idx:teamChar2,sel:teamElem2,c:'#33cc66'},{idx:teamChar3,sel:teamElem3,c:'#ff8833'}];
      X.font='10px Consolas,monospace';
      teamElems.forEach((te,ti)=>{
        const selElem=ELEMENTS[te.sel];
        if(selElem&&selElem.id!=='none'){
          const key=CHARS[te.idx].id+'_'+selElem.id;
          const desc=COMBO_EFFECTS[key]||'';
          if(desc){X.textAlign='center';X.fillStyle=selElem.color+'cc';X.fillText(desc,eColW/2+5+ti*(W/3),sumY);}
        }
      });
      sumY+=20;
      X.font='bold 12px Consolas,monospace';
      X.fillStyle='#cc4444';X.textAlign='center';X.fillText('BOSS ELEMENT ('+CHARS[bossChar].name+')',W/2,sumY);
      drawElementPicker(W/2-130,sumY+8,bossElem,'beb',(i)=>{bossElem=i;});
      sumY+=58;
      const bossEl=ELEMENTS[bossElem];
      if(bossEl&&bossEl.id!=='none'){
        const bKey=CHARS[bossChar].id+'_'+bossEl.id;
        const bDesc=COMBO_EFFECTS[bKey]||'';
        if(bDesc){X.font='10px Consolas,monospace';X.textAlign='center';X.fillStyle=bossEl.color+'cc';X.fillText(bDesc,W/2,sumY);}
      }
    }
    // Sponsor pickers removed for boss mode
    // FIGHT button on page 3
    const fightY=isMobile?H-85:H-100;
    addBtn('bossBattle',W/2-100,fightY,200,isMobile?34:42,'FIGHT BOSS!','#cc4444',startBattle);
  }
  buttons.forEach(b=>{
    if(b.id.startsWith('bsel_'))return;
    drawBtn(b);
  });
}

function drawResult(){
  clearBtns();X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  if(!winner)return;
  const cy=isMobile?60:80;
  // Title: VICTORY or DEFEAT
  const isDefeat=wasDefeat;
  const titleText=isDefeat?'DEFEAT':'VICTORY';
  const titleColor=isDefeat?'#cc4444':winner.char.color;
  X.font='bold '+(isMobile?'22':'32')+'px Consolas,Courier New,monospace';X.textAlign='center';
  X.shadowColor=titleColor;X.shadowBlur=15;X.fillStyle=titleColor;X.fillText(titleText,W/2,cy);X.shadowBlur=0;
  // Player label (P1/P2 or TEAM/BOSS)
  const winLabel=gameMode==='boss'?(winner.char.isBoss?'BOSS':'TEAM'):(winner.side===0?'P1':'P2');
  X.font='bold '+(isMobile?'12':'14')+'px Consolas,monospace';X.fillStyle='#aaa';
  X.fillText(winLabel+' WINS',W/2,cy+22);
  if(isDefeat){X.font=(isMobile?'11':'13')+'px Consolas,monospace';X.fillStyle='#888';X.fillText('Defeated by '+winner.char.name,W/2,cy+38);}

  const bx=W/2,by=cy+(isDefeat?90:70);
  const g=X.createRadialGradient(bx-10,by-10,5,bx,by,40);
  g.addColorStop(0,lighten(winner.char.color,50));g.addColorStop(1,winner.char.color);
  X.beginPath();X.arc(bx,by,40,0,Math.PI*2);X.fillStyle=g;X.fill();
  X.strokeStyle=darken(winner.char.color,20);X.lineWidth=3;X.stroke();
  X.beginPath();X.arc(bx-12,by-12,8,0,Math.PI*2);X.fillStyle='rgba(255,255,255,0.3)';X.fill();
  drawMiniWeapon(bx+38,by,winner.char.id,24);
  if(!isDefeat){
    // Crown for winner
    X.fillStyle='#ffcc00';X.beginPath();
    X.moveTo(bx-15,by-42);X.lineTo(bx-10,by-34);X.lineTo(bx-5,by-44);X.lineTo(bx,by-34);X.lineTo(bx+5,by-44);X.lineTo(bx+10,by-34);X.lineTo(bx+15,by-42);X.lineTo(bx+15,by-30);X.lineTo(bx-15,by-30);
    X.closePath();X.fill();
  }

  X.font='bold '+(isMobile?'16':'20')+'px Consolas,monospace';X.fillStyle='#fff';X.textAlign='center';X.fillText(winner.char.name,W/2,by+60);
  if(winner.elem.id!=='none'){X.font='13px Consolas,monospace';X.fillStyle=winner.elem.color;X.fillText(winner.elem.name+' Element',W/2,by+80);}
  // Winner voiceline quote
  const vl=VOICELINES[winner.char.id];
  if(vl){const vtype=isDefeat?'defeat':'victory';const varr=vl[vtype];if(varr&&varr.length>0){
    if(!winner._resultVoiceline)winner._resultVoiceline=varr[Math.floor(Math.random()*varr.length)];
    X.font='italic '+(isMobile?'9':'12')+'px Consolas,monospace';X.fillStyle=winner.char.color;X.globalAlpha=0.8;
    X.fillText('"'+winner._resultVoiceline+'"',W/2,by+(winner.elem.id!=='none'?90:82));X.globalAlpha=1;
  }}
  // Round score & win buff preview
  X.font='bold 12px Consolas,monospace';X.fillStyle='#7b68ee';X.textAlign='center';
  X.fillText('Round '+roundNumber+'  |  P1: '+p1RoundWins+'  P2: '+p2RoundWins,W/2,by+95);
  // Win buff display removed (win buffs disabled for regular play)

  const statsY=by+140;
  X.font='bold 14px Consolas,monospace';X.fillStyle='#7b68ee';X.textAlign='center';X.fillText('BATTLE STATS',W/2,statsY);
  X.font='12px Consolas,monospace';
  const f1=fighters[0],f2=fighters[1];
  const sl=[['','P1 '+f1.char.name,'P2 '+f2.char.name],['Hits',battleStats.p1Hits,battleStats.p2Hits],['Damage',Math.round(battleStats.p1Dmg),Math.round(battleStats.p2Dmg)],['Crits',battleStats.p1Crits,battleStats.p2Crits],['HP Left',Math.max(0,Math.ceil(f1.hp)),Math.max(0,Math.ceil(f2.hp))]];
  const colW=isMobile?120:160;
  sl.forEach((line,i)=>{const sy=statsY+18+i*20;X.textAlign='right';X.fillStyle='#888';X.fillText(line[0],W/2-10,sy);X.textAlign='center';X.fillStyle=i===0?f1.char.color:'#ccc';X.fillText(''+line[1],W/2-10-colW/2,sy);X.fillStyle=i===0?f2.char.color:'#ccc';X.fillText(''+line[2],W/2+10+colW/2,sy);});
  X.font='11px Consolas,monospace';X.fillStyle='#666';X.textAlign='center';X.fillText('Duration: '+(battleRealFrames/60).toFixed(1)+'s',W/2,statsY+125);

  const btnY=statsY+150,btnW=isMobile?140:160;
  addBtn('rematch',W/2-btnW-10,btnY,btnW,42,'Rematch','#ff4444',()=>{
    // Track round win and record personalized buff
    if(winner){
      const wSide=winner.side;
      if(wSide===0){p1RoundWins++;}
      else{p2RoundWins++;}
    }
    roundNumber++;
    startBattle();
  });
  addBtn('newbattle',W/2+10,btnY,btnW,42,'New Battle','#7b68ee',()=>{p1RoundWins=0;p2RoundWins=0;roundNumber=1;p1WinBuffs=[];p2WinBuffs=[];p1Sponsor=-1;p2Sponsor=-1;teamSponsor1=-1;teamSponsor2=-1;teamSponsor3=-1;_1v1SelPage=1;selectPage=0;selectTierPage=0;screen=gameMode==='boss'?'bossSelect':'select';});
  addBtn('titleback',W/2-60,btnY+55,120,35,'Title','#555',()=>{p1RoundWins=0;p2RoundWins=0;roundNumber=1;p1WinBuffs=[];p2WinBuffs=[];screen='title';});
  buttons.forEach(drawBtn);
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime=0;
const STEP_MS=1000/60; // fixed 60fps timestep
let battleAccum=0;
function loop(time){
  const elapsed=lastTime>0?Math.min(time-lastTime,100):STEP_MS;
  lastTime=time;
  const dpr=window.devicePixelRatio||1;X.setTransform(dpr,0,0,dpr,0,0);X.save();X.scale(sc,sc);
  switch(screen){
    case 'title':drawTitle();break;
    case 'select':try{drawSelect();}catch(e){console.error('BBA select error:',e);}break;
    case 'bossSelect':drawBossSelect();break;
    case 'battle':
      try{
      battleAccum+=elapsed;
      while(battleAccum>=STEP_MS){
        if(hitFreezeTimer>0){hitFreezeTimer--;} else {for(let i=0;i<battleSpeed;i++)updateBattle(1);}
        battleRealFrames++;
        Object.keys(comboCounter).forEach(s=>{if(comboCounter[s].timer>0){comboCounter[s].timer--;if(comboCounter[s].timer<=0)comboCounter[s].count=0;}});
        for(let i=damageBarDecay.length-1;i>=0;i--){damageBarDecay[i].timer--;if(damageBarDecay[i].timer<=0)damageBarDecay.splice(i,1);}
        if(screenFlashTimer>0)screenFlashTimer--;
        battleAccum-=STEP_MS;
      }
      drawBattle();
      }catch(err){console.error('BBA battle error:',err);}
      break;
    case 'result':drawResult();break;
  }
  X.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lastTime=t;loop(t);});

</script>
