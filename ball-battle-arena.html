function drawRyuWeapon(r,ext,flash,f){
  // Pompadour hair cannon — Ryu's hair IS the weapon
  // Thick pompadour shape that shoots from the tip
  const hairLen=42;
  // Hair base (thick, brown)
  const hg=X.createLinearGradient(r-4,-12,r+hairLen,0);
  hg.addColorStop(0,'#8b5a2b');hg.addColorStop(0.4,'#a0653a');hg.addColorStop(0.8,'#7a4420');hg.addColorStop(1,'#5c3015');
  X.beginPath();
  X.moveTo(r-4,-14);
  X.bezierCurveTo(r+10,-18,r+25,-16,r+hairLen,-6);
  X.lineTo(r+hairLen+4,0);
  X.lineTo(r+hairLen,-2);
  X.bezierCurveTo(r+25,14,r+10,12,r-4,10);
  X.closePath();
  X.fillStyle=hg;X.fill();
  X.strokeStyle='#5c3015';X.lineWidth=1.5;X.stroke();
  // Hair volume lines (strands)
  X.strokeStyle='rgba(92,48,21,0.4)';X.lineWidth=0.8;
  for(let i=0;i<4;i++){
    const t=(i+1)/5;
    X.beginPath();
    X.moveTo(r-4+t*hairLen,-12+t*4);
    X.quadraticCurveTo(r+t*hairLen+5,-8+t*6,r+t*hairLen+8,-2+t*2);
    X.stroke();
  }
  // Hair shine streak
  X.fillStyle='rgba(210,160,100,0.3)';
  X.beginPath();
  X.moveTo(r+5,-12);X.quadraticCurveTo(r+20,-14,r+35,-8);
  X.lineTo(r+35,-6);X.quadraticCurveTo(r+20,-10,r+5,-8);
  X.closePath();X.fill();
  // Energy tip (where blasts come from)
  X.beginPath();X.arc(r+hairLen+2,0,5,0,Math.PI*2);
  X.fillStyle=flash?'#ff8844':'rgba(204,102,51,0.4)';X.fill();
  if(flash){
    X.shadowColor='#ff8844';X.shadowBlur=12;
    X.beginPath();X.arc(r+hairLen+2,0,3,0,Math.PI*2);
    X.fillStyle='#ffcc88';X.fill();
    X.shadowBlur=0;
  }
  // Muzzle flash from hair tip
  if(flash){
    X.shadowColor='#ff8844';X.shadowBlur=15;
    X.beginPath();X.arc(r+hairLen+10,0,16,0,Math.PI*2);
    X.fillStyle='rgba(255,136,68,0.4)';X.fill();
    X.beginPath();X.arc(r+hairLen+6,0,7,0,Math.PI*2);
    X.fillStyle='rgba(255,200,100,0.6)';X.fill();
    X.shadowBlur=0;
  }
  // Beam charging indicator during special
  if(f&&f.ryuBeamActive){
    const charge=1-f.ryuBeamTimer/120;
    X.save();X.rotate(-f.weaponAngle);
    const pulse=Math.sin(battleTime*0.2)*5+8;
    X.strokeStyle='#ff8844';X.lineWidth=3;X.globalAlpha=0.5+charge*0.5;
    X.beginPath();X.arc(0,0,f.radius+pulse,0,Math.PI*2);X.stroke();
    X.globalAlpha=1;
    X.restore();
  }
}

function drawMantisBlades(r,ext,flash,f){
  const bladeLen=55; // proportional to arena
  const extLen=18; // visible extension arm

  // === FOREARM HOUSING — dark chrome rectangular housing on the arm ===
  const hx=r-10, hw=28, hh=18;
  const hg=X.createLinearGradient(hx,-hh/2,hx,hh/2);
  hg.addColorStop(0,'#3a3a40');hg.addColorStop(0.3,'#252530');hg.addColorStop(0.7,'#252530');hg.addColorStop(1,'#3a3a40');
  X.fillStyle=hg;X.fillRect(hx,-hh/2,hw,hh);
  X.strokeStyle='#4a4a50';X.lineWidth=1;X.strokeRect(hx,-hh/2,hw,hh);
  // Panel seams
  X.strokeStyle='#333';X.lineWidth=0.6;
  for(let i=1;i<4;i++){X.beginPath();X.moveTo(hx+hw*i/4,-hh/2);X.lineTo(hx+hw*i/4,hh/2);X.stroke();}
  // Red LED strip on housing
  X.fillStyle=flash?'#ff4444':'#cc2222';
  X.fillRect(hx+2,-hh/2,hw-4,1.5);
  X.fillRect(hx+2,hh/2-1.5,hw-4,1.5);
  if(flash){X.shadowColor='#ff2020';X.shadowBlur=6;X.fillRect(hx+2,-hh/2,hw-4,1.5);X.fillRect(hx+2,hh/2-1.5,hw-4,1.5);X.shadowBlur=0;}
  // Ejection slots
  X.fillStyle='#0a0a0e';X.fillRect(hx+hw-3,-hh/2+2,3,5);X.fillRect(hx+hw-3,hh/2-7,3,5);

  // === EXTENSION MECHANISM — twin rails/pistons from housing to blade ===
  const ex0=hx+hw; // where extension starts
  [-1,1].forEach(dir=>{
    const ry=dir*5; // rail Y offset
    // Outer rail — dark metallic track
    X.fillStyle='#1e1e25';
    X.fillRect(ex0,ry-2.5,extLen,5);
    X.strokeStyle='#3a3a44';X.lineWidth=0.8;
    X.strokeRect(ex0,ry-2.5,extLen,5);
    // Piston rod sliding inside — chrome, extends with weapon
    const pistonExt=extLen*(0.3+ext*0.7);
    const pg=X.createLinearGradient(ex0,ry-1.5,ex0,ry+1.5);
    pg.addColorStop(0,'#888');pg.addColorStop(0.5,'#bbb');pg.addColorStop(1,'#777');
    X.fillStyle=pg;
    X.fillRect(ex0+2,ry-1.5,pistonExt,3);
    // Piston joint ring
    X.fillStyle='#555';X.fillRect(ex0+pistonExt-2,ry-3,4,6);
    X.strokeStyle='#666';X.lineWidth=0.5;X.strokeRect(ex0+pistonExt-2,ry-3,4,6);
  });
  // Center spine connecting rails
  X.fillStyle='#1a1a22';X.fillRect(ex0+extLen*0.3,-1.5,extLen*0.4,3);

  // === BLADE — single wide blade, side-profile, metallic silver/chrome ===
  const bx=ex0+extLen; // blade starts where extension ends
  // Blade back (straight-ish top edge)
  X.beginPath();
  X.moveTo(bx,-7);
  // Spine — slight upward curve then taper to sharp point
  X.lineTo(bx+bladeLen*0.15,-8);
  X.quadraticCurveTo(bx+bladeLen*0.4,-9,bx+bladeLen*0.6,-7);
  X.quadraticCurveTo(bx+bladeLen*0.85,-4,bx+bladeLen,-0.5);
  // Sharp tip
  X.lineTo(bx+bladeLen+2,0);
  // Belly — curved cutting edge (bottom)
  X.quadraticCurveTo(bx+bladeLen*0.85,4,bx+bladeLen*0.6,6);
  X.quadraticCurveTo(bx+bladeLen*0.35,7,bx+bladeLen*0.1,5);
  X.lineTo(bx,4);
  X.closePath();

  // Metallic chrome/silver gradient — NOT gold
  const bg=X.createLinearGradient(bx,-9,bx+bladeLen,0);
  bg.addColorStop(0,'#667');bg.addColorStop(0.1,'#99a');bg.addColorStop(0.3,'#ccd');
  bg.addColorStop(0.5,'#eef');bg.addColorStop(0.65,'#bbc');bg.addColorStop(0.85,'#889');bg.addColorStop(1,'#556');
  X.fillStyle=bg;X.fill();
  X.strokeStyle='#445';X.lineWidth=1;X.stroke();

  // Highlight along spine
  X.strokeStyle='rgba(220,230,255,0.6)';X.lineWidth=0.8;
  X.beginPath();X.moveTo(bx+2,-6.5);
  X.quadraticCurveTo(bx+bladeLen*0.4,-8.5,bx+bladeLen*0.7,-5);
  X.quadraticCurveTo(bx+bladeLen*0.9,-2,bx+bladeLen,-0.3);
  X.stroke();

  // Cutting edge glow — red/orange on inner edge
  X.strokeStyle=flash?'rgba(255,80,40,0.9)':'rgba(255,50,30,0.3)';
  X.lineWidth=flash?2.5:1.2;
  X.beginPath();X.moveTo(bx+3,4);
  X.quadraticCurveTo(bx+bladeLen*0.35,7,bx+bladeLen*0.7,4);
  X.quadraticCurveTo(bx+bladeLen*0.9,2,bx+bladeLen+1,0);
  X.stroke();
  if(flash){X.shadowColor='#ff4020';X.shadowBlur=8;X.stroke();X.shadowBlur=0;}

  // Blood groove / fuller — dark line along blade center
  X.strokeStyle='rgba(60,65,80,0.5)';X.lineWidth=0.7;
  X.beginPath();X.moveTo(bx+10,-1);
  X.quadraticCurveTo(bx+bladeLen*0.4,-2,bx+bladeLen*0.8,-1);
  X.stroke();

  // === SECOND BLADE (lower, slightly offset) — twin mantis blades ===
  X.save();X.scale(1,-1); // mirror vertically
  // Same blade shape mirrored
  X.beginPath();
  X.moveTo(bx,-7);
  X.lineTo(bx+bladeLen*0.15,-8);
  X.quadraticCurveTo(bx+bladeLen*0.4,-9,bx+bladeLen*0.6,-7);
  X.quadraticCurveTo(bx+bladeLen*0.85,-4,bx+bladeLen,-0.5);
  X.lineTo(bx+bladeLen+2,0);
  X.quadraticCurveTo(bx+bladeLen*0.85,4,bx+bladeLen*0.6,6);
  X.quadraticCurveTo(bx+bladeLen*0.35,7,bx+bladeLen*0.1,5);
  X.lineTo(bx,4);X.closePath();
  // Slightly darker second blade
  const bg2=X.createLinearGradient(bx,-9,bx+bladeLen,0);
  bg2.addColorStop(0,'#556');bg2.addColorStop(0.1,'#889');bg2.addColorStop(0.3,'#aab');
  bg2.addColorStop(0.5,'#ccd');bg2.addColorStop(0.65,'#99a');bg2.addColorStop(0.85,'#778');bg2.addColorStop(1,'#445');
  X.fillStyle=bg2;X.fill();
  X.strokeStyle='#445';X.lineWidth=1;X.stroke();
  // Cutting edge glow mirrored
  X.strokeStyle=flash?'rgba(255,80,40,0.9)':'rgba(255,50,30,0.3)';
  X.lineWidth=flash?2.5:1.2;
  X.beginPath();X.moveTo(bx+3,4);
  X.quadraticCurveTo(bx+bladeLen*0.35,7,bx+bladeLen*0.7,4);
  X.quadraticCurveTo(bx+bladeLen*0.9,2,bx+bladeLen+1,0);
  X.stroke();
  X.restore();

  // Slash trail on attack
  if(flash&&f.attackAnim>0){
    const slashDir=f.attackSide;
    X.strokeStyle='rgba(255,80,40,0.5)';X.lineWidth=5;
    X.beginPath();X.arc(0,0,r+bladeLen*0.6,-0.5*slashDir,0.5*slashDir);X.stroke();
    X.strokeStyle='rgba(255,180,100,0.25)';X.lineWidth=10;
    X.beginPath();X.arc(0,0,r+bladeLen*0.4,-0.35*slashDir,0.35*slashDir);X.stroke();
  }

  // No tip orb — slash trail is enough
}

function drawGorillaArms(r,ext,flash,f){
  const armLen=48; // proportional to arena
  const isDownslam=f.attackPhase===2&&f.attackAnim>0;

  // Single MASSIVE fist — Cyberpunk Gorilla Arms
  X.save();X.translate(r-8,0);

  // Forearm — dark metallic, wide
  const armW=24;
  const fg=X.createLinearGradient(0,-armW/2,0,armW/2);
  fg.addColorStop(0,'#1a1a22');fg.addColorStop(0.2,'#2a2a35');fg.addColorStop(0.5,'#303040');fg.addColorStop(0.8,'#2a2a35');fg.addColorStop(1,'#1a1a22');
  X.fillStyle=fg;
  X.fillRect(0,-armW/2,armLen*0.4,armW);
  X.strokeStyle='#3a3a44';X.lineWidth=1;
  X.strokeRect(0,-armW/2,armLen*0.4,armW);
  // Panel seams
  X.strokeStyle='#333';X.lineWidth=0.6;
  for(let i=1;i<4;i++){X.beginPath();X.moveTo(armLen*0.4*i/4,-armW/2);X.lineTo(armLen*0.4*i/4,armW/2);X.stroke();}
  // Red accent lines
  X.fillStyle='rgba(255,40,40,0.6)';
  X.fillRect(2,-armW/2,armLen*0.35,2);
  X.fillRect(2,armW/2-2,armLen*0.35,2);
  // Hydraulic pistons
  X.strokeStyle='#555';X.lineWidth=2.5;
  X.beginPath();X.moveTo(3,-armW/2+3);X.lineTo(armLen*0.35,-armW/2+3);X.stroke();
  X.beginPath();X.moveTo(3,armW/2-3);X.lineTo(armLen*0.35,armW/2-3);X.stroke();

  // MASSIVE FIST — chunky, armored, very bulky
  const fistX=armLen*0.35;
  const fistW=armLen*0.75;
  const fistH=38;
  drawRoundRect(fistX,-fistH/2,fistW,fistH,6);
  const fistG=X.createLinearGradient(fistX,-fistH/2,fistX,fistH/2);
  fistG.addColorStop(0,'#181820');fistG.addColorStop(0.2,'#252530');fistG.addColorStop(0.5,'#2e2e3a');fistG.addColorStop(0.8,'#252530');fistG.addColorStop(1,'#181820');
  X.fillStyle=fistG;X.fill();
  X.strokeStyle='#444';X.lineWidth=1.5;X.stroke();

  // Thick mechanical fingers — 4 chunky segments extending from fist
  for(let k=0;k<4;k++){
    const ky=(-fistH/2+6)+k*(fistH-12)/3;
    const kx=fistX+fistW-5;
    const kw=14+ext*8;
    drawRoundRect(kx,ky-4,kw,8,3);
    X.fillStyle='#222230';X.fill();
    X.strokeStyle='#3a3a44';X.lineWidth=0.8;X.stroke();
    // Finger joint line
    X.strokeStyle='#333';X.lineWidth=0.5;
    X.beginPath();X.moveTo(kx+kw*0.4,ky-4);X.lineTo(kx+kw*0.4,ky+4);X.stroke();
  }

  // Red/chrome knuckle reinforcement caps — BIG, glowing
  for(let k=0;k<4;k++){
    const ky=(-fistH/2+6)+k*(fistH-12)/3;
    const kx=fistX+fistW*0.45;
    const kw=fistW*0.35;
    // Chrome cap base
    drawRoundRect(kx,ky-5,kw,10,3);
    const kg=X.createLinearGradient(kx,ky-5,kx,ky+5);
    kg.addColorStop(0,'#666');kg.addColorStop(0.3,'#999');kg.addColorStop(0.5,'#aaa');kg.addColorStop(0.7,'#888');kg.addColorStop(1,'#555');
    X.fillStyle=kg;X.fill();
    X.strokeStyle='#777';X.lineWidth=0.6;X.stroke();
    // Red glowing insert — bright
    X.fillStyle=flash?'rgba(255,50,50,1)':'rgba(255,30,30,0.8)';
    X.fillRect(kx+3,ky-2.5,kw-6,5);
    // Red glow effect
    X.shadowColor='#ff2020';X.shadowBlur=flash?10:4;
    X.fillStyle=flash?'rgba(255,80,80,0.9)':'rgba(255,40,40,0.5)';
    X.fillRect(kx+3,ky-2.5,kw-6,5);
    X.shadowBlur=0;
  }

  // Fist armor panel details
  X.strokeStyle='#3a3a44';X.lineWidth=0.8;
  X.beginPath();X.moveTo(fistX+fistW*0.15,-fistH/2+3);X.lineTo(fistX+fistW*0.15,fistH/2-3);X.stroke();
  X.beginPath();X.moveTo(fistX+fistW*0.4,-fistH/2+3);X.lineTo(fistX+fistW*0.4,fistH/2-3);X.stroke();

  // Wrist joint ring
  X.strokeStyle='#555';X.lineWidth=2.5;
  X.beginPath();X.arc(0,0,armW/2+2,0,Math.PI*2);X.stroke();
  X.strokeStyle=flash?'rgba(255,50,50,0.8)':'rgba(255,40,40,0.3)';X.lineWidth=1.5;
  X.beginPath();X.arc(0,0,armW/2,0,Math.PI*2);X.stroke();

  // Impact shockwave
  if(flash){
    X.beginPath();X.arc(fistX+fistW+8,0,16,0,Math.PI*2);
    X.fillStyle='rgba(255,60,40,0.4)';X.fill();
    X.beginPath();X.arc(fistX+fistW+8,0,7,0,Math.PI*2);
    X.fillStyle='rgba(255,255,255,0.7)';X.fill();
  }

  X.restore();

  // Downslam ground crack
  if(isDownslam){
    X.save();X.translate(0,r+15);
    X.strokeStyle='#ff4030';X.lineWidth=3;
    for(let i=0;i<10;i++){
      const a=Math.PI*2*i/10;
      const len=20+Math.random()*30;
      X.beginPath();X.moveTo(0,0);X.lineTo(Math.cos(a)*len,Math.sin(a)*len);X.stroke();
    }
    X.restore();
  }
}

function drawMonowire(r,ext,flash,f){
  const wireLen=75; // proportional to arena
  const isSpinning=f.relicWhipSpinTimer>0;

  // Wrist housing — small rectangular slot on forearm plate
  X.fillStyle='#2a2a30';
  X.fillRect(r-6,-8,14,16);
  X.strokeStyle='#3a3a44';X.lineWidth=1;
  X.strokeRect(r-6,-8,14,16);
  // Panel detail
  X.strokeStyle='#333';X.lineWidth=0.5;
  X.beginPath();X.moveTo(r,-8);X.lineTo(r,8);X.stroke();
  // Wire ejection slot
  X.fillStyle='#0a0a0e';
  X.fillRect(r+6,-3,6,6);
  X.strokeStyle='#555';X.lineWidth=0.8;
  X.strokeRect(r+6,-3,6,6);
  // Status LED
  X.beginPath();X.arc(r-2,-5,1.5,0,Math.PI*2);
  X.fillStyle=ext>0.1?'#ff8800':'#553300';X.fill();
  X.beginPath();X.arc(r-2,5,1.5,0,Math.PI*2);
  X.fillStyle='#444';X.fill();

  // WIRE — bright orange/gold, long, luminous
  const t=battleTime*0.08;
  const waveAmp=flash?0.4:(4-ext*3);

  if(isSpinning){
    const spinLen=100;
    X.shadowColor='#ff8800';X.shadowBlur=15;
    for(let w=0;w<2;w++){
      const wa=f.rotation*3+w*Math.PI;
      const tipX=Math.cos(wa)*spinLen,tipY=Math.sin(wa)*spinLen;
      // Wide outer glow
      X.strokeStyle='rgba(255,140,30,0.25)';X.lineWidth=10;
      X.beginPath();X.moveTo(0,0);X.lineTo(tipX,tipY);X.stroke();
      // Core wire
      X.strokeStyle='rgba(255,180,50,0.9)';X.lineWidth=2.5;
      X.beginPath();X.moveTo(0,0);X.lineTo(tipX,tipY);X.stroke();
      // Bright center
      X.strokeStyle='rgba(255,240,180,0.7)';X.lineWidth=1;
      X.beginPath();X.moveTo(0,0);X.lineTo(tipX,tipY);X.stroke();
      // Tip glow
      X.beginPath();X.arc(tipX,tipY,5,0,Math.PI*2);X.fillStyle='#ffcc44';X.fill();
    }
    X.shadowBlur=0;
  } else {
    // Outer glow — wide, soft orange
    X.strokeStyle=flash?'rgba(255,180,50,0.4)':'rgba(255,140,30,0.15)';
    X.lineWidth=flash?12:8;
    X.shadowColor='#ff8800';X.shadowBlur=flash?20:10;
    X.beginPath();X.moveTo(r+10,0);
    for(let i=1;i<=30;i++){
      const px=r+10+(wireLen-10)*i/30;
      const py=Math.sin(i*0.15+t)*waveAmp*(1-i/34);
      X.lineTo(px,py);
    }
    X.stroke();

    // Main wire — bright orange
    X.strokeStyle=flash?'rgba(255,200,60,1)':'rgba(255,160,40,0.75)';
    X.lineWidth=flash?3:2;
    X.beginPath();X.moveTo(r+10,0);
    for(let i=1;i<=30;i++){
      const px=r+10+(wireLen-10)*i/30;
      const py=Math.sin(i*0.15+t)*waveAmp*(1-i/34);
      X.lineTo(px,py);
    }
    X.stroke();

    // Hot white center
    X.strokeStyle=flash?'#ffffff':'rgba(255,240,200,0.5)';
    X.lineWidth=flash?1.2:0.7;
    X.beginPath();X.moveTo(r+10,0);
    for(let i=1;i<=30;i++){
      const px=r+10+(wireLen-10)*i/30;
      const py=Math.sin(i*0.15+t)*waveAmp*(1-i/34);
      X.lineTo(px,py);
    }
    X.stroke();
    X.shadowBlur=0;

    // Wire tip — bright glowing point
    const tipX=r+wireLen;
    X.beginPath();X.arc(tipX,0,flash?6:3.5,0,Math.PI*2);
    X.fillStyle=flash?'#ffffff':'#ffcc44';X.fill();
    X.beginPath();X.arc(tipX,0,flash?12:7,0,Math.PI*2);
    X.fillStyle=flash?'rgba(255,180,50,0.4)':'rgba(255,140,30,0.12)';X.fill();

    if(flash){
      for(let i=0;i<5;i++){
        const cx=r+15+Math.random()*(wireLen-20);
        const cy=(Math.random()-0.5)*10;
        X.strokeStyle='#ffdd88';X.lineWidth=0.8;
        X.beginPath();X.moveTo(cx,cy);
        X.lineTo(cx+rand(-8,8),cy+rand(-8,8));X.stroke();
      }
    }
  }
}

function drawPLS(r,ext,flash,f){
  const launcherLen=50; // proportional to arena

  // Forearm base plate — dark metallic
  X.fillStyle='#2a2a30';
  X.fillRect(r-8,-10,16,20);
  X.strokeStyle='#3a3a44';X.lineWidth=1;
  X.strokeRect(r-8,-10,16,20);
  X.strokeStyle='#333';X.lineWidth=0.5;
  X.beginPath();X.moveTo(r-2,-10);X.lineTo(r-2,10);X.stroke();
  X.beginPath();X.moveTo(r+4,-10);X.lineTo(r+4,10);X.stroke();
  // Mounting bolts
  X.fillStyle='#555';
  X.beginPath();X.arc(r-4,-7,1.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(r-4,7,1.5,0,Math.PI*2);X.fill();

  // Barrel cannon — proportional, dark metallic
  const bx=r+6;
  const bLen=launcherLen;
  const barrelR=8;
  const bg=X.createLinearGradient(bx,-barrelR,bx,barrelR);
  bg.addColorStop(0,'#151518');bg.addColorStop(0.15,'#2a2a35');bg.addColorStop(0.4,'#333340');
  bg.addColorStop(0.6,'#3a3a48');bg.addColorStop(0.85,'#2a2a35');bg.addColorStop(1,'#151518');
  X.fillStyle=bg;
  drawRoundRect(bx,-barrelR,bLen,barrelR*2,3);
  X.fill();
  X.strokeStyle='#444';X.lineWidth=1.2;X.stroke();

  // Green LED accent strips (green instead of red — energy weapon)
  X.fillStyle=flash?'rgba(50,255,50,1)':'rgba(30,200,30,0.6)';
  X.fillRect(bx+3,-barrelR,bLen-6,2);
  X.fillRect(bx+3,barrelR-2,bLen-6,2);
  if(flash){X.shadowColor='#33ff33';X.shadowBlur=8;X.fillRect(bx+3,-barrelR,bLen-6,2);X.fillRect(bx+3,barrelR-2,bLen-6,2);X.shadowBlur=0;}

  // Barrel segments
  X.strokeStyle='#2a2a35';X.lineWidth=1;
  [0.25,0.5,0.75].forEach(p=>{X.beginPath();X.moveTo(bx+bLen*p,-barrelR);X.lineTo(bx+bLen*p,barrelR);X.stroke();});

  // Top breach mechanism
  X.fillStyle='#1e1e28';
  X.fillRect(bx+3,-barrelR-4,bLen*0.3,4);
  X.strokeStyle='#3a3a44';X.lineWidth=0.8;X.strokeRect(bx+3,-barrelR-4,bLen*0.3,4);
  X.fillStyle=flash?'#44ff44':'#228822';X.fillRect(bx+5,-barrelR-3,4,2);
  // Bottom rail
  X.fillStyle='#1e1e28';X.fillRect(bx+bLen*0.2,barrelR,bLen*0.35,3);

  // Muzzle — dark barrel opening with energy glow
  const muzzX=bx+bLen;
  X.beginPath();X.arc(muzzX,0,barrelR-1,0,Math.PI*2);
  X.fillStyle='#0a0a10';X.fill();
  X.strokeStyle='#444';X.lineWidth=1.2;X.stroke();
  X.beginPath();X.arc(muzzX,0,barrelR-4,0,Math.PI*2);
  X.fillStyle=flash?'rgba(50,255,50,0.3)':'#050508';X.fill();
  // Rifling
  X.strokeStyle='#222';X.lineWidth=0.5;
  for(let i=0;i<6;i++){const a=Math.PI*2*i/6;X.beginPath();X.moveTo(muzzX+Math.cos(a)*2,Math.sin(a)*2);X.lineTo(muzzX+Math.cos(a)*(barrelR-2),Math.sin(a)*(barrelR-2));X.stroke();}

  // Muzzle flash — BIG green energy burst
  if(flash){
    X.shadowColor='#33ff33';X.shadowBlur=15;
    X.beginPath();X.arc(muzzX+5,0,16,0,Math.PI*2);
    X.fillStyle='rgba(100,255,100,0.5)';X.fill();
    X.beginPath();X.arc(muzzX+5,0,8,0,Math.PI*2);
    X.fillStyle='rgba(200,255,200,0.8)';X.fill();
    X.shadowBlur=0;
  }

  // Targeting optic on top
  X.strokeStyle='#55cc55';X.lineWidth=1;
  X.beginPath();X.moveTo(bx+bLen*0.55,-barrelR-4);X.lineTo(bx+bLen*0.55,-barrelR-8);X.lineTo(bx+bLen*0.7,-barrelR-8);X.stroke();
  X.beginPath();X.arc(bx+bLen*0.7,-barrelR-8,2,0,Math.PI*2);
  X.fillStyle=flash?'#aaffaa':'#55ff55';X.fill();

  // PLS Relic — BIG targeting reticle on enemy (visible during charge AND rapid fire)
  if(f&&f.specialActive&&f.relicLockTarget){
    X.save();
    X.rotate(-f.weaponAngle);
    const t=f.relicLockTarget;
    const tx=t.x-f.x,ty=t.y-f.y;
    const pulse=Math.sin(battleTime*0.2)*6;
    const reticleR=t.radius+20+pulse;
    // Outer spinning ring
    X.strokeStyle='#ff3333';X.lineWidth=3;X.globalAlpha=0.9;
    X.setLineDash([8,6]);
    X.lineDashOffset=battleTime*2;
    X.beginPath();X.arc(tx,ty,reticleR,0,Math.PI*2);X.stroke();
    X.setLineDash([]);
    // Inner solid ring
    X.strokeStyle='#ff6666';X.lineWidth=2;
    X.beginPath();X.arc(tx,ty,reticleR-8,0,Math.PI*2);X.stroke();
    // Crosshair lines — big
    X.strokeStyle='#ff3333';X.lineWidth=2.5;
    const cLen=25;
    X.beginPath();X.moveTo(tx-cLen,ty);X.lineTo(tx-8,ty);X.stroke();
    X.beginPath();X.moveTo(tx+8,ty);X.lineTo(tx+cLen,ty);X.stroke();
    X.beginPath();X.moveTo(tx,ty-cLen);X.lineTo(tx,ty-8);X.stroke();
    X.beginPath();X.moveTo(tx,ty+8);X.lineTo(tx,ty+cLen);X.stroke();
    // Corner brackets
    const bLen=12;
    X.strokeStyle='#ff4444';X.lineWidth=2;
    // Top-left
    X.beginPath();X.moveTo(tx-reticleR,ty-reticleR+bLen);X.lineTo(tx-reticleR,ty-reticleR);X.lineTo(tx-reticleR+bLen,ty-reticleR);X.stroke();
    // Top-right
    X.beginPath();X.moveTo(tx+reticleR-bLen,ty-reticleR);X.lineTo(tx+reticleR,ty-reticleR);X.lineTo(tx+reticleR,ty-reticleR+bLen);X.stroke();
    // Bottom-left
    X.beginPath();X.moveTo(tx-reticleR,ty+reticleR-bLen);X.lineTo(tx-reticleR,ty+reticleR);X.lineTo(tx-reticleR+bLen,ty+reticleR);X.stroke();
    // Bottom-right
    X.beginPath();X.moveTo(tx+reticleR-bLen,ty+reticleR);X.lineTo(tx+reticleR,ty+reticleR);X.lineTo(tx+reticleR,ty+reticleR-bLen);X.stroke();
    // "LOCKED" text during charge
    if(f.relicChargeTimer>0){
      X.fillStyle='#ff3333';X.font='bold 10px Consolas';X.textAlign='center';
      X.fillText('LOCKED',tx,ty-reticleR-8);
    }
    X.globalAlpha=1;
    X.restore();
  }
}

function drawSandy(r,ext,flash,f){
  // Sandevistan — NO weapon, no spine. Just the ball. Deals body collision damage.

  // Sandevistan active — BIG obvious blue energy field
  if(f&&f.sandyActive){
    X.save();X.rotate(-f.weaponAngle);
    // Massive blue aura fill
    const pulse=Math.sin(battleTime*0.12)*8;
    X.beginPath();X.arc(0,0,f.radius+20+pulse,0,Math.PI*2);
    const ag=X.createRadialGradient(0,0,f.radius,0,0,f.radius+20+pulse);
    ag.addColorStop(0,'rgba(68,136,255,0.5)');ag.addColorStop(0.5,'rgba(68,136,255,0.2)');ag.addColorStop(1,'rgba(68,136,255,0)');
    X.fillStyle=ag;X.fill();
    // Bright blue outer ring
    X.beginPath();X.arc(0,0,f.radius+16+pulse,0,Math.PI*2);
    X.shadowColor='#4488ff';X.shadowBlur=20;
    X.strokeStyle='rgba(68,136,255,0.9)';X.lineWidth=4;X.stroke();
    // Inner bright ring
    X.beginPath();X.arc(0,0,f.radius+4,0,Math.PI*2);
    X.strokeStyle='rgba(136,200,255,0.6)';X.lineWidth=6;X.stroke();
    X.shadowBlur=0;
    // 12 speed lines radiating outward — very visible
    for(let i=0;i<12;i++){
      const sa=battleTime*0.18+i*Math.PI/6;
      const lineLen=15+pulse+Math.sin(battleTime*0.3+i)*5;
      X.strokeStyle='rgba(100,180,255,0.6)';X.lineWidth=2.5;
      X.beginPath();X.moveTo(Math.cos(sa)*(f.radius+6),Math.sin(sa)*(f.radius+6));
      X.lineTo(Math.cos(sa)*(f.radius+6+lineLen),Math.sin(sa)*(f.radius+6+lineLen));X.stroke();
    }
    // Blue particles around ball
    if(battleTime%2<1){
      for(let i=0;i<3;i++){
        const a=Math.random()*Math.PI*2;
        spawnParticle(f.x+Math.cos(a)*(f.radius+5),f.y+Math.sin(a)*(f.radius+5),'#6699ff',Math.cos(a)*2,Math.sin(a)*2,12,3);
      }
    }
    X.restore();
  }
}

function drawThrowWeapon(r,ext,flash,f){
  // Throwing weapons — show currently held knife in throwing stance
  const tw=f.throwWeapons[f.throwActiveIdx];
  const hasWeapon=tw&&tw.available;

  // Optical Camo active — near invisible with ripple/shimmer like Cyberpunk
  if(f&&f.throwCamoActive){
    X.save();X.rotate(-f.weaponAngle);
    // Ripple distortion lines — subtle shimmer outline
    const t=battleTime*0.08;
    for(let i=0;i<8;i++){
      const a=t+i*Math.PI/4;
      const ripple=Math.sin(battleTime*0.2+i)*3;
      const r1=f.radius+ripple;
      const r2=f.radius+4+ripple;
      X.strokeStyle='rgba(180,200,255,'+(0.15+Math.sin(battleTime*0.15+i*0.5)*0.1)+')';
      X.lineWidth=1.5;
      X.beginPath();X.arc(0,0,r1,a-0.3,a+0.3);X.stroke();
      X.beginPath();X.arc(0,0,r2,a+0.15-0.2,a+0.15+0.2);X.stroke();
    }
    // Very faint highlight outline so you can still see the ball
    X.strokeStyle='rgba(200,220,255,0.12)';X.lineWidth=2;
    X.beginPath();X.arc(0,0,f.radius+1,0,Math.PI*2);X.stroke();
    X.restore();
  }

  if(!hasWeapon){
    // No weapon — empty hand aura
    X.strokeStyle='rgba(204,102,255,0.3)';X.lineWidth=2;
    X.beginPath();X.moveTo(r,0);X.lineTo(r+20,0);X.stroke();
    return;
  }

  // Arm/handle
  X.fillStyle='#2a2a30';X.fillRect(r-5,-4,12,8);

  switch(tw.id){
    case 'agaou':
      // Agaou — large machete/cleaver with purple-pink energy edge
      X.beginPath();
      X.moveTo(r+7,-3);
      X.lineTo(r+15,-8);X.lineTo(r+35,-10);
      X.quadraticCurveTo(r+45,-8,r+50,-2);
      X.lineTo(r+50,2);
      X.quadraticCurveTo(r+40,6,r+25,5);
      X.lineTo(r+7,3);X.closePath();
      const ag=X.createLinearGradient(r+7,0,r+50,0);
      ag.addColorStop(0,'#445');ag.addColorStop(0.3,'#778');ag.addColorStop(0.7,'#99a');ag.addColorStop(1,'#667');
      X.fillStyle=ag;X.fill();X.strokeStyle='#333';X.lineWidth=1;X.stroke();
      // Energy edge — purple-pink glow
      X.shadowColor='#ff44ff';X.shadowBlur=flash?12:4;
      X.strokeStyle=flash?'#ff88ff':'#cc44cc';X.lineWidth=2;
      X.beginPath();X.moveTo(r+15,-8);X.lineTo(r+35,-10);
      X.quadraticCurveTo(r+45,-8,r+50,-2);X.stroke();
      X.shadowBlur=0;
      break;
    case 'fang':
      // Fang — iconic moddable claw/axe from DLC, gold/amber
      // Axe head
      X.beginPath();
      X.moveTo(r+7,-2);X.lineTo(r+15,-3);
      X.lineTo(r+25,-12);X.quadraticCurveTo(r+38,-14,r+45,-6);
      X.lineTo(r+48,0);
      X.lineTo(r+45,6);X.quadraticCurveTo(r+38,14,r+25,12);
      X.lineTo(r+15,3);X.lineTo(r+7,2);X.closePath();
      const sg=X.createLinearGradient(r+7,0,r+48,0);
      sg.addColorStop(0,'#886622');sg.addColorStop(0.3,'#ccaa44');sg.addColorStop(0.6,'#ffdd66');sg.addColorStop(1,'#aa8833');
      X.fillStyle=sg;X.fill();X.strokeStyle='#665522';X.lineWidth=1;X.stroke();
      // Bright edge — curved claw
      X.shadowColor='#ffaa00';X.shadowBlur=flash?10:3;
      X.strokeStyle=flash?'#ffcc44':'#ffaa00';X.lineWidth=2;
      X.beginPath();X.moveTo(r+25,-12);X.quadraticCurveTo(r+38,-14,r+45,-6);X.lineTo(r+48,0);
      X.lineTo(r+45,6);X.quadraticCurveTo(r+38,14,r+25,12);X.stroke();
      X.shadowBlur=0;
      // Mod slot — small tech rectangle on handle
      X.fillStyle='#222';X.fillRect(r+10,-2,8,4);
      X.fillStyle='#44ff44';X.fillRect(r+11,-1,2,2);
      break;
    case 'punk':
      // Punkblade — small sleek cyan throwing blade
      X.beginPath();
      X.moveTo(r+7,-2);X.lineTo(r+15,-5);X.lineTo(r+30,-4);
      X.lineTo(r+35,0);X.lineTo(r+30,4);X.lineTo(r+15,5);
      X.lineTo(r+7,2);X.closePath();
      const pg=X.createLinearGradient(r+7,0,r+35,0);
      pg.addColorStop(0,'#225544');pg.addColorStop(0.4,'#44aa88');pg.addColorStop(0.7,'#66ffcc');pg.addColorStop(1,'#338866');
      X.fillStyle=pg;X.fill();X.strokeStyle='#224433';X.lineWidth=1;X.stroke();
      X.shadowColor='#66ffcc';X.shadowBlur=flash?8:2;
      X.strokeStyle=flash?'#88ffdd':'#66ffcc';X.lineWidth=1.5;
      X.beginPath();X.moveTo(r+15,-5);X.lineTo(r+30,-4);X.lineTo(r+35,0);X.stroke();
      X.shadowBlur=0;
      break;
  }
}

function drawKatanaWeapon(r,ext,flash,f){
  const bladeLen=62;
  const isDeflecting=f&&f.katanaDeflecting>0;

  // === DEFLECT POSE: blade held sideways in front, golden shield glow ===
  if(isDeflecting){
    // Blade rotated 90deg — held horizontally as a shield
    X.save();
    X.rotate(-Math.PI/2); // blade perpendicular to facing
    // Handle
    X.fillStyle='#1a1a22';X.fillRect(r-8,-5,16,10);
    X.strokeStyle='#ff6644';X.lineWidth=0.8;
    for(let i=0;i<4;i++){X.beginPath();X.moveTo(r-6+i*4,-5);X.lineTo(r-4+i*4,5);X.stroke();}
    // Guard
    X.beginPath();X.ellipse(r+8,0,4,10,0,0,Math.PI*2);
    X.fillStyle='#444';X.fill();X.strokeStyle='#666';X.lineWidth=1;X.stroke();
    // Blade with golden deflect glow
    const bx=r+12;
    X.beginPath();X.moveTo(bx,-4);
    X.quadraticCurveTo(bx+bladeLen*0.3,-5,bx+bladeLen*0.6,-4);
    X.quadraticCurveTo(bx+bladeLen*0.85,-2.5,bx+bladeLen,0);
    X.lineTo(bx+bladeLen+2,0.5);
    X.quadraticCurveTo(bx+bladeLen*0.8,5,bx+bladeLen*0.5,5.5);
    X.quadraticCurveTo(bx+bladeLen*0.2,5,bx,3);
    X.closePath();
    // Golden steel during deflect
    const bg=X.createLinearGradient(bx,-5,bx+bladeLen,0);
    bg.addColorStop(0,'#aa8833');bg.addColorStop(0.3,'#ffdd66');bg.addColorStop(0.5,'#ffffaa');
    bg.addColorStop(0.7,'#ffdd66');bg.addColorStop(1,'#aa8833');
    X.fillStyle=bg;X.fill();
    X.shadowColor='#ffcc00';X.shadowBlur=15;
    X.strokeStyle='#ffcc00';X.lineWidth=2;X.stroke();
    X.shadowBlur=0;
    X.restore();
    // Golden shield arc in front
    const pulse=Math.sin(battleTime*0.2)*4;
    X.strokeStyle='rgba(255,204,0,0.7)';X.lineWidth=4+pulse*0.3;
    X.shadowColor='#ffcc00';X.shadowBlur=12;
    X.beginPath();X.arc(r+20,0,30+pulse,-Math.PI*0.6,Math.PI*0.6);X.stroke();
    X.shadowBlur=0;
    // Inner arc
    X.strokeStyle='rgba(255,255,200,0.4)';X.lineWidth=2;
    X.beginPath();X.arc(r+20,0,22+pulse,-Math.PI*0.4,Math.PI*0.4);X.stroke();
    return; // skip normal blade draw
  }

  // Handle/tsuka — wrapped grip
  X.fillStyle='#1a1a22';X.fillRect(r-8,-5,16,10);
  X.strokeStyle='#3a3a44';X.lineWidth=1;X.strokeRect(r-8,-5,16,10);
  // Wrapping lines — dark blue/silver for Katana
  X.strokeStyle='#4466cc';X.lineWidth=0.8;
  for(let i=0;i<4;i++){X.beginPath();X.moveTo(r-6+i*4,-5);X.lineTo(r-4+i*4,5);X.stroke();}
  // Tsuba (guard) — oval crossguard, gold accent
  X.beginPath();X.ellipse(r+8,0,4,10,0,0,Math.PI*2);
  X.fillStyle='#554';X.fill();X.strokeStyle='#887';X.lineWidth=1;X.stroke();
  X.fillStyle='#ccaa44';X.fillRect(r+6,-1,4,2); // gold accent

  // Blade — curved katana profile, single edge
  const bx=r+12;
  X.beginPath();
  X.moveTo(bx,-4);
  // Spine (back) — slight curve
  X.quadraticCurveTo(bx+bladeLen*0.3,-5,bx+bladeLen*0.6,-4);
  X.quadraticCurveTo(bx+bladeLen*0.85,-2.5,bx+bladeLen,0);
  // Kissaki (tip)
  X.lineTo(bx+bladeLen+2,0.5);
  // Ha (cutting edge) — deeper curve
  X.quadraticCurveTo(bx+bladeLen*0.8,5,bx+bladeLen*0.5,5.5);
  X.quadraticCurveTo(bx+bladeLen*0.2,5,bx,3);
  X.closePath();
  // Steel gradient — bright silver/blue tint
  const bg=X.createLinearGradient(bx,-5,bx+bladeLen,0);
  bg.addColorStop(0,'#778');bg.addColorStop(0.15,'#aab');bg.addColorStop(0.35,'#dde');
  bg.addColorStop(0.5,'#eef');bg.addColorStop(0.7,'#ccd');bg.addColorStop(0.9,'#99a');bg.addColorStop(1,'#667');
  X.fillStyle=bg;X.fill();
  X.strokeStyle='#556';X.lineWidth=0.8;X.stroke();
  // Hamon line — wavy temper line
  X.strokeStyle='rgba(255,200,150,0.4)';X.lineWidth=1.2;
  X.beginPath();X.moveTo(bx+5,2);
  X.quadraticCurveTo(bx+bladeLen*0.2,3.5,bx+bladeLen*0.35,2);
  X.quadraticCurveTo(bx+bladeLen*0.5,3.5,bx+bladeLen*0.65,2);
  X.quadraticCurveTo(bx+bladeLen*0.8,3,bx+bladeLen*0.95,0.5);
  X.stroke();
  // Cutting edge glow — blue/purple Katana energy
  X.strokeStyle=flash?'rgba(80,100,255,0.9)':'rgba(68,102,204,0.4)';
  X.lineWidth=flash?2.5:1;
  X.beginPath();X.moveTo(bx+2,3);
  X.quadraticCurveTo(bx+bladeLen*0.3,5.5,bx+bladeLen*0.6,5);
  X.quadraticCurveTo(bx+bladeLen*0.85,3,bx+bladeLen+1,0.5);
  X.stroke();
  if(flash){X.shadowColor='#4466cc';X.shadowBlur=10;X.stroke();X.shadowBlur=0;}

  // Deflect stance glow — blue Katana readiness
  if(f&&!f.katanaDashing&&!f.katanaRushing){
    const pulse=Math.sin(battleTime*0.08)*3;
    X.strokeStyle='rgba(68,102,204,'+(0.2+Math.sin(battleTime*0.1)*0.1)+')';
    X.lineWidth=3+pulse*0.3;
    X.beginPath();X.arc(bx+bladeLen*0.5,0,bladeLen*0.35+pulse,Math.PI*0.7,Math.PI*1.3);X.stroke();
  }
  // Relic rush — intense blue/purple aura (Judgement Cut End)
  if(f&&f.katanaRushing){
    X.shadowColor='#4466cc';X.shadowBlur=25;
    X.strokeStyle='rgba(68,102,204,0.7)';X.lineWidth=4;
    X.beginPath();X.moveTo(bx+2,3);
    X.quadraticCurveTo(bx+bladeLen*0.5,8,bx+bladeLen+2,0);
    X.stroke();X.shadowBlur=0;
  }

  // Slash trail
  if(flash&&f.attackAnim>0){
    X.strokeStyle='rgba(255,100,60,0.5)';X.lineWidth=5;
    X.beginPath();X.arc(0,0,r+bladeLen*0.5,-0.4,0.4);X.stroke();
    X.strokeStyle='rgba(255,200,100,0.25)';X.lineWidth=10;
    X.beginPath();X.arc(0,0,r+bladeLen*0.35,-0.3,0.3);X.stroke();
  }
}

function drawBerserkWeapon(r,ext,flash,f){
  const gunLen=50;
  // Arm/forearm
  X.fillStyle='#2a2a30';X.fillRect(r-8,-8,16,16);
  X.strokeStyle='#3a3a44';X.lineWidth=1;X.strokeRect(r-8,-8,16,16);
  // Pink accent (Berserk's style)
  X.fillStyle='rgba(255,85,170,0.7)';X.fillRect(r-6,-8,12,2);X.fillRect(r-6,6,12,2);

  // Shotgun body — blocky, double barrel
  const bx=r+6;
  const bodyG=X.createLinearGradient(bx,-10,bx,10);
  bodyG.addColorStop(0,'#151518');bodyG.addColorStop(0.3,'#252530');bodyG.addColorStop(0.5,'#2e2e38');
  bodyG.addColorStop(0.7,'#252530');bodyG.addColorStop(1,'#151518');
  X.fillStyle=bodyG;
  drawRoundRect(bx,-10,gunLen,20,3);X.fill();
  X.strokeStyle='#444';X.lineWidth=1.2;X.stroke();
  // Double barrel holes
  const muzzX=bx+gunLen;
  X.fillStyle='#0a0a10';
  X.beginPath();X.arc(muzzX,-3.5,4,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(muzzX,3.5,4,0,Math.PI*2);X.fill();
  X.strokeStyle='#444';X.lineWidth=0.8;
  X.beginPath();X.arc(muzzX,-3.5,4,0,Math.PI*2);X.stroke();
  X.beginPath();X.arc(muzzX,3.5,4,0,Math.PI*2);X.stroke();
  // Pink LED strips (Berserk)
  X.fillStyle=flash?'rgba(255,85,170,1)':'rgba(255,55,140,0.6)';
  X.fillRect(bx+3,-10,gunLen-6,1.5);X.fillRect(bx+3,8.5,gunLen-6,1.5);
  if(flash){X.shadowColor='#ff55aa';X.shadowBlur=10;X.fillRect(bx+3,-10,gunLen-6,1.5);X.fillRect(bx+3,8.5,gunLen-6,1.5);X.shadowBlur=0;}
  // Barrel segments
  X.strokeStyle='#2a2a35';X.lineWidth=0.8;
  [0.3,0.55,0.8].forEach(p=>{X.beginPath();X.moveTo(bx+gunLen*p,-10);X.lineTo(bx+gunLen*p,10);X.stroke();});
  // Pump grip
  X.fillStyle='#331111';
  drawRoundRect(bx+gunLen*0.25,-12,gunLen*0.2,4,2);X.fill();
  drawRoundRect(bx+gunLen*0.25,8,gunLen*0.2,4,2);X.fill();

  // Muzzle flash — BIG red/orange shotgun blast
  if(flash){
    X.shadowColor='#ff4400';X.shadowBlur=15;
    X.beginPath();X.arc(muzzX+8,0,20,0,Math.PI*2);
    X.fillStyle='rgba(255,80,40,0.5)';X.fill();
    X.beginPath();X.arc(muzzX+5,0,10,0,Math.PI*2);
    X.fillStyle='rgba(255,200,100,0.7)';X.fill();
    // Pellet scatter lines
    for(let i=0;i<6;i++){
      const a=(Math.random()-0.5)*1.2;
      X.strokeStyle='rgba(255,150,50,0.6)';X.lineWidth=1.5;
      X.beginPath();X.moveTo(muzzX,0);
      X.lineTo(muzzX+Math.cos(a)*25,Math.sin(a)*25);X.stroke();
    }
    X.shadowBlur=0;
  }

  // Reload indicator — shell loading visual
  if(f&&f.berserkReloadTimer>0){
    const reloadPct=f.berserkReloadTimer/(f.berserkInvincible?45:150);
    X.fillStyle='rgba(255,50,50,0.3)';
    X.fillRect(bx,10,gunLen*reloadPct,3);
    // Shell icon
    X.fillStyle='#aa4444';X.fillRect(bx+gunLen*0.4,-2,8,4);
    X.strokeStyle='#cc6666';X.lineWidth=0.5;X.strokeRect(bx+gunLen*0.4,-2,8,4);
  }

  // Berserk mode — massive red aura
  if(f&&f.berserkInvincible){
    X.save();X.rotate(-f.weaponAngle);
    const pulse=Math.sin(battleTime*0.12)*8;
    X.beginPath();X.arc(0,0,f.radius+18+pulse,0,Math.PI*2);
    const ag=X.createRadialGradient(0,0,f.radius,0,0,f.radius+18+pulse);
    ag.addColorStop(0,'rgba(221,34,34,0.5)');ag.addColorStop(0.5,'rgba(221,34,34,0.2)');ag.addColorStop(1,'rgba(221,34,34,0)');
    X.fillStyle=ag;X.fill();
    X.beginPath();X.arc(0,0,f.radius+14+pulse,0,Math.PI*2);
    X.shadowColor='#dd2222';X.shadowBlur=20;
    X.strokeStyle='rgba(221,34,34,0.8)';X.lineWidth=4;X.stroke();
    X.shadowBlur=0;
    // Red rage lines
    for(let i=0;i<8;i++){
      const sa=battleTime*0.15+i*Math.PI/4;
      const lineLen=12+pulse+Math.sin(battleTime*0.25+i)*4;
      X.strokeStyle='rgba(255,50,50,0.5)';X.lineWidth=2.5;
      X.beginPath();X.moveTo(Math.cos(sa)*(f.radius+5),Math.sin(sa)*(f.radius+5));
      X.lineTo(Math.cos(sa)*(f.radius+5+lineLen),Math.sin(sa)*(f.radius+5+lineLen));X.stroke();
    }
    X.restore();
  }
}

function drawSmasherWeapon(r,ext,flash,f){
  const launchLen=55;
  // Heavy arm mount
  X.fillStyle='#2a2a30';X.fillRect(r-10,-12,20,24);
  X.strokeStyle='#3a3a44';X.lineWidth=1.2;X.strokeRect(r-10,-12,20,24);
  X.fillStyle='rgba(255,50,50,0.4)';X.fillRect(r-8,-12,16,2);X.fillRect(r-8,10,16,2);

  // Rocket launcher body — large, heavy, military
  const bx=r+8;
  const bodyG=X.createLinearGradient(bx,-14,bx,14);
  bodyG.addColorStop(0,'#1a1a1e');bodyG.addColorStop(0.3,'#2a2a35');bodyG.addColorStop(0.5,'#333340');
  bodyG.addColorStop(0.7,'#2a2a35');bodyG.addColorStop(1,'#1a1a1e');
  X.fillStyle=bodyG;
  drawRoundRect(bx,-14,launchLen,28,4);X.fill();
  X.strokeStyle='#555';X.lineWidth=1.5;X.stroke();

  // Launch tube (main barrel)
  X.fillStyle='#0a0a10';
  X.beginPath();X.arc(bx+launchLen,0,8,0,Math.PI*2);X.fill();
  X.strokeStyle='#666';X.lineWidth=1;X.stroke();
  // Inner glow
  X.beginPath();X.arc(bx+launchLen,0,5,0,Math.PI*2);
  X.fillStyle=flash?'#ff4400':'#331100';X.fill();

  // Red accent strips + panel lines
  X.fillStyle=flash?'rgba(255,60,60,1)':'rgba(255,40,40,0.5)';
  X.fillRect(bx+3,-14,launchLen-8,2);X.fillRect(bx+3,12,launchLen-8,2);
  X.strokeStyle='#222';X.lineWidth=0.5;
  [0.25,0.5,0.75].forEach(p=>{X.beginPath();X.moveTo(bx+launchLen*p,-14);X.lineTo(bx+launchLen*p,14);X.stroke();});

  // Targeting scope on top
  X.fillStyle='#1e1e28';X.fillRect(bx+10,-18,14,4);
  X.beginPath();X.arc(bx+17,-18,2,0,Math.PI*2);
  X.fillStyle=flash?'#ff0000':'#cc0000';X.fill();

  // Muzzle flash — big rocket ignition
  if(flash){
    X.shadowColor='#ff4400';X.shadowBlur=20;
    X.beginPath();X.arc(bx+launchLen+10,0,25,0,Math.PI*2);
    X.fillStyle='rgba(255,80,40,0.5)';X.fill();
    X.beginPath();X.arc(bx+launchLen+6,0,12,0,Math.PI*2);
    X.fillStyle='rgba(255,200,100,0.7)';X.fill();
    // Exhaust trails
    for(let i=0;i<4;i++){
      const a=(Math.random()-0.5)*0.8;
      X.strokeStyle='rgba(255,150,50,0.6)';X.lineWidth=2;
      X.beginPath();X.moveTo(bx+launchLen,0);
      X.lineTo(bx+launchLen+Math.cos(a)*30,Math.sin(a)*30);X.stroke();
    }
    X.shadowBlur=0;
  }

  // Relic active — multi-color afterimage aura
  if(f&&f.specialActive&&!f.smasherAirborne){
    X.save();X.rotate(-f.weaponAngle);
    const pulse=Math.sin(battleTime*0.12)*8;
    const colors=['#cc4444','#ff6644','#ffcc00','#4488ff'];
    colors.forEach((col,ci)=>{
      const sa=battleTime*0.08+ci*Math.PI/2;
      const lineLen=15+pulse;
      X.strokeStyle=col+'88';X.lineWidth=3;
      X.beginPath();X.moveTo(Math.cos(sa)*(f.radius+5),Math.sin(sa)*(f.radius+5));
      X.lineTo(Math.cos(sa)*(f.radius+5+lineLen),Math.sin(sa)*(f.radius+5+lineLen));X.stroke();
    });
    X.beginPath();X.arc(0,0,f.radius+15+pulse,0,Math.PI*2);
    const ag=X.createRadialGradient(0,0,f.radius,0,0,f.radius+15+pulse);
    ag.addColorStop(0,'rgba(204,68,68,0.4)');ag.addColorStop(1,'rgba(204,68,68,0)');
    X.fillStyle=ag;X.fill();
    X.restore();
  }
}

function drawMiniWeapon(cx,cy,charId,size){
  X.save();X.translate(cx,cy);
  const s=size/30;X.scale(s,s);
  switch(charId){
    case 'mantis':
      // Dark housing
      X.fillStyle='#252530';X.fillRect(-14,-5,10,10);
      X.strokeStyle='#3a3a44';X.lineWidth=0.6;X.strokeRect(-14,-5,10,10);
      X.fillStyle='#cc2222';X.fillRect(-13,-5,8,1);X.fillRect(-13,4,8,1);
      // Extension rails
      X.fillStyle='#1e1e25';X.fillRect(-4,-3,6,2.5);X.fillRect(-4,0.5,6,2.5);
      X.fillStyle='#999';X.fillRect(-3,-2.5,4,1.5);X.fillRect(-3,1,4,1.5);
      // Twin chrome blades — side profile
      [-1,1].forEach(dir=>{
        const by=dir*3;
        X.beginPath();X.moveTo(2,by-3*dir);
        X.quadraticCurveTo(12,by-4*dir,20,by-0.5*dir);
        X.lineTo(22,by);
        X.quadraticCurveTo(14,by+3*dir,4,by+2*dir);
        X.closePath();
        const bg=X.createLinearGradient(2,0,22,0);
        bg.addColorStop(0,'#889');bg.addColorStop(0.4,'#ccd');bg.addColorStop(1,'#667');
        X.fillStyle=bg;X.fill();
        X.strokeStyle='#445';X.lineWidth=0.5;X.stroke();
      });
      break;
    case 'gorilla':
      // Dark forearm stub
      X.fillStyle='#2a2a35';X.fillRect(-14,-6,8,12);
      // Massive fist
      drawRoundRect(-6,-12,22,24,4);
      X.fillStyle='#252530';X.fill();
      X.strokeStyle='#444';X.lineWidth=1.2;X.stroke();
      // Red knuckle caps — bright
      for(let k=0;k<4;k++){
        const ky=-9+k*5.5;
        X.fillStyle='#666';X.fillRect(2,ky,8,4);
        X.shadowColor='#ff2020';X.shadowBlur=3;
        X.fillStyle='rgba(255,40,40,0.8)';X.fillRect(3,ky+0.5,6,3);
        X.shadowBlur=0;
      }
      // Fingers
      for(let k=0;k<4;k++){
        const ky=-9+k*5.5;
        X.fillStyle='#222';X.fillRect(12,ky,5,4);
      }
      break;
    case 'monowire':
      // Dark wrist housing
      X.fillStyle='#2a2a30';X.fillRect(-14,-4,8,8);
      X.strokeStyle='#3a3a44';X.lineWidth=0.6;X.strokeRect(-14,-4,8,8);
      // Bright orange wire — long, glowing
      X.shadowColor='#ff8800';X.shadowBlur=6;
      X.strokeStyle='rgba(255,140,30,0.3)';X.lineWidth=5;
      X.beginPath();X.moveTo(-6,0);X.quadraticCurveTo(4,-8,20,0);X.stroke();
      X.strokeStyle='#ff9930';X.lineWidth=2;
      X.beginPath();X.moveTo(-6,0);X.quadraticCurveTo(4,-8,20,0);X.stroke();
      X.strokeStyle='rgba(255,240,180,0.6)';X.lineWidth=0.8;
      X.beginPath();X.moveTo(-6,0);X.quadraticCurveTo(4,-8,20,0);X.stroke();
      X.shadowBlur=0;
      X.beginPath();X.arc(20,0,3,0,Math.PI*2);X.fillStyle='#ffcc44';X.fill();
      break;
    case 'pls':
      // Forearm plate
      X.fillStyle='#2a2a30';X.fillRect(-14,-5,8,10);
      // Barrel cannon
      const plsG=X.createLinearGradient(-6,-6,-6,6);
      plsG.addColorStop(0,'#151518');plsG.addColorStop(0.5,'#333340');plsG.addColorStop(1,'#151518');
      drawRoundRect(-6,-6,24,12,2);X.fillStyle=plsG;X.fill();
      X.strokeStyle='#444';X.lineWidth=1;X.stroke();
      // Green accent strips
      X.fillStyle='rgba(30,200,30,0.7)';
      X.fillRect(-4,-6,20,1.5);X.fillRect(-4,4.5,20,1.5);
      // Muzzle
      X.beginPath();X.arc(18,0,4.5,0,Math.PI*2);X.fillStyle='#0a0a10';X.fill();

      // Breach on top

      // Targeting optic
      X.beginPath();X.arc(4,-10,1.5,0,Math.PI*2);X.fillStyle='#55ff55';X.fill();
      break;
    case 'sandy':

      X.shadowColor='#4488ff';X.shadowBlur=8;
      X.beginPath();X.arc(0,0,12,0,Math.PI*2);
      X.strokeStyle='rgba(68,136,255,0.6)';X.lineWidth=2;X.stroke();

      break;
    case 'throw':
      // 3 small throwing knives fanned
      X.shadowColor='#cc66ff';X.shadowBlur=4;
      [[-6,'#ff44ff'],[0,'#ffaa00'],[6,'#66ffcc']].forEach(([oy,col])=>{
        X.strokeStyle=col;X.lineWidth=2;
        X.beginPath();X.moveTo(-4,oy);X.lineTo(18,oy);X.stroke();
        X.beginPath();X.moveTo(14,oy-2);X.lineTo(18,oy);X.lineTo(14,oy+2);X.stroke();
      });
      X.shadowBlur=0;
      break;
    case 'katana':
      // Katana blade — curved single-edge sword
      X.fillStyle='#333';X.fillRect(-14,-3,8,6); // handle
      X.strokeStyle='#ff6644';X.lineWidth=0.6;
      X.beginPath();X.moveTo(-12,-3);X.lineTo(-10,3);X.stroke();
      X.beginPath();X.moveTo(-10,-3);X.lineTo(-8,3);X.stroke();
      // Guard
      X.beginPath();X.ellipse(-6,0,2,6,0,0,Math.PI*2);X.fillStyle='#555';X.fill();
      // Blade
      X.beginPath();X.moveTo(-4,-3);
      X.quadraticCurveTo(6,-4,16,-1);X.lineTo(18,0);
      X.quadraticCurveTo(10,4,0,3.5);X.lineTo(-4,2);X.closePath();
      const kg=X.createLinearGradient(-4,0,18,0);
      kg.addColorStop(0,'#99a');kg.addColorStop(0.4,'#dde');kg.addColorStop(1,'#778');
      X.fillStyle=kg;X.fill();X.strokeStyle='#556';X.lineWidth=0.5;X.stroke();
      // Edge glow
      X.shadowColor='#ff6644';X.shadowBlur=3;
      X.strokeStyle='rgba(255,100,68,0.5)';X.lineWidth=1;
      X.beginPath();X.moveTo(-2,2);X.quadraticCurveTo(8,4,18,0);X.stroke();
      X.shadowBlur=0;
      break;
    case 'berserk':
      // Shotgun — double barrel
      X.fillStyle='#2a2a30';X.fillRect(-14,-4,8,8); // grip
      // Body
      drawRoundRect(-6,-6,22,12,2);
      const sg=X.createLinearGradient(-6,-6,-6,6);
      sg.addColorStop(0,'#151518');sg.addColorStop(0.5,'#2e2e38');sg.addColorStop(1,'#151518');
      X.fillStyle=sg;X.fill();X.strokeStyle='#444';X.lineWidth=0.8;X.stroke();
      // Red strips
      X.fillStyle='rgba(255,30,30,0.6)';X.fillRect(-4,-6,18,1.2);X.fillRect(-4,4.8,18,1.2);
      // Double barrel
      X.fillStyle='#0a0a10';
      X.beginPath();X.arc(16,-2.5,3,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(16,2.5,3,0,Math.PI*2);X.fill();
      X.strokeStyle='#444';X.lineWidth=0.5;
      X.beginPath();X.arc(16,-2.5,3,0,Math.PI*2);X.stroke();
      X.beginPath();X.arc(16,2.5,3,0,Math.PI*2);X.stroke();
      break;
    case 'smasher':
      // Rocket launcher — heavy military
      X.fillStyle='#2a2a30';X.fillRect(-14,-6,8,12); // arm mount
      // Body
      drawRoundRect(-6,-8,26,16,3);
      const rg=X.createLinearGradient(-6,-8,-6,8);
      rg.addColorStop(0,'#1a1a1e');rg.addColorStop(0.5,'#333340');rg.addColorStop(1,'#1a1a1e');
      X.fillStyle=rg;X.fill();X.strokeStyle='#555';X.lineWidth=0.8;X.stroke();
      // Red strips
      X.fillStyle='rgba(255,40,40,0.6)';X.fillRect(-4,-8,22,1.2);X.fillRect(-4,6.8,22,1.2);
      // Launch tube
      X.fillStyle='#0a0a10';
      X.beginPath();X.arc(20,0,5,0,Math.PI*2);X.fill();
      X.strokeStyle='#666';X.lineWidth=0.5;X.stroke();
      // Scope
      X.beginPath();X.arc(6,-10,1.5,0,Math.PI*2);X.fillStyle='#cc0000';X.fill();
      break;
    case 'gojo':
      // Red orb
      X.beginPath();X.arc(-6,-3,4,0,Math.PI*2);
      X.fillStyle='#cc2222';X.fill();
      X.shadowColor='#ff2222';X.shadowBlur=4;X.fill();X.shadowBlur=0;
      // Blue orb
      X.beginPath();X.arc(6,3,4,0,Math.PI*2);
      X.fillStyle='#2244cc';X.fill();
      X.shadowColor='#2244ff';X.shadowBlur=4;X.fill();X.shadowBlur=0;
      // Purple center
      X.beginPath();X.arc(14,0,3,0,Math.PI*2);
      X.fillStyle='#9944ff';X.fill();
      X.shadowColor='#9944ff';X.shadowBlur=3;X.fill();X.shadowBlur=0;
      break;
    case 'choso':
      // Blood blade — dark red sword shape
      X.beginPath();X.moveTo(-4,-3);X.lineTo(18,0);X.lineTo(-4,3);X.closePath();
      const cbg=X.createLinearGradient(-4,0,18,0);
      cbg.addColorStop(0,'#660000');cbg.addColorStop(0.5,'#cc0000');cbg.addColorStop(1,'#ff2222');
      X.fillStyle=cbg;X.fill();
      X.shadowColor='#ff0000';X.shadowBlur=4;X.fill();X.shadowBlur=0;
      // Blood droplets
      X.beginPath();X.arc(-8,-4,3,0,Math.PI*2);X.fillStyle='#cc0000';X.fill();
      X.beginPath();X.arc(-8,4,3,0,Math.PI*2);X.fillStyle='#880000';X.fill();
      break;
    case 'toji':
      // 3-section staff — red with chain links
      X.fillStyle='#cc2222';X.fillRect(-2,-2,18,4);
      X.strokeStyle='#888';X.lineWidth=1.5;
      X.beginPath();X.arc(4,0,2.5,0,Math.PI*2);X.stroke();
      X.beginPath();X.arc(10,0,2.5,0,Math.PI*2);X.stroke();
      X.fillStyle='#ff3333';
      X.beginPath();X.arc(-2,0,2.5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(16,0,2.5,0,Math.PI*2);X.fill();
      break;
    case 'mechamaru':
      // Drill arm — mechanical with drill tip
      X.fillStyle='#4a6a4a';X.fillRect(-6,-4,12,8);
      X.strokeStyle='#5a8a5a';X.lineWidth=0.8;X.strokeRect(-6,-4,12,8);
      // Drill cone
      X.beginPath();X.moveTo(6,-5);X.lineTo(18,0);X.lineTo(6,5);X.closePath();
      const mg=X.createLinearGradient(6,0,18,0);
      mg.addColorStop(0,'#888');mg.addColorStop(1,'#aaa');
      X.fillStyle=mg;X.fill();
      X.strokeStyle='#555';X.lineWidth=0.5;X.stroke();
      // Green LED
      X.fillStyle='#44ff44';X.fillRect(-4,-4,8,1);
      X.shadowColor='#44ff44';X.shadowBlur=3;X.fillRect(-4,-4,8,1);X.shadowBlur=0;
      break;
    case 'kashimo':
      // Bo staff — brown with metal bands + rounded ends
      X.fillStyle='#8B4513';X.fillRect(-6,-2,28,4);
      // Rounded ends
      X.beginPath();X.arc(-6,0,2,0,Math.PI*2);X.fillStyle='#6a3410';X.fill();
      X.beginPath();X.arc(22,0,2,0,Math.PI*2);X.fillStyle='#a0703a';X.fill();
      // Metal bands
      X.fillStyle='#888';X.fillRect(-2,-3,2,6);X.fillRect(10,-3,2,6);X.fillRect(18,-3,2,6);
      // Lightning crackle
      X.strokeStyle='#ffcc00';X.lineWidth=1;
      X.shadowColor='#ffcc00';X.shadowBlur=3;
      X.beginPath();X.moveTo(24,0);X.lineTo(28,-3);X.lineTo(26,1);X.lineTo(30,0);X.stroke();
      X.shadowBlur=0;
      break;
    case 'nanami':
      // Bandage-wrapped blade
      X.fillStyle='#3a3028';X.fillRect(-8,-3,8,6);
      X.beginPath();X.moveTo(0,-4);X.lineTo(20,-2);X.lineTo(23,0);X.lineTo(20,2);X.lineTo(0,4);X.closePath();
      X.fillStyle='#e8dcc0';X.fill();X.strokeStyle='#c8b898';X.lineWidth=0.5;X.stroke();
      // Bandage wrap lines
      X.strokeStyle='#b8a878';X.lineWidth=0.5;
      for(let i=0;i<4;i++){X.beginPath();X.moveTo(2+i*5,-4);X.lineTo(4+i*5,4);X.stroke();}
      // Metal tip
      X.fillStyle='#999';X.beginPath();X.moveTo(18,-1.5);X.lineTo(23,0);X.lineTo(18,1.5);X.closePath();X.fill();
      break;
    case 'ryu':
      // Pompadour cannon
      X.fillStyle='#8b4513';X.fillRect(-4,-3,10,6);
      X.fillStyle='#995533';X.fillRect(6,-5,20,10);
      X.strokeStyle='#553311';X.lineWidth=0.5;X.strokeRect(6,-5,20,10);
      X.fillStyle='#331100';X.beginPath();X.arc(26,0,3,0,Math.PI*2);X.fill();
      X.fillStyle='#ff8844';X.beginPath();X.arc(26,0,1.5,0,Math.PI*2);X.fill();
      X.shadowColor='#ff8844';X.shadowBlur=3;X.fill();X.shadowBlur=0;
      break;
  }
  X.restore();
}

function drawTitle(){
  clearBtns();X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  X.strokeStyle='#1a1a3a';X.lineWidth=1;
  for(let i=0;i<W;i+=40){X.beginPath();X.moveTo(i,0);X.lineTo(i,H);X.stroke();}
  for(let i=0;i<H;i+=40){X.beginPath();X.moveTo(0,i);X.lineTo(W,i);X.stroke();}

  const titleY=isMobile?180:200;
  X.font='bold '+(isMobile?'32':'48')+'px Consolas,Courier New,monospace';
  X.textAlign='center';X.textBaseline='middle';
  X.shadowColor='#7b68ee';X.shadowBlur=20;
  X.fillStyle='#7b68ee';
  X.fillText('BALL BATTLE',W/2,titleY-25);
  X.fillText('ARENA',W/2,titleY+25);
  X.shadowBlur=0;

  X.font=(isMobile?'13':'16')+'px Consolas,Courier New,monospace';
  X.fillStyle='#888';
  X.fillText('Cyberpunk Combat',W/2,titleY+65);

  const t=Date.now()*0.002;
  const charSpacing=Math.min(isMobile?72:90,Math.floor((W-80)/CHARS.length));
  const charOffset=(CHARS.length-1)/2;
  CHARS.forEach((ch,i)=>{
    const bx=W/2+(i-charOffset)*charSpacing;
    const by=titleY+130+Math.sin(t+i)*10;
    const br=isMobile?28:32;
    const g=X.createRadialGradient(bx-br*0.2,by-br*0.2,br*0.1,bx,by,br);
    g.addColorStop(0,lighten(ch.color,40));g.addColorStop(1,ch.color);
    X.beginPath();X.arc(bx,by,br,0,Math.PI*2);X.fillStyle=g;X.fill();
    X.strokeStyle=darken(ch.color,20);X.lineWidth=1.5;X.stroke();
    X.beginPath();X.arc(bx-br*0.25,by-br*0.25,br*0.15,0,Math.PI*2);X.fillStyle='rgba(255,255,255,0.3)';X.fill();
    drawMiniWeapon(bx+br+4,by,ch.id,br*1.2);
  });

  const btnW=200,btnH=50;
  addBtn('start',W/2-btnW/2,titleY+190,btnW,btnH,'1v1 BATTLE','#7b68ee',()=>{gameMode='1v1';screen='select';p1Char=0;p2Char=1;p1Elem=0;p2Elem=0;});
  addBtn('boss',W/2-btnW/2,titleY+250,btnW,btnH,'BOSS FIGHT','#cc4444',()=>{gameMode='boss';screen='bossSelect';teamChar1=0;teamChar2=1;teamChar3=2;teamElem1=0;teamElem2=0;teamElem3=0;bossElem=0;bossChar=CHARS.findIndex(c=>c.id==='smasher');_bossSelPage=1;_bossSelSlot=1;});
  X.font='11px Consolas,Courier New,monospace';X.fillStyle='#444';X.textAlign='center';
  X.fillText('P10 v7.2 // soloforte.ai',W/2,H-20);
  buttons.forEach(drawBtn);
}

function drawBallPreview(bx,by,r,ch){
  const g=X.createRadialGradient(bx-r*0.2,by-r*0.2,r*0.1,bx,by,r);
  g.addColorStop(0,lighten(ch.color,40));g.addColorStop(1,ch.color);
  X.beginPath();X.arc(bx,by,r,0,Math.PI*2);X.fillStyle=g;X.fill();
  X.strokeStyle=darken(ch.color,20);X.lineWidth=r>15?1.5:1;X.stroke();
  X.beginPath();X.arc(bx-r*0.25,by-r*0.25,r*0.15,0,Math.PI*2);
  X.fillStyle='rgba(255,255,255,0.3)';X.fill();
  const weaponScale=r<18?r*0.8:r*1.3;
  drawMiniWeapon(bx+r+2,by,ch.id,weaponScale);
}

function drawSelectDesktop(){
  // Adaptive grid: auto-calculate cols/card size for any roster
  // Sort display: normal chars first, bosses at bottom
  const displayOrder=[...CHARS.keys()].sort((a,b)=>(CHARS[a].isBoss?1:0)-(CHARS[b].isBoss?1:0));
  const gapX=10,gapY=8,padX=15,headerH=60,bottomH=150;
  const availW=W-padX*2,availH=H-headerH-bottomH;
  const n=CHARS.length;
  const maxCols=Math.floor((availW+gapX)/(115+gapX));
  const cols=Math.min(n,Math.max(2,Math.min(maxCols,Math.ceil(Math.sqrt(n)))));
  const rows=Math.ceil(n/cols);
  const cardW=Math.floor((availW-(cols-1)*gapX)/cols);
  const cardH=Math.min(Math.floor((availH-(rows-1)*gapY)/rows),170);
  const totalW=cols*cardW+(cols-1)*gapX;
  const startX=(W-totalW)/2;
  const cardY=headerH;
  X.font='bold 14px Consolas,Courier New,monospace';
  X.textAlign='left';X.fillStyle='#4488ff';X.fillText('P1 — Left click',startX,cardY-5);
  X.textAlign='right';X.fillStyle='#ff4444';X.fillText('P2 — Right click',startX+totalW,cardY-5);

  displayOrder.forEach((i,di)=>{
    const ch=CHARS[i];
    const row=Math.floor(di/cols),col=di%cols;
    const cx=startX+col*(cardW+gapX),cy=cardY+row*(cardH+gapY);
    const isP1=p1Char===i,isP2=p2Char===i;
    drawRoundRect(cx,cy,cardW,cardH,8);
    X.fillStyle=isP1?'#112244':isP2?'#441122':'#111128';X.fill();
    X.strokeStyle=isP1?'#4488ff':isP2?'#ff4444':ch.color+'66';X.lineWidth=isP1||isP2?3:1.5;X.stroke();
    if(isP1){X.font='bold 11px Consolas,monospace';X.fillStyle='#4488ff';X.textAlign='left';X.fillText('P1',cx+8,cy+16);}
    if(isP2){X.font='bold 11px Consolas,monospace';X.fillStyle='#ff4444';X.textAlign='right';X.fillText('P2',cx+cardW-8,cy+16);}
    const compact=cardH<140;
    const ballR=compact?18:24;
    drawBallPreview(cx+cardW/2,cy+(compact?30:40),ballR,ch);
    X.font='bold '+(compact?'10':'11')+'px Consolas,monospace';X.textAlign='center';X.fillStyle='#fff';X.fillText(ch.name,cx+cardW/2,cy+(compact?55:72));
    X.font=(compact?'8':'9')+'px Consolas,monospace';X.fillStyle=ch.color;X.fillText(ch.playstyle,cx+cardW/2,cy+(compact?66:85));
    if(cardH>=100){
      X.font='9px Consolas,monospace';X.textAlign='left';
      const statGap=compact?10:13;
      const sx=cx+10,sy=cy+(compact?78:100);
      const stats=[['HP',ch.stats.hp],['ATK',ch.stats.atk],['SPD',ch.stats.speed.toFixed(1)],['RNG',ch.stats.range],['DEF',ch.stats.def]];
      stats.forEach((s,si)=>{
        X.fillStyle='#888';X.fillText(s[0]+':',sx,sy+si*statGap);X.fillStyle='#ccc';X.fillText(''+s[1],sx+30,sy+si*statGap);
        const barVal=s[0]==='HP'?ch.stats.hp/750:s[0]==='RNG'?ch.stats.range/200:s[0]==='SPD'?ch.stats.speed/8:s[0]==='ATK'?ch.stats.atk/35:ch.stats.def/10;
        X.fillStyle='#222';X.fillRect(sx+55,sy+si*statGap-7,cardW-78,5);X.fillStyle=ch.color;X.fillRect(sx+55,sy+si*statGap-7,(cardW-78)*Math.min(1,barVal),5);
      });
    }
    addBtn('p1c'+i,cx,cy,cardW/2,cardH,'','transparent',()=>{p1Char=i;});
    addBtn('p2c'+i,cx+cardW/2,cy,cardW/2,cardH,'','transparent',()=>{p2Char=i;});
  });

  const gridBottom=cardY+rows*(cardH+gapY);
  const elemY=gridBottom+10;
  const epW=Math.min(260,W/2-20); // element picker width clamped to half screen
  X.font='bold 13px Consolas,monospace';X.textAlign='center';
  X.fillStyle='#4488ff';X.fillText('P1 ELEMENT',W/4,elemY);
  drawElementPicker(W/4-epW/2,elemY+10,p1Elem,'p1e',(i)=>{p1Elem=i;});
  X.fillStyle='#ff4444';X.fillText('P2 ELEMENT',W*3/4,elemY);
  drawElementPicker(W*3/4-epW/2,elemY+10,p2Elem,'p2e',(i)=>{p2Elem=i;});

  const comboY=elemY+70;
  X.font='11px Consolas,monospace';
  if(p1Elem>0){const key=CHARS[p1Char].id+'_'+ELEMENTS[p1Elem].id;X.fillStyle=ELEMENTS[p1Elem].color;X.textAlign='center';X.fillText('P1: '+(COMBO_EFFECTS[key]||''),W/4,comboY);}
  if(p2Elem>0){const key=CHARS[p2Char].id+'_'+ELEMENTS[p2Elem].id;X.fillStyle=ELEMENTS[p2Elem].color;X.textAlign='center';X.fillText('P2: '+(COMBO_EFFECTS[key]||''),W*3/4,comboY);}

  addBtn('battle',W/2-100,H-70,200,48,'BATTLE!','#ff4444',startBattle);
  addBtn('back',20,H-50,80,35,'Back','#666',()=>{screen='title';});
  buttons.forEach(b=>{if(b.id.startsWith('p1c')||b.id.startsWith('p2c'))return;drawBtn(b);});
}

function drawSelectMobile(){
  // Adaptive grid: auto-calculate for any roster size
  const gapX=5,gapY=3,padX=5,headerH=42,bottomH=105;
  const availW=W-padX*2;
  const totalAvailH=H-headerH-bottomH;
  const gridGap=10;
  const singleGridH=(totalAvailH-gridGap)/2;
  const n=CHARS.length;
  const maxCols=Math.floor((availW+gapX)/(120+gapX));
  const cols=Math.min(n,Math.max(2,Math.min(maxCols,Math.ceil(Math.sqrt(n)))));
  const rows=Math.ceil(n/cols);
  const cardW=Math.floor((availW-(cols-1)*gapX)/cols);
  const cardH=Math.min(Math.floor((singleGridH-10-(rows-1)*gapY)/rows),95);
  const totalW=cols*cardW+(cols-1)*gapX;
  const startX=(W-totalW)/2;

  function drawCharGrid(label,labelColor,yStart,selected,prefix,cb){
    X.font='bold 11px Consolas,monospace';X.textAlign='center';
    X.fillStyle=labelColor;X.fillText(label,W/2,yStart);
    const gridY=yStart+5;
    const mobileOrder=[...CHARS.keys()].sort((a,b)=>(CHARS[a].isBoss?1:0)-(CHARS[b].isBoss?1:0));
    mobileOrder.forEach((i,di)=>{
      const ch=CHARS[i];
      const row=Math.floor(di/cols),col=di%cols;
      const cx=startX+col*(cardW+gapX),cy=gridY+row*(cardH+gapY);
      const isSel=selected===i;
      drawRoundRect(cx,cy,cardW,cardH,5);
      X.fillStyle=isSel?(labelColor==='#4488ff'?'#112244':'#441122'):'#111128';X.fill();
      X.strokeStyle=isSel?labelColor:ch.color+'44';X.lineWidth=isSel?2.5:1;X.stroke();
      const compact=cardH<65;
      drawBallPreview(cx+20,cy+(compact?18:20),compact?8:10,ch);
      X.font='bold 9px Consolas,monospace';X.textAlign='left';X.fillStyle='#fff';
      const shortName=ch.name.length>12?ch.name.slice(0,12):ch.name;
      X.fillText(shortName,cx+38,cy+(compact?14:16));
      X.font='8px Consolas,monospace';X.fillStyle=ch.color;X.fillText(ch.playstyle,cx+38,cy+(compact?24:27));
      X.fillStyle='#888';
      if(compact){
        X.fillText('HP:'+ch.stats.hp+' A:'+ch.stats.atk+' S:'+ch.stats.speed.toFixed(1),cx+6,cy+36);
        X.fillText('R:'+ch.stats.range+' D:'+ch.stats.def+' C:'+ch.stats.crit+'%',cx+6,cy+46);
      } else {
        X.fillText('HP:'+ch.stats.hp+' ATK:'+ch.stats.atk,cx+8,cy+42);
        X.fillText('SPD:'+ch.stats.speed.toFixed(1)+' RNG:'+ch.stats.range,cx+8,cy+52);
        X.fillText('DEF:'+ch.stats.def+' CRT:'+ch.stats.crit+'%',cx+8,cy+62);
      }
      if(isSel){X.font='bold 9px Consolas,monospace';X.fillStyle=labelColor;X.textAlign='right';X.fillText(label,cx+cardW-6,cy+14);}
      addBtn(prefix+i,cx,cy,cardW,cardH,'','transparent',()=>{cb(i);});
    });
    return gridY+rows*(cardH+gapY);
  }

  const p1Bottom=drawCharGrid('P1','#4488ff',headerH,p1Char,'p1m',(i)=>{p1Char=i;});
  const p2Bottom=drawCharGrid('P2','#ff4444',p1Bottom+gridGap,p2Char,'p2m',(i)=>{p2Char=i;});

  const elemY=p2Bottom+6;
  X.font='bold 10px Consolas,monospace';X.textAlign='center';
  X.fillStyle='#4488ff';X.fillText('P1 ELEMENT',W/4+10,elemY);
  drawElementPickerMobile(10,elemY+8,p1Elem,'p1em',(i)=>{p1Elem=i;});
  X.fillStyle='#ff4444';X.fillText('P2 ELEMENT',W*3/4-10,elemY);
  drawElementPickerMobile(W/2+10,elemY+8,p2Elem,'p2em',(i)=>{p2Elem=i;});

  // Combo effect text (parity with desktop)
  const comboY=elemY+48;
  X.font='8px Consolas,monospace';
  if(p1Elem>0){const key=CHARS[p1Char].id+'_'+ELEMENTS[p1Elem].id;X.fillStyle=ELEMENTS[p1Elem].color;X.textAlign='center';X.fillText(COMBO_EFFECTS[key]||'',W/4+10,comboY);}
  if(p2Elem>0){const key=CHARS[p2Char].id+'_'+ELEMENTS[p2Elem].id;X.fillStyle=ELEMENTS[p2Elem].color;X.textAlign='center';X.fillText(COMBO_EFFECTS[key]||'',W*3/4-10,comboY);}

  addBtn('battle',W/2-80,H-55,160,40,'BATTLE!','#ff4444',startBattle);
  addBtn('back',10,H-48,60,32,'Back','#666',()=>{screen='title';});
  buttons.forEach(b=>{if(b.id.startsWith('p1m')||b.id.startsWith('p2m'))return;drawBtn(b);});
}

function drawElementIcon(cx,cy,elemId,size){
  const s=size;
  switch(elemId){
    case 'fire':
      // Flame icon
      X.beginPath();X.moveTo(cx,cy-s);
      X.quadraticCurveTo(cx+s*0.6,cy-s*0.3,cx+s*0.5,cy+s*0.2);
      X.quadraticCurveTo(cx+s*0.3,cy-s*0.1,cx+s*0.2,cy+s*0.5);
      X.quadraticCurveTo(cx+s*0.1,cy+s*0.8,cx,cy+s);
      X.quadraticCurveTo(cx-s*0.1,cy+s*0.8,cx-s*0.2,cy+s*0.5);
      X.quadraticCurveTo(cx-s*0.3,cy-s*0.1,cx-s*0.5,cy+s*0.2);
      X.quadraticCurveTo(cx-s*0.6,cy-s*0.3,cx,cy-s);
      X.closePath();
      const fg=X.createLinearGradient(cx,cy-s,cx,cy+s);
      fg.addColorStop(0,'#ff4400');fg.addColorStop(0.4,'#ff6600');fg.addColorStop(1,'#ffaa00');
      X.fillStyle=fg;X.fill();
      // Inner flame
      X.beginPath();X.moveTo(cx,cy-s*0.4);
      X.quadraticCurveTo(cx+s*0.2,cy+s*0.1,cx,cy+s*0.6);
      X.quadraticCurveTo(cx-s*0.2,cy+s*0.1,cx,cy-s*0.4);
      X.fillStyle='#ffdd44';X.fill();
      break;
    case 'electric':
      // Lightning bolt
      X.beginPath();
      X.moveTo(cx+s*0.1,cy-s);X.lineTo(cx-s*0.4,cy+s*0.1);X.lineTo(cx,cy);
      X.lineTo(cx-s*0.1,cy+s);X.lineTo(cx+s*0.4,cy-s*0.1);X.lineTo(cx,cy);
      X.closePath();
      X.fillStyle='#ffcc00';X.fill();
      X.strokeStyle='#ff9900';X.lineWidth=1;X.stroke();
      // Inner bright
      X.fillStyle='#ffffaa';X.fillRect(cx-1,cy-s*0.3,2,s*0.6);
      break;
    case 'toxic':
      // Poison droplet / skull-ish
      X.beginPath();X.arc(cx,cy-s*0.2,s*0.55,0,Math.PI*2);
      X.fillStyle='#aa44cc';X.fill();
      X.strokeStyle='#cc66ee';X.lineWidth=1;X.stroke();
      // Drip
      X.beginPath();X.moveTo(cx-s*0.15,cy+s*0.3);
      X.quadraticCurveTo(cx,cy+s*1.1,cx+s*0.15,cy+s*0.3);
      X.fillStyle='#aa44cc';X.fill();
      // Skull eyes
      X.fillStyle='#1a0a2a';
      X.beginPath();X.arc(cx-s*0.2,cy-s*0.25,s*0.12,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(cx+s*0.2,cy-s*0.25,s*0.12,0,Math.PI*2);X.fill();
      break;
    case 'cryo':
      // Snowflake / ice crystal
      X.strokeStyle='#77ddff';X.lineWidth=1.5;
      for(let i=0;i<6;i++){
        const a=Math.PI*2*i/6;
        X.beginPath();X.moveTo(cx,cy);
        X.lineTo(cx+Math.cos(a)*s,cy+Math.sin(a)*s);X.stroke();
        // Branch tips
        const bx2=cx+Math.cos(a)*s*0.65,by2=cy+Math.sin(a)*s*0.65;
        X.beginPath();X.moveTo(bx2,by2);
        X.lineTo(bx2+Math.cos(a+0.5)*s*0.3,by2+Math.sin(a+0.5)*s*0.3);X.stroke();
        X.beginPath();X.moveTo(bx2,by2);
        X.lineTo(bx2+Math.cos(a-0.5)*s*0.3,by2+Math.sin(a-0.5)*s*0.3);X.stroke();
      }
      // Center dot
      X.beginPath();X.arc(cx,cy,s*0.15,0,Math.PI*2);X.fillStyle='#aaeeff';X.fill();
      break;
  }
}
