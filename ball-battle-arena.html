      shakeTimer=25;shakeAmt=16;
      triggerScreenFlash('#9944ff',15);triggerHitFreeze(8);
      addLog('INFINITE VOID PURPLE!');
    }
    // End domain
    if(f.gojoDomainTimer<=0){
      f.gojoDomainActive=false;
      f.gojoDomainBg=false;
      // Unfreeze all
      fighters.forEach(other=>{
        if(other&&other!==f){
          other.stunTimer=Math.min(other.stunTimer,10);
          other.sandyTimeScale=1;
        }
      });
      addLog('Domain collapsed');
      spawnBurst(f.x,f.y,'#5577ff',15,5);
    }
  }
}

function updateRelicSmasher(f,enemy,dt){
  // Mortar barrage from back-mounted artillery + melee fists when close
  if(!f._smasherMortarCD)f._smasherMortarCD=0;
  f._smasherMortarCD-=dt;
  // Colorful relic aura particles + afterimage trail
  if(battleTime%3<1){
    const colors=['#cc4444','#ff6644','#ffcc00'];
    spawnParticle(f.x+rand(-15,15),f.y+rand(-15,15),pick(colors),0,-1,12,2);
  }
  // Spawn afterimage every 4 frames
  if(battleTime%4<1){
    if(!f.smasherAfterimages)f.smasherAfterimages=[];
    f.smasherAfterimages.push({x:f.x,y:f.y,alpha:0.6});
  }
  // Fade afterimages
  for(let i=(f.smasherAfterimages||[]).length-1;i>=0;i--){
    f.smasherAfterimages[i].alpha-=0.02*dt;
    if(f.smasherAfterimages[i].alpha<=0)f.smasherAfterimages.splice(i,1);
  }
  // Fire mortar rounds at enemy positions periodically
  if(f._smasherMortarCD<=0){
    f._smasherMortarCD=75; // fire every ~1.25s
    f._smasherMortarCount=(f._smasherMortarCount||0)+1;
    const enemies=fighters.filter(e=>e.side!==f.side&&e.alive);
    if(enemies.length>0){
      // Pick a random alive enemy to target
      const target=pick(enemies);
      // Mortar warning zone at target position (with slight prediction)
      const tx=target.x+target.vx*15+rand(-30,30);
      const ty=target.y+target.vy*15+rand(-30,30);
      smasherWarnings.push({x:tx,y:ty,radius:65,life:50,maxLife:50});
      SFX.warning();
      // Delayed mortar impact (mortar lands after warning fades)
      const chaos=getChaosLevel(f);
      const mortarDmg=f.atk*(1.5+chaos*0.15);
      setTimeout(()=>{
        if(!f.alive||!f.specialActive)return;
        spawnExplosion(tx,ty,65+chaos*3,'#ff4444',mortarDmg,f,null);
        spawnBurst(tx,ty,'#ff6644',25,8);
        spawnBurst(tx,ty,'#ffaa44',15,5);
        SFX.slamImpact();
        // Knockback enemies near impact
        fighters.forEach(e=>{
          if(e.side===f.side||!e.alive)return;
          const d=dist(e,{x:tx,y:ty});
          if(d<65+chaos*3){
            dealDamage(f,e,mortarDmg,true);
            const ka=angle({x:tx,y:ty},e);
            e.vx+=Math.cos(ka)*(8+chaos*0.5);e.vy+=Math.sin(ka)*(8+chaos*0.5);
          }
        });
        // Fire element: fire zone at impact
        if(f.elementActive&&f.elem.id==='fire'){
          fireZones.push({x:tx,y:ty,radius:45,life:240,maxLife:240,owner:f,dmg:f.atk*0.08});
        }
        wallCracks.push({x:tx,y:ty,size:35,life:200,maxLife:200,crackLines:Array.from({length:6},()=>0.5+Math.random()*0.5)});
      },50*1000/60); // ~50 frames delay matching warning
      // Every 3rd mortar fires a cluster (multiple impacts)
      if(f._smasherMortarCount%3===0){
        for(let i=0;i<2;i++){
          const ox=tx+rand(-50,50),oy=ty+rand(-50,50);
          smasherWarnings.push({x:ox,y:oy,radius:45,life:60,maxLife:60});
          setTimeout(()=>{
            if(!f.alive||!f.specialActive)return;
            spawnExplosion(ox,oy,45,'#ff6644',mortarDmg*0.6,f,null);
            spawnBurst(ox,oy,'#ffaa44',10,4);
            fighters.forEach(e=>{
              if(e.side===f.side||!e.alive)return;
              if(dist(e,{x:ox,y:oy})<45){
                dealDamage(f,e,mortarDmg*0.6,true);
                const ka=angle({x:ox,y:oy},e);
                e.vx+=Math.cos(ka)*6;e.vy+=Math.sin(ka)*6;
              }
            });
          },60*1000/60);
        }
      }
    }
  }
  // Glide along arena edge during ult — menacing patrol
  if(!f._smasherEdgePhase)f._smasherEdgePhase=0; // 0=top,1=right,2=bottom,3=left
  if(!f._smasherGlideT)f._smasherGlideT=0;
  const margin=f.radius+10;
  const edgeCorners=[
    {x:ARENA.x+margin,y:ARENA.y+margin}, // top-left
    {x:ARENA.x+ARENA.w-margin,y:ARENA.y+margin}, // top-right
    {x:ARENA.x+ARENA.w-margin,y:ARENA.y+ARENA.h-margin}, // bottom-right
    {x:ARENA.x+margin,y:ARENA.y+ARENA.h-margin}, // bottom-left
  ];
  const glideFrom=edgeCorners[f._smasherEdgePhase%4];
  const glideTo=edgeCorners[(f._smasherEdgePhase+1)%4];
  f._smasherGlideT+=0.012*dt; // glide speed
  if(f._smasherGlideT>=1){f._smasherGlideT=0;f._smasherEdgePhase=(f._smasherEdgePhase+1)%4;}
  const gt=Math.min(1,f._smasherGlideT);
  f.x=lerp(glideFrom.x,glideTo.x,gt);
  f.y=lerp(glideFrom.y,glideTo.y,gt);
  // Afterimage trail
  if(battleTime%3<1){if(!f.smasherAfterimages)f.smasherAfterimages=[];f.smasherAfterimages.push({x:f.x,y:f.y,alpha:0.6});}
  // Melee fists+blades when enemies are close — BIGGER range + MORE knockback
  if(f._smasherRelicMelee){
    const enemies=fighters.filter(e=>e.side!==f.side&&e.alive);
    enemies.forEach(e=>{
      if(dist(f,e)<f.radius+e.radius+65){ // bigger range (was 40)
        if(!f._smasherRelicMeleeCD)f._smasherRelicMeleeCD=0;
        if(f._smasherRelicMeleeCD<=0){
          f._smasherRelicMeleeCD=25;
          const chaos=getChaosLevel(f);
          const fistDmg=f.atk*(1.0+chaos*0.1);
          dealDamage(f,e,fistDmg,true);
          const ka=angle(f,e);
          e.vx+=Math.cos(ka)*(10+chaos*0.5);e.vy+=Math.sin(ka)*(10+chaos*0.5); // more knockback (was 6)
          SFX.punch();
          spawnBurst(e.x,e.y,'#ff4444',12,5);
          f.weaponExtend=1;f.weaponFlash=8;
        }
      }
    });
    if(f._smasherRelicMeleeCD>0)f._smasherRelicMeleeCD-=dt;
  }
  // Keep enemies slowed during ult
  fighters.forEach(other=>{
    if(other&&other!==f&&other.alive)other.sandyTimeScale=Math.min(other.sandyTimeScale,0.3);
  });
  // End of relic — FINALE: fly up, hover, then devastating slam
  if(f.specialTimer<=0&&!f._smasherFinale){
    f._smasherFinale=true;
    f._smasherFinalePhase='rise'; // rise → hover → slam
    f._smasherFinaleTimer=0;
    f._smasherFinaleY=f.y; // original Y
    f._smasherSlamTarget=enemy&&enemy.alive?{x:enemy.x,y:enemy.y}:{x:f.x,y:f.y+80};
    f._smasherRelicMelee=false;
    SFX.warning();
    spawnDmgNum(f.x,f.y-f.radius-30,'RISING...','#ff4444',true);
    addLog((f.side===0?'P1':'P2')+' Smasher RISING!');
  }
  if(f._smasherFinale){
    f._smasherFinaleTimer+=dt;
    if(f._smasherFinalePhase==='rise'){
      // Rise up (30 frames = 0.5s)
      f.y-=3*dt;f.vx=0;f.vy=0;
      if(battleTime%3<1)spawnParticle(f.x,f.y+f.radius,'#ff4444',rand(-1,1),2,12,3);
      if(f._smasherFinaleTimer>=30){
        f._smasherFinalePhase='hover';
        f._smasherFinaleTimer=0;
        spawnDmgNum(f.x,f.y-f.radius-20,'HOVERING','#ffcc00',true);
      }
    } else if(f._smasherFinalePhase==='hover'){
      // Hover for 2s (120 frames), slight bobbing
      f.vx=0;f.vy=0;
      f.y+=Math.sin(f._smasherFinaleTimer*0.1)*0.3;
      // Warning target on ground
      const st=f._smasherSlamTarget;
      if(st&&battleTime%4<1){
        spawnParticle(st.x+rand(-30,30),st.y+rand(-30,30),'#ff2222',0,0,10,3);
      }
      if(f._smasherFinaleTimer>=120){
        f._smasherFinalePhase='slam';
        f._smasherFinaleTimer=0;
        spawnDmgNum(f.x,f.y-f.radius-20,'INCOMING!','#ff0000',true);
      }
    } else if(f._smasherFinalePhase==='slam'){
      // Slam down fast (15 frames)
      const st=f._smasherSlamTarget;
      if(st){
        f.x+=(st.x-f.x)*0.2;
        f.y+=(st.y-f.y)*0.2+5;
      }
      f.vx=0;f.vy=0;
      if(f._smasherFinaleTimer>=15){
        // IMPACT — massive AoE damage
        const chaos=getChaosLevel(f);
        const slamDmg=f.atk*(3.0+chaos*0.3);
        fighters.filter(e=>e.side!==f.side&&e.alive).forEach(e=>{
          if(dist(f,e)<120+chaos*5){
            dealDamage(f,e,slamDmg,true);
            const ka=angle(f,e);
            e.vx+=Math.cos(ka)*15;e.vy+=Math.sin(ka)*15;
          }
        });
        explosions.push({x:f.x,y:f.y,radius:0,maxRadius:120,color:'#ff4444',life:25,maxLife:25,dmg:0,owner:null,target:null,hit:true});
        explosions.push({x:f.x,y:f.y,radius:0,maxRadius:80,color:'#ffcc00',life:18,maxLife:18,dmg:0,owner:null,target:null,hit:true});
        spawnBurst(f.x,f.y,'#ff4444',40,12);
        spawnBurst(f.x,f.y,'#ffffff',20,6);
        shakeTimer=25;shakeAmt=16;
        triggerScreenFlash('#ff4444',10);triggerHitFreeze(6);
        SFX.megaExplosion();
        spawnDmgNum(f.x,f.y-f.radius-30,'GROUND SLAM!','#ff4444',true);
        addLog((f.side===0?'P1':'P2')+' DEVASTATING SLAM!');
        // End finale
        f._smasherFinale=false;
        f._smasherFinalePhase=null;
        // Restore enemy time scale
        fighters.forEach(other=>{
          if(other&&other!==f){
            const otherSandy=fighters.some(o=>o!==other&&o.alive&&o.char.id==='sandy'&&o.sandyActive);
            if(!otherSandy)other.sandyTimeScale=1;
          }
        });
        f.smasherAfterimages=[];
      }
    }
    // Keep special "active" during finale so movement code doesn't take over
    f.specialActive=true;
    f.specialTimer=1;
    return; // skip normal end-of-relic
  }
  if(f.specialTimer<=0){
    f._smasherRelicMelee=false;
    // Restore enemy time scale
    fighters.forEach(other=>{
      if(other&&other!==f){
        const otherSandy=fighters.some(o=>o!==other&&o.alive&&o.char.id==='sandy'&&o.sandyActive);
        if(!otherSandy)other.sandyTimeScale=1;
      }
    });
    f.smasherAfterimages=[];
    addLog((f.side===0?'P1':'P2')+' Smasher Protocol ended');
    spawnBurst(f.x,f.y,'#cc4444',10,4);
  }
}

// Choso continuous beam — runs independently of special
function updateChosoBeam(f,enemy,dt){
  // Piercing Blood freeze
  if(f.chosoPiercingFreeze>0){
    f.chosoPiercingFreeze-=dt;
    f.vx=0;f.vy=0;
  }
  // Continuous beam
  if(f.chosoBeamActive){
    f.chosoBeamTimer-=dt;
    f.vx=0;f.vy=0;
    // Slowly track beam toward enemy
    const targetAngle=angle(f,enemy);
    let diff=targetAngle-f.chosoBeamAngle;
    while(diff>Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    const trackSpeed=0.025+(f.elementActive&&f.elem.id==='electric'?0.02:0);
    f.chosoBeamAngle+=diff*trackSpeed*dt;
    f.weaponAngle=f.chosoBeamAngle;
    f.weaponFlash=5;
    // Beam hit detection — wide hitbox (beam is thick)
    if(f.chosoBeamHitCD<=0){
      const chaos=getChaosLevel(f);
      const beamLen=Math.round(450*(f._chosoRangeMult||1));
      const bx=f.x+Math.cos(f.chosoBeamAngle)*f.radius;
      const by=f.y+Math.sin(f.chosoBeamAngle)*f.radius;
      if(enemy.alive){
        const ex=enemy.x-bx,ey=enemy.y-by;
        const along=ex*Math.cos(f.chosoBeamAngle)+ey*Math.sin(f.chosoBeamAngle);
        if(along>0&&along<beamLen){
          const perp=Math.abs(-ex*Math.sin(f.chosoBeamAngle)+ey*Math.cos(f.chosoBeamAngle));
          if(perp<enemy.radius+18){ // wide hitbox
            const beamDmg=f.atk*(1.0+chaos*0.08);
            dealDamage(f,enemy,beamDmg);
            f.chosoBloodHits++;
            f.chosoBeamHitCD=12;
            spawnBurst(enemy.x,enemy.y,'#cc0000',8,4);
            enemy.vx+=Math.cos(f.chosoBeamAngle)*3;
            enemy.vy+=Math.sin(f.chosoBeamAngle)*3;
            if(f.elementActive&&f.elem.id==='toxic'&&f.chosoBloodHits>=5){
              f.chosoBloodHits=0;
              enemy.burnTimer=Math.max(enemy.burnTimer,180);
              enemy.burnDmg=Math.max(enemy.burnDmg,f.atk*0.15);
              spawnDmgNum(enemy.x,enemy.y-enemy.radius-25,'BLOOD POISON','#aa44cc',false);
            }
          }
        }
      }
    }
    if(f.chosoBeamHitCD>0)f.chosoBeamHitCD-=dt;
    // Beam particles along the ray
    if(battleTime%2<1){
      const d=Math.random()*400;
      spawnParticle(
        f.x+Math.cos(f.chosoBeamAngle)*(f.radius+d),
        f.y+Math.sin(f.chosoBeamAngle)*(f.radius+d),
        pick(['#cc0000','#ff2222','#880000']),0,0,5,2
      );
    }
    if(f.elementActive&&f.elem.id==='fire'&&battleTime%8<1){
      const sideA=f.chosoBeamAngle+(Math.random()-0.5)*0.3;
      spawnParticle(f.x+Math.cos(sideA)*f.radius,f.y+Math.sin(sideA)*f.radius,'#ff4400',Math.cos(sideA)*4,Math.sin(sideA)*4,5,3);
    }
    if(f.chosoBeamTimer<=0){
      f.chosoBeamActive=false;
      f.chosoBeamCooldown=360+rand(0,60); // 6-7 seconds cooldown
      f.chosoPiercingFreeze=0; // unfreeze — can move during cooldown
      spawnDmgNum(f.x,f.y-f.radius-20,'RECHARGING...','#880000',false);
    }
  }
  // Beam cooldown — Choso moves freely while waiting to fire again
  if(f.chosoBeamCooldown>0){
    f.chosoBeamCooldown-=dt;
    if(f.chosoBeamCooldown<=0){
      f.chosoPiercingFreeze=0;
    }
  }
}

function updateRelicChoso(f,enemy,dt){
  // Blood Edge melee timer
  if(f.chosoBloodEdge){
    f.chosoEdgeTimer-=dt;
    // Blood aura particles
    if(battleTime%3<1){
      spawnParticle(f.x+rand(-15,15),f.y+rand(-15,15),pick(['#8b0000','#cc0000','#ff4444']),0,-1,12,2);
    }
    // Dagger form: slightly boost speed continuously
    if(f.chosoEdgeForm==='dagger'){
      const spd=Math.hypot(f.vx,f.vy);
      if(spd>0.5){
        const a=Math.atan2(f.vy,f.vx);
        f.vx+=Math.cos(a)*0.15;f.vy+=Math.sin(a)*0.15;
      }
    }
    if(f.chosoEdgeTimer<=0){
      // Blood Edge ends — detonate ALL remaining orbs simultaneously (Supernova Compress)
      f.chosoBloodEdge=false;
      const chaos=getChaosLevel(f);
      let orbsDetonated=0;
      f.chosoOrbs.forEach(orb=>{
        if(orb.alive){
          chosoDetonateOrb(f,orb,enemy,chaos);
          orbsDetonated++;
        }
      });
      if(orbsDetonated>0){
        SFX.megaExplosion();
        shakeTimer=15;shakeAmt=10;
        triggerScreenFlash('#cc0000',10);triggerHitFreeze(5);
        addLog('SUPERNOVA COMPRESS! ('+orbsDetonated+' orbs)');
      }
    }
  }
  // Flowing Red Scale buff duration
  if(f.chosoRedScaleActive){
    f.chosoRedScaleTimer-=dt;
    // Damage reduction during Red Scale: take 20% less
    // (applied in dealDamage via a check)
    if(f.chosoRedScaleTimer<=0){
      f.chosoRedScaleActive=false;
      f.atk=f.baseAtk;
      f.speed=f.baseSpeed;
      f.chosoBloodEdge=false;
      addLog((f.side===0?'P1':'P2')+' Red Scale faded');
      spawnBurst(f.x,f.y,'#8b0000',8,4);
    }
  }
  // Chain reaction update — orbs explode one at a time, accelerating
  if(f.chosoChainQueue.length>0){
    f.chosoChainTimer-=dt;
    if(f.chosoChainTimer<=0){
      // Find next alive orb in queue
      let nextOrb=null;
      while(f.chosoChainQueue.length>0&&!nextOrb){
        const candidate=f.chosoChainQueue.shift();
        if(candidate.alive)nextOrb=candidate;
      }
      if(nextOrb){
        f.chosoChainIdx++;
        const chaos=f._chosoChainChaos||getChaosLevel(f);
        const enemy=f._chosoChainEnemy;
        // Chain detonation with escalating label
        spawnDmgNum(nextOrb.x,nextOrb.y-15,'CHAIN x'+f.chosoChainIdx,'#ff6644',f.chosoChainIdx>=5);
        chosoDetonateOrb(f,nextOrb,enemy,chaos);
        // Accelerating delay: starts at 25 frames, goes down to 4 minimum
        f.chosoChainTimer=Math.max(4,25-f.chosoChainIdx*3);
        // Escalating screen effects
        if(f.chosoChainIdx>=5)shakeTimer=Math.max(shakeTimer,6);
        if(f.chosoChainIdx>=10){shakeAmt=Math.max(shakeAmt,8);triggerScreenFlash('#cc0000',3);}
      }
      if(f.chosoChainQueue.length===0&&f.chosoChainIdx>0){
        // Chain complete
        addLog('BLOOD CHAIN x'+f.chosoChainIdx+'!');
        if(f.chosoChainIdx>=5){SFX.megaExplosion();shakeTimer=12;shakeAmt=10;triggerScreenFlash('#cc0000',8);}
        f.chosoChainIdx=0;
      }
    }
    // Visual: draw connecting lines between queued orbs
  }
  // Draw orb pulsing (visual update is in drawBall, but keep orbs alive check here)
}

function updateRelicToji(f,enemy,dt){
  if(!f.tojiTriActive)return;
  f.tojiTriTimer-=dt;
  if(f.tojiWeaponFlyIn>0)f.tojiWeaponFlyIn-=dt; // weapon fly-in countdown
  // Fade afterimages
  for(let i=f.tojiAfterimages.length-1;i>=0;i--){
    f.tojiAfterimages[i].alpha-=0.03*dt;
    if(f.tojiAfterimages[i].alpha<=0)f.tojiAfterimages.splice(i,1);
  }
  // DASH PHASE: GLIDE along triangle edges, weapon attacks at each corner
  if(f.tojiTriPhase==='dash'){
    f.weaponFlash=10;
    const chaos=getChaosLevel(f);
    // Glide progress (0→1 along current edge)
    if(!f.tojiGlideProgress)f.tojiGlideProgress=0;
    const glideSpeed=0.025*dt; // speed of glide along edge
    f.tojiGlideProgress+=glideSpeed;
    // Current edge: from point[dashIdx] toward point[(dashIdx+1)%3]
    const fromPt=f.tojiTriPoints[f.tojiDashIdx];
    const toPt=f.tojiTriPoints[(f.tojiDashIdx+1)%3];
    const t=Math.min(1,f.tojiGlideProgress);
    f.x=lerp(fromPt.x,toPt.x,t);
    f.y=lerp(fromPt.y,toPt.y,t);
    f.vx=0;f.vy=0;
    // Afterimage trail while gliding
    if(battleTime%3<1)f.tojiAfterimages.push({x:f.x,y:f.y,alpha:0.8});
    // Speed particles
    if(battleTime%2<1)spawnParticle(f.x,f.y,'#333355',rand(-2,2),rand(-2,2),10,2);
    // Reached corner — trigger weapon attack
    if(t>=1){
      f.tojiGlideProgress=0;
      const idx=f.tojiDashIdx;
      SFX.tojiDash();
      spawnBurst(f.x,f.y,'#1a1a2a',20,6);
      spawnBurst(f.x,f.y,'#333355',12,5);
      const hitRange=220; // bigger range than before
      if(idx===0){
        // INVERTED SPEAR — disables defensive abilities
        const spearDmg=f.atk*(1.0+chaos*0.1);
        if(enemy.alive&&dist(f,enemy)<hitRange){
          dealDamage(f,enemy,spearDmg);
          f.tojiEnemyDebuff=true;
          enemy.katanaDeflectCount=0;
          enemy.gojoInfinityCharges=0;
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-30,'SPEAR — DEFENSES DISABLED','#ff4444',false);
          spawnBurst(enemy.x,enemy.y,'#ff4444',15,6);
        }
        shakeTimer=6;shakeAmt=5;
      } else if(idx===1){
        // SPLIT SOUL KATANA — removes dmg reduction + 10% increased dmg taken
        const katDmg=f.atk*(1.2+chaos*0.1);
        if(enemy.alive&&dist(f,enemy)<hitRange){
          dealDamage(f,enemy,katDmg);
          f.tojiDmgTakenDebuff=true;
          enemy.tojiDmgTakenDebuff=true;
          enemy.defReduction=Math.max(enemy.defReduction,enemy.def*0.5);
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-30,'SPLIT SOUL — +10% DMG TAKEN','#ff8844',false);
          spawnBurst(enemy.x,enemy.y,'#ff8844',15,6);
        }
        shakeTimer=7;shakeAmt=6;
      } else if(idx===2){
        // PLAYFUL CLOUD — massive hit + BIG knockback
        const cloudDmg=f.atk*(2.0+chaos*0.15);
        if(enemy.alive&&dist(f,enemy)<hitRange){
          dealDamage(f,enemy,cloudDmg);
          // Heavy knockback AWAY from Toji (bigger + more range)
          const ka=angle(f,enemy);
          enemy.vx+=Math.cos(ka)*14;
          enemy.vy+=Math.sin(ka)*14;
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-30,'PLAYFUL CLOUD','#aaaaff',false);
          spawnBurst(enemy.x,enemy.y,'#aaaaff',20,8);
          spawnBurst(enemy.x,enemy.y,'#ffffff',12,6);
          // Explosion ring at impact
          explosions.push({x:enemy.x,y:enemy.y,radius:0,maxRadius:80,color:'#aaaaff',life:18,maxLife:18,dmg:0,owner:null,target:null,hit:true});
        }
        shakeTimer=12;shakeAmt=10;
        triggerHitFreeze(5);
      }
      f.tojiDashIdx++;
      if(f.tojiDashIdx>=3){
        f.tojiTriPhase='linger';
        const tcx=(f.tojiTriPoints[0].x+f.tojiTriPoints[1].x+f.tojiTriPoints[2].x)/3;
        const tcy=(f.tojiTriPoints[0].y+f.tojiTriPoints[1].y+f.tojiTriPoints[2].y)/3;
        f.tojiAfterimages.push({x:f.x,y:f.y,alpha:1});
        f.x=tcx;f.y=tcy;f.vx=0;f.vy=0;
        SFX.tojiChain();
        addLog('Chain triangle active!');
      }
    }
  }
  // LINGER PHASE: triangle stays, traps enemies, Toji gets buffs inside
  if(f.tojiTriPhase==='linger'){
    // Toji buffs while triangle is active: +60% atk, +50% speed, +50% def
    f.atk=Math.round(f.baseAtk*1.6);
    f.speed=f.baseSpeed*1.5;
    f.def=Math.round(f.baseDef*1.5);
    const pts=f.tojiTriPoints;
    const shrink=f.tojiTriShrink;
    // Calculate triangle center
    const tcx=(pts[0].x+pts[1].x+pts[2].x)/3;
    const tcy=(pts[0].y+pts[1].y+pts[2].y)/3;
    // Shrunk points (for ice element)
    const sPts=pts.map(p=>({
      x:p.x+(tcx-p.x)*shrink,
      y:p.y+(tcy-p.y)*shrink,
    }));
    // Keep Toji inside the triangle too
    const tojiInside=pointInTriangle(f.x,f.y,sPts[0],sPts[1],sPts[2]);
    if(!tojiInside){
      const ka=Math.atan2(tcy-f.y,tcx-f.x);
      f.vx+=Math.cos(ka)*2;
      f.vy+=Math.sin(ka)*2;
    }
    // Check if enemy is inside triangle — GUARANTEED trapped (strong barrier)
    if(enemy.alive){
      const inside=pointInTriangle(enemy.x,enemy.y,sPts[0],sPts[1],sPts[2]);
      // Hard push enemy back inside — they cannot escape
      if(!inside){
        const ka=Math.atan2(tcy-enemy.y,tcx-enemy.x);
        // Strong push + velocity dampening + teleport correction
        enemy.vx=Math.cos(ka)*6;
        enemy.vy=Math.sin(ka)*6;
        // If too far outside, snap them back toward center
        const dFromCenter=Math.hypot(enemy.x-tcx,enemy.y-tcy);
        if(dFromCenter>triRadius*0.8){
          enemy.x+=(tcx-enemy.x)*0.15;
          enemy.y+=(tcy-enemy.y)*0.15;
        }
      }
      // Element effects inside triangle
      if(f.elementActive){
        const elem=f.elem.id;
        if(elem==='fire'&&battleTime%10<1){
          // Fire: ground burns
          if(inside||dist(enemy,{x:tcx,y:tcy})<150){
            const fireDmg=f.atk*0.12;
            dealDamage(f,enemy,fireDmg,false);
            spawnBurst(enemy.x,enemy.y,'#ff4400',4,2);
            spawnParticle(enemy.x+rand(-20,20),enemy.y+rand(-10,10),'#ff4400',0,-2,15,3);
          }
        }
        if(elem==='electric'&&battleTime%20<1){
          // Lightning: weapons auto-slash (extra damage)
          const autoSlashDmg=f.atk*0.3;
          if(dist(enemy,{x:tcx,y:tcy})<180){
            dealDamage(f,enemy,autoSlashDmg,false);
            // Visual: slash lines from each weapon point
            sPts.forEach(p=>{
              spawnBurst(p.x,p.y,'#ffcc00',6,3);
              spawnParticle(p.x,p.y,'#ffcc00',rand(-3,3),rand(-3,3),10,2);
            });
            spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'AUTO-SLASH','#ffcc00',false);
          }
        }
        if(elem==='toxic'){
          // Poison: chain barrier deals contact damage
          for(let i=0;i<3;i++){
            const p1=sPts[i],p2=sPts[(i+1)%3];
            const edgeDist=pointToSegDist(enemy.x,enemy.y,p1.x,p1.y,p2.x,p2.y);
            if(edgeDist<enemy.radius+15&&battleTime%8<1){
              const chainDmg=f.atk*0.15;
              dealDamage(f,enemy,chainDmg,false);
              spawnBurst(enemy.x,enemy.y,'#aa44cc',5,2);
              spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'CHAIN BURN','#aa44cc',false);
              break;
            }
          }
        }
        if(elem==='cryo'){
          // Ice: triangle compresses smaller over time
          f.tojiTriShrink=Math.min(0.6,f.tojiTriShrink+0.001*dt);
          // Ice particles on chain
          if(battleTime%6<1){
            const ri=Math.floor(Math.random()*3);
            const p1=sPts[ri],p2=sPts[(ri+1)%3];
            const t=Math.random();
            spawnParticle(p1.x+(p2.x-p1.x)*t,p1.y+(p2.y-p1.y)*t,'#77ddff',0,-1,12,2);
          }
        }
      }
    }
    // Chain visual particles
    if(battleTime%4<1){
      const ri=Math.floor(Math.random()*3);
      const p1=sPts[ri],p2=sPts[(ri+1)%3];
      const t=Math.random();
      spawnParticle(p1.x+(p2.x-p1.x)*t,p1.y+(p2.y-p1.y)*t,'#888899',0,0,10,1.5);
    }
  }
  // Timer expired — end triangle
  if(f.tojiTriTimer<=0){
    f.tojiTriActive=false;
    f.tojiTriPhase='dash';
    f.tojiDashIdx=0;
    f.tojiAfterimages=[];
    f.tojiTriShrink=0;
    // Remove debuffs from enemy
    if(enemy.alive){
      enemy.tojiDmgTakenDebuff=false;
      enemy.defReduction=0;
    }
    f.tojiEnemyDebuff=false;
    f.tojiDmgTakenDebuff=false;
    f.atk=f.baseAtk;
    f.speed=f.baseSpeed;
    f.def=f.baseDef;
    addLog('Heavenly Restriction faded');
    spawnBurst(f.x,f.y,'#2a2a3a',10,4);
  }
}

function updateRelicMechamaru(f,enemy,dt){
  // Phase 1 mouth blast
  if(f.mechaMouthBlastActive){
    f.mechaMouthBlastTimer-=dt;
    f.vx=0;f.vy=0;
    f.weaponFlash=10;
    // Track toward enemy
    const targetAngle=angle(f,enemy);
    let diff=targetAngle-f.mechaMouthBlastAngle;
    while(diff>Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    f.mechaMouthBlastAngle+=diff*0.03*dt;
    f.weaponAngle=f.mechaMouthBlastAngle;
    // Beam hit detection
    if(f.mechaMouthBlastCD<=0){
      const beamLen=400;
      const bx=f.x+Math.cos(f.mechaMouthBlastAngle)*f.radius;
      const by=f.y+Math.sin(f.mechaMouthBlastAngle)*f.radius;
      if(enemy.alive){
        const ex=enemy.x-bx,ey=enemy.y-by;
        const along=ex*Math.cos(f.mechaMouthBlastAngle)+ey*Math.sin(f.mechaMouthBlastAngle);
        if(along>0&&along<beamLen){
          const perp=Math.abs(-ex*Math.sin(f.mechaMouthBlastAngle)+ey*Math.cos(f.mechaMouthBlastAngle));
          if(perp<enemy.radius+22){
            dealDamage(f,enemy,f.atk*2.0);
            f.mechaMouthBlastCD=10;
            spawnBurst(enemy.x,enemy.y,'#88aa44',8,4);
            enemy.vx+=Math.cos(f.mechaMouthBlastAngle)*4;
            enemy.vy+=Math.sin(f.mechaMouthBlastAngle)*4;
          }
        }
      }
    }
    if(f.mechaMouthBlastCD>0)f.mechaMouthBlastCD-=dt;
    // Beam particles
    if(battleTime%2<1){
      const d=Math.random()*350;
      spawnParticle(f.x+Math.cos(f.mechaMouthBlastAngle)*(f.radius+d),f.y+Math.sin(f.mechaMouthBlastAngle)*(f.radius+d),pick(['#4a6a4a','#88aa44','#ffcc00']),0,0,5,2);
    }
    if(f.mechaMouthBlastTimer<=0){
      f.mechaMouthBlastActive=false;
      spawnDmgNum(f.x,f.y-f.radius-20,'COOLING...','#4a6a4a',false);
    }
  }
  // Phase 2 defense shield
  if(f.mechaUltShield){
    f.mechaUltShieldTimer-=dt;
    // Shield aura visual
    if(battleTime%4<1){
      const a=Math.random()*Math.PI*2;
      spawnParticle(f.x+Math.cos(a)*(f.radius+10),f.y+Math.sin(a)*(f.radius+10),'#44aaff',0,0,8,2);
    }
    if(f.mechaUltShieldTimer<=0){
      f.mechaUltShield=false;
      addLog((f.side===0?'P1':'P2')+' Shield expired');
      spawnBurst(f.x,f.y,'#44aaff',8,3);
    }
  }
}

function updateRelicKashimo(f,enemy,dt){
  if(!f.kashimoAmberActive)return;
  f.vx=0;f.vy=0;
  f.kashimoAmberTimer-=dt;

  if(f.kashimoAmberPhase==='orbit'){
    // Staff orbits around Kashimo deflecting projectiles
    f.kashimoStaffOrbitAngle+=0.08*dt;
    f.weaponFlash=5;
    // Deflect nearby projectiles
    const staffX=f.x+Math.cos(f.kashimoStaffOrbitAngle)*60;
    const staffY=f.y+Math.sin(f.kashimoStaffOrbitAngle)*60;
    projectiles.forEach(p=>{
      if(p.owner===f)return;
      if(dist(p,{x:staffX,y:staffY})<25){
        p.vx*=-0.5;p.vy*=-0.5;p.owner=f;
        spawnBurst(p.x,p.y,'#ffcc00',6,3);
        SFX.kashimoZap();
      }
    });
    // Toxic element: staff orbit deals contact damage
    if(f.elementActive&&f.elem.id==='toxic'&&enemy.alive){
      if(dist(enemy,{x:staffX,y:staffY})<enemy.radius+20){
        dealDamage(f,enemy,f.atk*0.3);
        spawnBurst(enemy.x,enemy.y,'#aa44cc',4,2);
      }
    }
    // Orbit particles
    spawnParticle(staffX,staffY,pick(['#ffcc00','#ffee66','#fff']),-Math.sin(f.kashimoStaffOrbitAngle)*2,Math.cos(f.kashimoStaffOrbitAngle)*2,8,2);
    if(f.kashimoAmberTimer<=0){
      f.kashimoAmberPhase='charge';
      f.kashimoAmberTimer=270; // 4.5s charge
      SFX.kashimoAmber();
      addLog((f.side===0?'P1':'P2')+' CHARGING...');
      spawnDmgNum(f.x,f.y-f.radius-20,'CHARGING...','#ffcc00',true);
    }
  }
  else if(f.kashimoAmberPhase==='charge'){
    // Longest charge in game — electricity builds
    f.weaponFlash=8;
    const progress=1-(f.kashimoAmberTimer/270);
    // Growing electric aura
    if(battleTime%3<1){
      const a=Math.random()*Math.PI*2;
      const dist2=30+progress*50;
      spawnParticle(f.x+Math.cos(a)*dist2,f.y+Math.sin(a)*dist2,pick(['#ffcc00','#ffee00','#fff']),Math.cos(a)*(-1),Math.sin(a)*(-1),12,2+progress*3);
    }
    // Staff still orbiting during charge
    f.kashimoStaffOrbitAngle+=0.06*dt;
    // Screen shake builds
    if(progress>0.5){shakeTimer=Math.max(shakeTimer,2);shakeAmt=Math.max(shakeAmt,2+progress*4);}
    if(f.kashimoAmberTimer<=0){
      // FLOOD — electricity floods the arena
      f.kashimoAmberPhase='flood';
      f.kashimoAmberTimer=60; // 1s flood
      SFX.kashimoFlood();
      triggerScreenFlash('#ffcc00',15);
      shakeTimer=30;shakeAmt=15;
      addLog((f.side===0?'P1':'P2')+' AMBER UNLEASHED!');
      spawnDmgNum(f.x,f.y-f.radius-30,'AMBER UNLEASHED!','#ffcc00',true);
    }
  }
  else if(f.kashimoAmberPhase==='flood'){
    // Electricity floods the entire arena
    f.weaponFlash=12;
    // Deal massive damage every few frames
    if(battleTime%4<1&&enemy.alive){
      const isBoss=enemy.char&&(enemy.char.id==='smasher'||enemy.char.id==='gojo'||enemy.char.id==='sukuna'||enemy.char.id==='mahoraga'||enemy.char.id==='dabura');
      const floodDmg=isBoss?enemy.maxHp*0.14:enemy.maxHp*1.5; // one-tap normals, 60-70% boss HP over flood
      const elecMult=f.elementActive&&f.elem.id==='electric'?1.5:1;
      dealDamage(f,enemy,floodDmg*elecMult/15); // spread over 15 ticks
      spawnBurst(enemy.x,enemy.y,'#ffcc00',6,4);
    }
    // Arena-wide lightning bolts visual
    if(battleTime%2<1){
      for(let i=0;i<3;i++){
        const lx=Math.random()*W,ly=Math.random()*H;
        spawnParticle(lx,ly,pick(['#ffcc00','#ffee66','#fff']),0,0,15,4);
      }
    }
    if(f.kashimoAmberTimer<=0){
      // Done — Kashimo reappears at 1 HP, special gone forever
      f.kashimoAmberPhase='done';
      f.kashimoAmberActive=false;
      f.kashimoStaffMode=true;
      f.hp=1;
      f.specialBar=0;
      f.specialActive=false;
      f.specialTimer=0;
      // Cryo element: staff rushes enemies after ult
      if(f.elementActive&&f.elem.id==='cryo'&&enemy.alive){
        const rushA=angle(f,enemy);
        f.vx=Math.cos(rushA)*12;f.vy=Math.sin(rushA)*12;
        spawnBurst(f.x,f.y,'#77ddff',15,5);
      }
      spawnBurst(f.x,f.y,'#ffcc00',30,8);
      spawnDmgNum(f.x,f.y-f.radius-20,'1 HP','#ff4444',true);
      addLog((f.side===0?'P1':'P2')+' Amber spent — 1 HP remains');
    }
  }
}

function updateRelicHiguruma(f,enemy,dt){
  if(!f.higurumaDomainActive)return;
  f.higurumaDomainTimer-=dt;
  const isCryo=f.elementActive&&f.elem.id==='cryo';
  const target=f.higurumaSwordTarget||enemy;

  // Domain aura particles
  if(battleTime%4<dt){
    const a=Math.random()*Math.PI*2;
    spawnParticle(f.x+Math.cos(a)*60,f.y+Math.sin(a)*60,'#5a3a7a',Math.cos(a)*-2,Math.sin(a)*-2,20,3);
    // Scales of justice particles around target
    if(target&&target.alive){
      const ta=Math.random()*Math.PI*2;
      spawnParticle(target.x+Math.cos(ta)*40,target.y+Math.sin(ta)*40,'#8866aa',0,-1,15,2);
    }
  }

  // Sentence delay countdown
  if(f.higurumaSwordTimer>0){
    f.higurumaSwordTimer-=dt;
    if(f.higurumaSwordTimer<=0){
      // Execute sentence
      const outcome=f.higurumaSentenceOutcome;
      if(outcome==='confiscate'){
        // Waste enemy special charge + disable passive abilities briefly
        if(target&&target.alive){
          const prevBar=target.specialBar;
          target.specialBar=isCryo?-target.specialMax*0.3:0; // cryo: negative = must earn back extra
          target.specialActive=false;
          // Also disable passive abilities (blocks Todo swap, etc.) for 3 seconds
          target.higurumaDisableTimer=Math.max(target.higurumaDisableTimer,180);
          SFX.gaveling();
          shakeTimer=10;shakeAmt=6;
          spawnDmgNum(target.x,target.y-target.radius-25,'CONFISCATED','#ffcc00',true);
          spawnBurst(target.x,target.y,'#ffcc00',20,6);
          addLog((f.side===0?'P1':'P2')+' SENTENCE: CONFISCATION!');
        }
      } else if(outcome==='disable'){
        // Enemy can't attack, only move
        if(target&&target.alive){
          const dur=isCryo?480:360+Math.floor(Math.random()*180); // 6-9s, cryo: 8s fixed
          target.higurumaDisableTimer=dur;
          SFX.gaveling();
          shakeTimer=12;shakeAmt=7;
          spawnDmgNum(target.x,target.y-target.radius-25,'DISABLED','#ff6666',true);
          spawnBurst(target.x,target.y,'#ff4444',25,8);
          addLog((f.side===0?'P1':'P2')+' SENTENCE: ATTACK DISABLED!');
        }
      } else if(outcome==='execute'){
        // Executioner Sword — massive damage
        f.higurumaSwordActive=true;
        f.higurumaSwordTimer=0;
        SFX.executionerSword();
        shakeTimer=25;shakeAmt=14;
        if(target&&target.alive){
          // Damage: 10-80% of boss HP (random), scales with chaos
          const chaos=getChaosLevel(f);
          let pct=0.1+Math.random()*0.7; // 10-80%
          if(isCryo)pct=Math.min(pct,0.5); // cryo: cap at 50% but no buff
          let swordDmg=target.maxHp*pct;
          // Cap to not instakill (leave at least 5% HP)
          swordDmg=Math.min(swordDmg,target.hp-target.maxHp*0.05);
          swordDmg=Math.max(swordDmg,f.atk*3); // minimum damage
          dealDamage(f,target,swordDmg,true);
          spawnDmgNum(target.x,target.y-target.radius-35,'EXECUTIONER SWORD','#ff0000',true);
          spawnBurst(target.x,target.y,'#ff0000',35,10);
          spawnBurst(target.x,target.y,'#5a3a7a',25,8);
          spawnBurst(target.x,target.y,'#ffffff',15,5);
          // Sword slash visual
          for(let i=0;i<20;i++){
            const t=i/20;
            spawnParticle(lerp(target.x-50,target.x+50,t),lerp(target.y-50,target.y+50,t),'#ff0000',0,0,20,2);
          }
          explosions.push({x:target.x,y:target.y,radius:0,maxRadius:90,color:'#5a3a7a',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
          triggerScreenFlash('#ff0000',10);
          addLog((f.side===0?'P1':'P2')+' EXECUTIONER SWORD! '+Math.round(swordDmg)+' DMG!');
          // Grant Executioner Sword for next attack
          f.higurumaNextSword=true;
          spawnDmgNum(f.x,f.y-f.radius-20,'SWORD READY','#ff4444',false);
        }
      }
    }
  }

  // End domain
  if(f.higurumaDomainTimer<=0){
    f.higurumaDomainActive=false;
    f.specialActive=false;
    f.specialTimer=0;
  }
}

function updateRelicYuji(f,enemy,dt){
  // Tick down divergent fist cooldown
  if(f.yujiDivergentCD>0)f.yujiDivergentCD--;

  // Process ghost fists (delayed blue punches — fly toward enemy)
  for(let i=f.yujiGhostFists.length-1;i>=0;i--){
    const gf=f.yujiGhostFists[i];
    gf.timer--;
    // Fly toward target
    if(gf.target&&gf.target.alive){
      const dx=gf.target.x-gf.x,dy=gf.target.y-gf.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      const speed=Math.min(6+((30-gf.timer)/30)*8,d); // cap speed to not overshoot
      if(d>1){gf.x+=dx/d*speed;gf.y+=dy/d*speed;}
      gf.angle=Math.atan2(dy,dx);
      // Hit detection — close enough to target
      if(d<gf.target.radius+12){
        dealDamage(f,gf.target,gf.dmg,false);
        spawnBurst(gf.target.x,gf.target.y,'#4488ff',10,5);
        SFX.punch();
        if(gf.isBF)triggerBlackFlash(f,gf.target);
        if(gf.isFireKB){
          // Use stored original angle to prevent wrong-direction knockback
          const ka=gf.angle;
          const kb=8;
          gf.target.vx+=Math.cos(ka)*kb;gf.target.vy+=Math.sin(ka)*kb;
          spawnBurst(gf.target.x,gf.target.y,'#ff4400',8,5);
        }
        f.yujiGhostFists.splice(i,1);
        continue;
      }
      // Timeout — fist dissipates without dealing damage if too far
      if(gf.timer<=0){
        spawnBurst(gf.x,gf.y,'#4488ff',5,3);
        f.yujiGhostFists.splice(i,1);
        continue;
      }
    } else if(gf.timer<=0){
      f.yujiGhostFists.splice(i,1);
      continue;
    }
  }

  // Special timer
  if(f.yujiBlackFlashActive){
    f.yujiBlackFlashTimer--;
    // Black aura particles
    if(battleTime%3<1){
      const a=Math.random()*Math.PI*2;
      spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#111111',0,-1.5,15,3);
      spawnParticle(f.x+Math.cos(a+1)*f.radius,f.y+Math.sin(a+1)*f.radius,'#4444ff',0,-1,12,2);
    }
    if(f.yujiBlackFlashTimer<=0){
      f.yujiBlackFlashActive=false;
      addLog((f.side===0?'P1':'P2')+' Black Flash Rush ended');
    }
  }

  // Cryo permanent Black Flash activation (once HP drops below 100%)
  if(f.elementActive&&f.elem.id==='cryo'&&!f.yujiIcePermanentBF&&f.hp<f.maxHp){
    f.yujiIcePermanentBF=true;
    f.yujiIceDmgMult=1.8; // takes 80% more damage
    addLog((f.side===0?'P1':'P2')+' ICE BLACK FLASH — PERMANENT!');
    spawnDmgNum(f.x,f.y-f.radius-30,'PERMANENT BLACK FLASH','#77ddff',false);
    spawnBurst(f.x,f.y,'#77ddff',15,6);
  }
}

function updateRelicNaoya(f,enemy,dt){
  // Tick cooldown
  if(f.naoyaProjectionCD>0)f.naoyaProjectionCD--;
  // Transition i-frames
  if(f.naoyaTransitionTimer>0){
    f.naoyaTransitionTimer-=dt;
    // Phase 2 transformation particles
    if(battleTime%2<1){
      const a=Math.random()*Math.PI*2;
      spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#aa44cc',Math.cos(a)*2,Math.sin(a)*2,15,3);
      spawnParticle(f.x+Math.cos(a+2)*f.radius,f.y+Math.sin(a+2)*f.radius,'#00cc88',0,-1.5,12,2);
    }
  }

  const isFireElem=f.elementActive&&f.elem.id==='fire';
  const isToxicElem=f.elementActive&&f.elem.id==='toxic';
  const isCryoElem=f.elementActive&&f.elem.id==='cryo';

  // Projection dash processing
  if(f.naoyaDashing){
    f.naoyaDashTimer-=dt;
    // Move at extreme speed along dash angle
    f.vx=Math.cos(f.naoyaDashAngle)*f.naoyaDashSpeed;
    f.vy=Math.sin(f.naoyaDashAngle)*f.naoyaDashSpeed;
    // Store trail positions for afterimage
    f.naoyaDashTrail.push({x:f.x,y:f.y,alpha:0.7});
    if(f.naoyaDashTrail.length>8)f.naoyaDashTrail.shift();
    // Dash particles
    spawnParticle(f.x,f.y,'#00cc88',0,0,8,2);
    // Fire trail
    if(isFireElem){
      fireZones.push({x:f.x,y:f.y,radius:15,life:90,maxLife:90,dmg:f.atk*0.08,owner:f});
    }
    // Toxic zone
    if(isToxicElem&&battleTime%6<1){
      poisonBubbles.push({x:f.x,y:f.y,radius:20,life:120,maxLife:120,dmg:f.atk*0.06,owner:f,slow:true});
    }
    // Check collision with enemy during dash
    if(enemy&&enemy.alive){
      const d=dist(f,enemy);
      if(d<f.radius+enemy.radius+18){
        // Projection hit — collision damage scales with frame stack (high risk/high reward)
        const stackDmgBonus=1+f.naoyaFrameStack*0.025; // up to +60% damage at max stack
        const dashDmg=f.atk*1.2*stackDmgBonus;
        dealDamage(f,enemy,dashDmg,true);
        spawnBurst(enemy.x,enemy.y,'#00cc88',12,6);
        SFX.heavyHit();
        shakeTimer=8;shakeAmt=6;
        // 24-frame rule: stun enemy briefly (they "broke the rule")
        const stunDur=isCryoElem?25:15;
        enemy.stunTimer=Math.max(enemy.stunTimer,stunDur);
        // During special: no extra stun — enemy follows projection rule (slowed, not locked)
        if(f.naoyaSlowActive){
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-40,'FRAME BREAK!','#00ffaa',false);
        }
        if(isCryoElem){
          enemy.freezeTimer=Math.max(enemy.freezeTimer,20);
          spawnBurst(enemy.x,enemy.y,'#77ddff',8,4);
        }
        spawnDmgNum(enemy.x,enemy.y-enemy.radius-25,'PROJECTION','#00cc88',false);
        // Bounce away after hit
        const ka=angle(enemy,f);
        f.vx=Math.cos(ka)*8;f.vy=Math.sin(ka)*8;
        f.naoyaDashing=false;
        f.naoyaDashTimer=0;
      }
    }
    // End dash
    if(f.naoyaDashTimer<=0){
      f.naoyaDashing=false;
      f.naoyaDashTimer=0;
    }
  } else {
    // Fade trail
    for(let i=f.naoyaDashTrail.length-1;i>=0;i--){
      f.naoyaDashTrail[i].alpha-=0.08;
      if(f.naoyaDashTrail[i].alpha<=0)f.naoyaDashTrail.splice(i,1);
    }
  }

  // Frame stack decay — slowly lose stacks when not dashing (keeps pressure on)
  if(!f.naoyaDashing&&f.naoyaFrameStack>0&&battleTime%30<1){
    f.naoyaFrameStack=Math.max(0,f.naoyaFrameStack-1);
  }
  // Frame burnout penalty — frozen and vulnerable
  if(f.naoyaFrameBurned){
    f.naoyaFrameBurnCD-=dt;
    f.vx*=0.9;f.vy*=0.9; // slow to a crawl
    // Warning particles
    if(battleTime%4<1){
      const a=Math.random()*Math.PI*2;
      spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#ff4444',0,-1,10,2);
    }
    if(f.naoyaFrameBurnCD<=0){
      f.naoyaFrameBurned=false;
      f.naoyaFrameStack=0;
      f.naoyaFrameCount=0;
      spawnDmgNum(f.x,f.y-f.radius-25,'FRAMES RESET','#00cc88',false);
      spawnBurst(f.x,f.y,'#00cc88',10,4);
    }
  }

  // 24-Frame Rule Special: Naoya speed boost + moderate enemy slow
  if(f.naoyaSlowActive){
    f.naoyaSlowTimer-=dt;
    f.specialBar=0;
    // Big speed boost — Naoya repositions freely during projection rule
    if(!f.naoyaDashing){
      f.speed=f.baseSpeed*1.8; // massive speed boost for repositioning
    }
    // Green aura particles
    if(battleTime%3<1){
      const a=Math.random()*Math.PI*2;
      spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#00cc88',0,-1,12,2);
    }
    // Frame counter visual
    f.naoyaFrameCount=(f.naoyaFrameCount+1)%24;
    if(f.naoyaSlowTimer<=0){
      f.naoyaSlowActive=false;
      f.speed=f.baseSpeed;
      // Restore enemy speed
      fighters.forEach(other=>{
        if(other&&other!==f&&other.sandyTimeScale<1){
          const otherSandy=fighters.find(s=>s&&s!==f&&s.alive&&(s.sandyActive||s.naoyaSlowActive)&&s!==other);
          if(!otherSandy)other.sandyTimeScale=1;
        }
      });
      addLog((f.side===0?'P1':'P2')+' 24-Frame Rule ended');
    }
  }
}

function updateRelicYuta(f,enemy,dt){
  // Tick cooldowns
  if(f.yutaSlashCD>0)f.yutaSlashCD--;
  if(f.yutaCopyCD>0)f.yutaCopyCD--;
  if(f.yutaCopyFlash>0)f.yutaCopyFlash--;

  const isElecElem=f.elementActive&&f.elem.id==='electric';

  // Initialize Rika position near Yuta
  if(!f.yutaRikaPosInit){f.yutaRikaPos={x:f.x+40,y:f.y};f.yutaRikaPosInit=true;}

  // Rika companion — random wandering + hit-and-turn (like normal fighters)
  if(f.yutaRikaAttackCD>0)f.yutaRikaAttackCD-=dt;

  // Rika random movement — wander near Yuta, occasionally change direction
  if(!f.yutaRikaMoveAngle)f.yutaRikaMoveAngle=Math.random()*Math.PI*2;
  if(!f.yutaRikaTurnTimer)f.yutaRikaTurnTimer=0;
  f.yutaRikaTurnTimer-=dt;
  if(f.yutaRikaTurnTimer<=0){
    f.yutaRikaMoveAngle+=((Math.random()-0.5)*Math.PI*1.2); // random turn
    f.yutaRikaTurnTimer=30+Math.random()*60; // change direction every 0.5-1.5s
  }
  const rikaSpd=(isElecElem?3.5:2.5)*dt;
  f.yutaRikaPos.x+=Math.cos(f.yutaRikaMoveAngle)*rikaSpd;
  f.yutaRikaPos.y+=Math.sin(f.yutaRikaMoveAngle)*rikaSpd;
  // Rika roams freely — very loose tether (350px) so she explores independently
  const dY=Math.hypot(f.yutaRikaPos.x-f.x,f.yutaRikaPos.y-f.y);
  if(dY>350){
    f.yutaRikaMoveAngle=Math.atan2(f.y-f.yutaRikaPos.y,f.x-f.yutaRikaPos.x)+((Math.random()-0.5)*0.3);
    f.yutaRikaPos.x+=(f.x-f.yutaRikaPos.x)*0.03;
    f.yutaRikaPos.y+=(f.y-f.yutaRikaPos.y)*0.03;
  }
  // Rika actively hunts enemy — aggressive pursuer (monstrous behavior)
  if(enemy&&enemy.alive&&f.yutaRikaHp>0){
    const dToE=Math.hypot(f.yutaRikaPos.x-enemy.x,f.yutaRikaPos.y-enemy.y);
    if(dToE>enemy.radius+35){
      // Always hunt enemy — Rika is a relentless monster
      f.yutaRikaMoveAngle=Math.atan2(enemy.y-f.yutaRikaPos.y,enemy.x-f.yutaRikaPos.x)+((Math.random()-0.5)*0.2);
    }
  }
  // Bounce off walls
  if(f.yutaRikaPos.x<25||f.yutaRikaPos.x>W-25)f.yutaRikaMoveAngle=Math.PI-f.yutaRikaMoveAngle;
  if(f.yutaRikaPos.y<25||f.yutaRikaPos.y>H-25)f.yutaRikaMoveAngle=-f.yutaRikaMoveAngle;
  f.yutaRikaPos.x=Math.max(20,Math.min(W-20,f.yutaRikaPos.x));
  f.yutaRikaPos.y=Math.max(20,Math.min(H-20,f.yutaRikaPos.y));

  // Rika claw attack — aggressive, same-size monster slashing at enemies
  if(f.yutaRikaAttackCD<=0&&enemy&&enemy.alive&&f.yutaRikaHp>0){
    const dToEnemy=Math.hypot(f.yutaRikaPos.x-enemy.x,f.yutaRikaPos.y-enemy.y);
    if(dToEnemy<enemy.radius+70){
      f.yutaRikaLunging=true;
      f.yutaRikaLungePos={x:f.yutaRikaPos.x,y:f.yutaRikaPos.y};
      f.yutaRikaClawAnim=18;
      f.yutaRikaAttackCD=isElecElem?22:35;
      const clawDmg=f.atk*(f.yutaDomainActive?2.0:1.5);
      dealDamage(f,enemy,clawDmg,true);
      SFX.rikaClaw();
      spawnBurst(enemy.x,enemy.y,'#aa44ff',14,7);
      spawnDmgNum(enemy.x,enemy.y-enemy.radius-20,'RIKA CLAW!','#aa44ff',false);
      shakeTimer=Math.max(shakeTimer,4);shakeAmt=Math.max(shakeAmt,3);
      // Knockback — heavier
      const ka=Math.atan2(enemy.y-f.yutaRikaPos.y,enemy.x-f.yutaRikaPos.x);
      enemy.vx+=Math.cos(ka)*5;enemy.vy+=Math.sin(ka)*5;
    }
  }

  // Rika takes damage from enemy body contact + enemy projectiles
  if(f.yutaRikaHp>0&&enemy&&enemy.alive){
    const dRikaEnemy=Math.hypot(f.yutaRikaPos.x-enemy.x,f.yutaRikaPos.y-enemy.y);
    if(dRikaEnemy<enemy.radius+34&&(!f._rikaBodyCD||f._rikaBodyCD<=0)){
      f.yutaRikaHp-=enemy.atk*0.4;
      f._rikaBodyCD=30;
      spawnBurst(f.yutaRikaPos.x,f.yutaRikaPos.y,'#ff4444',6,3);
      if(f.yutaRikaHp<=0){f.yutaRikaHp=0;spawnDmgNum(f.yutaRikaPos.x,f.yutaRikaPos.y-30,'RIKA DOWN','#ff4444',true);spawnBurst(f.yutaRikaPos.x,f.yutaRikaPos.y,'#aa44ff',20,8);}
    }
    if(f._rikaBodyCD>0)f._rikaBodyCD-=dt;
    // Rika hit by projectiles
    for(let pi=projectiles.length-1;pi>=0;pi--){
      const p=projectiles[pi];
      if(p&&p.owner&&p.owner.side!==f.side){
        const dp=Math.hypot(p.x-f.yutaRikaPos.x,p.y-f.yutaRikaPos.y);
        if(dp<34+p.radius){
          f.yutaRikaHp-=p.dmg*0.5;
          spawnBurst(f.yutaRikaPos.x,f.yutaRikaPos.y,p.color,5,3);
          projectiles.splice(pi,1);
          if(f.yutaRikaHp<=0){f.yutaRikaHp=0;spawnDmgNum(f.yutaRikaPos.x,f.yutaRikaPos.y-30,'RIKA DOWN','#ff4444',true);spawnBurst(f.yutaRikaPos.x,f.yutaRikaPos.y,'#aa44ff',20,8);break;}
        }
      }
    }
  }

  // Rika lunge animation
  if(f.yutaRikaLunging){
    if(enemy&&enemy.alive){
      f.yutaRikaLungePos.x+=(enemy.x-f.yutaRikaLungePos.x)*0.25;
      f.yutaRikaLungePos.y+=(enemy.y-f.yutaRikaLungePos.y)*0.25;
    }
    f.yutaRikaClawAnim-=dt;
    if(f.yutaRikaClawAnim<=0)f.yutaRikaLunging=false;
  }

  // Domain Expansion: Authentic Mutual Love
  if(f.yutaDomainActive){
    f.yutaDomainTimer-=dt;
    // Domain aura particles
    if(battleTime%2<1){
      const a=Math.random()*Math.PI*2;
      const r2=70+Math.random()*50;
      spawnParticle(f.x+Math.cos(a)*r2,f.y+Math.sin(a)*r2,'#6644cc',0,0,18,1.5);
      spawnParticle(f.x+Math.cos(a+2)*r2*0.6,f.y+Math.sin(a+2)*r2*0.6,'#aa44ff',0,-0.5,12,1);
    }

    // Domain clash animation
    if(f.yutaDomainClash){
      f.yutaDomainClashTimer-=dt;
      if(battleTime%4<1){
        spawnBurst(W/2,H/2,'#ffcc00',6,4);
        shakeTimer=Math.max(shakeTimer,3);shakeAmt=Math.max(shakeAmt,4);
      }
      if(f.yutaDomainClashTimer<=0){
        f.yutaDomainClash=false;
        // Domain clash resolved — both domains continue independently
        spawnBurst(W/2,H/2,'#ffcc00',20,8);
        shakeTimer=15;shakeAmt=8;
        addLog('Domain clash resolved — both domains active!');
      }
    }

    // Process domain swords
    for(let i=f.yutaDomainSwords.length-1;i>=0;i--){
      const sw=f.yutaDomainSwords[i];
      if(sw.hit){f.yutaDomainSwords.splice(i,1);continue;}
      sw.timer-=dt;
      if(sw.timer>0){
        // Orbiting phase — circle around Yuta
        sw.angle+=0.06*dt;
        const orbitR=90+Math.sin(sw.angle*2)*15;
        sw.x=f.x+Math.cos(sw.angle)*orbitR;
        sw.y=f.y+Math.sin(sw.angle)*orbitR;
        // Glowing particles
        spawnParticle(sw.x,sw.y,sw.color,0,0,8,2);
      } else {
        // Launch phase — home toward enemy
        if(enemy&&enemy.alive){
          const da=angle(sw,enemy);
          sw.vx+=(Math.cos(da)*1.2);sw.vy+=(Math.sin(da)*1.2);
          const spd=Math.hypot(sw.vx,sw.vy);
          const maxSpd=sw.guaranteed?12:9;
          if(spd>maxSpd){sw.vx=sw.vx/spd*maxSpd;sw.vy=sw.vy/spd*maxSpd;}
          sw.x+=sw.vx*dt;sw.y+=sw.vy*dt;
          // Trail
          spawnParticle(sw.x,sw.y,sw.color,0,0,10,2.5);
          // Check hit
          if(dist(sw,enemy)<enemy.radius+12){
            sw.hit=true;
            const actualDmg=sw.guaranteed?sw.dmg:sw.dmg;
            dealDamage(f,enemy,actualDmg,sw.guaranteed);
            SFX.yutaSwordHit();
            spawnBurst(enemy.x,enemy.y,sw.color,12,6);
            shakeTimer=6;shakeAmt=4;
            if(sw.guaranteed){
              spawnDmgNum(enemy.x,enemy.y-enemy.radius-35,'GUARANTEED HIT!','#ffcc00',true);
              triggerScreenFlash('#ffcc00',8);triggerHitFreeze(4);
            }
            if(sw.freeze&&enemy.alive){
              enemy.freezeTimer=Math.max(enemy.freezeTimer,30);
              enemy.stunTimer=Math.max(enemy.stunTimer,20);
              spawnBurst(enemy.x,enemy.y,'#77ddff',8,4);
            }
          }
        }
        // Timeout
        if(sw.timer<-180){sw.hit=true;}
      }
    }

    // Domain end
    if(f.yutaDomainTimer<=0){
      f.yutaDomainActive=false;
      f.yutaDomainSwords=[];
      addLog((f.side===0?'P1':'P2')+' Domain ended');
    }
  }
}

// Helper: point inside triangle
function pointInTriangle(px,py,a,b,c){
  const d1=(px-b.x)*(a.y-b.y)-(a.x-b.x)*(py-b.y);
  const d2=(px-c.x)*(b.y-c.y)-(b.x-c.x)*(py-c.y);
  const d3=(px-a.x)*(c.y-a.y)-(c.x-a.x)*(py-a.y);
  const hasNeg=(d1<0)||(d2<0)||(d3<0);
  const hasPos=(d1>0)||(d2>0)||(d3>0);
  return !(hasNeg&&hasPos);
}

// Helper: distance from point to line segment
function pointToSegDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1;
  const lenSq=dx*dx+dy*dy;
  if(lenSq===0)return Math.hypot(px-x1,py-y1);
  let t=((px-x1)*dx+(py-y1)*dy)/lenSq;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}

// ============================================================
// BATTLE UPDATE
// ============================================================
function updateBattle(dt){
  if(battleOver)return;
  // Pre-match countdown — fighters stand still
  if(typeof battleCountdown!=='undefined'&&battleCountdown>0){battleCountdown-=dt;return;}
  // Sponsor cutscene freezes normal battle updates
  if(sponsorCutsceneActive){updateSponsorCutscene(dt);return;}
  battleTime+=dt;
  const f1=fighters[0],f2=fighters[1];

  // Update smasher warnings
  for(let i=smasherWarnings.length-1;i>=0;i--){
    smasherWarnings[i].life-=dt;
    if(smasherWarnings[i].life<=0)smasherWarnings.splice(i,1);
  }

  fighters.forEach((f,i)=>{
    // In boss mode, find the best enemy (closest alive)
    let enemy;
    if(gameMode==='boss'){
      const enemies=fighters.filter(e=>e.side!==f.side&&e.alive);
      enemy=enemies.length>0?enemies.reduce((a,b)=>dist(f,a)<dist(f,b)?a:b):null;
      if(!enemy)return;
    } else {
      enemy=i===0?f2:f1;
    }
    if(!f.alive)return;

    // Timers
    if(f.hitFlash>0)f.hitFlash-=dt;
    if(f._bodyHitCD>0)f._bodyHitCD-=dt;
    if(f.stunTimer>0)f.stunTimer-=dt;
    if(f.slowTimer>0)f.slowTimer-=dt;
    if(f.freezeTimer>0)f.freezeTimer-=dt;
    if(f.projectionFrozenTimer>0){f.projectionFrozenTimer-=dt;f.stunTimer=Math.max(f.stunTimer,2);} // locked in projection frame
    // Safety: if no active Naoya/Sandy slow source exists, restore sandyTimeScale
    if(f.sandyTimeScale<1){
      const hasSlowSource=fighters.some(s=>s&&s!==f&&s.alive&&(s.sandyActive||s.naoyaSlowActive));
      if(!hasSlowSource)f.sandyTimeScale=1;
    }
    if(f.higurumaDisableTimer>0){f.higurumaDisableTimer-=dt;f.attackTimer=Math.max(f.attackTimer,10);}
    if(f.higurumaSwingCD>0)f.higurumaSwingCD-=dt;
    if(f.higurumaElecBurstCD>0)f.higurumaElecBurstCD-=dt;
    if(f.higurumaVerdictShow>0)f.higurumaVerdictShow-=dt;
    if(f.higurumaVerdictPause>0)f.higurumaVerdictPause-=dt;
    // Higuruma hammer queue — spawn 1 hammer every 4 frames
    if(f.higurumaHammerQueue&&f.higurumaHammerQueue.length>0){
      f.higurumaHammerQueueTimer-=dt;
      if(f.higurumaHammerQueueTimer<=0){
        const h=f.higurumaHammerQueue.shift();
        const ba2=f.weaponAngle; // use current facing for each hammer
        const sa2=ba2+rand(-0.08,0.08);
        projectiles.push({
          x:f.x+Math.cos(sa2)*(f.radius+4),y:f.y+Math.sin(sa2)*(f.radius+4),
          vx:Math.cos(sa2)*h.spd,vy:Math.sin(sa2)*h.spd,
          owner:f,target:null,color:'#7a5a9a',
          life:h.life,radius:h.radius,dmg:h.dmg,
          explosive:false,homing:false,isHigurumaSmallHammer:true,
          knockback:h.knockback||1,
        });
        f.higurumaHammerQueueTimer=4; // 4 frames between each hammer
        if(f.higurumaHammerQueue.length%3===0)SFX.hammerThrow(); // sound every 3rd hammer
      }
    }
    if(f.captureTimer>0){
      f.captureTimer-=dt;
      // Captured enemies take constant crush damage
      if(battleTime%10<dt&&f._capturedBy&&f._capturedBy.alive){
        const crushDmg=f._capturedBy.atk*0.25;
        f.hp-=crushDmg;f.hitFlash=4;
        spawnDmgNum(f.x+rand(-10,10),f.y-f.radius-10,crushDmg,'#00ddff',false);
        spawnParticle(f.x+rand(-20,20),f.y+rand(-20,20),'#00ddff',0,-1,12,2);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(f._capturedBy);}
      }
    }
    if(f.defReductionTimer>0)f.defReductionTimer-=dt;else f.defReduction=0;
    if(f.specialTimer>0)f.specialTimer-=dt;else if(f.specialActive){f.specialActive=false;f.relicDashing=false;}

    // Bleed DOT
    if(f.bleedTimer>0){
      f.bleedTimer-=dt;
      if(!f._bleedTickCD)f._bleedTickCD=0;f._bleedTickCD-=dt;
      if(f._bleedTickCD<=0){f._bleedTickCD=15;
        f.hp-=f.bleedDmg;
        spawnParticle(f.x+rand(-8,8),f.y+rand(-8,8),'#cc0000',rand(-1,1),-1,12,2);
        spawnDmgNum(f.x+rand(-10,10),f.y-f.radius-5,f.bleedDmg,'#cc0000',false);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(enemy);}
      }
    } else {f.bleedIcon=false;}

    // Burn DOT
    if(f.burnTimer>0){
      f.burnTimer-=dt;
      if(!f._burnTickCD)f._burnTickCD=0;f._burnTickCD-=dt;
      if(f._burnTickCD<=0){f._burnTickCD=10;
        f.hp-=f.burnDmg;
        spawnParticle(f.x+rand(-10,10),f.y-f.radius,'#ff4400',0,-1,15,2);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(enemy);}
      }
    }

    // Mahito: Instant Spirit Body passive at <30% HP
    if(f.char.id==='mahito'&&!f.mahitoPassiveTriggered&&f.hp<f.maxHp*0.3){
      f.mahitoPassiveTriggered=true;
      f.speed=f.baseSpeed*1.2;
      f.baseSpeed*=1.2;
      f.range=100;
      spawnBurst(f.x,f.y,'#5a8a8a',20,8);
      spawnDmgNum(f.x,f.y-f.radius-20,'INSTANT SPIRIT BODY!','#5a8a8a',true);
      addLog((f.side===0?'P1':'P2')+' Instant Spirit Body activated!');
      showVoiceline('mahito','lowHp',f.side);
    }

    // Mahito transfigure debuff tick
    if(f.mahitoShrinkTimer>0){
      f.mahitoShrinkTimer-=dt;
      if(f.mahitoShrinkTimer<=0){
        f.mahitoTransfiguredBy=null;
        f.atk=f.baseAtk; // restore ATK
      }
    }

    // Element activation at 25% HP
    if(!f.elementActive&&f.elem.id!=='none'&&f.hp<=f.maxHp*0.25){
      f.elementActive=true;f.elementFlash=30;
      SFX.elementActivate();
      const comboKey=f.char.id+'_'+f.elem.id;
      addLog((f.side===0?'P1':'P2')+' '+f.elem.name+' ELEMENT ACTIVATED!');
      addLog('  >> '+(COMBO_EFFECTS[comboKey]||''));
      spawnBurst(f.x,f.y,f.elem.color,20,5);
      switch(f.elem.id){
        case 'fire':f.atk=f.baseAtk*1.18;break; // nerfed from 1.3 (char-specific buffs compensate)
        case 'electric':f.speed=f.baseSpeed*1.12;f.crit+=5;break; // nerfed from 1.2/+8
        case 'toxic':f.atk=f.baseAtk*1.08;break; // nerfed from 1.15
        case 'cryo':f.def=f.baseDef+3;break; // nerfed from +5
      }
    }
    if(f.elementFlash>0)f.elementFlash-=dt;

    // Special bar passive fill (slow time-based + attack bonus is the main driver)
    // Win buff charge multipliers: higuruma, ryu, kashimo
    const charChargeMult=f._higurumaChargeMult||f._ryuChargeMult||f._kashimoChargeMult||1;
    f.specialBar=Math.min(f.specialMax,f.specialBar+0.025*(f.char.relicChargeRate||1)*charChargeMult*dt);
    // Kashimo: time-based charge (~25 seconds), combat contributes minimally
    if(f.char.id==='kashimo')f.specialBar=Math.min(f.specialMax,f.specialBar+0.067*(f._kashimoChargeMult||1)*dt);

    // Check if should use relic special
    if(f.specialBar>=f.specialMax&&!f.specialActive&&enemy.alive){
      useSpecial(f,enemy);
    }

    // Sponsor bar — charges at 40% of special rate, only if char has a selected sponsor
    if(!f.sponsorUsed&&!sponsorCutsceneActive&&f.selectedSponsor){
      f.sponsorBar=Math.min(f.sponsorMax,f.sponsorBar+0.015*(f.char.relicChargeRate||1)*dt);
      if(f.sponsorBar>=f.sponsorMax&&enemy.alive&&canCallSponsor(f.char.id,enemy.char.id,f.selectedSponsor)){
        f.sponsorUsed=true;
        f.sponsorBar=0;
        triggerSponsorCutscene(f,enemy);
      }
    }

    // Update active relic special
    if(f.specialActive){
      switch(f.char.id){
        case 'mantis':updateRelicMantis(f,enemy,dt);break;
        case 'gorilla':updateRelicGorilla(f,enemy,dt);break;
        case 'monowire':updateRelicMonowire(f,enemy,dt);break;
        case 'pls':updateRelicPLS(f,enemy,dt);break;
        case 'sandy':updateRelicSandy(f,enemy,dt);break;
        case 'throw':updateRelicThrow(f,enemy,dt);break;
        case 'katana':updateRelicKatana(f,enemy,dt);break;
        case 'berserk':updateRelicBerserk(f,enemy,dt);break;
        case 'smasher':updateRelicSmasher(f,enemy,dt);break;
        case 'gojo':updateRelicGojo(f,enemy,dt);break;
        case 'choso':updateRelicChoso(f,enemy,dt);break;
        case 'toji':updateRelicToji(f,enemy,dt);break;
        case 'mechamaru':updateRelicMechamaru(f,enemy,dt);break;
        case 'kashimo':updateRelicKashimo(f,enemy,dt);break;
        case 'nanami':updateRelicNanami(f,enemy,dt);break;
        case 'ryu':updateRelicRyu(f,enemy,dt);break;
        case 'higuruma':updateRelicHiguruma(f,enemy,dt);break;
        case 'yuji':updateRelicYuji(f,enemy,dt);break;
        // naoya: handled outside specialActive block (always runs)
        case 'yuta':updateRelicYuta(f,enemy,dt);break;
        // todo: handled outside specialActive block (always runs)
        case 'yuki':updateRelicYuki(f,enemy,dt);break;
        case 'megumi':updateRelicMegumi(f,enemy,dt);break;
        case 'mahito':updateRelicMahito(f,enemy,dt);break;
      }
    }

    // Naoya dash/cooldown runs always (not just during special) — critical fix
    if(f.char.id==='naoya') updateRelicNaoya(f,enemy,dt);
    // Todo cooldown/swap runs always
    if(f.char.id==='todo') updateRelicTodo(f,enemy,dt);

    // Choso beam runs always (not just during special)
    if(f.char.id==='choso'&&(f.chosoBeamActive||f.chosoBeamCooldown>0||f.chosoPiercingFreeze>0)){
      updateChosoBeam(f,enemy,dt);
    }

    // Yuta+Rika per-frame: cooldowns + Rika companion (runs always)
    if(f.char.id==='yuta'){
      if(f.yutaSlashCD>0)f.yutaSlashCD--;
      if(f.yutaCopyCD>0)f.yutaCopyCD--;
      if(f.yutaCopyFlash>0)f.yutaCopyFlash--;
      // Rika updates run in updateRelicYuta (called during special OR always below)
      if(!f.specialActive){
        // Run Rika companion logic even outside of special (same independent movement)
        const isElecElem=f.elementActive&&f.elem.id==='electric';
        if(!f.yutaRikaPosInit){f.yutaRikaPos={x:f.x+40,y:f.y};f.yutaRikaPosInit=true;}
        if(f.yutaRikaAttackCD>0)f.yutaRikaAttackCD-=dt;
        // Random wandering movement (same as domain version)
        if(!f.yutaRikaMoveAngle)f.yutaRikaMoveAngle=Math.random()*Math.PI*2;
        if(!f.yutaRikaTurnTimer)f.yutaRikaTurnTimer=0;
        f.yutaRikaTurnTimer-=dt;
        if(f.yutaRikaTurnTimer<=0){f.yutaRikaMoveAngle+=((Math.random()-0.5)*Math.PI*1.2);f.yutaRikaTurnTimer=30+Math.random()*60;}
        const rikaSpd2=(isElecElem?3.5:2.5)*dt;
        f.yutaRikaPos.x+=Math.cos(f.yutaRikaMoveAngle)*rikaSpd2;f.yutaRikaPos.y+=Math.sin(f.yutaRikaMoveAngle)*rikaSpd2;
        const dY2=Math.hypot(f.yutaRikaPos.x-f.x,f.yutaRikaPos.y-f.y);

    // Mechamaru per-frame: phase management, jet boosters, Ultimate missiles, True Form timer

    // Berserk per-frame: reload timer, speed boost decay
    if(f.char.id==='berserk'){

      if(f.berserkSpeedBoost>0&&!f.berserkInvincible){

    // Smasher per-frame: warning cone countdown → fire rockets, toxic tracking, airborne
    if(f.char.id==='smasher'){

      // Toxic element: track rapid hits for bonus damage
      if(f.elementActive&&f.elem.id==='toxic'){

      if(f.smasherGatlingReload>0){

      if(f.smasherWarning>0){

              x:f.x+Math.cos(ba)*f.radius,
              y:f.y+Math.sin(ba)*f.radius,

    // Gojo per-frame: infinity regen, spin mechanic, revival, chaos scaling
    if(f.char.id==='gojo'){
      // Purple cooldown tick
      if(f.gojoPurpleCD>0)f.gojoPurpleCD-=dt;
      // Infinity regen — slow passive regen (blocked by Higuruma confiscation/disable)
      if(f.gojoInfinityCharges<f.gojoInfinityMax&&f.higurumaDisableTimer<=0){
        f.gojoInfinityRegenCD-=dt;
        if(f.gojoInfinityRegenCD<=0){
          f.gojoInfinityCharges=Math.min(f.gojoInfinityMax,f.gojoInfinityCharges+1);
          f.gojoInfinityRegenCD=Math.round((f.gojoAwakened?240:360)*(f._gojoInfinityRegenMult||1)); // much slower regen, win buff speeds it up
          spawnParticle(f.x+rand(-10,10),f.y+rand(-10,10),'#8888ff',0,-1,15,2);
        }
      }
      // Awakened: less infinity charges
      if(f.gojoAwakened&&f.gojoInfinityMax===5){
        f.gojoInfinityMax=3;
        f.gojoInfinityCharges=Math.min(f.gojoInfinityCharges,3);
      }
      // Spin mechanic — enemy spins around Gojo taking damage
      if(f.gojoSpinTarget&&f.gojoSpinTarget.alive&&f.gojoSpinTimer>0){
        const t=f.gojoSpinTarget;
        f.gojoSpinTimer-=dt;
        f.gojoSpinAngle+=0.12*dt; // spin speed increases slightly
        const spinR=f.radius+t.radius+5;
        t.x=f.x+Math.cos(f.gojoSpinAngle)*spinR;
        t.y=f.y+Math.sin(f.gojoSpinAngle)*spinR;
        t.vx=0;t.vy=0;
        t.captureTimer=Math.max(t.captureTimer,5);

        if(battleTime%8<dt){
          const spinDmg=f.atk*0.3;
          dealDamage(f,t,spinDmg,false);
          spawnBurst(t.x,t.y,'#9944ff',4,2);
        }
        // Launch at end
        if(f.gojoSpinTimer<=0){
          const launchAngle=f.gojoSpinAngle;
          const launchSpeed=12;
          t.vx=Math.cos(launchAngle)*launchSpeed;
          t.vy=Math.sin(launchAngle)*launchSpeed;
          t.captureTimer=0;
          dealDamage(f,t,f.atk*1.5,true);
          spawnBurst(t.x,t.y,'#ff4444',15,6);

        // Blue particles swirling
        if(battleTime%2<1){

          spawnParticle(f.x+Math.cos(pa)*50,f.y+Math.sin(pa)*50,'#5577ff',

        if(f.gojoReviveTimer<=0){
          f.gojoReviving=false;

    // Mahoraga per-frame: adaptation wheel visual, Negation Shield, Shinjuku mode, Sword of Extermination
    if(f.char.id==='mahoraga'){

          explosions.push({x:f.mahoSlamPos.x,y:f.mahoSlamPos.y,radius:0,maxRadius:slamR,color:'#ff2244',life:15,maxLife:15,dmg:0,owner:null,target:null,hit:true});
          shakeTimer=15;shakeAmt=12;
          SFX.heavyHit();
          f.mahoSlamPos=null;
        }
        if(f.mahoSlamTimer<=0){
          f.mahoSlamActive=false;
          f.mahoSlamCD=f.mahoShinjuku?120:180; // faster in Shinjuku
        }
      }
      // Auto-slam: periodically slam toward closest enemy
      if(!f.mahoSlamActive&&f.mahoSlamCD<=0&&enemy&&enemy.alive){
        f.mahoSlamActive=true;
        f.mahoSlamTimer=40;
        f.mahoSlamPos={x:enemy.x,y:enemy.y};

      }
      // Wide arc swipe — hits all enemies in front
      if(f.mahoSwipeCD<=0&&enemy&&enemy.alive&&dist(f,enemy)<f.range*1.5){

        fighters.filter(e=>e.side!==f.side&&e.alive).forEach(e=>{
          const ea=angle(f,e);
          let diff=ea-swipeAngle;

    // Dabura Karaba per-frame: phase transitions, light orbs, pillars, dash, domain, RCT
    if(f.char.id==='dabura'){

      if(f.dabPhaseTransition>0){

        f.vx=0;f.vy=0;
        f.stunTimer=0;f.freezeTimer=0;
        if(battleTime%2<1){
          const pa=Math.random()*Math.PI*2;

            f.dabDarkFlip?'#6622aa':'#ffcc44',Math.cos(pa+Math.PI)*2,Math.sin(pa+Math.PI)*2,15,3);

      // Aura rotation
      f.dabAuraAngle+=0.03*dt;

      if(f.dabDarkSelfDmgCD>0)f.dabDarkSelfDmgCD-=dt;
      if(f.dabSwordSwing>0)f.dabSwordSwing-=dt;

      if(f.dabRCTActive&&f.dabRCTHealed<f.dabRCTCap){
        const cryoMult=(f.elementActive&&f.elem.id==='cryo')?1.5:1;

        spawnBurst(f.x,f.y,f.dabDarkFlip?'#6622aa':'#ffee88',6,3);

      // Update orbs
      for(let i=f.dabOrbs.length-1;i>=0;i--){
