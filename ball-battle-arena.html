        f.kashimoStaffAngle=angle(f,enemy);
        if(f.kashimoDartTimer<=0){
          f.kashimoDartPhase='dash';
          f.kashimoDartTimer=18; // dash duration per bounce
          f.kashimoDartDashAngle=angle(f,enemy)+(Math.random()-0.5)*0.8;
        }
      }
      else if(f.kashimoDartPhase==='dash'){
        // Electricity dash — bounce around hitting enemy
        f.kashimoDartTimer-=dt;
        const dashSpd=10+chaos*0.5;
        f.vx=Math.cos(f.kashimoDartDashAngle)*dashSpd;
        f.vy=Math.sin(f.kashimoDartDashAngle)*dashSpd;
        // Electricity trail
        spawnParticle(f.x,f.y,pick(['#ffcc00','#ffee66','#fff']),0,0,6,2);
        // Hit enemy during dash
        if(enemy.alive&&dist(f,enemy)<f.radius+enemy.radius+15){
          const dashDmg=f.atk*(0.6+chaos*0.05);
          const elecMult=f.elementActive&&f.elem.id==='electric'?1.8:1;
          dealDamage(f,enemy,dashDmg*elecMult);
          SFX.kashimoDash();
          spawnBurst(enemy.x,enemy.y,'#ffcc00',8,4);
          shakeTimer=3;shakeAmt=3;
        }
        if(f.kashimoDartTimer<=0){
          f.kashimoDartDashes++;
          if(f.kashimoDartDashes>=f.kashimoDartMaxDashes){
            // Grab staff back
            f.kashimoDartPhase='grab';
            f.kashimoDartTimer=15;
          } else {
            // Bounce to new direction
            f.kashimoDartDashAngle=angle(f,enemy)+(Math.random()-0.5)*1.0;
            f.kashimoDartTimer=18;
          }
        }
      }
      else if(f.kashimoDartPhase==='grab'){
        f.kashimoDartTimer-=dt;
        f.vx*=0.9;f.vy*=0.9; // decelerate
        if(f.kashimoDartTimer<=0){
          // Grab staff → fire homing bolt
          f.kashimoStaffThrown=false;
          f.kashimoStaffMode=true;
          f.kashimoDartPhase='bolt';
          f.kashimoBoltActive=true;
          f.kashimoBoltTimer=90; // bolt travel time
          f.kashimoBoltAngle=angle(f,enemy)+Math.PI*0.4; // start offset for curve
          const boltDist=80;
          f.kashimoBoltPos={x:f.x+Math.cos(f.kashimoBoltAngle)*boltDist,y:f.y+Math.sin(f.kashimoBoltAngle)*boltDist};
          SFX.kashimoBolt();
          spawnBurst(f.x,f.y,'#ffcc00',12,5);
        }
      }
      else if(f.kashimoDartPhase==='bolt'){
        // Homing bolt — slow curve then dart guaranteed hit
        f.kashimoBoltTimer-=dt;
        if(enemy.alive){
          const toEnemy=angle(f.kashimoBoltPos,enemy);
          // Slow curve phase then dart
          const curveRate=f.kashimoBoltTimer>30?0.04:0.15; // slow then fast
          let diff=toEnemy-f.kashimoBoltAngle;
          while(diff>Math.PI)diff-=Math.PI*2;
          while(diff<-Math.PI)diff+=Math.PI*2;
          f.kashimoBoltAngle+=diff*curveRate*dt;
          const boltSpd=f.kashimoBoltTimer>30?4:8; // slow then dart
          f.kashimoBoltPos.x+=Math.cos(f.kashimoBoltAngle)*boltSpd*dt;
          f.kashimoBoltPos.y+=Math.sin(f.kashimoBoltAngle)*boltSpd*dt;
          // Trail
          spawnParticle(f.kashimoBoltPos.x,f.kashimoBoltPos.y,pick(['#ffcc00','#ffee00','#fff']),0,0,8,3);
          // Hit check
          if(dist(f.kashimoBoltPos,enemy)<enemy.radius+12){
            const boltDmg=f.atk*(1.5+chaos*0.12);
            const elecMult=f.elementActive&&f.elem.id==='electric'?1.8:1;
            dealDamage(f,enemy,boltDmg*elecMult);
            SFX.kashimoZap();
            spawnBurst(enemy.x,enemy.y,'#ffcc00',15,6);
            spawnBurst(enemy.x,enemy.y,'#fff',10,4);
            shakeTimer=6;shakeAmt=5;
            spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'BOLT!','#ffcc00',false);
            f.kashimoBoltActive=false;
            f.kashimoDartPhase='idle';
            f.kashimoDartCD=480+rand(0,120)-Math.min(240,chaos*30); // faster dart at high chaos
          }
        }
        if(f.kashimoBoltTimer<=0){
          // Bolt expired (should have hit by now due to homing, but safety)
          f.kashimoBoltActive=false;
          f.kashimoDartPhase='idle';
          f.kashimoDartCD=480+rand(0,120)-Math.min(240,chaos*30);
        }
      }

      // Random lightning bolts during staff mode
      if(f.kashimoStaffMode&&!f.kashimoAmberActive&&enemy.alive){
        f.kashimoZapTimer-=dt;
        let zapRate=120-chaos*10; // faster zaps at high chaos
        if(f.elementActive&&f.elem.id==='fire')zapRate*=0.6; // fire = way more zaps
        if(f.kashimoZapTimer<=0){
          f.kashimoZapTimer=Math.max(40,zapRate)+rand(0,30);
          // Random bolt at enemy
          SFX.kashimoZap();
          const zapDmg=f.atk*(0.4+chaos*0.03);
          const elecMult=f.elementActive&&f.elem.id==='electric'?1.8:1;
          if(Math.random()<0.7){ // 70% hit chance
            dealDamage(f,enemy,zapDmg*elecMult);
            spawnBurst(enemy.x,enemy.y,'#ffcc00',6,3);
            // Lightning visual: line from Kashimo to enemy
            for(let i=0;i<4;i++){
              const t=i/4;
              const lx=f.x+(enemy.x-f.x)*t+(Math.random()-0.5)*20;
              const ly=f.y+(enemy.y-f.y)*t+(Math.random()-0.5)*20;
              spawnParticle(lx,ly,'#ffcc00',0,0,8,2);
            }
          } else {
            // Miss — bolt hits random spot
            const mx=f.x+(Math.random()-0.5)*200;
            const my=f.y+(Math.random()-0.5)*200;
            spawnBurst(mx,my,'#ffcc00',4,2);
          }
        }
      }
    }

    // Throwing weapon management
    if(f.char.id==='throw'){
      const chaos=getChaosLevel(f);
      // Update return cooldowns
      f.throwWeapons.forEach((tw,idx)=>{
        if(!tw.available&&tw.returnCD>0){
          tw.returnCD-=dt;
          if(tw.returnCD<=0){tw.available=true;tw.returnCD=0;}
        }
      });
      // Auto-switch to preferred available weapon (Agaou > Fang > Punkblade)
      const avail=f.throwWeapons.filter(tw=>tw.available);
      if(avail.length>0){
        const throwPriority={agaou:3,fang:2,punk:1};
        const strongest=avail.sort((a,b)=>(throwPriority[b.id]||0)-(throwPriority[a.id]||0))[0];
        const sIdx=f.throwWeapons.indexOf(strongest);
        if(sIdx!==f.throwActiveIdx&&f.throwSwitchCD<=0){
          f.throwActiveIdx=sIdx;
          f.throwSwitchCD=60; // 1 second switch
        }
      }
      if(f.throwSwitchCD>0)f.throwSwitchCD-=dt;
      // Pickup embedded weapons when near
      f.throwEmbedded.forEach(emb=>{
        if(!emb.active)return;
        emb.life-=dt;
        if(emb.life<=0){emb.active=false;f.throwWeapons[emb.weaponIdx].available=true;return;}
        // Can pick up if within range and <180 frames left
        if(emb.life<180&&dist(f,emb)<f.radius+25){
          f.throwWeapons[emb.weaponIdx].available=true;
          f.throwWeapons[emb.weaponIdx].returnCD=0;
          emb.active=false;
          spawnBurst(emb.x,emb.y,f.throwWeapons[emb.weaponIdx].color,6,3);
        }
        // Ice element: spinning embedded weapons damage enemies
        if(f.elementActive&&f.elem.id==='cryo'&&enemy.alive){
          if(dist(enemy,emb)<enemy.radius+15&&battleTime%12<dt){
            dealDamage(f,enemy,f.atk*0.2,false);
            spawnBurst(emb.x,emb.y,'#77ddff',4,2);
          }
        }
      });
    }

    // Katana per-frame: deflect CD, deflect pose timer, counter-dash, rush deflect CD reset
    if(f.char.id==='katana'){
      if(f.katanaDeflecting>0)f.katanaDeflecting-=dt;
      if(f.katanaDeflectCD>0)f.katanaDeflectCD-=dt;
      if(f.katanaPostDashTimer>0)f.katanaPostDashTimer-=dt;
      // Counter-dash: weaker mantis-blade-like rush → single slash → bounce back
      if(f.katanaDashing&&f.katanaDashTarget&&f.katanaDashTarget.alive){
        f.katanaDashTimer-=dt;
        if(f.katanaDashTimer<=0){f.katanaDashing=false;f.katanaPostDashTimer=60;} // timeout — unstick
        const t=f.katanaDashTarget;
        const d=dist(f,t);
        const a=angle(f,t);
        // Rush toward enemy (slower than mantis blade dash)
        f.vx=Math.cos(a)*7;f.vy=Math.sin(a)*7;
        f.weaponAngle=a;f.weaponExtend=1;f.weaponFlash=5;
        // Orange trail behind (like mantis blade trail)
        spawnParticle(f.x,f.y,'#ff6644',-f.vx*0.15,-f.vy*0.15,12,2.5);
        spawnParticle(f.x,f.y,'#ffcc00',-f.vx*0.1,-f.vy*0.1,8,1.5);
        if(f.katanaDashTimer<=0||d<f.radius+t.radius+15){
          // Hit! Single slash like weaker mantis finisher
          f.katanaDashing=false;
          f.katanaPostDashTimer=60; // 1 second of 80% dmg reduction after counter-dash
          dealDamage(f,t,f.atk*1.5,true);
          SFX.katanaSlash();
          // Slash visual burst
          spawnBurst(t.x,t.y,'#ff6644',18,6);
          spawnBurst(t.x,t.y,'#ffcc00',10,4);
          // Slash lines (mini X like mantis)
          for(let i=0;i<8;i++){
            const st=i/8;
            spawnParticle(lerp(t.x-25,t.x+25,st),lerp(t.y-25,t.y+25,st),'#ff6644',0,0,12,2);
          }
          shakeTimer=10;shakeAmt=6;
          // Bounce away
          const ka=angle(t,f);
          f.vx=Math.cos(ka)*7;f.vy=Math.sin(ka)*7;
        }
      } else if(f.katanaDashing){f.katanaDashing=false;f.katanaPostDashTimer=60;}
      // During relic rush, deflect CD resets constantly
      if(f.katanaRushing)f.katanaDeflectCD=0;
    }

    // Berserk per-frame: reload timer, speed boost decay
    if(f.char.id==='berserk'){
      if(f.berserkReloadTimer>0){
        f.berserkReloadTimer-=dt;
        if(f.berserkReloadTimer<=0)SFX.shellLoad();
      }
      // Speed boost slowly decays
      if(f.berserkSpeedBoost>0&&!f.berserkInvincible){
        f.berserkSpeedBoost=Math.max(0,f.berserkSpeedBoost-0.003*dt);
        f.speed=f.baseSpeed+f.berserkSpeedBoost;
      }
    }

    // Smasher per-frame: warning cone countdown → fire rockets, toxic tracking, airborne
    if(f.char.id==='smasher'){
      // Smasher Sandy immunity during relic
      if(f._smasherSandyImmune)f.sandyTimeScale=1;
      // Toxic element: track rapid hits for bonus damage
      if(f.elementActive&&f.elem.id==='toxic'){
        if(battleTime-f.smasherLastHitTime>45)f.smasherRapidHitCount=0;
      }
      // GATLING GUN: continuous rapid-fire (7s burst → 5s reload cycle)
      if(!f._gatlingCD)f._gatlingCD=0;
      if(f._gatlingCD>0)f._gatlingCD-=dt;
      if(f.smasherGatlingReload>0){
        // Reloading — no firing
        f.smasherGatlingReload-=dt;
        if(f.smasherGatlingReload<=0){
          f.smasherGatlingBurst=420; // 7s burst ready
          f.smasherGatlingReload=0;
        }
      } else if(f.smasherGatlingBurst>0&&!f.specialActive&&!f.smasherAirborne){
        // Burst phase — fire tracking bullets at closest enemy
        f.smasherGatlingBurst-=dt;
        if(f.smasherGatlingBurst<=0){
          f.smasherGatlingReload=300; // 5s reload
          f.smasherGatlingBurst=0;
        }
        if(f._gatlingCD<=0){
          f._gatlingCD=12; // rapid fire rate
          const enemies=fighters.filter(e=>e.side!==f.side&&e.alive);
          if(enemies.length>0){
            const target=enemies.reduce((a,b)=>dist(f,a)<dist(f,b)?a:b);
            const ga=angle(f,target)+(Math.random()-0.5)*0.5; // tracking with some spread
            projectiles.push({
              x:f.x+Math.cos(ga)*f.radius,y:f.y+Math.sin(ga)*f.radius,
              vx:Math.cos(ga)*10,vy:Math.sin(ga)*10,
              owner:f,target:null,color:'#ffaa44',
              life:35,radius:3,dmg:f.atk*0.25,
              explosive:false,homing:false,isGatling:true,
            });
            spawnParticle(f.x+Math.cos(ga)*f.radius,f.y+Math.sin(ga)*f.radius,'#ffaa44',0,0,5,2);
            if(battleTime%18<dt)SFX.hit();
          }
        }
      }
      // Triangle warning countdown → fire explosive bursts when done
      if(f.smasherWarning>0){
        f.smasherWarning-=dt;
        f.weaponAngle=f.smasherWarningAngle; // lock aim during warning
        f.vx=0;f.vy=0; // freeze movement during warning cone
        // Warning flash particles
        if(battleTime%4<1){
          const wa=f.smasherWarningAngle;
          spawnParticle(f.x+Math.cos(wa)*f.radius,f.y+Math.sin(wa)*f.radius,'#ff4444',Math.cos(wa)*2,Math.sin(wa)*2,10,2);
        }
        if(f.smasherWarning<=0&&f.smasherWarningReady){
          f.smasherWarningReady=false;
          // FIRE giant non-homing rockets
          const chaos=getChaosLevel(f);
          const ba=f.smasherWarningAngle;
          SFX.rocketLaunch();
          f.weaponExtend=1;f.weaponFlash=15;
          const rocketDmg=f.atk*(1.8+chaos*0.2); // huge damage
          const rocketSpeed=8+chaos*0.4;
          const rocketCount=chaos>4?3:2;
          const spread=0.4; // wide cone spread matching warning
          for(let r=0;r<rocketCount;r++){
            const spreadAngle=ba+(r-(rocketCount-1)/2)*spread;
            projectiles.push({
              x:f.x+Math.cos(ba)*f.radius,
              y:f.y+Math.sin(ba)*f.radius,
              vx:Math.cos(spreadAngle)*rocketSpeed,vy:Math.sin(spreadAngle)*rocketSpeed,
              owner:f,target:null,color:'#ff4444',
              life:80,radius:12,dmg:rocketDmg, // bigger radius
              explosive:true,explosionRadius:70+chaos*5,homing:false, // NON-homing
              isRocket:true,
            });
          }
          spawnBurst(f.x+Math.cos(ba)*f.radius,f.y+Math.sin(ba)*f.radius,'#ff6644',20,8);
          spawnBurst(f.x+Math.cos(ba)*f.radius,f.y+Math.sin(ba)*f.radius,'#ffaa44',12,5);
          // Fire element: fire zones
          if(f.elementActive&&f.elem.id==='fire'){
            fireZones.push({x:f.x+Math.cos(ba)*f.radius*2,y:f.y+Math.sin(ba)*f.radius*2,
              radius:40,life:180,maxLife:180,owner:f,dmg:f.atk*0.1});
          }
        }
      }
    }

    // Gojo per-frame: infinity regen, spin mechanic, revival, chaos scaling
    if(f.char.id==='gojo'){
      // Purple cooldown tick
      if(f.gojoPurpleCD>0)f.gojoPurpleCD-=dt;
      // Infinity regen — slow passive regen
      if(f.gojoInfinityCharges<f.gojoInfinityMax){
        f.gojoInfinityRegenCD-=dt;
        if(f.gojoInfinityRegenCD<=0){
          f.gojoInfinityCharges=Math.min(f.gojoInfinityMax,f.gojoInfinityCharges+1);
          f.gojoInfinityRegenCD=f.gojoAwakened?240:360; // much slower regen
          spawnParticle(f.x+rand(-10,10),f.y+rand(-10,10),'#8888ff',0,-1,15,2);
        }
      }
      // Awakened: less infinity charges
      if(f.gojoAwakened&&f.gojoInfinityMax===5){
        f.gojoInfinityMax=3;
        f.gojoInfinityCharges=Math.min(f.gojoInfinityCharges,3);
      }
      // Spin mechanic — enemy spins around Gojo taking damage
      if(f.gojoSpinTarget&&f.gojoSpinTarget.alive&&f.gojoSpinTimer>0){
        const t=f.gojoSpinTarget;
        f.gojoSpinTimer-=dt;
        f.gojoSpinAngle+=0.12*dt; // spin speed increases slightly
        const spinR=f.radius+t.radius+5;
        t.x=f.x+Math.cos(f.gojoSpinAngle)*spinR;
        t.y=f.y+Math.sin(f.gojoSpinAngle)*spinR;
        t.vx=0;t.vy=0;
        t.captureTimer=Math.max(t.captureTimer,5);
        // Spin damage ticks
        if(battleTime%8<dt){
          const spinDmg=f.atk*0.3;
          dealDamage(f,t,spinDmg,false);
          spawnBurst(t.x,t.y,'#9944ff',4,2);
        }
        // Launch at end
        if(f.gojoSpinTimer<=0){
          const launchAngle=f.gojoSpinAngle;
          const launchSpeed=12;
          t.vx=Math.cos(launchAngle)*launchSpeed;
          t.vy=Math.sin(launchAngle)*launchSpeed;
          t.captureTimer=0;
          dealDamage(f,t,f.atk*1.5,true);
          spawnBurst(t.x,t.y,'#ff4444',15,6);
          SFX.punch();
          shakeTimer=10;shakeAmt=8;
          addLog('GOJO LAUNCH!');
          f.gojoSpinTarget=null;
        }
      } else {
        f.gojoSpinTarget=null;f.gojoSpinTimer=0;
      }
      // Revival animation — float up, HP refill
      if(f.gojoReviving){
        f.gojoReviveTimer-=dt;
        f.vx=0;f.vy=-0.5; // float up
        f.hp=Math.min(f.maxHp,f.hp+f.maxHp/90*dt); // refill over ~1.5 sec
        // Blue particles swirling
        if(battleTime%2<1){
          const pa=battleTime*0.15+Math.random()*Math.PI*2;
          spawnParticle(f.x+Math.cos(pa)*50,f.y+Math.sin(pa)*50,'#5577ff',
            Math.cos(pa+Math.PI)*2,Math.sin(pa+Math.PI)*2,15,3);
        }
        if(f.gojoReviveTimer<=0){
          f.gojoReviving=false;
          f.gojoAwakened=true;
          f.maxHp=1000; // phase 2 HP
          f.hp=f.maxHp;
          f.gojoPurpleChance=0.15;
          // Boost stats for awakened
          f.atk=Math.round(f.baseAtk*1.2);
          f.speed=f.baseSpeed*1.15;
          spawnBurst(f.x,f.y,'#5577ff',30,8);
          spawnBurst(f.x,f.y,'#ffffff',20,6);
          shakeTimer=15;shakeAmt=10;
          SFX.relicActivate();
          addLog('GOJO AWAKENED!');
        }
      }
      // Chaos scaling: faster attack charge time
    }

    // Weapon attack — PLS fires on interval only, others need facing
    // Throw char keeps normal attack cycle during Optical Camo (no machine gun)
    // Berserk + Smasher keep attacking during relic
    if(!f.specialActive||f.char.id==='gorilla'||f.char.id==='throw'||f.char.id==='berserk'||f.char.id==='smasher'||f.char.id==='gojo'){
      // Smasher: skip attacks while airborne; Gojo: skip during domain or reviving
      if(f.char.id==='smasher'&&f.smasherAirborne){/* airborne */}
      else if(f.char.id==='gojo'&&(f.gojoDomainActive||f.gojoReviving)){/* domain/revive */}
      else if(f.attackTimer>0)f.attackTimer-=dt*f.sandyTimeScale; // slowed by Sandevistan
      else if(f.attackTimer<=0){
        // PLS fires purely on interval — projectile aims toward enemy
        // Throw needs facing (but ult handles auto-throw separately)
        // Others need weapon to face enemy
        // Throw: skip if no weapon available
        if(f.char.id==='throw'&&!f.throwWeapons[f.throwActiveIdx].available){/* wait */}
        else if(f.char.id==='berserk'&&f.berserkReloadTimer>0){/* reloading */}
        else if(f.char.id==='katana'&&f.katanaDashing){/* mid counter-dash */}
        else if(f.char.id==='pls'||f.char.id==='berserk'||f.char.id==='smasher'||f.char.id==='gojo'||f.char.id==='ryu'||isWeaponFacingEnemy(f,enemy)){
          f.attackTimer=getAttackInterval(f);
          performWeaponAttack(f,enemy);
        }
      }
    }

    // Physics movement
    updatePhysics(f,dt);
  });

  // Ball-to-ball collision — all pairs
  for(let a=0;a<fighters.length;a++){
    for(let b=a+1;b<fighters.length;b++){
      if(fighters[a].alive&&fighters[b].alive)checkBallCollision(fighters[a],fighters[b]);
    }
  }

  // Weapon parry check — all pairs of enemy fighters with weapons
  for(let a=0;a<fighters.length;a++){
    for(let b=a+1;b<fighters.length;b++){
      const fa=fighters[a],fb=fighters[b];
      if(!fa.alive||!fb.alive)continue;
      if(fa.side===fb.side)continue; // teammates don't parry
      if(fa.char.id==='sandy'||fb.char.id==='sandy')continue;
      const tipDist1=Math.min(fa.range*0.7,80);
      const tipDist2=Math.min(fb.range*0.7,80);
      const w1={x:fa.x+Math.cos(fa.weaponAngle)*tipDist1,y:fa.y+Math.sin(fa.weaponAngle)*tipDist1};
      const w2={x:fb.x+Math.cos(fb.weaponAngle)*tipDist2,y:fb.y+Math.sin(fb.weaponAngle)*tipDist2};
      if(dist(w1,w2)<35&&!fa._parryCooldown&&!fb._parryCooldown){
        const cx=(w1.x+w2.x)/2,cy=(w1.y+w2.y)/2;
        spawnBurst(cx,cy,'#ffffff',30,9);
        spawnBurst(cx,cy,'#ffcc00',25,7);
        spawnBurst(cx,cy,'#ffaa00',15,5);
        spawnSparks(cx,cy,'#ffdd44',18);
        for(let i=0;i<12;i++){const pa=Math.PI*2*i/12;spawnParticle(cx,cy,'#ffcc00',Math.cos(pa)*5,Math.sin(pa)*5,14,3);}
        shakeTimer=16;shakeAmt=10;
        SFX.clash();
        const ka=angle(fb,fa);
        fa.vx+=Math.cos(ka)*5;fa.vy+=Math.sin(ka)*5;
        fb.vx-=Math.cos(ka)*5;fb.vy-=Math.sin(ka)*5;
        fa.specialBar=Math.min(fa.specialMax,fa.specialBar+8*(fa.char.relicChargeRate||1));
        fb.specialBar=Math.min(fb.specialMax,fb.specialBar+8*(fb.char.relicChargeRate||1));
        addLog('WEAPON CLASH!');
        spawnDmgNum(cx,cy-15,'PARRY!','#ffcc00',true);
        fa._parryCooldown=30;fb._parryCooldown=30;
      }
      if(fa._parryCooldown>0)fa._parryCooldown-=dt;
      if(fb._parryCooldown>0)fb._parryCooldown-=dt;
    }
  }

  // Update projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];

    // Homing behavior
    if(p.homing&&p.target&&p.target.alive){
      const da=angle(p,p.target);
      const currentAngle=Math.atan2(p.vy,p.vx);
      let diff=da-currentAngle;
      while(diff>Math.PI)diff-=Math.PI*2;
      while(diff<-Math.PI)diff+=Math.PI*2;
      const homeSlow=(p.owner&&p.owner.sandyTimeScale<1)?p.owner.sandyTimeScale:1;
      const turn=diff*p.homingStrength*homeSlow;
      const spd=Math.hypot(p.vx,p.vy);
      const na=currentAngle+turn;
      p.vx=Math.cos(na)*spd;
      p.vy=Math.sin(na)*spd;
    }

    // Slow projectiles from slowed owners (Sandevistan)
    const pSlow=(p.owner&&p.owner.sandyTimeScale<1)?p.owner.sandyTimeScale:1;
    p.x+=p.vx*dt*pSlow;p.y+=p.vy*dt*pSlow;p.life-=dt;
    spawnParticle(p.x,p.y,p.color,0,0,8,2);

    // Check hit on target (or any enemy if no target)
    let hit=false;
    if(p.target&&p.target.alive&&dist(p,p.target)<p.target.radius+p.radius){hit=true;}
    else if(!p.target){
      // No specific target — check all enemy fighters
      fighters.forEach(f=>{
        if(f&&f.alive&&f!==p.owner&&f.side!==p.owner.side&&dist(p,f)<f.radius+p.radius){
          p.target=f;hit=true;
        }
      });
    }

    // Check wall hit (for explosive projectiles)
    let wallHit=false;
    if(p.x<ARENA.x||p.x>ARENA.x+ARENA.w||p.y<ARENA.y||p.y>ARENA.y+ARENA.h){wallHit=true;}

    if(hit){
      if(p.explosive){
        spawnExplosion(p.target.x,p.target.y,p.explosionRadius,p.color,p.dmg,p.owner,p.target);
        dealDamage(p.owner,p.target,p.dmg);
      } else {
        dealDamage(p.owner,p.target,p.dmg);
        spawnBurst(p.target.x,p.target.y,p.color,8,3);
      }
      // Ryu Ring: knockback
      if(p.isRyuRing&&p.target&&p.target.alive){
        const ka=Math.atan2(p.vy,p.vx);
        const kb=p.knockback||6;
        p.target.vx+=Math.cos(ka)*kb;p.target.vy+=Math.sin(ka)*kb;
        spawnBurst(p.target.x,p.target.y,'#cc6633',10,4);
        shakeTimer=4;shakeAmt=3;
      }
      // Ryu Special Blast: ALWAYS split on hit (main gimmick)
      if(p.isRyuSpecialBlast){
        ryuSpawnSplits(p);
      }
      // Gojo Red projectile hit: knockback enemy away from projectile direction
      if(p.isGojoRed&&p.target&&p.target.alive){
        const ka=Math.atan2(p.vy,p.vx);
        const kb=p.knockback||8;
        p.target.vx+=Math.cos(ka)*kb;p.target.vy+=Math.sin(ka)*kb;
        spawnBurst(p.target.x,p.target.y,'#ff4444',12,5);
        shakeTimer=6;shakeAmt=4;
      }
      // Gojo Blue projectile hit: pull enemy toward Gojo
      if(p.isGojoBlue&&p.target&&p.target.alive&&p.gojoOwner){
        const pa=angle(p.target,p.gojoOwner);
        const ps=p.pullStrength||7;
        p.target.vx+=Math.cos(pa)*ps;p.target.vy+=Math.sin(pa)*ps;
        spawnBurst(p.target.x,p.target.y,'#4488ff',10,4);
        // If pulled very close, start spinning
        if(dist(p.target,p.gojoOwner)<p.gojoOwner.radius+p.target.radius+25&&!p.gojoOwner.gojoSpinTarget){
          p.gojoOwner.gojoSpinTarget=p.target;
          p.gojoOwner.gojoSpinAngle=angle(p.gojoOwner,p.target);
          p.gojoOwner.gojoSpinTimer=90;
          addLog('GOJO SPIN!');
        }
        shakeTimer=5;shakeAmt=3;
      }
      // Choso Piercing Blood: track blood hits for poison stacking
      if(p.isChosoPiercing&&p.owner){
        p.owner.chosoBloodHits++;
        if(p.owner.elementActive&&p.owner.elem.id==='toxic'&&p.owner.chosoBloodHits>=5){
          p.owner.chosoBloodHits=0;
          if(p.target&&p.target.alive){
            p.target.burnTimer=Math.max(p.target.burnTimer,180);
            p.target.burnDmg=Math.max(p.target.burnDmg,p.owner.atk*0.15);
            spawnDmgNum(p.target.x,p.target.y-p.target.radius-25,'BLOOD POISON','#aa44cc',false);
            spawnBurst(p.target.x,p.target.y,'#aa44cc',8,3);
          }
        }
      }
      // Throwing weapon on hit: return instantly
      if(p.isThrowWeapon&&p.owner){
        p.owner.throwWeapons[p.throwIdx].available=true;
        p.owner.throwWeapons[p.throwIdx].returnCD=0;
      }
      // Berserk+electric: pellets return after hitting (spawn new pellet back at berserk)
      if(p.isShotgunPellet&&p.owner&&p.owner.elementActive&&p.owner.elem.id==='electric'&&Math.random()<0.35){
        const returnAngle=angle(p.target,p.owner);
        projectiles.push({x:p.target.x,y:p.target.y,vx:Math.cos(returnAngle)*8,vy:Math.sin(returnAngle)*8,
          owner:p.owner,target:p.target,color:'#ffcc00',life:40,radius:4,dmg:p.dmg*0.4,
          explosive:false,explosionRadius:0,homing:false,isShotgunPellet:false});
        spawnBurst(p.target.x,p.target.y,'#ffcc00',4,2);
      }
      projectiles.splice(i,1);continue;
    }

    if(wallHit&&p.explosive){
      // PLS orbs explode even on walls
      const ex=clamp(p.x,ARENA.x,ARENA.x+ARENA.w);
      const ey=clamp(p.y,ARENA.y,ARENA.y+ARENA.h);
      spawnExplosion(ex,ey,p.explosionRadius,p.color,p.dmg*0.5,p.owner,p.target);
      // Check if target is in explosion radius
      if(p.target&&p.target.alive&&dist({x:ex,y:ey},p.target)<p.explosionRadius){
        dealDamage(p.owner,p.target,p.dmg*0.5);
      }
      // PLS+electric: wall hit = explode TWICE — second explosion immediately offset
      if(p.owner&&p.owner.elementActive&&p.owner.elem.id==='electric'&&p.owner.char.id==='pls'){
        const ex2=ex+(Math.random()-0.5)*25,ey2=ey+(Math.random()-0.5)*25;
        spawnExplosion(clamp(ex2,ARENA.x,ARENA.x+ARENA.w),clamp(ey2,ARENA.y,ARENA.y+ARENA.h),p.explosionRadius*0.8,'#ffcc00',p.dmg*0.3,p.owner,p.target);
        if(p.target&&p.target.alive&&dist({x:ex2,y:ey2},p.target)<p.explosionRadius*0.8){
          dealDamage(p.owner,p.target,p.dmg*0.3);
        }
        SFX.explode();
      }
      // PLS+fire: leave fire zone at wall
      if(p.owner&&p.owner.elementActive&&p.owner.elem.id==='fire'&&p.owner.char.id==='pls'){
        fireZones.push({x:ex,y:ey,radius:25,life:60,maxLife:60,owner:p.owner,dmg:p.owner.atk*0.2});
      }
      projectiles.splice(i,1);continue;
    }

    if(p.life<=0||wallHit){
      // Ryu Special Blast: split even on expire/wall (always splits)
      if(p.isRyuSpecialBlast){
        ryuSpawnSplits(p);
      }
      // Throwing weapon missed — embed on ground, start return cooldown
      if(p.isThrowWeapon&&p.owner){
        const tw=p.owner.throwWeapons[p.throwIdx];
        // Electric element: 15-30% chance auto-return
        if(p.owner.elementActive&&p.owner.elem.id==='electric'&&Math.random()<(0.15+getChaosLevel(p.owner)*0.03)){
          tw.available=true;tw.returnCD=0;
          spawnBurst(p.x,p.y,'#ffcc00',8,3);
          spawnDmgNum(p.x,p.y-15,'AUTO-RETURN','#ffcc00',false);
        } else if(wallHit&&tw.id==='agaou'){
          // Agaou wall explosion — explode only, don't embed
          const ex=clamp(p.x,ARENA.x,ARENA.x+ARENA.w),ey=clamp(p.y,ARENA.y,ARENA.y+ARENA.h);
          spawnExplosion(ex,ey,p.explosionRadius||60,p.color,p.dmg*0.4,p.owner,p.target);
          if(p.target&&p.target.alive&&dist({x:ex,y:ey},p.target)<(p.explosionRadius||60)){
            dealDamage(p.owner,p.target,p.dmg*0.4);
          }
          SFX.explode();
          // Agaou returns after wall explosion with normal miss cooldown
          const chaos=getChaosLevel(p.owner);
          const scaledCD=Math.max(tw.missCD*0.3,tw.missCD/(1+chaos*0.3));
          tw.returnCD=scaledCD;tw.available=false;
        } else {
          // Embed weapon on ground
          const ex=clamp(p.x,ARENA.x+5,ARENA.x+ARENA.w-5);
          const ey=clamp(p.y,ARENA.y+5,ARENA.y+ARENA.h-5);
          const chaos=getChaosLevel(p.owner);
          const scaledCD=Math.max(tw.missCD*0.3,tw.missCD/(1+chaos*0.3)); // faster returns at higher chaos
          p.owner.throwEmbedded.push({x:ex,y:ey,weaponIdx:p.throwIdx,active:true,life:scaledCD,color:tw.color});
          tw.returnCD=scaledCD;
          tw.available=false;
        }
      }
      projectiles.splice(i,1);
    }

    // Weapons don't deflect projectiles — only clash with other weapons
  }

  // Update explosions
  for(let i=explosions.length-1;i>=0;i--){
    const e=explosions[i];
    e.life-=dt;
    e.radius=lerp(0,e.maxRadius,1-e.life/e.maxLife);
    if(e.life<=0)explosions.splice(i,1);
  }

  // Update gorilla shockwave projectiles (directional, non-homing)
  for(let i=shockwaveProjectiles.length-1;i>=0;i--){
    const sw=shockwaveProjectiles[i];
    sw.x+=sw.vx*dt;sw.y+=sw.vy*dt;sw.life-=dt;
    // Visual trail
    spawnParticle(sw.x,sw.y,sw.color,(Math.random()-0.5)*2,(Math.random()-0.5)*2,12,sw.size/8);
    // Check hit on enemy
    if(!sw.hit&&sw.target&&sw.target.alive&&dist(sw,sw.target)<sw.target.radius+sw.size*0.5){
      sw.hit=true;
      dealDamage(sw.owner,sw.target,sw.dmg,false);
      // Push enemy to nearest wall
      const ex=sw.target.x,ey=sw.target.y;
      const dL=ex-ARENA.x,dR=ARENA.x+ARENA.w-ex,dT=ey-ARENA.y,dB=ARENA.y+ARENA.h-ey;
      const minD=Math.min(dL,dR,dT,dB);
      let wallX,wallY;
      if(minD===dL){sw.target.vx=-8;wallX=ARENA.x;wallY=ey;}
      else if(minD===dR){sw.target.vx=8;wallX=ARENA.x+ARENA.w;wallY=ey;}
      else if(minD===dT){sw.target.vy=-8;wallX=ex;wallY=ARENA.y;}
      else{sw.target.vy=8;wallX=ex;wallY=ARENA.y+ARENA.h;}
      // Wall crack at impact point
      spawnWallCrack(wallX,wallY,sw.owner);
      spawnBurst(sw.target.x,sw.target.y,'#ffaa00',15,6);
      shakeTimer=10;shakeAmt=8;
      SFX.thunderclap();
      shockwaveProjectiles.splice(i,1);continue;
    }
    // Check wall hit — crack on miss
    if(sw.x<ARENA.x||sw.x>ARENA.x+ARENA.w||sw.y<ARENA.y||sw.y>ARENA.y+ARENA.h){
      const wx=clamp(sw.x,ARENA.x,ARENA.x+ARENA.w);
      const wy=clamp(sw.y,ARENA.y,ARENA.y+ARENA.h);
      spawnWallCrack(wx,wy,sw.owner);
      spawnBurst(wx,wy,'#ffaa00',10,4);
      SFX.punch();
      shockwaveProjectiles.splice(i,1);continue;
    }
    if(sw.life<=0){shockwaveProjectiles.splice(i,1);}
  }

  // Update fire zones (PLS+fire lingering fire)
  for(let i=fireZones.length-1;i>=0;i--){
    const fz=fireZones[i];fz.life-=dt;
    if(fz.life<=0){fireZones.splice(i,1);continue;}
    // Damage enemy if inside zone
    fighters.forEach(f=>{
      if(f.alive&&f.side!==(fz.owner?fz.owner.side:-1)&&dist(f,fz)<fz.radius+f.radius&&battleTime%10<dt){
        f.hp-=fz.dmg;f.hitFlash=5;
        spawnParticle(f.x+rand(-8,8),f.y+rand(-8,8),'#ff4400',0,-1,10,2);
        spawnDmgNum(f.x,f.y-f.radius-10,fz.dmg,'#ff4400',false);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(fz.owner);}
      }
    });
    // Visual
    if(battleTime%4<dt)spawnParticle(fz.x+rand(-fz.radius/2,fz.radius/2),fz.y+rand(-fz.radius/2,fz.radius/2),pick(['#ff4400','#ff6600','#ffaa00']),0,-1,12,2);
  }

  // Update vulnerability zones (PLS+cryo)
  for(let i=vulnZones.length-1;i>=0;i--){
    const vz=vulnZones[i];vz.life-=dt;
    if(vz.life<=0){vulnZones.splice(i,1);continue;}
    // Enemies in zone take more damage (reduce def)
    fighters.forEach(f=>{
      if(f.alive&&f.side!==(vz.owner?vz.owner.side:-1)&&dist(f,vz)<vz.radius+f.radius){
        f.defReduction=Math.max(f.defReduction,6);f.defReductionTimer=Math.max(f.defReductionTimer,15);
      }
    });
  }

  // Update poison bubbles (gorilla+toxic)
  for(let i=poisonBubbles.length-1;i>=0;i--){
    const pb=poisonBubbles[i];pb.life-=dt;
    if(pb.life<=0){poisonBubbles.splice(i,1);continue;}
    // Follow target
    if(pb.target&&pb.target.alive){pb.x=pb.target.x;pb.y=pb.target.y;}
    // Wall collision = extra poison damage
    if(pb.target&&pb.target.alive){
      const t=pb.target;
      if(t.x-t.radius<=ARENA.x+2||t.x+t.radius>=ARENA.x+ARENA.w-2||t.y-t.radius<=ARENA.y+2||t.y+t.radius>=ARENA.y+ARENA.h-2){
        if(battleTime%15<dt){
          t.hp-=pb.dmg;t.hitFlash=5;
          spawnDmgNum(t.x,t.y-t.radius-15,pb.dmg,'#aa44cc',false);
          spawnBurst(t.x,t.y,'#aa44cc',5,2);
          if(t.hp<=0){t.hp=0;t.alive=false;t.deathAnim=60;checkVictory(pb.owner);}
        }
      }
    }
    // Visual
    if(battleTime%5<dt)spawnParticle(pb.x+rand(-12,12),pb.y+rand(-12,12),'#aa44cc',0,0.5,15,2);
  }

  // Monowire+toxic: release accumulated wrap damage when capture ends
  fighters.forEach(f=>{
    if(f.monowireWrapDmgAccum>0&&f.captureTimer<=0){
      const dmg=f.monowireWrapDmgAccum;
      f.monowireWrapDmgAccum=0;
      f.hp-=dmg;f.hitFlash=8;
      spawnDmgNum(f.x,f.y-f.radius-20,dmg,'#aa44cc',true);
      spawnBurst(f.x,f.y,'#aa44cc',10,4);
      addLog((f.side===0?'P1':'P2')+' TOXIC RELEASE! '+Math.round(dmg));
      if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(fighters.find(e=>e.side!==f.side&&e.alive));}
    }
  });

  // Gorilla+fire: wall collision damage
  fighters.forEach(f=>{
    if(!f.alive)return;
    // Check if any enemy gorilla with fire element is active
    const gorillaFire=fighters.find(e=>e.alive&&e.side!==f.side&&e.elementActive&&e.char.id==='gorilla'&&e.elem.id==='fire');
    if(gorillaFire){
      const enemy=gorillaFire;
      if(f.x-f.radius<=ARENA.x+2||f.x+f.radius>=ARENA.x+ARENA.w-2||f.y-f.radius<=ARENA.y+2||f.y+f.radius>=ARENA.y+ARENA.h-2){
        if(Math.hypot(f.vx,f.vy)>4&&battleTime%8<dt){
          const wallDmg=enemy.atk*0.5;
          f.hp-=wallDmg;f.hitFlash=5;
          spawnDmgNum(f.x,f.y-f.radius-10,wallDmg,'#ff4400',false);
          spawnBurst(f.x,f.y,'#ff4400',6,3);
          SFX.burn();
          if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(fighters.find(e=>e.side!==f.side&&e.alive));}
        }
      }
    }
  });

  // Decay miss chance over time
  fighters.forEach(f=>{
    if(f.missChance>0)f.missChance=Math.max(0,f.missChance-0.001*dt);
    // Mantis+electric speed boost decay
    if(f._elecSpeedBoost>0){f._elecSpeedBoost-=dt;if(f._elecSpeedBoost<=0)f.speed=f.baseSpeed;}
  });

  // Update quickhack progress
  if(quickhackDisplay){
    quickhackDisplay.progress+=dt;
    if(quickhackDisplay.progress>=quickhackDisplay.maxProgress){
      triggerQuickhack(quickhackDisplay);
    }
  }

  // Quickhack screen flash
  if(quickhackFlashTimer>0){quickhackFlashTimer-=dt;if(quickhackFlashTimer<=0)quickhackDisplay=null;}
  // Wall crack decay + hazard damage
  for(let i=wallCracks.length-1;i>=0;i--){
    const wc=wallCracks[i];
    wc.life-=dt;
    if(wc.life<=0){wallCracks.splice(i,1);continue;}
    if(wc.dmgCooldown>0)wc.dmgCooldown-=dt;
    // Cracks damage enemies who walk over them
    if(wc.owner&&wc.dmgCooldown<=0){
      fighters.forEach(f=>{
        if(f.side===wc.owner.side||!f.alive)return;
        if(dist(f,wc)<wc.size*0.7){
          const crackDmg=wc.owner.atk*0.3;
          f.hp-=crackDmg;f.hitFlash=4;
          spawnDmgNum(f.x+rand(-10,10),f.y-f.radius-10,crackDmg,'#ffaa00',false);
          spawnParticle(f.x,f.y+f.radius,'#ffaa00',0,-2,10,2);
          wc.dmgCooldown=25;
          if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(wc.owner);}
        }
      });
    }
  }

  // Relic text timer
  if(relicTextTimer>0)relicTextTimer-=dt;

  // Update fire trails (sandy+fire)
  for(let i=fireTrails.length-1;i>=0;i--){
    const ft=fireTrails[i];ft.life-=dt;
    if(ft.life<=0){fireTrails.splice(i,1);continue;}
    fighters.forEach(f=>{
      if(f.alive&&f.side!==(ft.owner?ft.owner.side:-1)&&dist(f,ft)<ft.radius+f.radius&&battleTime%8<dt){
        f.hp-=ft.dmg;f.hitFlash=5;
        spawnParticle(f.x+rand(-5,5),f.y+rand(-5,5),'#ff4400',0,-1,8,2);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(ft.owner);}
      }
    });
    if(battleTime%4<dt)spawnParticle(ft.x+rand(-ft.radius/2,ft.radius/2),ft.y+rand(-ft.radius/2,ft.radius/2),pick(['#ff4400','#ff6600','#ffaa00']),0,-0.5,10,2);
  }

  // Update sandy afterimages
  for(let i=sandyAfterimages.length-1;i>=0;i--){
    sandyAfterimages[i].life-=dt;
    if(sandyAfterimages[i].life<=0)sandyAfterimages.splice(i,1);
  }

  // Sandy+fire: fire trail during movement (non-special too if element active)
  fighters.forEach(f=>{
    if(f.alive&&f.char.id==='sandy'&&f.elementActive&&f.elem.id==='fire'&&!f.sandyActive&&battleTime%6<1){
      fireTrails.push({x:f.x,y:f.y,life:60,maxLife:60,radius:12,owner:f,dmg:f.atk*0.1});
    }
  });

  // Katana+ice walls: bounce enemies back
  for(let i=iceWalls.length-1;i>=0;i--){
    const iw=iceWalls[i];iw.life-=dt;
    if(iw.life<=0){iceWalls.splice(i,1);continue;}
    fighters.forEach(f=>{
      if(f.alive&&f.side!==(iw.owner?iw.owner.side:-1)&&dist(f,iw)<f.radius+20){
        // Push enemy back toward katana owner
        const pushAngle=iw.angle+Math.PI;
        f.vx+=Math.cos(pushAngle)*4;f.vy+=Math.sin(pushAngle)*4;
        f.slowTimer=Math.max(f.slowTimer,30);
        spawnBurst(iw.x,iw.y,'#77ddff',6,3);
        SFX.freeze();
        iceWalls.splice(i,1);
      }
    });
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.96;p.vy*=0.96;p.life-=dt;if(p.life<=0)particles.splice(i,1);}
  // Damage numbers
  for(let i=dmgNums.length-1;i>=0;i--){const d=dmgNums[i];d.y+=d.vy;d.vy*=0.95;d.life-=dt;if(d.life<=0)dmgNums.splice(i,1);}
  if(shakeTimer>0)shakeTimer-=dt;
}

// ============================================================
// DRAWING — UTILITY
// ============================================================
function drawRoundRect(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath()}
function drawBtn(b){X.save();drawRoundRect(b.x,b.y,b.w,b.h,6);X.fillStyle=b.hover?b.color+'44':'#0a0a2a';X.fill();X.strokeStyle=b.color;X.lineWidth=b.hover?3:2;X.stroke();X.fillStyle=b.hover?'#fff':b.color;X.font='bold '+(b.h>40?'16':'13')+'px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';X.fillText(b.label,b.x+b.w/2,b.y+b.h/2);X.restore()}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}
function darken(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}

// ============================================================
// DRAWING — BALL / FIGHTER
// ============================================================
function drawBall(f){
  if(!f.alive&&f.deathAnim<=0)return;
  X.save();
  let alpha=f.alive?1:Math.max(0,f.deathAnim/60);
  // Optical Camo: nearly invisible
  if(f.throwCamoActive)alpha*=0.12;
  X.globalAlpha=alpha;

  // Shadow
  X.beginPath();X.ellipse(f.x,f.y+f.radius+8,f.radius*0.7,6,0,0,Math.PI*2);
  X.fillStyle='rgba(0,0,0,0.3)';X.fill();

  // Smasher afterimage trail during ult — multi-color like anime
  if(f.char.id==='smasher'&&f.specialActive&&f.smasherAfterimages){
    const aCols=['#cc4444','#ff6644','#ffcc00','#4488ff','#44ccff','#ff44aa'];
    f.smasherAfterimages.forEach((ai,aidx)=>{
      const col=aCols[aidx%aCols.length];
      X.globalAlpha=ai.alpha*0.5;
      const ag=X.createRadialGradient(ai.x,ai.y,0,ai.x,ai.y,f.radius*1.2);
      ag.addColorStop(0,col+'66');ag.addColorStop(0.5,col+'33');ag.addColorStop(1,col+'00');
      X.fillStyle=ag;X.beginPath();X.arc(ai.x,ai.y,f.radius*1.2,0,Math.PI*2);X.fill();
      X.globalAlpha=ai.alpha*0.3;
      X.beginPath();X.arc(ai.x,ai.y,f.radius,0,Math.PI*2);X.fillStyle=col+'88';X.fill();
    });
    X.globalAlpha=alpha;
  }

  // Element aura
  if(f.elementActive){
    const pulse=Math.sin(battleTime*0.1)*0.3+0.7;
    X.beginPath();X.arc(f.x,f.y,f.radius+8+pulse*4,0,Math.PI*2);
    X.fillStyle=f.elem.color+'33';X.fill();
    X.strokeStyle=f.elem.color+'88';X.lineWidth=2;X.stroke();
    if(battleTime%3<1){
      switch(f.elem.id){
        case 'fire':for(let i=0;i<2;i++){const a=Math.random()*Math.PI*2;spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,pick(['#ff4400','#ff6600','#ffaa00']),Math.cos(a)*0.5,-1.5,15,3);}break;
        case 'electric':if(Math.random()<0.3){const a=Math.random()*Math.PI*2;spawnParticle(f.x+Math.cos(a)*(f.radius+5),f.y+Math.sin(a)*(f.radius+5),'#ffcc00',Math.cos(a)*2,Math.sin(a)*2,8,2);}break;
        case 'toxic':{const a=Math.random()*Math.PI*2;spawnParticle(f.x+Math.cos(a)*f.radius,f.y+f.radius,'#aa44cc',0,1,20,2);break;}
        case 'cryo':if(Math.random()<0.4){const a=Math.random()*Math.PI*2;spawnParticle(f.x+Math.cos(a)*(f.radius+3),f.y+Math.sin(a)*(f.radius+3),'#77ddff',Math.cos(a)*0.3,Math.sin(a)*0.3,20,2);}break;
      }
    }
  }

  // Element activation flash
  if(f.elementFlash>0){X.beginPath();X.arc(f.x,f.y,f.radius+20*(f.elementFlash/30),0,Math.PI*2);X.fillStyle=f.elem.color+(Math.floor(f.elementFlash/30*80).toString(16).padStart(2,'0'));X.fill();}

  // Capture/wrap visual — monowire wrapped around ball like real wire
  if(f.captureTimer>0){
    // Multiple wire strands wrapping tightly
    X.shadowColor='#ff8800';X.shadowBlur=8;
    for(let w=0;w<6;w++){
      const baseA=battleTime*0.03+w*Math.PI*2/6;
      const r=f.radius+2+Math.sin(w*1.7)*2;
      // Wire strand
      X.strokeStyle='rgba(255,160,40,0.8)';X.lineWidth=2;
      X.beginPath();X.arc(f.x,f.y,r,baseA,baseA+0.9);X.stroke();
      // Hot center of wire
      X.strokeStyle='rgba(255,240,180,0.5)';X.lineWidth=0.8;
      X.beginPath();X.arc(f.x,f.y,r,baseA+0.1,baseA+0.8);X.stroke();
    }
    X.shadowBlur=0;
    // Connected wire line to captor
    if(f._capturedBy&&f._capturedBy.alive){
      const cap=f._capturedBy;
      X.strokeStyle='rgba(255,140,30,0.4)';X.lineWidth=2;
      X.beginPath();X.moveTo(f.x,f.y);X.lineTo(cap.x,cap.y);X.stroke();
      X.strokeStyle='rgba(255,200,80,0.6)';X.lineWidth=1;
      X.beginPath();X.moveTo(f.x,f.y);X.lineTo(cap.x,cap.y);X.stroke();
    }
    // Constriction glow
    X.beginPath();X.arc(f.x,f.y,f.radius+5,0,Math.PI*2);
    X.fillStyle='rgba(255,140,30,0.1)';X.fill();
  }

  // Freeze visual
  if(f.freezeTimer>0){X.beginPath();X.arc(f.x,f.y,f.radius+4,0,Math.PI*2);X.fillStyle='rgba(119,221,255,0.4)';X.fill();X.strokeStyle='#77ddff';X.lineWidth=3;X.stroke();}

  // Stun stars
  if(f.stunTimer>0){const st=battleTime*0.3;for(let i=0;i<3;i++){const sa=st+i*Math.PI*2/3;X.fillStyle='#ffcc00';X.font='bold 12px Consolas,monospace';X.textAlign='center';X.fillText('*',f.x+Math.cos(sa)*20,f.y-f.radius-10+Math.sin(sa*2)*3);}}

  // Ball body
  const grad=X.createRadialGradient(f.x-f.radius*0.3,f.y-f.radius*0.3,f.radius*0.1,f.x,f.y,f.radius);
  let baseColor=f.char.color;
  if(f.hitFlash>0)baseColor='#ffffff';
  grad.addColorStop(0,lighten(baseColor,50));
  grad.addColorStop(0.6,baseColor);
  grad.addColorStop(1,darken(baseColor,40));
  X.beginPath();X.arc(f.x,f.y,f.radius,0,Math.PI*2);
  X.fillStyle=grad;X.fill();
  X.strokeStyle=darken(baseColor,20);X.lineWidth=2;X.stroke();

  // Spin lines
  X.save();
  X.beginPath();X.arc(f.x,f.y,f.radius,0,Math.PI*2);X.clip();
  X.strokeStyle='rgba(255,255,255,0.12)';X.lineWidth=1.5;
  for(let i=0;i<4;i++){
    const a=f.rotation+i*Math.PI/2;
    const lx=Math.cos(a)*f.radius*1.2;
    const ly=Math.sin(a)*f.radius*1.2;
    X.beginPath();X.moveTo(f.x+lx,f.y+ly);X.lineTo(f.x-lx,f.y-ly);X.stroke();
  }
  X.restore();

  // Shine highlight
  X.beginPath();X.arc(f.x-f.radius*0.25,f.y-f.radius*0.25,f.radius*0.2,0,Math.PI*2);
  X.fillStyle='rgba(255,255,255,0.35)';X.fill();

  // Adam Smasher face — cybernetic face visible on ball, heavy armor plating
  if(f.char.id==='smasher'){
    X.save();
    // Armor plate lines (heavy mech feel)
    X.strokeStyle='#884444';X.lineWidth=2;
    X.beginPath();X.arc(f.x,f.y,f.radius*0.95,Math.PI*0.6,Math.PI*0.9);X.stroke();
    X.beginPath();X.arc(f.x,f.y,f.radius*0.95,Math.PI*1.1,Math.PI*1.4);X.stroke();
    // Top armor crest
    X.strokeStyle='#aa3333';X.lineWidth=2.5;
    X.beginPath();X.moveTo(f.x-f.radius*0.3,f.y-f.radius*0.65);
    X.lineTo(f.x,f.y-f.radius*0.8);
    X.lineTo(f.x+f.radius*0.3,f.y-f.radius*0.65);X.stroke();
    // Red eye slit (left) — bigger, more menacing
    X.beginPath();X.arc(f.x-f.radius*0.2,f.y-f.radius*0.15,f.radius*0.1,0,Math.PI*2);
    X.fillStyle=f.specialActive?'#ff0000':'#cc2222';X.fill();
    X.shadowColor='#ff0000';X.shadowBlur=f.specialActive?12:6;X.fill();X.shadowBlur=0;
    // Right eye slit
    X.beginPath();X.arc(f.x+f.radius*0.2,f.y-f.radius*0.15,f.radius*0.1,0,Math.PI*2);
    X.fillStyle=f.specialActive?'#ff0000':'#cc2222';X.fill();
    X.shadowColor='#ff0000';X.shadowBlur=f.specialActive?12:6;X.fill();X.shadowBlur=0;
    // Metal jaw line — thicker
    X.strokeStyle='#777';X.lineWidth=2;
    X.beginPath();X.moveTo(f.x-f.radius*0.35,f.y+f.radius*0.1);
    X.lineTo(f.x-f.radius*0.2,f.y+f.radius*0.35);
    X.lineTo(f.x+f.radius*0.2,f.y+f.radius*0.35);
    X.lineTo(f.x+f.radius*0.35,f.y+f.radius*0.1);X.stroke();
    // Scar line
    X.strokeStyle='#553333';X.lineWidth=1.5;
    X.beginPath();X.moveTo(f.x-f.radius*0.1,f.y-f.radius*0.35);
    X.lineTo(f.x+f.radius*0.05,f.y+f.radius*0.05);X.stroke();
    // Side shoulder armor accents
    X.fillStyle='#993333';
    X.beginPath();X.arc(f.x-f.radius*0.75,f.y,f.radius*0.15,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(f.x+f.radius*0.75,f.y,f.radius*0.15,0,Math.PI*2);X.fill();
    X.restore();
  }

  // Gojo face — white hair, blue eyes
  if(f.char.id==='gojo'){
    X.save();
    // White messy anime hair — wild, asymmetric, strands falling in different directions
    const hx=f.x,hy=f.y-f.radius*0.3;
    X.fillStyle=f.gojoAwakened?'#eeeeff':'#ffffff';
    // Hair base — wide fluffy mass covering top of head
    X.beginPath();
    X.ellipse(hx,f.y-f.radius*0.4,f.radius*0.75,f.radius*0.3,0,Math.PI,0);
    X.fill();
    // Side hair — strands falling down past the ball on left and right
    X.beginPath();
    X.moveTo(hx-f.radius*0.65,f.y-f.radius*0.5);
    X.quadraticCurveTo(hx-f.radius*0.85,f.y-f.radius*0.1,hx-f.radius*0.7,f.y+f.radius*0.1);
    X.lineTo(hx-f.radius*0.55,f.y-f.radius*0.2);
    X.closePath();X.fill();
    X.beginPath();
    X.moveTo(hx+f.radius*0.6,f.y-f.radius*0.5);
    X.quadraticCurveTo(hx+f.radius*0.8,f.y-f.radius*0.15,hx+f.radius*0.65,f.y+f.radius*0.05);
    X.lineTo(hx+f.radius*0.5,f.y-f.radius*0.25);
    X.closePath();X.fill();
    // Messy spikes — wild directions, varying thickness, some curving forward/sideways
    const spikes=[
      {off:-0.4,h:0.55,w:0.12,tilt:-0.2}, // far left, leaning out
      {off:-0.25,h:0.8,w:0.11,tilt:-0.12}, // tall left spike
      {off:-0.12,h:0.6,w:0.1,tilt:0.05}, // slight right lean
      {off:0.02,h:0.95,w:0.13,tilt:-0.05}, // tallest center-left spike
      {off:0.15,h:0.7,w:0.1,tilt:0.1}, // right-leaning
      {off:0.28,h:0.85,w:0.12,tilt:0.15}, // tall right spike, leaning right
      {off:0.42,h:0.5,w:0.1,tilt:0.22}, // far right, strongly leaning
    ];
    spikes.forEach(sp=>{
      const sx=hx+sp.off*f.radius;
      const baseY=f.y-f.radius*0.55;
      const tipY=baseY-f.radius*sp.h;
      const tipX=sx+sp.tilt*f.radius;
      const sw=f.radius*sp.w;
      X.beginPath();
      X.moveTo(sx-sw,baseY);
      X.quadraticCurveTo(sx-sw*0.5,lerp(baseY,tipY,0.6),tipX-sw*0.15,tipY);
      X.quadraticCurveTo(sx+sw*0.5,lerp(baseY,tipY,0.5),sx+sw,baseY);
      X.closePath();X.fill();
    });
    // Front fringe — thin strands hanging down over forehead
    X.strokeStyle=f.gojoAwakened?'#ddddf8':'#f0f0f0';
    X.lineWidth=2;
    X.beginPath();X.moveTo(hx-f.radius*0.2,f.y-f.radius*0.5);
    X.quadraticCurveTo(hx-f.radius*0.25,f.y-f.radius*0.2,hx-f.radius*0.15,f.y-f.radius*0.05);X.stroke();
    X.beginPath();X.moveTo(hx+f.radius*0.05,f.y-f.radius*0.55);
    X.quadraticCurveTo(hx+f.radius*0.1,f.y-f.radius*0.25,hx+f.radius*0.0,f.y-f.radius*0.08);X.stroke();
    X.beginPath();X.moveTo(hx+f.radius*0.2,f.y-f.radius*0.48);
    X.quadraticCurveTo(hx+f.radius*0.28,f.y-f.radius*0.2,hx+f.radius*0.22,f.y-f.radius*0.02);X.stroke();
    // Subtle shadow on hair base
    X.fillStyle='rgba(180,180,220,0.25)';
    X.beginPath();
    X.ellipse(hx,f.y-f.radius*0.4,f.radius*0.7,f.radius*0.08,0,0,Math.PI);
    X.fill();
    // Blue eyes
    const eyeGlow=f.gojoAwakened||f.specialActive;
    X.beginPath();X.arc(f.x-f.radius*0.18,f.y-f.radius*0.1,f.radius*0.08,0,Math.PI*2);
    X.fillStyle=eyeGlow?'#4488ff':'#3366cc';X.fill();
    if(eyeGlow){X.shadowColor='#4488ff';X.shadowBlur=8;X.fill();X.shadowBlur=0;}
    X.beginPath();X.arc(f.x+f.radius*0.18,f.y-f.radius*0.1,f.radius*0.08,0,Math.PI*2);
    X.fillStyle=eyeGlow?'#4488ff':'#3366cc';X.fill();
    if(eyeGlow){X.shadowColor='#4488ff';X.shadowBlur=8;X.fill();X.shadowBlur=0;}
    // Slight smile
    X.strokeStyle='#aaa';X.lineWidth=1;
    X.beginPath();X.arc(f.x,f.y+f.radius*0.1,f.radius*0.15,0.1,Math.PI-0.1);X.stroke();
    // Infinity aura
    if(f.gojoInfinityCharges>0){
      const pulse=Math.sin(battleTime*0.08)*3;
      X.beginPath();X.arc(f.x,f.y,f.radius+4+pulse,0,Math.PI*2);
      const ig=X.createRadialGradient(f.x,f.y,f.radius,f.x,f.y,f.radius+8+pulse);
      ig.addColorStop(0,'rgba(100,120,255,0.3)');ig.addColorStop(1,'rgba(100,120,255,0)');
      X.fillStyle=ig;X.fill();
    }
    // Awakened glow
    if(f.gojoAwakened){
      const pulse=Math.sin(battleTime*0.1)*5;
      X.beginPath();X.arc(f.x,f.y,f.radius+8+pulse,0,Math.PI*2);
      const ag=X.createRadialGradient(f.x,f.y,f.radius,f.x,f.y,f.radius+12+pulse);
      ag.addColorStop(0,'rgba(80,100,255,0.25)');ag.addColorStop(1,'rgba(150,70,255,0)');
      X.fillStyle=ag;X.fill();
    }
    X.restore();
  }

  // Choso face — dark hair, blood marks on face
  if(f.char.id==='choso'){
    X.save();
    const hx=f.x,hy=f.y;
    // Dark messy hair — two-toned (dark brown/black, tied up in bun)
    X.fillStyle='#1a1010';
    // Hair base
    X.beginPath();
    X.ellipse(hx,hy-f.radius*0.4,f.radius*0.7,f.radius*0.3,0,Math.PI,0);
    X.fill();
    // Side strands
    X.beginPath();
    X.moveTo(hx-f.radius*0.6,hy-f.radius*0.45);
    X.quadraticCurveTo(hx-f.radius*0.75,hy-f.radius*0.1,hx-f.radius*0.6,hy+f.radius*0.05);
    X.lineTo(hx-f.radius*0.45,hy-f.radius*0.15);
    X.closePath();X.fill();
    X.beginPath();
    X.moveTo(hx+f.radius*0.6,hy-f.radius*0.45);
    X.quadraticCurveTo(hx+f.radius*0.7,hy-f.radius*0.1,hx+f.radius*0.55,hy+f.radius*0.05);
    X.lineTo(hx+f.radius*0.4,hy-f.radius*0.15);
    X.closePath();X.fill();
    // Top bun/tied section
    X.beginPath();
    X.arc(hx,hy-f.radius*0.7,f.radius*0.2,0,Math.PI*2);
    X.fill();
    // Messy front fringe strands
    X.strokeStyle='#1a1010';X.lineWidth=2.5;
    X.beginPath();X.moveTo(hx-f.radius*0.15,hy-f.radius*0.5);
    X.quadraticCurveTo(hx-f.radius*0.2,hy-f.radius*0.2,hx-f.radius*0.1,hy-f.radius*0.05);X.stroke();
    X.beginPath();X.moveTo(hx+f.radius*0.1,hy-f.radius*0.52);
    X.quadraticCurveTo(hx+f.radius*0.15,hy-f.radius*0.25,hx+f.radius*0.05,hy-f.radius*0.02);X.stroke();
    // Blood marks on face — distinctive marks from the anime (dark red lines on nose bridge and cheeks)
    X.strokeStyle=f.chosoRedScaleActive?'#ff2222':'#8b0000';
    X.lineWidth=2;
    // Nose bridge mark — thick vertical line
    X.beginPath();X.moveTo(hx,hy-f.radius*0.2);X.lineTo(hx,hy+f.radius*0.1);X.stroke();
    // Cheek marks — horizontal dashes under eyes
    X.lineWidth=1.5;
    X.beginPath();X.moveTo(hx-f.radius*0.35,hy-f.radius*0.05);X.lineTo(hx-f.radius*0.15,hy-f.radius*0.05);X.stroke();
    X.beginPath();X.moveTo(hx+f.radius*0.15,hy-f.radius*0.05);X.lineTo(hx+f.radius*0.35,hy-f.radius*0.05);X.stroke();
    // Eyes — dark, determined
    X.beginPath();X.arc(hx-f.radius*0.18,hy-f.radius*0.12,f.radius*0.07,0,Math.PI*2);
    X.fillStyle=f.chosoRedScaleActive?'#ff4444':'#2a0808';X.fill();
    if(f.chosoRedScaleActive){X.shadowColor='#ff0000';X.shadowBlur=6;X.fill();X.shadowBlur=0;}
    X.beginPath();X.arc(hx+f.radius*0.18,hy-f.radius*0.12,f.radius*0.07,0,Math.PI*2);
    X.fillStyle=f.chosoRedScaleActive?'#ff4444':'#2a0808';X.fill();
    if(f.chosoRedScaleActive){X.shadowColor='#ff0000';X.shadowBlur=6;X.fill();X.shadowBlur=0;}
    // Red Scale glow aura
    if(f.chosoRedScaleActive){

    const by=f.y+Math.sin(f.chosoBeamAngle)*f.radius;
    const beamLen=450;
    const ex=bx+Math.cos(f.chosoBeamAngle)*beamLen;
    const ey=by+Math.sin(f.chosoBeamAngle)*beamLen;
    // Outer glow (very wide)
    X.strokeStyle='rgba(180,0,0,0.2)';X.lineWidth=32;
    X.beginPath();X.moveTo(bx,by);X.lineTo(ex,ey);X.stroke();
    // Mid glow
    X.strokeStyle='rgba(200,0,0,0.4)';X.lineWidth=20;
    X.beginPath();X.moveTo(bx,by);X.lineTo(ex,ey);X.stroke();
    // Main beam
    X.strokeStyle='rgba(220,0,0,0.7)';X.lineWidth=12;
    X.beginPath();X.moveTo(bx,by);X.lineTo(ex,ey);X.stroke();
    // Core beam
    X.strokeStyle='#ff3333';X.lineWidth=6;
    X.shadowColor='#ff0000';X.shadowBlur=18;
    X.beginPath();X.moveTo(bx,by);X.lineTo(ex,ey);X.stroke();
    X.shadowBlur=0;
    // Bright center
    X.strokeStyle='rgba(255,180,180,0.9)';X.lineWidth=2;
    X.beginPath();X.moveTo(bx,by);X.lineTo(ex,ey);X.stroke();
    X.restore();
  }

  // Ryu special blast glow trail (drawn for isRyuSpecialBlast projectiles)
  projectiles.forEach(p=>{
    if(p.isRyuSpecialBlast){
      X.save();
      X.beginPath();X.arc(p.x,p.y,p.radius+8,0,Math.PI*2);
      const rg=X.createRadialGradient(p.x,p.y,0,p.x,p.y,p.radius+8);
      rg.addColorStop(0,'rgba(255,200,100,0.6)');rg.addColorStop(0.5,'rgba(255,136,68,0.3)');rg.addColorStop(1,'rgba(204,102,51,0)');
      X.fillStyle=rg;X.fill();
      // Core orb
      X.beginPath();X.arc(p.x,p.y,p.radius,0,Math.PI*2);
      X.fillStyle='#ffcc88';X.fill();
      X.strokeStyle='#cc6633';X.lineWidth=2;X.stroke();
      X.restore();
    }
  });

  // Draw Toji triangle arena + afterimages
  if(f.char.id==='toji'&&f.tojiTriActive){
    X.save();
    const pts=f.tojiTriPoints;
    const tcx=(pts[0].x+pts[1].x+pts[2].x)/3;
    const tcy=(pts[0].y+pts[1].y+pts[2].y)/3;
    const shrink=f.tojiTriShrink;
    const sPts=pts.map(p=>({x:p.x+(tcx-p.x)*shrink,y:p.y+(tcy-p.y)*shrink}));
    // Chain barrier lines
    X.strokeStyle='#888899';X.lineWidth=3;X.setLineDash([6,4]);
    X.beginPath();
    X.moveTo(sPts[0].x,sPts[0].y);X.lineTo(sPts[1].x,sPts[1].y);
    X.lineTo(sPts[2].x,sPts[2].y);X.closePath();X.stroke();
    X.setLineDash([]);
    // Chain glow
    X.strokeStyle='rgba(136,136,153,0.3)';X.lineWidth=8;
    X.beginPath();
    X.moveTo(sPts[0].x,sPts[0].y);X.lineTo(sPts[1].x,sPts[1].y);
    X.lineTo(sPts[2].x,sPts[2].y);X.closePath();X.stroke();
    // Draw actual weapon shapes at each corner
    const weaponColors=['#ff4444','#ff8844','#aaaaff'];
    const t=battleTime*0.03; // slow rotation
    sPts.forEach((p,i)=>{
      X.save();
      X.translate(p.x,p.y);
      X.rotate(t+i*0.5);
      if(i===0){
        // INVERTED SPEAR OF HEAVEN — long spear with pointed tip
        X.strokeStyle='#cc3333';X.lineWidth=3;
        X.beginPath();X.moveTo(-22,0);X.lineTo(22,0);X.stroke(); // shaft
        X.fillStyle='#ff4444'; // spearhead
        X.beginPath();X.moveTo(22,0);X.lineTo(14,-5);X.lineTo(14,5);X.closePath();X.fill();
        X.fillStyle='#aa2222'; // butt
        X.beginPath();X.arc(-22,0,3,0,Math.PI*2);X.fill();
        X.shadowColor='#ff4444';X.shadowBlur=8;
        X.beginPath();X.moveTo(22,0);X.lineTo(14,-5);X.lineTo(14,5);X.closePath();X.fill();
        X.shadowBlur=0;
      } else if(i===1){
        // SPLIT SOUL KATANA — curved blade with guard
        X.strokeStyle='#ff8844';X.lineWidth=2.5;
        X.beginPath();X.moveTo(-18,0);X.quadraticCurveTo(0,-4,22,-1);X.stroke(); // blade curve
        X.fillStyle='#ffaa44'; // blade fill
        X.beginPath();X.moveTo(-8,-2.5);X.quadraticCurveTo(5,-5,22,-1);
        X.lineTo(22,1);X.quadraticCurveTo(5,-1,-8,2.5);X.closePath();X.fill();
        X.fillStyle='#886622';X.fillRect(-10,-4,4,8); // guard
        X.fillStyle='#554411';X.fillRect(-18,-3,10,6); // handle
        X.shadowColor='#ff8844';X.shadowBlur=6;
        X.strokeStyle='rgba(255,136,68,0.5)';X.lineWidth=1;
        X.beginPath();X.moveTo(-8,0);X.quadraticCurveTo(5,-3,22,-1);X.stroke();
        X.shadowBlur=0;
      } else {
        // PLAYFUL CLOUD — 3-section staff, bigger, red with chain links
        const sec=12; // section length
        X.strokeStyle='#cc2222';X.lineWidth=5;
        // Section 1
        X.beginPath();X.moveTo(-sec*1.5-2,0);X.lineTo(-sec*0.5-2,0);X.stroke();
        // Chain link 1
        X.strokeStyle='#888';X.lineWidth=2;
        X.beginPath();X.arc(-sec*0.5,0,3,0,Math.PI*2);X.stroke();
        // Section 2
        X.strokeStyle='#cc2222';X.lineWidth=5;
        X.beginPath();X.moveTo(-sec*0.5+2,0);X.lineTo(sec*0.5-2,0);X.stroke();
        // Chain link 2
        X.strokeStyle='#888';X.lineWidth=2;
        X.beginPath();X.arc(sec*0.5,0,3,0,Math.PI*2);X.stroke();
        // Section 3
        X.strokeStyle='#cc2222';X.lineWidth=5;
        X.beginPath();X.moveTo(sec*0.5+2,0);X.lineTo(sec*1.5+2,0);X.stroke();
        // End caps
        X.fillStyle='#ff3333';
        X.beginPath();X.arc(-sec*1.5-2,0,4,0,Math.PI*2);X.fill();
        X.beginPath();X.arc(sec*1.5+2,0,4,0,Math.PI*2);X.fill();
        // Red glow
        X.shadowColor='#ff2222';X.shadowBlur=10;
        X.strokeStyle='rgba(255,34,34,0.4)';X.lineWidth=3;
        X.beginPath();X.moveTo(-sec*1.5-2,0);X.lineTo(sec*1.5+2,0);X.stroke();
        X.shadowBlur=0;
      }
      X.restore();
    });
    // Fire element: ground burn visual
    if(f.elementActive&&f.elem.id==='fire'){
      X.fillStyle='rgba(255,68,0,0.08)';
      X.beginPath();X.moveTo(sPts[0].x,sPts[0].y);X.lineTo(sPts[1].x,sPts[1].y);
      X.lineTo(sPts[2].x,sPts[2].y);X.closePath();X.fill();
    }
    // Poison element: purple chain glow
    if(f.elementActive&&f.elem.id==='toxic'){
      X.strokeStyle='rgba(170,68,204,0.4)';X.lineWidth=5;
      X.beginPath();X.moveTo(sPts[0].x,sPts[0].y);X.lineTo(sPts[1].x,sPts[1].y);
      X.lineTo(sPts[2].x,sPts[2].y);X.closePath();X.stroke();
    }
    X.restore();
  }
  // Draw Toji afterimages (black silhouettes)
  if(f.char.id==='toji'&&f.tojiAfterimages.length>0){
    f.tojiAfterimages.forEach(ai=>{
      X.beginPath();X.arc(ai.x,ai.y,f.radius*0.9,0,Math.PI*2);
      X.fillStyle='rgba(20,20,30,'+ai.alpha*0.6+')';X.fill();
    });
  }

  // HP text in center
  X.font='bold 13px Consolas,monospace';X.textAlign='center';X.textBaseline='middle';
  X.strokeStyle='#000';X.lineWidth=3;
  X.strokeText(Math.ceil(f.hp),f.x,f.y);
  X.fillStyle='#fff';
  X.fillText(Math.ceil(f.hp),f.x,f.y);

  // Draw weapon (drawWeapon dispatches to drawSandy for Sandy's special effect)
  drawWeapon(f);

  // Adam Smasher: triangle warning cone before rockets fire
  if(f.char.id==='smasher'&&f.smasherWarning>0){
    const wa=f.smasherWarningAngle;
    const coneLen=500; // massive warning cone
    const coneSpread=0.65; // wider half-angle
    const flashAlpha=0.15+Math.sin(battleTime*0.4)*0.15; // pulsing flash
    // Triangle cone fill
    X.save();
    X.globalAlpha=flashAlpha;
    X.beginPath();
    X.moveTo(f.x,f.y);
    X.lineTo(f.x+Math.cos(wa-coneSpread)*coneLen,f.y+Math.sin(wa-coneSpread)*coneLen);
    X.lineTo(f.x+Math.cos(wa+coneSpread)*coneLen,f.y+Math.sin(wa+coneSpread)*coneLen);
    X.closePath();
    X.fillStyle='#ff2222';X.fill();
    X.globalAlpha=0.5+Math.sin(battleTime*0.5)*0.3;
    // Triangle outline — bright red warning
    X.strokeStyle='#ff4444';X.lineWidth=3;X.stroke();
    // Inner lines for effect
    X.strokeStyle='#ffaa44';X.lineWidth=1;
    X.beginPath();
    X.moveTo(f.x,f.y);X.lineTo(f.x+Math.cos(wa)*coneLen*0.9,f.y+Math.sin(wa)*coneLen*0.9);
    X.stroke();
    X.globalAlpha=1;
    // Warning "!" text
    X.font='bold 16px Consolas,monospace';X.fillStyle='#ff4444';X.textAlign='center';
    X.fillText('!',f.x+Math.cos(wa)*50,f.y+Math.sin(wa)*50);
    X.restore();
  }

  // Gojo Hollow Purple warning line
  if(f.char.id==='gojo'&&f._gojoPurpleWarning>0){
    const wa=f._gojoPurpleAngle;
    const lineLen=500;
    const flashAlpha=0.2+Math.sin(battleTime*0.4)*0.15;
    X.save();
    // Thick purple warning line
    X.globalAlpha=flashAlpha;
    X.strokeStyle='#9944ff';X.lineWidth=20;
    X.beginPath();X.moveTo(f.x,f.y);
    X.lineTo(f.x+Math.cos(wa)*lineLen,f.y+Math.sin(wa)*lineLen);X.stroke();
    // Inner bright line
    X.globalAlpha=flashAlpha+0.2;
    X.strokeStyle='#cc88ff';X.lineWidth=6;
    X.beginPath();X.moveTo(f.x,f.y);
    X.lineTo(f.x+Math.cos(wa)*lineLen,f.y+Math.sin(wa)*lineLen);X.stroke();
    // Warning text
    X.globalAlpha=1;
    X.font='bold 14px Consolas,monospace';X.fillStyle='#9944ff';X.textAlign='center';
    X.fillText('HOLLOW PURPLE',f.x+Math.cos(wa)*70,f.y+Math.sin(wa)*70-15);
    X.restore();
  }
  // Gojo Domain Expansion charging visual
  if(f.char.id==='gojo'&&f.gojoDomainActive&&f.gojoDomainChargeTimer>0){
    X.save();
    const pulse=Math.sin(battleTime*0.15)*5;
    X.beginPath();X.arc(f.x,f.y,60+pulse,0,Math.PI*2);
    X.strokeStyle='rgba(150,100,255,0.5)';X.lineWidth=3;X.stroke();
    const chargeR=1-f.gojoDomainChargeTimer/240;
    X.font='bold 12px Consolas,monospace';X.fillStyle='#cc88ff';X.textAlign='center';
    X.fillText(Math.round(chargeR*100)+'%',f.x,f.y-f.radius-20);
    X.restore();
  }
  // Gojo Infinity shield display
  if(f.char.id==='gojo'&&f.gojoInfinityCharges>0&&!f.gojoReviving){
    const infY=f.y+f.radius+20;
    X.font='bold 7px Consolas,monospace';X.textAlign='center';
    X.fillStyle='#8888ff';
    X.fillText('INF '+f.gojoInfinityCharges+'/'+f.gojoInfinityMax,f.x,infY);
  }

  // Bleed icon
  if(f.bleedIcon&&f.bleedTimer>0){
    const bx=f.x+f.radius+5,by=f.y-f.radius-5;
    X.font='bold 12px Consolas,monospace';X.fillStyle='#cc0000';X.textAlign='center';
    // Blood drop icon
    X.beginPath();X.moveTo(bx,by-6);X.quadraticCurveTo(bx+5,by,bx,by+4);X.quadraticCurveTo(bx-5,by,bx,by-6);X.closePath();
    X.fillStyle='#cc0000';X.fill();
  }

  // Special meter below ball
  const spW=f.radius*2.2,spH=4,spX=f.x-spW/2,spY=f.y+f.radius+10;
  const spR=f.specialBar/f.specialMax;
  X.fillStyle='#111';X.fillRect(spX,spY,spW,spH);
  X.fillStyle=spR>=1?'#ffcc00':'#7b68ee';X.fillRect(spX,spY,spW*spR,spH);
  X.strokeStyle='#333';X.lineWidth=0.5;X.strokeRect(spX,spY,spW,spH);
  if(spR>=1){X.font='bold 7px Consolas,monospace';X.fillStyle='#ffcc00';X.textAlign='center';X.fillText('RELIC',f.x,spY+spH+8);}

  // Character-specific scaling stats — bigger font for readability
  const chaos=getChaosLevel(f);
  const statY=spY+spH+(spR>=1?17:8);
  X.font='bold 9px Consolas,monospace';X.textAlign='center';
  X.fillStyle=chaos>4?'#ff4444':chaos>2?'#ffaa00':'#aaa';
  switch(f.char.id){
    case 'mantis':{
      const spdVal=(f.baseSpeed*(1+chaos*0.1)).toFixed(1);
      const bleedPct=Math.round((0.10+chaos*0.02)*100);
      X.fillText('Spd:'+spdVal+' Bleed:'+bleedPct+'%',f.x,statY);
      break;}
    case 'gorilla':{
      const atkMult=Math.round((1+chaos*0.15)*100);
      const aoeR=Math.round(75+chaos*15);
      X.fillText('ATK:'+atkMult+'% AoE:'+aoeR,f.x,statY);
      break;}
    case 'monowire':{
      const capPct=Math.round((0.30+chaos*0.04)*100);
      const hackPct=Math.round(40);
      X.fillText('Cap:'+capPct+'% Hack:'+hackPct+'%',f.x,statY);
      break;}
    case 'pls':{
      const expR=Math.round(f.plsExplosionRadius+chaos*10);
      const dmgMult=Math.round((1+chaos*0.12)*100);
      X.fillText('Exp:'+expR+' DMG:'+dmgMult+'%',f.x,statY);
      break;}
    case 'sandy':{
      const minSpd=(f.baseSpeed*0.6).toFixed(1);
      const maxSpd=(f.baseSpeed*(1+chaos*0.15)).toFixed(1);
      const dodgePct=Math.round((f.dodgeChance+f.sandyDodgeBoost)*100);
      X.fillText('Spd:'+minSpd+'-'+maxSpd+' Dodge:'+dodgePct+'%',f.x,statY);
      break;}
    case 'throw':{
      const avl=f.throwWeapons?f.throwWeapons.filter(tw=>tw.available).length:0;
      X.fillText('WPN:'+avl+'/3',f.x,statY);
      break;}
    case 'katana':{
      const defCount=f.katanaDeflectCount||0;
      X.fillText('DEF:'+defCount,f.x,statY);
      break;}
    case 'berserk':{
      const pellets=Math.floor(6+chaos*0.8);
      const spreadPct=Math.round(Math.max(15,60-chaos*4));
      X.fillText('x'+pellets+' Spread:'+spreadPct+'%',f.x,statY);
      break;}
    case 'smasher':{
      const rocketDmg=Math.round(f.atk*(1.8+chaos*0.2));
      X.fillText('RKT:'+rocketDmg+' BOSS',f.x,statY);
      break;}
    case 'gojo':{
      const infTxt=f.gojoInfinityCharges+'/'+f.gojoInfinityMax;
      const state=f.gojoAwakened?'AWK':'BOSS';
      X.fillText('INF:'+infTxt+' '+state,f.x,statY);
      break;}
    case 'choso':{
      const mode=f.chosoBloodEdge?(f.chosoEdgeForm==='sword'?'SWORD':'DAGGER'):'BEAM';
      const orbs=f.chosoOrbs?f.chosoOrbs.filter(o=>o.alive).length:0;
      X.fillText(mode+(f.chosoRedScaleActive?' RDS':'')+(orbs>0?' Orb:'+orbs:''),f.x,statY);
      break;}
    case 'toji':{
      const sec=f.tojiStaffSection.toUpperCase();
      X.fillText(sec+(f.tojiTriActive?' TRI':''),f.x,statY);
      break;}
    case 'mechamaru':{
      const phaseName=['','MECH','ULTIMATE','TRUE FORM'][f.mechaPhase];
      X.fillText('P'+f.mechaPhase+' '+phaseName,f.x,statY);
      break;}
    case 'kashimo':{
      const mode=f.kashimoAmberActive?'AMBER':f.kashimoDartPhase!=='idle'?'DART':'STAFF';
      X.fillText(mode+(f.kashimoAmberUsed?'':' ⚡'),f.x,statY);
      break;}
    case 'nanami':{
      const mode=f.nanamiOvertimeActive?'OVERTIME':'BLADE';
      const chaos=getChaosLevel(f);
      let cr=f.crit+chaos*1.5;if(f.nanamiOvertimeActive)cr=Math.min(90,cr+35);
      const cm=f.nanamiOvertimeActive?2.4:(f.elementActive&&f.elem.id==='electric'?1.4:1.8);
      X.fillText(mode+' '+Math.round(cr)+'%cr '+cm.toFixed(1)+'x'+(f.nanamiCritStreak>=3?' x'+f.nanamiCritStreak:''),f.x,statY);
      break;}
    case 'ryu':{
      const mode=f.ryuBeamActive?'BEAM':'CANNON';
      X.fillText(mode,f.x,statY);
      break;}
  }

  // Burn visual
  if(f.burnTimer>0){for(let i=0;i<3;i++){const ba=battleTime*0.2+i*2;X.beginPath();X.arc(f.x+Math.cos(ba)*f.radius*0.6,f.y+Math.sin(ba)*f.radius*0.6-2,3,0,Math.PI*2);X.fillStyle='#ff4400';X.fill();}}

  X.restore();
}

// ============================================================
// DRAWING — WEAPONS (Cyberpunk cyberware)
// ============================================================
function drawWeapon(f){
  X.save();
  X.translate(f.x,f.y);
  X.rotate(f.weaponAngle);
  const r=f.radius;
  const ext=f.weaponExtend;
  const flash=f.weaponFlash>0;
  switch(f.char.id){
    case 'mantis':drawMantisBlades(r,ext,flash,f);break;
    case 'gorilla':drawGorillaArms(r,ext,flash,f);break;
    case 'monowire':drawMonowire(r,ext,flash,f);break;
    case 'pls':drawPLS(r,ext,flash,f);break;
    case 'sandy':drawSandy(r,ext,flash,f);break;
    case 'throw':drawThrowWeapon(r,ext,flash,f);break;
    case 'katana':drawKatanaWeapon(r,ext,flash,f);break;
    case 'berserk':drawBerserkWeapon(r,ext,flash,f);break;
    case 'smasher':drawSmasherWeapon(r,ext,flash,f);break;
    case 'gojo':drawGojoWeapon(r,ext,flash,f);break;
    case 'choso':drawChosoWeapon(r,ext,flash,f);break;
    case 'toji':drawTojiWeapon(r,ext,flash,f);break;
    case 'mechamaru':drawMechamaruWeapon(r,ext,flash,f);break;
    case 'kashimo':drawKashimoWeapon(r,ext,flash,f);break;
    case 'nanami':drawNanamiWeapon(r,ext,flash,f);break;
    case 'ryu':drawRyuWeapon(r,ext,flash,f);break;
  }
  X.restore();
}

function drawGojoWeapon(r,ext,flash,f){
  // Gojo has no physical weapon — draws Red/Blue orbs orbiting
  const t=battleTime*0.06;
  // Red orb (left)
  const rx=r*0.8,ry=0;
  X.save();
  X.rotate(-f.weaponAngle); // counter-rotate to stay absolute
  const redX=Math.cos(t)*r*1.3;
  const redY=Math.sin(t)*r*0.6;
  X.beginPath();X.arc(redX,redY,8,0,Math.PI*2);
  const rg=X.createRadialGradient(redX,redY,2,redX,redY,8);
  rg.addColorStop(0,'#ff6666');rg.addColorStop(1,'#cc2222');
  X.fillStyle=rg;X.fill();
  if(flash||f.gojoAttackMode==='red'){X.shadowColor='#ff2222';X.shadowBlur=12;X.fill();X.shadowBlur=0;}
  // Blue orb (opposite)
  const blueX=Math.cos(t+Math.PI)*r*1.3;
  const blueY=Math.sin(t+Math.PI)*r*0.6;
  X.beginPath();X.arc(blueX,blueY,8,0,Math.PI*2);
  const bg=X.createRadialGradient(blueX,blueY,2,blueX,blueY,8);
  bg.addColorStop(0,'#6688ff');bg.addColorStop(1,'#2244cc');
  X.fillStyle=bg;X.fill();
  if(flash||f.gojoAttackMode==='blue'){X.shadowColor='#2244ff';X.shadowBlur=12;X.fill();X.shadowBlur=0;}
  // Purple orb (awakened, center front)
  if(f.gojoAwakened){
    const px=r+10,py=Math.sin(t*1.5)*5;
    X.beginPath();X.arc(px,py,6,0,Math.PI*2);
    const pg=X.createRadialGradient(px,py,1,px,py,6);
    pg.addColorStop(0,'#cc88ff');pg.addColorStop(1,'#6622cc');
    X.fillStyle=pg;X.fill();
    X.shadowColor='#9944ff';X.shadowBlur=8;X.fill();X.shadowBlur=0;
  }
  X.restore();
  // Relic active glow
  if(f&&f.specialActive){
    X.save();X.rotate(-f.weaponAngle);
    const pulse=Math.sin(battleTime*0.12)*8;
    X.beginPath();X.arc(0,0,f.radius+12+pulse,0,Math.PI*2);
    const ag=X.createRadialGradient(0,0,f.radius,0,0,f.radius+15+pulse);
    ag.addColorStop(0,'rgba(100,70,255,0.4)');ag.addColorStop(1,'rgba(100,70,255,0)');
    X.fillStyle=ag;X.fill();
    if(f.gojoDomainActive){
      // Domain visual: geometric hexagon pattern
      X.strokeStyle='rgba(150,100,255,0.4)';X.lineWidth=1;
      for(let i=0;i<6;i++){
        const ha=battleTime*0.02+i*Math.PI/3;
        const hr=f.radius+20+pulse;
        X.beginPath();
        X.moveTo(Math.cos(ha)*hr,Math.sin(ha)*hr);
        X.lineTo(Math.cos(ha+Math.PI/3)*hr,Math.sin(ha+Math.PI/3)*hr);
        X.stroke();
      }
    }
    X.restore();
  }
}

function drawChosoWeapon(r,ext,flash,f){
  // Blood Edge melee mode: sword or dagger
  if(f.chosoBloodEdge){
    const isSword=f.chosoEdgeForm==='sword';
    if(isSword){
      // SWORD — long, wide, straight blood blade
      const bladeLen=55,bladeW=7;
      X.beginPath();
      X.moveTo(r-5,-bladeW);
      X.lineTo(r+bladeLen,-3);
      X.lineTo(r+bladeLen+5,0);
      X.lineTo(r+bladeLen,3);
      X.lineTo(r-5,bladeW);
      X.closePath();
      const bg=X.createLinearGradient(r-5,0,r+bladeLen,0);
      bg.addColorStop(0,'#660000');bg.addColorStop(0.5,'#cc0000');bg.addColorStop(1,'#ff2222');
      X.fillStyle=bg;X.fill();
      X.strokeStyle='#880000';X.lineWidth=1;X.stroke();
      // Blood glow
      X.shadowColor='#ff0000';X.shadowBlur=flash?14:8;
      X.strokeStyle='rgba(255,0,0,0.6)';X.lineWidth=2;
      X.beginPath();X.moveTo(r,0);X.lineTo(r+bladeLen,0);X.stroke();
      X.shadowBlur=0;
      // Cross guard
      X.fillStyle='#440000';X.fillRect(r-6,-9,4,18);
      // Handle
      X.fillStyle='#1a0808';X.fillRect(r-14,-5,12,10);
    } else {
      // DAGGER — short, curved, fast-looking
      const bladeLen=28,bladeW=5;
      X.beginPath();
      X.moveTo(r-3,-bladeW);
      X.quadraticCurveTo(r+bladeLen*0.6,-bladeW-3,r+bladeLen,0);
      X.quadraticCurveTo(r+bladeLen*0.6,bladeW+3,r-3,bladeW);
      X.closePath();
      const bg=X.createLinearGradient(r-3,0,r+bladeLen,0);
      bg.addColorStop(0,'#880044');bg.addColorStop(0.5,'#dd2266');bg.addColorStop(1,'#ff4488');
      X.fillStyle=bg;X.fill();
      X.strokeStyle='#aa0033';X.lineWidth=0.8;X.stroke();
      // Pink-red glow for dagger
      X.shadowColor='#ff2266';X.shadowBlur=flash?12:6;
      X.strokeStyle='rgba(255,34,102,0.6)';X.lineWidth=1.5;
      X.beginPath();X.moveTo(r+3,0);X.lineTo(r+bladeLen-3,0);X.stroke();
      X.shadowBlur=0;
      // Handle
      X.fillStyle='#1a0808';X.fillRect(r-10,-4,8,8);
    }
  } else {
    // Normal: blood beam charging visual — orbiting blood droplets
    const t=battleTime*0.08;
    X.save();
    X.rotate(-f.weaponAngle);
    for(let i=0;i<3;i++){
      const a=t+i*Math.PI*2/3;
      const ox=Math.cos(a)*r*0.8;
      const oy=Math.sin(a)*r*0.5;
      X.beginPath();X.arc(ox,oy,4,0,Math.PI*2);
      X.fillStyle='#cc0000';X.fill();
      X.shadowColor='#ff0000';X.shadowBlur=flash?8:4;X.fill();X.shadowBlur=0;
    }
    X.restore();
    // Charging glow at front
    if(flash){
      X.beginPath();X.arc(r+10,0,8,0,Math.PI*2);
      const cg=X.createRadialGradient(r+10,0,2,r+10,0,8);
      cg.addColorStop(0,'#ff4444');cg.addColorStop(1,'rgba(139,0,0,0)');
      X.fillStyle=cg;X.fill();
    }
  }
}

function drawMechamaruWeapon(r,ext,flash,f){
  if(f.mechaPhase===1||f.mechaPhase===2){
    // Phase 1/2: Drill arm — mechanical arm with spinning drill tip
    const armLen=f.mechaPhase===2?50:40;
    const armW=f.mechaPhase===2?8:6;
    // Arm housing
    const ag=X.createLinearGradient(r-5,-armW,r-5,armW);
    ag.addColorStop(0,'#3a5a3a');ag.addColorStop(0.5,'#4a6a4a');ag.addColorStop(1,'#3a5a3a');
    X.fillStyle=ag;X.fillRect(r-5,-armW,armLen*0.6,armW*2);
    X.strokeStyle='#5a8a5a';X.lineWidth=1;X.strokeRect(r-5,-armW,armLen*0.6,armW*2);
    // Drill tip (cone shape, rotating)
    const drillX=r-5+armLen*0.6;
    const drillLen=armLen*0.5;
    const drillRot=battleTime*0.2*f.mechaDrillSide;
    X.save();X.translate(drillX,0);X.rotate(drillRot);
    // Drill cone
    X.beginPath();
    X.moveTo(0,-armW);
    X.lineTo(drillLen,0);
    X.lineTo(0,armW);
    X.closePath();
    const dg=X.createLinearGradient(0,0,drillLen,0);
    dg.addColorStop(0,'#666');dg.addColorStop(0.5,'#aaa');dg.addColorStop(1,'#888');
    X.fillStyle=dg;X.fill();
    X.strokeStyle='#555';X.lineWidth=0.8;X.stroke();
    // Spiral grooves on drill
    X.strokeStyle='#444';X.lineWidth=1;
    for(let i=1;i<4;i++){
      const t=i/4;
      X.beginPath();
      X.moveTo(drillLen*t,-armW*(1-t));
      X.lineTo(drillLen*t+3,armW*(1-t)*0.5);
      X.stroke();
    }
    X.restore();
    // Green LED on arm
    X.fillStyle=flash?'#44ff44':'#228822';
    X.fillRect(r-3,-armW-1,armLen*0.5,1.5);
    if(flash){X.shadowColor='#44ff44';X.shadowBlur=6;X.fillRect(r-3,-armW-1,armLen*0.5,1.5);X.shadowBlur=0;}
    // Rocket pod (behind drill, small nozzles)
    X.fillStyle='#2a3a2a';
    X.fillRect(r-8,-armW-3,6,3);
    X.fillRect(r-8,armW,6,3);
    X.fillStyle='#111';
    X.beginPath();X.arc(r-5,-armW-1.5,1.5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(r-5,armW+1.5,1.5,0,Math.PI*2);X.fill();
  } else {
    // Phase 3: True Form — small pistol
    X.fillStyle='#555';X.fillRect(r-4,-2.5,14,5);
    X.fillStyle='#333';X.fillRect(r+10,-1.5,4,3); // barrel
    X.fillStyle='#444';X.fillRect(r-6,-2,4,4); // grip
    if(flash){
      X.beginPath();X.arc(r+14,0,3,0,Math.PI*2);
      X.fillStyle='#ffcc00';X.fill();
      X.shadowColor='#ffcc00';X.shadowBlur=6;X.fill();X.shadowBlur=0;
    }
  }
}

function drawNanamiWeapon(r,ext,flash,f){

    X.strokeStyle='#556';X.lineWidth=0.8;X.stroke();

  } else {
    // Bandage-wrapped blade
    X.beginPath();
    X.moveTo(r+4,-5);
    X.lineTo(r+4+bladeLen,-3);
    X.lineTo(r+4+bladeLen+4,0);
    X.lineTo(r+4+bladeLen,3);
    X.lineTo(r+4,5);
    X.closePath();
    X.fillStyle='#e8dcc0';X.fill();
    X.strokeStyle='#c8b898';X.lineWidth=0.8;X.stroke();
    // Bandage wrap lines
    X.strokeStyle='#b8a878';X.lineWidth=0.8;
    for(let i=0;i<6;i++){
      const wx=r+6+i*7;
      X.beginPath();X.moveTo(wx,-5);X.lineTo(wx+3,5);X.stroke();
    }
    // Tip peeking through bandages

    X.beginPath();X.moveTo(r+4+bladeLen,-2);X.lineTo(r+4+bladeLen+4,0);X.lineTo(r+4+bladeLen,2);X.closePath();X.fill();

  // Flash glow (brighter during overtime)
