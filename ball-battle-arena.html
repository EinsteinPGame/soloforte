  X.stroke();

  // === SECOND BLADE (lower, slightly offset) — twin mantis blades ===
  X.save();X.scale(1,-1); // mirror vertically
  // Same blade shape mirrored
  X.beginPath();
  X.moveTo(bx,-7);
  X.lineTo(bx+bladeLen*0.15,-8);
  X.quadraticCurveTo(bx+bladeLen*0.4,-9,bx+bladeLen*0.6,-7);
  X.quadraticCurveTo(bx+bladeLen*0.85,-4,bx+bladeLen,-0.5);
  X.lineTo(bx+bladeLen+2,0);
  X.quadraticCurveTo(bx+bladeLen*0.85,4,bx+bladeLen*0.6,6);
  X.quadraticCurveTo(bx+bladeLen*0.35,7,bx+bladeLen*0.1,5);
  X.lineTo(bx,4);X.closePath();
  // Slightly darker second blade
  const bg2=X.createLinearGradient(bx,-9,bx+bladeLen,0);
  bg2.addColorStop(0,'#556');bg2.addColorStop(0.1,'#889');bg2.addColorStop(0.3,'#aab');
  bg2.addColorStop(0.5,'#ccd');bg2.addColorStop(0.65,'#99a');bg2.addColorStop(0.85,'#778');bg2.addColorStop(1,'#445');
  X.fillStyle=bg2;X.fill();
  X.strokeStyle='#445';X.lineWidth=1;X.stroke();
  // Cutting edge glow mirrored
  X.strokeStyle=flash?'rgba(255,80,40,0.9)':'rgba(255,50,30,0.3)';
  X.lineWidth=flash?2.5:1.2;
  X.beginPath();X.moveTo(bx+3,4);
  X.quadraticCurveTo(bx+bladeLen*0.35,7,bx+bladeLen*0.7,4);
  X.quadraticCurveTo(bx+bladeLen*0.9,2,bx+bladeLen+1,0);
  X.stroke();
  X.restore();

  // Slash trail on attack
  if(flash&&f.attackAnim>0){
    const slashDir=f.attackSide;
    X.strokeStyle='rgba(255,80,40,0.5)';X.lineWidth=5;
    X.beginPath();X.arc(0,0,r+bladeLen*0.6,-0.5*slashDir,0.5*slashDir);X.stroke();
    X.strokeStyle='rgba(255,180,100,0.25)';X.lineWidth=10;
    X.beginPath();X.arc(0,0,r+bladeLen*0.4,-0.35*slashDir,0.35*slashDir);X.stroke();
  }

  // No tip orb — slash trail is enough
}

function drawGorillaArms(r,ext,flash,f){
  const armLen=48; // proportional to arena
  const isDownslam=f.attackPhase===2&&f.attackAnim>0;

  // Single MASSIVE fist — Cyberpunk Gorilla Arms
  X.save();X.translate(r-8,0);

  // Forearm — dark metallic, wide
  const armW=24;
  const fg=X.createLinearGradient(0,-armW/2,0,armW/2);
  fg.addColorStop(0,'#1a1a22');fg.addColorStop(0.2,'#2a2a35');fg.addColorStop(0.5,'#303040');fg.addColorStop(0.8,'#2a2a35');fg.addColorStop(1,'#1a1a22');
  X.fillStyle=fg;
  X.fillRect(0,-armW/2,armLen*0.4,armW);
  X.strokeStyle='#3a3a44';X.lineWidth=1;
  X.strokeRect(0,-armW/2,armLen*0.4,armW);
  // Panel seams
  X.strokeStyle='#333';X.lineWidth=0.6;
  for(let i=1;i<4;i++){X.beginPath();X.moveTo(armLen*0.4*i/4,-armW/2);X.lineTo(armLen*0.4*i/4,armW/2);X.stroke();}
  // Red accent lines
  X.fillStyle='rgba(255,40,40,0.6)';
  X.fillRect(2,-armW/2,armLen*0.35,2);
  X.fillRect(2,armW/2-2,armLen*0.35,2);
  // Hydraulic pistons
  X.strokeStyle='#555';X.lineWidth=2.5;
  X.beginPath();X.moveTo(3,-armW/2+3);X.lineTo(armLen*0.35,-armW/2+3);X.stroke();
  X.beginPath();X.moveTo(3,armW/2-3);X.lineTo(armLen*0.35,armW/2-3);X.stroke();

  // MASSIVE FIST — chunky, armored, very bulky
  const fistX=armLen*0.35;
  const fistW=armLen*0.75;
  const fistH=38;
  drawRoundRect(fistX,-fistH/2,fistW,fistH,6);
  const fistG=X.createLinearGradient(fistX,-fistH/2,fistX,fistH/2);
  fistG.addColorStop(0,'#181820');fistG.addColorStop(0.2,'#252530');fistG.addColorStop(0.5,'#2e2e3a');fistG.addColorStop(0.8,'#252530');fistG.addColorStop(1,'#181820');
  X.fillStyle=fistG;X.fill();
  X.strokeStyle='#444';X.lineWidth=1.5;X.stroke();

  // Thick mechanical fingers — 4 chunky segments extending from fist
  for(let k=0;k<4;k++){
    const ky=(-fistH/2+6)+k*(fistH-12)/3;
    const kx=fistX+fistW-5;
    const kw=14+ext*8;
    drawRoundRect(kx,ky-4,kw,8,3);
    X.fillStyle='#222230';X.fill();
    X.strokeStyle='#3a3a44';X.lineWidth=0.8;X.stroke();
    // Finger joint line
    X.strokeStyle='#333';X.lineWidth=0.5;
    X.beginPath();X.moveTo(kx+kw*0.4,ky-4);X.lineTo(kx+kw*0.4,ky+4);X.stroke();
  }

  // Red/chrome knuckle reinforcement caps — BIG, glowing
  for(let k=0;k<4;k++){
    const ky=(-fistH/2+6)+k*(fistH-12)/3;
    const kx=fistX+fistW*0.45;
    const kw=fistW*0.35;
    // Chrome cap base
    drawRoundRect(kx,ky-5,kw,10,3);
    const kg=X.createLinearGradient(kx,ky-5,kx,ky+5);
    kg.addColorStop(0,'#666');kg.addColorStop(0.3,'#999');kg.addColorStop(0.5,'#aaa');kg.addColorStop(0.7,'#888');kg.addColorStop(1,'#555');
    X.fillStyle=kg;X.fill();
    X.strokeStyle='#777';X.lineWidth=0.6;X.stroke();
    // Red glowing insert — bright
    X.fillStyle=flash?'rgba(255,50,50,1)':'rgba(255,30,30,0.8)';
    X.fillRect(kx+3,ky-2.5,kw-6,5);
    // Red glow effect
    X.shadowColor='#ff2020';X.shadowBlur=flash?10:4;
    X.fillStyle=flash?'rgba(255,80,80,0.9)':'rgba(255,40,40,0.5)';
    X.fillRect(kx+3,ky-2.5,kw-6,5);
    X.shadowBlur=0;
  }

  // Fist armor panel details
  X.strokeStyle='#3a3a44';X.lineWidth=0.8;
  X.beginPath();X.moveTo(fistX+fistW*0.15,-fistH/2+3);X.lineTo(fistX+fistW*0.15,fistH/2-3);X.stroke();
  X.beginPath();X.moveTo(fistX+fistW*0.4,-fistH/2+3);X.lineTo(fistX+fistW*0.4,fistH/2-3);X.stroke();

  // Wrist joint ring
  X.strokeStyle='#555';X.lineWidth=2.5;
  X.beginPath();X.arc(0,0,armW/2+2,0,Math.PI*2);X.stroke();
  X.strokeStyle=flash?'rgba(255,50,50,0.8)':'rgba(255,40,40,0.3)';X.lineWidth=1.5;
  X.beginPath();X.arc(0,0,armW/2,0,Math.PI*2);X.stroke();

  // Impact shockwave
  if(flash){
    X.beginPath();X.arc(fistX+fistW+8,0,16,0,Math.PI*2);
    X.fillStyle='rgba(255,60,40,0.4)';X.fill();
    X.beginPath();X.arc(fistX+fistW+8,0,7,0,Math.PI*2);
    X.fillStyle='rgba(255,255,255,0.7)';X.fill();
  }

  X.restore();

  // Downslam ground crack
  if(isDownslam){
    X.save();X.translate(0,r+15);
    X.strokeStyle='#ff4030';X.lineWidth=3;
    for(let i=0;i<10;i++){
      const a=Math.PI*2*i/10;
      const len=20+Math.random()*30;
      X.beginPath();X.moveTo(0,0);X.lineTo(Math.cos(a)*len,Math.sin(a)*len);X.stroke();
    }
    X.restore();
  }
}

function drawMonowire(r,ext,flash,f){
  const wireLen=75; // proportional to arena
  const isSpinning=f.relicWhipSpinTimer>0;

  // Wrist housing — small rectangular slot on forearm plate
  X.fillStyle='#2a2a30';
  X.fillRect(r-6,-8,14,16);
  X.strokeStyle='#3a3a44';X.lineWidth=1;
  X.strokeRect(r-6,-8,14,16);
  // Panel detail
  X.strokeStyle='#333';X.lineWidth=0.5;
  X.beginPath();X.moveTo(r,-8);X.lineTo(r,8);X.stroke();
  // Wire ejection slot
  X.fillStyle='#0a0a0e';
  X.fillRect(r+6,-3,6,6);
  X.strokeStyle='#555';X.lineWidth=0.8;
  X.strokeRect(r+6,-3,6,6);
  // Status LED
  X.beginPath();X.arc(r-2,-5,1.5,0,Math.PI*2);
  X.fillStyle=ext>0.1?'#ff8800':'#553300';X.fill();
  X.beginPath();X.arc(r-2,5,1.5,0,Math.PI*2);
  X.fillStyle='#444';X.fill();

  // WIRE — bright orange/gold, long, luminous
  const t=battleTime*0.08;
  const waveAmp=flash?0.4:(4-ext*3);

  if(isSpinning){
    const spinLen=100;
    X.shadowColor='#ff8800';X.shadowBlur=15;
    for(let w=0;w<2;w++){
      const wa=f.rotation*3+w*Math.PI;
      const tipX=Math.cos(wa)*spinLen,tipY=Math.sin(wa)*spinLen;
      // Wide outer glow
      X.strokeStyle='rgba(255,140,30,0.25)';X.lineWidth=10;
      X.beginPath();X.moveTo(0,0);X.lineTo(tipX,tipY);X.stroke();
      // Core wire
      X.strokeStyle='rgba(255,180,50,0.9)';X.lineWidth=2.5;
      X.beginPath();X.moveTo(0,0);X.lineTo(tipX,tipY);X.stroke();
      // Bright center
      X.strokeStyle='rgba(255,240,180,0.7)';X.lineWidth=1;
      X.beginPath();X.moveTo(0,0);X.lineTo(tipX,tipY);X.stroke();
      // Tip glow
      X.beginPath();X.arc(tipX,tipY,5,0,Math.PI*2);X.fillStyle='#ffcc44';X.fill();
    }
    X.shadowBlur=0;
  } else {
    // Outer glow — wide, soft orange
    X.strokeStyle=flash?'rgba(255,180,50,0.4)':'rgba(255,140,30,0.15)';
    X.lineWidth=flash?12:8;
    X.shadowColor='#ff8800';X.shadowBlur=flash?20:10;
    X.beginPath();X.moveTo(r+10,0);
    for(let i=1;i<=30;i++){
      const px=r+10+(wireLen-10)*i/30;
      const py=Math.sin(i*0.15+t)*waveAmp*(1-i/34);
      X.lineTo(px,py);
    }
    X.stroke();

    // Main wire — bright orange
    X.strokeStyle=flash?'rgba(255,200,60,1)':'rgba(255,160,40,0.75)';
    X.lineWidth=flash?3:2;
    X.beginPath();X.moveTo(r+10,0);
    for(let i=1;i<=30;i++){
      const px=r+10+(wireLen-10)*i/30;
      const py=Math.sin(i*0.15+t)*waveAmp*(1-i/34);
      X.lineTo(px,py);
    }
    X.stroke();

    // Hot white center
    X.strokeStyle=flash?'#ffffff':'rgba(255,240,200,0.5)';
    X.lineWidth=flash?1.2:0.7;
    X.beginPath();X.moveTo(r+10,0);
    for(let i=1;i<=30;i++){
      const px=r+10+(wireLen-10)*i/30;
      const py=Math.sin(i*0.15+t)*waveAmp*(1-i/34);
      X.lineTo(px,py);
    }
    X.stroke();
    X.shadowBlur=0;

    // Wire tip — bright glowing point
    const tipX=r+wireLen;
    X.beginPath();X.arc(tipX,0,flash?6:3.5,0,Math.PI*2);
    X.fillStyle=flash?'#ffffff':'#ffcc44';X.fill();
    X.beginPath();X.arc(tipX,0,flash?12:7,0,Math.PI*2);
    X.fillStyle=flash?'rgba(255,180,50,0.4)':'rgba(255,140,30,0.12)';X.fill();

    if(flash){
      for(let i=0;i<5;i++){
        const cx=r+15+Math.random()*(wireLen-20);
        const cy=(Math.random()-0.5)*10;
        X.strokeStyle='#ffdd88';X.lineWidth=0.8;
        X.beginPath();X.moveTo(cx,cy);
        X.lineTo(cx+rand(-8,8),cy+rand(-8,8));X.stroke();
      }
    }
  }
}

function drawPLS(r,ext,flash,f){
  const launcherLen=50; // proportional to arena

  // Forearm base plate — dark metallic
  X.fillStyle='#2a2a30';
  X.fillRect(r-8,-10,16,20);
  X.strokeStyle='#3a3a44';X.lineWidth=1;
  X.strokeRect(r-8,-10,16,20);
  X.strokeStyle='#333';X.lineWidth=0.5;
  X.beginPath();X.moveTo(r-2,-10);X.lineTo(r-2,10);X.stroke();
  X.beginPath();X.moveTo(r+4,-10);X.lineTo(r+4,10);X.stroke();
  // Mounting bolts
  X.fillStyle='#555';
  X.beginPath();X.arc(r-4,-7,1.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(r-4,7,1.5,0,Math.PI*2);X.fill();

  // Barrel cannon — proportional, dark metallic
  const bx=r+6;
  const bLen=launcherLen;
  const barrelR=8;
  const bg=X.createLinearGradient(bx,-barrelR,bx,barrelR);
  bg.addColorStop(0,'#151518');bg.addColorStop(0.15,'#2a2a35');bg.addColorStop(0.4,'#333340');
  bg.addColorStop(0.6,'#3a3a48');bg.addColorStop(0.85,'#2a2a35');bg.addColorStop(1,'#151518');
  X.fillStyle=bg;
  drawRoundRect(bx,-barrelR,bLen,barrelR*2,3);
  X.fill();
  X.strokeStyle='#444';X.lineWidth=1.2;X.stroke();

  // Green LED accent strips (green instead of red — energy weapon)
  X.fillStyle=flash?'rgba(50,255,50,1)':'rgba(30,200,30,0.6)';
  X.fillRect(bx+3,-barrelR,bLen-6,2);
  X.fillRect(bx+3,barrelR-2,bLen-6,2);
  if(flash){X.shadowColor='#33ff33';X.shadowBlur=8;X.fillRect(bx+3,-barrelR,bLen-6,2);X.fillRect(bx+3,barrelR-2,bLen-6,2);X.shadowBlur=0;}

  // Barrel segments
  X.strokeStyle='#2a2a35';X.lineWidth=1;
  [0.25,0.5,0.75].forEach(p=>{X.beginPath();X.moveTo(bx+bLen*p,-barrelR);X.lineTo(bx+bLen*p,barrelR);X.stroke();});

  // Top breach mechanism
  X.fillStyle='#1e1e28';
  X.fillRect(bx+3,-barrelR-4,bLen*0.3,4);
  X.strokeStyle='#3a3a44';X.lineWidth=0.8;X.strokeRect(bx+3,-barrelR-4,bLen*0.3,4);
  X.fillStyle=flash?'#44ff44':'#228822';X.fillRect(bx+5,-barrelR-3,4,2);
  // Bottom rail
  X.fillStyle='#1e1e28';X.fillRect(bx+bLen*0.2,barrelR,bLen*0.35,3);

  // Muzzle — dark barrel opening with energy glow
  const muzzX=bx+bLen;
  X.beginPath();X.arc(muzzX,0,barrelR-1,0,Math.PI*2);
  X.fillStyle='#0a0a10';X.fill();
  X.strokeStyle='#444';X.lineWidth=1.2;X.stroke();
  X.beginPath();X.arc(muzzX,0,barrelR-4,0,Math.PI*2);
  X.fillStyle=flash?'rgba(50,255,50,0.3)':'#050508';X.fill();
  // Rifling
  X.strokeStyle='#222';X.lineWidth=0.5;
  for(let i=0;i<6;i++){const a=Math.PI*2*i/6;X.beginPath();X.moveTo(muzzX+Math.cos(a)*2,Math.sin(a)*2);X.lineTo(muzzX+Math.cos(a)*(barrelR-2),Math.sin(a)*(barrelR-2));X.stroke();}

  // Muzzle flash — BIG green energy burst
  if(flash){
    X.shadowColor='#33ff33';X.shadowBlur=15;
    X.beginPath();X.arc(muzzX+5,0,16,0,Math.PI*2);
    X.fillStyle='rgba(100,255,100,0.5)';X.fill();
    X.beginPath();X.arc(muzzX+5,0,8,0,Math.PI*2);
    X.fillStyle='rgba(200,255,200,0.8)';X.fill();
    X.shadowBlur=0;
  }

  // Targeting optic on top
  X.strokeStyle='#55cc55';X.lineWidth=1;
  X.beginPath();X.moveTo(bx+bLen*0.55,-barrelR-4);X.lineTo(bx+bLen*0.55,-barrelR-8);X.lineTo(bx+bLen*0.7,-barrelR-8);X.stroke();
  X.beginPath();X.arc(bx+bLen*0.7,-barrelR-8,2,0,Math.PI*2);
  X.fillStyle=flash?'#aaffaa':'#55ff55';X.fill();

  // PLS Relic — BIG targeting reticle on enemy (visible during charge AND rapid fire)
  if(f&&f.specialActive&&f.relicLockTarget){
    X.save();
    X.rotate(-f.weaponAngle);
    const t=f.relicLockTarget;
    const tx=t.x-f.x,ty=t.y-f.y;
    const pulse=Math.sin(battleTime*0.2)*6;
    const reticleR=t.radius+20+pulse;
    // Outer spinning ring
    X.strokeStyle='#ff3333';X.lineWidth=3;X.globalAlpha=0.9;
    X.setLineDash([8,6]);
    X.lineDashOffset=battleTime*2;
    X.beginPath();X.arc(tx,ty,reticleR,0,Math.PI*2);X.stroke();
    X.setLineDash([]);
    // Inner solid ring
    X.strokeStyle='#ff6666';X.lineWidth=2;
    X.beginPath();X.arc(tx,ty,reticleR-8,0,Math.PI*2);X.stroke();
    // Crosshair lines — big
    X.strokeStyle='#ff3333';X.lineWidth=2.5;
    const cLen=25;
    X.beginPath();X.moveTo(tx-cLen,ty);X.lineTo(tx-8,ty);X.stroke();
    X.beginPath();X.moveTo(tx+8,ty);X.lineTo(tx+cLen,ty);X.stroke();
    X.beginPath();X.moveTo(tx,ty-cLen);X.lineTo(tx,ty-8);X.stroke();
    X.beginPath();X.moveTo(tx,ty+8);X.lineTo(tx,ty+cLen);X.stroke();
    // Corner brackets
    const bLen=12;
    X.strokeStyle='#ff4444';X.lineWidth=2;
    // Top-left
    X.beginPath();X.moveTo(tx-reticleR,ty-reticleR+bLen);X.lineTo(tx-reticleR,ty-reticleR);X.lineTo(tx-reticleR+bLen,ty-reticleR);X.stroke();
    // Top-right
    X.beginPath();X.moveTo(tx+reticleR-bLen,ty-reticleR);X.lineTo(tx+reticleR,ty-reticleR);X.lineTo(tx+reticleR,ty-reticleR+bLen);X.stroke();
    // Bottom-left
    X.beginPath();X.moveTo(tx-reticleR,ty+reticleR-bLen);X.lineTo(tx-reticleR,ty+reticleR);X.lineTo(tx-reticleR+bLen,ty+reticleR);X.stroke();
    // Bottom-right
    X.beginPath();X.moveTo(tx+reticleR-bLen,ty+reticleR);X.lineTo(tx+reticleR,ty+reticleR);X.lineTo(tx+reticleR,ty+reticleR-bLen);X.stroke();
    // "LOCKED" text during charge
    if(f.relicChargeTimer>0){
      X.fillStyle='#ff3333';X.font='bold 10px Consolas';X.textAlign='center';
      X.fillText('LOCKED',tx,ty-reticleR-8);
    }
    X.globalAlpha=1;
    X.restore();
  }
}

function drawSandy(r,ext,flash,f){
  // Sandevistan — NO weapon, no spine. Just the ball. Deals body collision damage.

  // Sandevistan active — BIG obvious blue energy field
  if(f&&f.sandyActive){
    X.save();X.rotate(-f.weaponAngle);
    // Massive blue aura fill
    const pulse=Math.sin(battleTime*0.12)*8;
    X.beginPath();X.arc(0,0,f.radius+20+pulse,0,Math.PI*2);
    const ag=X.createRadialGradient(0,0,f.radius,0,0,f.radius+20+pulse);
    ag.addColorStop(0,'rgba(68,136,255,0.5)');ag.addColorStop(0.5,'rgba(68,136,255,0.2)');ag.addColorStop(1,'rgba(68,136,255,0)');
    X.fillStyle=ag;X.fill();
    // Bright blue outer ring
    X.beginPath();X.arc(0,0,f.radius+16+pulse,0,Math.PI*2);
    X.shadowColor='#4488ff';X.shadowBlur=20;
    X.strokeStyle='rgba(68,136,255,0.9)';X.lineWidth=4;X.stroke();
    // Inner bright ring
    X.beginPath();X.arc(0,0,f.radius+4,0,Math.PI*2);
    X.strokeStyle='rgba(136,200,255,0.6)';X.lineWidth=6;X.stroke();
    X.shadowBlur=0;
    // 12 speed lines radiating outward — very visible
    for(let i=0;i<12;i++){
      const sa=battleTime*0.18+i*Math.PI/6;
      const lineLen=15+pulse+Math.sin(battleTime*0.3+i)*5;
      X.strokeStyle='rgba(100,180,255,0.6)';X.lineWidth=2.5;
      X.beginPath();X.moveTo(Math.cos(sa)*(f.radius+6),Math.sin(sa)*(f.radius+6));
      X.lineTo(Math.cos(sa)*(f.radius+6+lineLen),Math.sin(sa)*(f.radius+6+lineLen));X.stroke();
    }
    // Blue particles around ball
    if(battleTime%2<1){
      for(let i=0;i<3;i++){
        const a=Math.random()*Math.PI*2;
        spawnParticle(f.x+Math.cos(a)*(f.radius+5),f.y+Math.sin(a)*(f.radius+5),'#6699ff',Math.cos(a)*2,Math.sin(a)*2,12,3);
      }
    }
    X.restore();
  }
}

function drawThrowWeapon(r,ext,flash,f){
  // Throwing weapons — show currently held knife in throwing stance
  const tw=f.throwWeapons[f.throwActiveIdx];
  const hasWeapon=tw&&tw.available;

  // Optical Camo active — near invisible with ripple/shimmer like Cyberpunk
  if(f&&f.throwCamoActive){
    X.save();X.rotate(-f.weaponAngle);
    // Ripple distortion lines — subtle shimmer outline
    const t=battleTime*0.08;
    for(let i=0;i<8;i++){
      const a=t+i*Math.PI/4;
      const ripple=Math.sin(battleTime*0.2+i)*3;
      const r1=f.radius+ripple;
      const r2=f.radius+4+ripple;
      X.strokeStyle='rgba(180,200,255,'+(0.15+Math.sin(battleTime*0.15+i*0.5)*0.1)+')';
      X.lineWidth=1.5;
      X.beginPath();X.arc(0,0,r1,a-0.3,a+0.3);X.stroke();
      X.beginPath();X.arc(0,0,r2,a+0.15-0.2,a+0.15+0.2);X.stroke();
    }
    // Very faint highlight outline so you can still see the ball
    X.strokeStyle='rgba(200,220,255,0.12)';X.lineWidth=2;
    X.beginPath();X.arc(0,0,f.radius+1,0,Math.PI*2);X.stroke();
    X.restore();
  }

  if(!hasWeapon){
    // No weapon — empty hand aura
    X.strokeStyle='rgba(204,102,255,0.3)';X.lineWidth=2;
    X.beginPath();X.moveTo(r,0);X.lineTo(r+20,0);X.stroke();
    return;
  }

  // Arm/handle
  X.fillStyle='#2a2a30';X.fillRect(r-5,-4,12,8);

  switch(tw.id){
    case 'agaou':
      // Agaou — large machete/cleaver with purple-pink energy edge
      X.beginPath();
      X.moveTo(r+7,-3);
      X.lineTo(r+15,-8);X.lineTo(r+35,-10);
      X.quadraticCurveTo(r+45,-8,r+50,-2);
      X.lineTo(r+50,2);
      X.quadraticCurveTo(r+40,6,r+25,5);
      X.lineTo(r+7,3);X.closePath();
      const ag=X.createLinearGradient(r+7,0,r+50,0);
      ag.addColorStop(0,'#445');ag.addColorStop(0.3,'#778');ag.addColorStop(0.7,'#99a');ag.addColorStop(1,'#667');
      X.fillStyle=ag;X.fill();X.strokeStyle='#333';X.lineWidth=1;X.stroke();
      // Energy edge — purple-pink glow
      X.shadowColor='#ff44ff';X.shadowBlur=flash?12:4;
      X.strokeStyle=flash?'#ff88ff':'#cc44cc';X.lineWidth=2;
      X.beginPath();X.moveTo(r+15,-8);X.lineTo(r+35,-10);
      X.quadraticCurveTo(r+45,-8,r+50,-2);X.stroke();
      X.shadowBlur=0;
      break;
    case 'fang':
      // Fang — iconic moddable claw/axe from DLC, gold/amber
      // Axe head
      X.beginPath();
      X.moveTo(r+7,-2);X.lineTo(r+15,-3);
      X.lineTo(r+25,-12);X.quadraticCurveTo(r+38,-14,r+45,-6);
      X.lineTo(r+48,0);
      X.lineTo(r+45,6);X.quadraticCurveTo(r+38,14,r+25,12);
      X.lineTo(r+15,3);X.lineTo(r+7,2);X.closePath();
      const sg=X.createLinearGradient(r+7,0,r+48,0);
      sg.addColorStop(0,'#886622');sg.addColorStop(0.3,'#ccaa44');sg.addColorStop(0.6,'#ffdd66');sg.addColorStop(1,'#aa8833');
      X.fillStyle=sg;X.fill();X.strokeStyle='#665522';X.lineWidth=1;X.stroke();
      // Bright edge — curved claw
      X.shadowColor='#ffaa00';X.shadowBlur=flash?10:3;
      X.strokeStyle=flash?'#ffcc44':'#ffaa00';X.lineWidth=2;
      X.beginPath();X.moveTo(r+25,-12);X.quadraticCurveTo(r+38,-14,r+45,-6);X.lineTo(r+48,0);
      X.lineTo(r+45,6);X.quadraticCurveTo(r+38,14,r+25,12);X.stroke();
      X.shadowBlur=0;
      // Mod slot — small tech rectangle on handle
      X.fillStyle='#222';X.fillRect(r+10,-2,8,4);
      X.fillStyle='#44ff44';X.fillRect(r+11,-1,2,2);
      break;
    case 'punk':
      // Punkblade — small sleek cyan throwing blade
      X.beginPath();
      X.moveTo(r+7,-2);X.lineTo(r+15,-5);X.lineTo(r+30,-4);
      X.lineTo(r+35,0);X.lineTo(r+30,4);X.lineTo(r+15,5);
      X.lineTo(r+7,2);X.closePath();
      const pg=X.createLinearGradient(r+7,0,r+35,0);
      pg.addColorStop(0,'#225544');pg.addColorStop(0.4,'#44aa88');pg.addColorStop(0.7,'#66ffcc');pg.addColorStop(1,'#338866');
      X.fillStyle=pg;X.fill();X.strokeStyle='#224433';X.lineWidth=1;X.stroke();
      X.shadowColor='#66ffcc';X.shadowBlur=flash?8:2;
      X.strokeStyle=flash?'#88ffdd':'#66ffcc';X.lineWidth=1.5;
      X.beginPath();X.moveTo(r+15,-5);X.lineTo(r+30,-4);X.lineTo(r+35,0);X.stroke();
      X.shadowBlur=0;
      break;
  }
}

// ============================================================
function drawMiniWeapon(cx,cy,charId,size){
  X.save();X.translate(cx,cy);
  const s=size/30;X.scale(s,s);
  switch(charId){
    case 'mantis':
      // Dark housing
      X.fillStyle='#252530';X.fillRect(-14,-5,10,10);
      X.strokeStyle='#3a3a44';X.lineWidth=0.6;X.strokeRect(-14,-5,10,10);
      X.fillStyle='#cc2222';X.fillRect(-13,-5,8,1);X.fillRect(-13,4,8,1);
      // Extension rails
      X.fillStyle='#1e1e25';X.fillRect(-4,-3,6,2.5);X.fillRect(-4,0.5,6,2.5);
      X.fillStyle='#999';X.fillRect(-3,-2.5,4,1.5);X.fillRect(-3,1,4,1.5);
      // Twin chrome blades — side profile
      [-1,1].forEach(dir=>{
        const by=dir*3;
        X.beginPath();X.moveTo(2,by-3*dir);
        X.quadraticCurveTo(12,by-4*dir,20,by-0.5*dir);
        X.lineTo(22,by);
        X.quadraticCurveTo(14,by+3*dir,4,by+2*dir);
        X.closePath();
        const bg=X.createLinearGradient(2,0,22,0);
        bg.addColorStop(0,'#889');bg.addColorStop(0.4,'#ccd');bg.addColorStop(1,'#667');
        X.fillStyle=bg;X.fill();
        X.strokeStyle='#445';X.lineWidth=0.5;X.stroke();
      });
      break;
    case 'gorilla':
      // Dark forearm stub
      X.fillStyle='#2a2a35';X.fillRect(-14,-6,8,12);
      // Massive fist
      drawRoundRect(-6,-12,22,24,4);
      X.fillStyle='#252530';X.fill();
      X.strokeStyle='#444';X.lineWidth=1.2;X.stroke();
      // Red knuckle caps — bright
      for(let k=0;k<4;k++){
        const ky=-9+k*5.5;
        X.fillStyle='#666';X.fillRect(2,ky,8,4);
        X.shadowColor='#ff2020';X.shadowBlur=3;
        X.fillStyle='rgba(255,40,40,0.8)';X.fillRect(3,ky+0.5,6,3);
        X.shadowBlur=0;
      }
      // Fingers
      for(let k=0;k<4;k++){
        const ky=-9+k*5.5;
        X.fillStyle='#222';X.fillRect(12,ky,5,4);
      }
      break;
    case 'monowire':
      // Dark wrist housing
      X.fillStyle='#2a2a30';X.fillRect(-14,-4,8,8);
      X.strokeStyle='#3a3a44';X.lineWidth=0.6;X.strokeRect(-14,-4,8,8);
      // Bright orange wire — long, glowing
      X.shadowColor='#ff8800';X.shadowBlur=6;
      X.strokeStyle='rgba(255,140,30,0.3)';X.lineWidth=5;
      X.beginPath();X.moveTo(-6,0);X.quadraticCurveTo(4,-8,20,0);X.stroke();
      X.strokeStyle='#ff9930';X.lineWidth=2;
      X.beginPath();X.moveTo(-6,0);X.quadraticCurveTo(4,-8,20,0);X.stroke();
      X.strokeStyle='rgba(255,240,180,0.6)';X.lineWidth=0.8;
      X.beginPath();X.moveTo(-6,0);X.quadraticCurveTo(4,-8,20,0);X.stroke();
      X.shadowBlur=0;
      X.beginPath();X.arc(20,0,3,0,Math.PI*2);X.fillStyle='#ffcc44';X.fill();
      break;
    case 'pls':
      // Forearm plate
      X.fillStyle='#2a2a30';X.fillRect(-14,-5,8,10);
      // Barrel cannon
      const plsG=X.createLinearGradient(-6,-6,-6,6);
      plsG.addColorStop(0,'#151518');plsG.addColorStop(0.5,'#333340');plsG.addColorStop(1,'#151518');
      drawRoundRect(-6,-6,24,12,2);X.fillStyle=plsG;X.fill();
      X.strokeStyle='#444';X.lineWidth=1;X.stroke();
      // Green accent strips
      X.fillStyle='rgba(30,200,30,0.7)';
      X.fillRect(-4,-6,20,1.5);X.fillRect(-4,4.5,20,1.5);
      // Muzzle
      X.beginPath();X.arc(18,0,4.5,0,Math.PI*2);X.fillStyle='#0a0a10';X.fill();
      X.strokeStyle='#444';X.lineWidth=0.8;X.stroke();
      // Breach on top
      X.fillStyle='#1e1e28';X.fillRect(-4,-9,8,3);
      // Targeting optic
      X.beginPath();X.arc(4,-10,1.5,0,Math.PI*2);X.fillStyle='#55ff55';X.fill();
      break;
    case 'sandy':
      // No weapon — just blue speed aura
      X.shadowColor='#4488ff';X.shadowBlur=8;
      X.beginPath();X.arc(0,0,12,0,Math.PI*2);
      X.strokeStyle='rgba(68,136,255,0.6)';X.lineWidth=2;X.stroke();
      X.beginPath();X.arc(0,0,8,0,Math.PI*2);
      X.strokeStyle='rgba(136,200,255,0.4)';X.lineWidth=3;X.stroke();
      X.shadowBlur=0;
      // Speed lines
      for(let i=0;i<4;i++){const a=Math.PI*2*i/4;X.strokeStyle='rgba(68,136,255,0.4)';X.lineWidth=1.5;X.beginPath();X.moveTo(Math.cos(a)*10,Math.sin(a)*10);X.lineTo(Math.cos(a)*18,Math.sin(a)*18);X.stroke();}
      break;
    case 'throw':
      // 3 small throwing knives fanned
      X.shadowColor='#cc66ff';X.shadowBlur=4;
      [[-6,'#ff44ff'],[0,'#ffaa00'],[6,'#66ffcc']].forEach(([oy,col])=>{
        X.strokeStyle=col;X.lineWidth=2;
        X.beginPath();X.moveTo(-4,oy);X.lineTo(18,oy);X.stroke();
        X.beginPath();X.moveTo(14,oy-2);X.lineTo(18,oy);X.lineTo(14,oy+2);X.stroke();
      });
      X.shadowBlur=0;
      break;
  }
  X.restore();
}

function drawTitle(){
  clearBtns();X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  X.strokeStyle='#1a1a3a';X.lineWidth=1;
  for(let i=0;i<W;i+=40){X.beginPath();X.moveTo(i,0);X.lineTo(i,H);X.stroke();}
  for(let i=0;i<H;i+=40){X.beginPath();X.moveTo(0,i);X.lineTo(W,i);X.stroke();}

  const titleY=isMobile?180:200;
  X.font='bold '+(isMobile?'32':'48')+'px Consolas,Courier New,monospace';
  X.textAlign='center';X.textBaseline='middle';
  X.shadowColor='#7b68ee';X.shadowBlur=20;
  X.fillStyle='#7b68ee';
  X.fillText('BALL BATTLE',W/2,titleY-25);
  X.fillText('ARENA',W/2,titleY+25);
  X.shadowBlur=0;

  X.font=(isMobile?'13':'16')+'px Consolas,Courier New,monospace';
  X.fillStyle='#888';
  X.fillText('Cyberpunk Combat',W/2,titleY+65);

  const t=Date.now()*0.002;
  const charSpacing=isMobile?Math.min(72,Math.floor((W-80)/CHARS.length)):90;
  const charOffset=(CHARS.length-1)/2;
  CHARS.forEach((ch,i)=>{
    const bx=W/2+(i-charOffset)*charSpacing;
    const by=titleY+130+Math.sin(t+i)*10;
    const br=isMobile?28:32;
    const g=X.createRadialGradient(bx-br*0.2,by-br*0.2,br*0.1,bx,by,br);
    g.addColorStop(0,lighten(ch.color,40));g.addColorStop(1,ch.color);
    X.beginPath();X.arc(bx,by,br,0,Math.PI*2);X.fillStyle=g;X.fill();
    X.strokeStyle=darken(ch.color,20);X.lineWidth=1.5;X.stroke();
    X.beginPath();X.arc(bx-br*0.25,by-br*0.25,br*0.15,0,Math.PI*2);X.fillStyle='rgba(255,255,255,0.3)';X.fill();
    drawMiniWeapon(bx+br+4,by,ch.id,br*1.2);
  });

  const btnW=200,btnH=50;
  addBtn('start',W/2-btnW/2,titleY+190,btnW,btnH,'START','#7b68ee',()=>{screen='select';p1Char=0;p2Char=1;p1Elem=0;p2Elem=0;});
  X.font='11px Consolas,Courier New,monospace';X.fillStyle='#444';X.textAlign='center';
  X.fillText('P10 v6.1 // soloforte.ai',W/2,H-20);
  buttons.forEach(drawBtn);
}

function drawBallPreview(bx,by,r,ch){
  const g=X.createRadialGradient(bx-r*0.2,by-r*0.2,r*0.1,bx,by,r);
  g.addColorStop(0,lighten(ch.color,40));g.addColorStop(1,ch.color);
  X.beginPath();X.arc(bx,by,r,0,Math.PI*2);X.fillStyle=g;X.fill();
  X.strokeStyle=darken(ch.color,20);X.lineWidth=r>15?1.5:1;X.stroke();
  X.beginPath();X.arc(bx-r*0.25,by-r*0.25,r*0.15,0,Math.PI*2);
  X.fillStyle='rgba(255,255,255,0.3)';X.fill();
  const weaponScale=r<18?r*0.8:r*1.3;
  drawMiniWeapon(bx+r+2,by,ch.id,weaponScale);
}

function drawSelectDesktop(){
  // 2-row grid: 3 chars per row for clean layout with 6+ characters
  const cols=3,cardW=140,cardH=170,gapX=10,gapY=8;
  const rows=Math.ceil(CHARS.length/cols);
  const totalW=cols*cardW+(cols-1)*gapX;
  const startX=(W-totalW)/2;
  const cardY=50;
  X.font='bold 14px Consolas,Courier New,monospace';
  X.textAlign='left';X.fillStyle='#4488ff';X.fillText('P1 — Left click',startX,cardY);
  X.textAlign='right';X.fillStyle='#ff4444';X.fillText('P2 — Right click',startX+totalW,cardY);

  CHARS.forEach((ch,i)=>{
    const row=Math.floor(i/cols),col=i%cols;
    const cx=startX+col*(cardW+gapX),cy=cardY+10+row*(cardH+gapY);
    const isP1=p1Char===i,isP2=p2Char===i;
    drawRoundRect(cx,cy,cardW,cardH,8);
    X.fillStyle=isP1?'#112244':isP2?'#441122':'#111128';X.fill();
    X.strokeStyle=isP1?'#4488ff':isP2?'#ff4444':ch.color+'66';X.lineWidth=isP1||isP2?3:1.5;X.stroke();
    if(isP1){X.font='bold 11px Consolas,monospace';X.fillStyle='#4488ff';X.textAlign='left';X.fillText('P1',cx+8,cy+16);}
    if(isP2){X.font='bold 11px Consolas,monospace';X.fillStyle='#ff4444';X.textAlign='right';X.fillText('P2',cx+cardW-8,cy+16);}
    drawBallPreview(cx+cardW/2,cy+40,24,ch);
    X.font='bold 11px Consolas,monospace';X.textAlign='center';X.fillStyle='#fff';X.fillText(ch.name,cx+cardW/2,cy+72);
    X.font='9px Consolas,monospace';X.fillStyle=ch.color;X.fillText(ch.playstyle,cx+cardW/2,cy+85);
    X.font='9px Consolas,monospace';X.textAlign='left';
    const sx=cx+10,sy=cy+100;
    const stats=[['HP',ch.stats.hp],['ATK',ch.stats.atk],['SPD',ch.stats.speed.toFixed(1)],['RNG',ch.stats.range],['DEF',ch.stats.def]];
    stats.forEach((s,si)=>{
      X.fillStyle='#888';X.fillText(s[0]+':',sx,sy+si*13);X.fillStyle='#ccc';X.fillText(''+s[1],sx+30,sy+si*13);
      const barVal=s[0]==='HP'?ch.stats.hp/750:s[0]==='RNG'?ch.stats.range/200:s[0]==='SPD'?ch.stats.speed/8:s[0]==='ATK'?ch.stats.atk/35:ch.stats.def/10;
      X.fillStyle='#222';X.fillRect(sx+55,sy+si*13-7,cardW-78,5);X.fillStyle=ch.color;X.fillRect(sx+55,sy+si*13-7,(cardW-78)*Math.min(1,barVal),5);
    });
    addBtn('p1c'+i,cx,cy,cardW/2,cardH,'','transparent',()=>{p1Char=i;});
    addBtn('p2c'+i,cx+cardW/2,cy,cardW/2,cardH,'','transparent',()=>{p2Char=i;});
  });

  const gridBottom=cardY+10+rows*(cardH+gapY);
  const elemY=gridBottom+10;
  X.font='bold 13px Consolas,monospace';X.textAlign='center';
  X.fillStyle='#4488ff';X.fillText('P1 ELEMENT',W/4,elemY);
  drawElementPicker(W/4-130,elemY+10,p1Elem,'p1e',(i)=>{p1Elem=i;});
  X.fillStyle='#ff4444';X.fillText('P2 ELEMENT',W*3/4,elemY);
  drawElementPicker(W*3/4-130,elemY+10,p2Elem,'p2e',(i)=>{p2Elem=i;});

  const comboY=elemY+70;
  X.font='11px Consolas,monospace';
  if(p1Elem>0){const key=CHARS[p1Char].id+'_'+ELEMENTS[p1Elem].id;X.fillStyle=ELEMENTS[p1Elem].color;X.textAlign='center';X.fillText('P1: '+(COMBO_EFFECTS[key]||''),W/4,comboY);}
  if(p2Elem>0){const key=CHARS[p2Char].id+'_'+ELEMENTS[p2Elem].id;X.fillStyle=ELEMENTS[p2Elem].color;X.textAlign='center';X.fillText('P2: '+(COMBO_EFFECTS[key]||''),W*3/4,comboY);}

  addBtn('battle',W/2-100,H-70,200,48,'BATTLE!','#ff4444',startBattle);
  addBtn('back',20,H-50,80,35,'Back','#666',()=>{screen='title';});
  buttons.forEach(b=>{if(b.id.startsWith('p1c')||b.id.startsWith('p2c'))return;drawBtn(b);});
}

function drawSelectMobile(){
  // 3-per-row grid for 6+ characters
  const cols=3,cardW=130,cardH=95,gapX=5,gapY=4;
  const totalW=cols*cardW+(cols-1)*gapX;
  const startX=(W-totalW)/2;

  function drawCharGrid(label,labelColor,yStart,selected,prefix,cb){
    X.font='bold 11px Consolas,monospace';X.textAlign='center';
    X.fillStyle=labelColor;X.fillText(label,W/2,yStart);
    const gridY=yStart+5;
    CHARS.forEach((ch,i)=>{
      const row=Math.floor(i/cols),col=i%cols;
      const cx=startX+col*(cardW+gapX),cy=gridY+row*(cardH+gapY);
      const isSel=selected===i;
      drawRoundRect(cx,cy,cardW,cardH,5);
      X.fillStyle=isSel?(labelColor==='#4488ff'?'#112244':'#441122'):'#111128';X.fill();
      X.strokeStyle=isSel?labelColor:ch.color+'44';X.lineWidth=isSel?2.5:1;X.stroke();
      drawBallPreview(cx+20,cy+28,12,ch);
      X.font='bold 9px Consolas,monospace';X.textAlign='left';X.fillStyle='#fff';
      const shortName=ch.name.length>12?ch.name.slice(0,12):ch.name;
      X.fillText(shortName,cx+40,cy+22);
      X.font='8px Consolas,monospace';X.fillStyle=ch.color;X.fillText(ch.playstyle,cx+40,cy+34);
      X.fillStyle='#888';
      X.fillText('HP:'+ch.stats.hp+' ATK:'+ch.stats.atk,cx+8,cy+55);
      X.fillText('SPD:'+ch.stats.speed.toFixed(1)+' RNG:'+ch.stats.range,cx+8,cy+67);
      X.fillText('DEF:'+ch.stats.def+' CRT:'+ch.stats.crit+'%',cx+8,cy+79);
      if(isSel){X.font='bold 9px Consolas,monospace';X.fillStyle=labelColor;X.textAlign='right';X.fillText(label,cx+cardW-6,cy+14);}
      addBtn(prefix+i,cx,cy,cardW,cardH,'','transparent',()=>{cb(i);});
    });
    const rows=Math.ceil(CHARS.length/cols);
    return gridY+rows*(cardH+gapY);
  }

  const p1Bottom=drawCharGrid('P1','#4488ff',42,p1Char,'p1m',(i)=>{p1Char=i;});
  const p2Bottom=drawCharGrid('P2','#ff4444',p1Bottom+8,p2Char,'p2m',(i)=>{p2Char=i;});

  const elemY=p2Bottom+6;
  X.font='bold 10px Consolas,monospace';X.textAlign='center';
  X.fillStyle='#4488ff';X.fillText('P1 ELEMENT',W/4+10,elemY);
  drawElementPickerMobile(10,elemY+8,p1Elem,'p1em',(i)=>{p1Elem=i;});
  X.fillStyle='#ff4444';X.fillText('P2 ELEMENT',W*3/4-10,elemY);
  drawElementPickerMobile(W/2+10,elemY+8,p2Elem,'p2em',(i)=>{p2Elem=i;});

  addBtn('battle',W/2-80,H-55,160,40,'BATTLE!','#ff4444',startBattle);
  addBtn('back',10,H-48,60,32,'Back','#666',()=>{screen='title';});
  buttons.forEach(b=>{if(b.id.startsWith('p1m')||b.id.startsWith('p2m'))return;drawBtn(b);});
}

function drawElementIcon(cx,cy,elemId,size){
  const s=size;
  switch(elemId){
    case 'fire':
      // Flame icon
      X.beginPath();X.moveTo(cx,cy-s);
      X.quadraticCurveTo(cx+s*0.6,cy-s*0.3,cx+s*0.5,cy+s*0.2);
      X.quadraticCurveTo(cx+s*0.3,cy-s*0.1,cx+s*0.2,cy+s*0.5);
      X.quadraticCurveTo(cx+s*0.1,cy+s*0.8,cx,cy+s);
      X.quadraticCurveTo(cx-s*0.1,cy+s*0.8,cx-s*0.2,cy+s*0.5);
      X.quadraticCurveTo(cx-s*0.3,cy-s*0.1,cx-s*0.5,cy+s*0.2);
      X.quadraticCurveTo(cx-s*0.6,cy-s*0.3,cx,cy-s);
      X.closePath();
      const fg=X.createLinearGradient(cx,cy-s,cx,cy+s);
      fg.addColorStop(0,'#ff4400');fg.addColorStop(0.4,'#ff6600');fg.addColorStop(1,'#ffaa00');
      X.fillStyle=fg;X.fill();
      // Inner flame
      X.beginPath();X.moveTo(cx,cy-s*0.4);
      X.quadraticCurveTo(cx+s*0.2,cy+s*0.1,cx,cy+s*0.6);
      X.quadraticCurveTo(cx-s*0.2,cy+s*0.1,cx,cy-s*0.4);
      X.fillStyle='#ffdd44';X.fill();
      break;
    case 'electric':
      // Lightning bolt
      X.beginPath();
      X.moveTo(cx+s*0.1,cy-s);X.lineTo(cx-s*0.4,cy+s*0.1);X.lineTo(cx,cy);
      X.lineTo(cx-s*0.1,cy+s);X.lineTo(cx+s*0.4,cy-s*0.1);X.lineTo(cx,cy);
      X.closePath();
      X.fillStyle='#ffcc00';X.fill();
      X.strokeStyle='#ff9900';X.lineWidth=1;X.stroke();
      // Inner bright
      X.fillStyle='#ffffaa';X.fillRect(cx-1,cy-s*0.3,2,s*0.6);
      break;
    case 'toxic':
      // Poison droplet / skull-ish
      X.beginPath();X.arc(cx,cy-s*0.2,s*0.55,0,Math.PI*2);
      X.fillStyle='#aa44cc';X.fill();
      X.strokeStyle='#cc66ee';X.lineWidth=1;X.stroke();
      // Drip
      X.beginPath();X.moveTo(cx-s*0.15,cy+s*0.3);
      X.quadraticCurveTo(cx,cy+s*1.1,cx+s*0.15,cy+s*0.3);
      X.fillStyle='#aa44cc';X.fill();
      // Skull eyes
      X.fillStyle='#1a0a2a';
      X.beginPath();X.arc(cx-s*0.2,cy-s*0.25,s*0.12,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(cx+s*0.2,cy-s*0.25,s*0.12,0,Math.PI*2);X.fill();
      break;
    case 'cryo':
      // Snowflake / ice crystal
      X.strokeStyle='#77ddff';X.lineWidth=1.5;
      for(let i=0;i<6;i++){
        const a=Math.PI*2*i/6;
        X.beginPath();X.moveTo(cx,cy);
        X.lineTo(cx+Math.cos(a)*s,cy+Math.sin(a)*s);X.stroke();
        // Branch tips
        const bx2=cx+Math.cos(a)*s*0.65,by2=cy+Math.sin(a)*s*0.65;
        X.beginPath();X.moveTo(bx2,by2);
        X.lineTo(bx2+Math.cos(a+0.5)*s*0.3,by2+Math.sin(a+0.5)*s*0.3);X.stroke();
        X.beginPath();X.moveTo(bx2,by2);
        X.lineTo(bx2+Math.cos(a-0.5)*s*0.3,by2+Math.sin(a-0.5)*s*0.3);X.stroke();
      }
      // Center dot
      X.beginPath();X.arc(cx,cy,s*0.15,0,Math.PI*2);X.fillStyle='#aaeeff';X.fill();
      break;
  }
}
function drawElementPicker(sx,sy,selected,prefix,cb){
  ELEMENTS.forEach((el,i)=>{
    const ex=sx+i*52,isSel=selected===i;
    // Background with element color tint
    drawRoundRect(ex,sy,48,45,5);
    if(isSel){
      X.fillStyle=el.color+'44';X.fill();
      X.shadowColor=el.color;X.shadowBlur=8;
      X.strokeStyle=el.color;X.lineWidth=2.5;X.stroke();
      X.shadowBlur=0;
    } else {
      X.fillStyle='#0d0d22';X.fill();
      X.strokeStyle=el.color+'55';X.lineWidth=1;X.stroke();
    }
    // Element icon or "NONE"
    if(el.id==='none'){
      X.font='bold 14px Consolas,monospace';X.textAlign='center';X.fillStyle='#555';
      X.fillText('--',ex+24,sy+22);
    } else {
      drawElementIcon(ex+24,sy+18,el.id,10);
    }
    // Name below
    X.font='bold 9px Consolas,monospace';X.textAlign='center';

    addBtn(prefix+i,ex,sy,48,45,'','transparent',()=>cb(i));
  });
}
function drawElementPickerMobile(sx,sy,selected,prefix,cb){
  const bw=37,gap=3;
  ELEMENTS.forEach((el,i)=>{

      X.shadowBlur=0;
    } else {

    }
    if(el.id==='none'){

}

function startBattle(){
  screen='battle';battleOver=false;winner=null;battleTime=0;battleRealFrames=0;battleSpeed=1;
  particles=[];dmgNums=[];battleLog=[];projectiles=[];explosions=[];
  shockwaveProjectiles=[];wallCracks=[];fireZones=[];vulnZones=[];poisonBubbles=[];
  fireTrails=[];sandyAfterimages=[];sandyOrbs=[];
  quickhackDisplay=null;relicTextTimer=0;quickhackFlashTimer=0;
  battleStats={p1Hits:0,p2Hits:0,p1Dmg:0,p2Dmg:0,p1Crits:0,p2Crits:0};
  fighters=[createFighter(p1Char,p1Elem,0),createFighter(p2Char,p2Elem,1)];
  addLog('Battle Start!');addLog(CHARS[p1Char].name+' vs '+CHARS[p2Char].name);
}

function drawBattle(){
  clearBtns();
  const f1=fighters[0],f2=fighters[1];
  X.save();
  if(shakeTimer>0)X.translate((Math.random()*2-1)*shakeAmt,(Math.random()*2-1)*shakeAmt);
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);

  // Arena
  drawRoundRect(ARENA.x,ARENA.y,ARENA.w,ARENA.h,8);X.fillStyle='#0d0d25';X.fill();X.strokeStyle='#1a1a4a';X.lineWidth=2;X.stroke();
  X.strokeStyle='#12122a';X.lineWidth=1;
  for(let i=ARENA.x+40;i<ARENA.x+ARENA.w;i+=40){X.beginPath();X.moveTo(i,ARENA.y);X.lineTo(i,ARENA.y+ARENA.h);X.stroke();}
  for(let i=ARENA.y+40;i<ARENA.y+ARENA.h;i+=40){X.beginPath();X.moveTo(ARENA.x,i);X.lineTo(ARENA.x+ARENA.w,i);X.stroke();}
  X.strokeStyle='#1a1a4a';X.lineWidth=1;X.setLineDash([5,5]);
  X.beginPath();X.moveTo(W/2,ARENA.y);X.lineTo(W/2,ARENA.y+ARENA.h);X.stroke();X.setLineDash([]);

  // Wall cracks (on arena border)
  wallCracks.forEach(wc=>{
    const a=Math.min(1,wc.life/wc.maxLife);
    X.globalAlpha=a;
    const s=wc.size;
    // Hazard zone glow
    const hg=X.createRadialGradient(wc.x,wc.y,0,wc.x,wc.y,s*0.8);
    hg.addColorStop(0,'rgba(255,140,0,'+a*0.25+')');hg.addColorStop(0.6,'rgba(255,100,0,'+a*0.12+')');hg.addColorStop(1,'rgba(255,60,0,0)');
    X.fillStyle=hg;X.beginPath();X.arc(wc.x,wc.y,s*0.8,0,Math.PI*2);X.fill();
    // Thick crack lines
    X.strokeStyle='#ffaa00';X.lineWidth=3;
    for(let i=0;i<10;i++){
      const ca=Math.PI*2*i/10+(wc.x*0.01);
      const len=s*(wc.crackLines?wc.crackLines[i]:0.75);
      X.beginPath();X.moveTo(wc.x,wc.y);
      X.lineTo(wc.x+Math.cos(ca)*len,wc.y+Math.sin(ca)*len);
      X.stroke();
      // Branch cracks on most lines
      if(i%2===0||i%3===0){
        const bx=wc.x+Math.cos(ca)*len*0.6;
        const by=wc.y+Math.sin(ca)*len*0.6;
        X.lineWidth=2;
        X.beginPath();X.moveTo(bx,by);
        X.lineTo(bx+Math.cos(ca+0.5)*len*0.5,by+Math.sin(ca+0.5)*len*0.5);
        X.stroke();
        X.beginPath();X.moveTo(bx,by);
        X.lineTo(bx+Math.cos(ca-0.4)*len*0.4,by+Math.sin(ca-0.4)*len*0.4);
        X.stroke();
        X.lineWidth=3;
      }
    }
    // Bright center glow
    X.beginPath();X.arc(wc.x,wc.y,s*0.25,0,Math.PI*2);
    X.fillStyle='rgba(255,200,50,'+a*0.5+')';X.fill();
    X.globalAlpha=1;
  });

  // Fire zones (PLS+fire lingering)
  fireZones.forEach(fz=>{
    const a=Math.max(0.15,fz.life/fz.maxLife);
    X.globalAlpha=a;
    X.beginPath();X.arc(fz.x,fz.y,fz.radius,0,Math.PI*2);
    const fg=X.createRadialGradient(fz.x,fz.y,0,fz.x,fz.y,fz.radius);
    fg.addColorStop(0,'rgba(255,100,0,0.5)');fg.addColorStop(0.6,'rgba(255,60,0,0.25)');fg.addColorStop(1,'rgba(255,30,0,0)');
    X.fillStyle=fg;X.fill();
    X.strokeStyle='#ff4400';X.lineWidth=1.5;X.stroke();
    X.globalAlpha=1;
  });

  // Vulnerability zones (PLS+cryo)
  vulnZones.forEach(vz=>{
    const a=Math.max(0.15,vz.life/vz.maxLife);
    X.globalAlpha=a;
    X.beginPath();X.arc(vz.x,vz.y,vz.radius,0,Math.PI*2);
    const vg=X.createRadialGradient(vz.x,vz.y,0,vz.x,vz.y,vz.radius);
    vg.addColorStop(0,'rgba(119,221,255,0.4)');vg.addColorStop(0.6,'rgba(119,221,255,0.15)');vg.addColorStop(1,'rgba(119,221,255,0)');
    X.fillStyle=vg;X.fill();
    X.setLineDash([3,3]);X.strokeStyle='#77ddff';X.lineWidth=1.5;X.stroke();X.setLineDash([]);
    // "VULNERABLE" text
    X.font='bold 7px Consolas,monospace';X.fillStyle='#77ddff';X.textAlign='center';X.fillText('VULN',vz.x,vz.y+2);
    X.globalAlpha=1;
  });

  // Poison bubbles (gorilla+toxic)
  poisonBubbles.forEach(pb=>{
    const a=Math.max(0.2,pb.life/pb.maxLife);
    X.globalAlpha=a;
    for(let i=0;i<3;i++){
      const bx=pb.x+Math.sin(battleTime*0.05+i*2)*12;
      const by=pb.y+Math.cos(battleTime*0.04+i*1.5)*10;
      X.beginPath();X.arc(bx,by,4+Math.sin(battleTime*0.1+i)*2,0,Math.PI*2);
      X.fillStyle='rgba(170,68,204,0.4)';X.fill();
      X.strokeStyle='#aa44cc';X.lineWidth=1;X.stroke();
    }
    X.globalAlpha=1;
  });

  // Embedded throwing weapons on ground
  fighters.forEach(f=>{
    if(f.char.id!=='throw')return;
    f.throwEmbedded.forEach(emb=>{
      if(!emb.active)return;
      const a=Math.min(1,emb.life/120);
      X.globalAlpha=a;
      X.save();X.translate(emb.x,emb.y);
      X.rotate(Math.atan2(emb.y-f.y,emb.x-f.x));
      // Small knife stuck in ground
      X.fillStyle=emb.color;X.strokeStyle='#333';X.lineWidth=1;
      X.beginPath();X.moveTo(-8,-3);X.lineTo(8,-1);X.lineTo(8,1);X.lineTo(-8,3);X.closePath();
      X.fill();X.stroke();
      // Glow
      X.shadowColor=emb.color;X.shadowBlur=6;
      X.beginPath();X.arc(0,0,5,0,Math.PI*2);X.fillStyle=emb.color+'44';X.fill();
      X.shadowBlur=0;
      X.restore();
      X.globalAlpha=1;
    });
  });

  // Sandy afterimages (ghostly speed trails)
  sandyAfterimages.forEach(ai=>{
    const a=Math.max(0,ai.life/ai.maxLife);
    X.globalAlpha=a*0.35;
    X.beginPath();X.arc(ai.x,ai.y,ai.radius,0,Math.PI*2);
    X.fillStyle=ai.color;X.fill();
    X.strokeStyle='#4488ff';X.lineWidth=2;X.stroke();
    X.globalAlpha=1;
  });

  // Fire trails (sandy+fire)
  fireTrails.forEach(ft=>{
    const a=Math.max(0.1,ft.life/ft.maxLife);
    X.globalAlpha=a;
    X.beginPath();X.arc(ft.x,ft.y,ft.radius,0,Math.PI*2);
    const fg=X.createRadialGradient(ft.x,ft.y,0,ft.x,ft.y,ft.radius);
    fg.addColorStop(0,'rgba(255,100,0,0.6)');fg.addColorStop(1,'rgba(255,60,0,0)');
    X.fillStyle=fg;X.fill();
    X.globalAlpha=1;
  });

  // Sandy+electric rotating orbs
  fighters.forEach(f=>{
    if(f.alive&&f.char.id==='sandy'&&f.elementActive&&f.elem.id==='electric'){
      for(let oi=0;oi<2;oi++){
        const oa=f.sandyOrbAngle+oi*Math.PI;
        const ox=f.x+Math.cos(oa)*55,oy=f.y+Math.sin(oa)*55;
        X.beginPath();X.arc(ox,oy,8,0,Math.PI*2);
        const og=X.createRadialGradient(ox,oy,0,ox,oy,8);
        og.addColorStop(0,'#ffffaa');og.addColorStop(0.5,'#ffcc00');og.addColorStop(1,'#ff990033');
        X.fillStyle=og;X.fill();
        X.strokeStyle='#ffcc00';X.lineWidth=1.5;X.stroke();
        // Trail
        spawnParticle(ox,oy,'#ffcc00',0,0,6,2);
      }
    }
  });

  // Gorilla shockwave projectiles (visible wave discs)
  shockwaveProjectiles.forEach(sw=>{
    const a=Math.max(0.3,sw.life/sw.maxLife);
    X.globalAlpha=a;
    X.beginPath();X.arc(sw.x,sw.y,sw.size,0,Math.PI*2);
    X.fillStyle='rgba(255,170,0,0.2)';X.fill();
    X.strokeStyle='#ffaa00';X.lineWidth=3;X.stroke();
    // Inner ring
    X.beginPath();X.arc(sw.x,sw.y,sw.size*0.5,0,Math.PI*2);
    X.strokeStyle='rgba(255,200,50,0.5)';X.lineWidth=2;X.stroke();
    X.globalAlpha=1;
  });

  // Explosions — MASSIVE, bright, dramatic with shockwave rings
  explosions.forEach(e=>{
    const a=Math.max(0,e.life/e.maxLife);
    // Outer shockwave ring — thick and visible
    X.globalAlpha=a*0.5;
    X.beginPath();X.arc(e.x,e.y,e.radius*1.5,0,Math.PI*2);
    X.strokeStyle=e.color;X.lineWidth=5;X.stroke();
    // Second shockwave ring
    X.globalAlpha=a*0.25;
    X.beginPath();X.arc(e.x,e.y,e.radius*1.8,0,Math.PI*2);
    X.strokeStyle='#ffffff';X.lineWidth=2;X.stroke();
    // Main explosion fill — very bright center
    X.globalAlpha=a*0.8;
    const eg=X.createRadialGradient(e.x,e.y,0,e.x,e.y,e.radius);
    eg.addColorStop(0,'rgba(255,255,255,0.95)');eg.addColorStop(0.15,'rgba(255,255,200,0.8)');eg.addColorStop(0.35,e.color+'cc');eg.addColorStop(0.6,e.color+'77');eg.addColorStop(0.85,e.color+'33');eg.addColorStop(1,e.color+'00');
    X.beginPath();X.arc(e.x,e.y,e.radius,0,Math.PI*2);
    X.fillStyle=eg;X.fill();
    X.strokeStyle=e.color;X.lineWidth=3;X.stroke();
    // Hot white core
    X.globalAlpha=a*0.9;
    X.beginPath();X.arc(e.x,e.y,e.radius*0.25,0,Math.PI*2);
    X.fillStyle='rgba(255,255,255,0.8)';X.fill();
    X.globalAlpha=1;
  });

  // Projectiles — big glowing orbs with comet trails
  projectiles.forEach(p=>{
    // Comet trail — multiple fading circles behind the projectile
    const spd=Math.hypot(p.vx,p.vy);
    if(spd>1){
      const nx=-p.vx/spd,ny=-p.vy/spd;
      for(let t=1;t<=5;t++){
        const tx=p.x+nx*t*p.radius*0.6,ty=p.y+ny*t*p.radius*0.6;
        const ta=1-t/6;
        X.globalAlpha=ta*0.4;
        X.beginPath();X.arc(tx,ty,p.radius*(1-t*0.12),0,Math.PI*2);
        X.fillStyle=p.color;X.fill();
      }
      X.globalAlpha=1;
    }
    // Wide outer glow
    X.shadowColor=p.color;X.shadowBlur=p.radius*3;
    X.beginPath();X.arc(p.x,p.y,p.radius+6,0,Math.PI*2);X.fillStyle=p.color+'44';X.fill();
    // Main orb — bright
    const pg=X.createRadialGradient(p.x-p.radius*0.2,p.y-p.radius*0.2,p.radius*0.1,p.x,p.y,p.radius);
    pg.addColorStop(0,'#ffffff');pg.addColorStop(0.2,lighten(p.color,80));pg.addColorStop(0.5,lighten(p.color,40));pg.addColorStop(0.8,p.color);pg.addColorStop(1,darken(p.color,20));
    X.beginPath();X.arc(p.x,p.y,p.radius,0,Math.PI*2);X.fillStyle=pg;X.fill();
    X.strokeStyle=lighten(p.color,30);X.lineWidth=2;X.stroke();
    X.shadowBlur=0;
    // Core bright spot
    X.beginPath();X.arc(p.x-p.radius*0.15,p.y-p.radius*0.15,p.radius*0.3,0,Math.PI*2);
    X.fillStyle='rgba(255,255,255,0.7)';X.fill();
    // Homing glow extra — pulsing
    if(p.homing){const hpulse=Math.sin(battleTime*0.3)*3;X.beginPath();X.arc(p.x,p.y,p.radius+10+hpulse,0,Math.PI*2);X.fillStyle=p.color+'22';X.fill();X.strokeStyle=p.color+'44';X.lineWidth=1.5;X.stroke();}
  });

  // Particles
  particles.forEach(p=>{const a=Math.max(0,p.life/p.maxLife);X.globalAlpha=a;X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fillStyle=p.color;X.fill();X.globalAlpha=1;});

  // Fighters
  drawBall(f1);drawBall(f2);

  // Quickhack progress display
  if(quickhackDisplay&&quickhackDisplay.target.alive){
    const qd=quickhackDisplay;
    const t=qd.target;
    const prog=qd.progress/qd.maxProgress;
    const bw=50,bh=8;
    const qx=t.x-bw/2,qy=t.y-t.radius-30;
    // Red square that fills up
    X.fillStyle='#220000';X.fillRect(qx,qy,bw,bh);
    X.fillStyle=qd.hack.color;X.fillRect(qx,qy,bw*prog,bh);
    X.strokeStyle='#ff0000';X.lineWidth=1.5;X.strokeRect(qx,qy,bw,bh);
    X.font='bold 8px Consolas,monospace';X.textAlign='center';X.fillStyle='#fff';
    X.fillText(qd.hack.name,t.x,qy-3);
    // Pulsing red square icon
    const pulse=Math.sin(battleTime*0.2)*2;
    X.strokeStyle='#ff0000';X.lineWidth=2;
    X.strokeRect(t.x-6-pulse,qy-18-pulse,12+pulse*2,12+pulse*2);
  }

  // Damage numbers
  dmgNums.forEach(d=>{const a=Math.max(0,d.life/50);X.globalAlpha=a;X.font=(d.isCrit?'bold 18':'bold 14')+'px Consolas,Courier New,monospace';X.textAlign='center';X.fillStyle=d.color;X.shadowColor=d.color;X.shadowBlur=d.isCrit?8:0;X.fillText(d.val,d.x,d.y);X.shadowBlur=0;X.globalAlpha=1;});

  // Death anim
  [f1,f2].forEach(f=>{if(!f.alive&&f.deathAnim>0){f.deathAnim-=battleSpeed;if(f.deathAnim%5<2)spawnBurst(f.x+rand(-20,20),f.y+rand(-20,20),f.char.color,3,3);}});

  // Relic activation text
  if(relicTextTimer>0){
    const a=Math.min(1,relicTextTimer/30);
    X.globalAlpha=a;
    X.font='bold '+(isMobile?'18':'24')+'px Consolas,Courier New,monospace';
    X.textAlign='center';X.textBaseline='middle';
    X.shadowColor=relicTextColor;X.shadowBlur=15;
    X.fillStyle=relicTextColor;
    X.fillText(relicText,W/2,ARENA.y+ARENA.h/2);
    X.shadowBlur=0;X.globalAlpha=1;
  }

  // Quickhack flash — localized near the target enemy
  if(quickhackFlashTimer>0&&quickhackDisplay&&quickhackDisplay.target){
    const fl=quickhackFlashTimer/25;
    const flashOn=Math.floor(quickhackFlashTimer*2)%2===0;
    const qt=quickhackDisplay.target;
    const flashR=qt.radius+40+fl*20;
    if(flashOn){
      X.beginPath();X.arc(qt.x,qt.y,flashR,0,Math.PI*2);
      X.strokeStyle=quickhackFlashColor;X.lineWidth=6;X.stroke();
      X.fillStyle='rgba(0,0,0,'+fl*0.35+')';X.fill();
    }
    X.beginPath();X.arc(qt.x,qt.y,flashR*0.7,0,Math.PI*2);
    X.strokeStyle=flashOn?'#000000':quickhackFlashColor;X.lineWidth=3;X.stroke();
  } else if(quickhackFlashTimer>0){
    // Fallback if no target (e.g. after quickhack completes) — small arena border flash
    const fl=quickhackFlashTimer/25;
    const flashOn=Math.floor(quickhackFlashTimer*2)%2===0;
    if(flashOn){
      X.strokeStyle=quickhackFlashColor;X.lineWidth=4;
      X.strokeRect(ARENA.x,ARENA.y,ARENA.w,ARENA.h);
    }
  }

  X.restore();

  // === HUD ===
  const barW=isMobile?150:300,barH=16,barY=15;
  const p1bx=isMobile?10:40;
  X.fillStyle='#222';X.fillRect(p1bx,barY,barW,barH);
  const p1r=Math.max(0,f1.hp/f1.maxHp);
  X.fillStyle=p1r>0.6?'#44bb44':p1r>0.3?'#ccaa00':'#cc3333';
  X.fillRect(p1bx,barY,barW*p1r,barH);X.strokeStyle='#555';X.lineWidth=1;X.strokeRect(p1bx,barY,barW,barH);
  X.font='bold 11px Consolas,monospace';X.textAlign='left';X.fillStyle='#fff';X.fillText(Math.ceil(f1.hp)+'/'+f1.maxHp,p1bx+4,barY+12);
  X.fillStyle=f1.char.color;X.fillText(f1.char.name,p1bx,barY-3);
  if(f1.elem.id!=='none'){X.fillStyle=f1.elementActive?f1.elem.color:f1.elem.color+'66';X.fillText('['+f1.elem.name+']',p1bx+barW-60,barY-3);}

  const p2bx=isMobile?W-10-barW:W-40-barW;
  X.fillStyle='#222';X.fillRect(p2bx,barY,barW,barH);
  const p2r=Math.max(0,f2.hp/f2.maxHp);
  X.fillStyle=p2r>0.6?'#44bb44':p2r>0.3?'#ccaa00':'#cc3333';
  X.fillRect(p2bx+barW*(1-p2r),barY,barW*p2r,barH);X.strokeStyle='#555';X.lineWidth=1;X.strokeRect(p2bx,barY,barW,barH);
  X.font='bold 11px Consolas,monospace';X.textAlign='right';X.fillStyle='#fff';X.fillText(Math.ceil(f2.hp)+'/'+f2.maxHp,p2bx+barW-4,barY+12);
  X.fillStyle=f2.char.color;X.fillText(f2.char.name,p2bx+barW,barY-3);
  if(f2.elem.id!=='none'){X.fillStyle=f2.elementActive?f2.elem.color:f2.elem.color+'66';X.textAlign='left';X.fillText('['+f2.elem.name+']',p2bx,barY-3);}

  // Special bars top
  const spBarY=barY+barH+4,spBarH=8;
  X.fillStyle='#111';X.fillRect(p1bx,spBarY,barW,spBarH);
  const sp1=f1.specialBar/f1.specialMax;X.fillStyle=sp1>=1?'#ffcc00':'#7b68ee';X.fillRect(p1bx,spBarY,barW*sp1,spBarH);
  X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(p1bx,spBarY,barW,spBarH);
  if(sp1>=1){X.font='bold 8px Consolas,monospace';X.textAlign='left';X.fillStyle='#fff';X.fillText('RELIC READY!',p1bx+3,spBarY+7);}
  X.fillStyle='#111';X.fillRect(p2bx,spBarY,barW,spBarH);
  const sp2=f2.specialBar/f2.specialMax;X.fillStyle=sp2>=1?'#ffcc00':'#7b68ee';X.fillRect(p2bx+barW*(1-sp2),spBarY,barW*sp2,spBarH);
  X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(p2bx,spBarY,barW,spBarH);
  if(sp2>=1){X.font='bold 8px Consolas,monospace';X.textAlign='right';X.fillStyle='#fff';X.fillText('RELIC READY!',p2bx+barW-3,spBarY+7);}

  X.font='bold '+(isMobile?'12':'16')+'px Consolas,monospace';X.textAlign='center';X.fillStyle='#444';X.fillText('VS',W/2,barY+12);

  // Speed controls
  const sbY=spBarY+spBarH+4,sbX=W/2-60;
  [{l:'1x',s:1},{l:'2x',s:2},{l:'3x',s:3}].forEach((sb,i)=>{
    addBtn('spd'+i,sbX+i*42,sbY,38,18,sb.l,battleSpeed===sb.s?'#ffcc00':'#555',()=>{battleSpeed=sb.s;});
  });

  // Info panel below arena
  const infoY=ARENA.y+ARENA.h+6,infoH=70;
  drawRoundRect(ARENA.x,infoY,ARENA.w,infoH,6);X.fillStyle='#0a0a20';X.fill();X.strokeStyle='#1a1a4a';X.lineWidth=1;X.stroke();
  X.strokeStyle='#1a1a4a';X.beginPath();X.moveTo(W/2,infoY+5);X.lineTo(W/2,infoY+infoH-5);X.stroke();
  drawFighterInfo(f1,ARENA.x+10,infoY+8,(ARENA.w-20)/2,'left');
  drawFighterInfo(f2,W/2+10,infoY+8,(ARENA.w-20)/2,'right');

  // Battle log
  const logY=infoY+infoH+4;
  X.font='9px Consolas,monospace';X.textAlign='left';
  for(let i=0;i<Math.min(battleLog.length,isMobile?3:4);i++){
    X.fillStyle='rgba(200,200,200,'+(1-i*0.2)+')';X.fillText(battleLog[i],ARENA.x+8,logY+10+i*12);
  }

  // Victory overlay
  if(battleOver&&winner){
    if(Math.random()<0.3)spawnBurst(winner.x+rand(-30,30),winner.y+rand(-30,30),winner.char.color,3,4);
    X.save();X.font='bold '+(isMobile?'24':'36')+'px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
    X.shadowColor=winner.char.color;X.shadowBlur=20;X.fillStyle=winner.char.color;
    X.fillText(winner.char.name+' WINS!',W/2,ARENA.y+ARENA.h/2-30);X.shadowBlur=0;
    addBtn('result',W/2-80,ARENA.y+ARENA.h/2+10,160,40,'Continue','#7b68ee',()=>{screen='result';});
    X.restore();
  }
  buttons.forEach(drawBtn);
}

function drawFighterInfo(f,px,py,maxW,align){
  const isL=align==='left';
  drawMiniWeapon(px+(isL?8:maxW-8),py+6,f.char.id,14);
  X.font='bold 11px Consolas,monospace';X.textAlign=isL?'left':'right';X.fillStyle=f.char.color;
  X.fillText(f.char.name,px+(isL?20:maxW-20),py+10);

  // Status effects
  const ex=px+(isL?5:maxW-5),ey=py+26;
  const statuses=[];
  if(f.bleedTimer>0)statuses.push({t:'BLEED',c:'#cc0000'});
  if(f.captureTimer>0)statuses.push({t:'WRAPPED',c:'#00ddff'});
  if(f.burnTimer>0)statuses.push({t:'BURN',c:'#ff4400'});
  if(f.stunTimer>0)statuses.push({t:'STUN',c:'#ffcc00'});
  if(f.freezeTimer>0)statuses.push({t:'FROZEN',c:'#77ddff'});
  if(f.elementActive)statuses.push({t:f.elem.name,c:f.elem.color});

  X.font='8px Consolas,monospace';X.textAlign=isL?'left':'right';
  statuses.forEach((s,i)=>{
    X.fillStyle=s.c;X.fillText(s.t,ex+(isL?i*45:-i*45),ey);
  });
  if(statuses.length===0){
    if(f.elem.id!=='none'){X.fillStyle='#555';X.fillText(f.elem.name+' @25%',ex,ey);}
    else{X.fillStyle='#555';X.fillText('No Element',ex,ey);}
  }

  // Character-specific scaling stats (Earclak style)
  const chaos=getChaosLevel(f);
  X.font='10px Consolas,monospace';X.textAlign=isL?'left':'right';
  X.fillStyle=chaos>4?'#ff4444':chaos>2?'#ffaa00':chaos>0.5?'#888':'#444';
  let statLine='';
  switch(f.char.id){
    case 'mantis':statLine='Spd:'+(f.baseSpeed*(1+chaos*0.1)).toFixed(1)+' Bleed:'+Math.round((0.10+chaos*0.02)*100)+'%';break;
    case 'gorilla':statLine='ATK:'+Math.round((1+chaos*0.15)*100)+'% AoE:'+Math.round(75+chaos*15);break;
    case 'monowire':statLine='Cap:'+Math.round((0.30+chaos*0.04)*100)+'% Hack:40%';break;
    case 'pls':statLine='Exp:'+Math.round(f.plsExplosionRadius+chaos*10)+' DMG:'+Math.round((1+chaos*0.12)*100)+'%';break;
    case 'sandy':statLine='Spd:'+(f.baseSpeed*0.6).toFixed(1)+'-'+(f.baseSpeed*(1+chaos*0.15)).toFixed(1)+' Dodge:'+Math.round((f.dodgeChance+f.sandyDodgeBoost)*100)+'%';break;
    case 'throw':const avl=f.throwWeapons.filter(tw=>tw.available).length;const cur=f.throwWeapons[f.throwActiveIdx];statLine=(cur?cur.name:'---')+' '+avl+'/3';break;
  }
  X.fillText(statLine,px+(isL?5:maxW-5),py+42);

  // Relic status
  X.font='9px Consolas,monospace';X.fillStyle=f.specialActive?'#ffcc00':'#7b68ee';
  X.fillText(f.specialActive?'>> RELIC ACTIVE':'Relic: '+(f.specialBar>=f.specialMax?'READY':Math.floor(f.specialBar/f.specialMax*100)+'%'),px+(isL?5:maxW-5),py+56);
}

// ============================================================
// RESULT SCREEN
// ============================================================
function drawResult(){
  clearBtns();X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  if(!winner)return;
  const cy=isMobile?60:80;
  X.font='bold '+(isMobile?'22':'32')+'px Consolas,Courier New,monospace';X.textAlign='center';
  X.shadowColor=winner.char.color;X.shadowBlur=15;X.fillStyle=winner.char.color;X.fillText('WINNER',W/2,cy);X.shadowBlur=0;

  const bx=W/2,by=cy+70;
  const g=X.createRadialGradient(bx-10,by-10,5,bx,by,40);
  g.addColorStop(0,lighten(winner.char.color,50));g.addColorStop(1,winner.char.color);
  X.beginPath();X.arc(bx,by,40,0,Math.PI*2);X.fillStyle=g;X.fill();
  X.strokeStyle=darken(winner.char.color,20);X.lineWidth=3;X.stroke();
  X.beginPath();X.arc(bx-12,by-12,8,0,Math.PI*2);X.fillStyle='rgba(255,255,255,0.3)';X.fill();
  drawMiniWeapon(bx+38,by,winner.char.id,24);
  // Crown
  X.fillStyle='#ffcc00';X.beginPath();
  X.moveTo(bx-15,by-42);X.lineTo(bx-10,by-34);X.lineTo(bx-5,by-44);X.lineTo(bx,by-34);X.lineTo(bx+5,by-44);X.lineTo(bx+10,by-34);X.lineTo(bx+15,by-42);X.lineTo(bx+15,by-30);X.lineTo(bx-15,by-30);
  X.closePath();X.fill();

  X.font='bold '+(isMobile?'16':'20')+'px Consolas,monospace';X.fillStyle='#fff';X.textAlign='center';X.fillText(winner.char.name,W/2,by+60);
  if(winner.elem.id!=='none'){X.font='13px Consolas,monospace';X.fillStyle=winner.elem.color;X.fillText(winner.elem.name+' Element',W/2,by+80);}

  const statsY=by+110;
  X.font='bold 14px Consolas,monospace';X.fillStyle='#7b68ee';X.textAlign='center';X.fillText('BATTLE STATS',W/2,statsY);
  X.font='12px Consolas,monospace';
  const f1=fighters[0],f2=fighters[1];
  const sl=[['','P1 '+f1.char.name,'P2 '+f2.char.name],['Hits',battleStats.p1Hits,battleStats.p2Hits],['Damage',Math.round(battleStats.p1Dmg),Math.round(battleStats.p2Dmg)],['Crits',battleStats.p1Crits,battleStats.p2Crits],['HP Left',Math.max(0,Math.ceil(f1.hp)),Math.max(0,Math.ceil(f2.hp))]];
  const colW=isMobile?120:160;
  sl.forEach((line,i)=>{const sy=statsY+18+i*20;X.textAlign='right';X.fillStyle='#888';X.fillText(line[0],W/2-10,sy);X.textAlign='center';X.fillStyle=i===0?f1.char.color:'#ccc';X.fillText(''+line[1],W/2-10-colW/2,sy);X.fillStyle=i===0?f2.char.color:'#ccc';X.fillText(''+line[2],W/2+10+colW/2,sy);});
  X.font='11px Consolas,monospace';X.fillStyle='#666';X.textAlign='center';X.fillText('Duration: '+(battleRealFrames/60).toFixed(1)+'s',W/2,statsY+125);

  const btnY=statsY+150,btnW=isMobile?140:160;
  addBtn('rematch',W/2-btnW-10,btnY,btnW,42,'Rematch','#ff4444',()=>{startBattle();});
  addBtn('newbattle',W/2+10,btnY,btnW,42,'New Battle','#7b68ee',()=>{screen='select';});
  addBtn('titleback',W/2-60,btnY+55,120,35,'Title','#555',()=>{screen='title';});
  buttons.forEach(drawBtn);
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime=0;
function loop(time){
  lastTime=time;
  X.save();X.scale(sc,sc);
  switch(screen){
    case 'title':drawTitle();break;
    case 'select':drawSelect();break;
    case 'battle':for(let i=0;i<battleSpeed;i++)updateBattle(1);battleRealFrames++;drawBattle();break;
    case 'result':drawResult();break;
  }
  X.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lastTime=t;loop(t);});

</script>
</body>
</html>
