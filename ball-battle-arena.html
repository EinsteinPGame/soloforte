function attackYuki(f,enemy,chaos){
  // Garuda-enhanced melee — combos fill mass meter
  const d=dist(f,enemy);
  const meleeRange=f.radius+enemy.radius+55+chaos*3;
  if(d>meleeRange)return;
  if(f.yukiBHActive)return; // can't attack during black hole

  f.weaponExtend=1;f.weaponFlash=10;
  SFX.punch();

  // Base punch damage — scales with mass
  const massMult=1+(f.yukiMass/f.yukiMassMax)*0.8; // up to 1.8x at full mass
  const spdPenalty=1-(f.yukiMass/f.yukiMassMax)*0.4; // up to 0.6x speed at full mass
  f.speed=f.baseSpeed*spdPenalty;
  const punchDmg=f.atk*massMult*(1+chaos*0.08);
  dealDamage(f,enemy,punchDmg,true);
  spawnBurst(enemy.x,enemy.y,'#cc3366',8,4);

  // Garuda combo — each hit fills mass meter
  f.yukiHitCombo++;
  const isFireElem=f.elementActive&&f.elem.id==='fire';
  const massGain=3+f.yukiHitCombo*0.8+(isFireElem?2:0);
  f.yukiMass=Math.min(f.yukiMassMax,f.yukiMass+massGain);
  f.yukiOverloaded=f.yukiMass>=f.yukiMassMax*0.8;

  // Knockback (more mass = more knockback)
  const ka=angle(f,enemy);
  const knockForce=3+massMult*2;
  enemy.vx+=Math.cos(ka)*knockForce;enemy.vy+=Math.sin(ka)*knockForce;

  // Fire element: Garuda leaves fire trail DOT
  if(isFireElem&&f.yukiMass>=30){
    enemy.burnTimer=Math.max(enemy.burnTimer,90);
    enemy.burnDmg=Math.max(enemy.burnDmg,f.atk*0.12*massMult);
  }

  // Lightning element: Garuda chains lightning on hit
  if(f.elementActive&&f.elem.id==='electric'&&f.yukiHitCombo%3===0){
    spawnSparks(enemy.x,enemy.y,'#44ddff',10);
    const chainDmg=f.atk*0.3;
    dealDamage(f,enemy,chainDmg,false);
    spawnDmgNum(enemy.x+rand(-15,15),enemy.y-enemy.radius-20,'CHAIN','#44ddff',false);
  }

  // Overloaded: can throw Garuda as projectile
  if(f.yukiOverloaded&&f.yukiGarudaCD<=0&&!f.yukiGaruda.thrown){
    f.yukiGaruda.thrown=true;
    f.yukiGaruda.orbiting=false;
    f.yukiGaruda.returnTimer=90; // returns after 1.5s
    f.yukiGarudaCD=120; // 2s cooldown
    const throwAngle=angle(f,enemy);
    projectiles.push({
      x:f.x,y:f.y,
      vx:Math.cos(throwAngle)*7,vy:Math.sin(throwAngle)*7,
      owner:f,target:null,color:'#ff4488',
      life:90,radius:12,dmg:f.atk*1.5*massMult,
      explosive:false,homing:true,isYukiGaruda:true,
    });
    f.yukiMass=Math.max(0,f.yukiMass-30); // throwing costs mass
    f.yukiOverloaded=f.yukiMass>=f.yukiMassMax*0.8;
    SFX.rocketLaunch();
    spawnDmgNum(f.x,f.y-f.radius-25,'GARUDA THROW!','#ff4488',true);
    spawnBurst(f.x,f.y,'#ff4488',15,6);
  }

  // Mass decay between combos (toxic element: 50% slower)
  f._yukiMassDecayCD=f.elementActive&&f.elem.id==='toxic'?90:60;
}

function attackMegumi(f,enemy,chaos){
  // Shadow strikes — dark energy slashes with shadow trails
  f.weaponExtend=1;f.weaponFlash=10;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*5;
  if(d>effectiveRange)return;

  SFX.slash();
  const dmgMult=f.megumiDomainActive?1.25:1.0;
  const dmg=f.atk*(1+chaos*0.06)*dmgMult;
  dealDamage(f,enemy,dmg,true);
  spawnBurst(enemy.x,enemy.y,'#1a3a6a',6,3);

  // Shadow trail effect
  spawnBurst(f.x+(enemy.x-f.x)*0.5,f.y+(enemy.y-f.y)*0.5,'#0a1a3a',4,2);

  // Shadow meter goes UP on hit — scaling increases over time
  const gainMult=(f._megumiMeterGainMult||1)*f.megumiMeterScaling;
  f.megumiShadowMeter=Math.min(12,f.megumiShadowMeter+0.35*gainMult);
  megumiCheckShikigamiThresholds(f);

  // Knockback
  const ka=angle(f,enemy);
  enemy.vx+=Math.cos(ka)*2;enemy.vy+=Math.sin(ka)*2;
}

// Shadow meter threshold check — summon/dismiss shikigami based on meter level
function megumiCheckShikigamiThresholds(f){
  if(f.megumiDomainActive)return; // during domain all shikigami active, no switching
  const meter=f.megumiShadowMeter;
  const thresholds=[
    {level:11,name:'deer'},
    {level:9,name:'elephant'},
    {level:7,name:'serpent'},
    {level:5,name:'toad'},
    {level:3,name:'nue'},
  ];
  let bestShikigami=null;
  for(const t of thresholds){
    if(meter>=t.level){bestShikigami=t.name;break;}
  }
  // If threshold changed, dismiss old and summon new
  if(bestShikigami!==f.megumiActiveShikigami){
    const prev=f.megumiActiveShikigami;
    f.megumiActiveShikigami=bestShikigami;
    f.megumiShikigamiTimer=0;
    f.megumiShikigamiCD=0;
    f.megumiToadTargetHeld=false;
    if(bestShikigami){
      spawnDmgNum(f.x,f.y-f.radius-30,bestShikigami.toUpperCase()+'!','#4466aa',true);
      spawnBurst(f.x,f.y,'#1a3a6a',15,6);
    }
    if(prev&&!bestShikigami){
      spawnDmgNum(f.x,f.y-f.radius-20,'Dismissed','#666',false);
    }
  }
}

// Apply shadow meter loss (from taking damage or shikigami taking damage)
function megumiMeterLoss(f,amount){
  f.megumiShadowMeter=Math.max(0,f.megumiShadowMeter-amount*f.megumiMeterScaling);
  megumiCheckShikigamiThresholds(f);
}

      dealDamage(f,enemy,serpDmg,true);
      spawnBurst(enemy.x,enemy.y,'#886644',15,7);

      f.megumiDomainElephantCD=120+Math.random()*30;
      const floodDmg=f.atk*0.7;
      dealDamage(f,enemy,floodDmg,false);
      const ka2=Math.atan2(enemy.y-f.y,enemy.x-f.x);

      spawnBurst(enemy.x,enemy.y,'#4488cc',20,10);
      spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'FLOOD!','#4488cc',true);
      shakeTimer=Math.max(shakeTimer,5);shakeAmt=Math.max(shakeAmt,5);

    if(f.megumiDomainDeerCD<=0){
      f.megumiDomainDeerCD=100+Math.random()*30;

// ============================================================
// MEGUMI — Divine Dogs, Rabbit Escape, Shikigami updates (always runs)
// ============================================================
function updateMegumiAlways(f,enemy,dt){
  // Increase meter scaling over time (more volatile as fight progresses)
  f.megumiMeterScaling=Math.min(3.0,1.0+battleTime*0.00005);

  // Shadow meter loss when Megumi takes damage — hook into hp change
  // (handled via wrapper in main loop damage hooks)

  // === RABBIT ESCAPE PASSIVE ===
  if(f.megumiRabbitCD>0)f.megumiRabbitCD-=dt;
  if(enemy&&enemy.alive){
    const dToEnemy=Math.hypot(f.x-enemy.x,f.y-enemy.y);
    // Spawn rabbits when enemy gets close (within 100px)
    if(dToEnemy<100&&f.megumiRabbitCD<=0&&f.megumiRabbits.length<6){
      f.megumiRabbitCD=60; // 1 second cooldown
      for(let i=0;i<2;i++){
        const rAngle=Math.random()*Math.PI*2;
        f.megumiRabbits.push({
          x:f.x+Math.cos(rAngle)*30,
          y:f.y+Math.sin(rAngle)*30,
          hp:30,maxHp:30,
          moveAngle:rAngle,
          life:300, // 5 seconds max
        });
      }
      spawnBurst(f.x,f.y,'#ccccff',8,4);
      spawnDmgNum(f.x,f.y-f.radius-15,'RABBITS!','#ccccff',false);
    }
  }
  // Update rabbits
  for(let ri=f.megumiRabbits.length-1;ri>=0;ri--){
    const rb=f.megumiRabbits[ri];
    rb.life-=dt;
    // Rabbits scatter randomly (distractions)
    rb.moveAngle+=(Math.random()-0.5)*0.5;
    rb.x+=Math.cos(rb.moveAngle)*2.5*dt;
    rb.y+=Math.sin(rb.moveAngle)*2.5*dt;
    // Bounce off arena walls
    if(rb.x<ARENA.x+10||rb.x>ARENA.x+ARENA.w-10)rb.moveAngle=Math.PI-rb.moveAngle;
    if(rb.y<ARENA.y+10||rb.y>ARENA.y+ARENA.h-10)rb.moveAngle=-rb.moveAngle;
    rb.x=Math.max(ARENA.x+5,Math.min(ARENA.x+ARENA.w-5,rb.x));
    rb.y=Math.max(ARENA.y+5,Math.min(ARENA.y+ARENA.h-5,rb.y));
    // Enemy can kill rabbits by touching them
    if(enemy&&enemy.alive){
      const dRb=Math.hypot(rb.x-enemy.x,rb.y-enemy.y);
      if(dRb<enemy.radius+10){
        rb.hp-=enemy.atk*0.3*dt;
        if(rb.hp<=0){
          spawnBurst(rb.x,rb.y,'#ccccff',5,3);
          f.megumiRabbits.splice(ri,1);
          f.megumiRabbitKills++;
          // Punishment: every 5 rabbit kills, Megumi takes damage
          if(f.megumiRabbitKills>=5){
            f.megumiRabbitKills=0;
            const penalty=f.maxHp*0.05;
            f.hp-=penalty;
            spawnDmgNum(f.x,f.y-f.radius-20,'-'+Math.round(penalty),'#ff4444',true);
            spawnBurst(f.x,f.y,'#ff4444',8,4);
          }
          continue;
        }
      }
    }
    // Rabbits hit by enemy projectiles
    for(let pi=projectiles.length-1;pi>=0;pi--){
      const p=projectiles[pi];
      if(p&&p.owner&&p.owner.side!==f.side){
        const dp=Math.hypot(p.x-rb.x,p.y-rb.y);
        if(dp<12+p.radius){
          rb.hp-=p.dmg*0.5;
          projectiles.splice(pi,1);
          if(rb.hp<=0){
            spawnBurst(rb.x,rb.y,'#ccccff',5,3);
            f.megumiRabbits.splice(ri,1);
            f.megumiRabbitKills++;
            if(f.megumiRabbitKills>=5){
              f.megumiRabbitKills=0;
              const penalty=f.maxHp*0.05;
              f.hp-=penalty;
              spawnDmgNum(f.x,f.y-f.radius-20,'-'+Math.round(penalty),'#ff4444',true);
              spawnBurst(f.x,f.y,'#ff4444',8,4);
            }
            break;
          }
        }
      }
    }
    // Expire old rabbits
    if(rb.life<=0){
      f.megumiRabbits.splice(ri,1);
    }
  }

  // === DIVINE DOGS ===
  const dogs=[f.megumiDog1,f.megumiDog2];
  const anyDogAlive=f.megumiDog1.alive||f.megumiDog2.alive;
  for(const dog of dogs){
    if(!dog.alive)continue;
    // Initialize position near Megumi
    if(!dog.posInit){dog.x=f.x+rand(-30,30);dog.y=f.y+rand(-30,30);dog.posInit=true;}
    // Random movement — wander, hunt enemy
    dog.turnTimer-=dt;
    if(dog.turnTimer<=0){
      dog.moveAngle+=(Math.random()-0.5)*Math.PI*1.2;
      dog.turnTimer=30+Math.random()*50;
    }
    const dogSpd=3.0*dt;
    dog.x+=Math.cos(dog.moveAngle)*dogSpd;
    dog.y+=Math.sin(dog.moveAngle)*dogSpd;
    // Tether to Megumi (250px)
    const dToMeg=Math.hypot(dog.x-f.x,dog.y-f.y);
    if(dToMeg>250){
      dog.moveAngle=Math.atan2(f.y-dog.y,f.x-dog.x)+(Math.random()-0.5)*0.3;
      dog.x+=(f.x-dog.x)*0.03;dog.y+=(f.y-dog.y)*0.03;
    }
    // Hunt enemy
    if(enemy&&enemy.alive){
      const dToE=Math.hypot(dog.x-enemy.x,dog.y-enemy.y);
      if(dToE>enemy.radius+30){
        dog.moveAngle=Math.atan2(enemy.y-dog.y,enemy.x-dog.x)+(Math.random()-0.5)*0.2;
      }
    }
    // Bounce off walls
    if(dog.x<ARENA.x+15||dog.x>ARENA.x+ARENA.w-15)dog.moveAngle=Math.PI-dog.moveAngle;
    if(dog.y<ARENA.y+15||dog.y>ARENA.y+ARENA.h-15)dog.moveAngle=-dog.moveAngle;
    dog.x=Math.max(ARENA.x+10,Math.min(ARENA.x+ARENA.w-10,dog.x));
    dog.y=Math.max(ARENA.y+10,Math.min(ARENA.y+ARENA.h-10,dog.y));
    // Dog attacks enemy
    if(dog.atkCD>0)dog.atkCD-=dt;
    if(dog.atkCD<=0&&enemy&&enemy.alive){
      const dToE2=Math.hypot(dog.x-enemy.x,dog.y-enemy.y);
      const dogRange=f.megumiTotality?55:45;
      if(dToE2<enemy.radius+dogRange){
        dog.atkCD=f.megumiTotality?25:35;
        const dogDmg=f.atk*(f.megumiTotality?0.8:0.4);
        dealDamage(f,enemy,dogDmg,true);
        SFX.slash();
        spawnBurst(enemy.x,enemy.y,f.megumiTotality?'#2244aa':'#1a3a6a',8,4);
        spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,f.megumiTotality?'TOTALITY!':'DOG!',f.megumiTotality?'#4488ff':'#4466aa',false);
        // Shadow meter gain from dog attacks
        const gainMult2=(f._megumiMeterGainMult||1)*f.megumiMeterScaling;
        f.megumiShadowMeter=Math.min(12,f.megumiShadowMeter+0.2*gainMult2);
        megumiCheckShikigamiThresholds(f);
        // Knockback
        const ka=Math.atan2(enemy.y-dog.y,enemy.x-dog.x);
        enemy.vx+=Math.cos(ka)*2;enemy.vy+=Math.sin(ka)*2;
      }
    }
    // Dog takes damage from enemy body contact
    if(enemy&&enemy.alive){
      const dDE=Math.hypot(dog.x-enemy.x,dog.y-enemy.y);
      if(dDE<enemy.radius+20&&(!dog._bodyCD||dog._bodyCD<=0)){
        const dmgTaken=enemy.atk*0.35;
        dog.hp-=dmgTaken;
        dog._bodyCD=30;
        megumiMeterLoss(f,0.15);
        spawnBurst(dog.x,dog.y,'#ff4444',5,3);
        if(dog.hp<=0){dog.hp=0;dog.alive=false;megumiDogDied(f,dog);continue;}
      }
      if(dog._bodyCD>0)dog._bodyCD-=dt;
    }
    // Dog hit by projectiles
    for(let pi=projectiles.length-1;pi>=0;pi--){
      const p=projectiles[pi];
      if(p&&p.owner&&p.owner.side!==f.side){
        const dp=Math.hypot(p.x-dog.x,p.y-dog.y);
        if(dp<20+(p.radius||5)){
          dog.hp-=p.dmg*0.4;
          megumiMeterLoss(f,0.1);
          spawnBurst(dog.x,dog.y,p.color,4,3);
          projectiles.splice(pi,1);
          if(dog.hp<=0){dog.hp=0;dog.alive=false;megumiDogDied(f,dog);break;}
        }
      }
    }
  }

  // === ACTIVE SHIKIGAMI ACTIONS (outside domain) ===
  if(!f.megumiDomainActive&&f.megumiActiveShikigami&&enemy&&enemy.alive){
    f.megumiShikigamiCD-=dt;
    if(f.megumiShikigamiCD<=0){
      switch(f.megumiActiveShikigami){
        case 'nue':{
          // Nue: owl flies in, shocks enemy, flies away
          f.megumiShikigamiCD=70+Math.random()*20;
          const nueX=enemy.x+rand(-20,20);const nueY=enemy.y-80;
          projectiles.push({x:nueX,y:nueY,vx:0,vy:6,owner:f,target:null,color:'#44ccff',life:30,radius:8,dmg:f.atk*0.5,explosive:false,homing:false,isMegumiNue:true});
          spawnBurst(nueX,nueY,'#44ccff',10,4);
          spawnDmgNum(nueX,nueY-10,'NUE!','#44ccff',false);
          SFX.electricZap&&SFX.electricZap()||SFX.punch();
          break;
        }
        case 'toad':{
          // Toad: hold enemy (crowd control) + light damage
          f.megumiShikigamiCD=100+Math.random()*30;
          enemy.vx*=0.1;enemy.vy*=0.1;
          f.megumiToadTargetHeld=true;
          f.megumiToadHoldTimer=45; // hold for ~0.75s
          const toadDmg=f.atk*0.25;
          dealDamage(f,enemy,toadDmg,false);
          spawnBurst(enemy.x,enemy.y,'#44aa44',10,5);
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'TOAD!','#44aa44',false);
          break;
        }
        case 'serpent':{
          // Great Serpent: high damage single strike
          f.megumiShikigamiCD=80+Math.random()*25;
          const serpDmg=f.atk*1.3;
          dealDamage(f,enemy,serpDmg,true);
          spawnBurst(enemy.x,enemy.y,'#886644',15,7);
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'SERPENT!','#886644',true);
          const ka=Math.atan2(enemy.y-f.y,enemy.x-f.x);
          enemy.vx+=Math.cos(ka)*5;enemy.vy+=Math.sin(ka)*5;
          shakeTimer=Math.max(shakeTimer,4);shakeAmt=Math.max(shakeAmt,4);
          SFX.punch();
          break;
        }
        case 'elephant':{
          // Max Elephant: flood — AoE damage + knockback
          f.megumiShikigamiCD=130+Math.random()*30;
          const floodDmg=f.atk*0.8;
          dealDamage(f,enemy,floodDmg,false);
          const ka2=Math.atan2(enemy.y-f.y,enemy.x-f.x);
          enemy.vx+=Math.cos(ka2)*10;enemy.vy+=Math.sin(ka2)*10;
          spawnBurst(enemy.x,enemy.y,'#4488cc',25,12);
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'FLOOD!','#4488cc',true);
          shakeTimer=Math.max(shakeTimer,6);shakeAmt=Math.max(shakeAmt,6);
          SFX.megaExplosion();
          break;
        }
        case 'deer':{
          // Round Deer: heal Megumi (reverse cursed energy)
          f.megumiShikigamiCD=110+Math.random()*30;
          const healAmt=f.maxHp*0.08;
          f.hp=Math.min(f.maxHp,f.hp+healAmt);
          spawnBurst(f.x,f.y,'#88ee88',12,6);
          spawnDmgNum(f.x,f.y-f.radius-15,'+'+Math.round(healAmt),'#88ee88',false);
          break;
        }
      }
    }
    // Toad hold effect (slow enemy while held)
    if(f.megumiToadTargetHeld){
      f.megumiToadHoldTimer-=dt;
      if(enemy&&enemy.alive){enemy.vx*=0.85;enemy.vy*=0.85;}
      if(f.megumiToadHoldTimer<=0)f.megumiToadTargetHeld=false;
    }
  }

  // Shadow meter loss when Megumi takes damage — check hp delta
  if(!f._megumiLastHp)f._megumiLastHp=f.hp;
  if(f.hp<f._megumiLastHp){
    const lost=f._megumiLastHp-f.hp;
    megumiMeterLoss(f,lost/f.maxHp*2.0);
  }
  f._megumiLastHp=f.hp;
}

function megumiDogDied(f,deadDog){
  spawnDmgNum(deadDog.x,deadDog.y-20,'DOG DOWN!','#ff4444',true);
  spawnBurst(deadDog.x,deadDog.y,'#1a3a6a',15,6);
  // If one dog still alive, it becomes DIVINE DOG: TOTALITY
  const otherDog=(deadDog===f.megumiDog1)?f.megumiDog2:f.megumiDog1;
  if(otherDog.alive&&!f.megumiTotality){
    f.megumiTotality=true;
    otherDog.hp=Math.min(otherDog.maxHp*1.5,otherDog.hp+otherDog.maxHp*0.5);
    otherDog.maxHp=Math.round(otherDog.maxHp*1.5);
    spawnDmgNum(otherDog.x,otherDog.y-25,'TOTALITY!','#4488ff',true);
    spawnBurst(otherDog.x,otherDog.y,'#4488ff',20,8);
  }
}

function attackMahito(f,enemy,chaos){
  f.weaponExtend=1;f.weaponFlash=10;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*5;
  if(d>effectiveRange)return;

  f.mahitoHitCount++;
  const transfigureChance=f.mahitoDomainActive?1.0:(0.25+(f._mahitoTransfigureBonus||0));

  // Every 5th hit: blade arm morph — extended range, 1.4x dmg
  const isBladeArm=f.mahitoHitCount%5===0;
  if(isBladeArm){
    SFX.slash();
    const dmg=f.atk*1.4*(1+chaos*0.06)*(f.mahitoDomainActive?1.2:1.0);
    dealDamage(f,enemy,dmg,true);
    spawnBurst(enemy.x,enemy.y,'#3a7a7a',10,5);
    spawnDmgNum(enemy.x,enemy.y-20,'BLADE ARM!','#5a8a8a',false);
  } else {
    SFX.hit();
    const dmg=f.atk*(1+chaos*0.06)*(f.mahitoDomainActive?1.2:1.0);
    dealDamage(f,enemy,dmg,true);
    spawnBurst(enemy.x,enemy.y,'#5a8a8a',5,3);
  }

  // Transfigure chance
  let actualChance=transfigureChance;
  if(enemy.char.id==='yuji')actualChance*=0.5;
  if(!enemy.mahitoTransfiguredBy&&Math.random()<actualChance){
    enemy.mahitoTransfiguredBy=f;
    enemy.mahitoShrinkTimer=120;
    enemy.atk=Math.round(enemy.baseAtk*0.8);
    spawnDmgNum(enemy.x,enemy.y-30,'TRANSFIGURED!','#5a8a8a',false);
    SFX.transfigure();
    addLog((f.side===0?'P1':'P2')+' transfigures '+(enemy.side===0?'P1':'P2')+'!');
  }

  // Domain: heal 2% of damage dealt
  if(f.mahitoDomainActive){
    const healAmt=f.atk*0.02;
    f.hp=Math.min(f.maxHp,f.hp+healAmt);
  }

  // Knockback
  const ka=angle(f,enemy);
  enemy.vx+=Math.cos(ka)*1.5;enemy.vy+=Math.sin(ka)*1.5;
}

function relicYuki(f,enemy){

  f.yukiBHActive=true;
  f.yukiBHTimer=300; // 5 seconds
  f.yukiBHPos={x:(f.x+enemy.x)/2,y:(f.y+enemy.y)/2}; // between the two
  f.yukiBHPhase=0; // 0=expand, 1=orbit, 2=collapse
  f.yukiBHRadius=0;
  f.yukiSelfDmgApplied=false;

  // Garuda starts orbiting the black hole
  f.yukiGaruda.orbiting=false;

  f.yukiGaruda.x=f.yukiBHPos.x+80;
  f.yukiGaruda.y=f.yukiBHPos.y;
  f.yukiGaruda.angle=0;

  const isCryoElem=f.elementActive&&f.elem.id==='cryo';
  f._yukiBHMaxRadius=isCryoElem?160:130; // ice: bigger but slower pull
  f._yukiBHPullStrength=isCryoElem?2.5:4; // ice: weaker pull, more orbit time

  spawnBurst(f.yukiBHPos.x,f.yukiBHPos.y,'#cc3366',40,15);
  spawnBurst(f.yukiBHPos.x,f.yukiBHPos.y,'#220022',30,10);
  triggerScreenFlash('#cc3366',15);
  shakeTimer=20;shakeAmt=12;
  spawnDmgNum(f.x,f.y-f.radius-30,'STAR RAGE','#ff4488',true);

}

function updateRelicYuki(f,enemy,dt){
  if(!f.yukiBHActive)return;
  f.yukiBHTimer-=dt;
  const bh=f.yukiBHPos;
  const maxR=f._yukiBHMaxRadius||130;
  const pullStr=f._yukiBHPullStrength||4;

  // Phase transitions
  if(f.yukiBHPhase===0){
    // Expand
    f.yukiBHRadius=Math.min(maxR,f.yukiBHRadius+2*dt);
    if(f.yukiBHRadius>=maxR)f.yukiBHPhase=1;
  } else if(f.yukiBHPhase===1){
    // Orbit — Garuda circles the edge, pull enemies
    if(f.yukiBHTimer<=90)f.yukiBHPhase=2; // last 1.5s = collapse
  } else if(f.yukiBHPhase===2){
    // Collapse — radius shrinks, damage everything inside
    f.yukiBHRadius=Math.max(0,f.yukiBHRadius-3*dt);
  }

  // Garuda orbits the black hole edge
  f.yukiGaruda.angle+=0.06*dt;
  const orbitR=f.yukiBHPhase===2?f.yukiBHRadius:maxR+10;
  f.yukiGaruda.x=bh.x+Math.cos(f.yukiGaruda.angle)*orbitR;
  f.yukiGaruda.y=bh.y+Math.sin(f.yukiGaruda.angle)*orbitR;

  // Garuda damages enemy on close pass
  if(enemy.alive){
    const gd=Math.hypot(f.yukiGaruda.x-enemy.x,f.yukiGaruda.y-enemy.y);
    if(gd<25&&battleTime%8<1){
      dealDamage(f,enemy,f.atk*0.4,false);
      spawnBurst(enemy.x,enemy.y,'#ff4488',6,3);
    }
  }

  // Pull enemy toward center
  if(enemy.alive){
    const ed=Math.hypot(enemy.x-bh.x,enemy.y-bh.y);
    if(ed<f.yukiBHRadius+30){
      const pa=Math.atan2(bh.y-enemy.y,bh.x-enemy.x);
      const force=pullStr*(1-ed/(f.yukiBHRadius+30));
      enemy.vx+=Math.cos(pa)*force*dt*0.5;
      enemy.vy+=Math.sin(pa)*force*dt*0.5;
      // Damage while inside the pull zone
      if(battleTime%15<1){
        const bhDmg=f.atk*(f.yukiBHPhase===2?0.6:0.25);
        dealDamage(f,enemy,bhDmg,false);
        spawnBurst(enemy.x,enemy.y,'#cc3366',4,2);
      }
    }
  }

  // Visual particles — swirling inward
  if(battleTime%3<1){
    const pa=Math.random()*Math.PI*2;
    const pr=f.yukiBHRadius+20;
    spawnParticle(bh.x+Math.cos(pa)*pr,bh.y+Math.sin(pa)*pr,'#cc3366',
      Math.cos(pa+Math.PI)*2,Math.sin(pa+Math.PI)*2,30,2);
  }

  // Collapse phase: final damage burst
  if(f.yukiBHPhase===2&&f.yukiBHRadius<=5&&!f.yukiSelfDmgApplied){
    f.yukiSelfDmgApplied=true;
    // Big damage to enemy
    if(enemy.alive){
      const collapseDmg=f.atk*3;
      dealDamage(f,enemy,collapseDmg,true);
      spawnBurst(bh.x,bh.y,'#ff4488',40,15);
      spawnBurst(bh.x,bh.y,'#220022',30,10);
      SFX.megaExplosion();
      shakeTimer=25;shakeAmt=15;
      spawnDmgNum(bh.x,bh.y-30,'COLLAPSE!','#ff4488',true);
      triggerScreenFlash('#cc3366',12);
    }
    // Self-damage + reset mass meter
    f.hp-=f.maxHp*0.12;
    spawnDmgNum(f.x,f.y-f.radius-20,Math.round(f.maxHp*0.12),'#ff4488',false);
    f.yukiMass=0;
    f.yukiOverloaded=false;
  }

  // End special
  if(f.yukiBHTimer<=0||f.yukiBHRadius<=0){
    f.yukiBHActive=false;
    f.yukiBHPos=null;
    f.yukiGaruda.orbiting=true;
    f.yukiGaruda.thrown=false;
    f.speed=f.baseSpeed;
  }
}

function todoPerformSwap(f,targetX,targetY,swapTarget){
  // Swap positions
  const oldX=f.x,oldY=f.y;
  f.x=targetX;f.y=targetY;
  if(swapTarget&&swapTarget.alive){
    swapTarget.x=oldX;swapTarget.y=oldY;
  }

  // Visual effects
  SFX.todoClap();
  f.todoSwapAnim=20;
  f.todoSwapTarget=swapTarget;
  spawnBurst(f.x,f.y,'#dd7733',12,5);
  spawnBurst(oldX,oldY,'#ffcc44',12,5);
  spawnDmgNum(f.x,f.y-f.radius-20,'SWAP!','#ffcc44',false);

  const isFireElem=f.elementActive&&f.elem.id==='fire';
  const isToxicElem=f.elementActive&&f.elem.id==='toxic';
  const isCryoElem=f.elementActive&&f.elem.id==='cryo';

  // Stat buff to self + allies
  const buffMult=isFireElem?1.4:1.0;
  const buffDur=f.todoSpecialActive?(180+f.todoBuffStacks*15):(60*3); // 3-5s
  fighters.forEach(o=>{
    if(!o||!o.alive)return;
    if(o.side===f.side){
      // Buff allies (atk, speed, def, crit — NOT hp)
      o.atk=Math.min(o.atk*1.05*buffMult,o.char.stats.atk*2.5);
      o.speed=Math.min(o.speed*1.03,o.baseSpeed*2);
      o.def=Math.min(o.def+0.5*buffMult,o.char.stats.def*2);
    }
  });

  // Stat debuff to enemies
  const debuffMult=isToxicElem?1.5:1.0;
  fighters.forEach(o=>{
    if(!o||!o.alive||o.side===f.side)return;
    o.atk=Math.max(o.atk*0.95/debuffMult,o.char.stats.atk*0.3);
    o.speed=Math.max(o.speed*0.97,o.baseSpeed*0.4);
    o.def=Math.max(o.def-0.3*debuffMult,0);
  });

  // Ice: leave a paper at swap origin
  if(isCryoElem&&f.todoPapers){
    f.todoPapers.push({x:oldX,y:oldY,life:180});
  }

  // Choso vs Todo: swap near blood orbs scatters them away (repositions orbs)
  fighters.forEach(cf=>{
    if(!cf||!cf.alive||cf.char.id!=='choso'||!cf.chosoOrbs||cf.side===f.side)return;
    cf.chosoOrbs.forEach(orb=>{
      if(!orb.alive)return;
      const orbDist=Math.hypot(orb.x-f.x,orb.y-f.y);
      if(orbDist<80){
        // Scatter orb away from swap point
        const scatterAngle=Math.atan2(orb.y-f.y,orb.x-f.x);
        orb.x=Math.max(ARENA.x+10,Math.min(ARENA.x+ARENA.w-10,orb.x+Math.cos(scatterAngle)*60));
        orb.y=Math.max(ARENA.y+10,Math.min(ARENA.y+ARENA.h-10,orb.y+Math.sin(scatterAngle)*60));
        spawnBurst(orb.x,orb.y,'#8b0000',6,3);
        spawnDmgNum(orb.x,orb.y-15,'SCATTERED','#dd7733',false);
      }
    });
  });

  if(f.todoSpecialActive)f.todoBuffStacks++;
}

function updateRelicTodo(f,enemy,dt){
  if(f.todoPunchCD>0)f.todoPunchCD--;
  if(f.todoSwapAnim>0)f.todoSwapAnim-=dt;

  const isElecElem=f.elementActive&&f.elem.id==='electric';

  // Passive Boogie Woogie — rare clap to keep it special (main appeal is the special storm)
  if(f.todoSwapCD>0)f.todoSwapCD-=dt;
  // Blocked by Higuruma disable/confiscation
  if(!f.todoSpecialActive&&f.todoSwapCD<=0&&f.higurumaDisableTimer<=0){
    const fighterCount=fighters.filter(o=>o&&o.alive).length;
    const baseChance=isElecElem?0.004:0.002; // very rare passive swaps — special is the payoff
    const chance=baseChance*fighterCount;
    if(Math.random()<chance){
      // Pick random target to swap with
      const targets=fighters.filter(o=>o&&o!==f&&o.alive);
      if(targets.length>0){
        const t=targets[Math.floor(Math.random()*targets.length)];
        todoPerformSwap(f,t.x,t.y,t);
        f.todoSwapCD=Math.round(120*(f._todoSwapCDMult||1)); // 2 second cooldown, win buff reduces
      }
    }
  }

  // Special: Boogie Woogie Storm — constant swapping
  if(f.todoSpecialActive){
    f.todoSpecialTimer-=dt;
    if(f.todoSpecialSwapCD>0)f.todoSpecialSwapCD-=dt;

    // Storm particles
    if(battleTime%4<1){
      spawnParticle(f.x+(Math.random()-0.5)*40,f.y+(Math.random()-0.5)*40,'#ffcc44',0,-1.5,15,2);
    }

    // Constant swapping during storm
    if(f.todoSpecialSwapCD<=0){
      const swapInterval=isElecElem?18:25;
      f.todoSpecialSwapCD=swapInterval;

      // Collect all swap targets: fighters + papers
      const swapTargets=[];
      fighters.forEach(o=>{if(o&&o!==f&&o.alive)swapTargets.push({type:'fighter',obj:o,x:o.x,y:o.y});});
      f.todoPapers.forEach((p,pi)=>{if(p.life>0)swapTargets.push({type:'paper',idx:pi,x:p.x,y:p.y});});

      if(swapTargets.length>0){
        const t=swapTargets[Math.floor(Math.random()*swapTargets.length)];
        if(t.type==='fighter'){
          todoPerformSwap(f,t.x,t.y,t.obj);
        } else {
          // Swap with paper
          const oldX=f.x,oldY=f.y;
          f.x=t.x;f.y=t.y;
          f.todoPapers[t.idx].x=oldX;f.todoPapers[t.idx].y=oldY;
          f.todoSwapAnim=15;
          spawnBurst(f.x,f.y,'#ffcc44',8,3);
          spawnDmgNum(f.x,f.y-f.radius-15,'PAPER SWAP','#ffcc44',false);
          // Still apply buffs/debuffs
          const isFireElem=f.elementActive&&f.elem.id==='fire';
          const isToxicElem=f.elementActive&&f.elem.id==='toxic';
          const buffMult=isFireElem?1.4:1.0;
          const debuffMult=isToxicElem?1.5:1.0;
          fighters.forEach(o=>{
            if(!o||!o.alive)return;
            if(o.side===f.side){o.atk=Math.min(o.atk*1.03*buffMult,o.char.stats.atk*2.5);}
            else{o.atk=Math.max(o.atk*0.97/debuffMult,o.char.stats.atk*0.3);}
          });
          f.todoBuffStacks++;
        }
      }
    }

    // Tick paper life
    f.todoPapers.forEach(p=>{if(p.life>0)p.life-=dt;});
    f.todoPapers=f.todoPapers.filter(p=>p.life>0);

    // End storm when timer or all papers gone
    if(f.todoSpecialTimer<=0||f.todoPapers.length===0){
      f.todoSpecialActive=false;
      f.todoBuffTimer=360; // buffs last 6 more seconds then decay
      addLog((f.side===0?'P1':'P2')+' Boogie Woogie Storm ended!');
    }
  }

  // Post-special buff decay
  if(!f.todoSpecialActive&&f.todoBuffTimer>0){
    f.todoBuffTimer-=dt;
    if(f.todoBuffTimer<=0){
      // Reset stats to base
      fighters.forEach(o=>{
        if(!o||!o.alive)return;
        o.atk=o.char.stats.atk;o.speed=o.baseSpeed;o.def=o.char.stats.def;
      });
      f.todoBuffStacks=0;
    }
  }
}

function applyBleed(target,dmg,duration){

  addLog((target.side===0?'P1':'P2')+' BLEEDING!');
  spawnDmgNum(target.x,target.y-target.radius-25,'BLEED','#cc0000',false);
}

function applyCaptureWrap(target,duration){
  target.captureTimer=duration;
  target._capturedBy=null; // track who captured for proximity
  // Find the monowire that captured
  fighters.forEach(f=>{if(f&&f.alive&&f.char.id==='monowire'&&f.side!==target.side)target._capturedBy=f;});
  SFX.capture();
  addLog((target.side===0?'P1':'P2')+' CAPTURED!');
  spawnDmgNum(target.x,target.y-target.radius-25,'WRAPPED','#00ddff',false);
  spawnBurst(target.x,target.y,'#00aacc',15,5);
}

function applyQuickhack(attacker,target){
  // Pick a quickhack based on chances
  const roll=Math.random();
  let hack=QUICKHACKS[0]; // overheat default
  let cumulative=0;
  for(const qh of QUICKHACKS){
    cumulative+=qh.chance;
    if(roll<cumulative){hack=qh;break;}
  }
  // Start quickhack progress bar
  quickhackDisplay={fighter:attacker,target,progress:0,maxProgress:90,hack};
  SFX.quickhack();
  addLog((target.side===0?'P1':'P2')+' QUICKHACK: '+hack.name+'!');
}

function triggerQuickhack(qd){
  if(!qd||!qd.target.alive)return;
  const hack=qd.hack;
  const dmg=qd.fighter.atk*hack.dmgMult;

  // Screen flash black/red like blackwall for ALL quickhacks
  quickhackFlashTimer=25;
  quickhackFlashColor=hack.color;
  shakeTimer=15;shakeAmt=hack.id==='black_wall'?12:6;

  dealDamage(qd.fighter,qd.target,dmg,false);
  spawnDmgNum(qd.target.x,qd.target.y-qd.target.radius-30,hack.name,hack.color,true);

  switch(hack.id){
    case 'overheat':
      qd.target.burnTimer=180;qd.target.burnDmg=3;
      spawnBurst(qd.target.x,qd.target.y,'#ff4400',20,6);
      break;
    case 'short_circuit':
      qd.target.stunTimer=60;
      spawnBurst(qd.target.x,qd.target.y,'#ffcc00',25,7);
      for(let i=0;i<8;i++){
        const a=Math.PI*2*i/8;
        spawnParticle(qd.target.x,qd.target.y,'#ffff00',Math.cos(a)*5,Math.sin(a)*5,20,3);
      }
      break;
    case 'black_wall':
      spawnBurst(qd.target.x,qd.target.y,'#ff00ff',30,8);
      spawnBurst(qd.target.x,qd.target.y,'#000000',20,6);
      for(let r=0;r<3;r++){
        explosions.push({x:qd.target.x,y:qd.target.y,radius:0,maxRadius:50+r*30,color:'#ff00ff',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
      }
      break;
  }
  // Keep quickhackDisplay alive until flash finishes (cleared in drawBattle when quickhackFlashTimer hits 0)
}

// ============================================================
// ELEMENT EFFECTS — 16 unique weapon+element combos
// ============================================================
function applyElementEffect(attacker,defender){
  const wep=attacker.char.id;
  const elem=attacker.elem.id;
  const comboKey=wep+'_'+elem;

  switch(comboKey){
    // === MANTIS BLADES ===
    case 'mantis_fire':
      // Burn mark makes bleed do MORE damage
      defender.burnTimer=120;defender.burnDmg=2;
      if(defender.bleedTimer>0)defender.bleedDmg*=1.5; // boost active bleed
      attacker.mantisFireBurnBoost=true;
      spawnBurst(defender.x,defender.y,'#ff4400',5,2);
      break;
    case 'mantis_toxic':
      // Hit again before bleed timer expires = reapply bleed
      if(defender.bleedTimer>0){
        defender.bleedTimer=60;defender.bleedDmg+=attacker.atk*0.15;
        spawnDmgNum(defender.x,defender.y-defender.radius-20,'BLEED STACK','#aa44cc',false);
        spawnBurst(defender.x,defender.y,'#aa44cc',6,3);
      } else {
        applyBleed(defender,attacker.atk*0.25,50);
        spawnBurst(defender.x,defender.y,'#aa44cc',4,2);
      }
      break;
    case 'mantis_electric':
      // Hitting walls makes mantis move faster for a bit
      attacker.speed=attacker.baseSpeed*1.4;
      attacker.slowTimer=0; // clear any slow
      // Speed boost decays via element check in updateBattle (120 frames ~2s)
      attacker._elecSpeedBoost=120;
      spawnBurst(defender.x,defender.y,'#ffcc00',4,2);
      break;
    case 'mantis_cryo':
      // Every 2 hits, ice shards snap onto enemy making them slower
      attacker.mantisIceHitCount++;
      if(attacker.mantisIceHitCount>=2){
        attacker.mantisIceHitCount=0;
        defender.slowTimer=Math.max(defender.slowTimer,90);
        SFX.freeze();
        spawnDmgNum(defender.x,defender.y-defender.radius-20,'ICE SHARD','#77ddff',false);
        spawnBurst(defender.x,defender.y,'#77ddff',8,3);
        // Ice shard visual
        for(let i=0;i<6;i++){
          const a=Math.random()*Math.PI*2;
          spawnParticle(defender.x+Math.cos(a)*defender.radius,defender.y+Math.sin(a)*defender.radius,'#aaeeff',Math.cos(a)*-1,Math.sin(a)*-1,25,3);
        }
      } else {
        spawnBurst(defender.x,defender.y,'#77ddff',3,1);
      }
      break;

    // === PLS ===
    case 'pls_fire':
      // Explosions leave lingering fire zone matching explosion radius
      const plsFireR=(attacker.plsExplosionRadius||35)+getChaosLevel(attacker)*10;
      fireZones.push({x:defender.x,y:defender.y,radius:plsFireR*1.8,life:60,maxLife:60,owner:attacker,dmg:attacker.atk*0.3});
      spawnBurst(defender.x,defender.y,'#ff4400',10,5);
      SFX.burn();
      break;
    case 'pls_electric':
      // If hits wall, explodes TWICE — handled in projectile wall collision code
      // Here just add stun chance on direct hit
      if(Math.random()<0.15){defender.stunTimer=25;SFX.stun();spawnBurst(defender.x,defender.y,'#ffcc00',6,3);}
      spawnBurst(defender.x,defender.y,'#ffcc00',4,2);
      break;
    case 'pls_toxic':
      // Direct hit makes enemy move slower
      defender.slowTimer=Math.max(defender.slowTimer,75);
      spawnBurst(defender.x,defender.y,'#aa44cc',5,2);
      spawnDmgNum(defender.x,defender.y-defender.radius-15,'SLOWED','#aa44cc',false);
      break;
    case 'pls_cryo':
      // Vulnerability zone — enemies in area take MORE damage
      vulnZones.push({x:defender.x,y:defender.y,radius:35+getChaosLevel(attacker)*4,life:60,maxLife:60,owner:attacker});
      spawnBurst(defender.x,defender.y,'#77ddff',6,3);
      SFX.freeze();
      break;

    // === GORILLA ARMS ===
    case 'gorilla_fire':
      // Greatly increased knockback + enemies take damage if knocked into walls
      defender.burnTimer=60;defender.burnDmg=1.5;
      attacker.gorillaKnockbackMult=2.5;
      spawnBurst(defender.x,defender.y,'#ff4400',6,3);
      break;
    case 'gorilla_electric':
      // Slightly increases attack speed
      attacker.attackTimer=Math.max(0,attacker.attackTimer-8);
      spawnBurst(defender.x,defender.y,'#ffcc00',4,2);
      break;
    case 'gorilla_toxic':
      // Leaves poison bubbles on enemy — wall collisions deal extra damage
      poisonBubbles.push({x:defender.x,y:defender.y,life:180,maxLife:180,target:defender,owner:attacker,dmg:attacker.atk*0.4});
      spawnBurst(defender.x,defender.y,'#aa44cc',5,2);
      break;
    case 'gorilla_cryo':
      // Greatly reduces knockback so enemy stays close, easier to hit
      attacker.gorillaKnockbackMult=0.3;
      defender.slowTimer=Math.max(defender.slowTimer,45);
      spawnBurst(defender.x,defender.y,'#77ddff',4,2);
      break;

    // === MONOWIRE ===
    case 'monowire_fire':
      // Wraps twirl enemies — damage if they collide with walls
      defender.burnTimer=90;defender.burnDmg=2;
      // Spin the enemy — make them bounce around
      defender.vx+=(Math.random()-0.5)*6;defender.vy+=(Math.random()-0.5)*6;
      defender.spinSpeed=(Math.random()-0.5)*0.3;
      spawnBurst(defender.x,defender.y,'#ff4400',5,3);
      break;
    case 'monowire_electric':
      // Short circuits enemy — their attacks have a small chance to miss
      defender.missChance=Math.min(0.35,defender.missChance+0.1);
      spawnBurst(defender.x,defender.y,'#ffcc00',5,2);
      spawnDmgNum(defender.x,defender.y-defender.radius-15,'SHORT CIRCUIT','#ffcc00',false);
      break;
    case 'monowire_toxic':
      // Longer enemy is wrapped, more damage they take
      if(defender.captureTimer>0){
        defender.monowireWrapDmgAccum+=attacker.atk*0.2;
        spawnBurst(defender.x,defender.y,'#aa44cc',4,2);
      }
      defender.defReduction=Math.min(8,defender.defReduction+2);
      defender.defReductionTimer=120;
      spawnBurst(defender.x,defender.y,'#aa44cc',3,2);
      break;
    case 'monowire_cryo':
      // Slowed enemies have higher chance of getting wrapped/captured
      defender.slowTimer=Math.max(defender.slowTimer,60);
      spawnBurst(defender.x,defender.y,'#77ddff',4,2);
      // Capture chance boost handled in attackMonowire when enemy is slowed
      break;

    // === SANDEVISTAN ===
    case 'sandy_fire':
      // Fire trail — handled in updateBattle physics
      defender.burnTimer=90;defender.burnDmg=2.5;
      spawnBurst(defender.x,defender.y,'#ff4400',8,3);
      break;
    case 'sandy_electric':
      // Rotating orbs hit enemies — handled in updateBattle
      if(Math.random()<0.25){defender.stunTimer=25;SFX.stun();}
      spawnBurst(defender.x,defender.y,'#ffcc00',6,3);
      break;
    case 'sandy_toxic':
      // Wall bounce = poison scatter — handled in physics
      defender.defReduction=Math.min(8,defender.defReduction+3);
      defender.defReductionTimer=120;
      spawnBurst(defender.x,defender.y,'#aa44cc',6,3);
      break;
    case 'sandy_cryo':
      // Faster speed = more slow — handled in attackSandy
      spawnBurst(defender.x,defender.y,'#77ddff',6,3);
      break;

    // === THROWING WEAPONS ===
    case 'throw_fire':
      // Faster aim & throw — reduce attack timer
      attacker.attackTimer=Math.max(0,attacker.attackTimer-15);
      spawnBurst(defender.x,defender.y,'#ff4400',5,3);
      break;
    case 'throw_electric':
      // Auto-return handled in projectile miss logic
      spawnBurst(defender.x,defender.y,'#ffcc00',5,2);
      break;
    case 'throw_toxic':
      // Phantom dagger from opposite side — VISIBLE with trail
      if(Math.random()<0.35){
        const oa=angle(attacker,defender)+Math.PI;
        const phantomDmg=attacker.atk*attacker.throwWeapons[attacker.throwActiveIdx].dmgMult*0.08;
        projectiles.push({
          x:defender.x+Math.cos(oa)*150,y:defender.y+Math.sin(oa)*150,
          vx:-Math.cos(oa)*10,vy:-Math.sin(oa)*10,
          owner:attacker,target:defender,color:'#dd55ee',life:60,radius:10,
          dmg:phantomDmg,explosive:false,explosionRadius:0,homing:false,isPhantom:true,
        });
        // Visible spawn flash
        spawnBurst(defender.x+Math.cos(oa)*150,defender.y+Math.sin(oa)*150,'#dd55ee',8,4);
        spawnDmgNum(defender.x+Math.cos(oa)*120,defender.y+Math.sin(oa)*120,'PHANTOM','#dd55ee',false);
      }
      break;
    case 'throw_cryo':
      // Missed weapons spin on ground — handled in projectile miss logic
      spawnBurst(defender.x,defender.y,'#77ddff',5,3);
      break;

    // === KATANA ===
    case 'katana_fire':
      // Deflect explosions — handled in deflect logic (dealDamage)
      defender.burnTimer=90;defender.burnDmg=2.5;
      spawnBurst(defender.x,defender.y,'#ff4400',6,3);
      break;
    case 'katana_electric':
      // Faster relic rush — handled in relic update
      if(Math.random()<0.2){defender.stunTimer=25;SFX.stun();}
      spawnBurst(defender.x,defender.y,'#ffcc00',5,2);
      break;
    case 'katana_toxic':
      // Slight homing pull toward katana on hit
      {const pullAngle=angle(defender,attacker);
      defender.vx+=Math.cos(pullAngle)*1.5;defender.vy+=Math.sin(pullAngle)*1.5;}
      defender.defReduction=Math.min(6,defender.defReduction+2);
      defender.defReductionTimer=90;
      spawnBurst(defender.x,defender.y,'#aa44cc',5,3);
      break;
    case 'katana_cryo':
      // Ice wall — handled in deflect logic (dealDamage)
      defender.slowTimer=Math.max(defender.slowTimer,60);
      spawnBurst(defender.x,defender.y,'#77ddff',5,2);
      break;

    // === BERSERK ===
    case 'berserk_fire':
      // Faster pellets + tighter spread — handled in attackBerserk
      defender.burnTimer=60;defender.burnDmg=1.5;
      spawnBurst(defender.x,defender.y,'#ff4400',5,2);
      break;
    case 'berserk_electric':
      // Pellets return after hitting — handled in projectile hit code
      if(Math.random()<0.15){defender.stunTimer=20;SFX.stun();}
      spawnBurst(defender.x,defender.y,'#ffcc00',4,2);
      break;
    case 'berserk_toxic':
      // Slight pull toward berserk
      {const pullA=angle(defender,attacker);
      defender.vx+=Math.cos(pullA)*1.2;defender.vy+=Math.sin(pullA)*1.2;}
      spawnBurst(defender.x,defender.y,'#aa44cc',5,3);
      break;
    case 'berserk_cryo':
      // Slow lingering — handled by making pellets last longer in attackBerserk
      defender.slowTimer=Math.max(defender.slowTimer,75);
      spawnBurst(defender.x,defender.y,'#77ddff',5,3);
      break;

    // Fallback: generic element effects
    default:
      switch(attacker.elem.id){
        case 'fire':defender.burnTimer=120;defender.burnDmg=2;spawnBurst(defender.x,defender.y,'#ff4400',4,2);break;
        case 'electric':if(Math.random()<0.2){defender.stunTimer=30;SFX.stun();spawnBurst(defender.x,defender.y,'#ffcc00',8,3);}break;
        case 'toxic':defender.defReduction=4;defender.defReductionTimer=180;spawnBurst(defender.x,defender.y,'#aa44cc',4,2);break;
        case 'cryo':defender.slowTimer=90;if(Math.random()<0.12){defender.freezeTimer=45;SFX.freeze();spawnBurst(defender.x,defender.y,'#77ddff',10,3);}break;
      }
  }
}

function relicMantis(f,enemy){
  // MB Relic: pull back blades → homing dash → high bleed chance — DRAMATIC
  f.specialTimer=120;
  f.relicDashing=false;
  f.relicDashTarget=enemy;
  f.relicDashTimer=50; // 50 frames charge (longer charge-up), then dash

  // Dramatic pull-back — big reverse + blade glow burst
  f.vx*=-0.8;f.vy*=-0.8;
  spawnBurst(f.x,f.y,'#ff3333',20,5);
  spawnBurst(f.x,f.y,'#ffcc00',10,4);
  shakeTimer=10;shakeAmt=6;
  // Ring of blade particles
  for(let i=0;i<16;i++){
    const a=Math.PI*2*i/16;
    spawnParticle(f.x+Math.cos(a)*f.radius*1.5,f.y+Math.sin(a)*f.radius*1.5,'#ff6644',Math.cos(a)*-2,Math.sin(a)*-2,20,3);
  }
}

function relicGorilla(f,enemy){
  // GA Relic: thunder clap shockwaves for 5-7 seconds
  f.specialTimer=360; // 6 seconds
  f.relicShockwaveTimer=0;
  f.relicShockwaveCount=0;
  spawnBurst(f.x,f.y,'#ff8800',25,8);
  // Fists up animation
  for(let i=0;i<20;i++){
    const a=Math.PI*2*i/20;
    spawnParticle(f.x,f.y-f.radius,'#ffcc00',Math.cos(a)*3,Math.sin(a)*3-2,25,3);
  }
}

function relicMonowire(f,enemy){
  // MW Relic: BB-8 whip spin + capture → quickhack
  f.specialTimer=180; // 3 seconds spin
  f.relicWhipSpinTimer=180;
  spawnBurst(f.x,f.y,'#00ddff',20,6);
}

function relicPLS(f,enemy){
  // PLS Relic: smart lock → brief charge → 10 rapid homing shots in ~1-2 sec
  f.specialTimer=120;
  f.relicLockTarget=enemy;
  f.relicChargeTimer=30; // brief charge-up (~0.5 sec)
  f.relicHomingShots=10;
  // Targeting reticle visual starts — big lock-on announcement
  spawnBurst(f.x,f.y,'#33cc33',20,6);
  spawnBurst(enemy.x,enemy.y,'#ff3333',15,5);
  addLog((f.side===0?'P1':'P2')+' PLS LOCK ON!');
  SFX.relicActivate();
}

function relicSandy(f,enemy){
  // Sandevistan: slow enemy time 75%, +30% dodge, speed boost, afterimage trail
  const sandyDur=Math.round(360*(f._sandyDurationMult||1));
  f.specialTimer=sandyDur; // ~6 seconds base, win buff extends
  f.sandyActive=true;
  f.sandyTimer=sandyDur;
  f.sandyDodgeBoost=0.18; // +18% dodge
  // Slow ALL other fighters (enemies AND teammates) — only Sandy-immune fighters resist
  fighters.forEach(other=>{
    if(other&&other.alive&&other!==f){
      if(!other._smasherSandyImmune&&!other.sandyActive){
        other.sandyTimeScale=0.25; // 75% slow
      }
    }
  });
  // Speed boost
  f.speed=f.baseSpeed*1.5;
  const spd=Math.hypot(f.vx,f.vy);
  if(spd>0){f.vx=f.vx/spd*f.speed*2;f.vy=f.vy/spd*f.speed*2;}
  // Ticking clock SFX — time dilation effect (fast→slow)
  SFX.sandyTickSequence();
  f._sandyTickCD=0; // periodic tick during active
  // MASSIVE blue activation burst — very obvious
  spawnBurst(f.x,f.y,'#4488ff',50,12);
  spawnBurst(f.x,f.y,'#88bbff',35,9);
  spawnBurst(f.x,f.y,'#aaccff',25,7);
  spawnBurst(f.x,f.y,'#ffffff',15,5);
  // Blue shockwave rings
  for(let r=0;r<3;r++){
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:60+r*30,color:'#4488ff',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
  }
  shakeTimer=25;shakeAmt=14;
}

function relicThrow(f,enemy){
  // Optical Camo: invisible, faster, auto-throw constantly, dodge boost
  f.specialTimer=420; // 7 seconds
  f.throwCamoActive=true;
  f.throwCamoTimer=420;
  f.dodgeChance=0.25;
  f.speed=f.baseSpeed*1.6;
  // Return all weapons immediately
  f.throwWeapons.forEach(tw=>{tw.available=true;tw.returnCD=0;});
  f.throwActiveIdx=0;
  spawnBurst(f.x,f.y,'#cc66ff',40,10);
  spawnBurst(f.x,f.y,'#ffffff',20,6);
  for(let r=0;r<2;r++){
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:50+r*25,color:'#cc66ff',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
  }
  shakeTimer=20;shakeAmt=10;
}

function relicKatana(f,enemy){
  // Katana Relic: slow mantis-blade-like approach → single devastating slash at end
  f.specialTimer=300; // ~5 seconds
  f.katanaRushing=true;
  f.katanaRushTimer=300;
  f.katanaRushDeflects=0;

  spawnBurst(f.x,f.y,'#ff6644',40,10);
  spawnBurst(f.x,f.y,'#ffcc00',25,7);
  spawnBurst(f.x,f.y,'#ffffff',15,5);
  for(let r=0;r<2;r++){
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:50+r*25,color:'#ff6644',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
  }
  shakeTimer=20;shakeAmt=12;
  SFX.judgementCut();
  addLog((f.side===0?'P1':'P2')+' Relic Activated!');
}

function relicBerserk(f,enemy){
  // Berserk Mode: invincible, fast reload, red glow, 4 seconds
  f.specialTimer=Math.round(240*(f._berserkDurationMult||1));
  f.berserkInvincible=true;
  f.berserkReloadTimer=0; // instant reload
  f.speed=f.baseSpeed*1.4+f.berserkSpeedBoost;
  // MASSIVE red activation — very obvious
  spawnBurst(f.x,f.y,'#dd2222',50,12);

function relicHiguruma(f,enemy){

  const isCryo=f.elementActive&&f.elem.id==='cryo';

  // Roll outcome — 3 tiers
  const roll=Math.random();
  let outcome;
  if(roll<0.55){
    outcome='confiscate'; // highest chance: waste enemy special charge
  } else if(roll<0.88){
    outcome='disable'; // medium: enemy can't attack, only move
  } else {
    outcome='execute'; // lowest: Executioner Sword (massive dmg)
  }
  f.higurumaSentenceOutcome=outcome;

  SFX.sentencing();
  showRelicText('DEADLY SENTENCING',f.char.color);
  // Domain background flash
  triggerScreenFlash('#5a3a7a',15);
  shakeTimer=20;shakeAmt=10;

  fighters.forEach(ff=>{if(ff&&ff.alive)ff.stunTimer=Math.max(ff.stunTimer,90);});
  // Show punishment verdict prominently after short delay
  const verdictLabel=outcome==='confiscate'?'VERDICT: CONFISCATION':outcome==='disable'?'VERDICT: ATTACK DISABLED':'VERDICT: EXECUTION';
  const verdictColor=outcome==='confiscate'?'#ffcc00':outcome==='disable'?'#ff6666':'#ff0000';
  f.higurumaVerdictLabel=verdictLabel;
  f.higurumaVerdictColor=verdictColor;
  f.higurumaVerdictShow=90; // show for 1.5s
  setTimeout(()=>{
    if(enemy&&enemy.alive)spawnDmgNum(enemy.x,enemy.y-enemy.radius-45,verdictLabel,verdictColor,true);

  // Apply sentence after brief delay (handled in updateRelicHiguruma)
  f.higurumaSwordActive=false;
  f.higurumaSwordTimer=90; // 1.5s delay before sentence (matches pause)
  f.higurumaSwordTarget=enemy;
}

function updateRelicMantis(f,enemy,dt){
  if(f.relicDashTimer>0){
    f.relicDashTimer-=dt;
    // Pull-back phase — blades glow
    f.weaponFlash=10;
    spawnParticle(f.x+rand(-5,5),f.y+rand(-5,5),'#ff3333',0,0,10,2);
    if(f.relicDashTimer<=0){
      // Launch dash!
      f.relicDashing=true;
      SFX.dashHit();
    }
  }
  if(f.relicDashing&&enemy.alive){
    const d=dist(f,enemy);
    f.weaponAngle=angle(f,enemy);
    f.weaponExtend=1;f.weaponFlash=5;
    // Trail particles
    spawnParticle(f.x,f.y,'#ff6644',(-f.vx)*0.3,(-f.vy)*0.3,15,3);
    spawnParticle(f.x,f.y,'#ff0000',0,0,8,2);
    if(d<f.radius+enemy.radius+15){
      // DRAMATIC IMPACT!
      f.relicDashing=false;
      const dmg=dealDamage(f,enemy,f.atk*3.5,true);
      // Very high bleed chance on relic dash
      if(enemy.alive&&Math.random()<0.8){
        applyBleed(enemy,f.atk*0.7,120);
      }
      shakeTimer=25;shakeAmt=14;
      // Massive slash cross visual
      spawnBurst(enemy.x,enemy.y,'#ff0000',35,8);
      spawnBurst(enemy.x,enemy.y,'#ffcc00',20,6);
      spawnBurst(enemy.x,enemy.y,'#ffffff',10,4);
      // X-slash particle lines
      for(let i=0;i<20;i++){
        const t=i/20;
        spawnParticle(lerp(enemy.x-40,enemy.x+40,t),lerp(enemy.y-40,enemy.y+40,t),'#ff4444',0,0,18,2);
        spawnParticle(lerp(enemy.x+40,enemy.x-40,t),lerp(enemy.y-40,enemy.y+40,t),'#ff4444',0,0,18,2);
      }
      explosions.push({x:enemy.x,y:enemy.y,radius:0,maxRadius:80,color:'#ff3333',life:18,maxLife:18,dmg:0,owner:null,target:null,hit:true});
      f.specialTimer=0;f.specialActive=false;
      // Scatter away after hit
      const ka=angle(enemy,f);
      f.vx=Math.cos(ka)*8;f.vy=Math.sin(ka)*8;
    }
  }
}

function updateRelicGorilla(f,enemy,dt){
  f.relicShockwaveTimer-=dt;

    f.relicShockwaveCount++;
    SFX.thunderclap();
    // Punch in weapon facing direction — launch directional shockwave (NOT homing)
    const swAngle=f.weaponAngle;
    const swSpeed=6;
    const swSize=30+f.relicShockwaveCount*5;
    shockwaveProjectiles.push({
      x:f.x+Math.cos(swAngle)*f.radius,
      y:f.y+Math.sin(swAngle)*f.radius,
      vx:Math.cos(swAngle)*swSpeed,
      vy:Math.sin(swAngle)*swSpeed,
      owner:f,target:enemy,
      size:swSize,dmg:f.atk*1.2,
      life:60,maxLife:60,hit:false,
      color:'#ffaa00',
    });
    // Visual: shockwave ring at punch origin
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:swSize,color:'#ffaa00',life:12,maxLife:12,dmg:0,owner:f,target:null,hit:true});
    spawnBurst(f.x,f.y,'#ff8800',12,5);
    shakeTimer=8;shakeAmt=6;
    f.weaponExtend=1;f.weaponFlash=15;
  }
}

      f.specialTimer=0;f.specialActive=false;

}

function updateRelicSandy(f,enemy,dt){
  f.sandyTimer-=dt;
  // Periodic ticking clock SFX — slows as Sandevistan winds down
  if(!f._sandyTickCD)f._sandyTickCD=0;
  f._sandyTickCD-=dt;
  if(f._sandyTickCD<=0){
    const ratio=f.sandyTimer/360; // 1=start, 0=end
    const pitch=900+ratio*500; // higher pitch at start, lower as it winds down
    SFX.sandyTick(pitch);
    f._sandyTickCD=12+Math.floor((1-ratio)*25); // fast ticks early, slower later
  }
  // Afterimage trail — spawn ghostly copies
  if(battleTime%3<1){
    sandyAfterimages.push({x:f.x,y:f.y,radius:f.radius,rotation:f.rotation,color:f.char.color,life:45,maxLife:45});
  }
  // Blue glow particles
  if(battleTime%2<1){
    const a=Math.random()*Math.PI*2;
    spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#4488ff',Math.cos(a)*1.5,Math.sin(a)*1.5,15,3);
  }
  // Speed-based damage when hitting — handled by attackSandy already
  // Sandy+fire: leave fire trail
  if(f.elementActive&&f.elem.id==='fire'&&battleTime%4<1){
    fireTrails.push({x:f.x,y:f.y,life:90,maxLife:90,radius:14,owner:f,dmg:f.atk*0.15});
  }
  // Sandy+electric: rotating orbs
  if(f.elementActive&&f.elem.id==='electric'){
    f.sandyOrbAngle+=0.12*dt;
    // Check orb hits
    for(let oi=0;oi<2;oi++){
      const oa=f.sandyOrbAngle+oi*Math.PI;
      const ox=f.x+Math.cos(oa)*55,oy=f.y+Math.sin(oa)*55;
      if(enemy.alive&&dist({x:ox,y:oy},enemy)<enemy.radius+8&&battleTime%10<1){
        dealDamage(f,enemy,f.atk*0.4,false);
        spawnBurst(ox,oy,'#ffcc00',6,3);
      }
    }
  }
  // End of Sandevistan
  if(f.sandyTimer<=0){
    f.sandyActive=false;
    f.sandyDodgeBoost=0;
    f.speed=f.baseSpeed;
    // Restore time scale for all fighters slowed by this Sandy
    fighters.forEach(other=>{
      if(other&&other!==f&&other.sandyTimeScale<1){
        // Only restore if no OTHER active Sandy is still slowing them
        const otherSandy=fighters.find(s=>s&&s!==f&&s.alive&&s.sandyActive&&s!==other);
        if(!otherSandy)other.sandyTimeScale=1;
      }
    });
    f.specialTimer=0;f.specialActive=false;
    addLog((f.side===0?'P1':'P2')+' Sandevistan ended');
    spawnBurst(f.x,f.y,'#4488ff',10,4);
  }
}

function updateRelicThrow(f,enemy,dt){

function updateRelicKatana(f,enemy,dt){
  f.katanaRushTimer-=dt;
  const d=enemy.alive?dist(f,enemy):999;
  // Slow steady approach toward enemy while deflecting (like slow mantis blade)
  if(enemy.alive){
    const a=angle(f,enemy);
    const rushSpeed=f.elementActive&&f.elem.id==='electric'?2.2:1.2; // lightning = faster rush
    f.vx=lerp(f.vx,Math.cos(a)*rushSpeed,0.08);
    f.vy=lerp(f.vy,Math.sin(a)*rushSpeed,0.08);
    // Face enemy with blade forward
    f.weaponAngle=a;
    f.weaponExtend=0.8;
    // Deflect glow trail — ominous slow approach
    if(battleTime%3<1){
      spawnParticle(f.x+rand(-8,8),f.y+rand(-8,8),'#ff6644',0,0,12,2);
      spawnParticle(f.x+rand(-8,8),f.y+rand(-8,8),'#ffcc00',0,0,8,1.5);
    }
    // Blade charge glow intensifies as closer
    if(d<150&&battleTime%2<1){
      spawnParticle(f.x+rand(-5,5),f.y+rand(-5,5),'#ffffff',0,-0.5,10,1.5);
    }
  }
  // Deliver single slash when close enough OR timer runs out
  if((d<f.radius+enemy.radius+25&&enemy.alive)||f.katanaRushTimer<=0||!enemy.alive){
    f.katanaRushing=false;
    if(enemy.alive){
      // Single devastating slash — like mantis blade finisher but slower build-up
      const baseDmg=f.atk*1.8; // nerfed further
      const mult=1+f.katanaRushDeflects*0.3; // reduced bonus from deflects during rush
      const totalDmg=baseDmg*mult;
      dealDamage(f,enemy,totalDmg,true);
      SFX.katanaSlash();SFX.crit();
      // MASSIVE X-slash visual (like mantis blade special)
      spawnBurst(enemy.x,enemy.y,'#ff6644',40,12);
      spawnBurst(enemy.x,enemy.y,'#ffcc00',25,8);
      spawnBurst(enemy.x,enemy.y,'#ffffff',15,5);
      // X-slash lines
      for(let i=0;i<20;i++){
        const t=i/20;
        spawnParticle(lerp(enemy.x-60,enemy.x+60,t),lerp(enemy.y-60,enemy.y+60,t),'#ff6644',0,0,20,2.5);
        spawnParticle(lerp(enemy.x+60,enemy.x-60,t),lerp(enemy.y-60,enemy.y+60,t),'#ff6644',0,0,20,2.5);
      }
      explosions.push({x:enemy.x,y:enemy.y,radius:0,maxRadius:100,color:'#ff6644',life:25,maxLife:25,dmg:0,owner:null,target:null,hit:true});
      shakeTimer=30;shakeAmt=18;
      if(f.katanaRushDeflects>0){
        spawnDmgNum(enemy.x,enemy.y-enemy.radius-25,'x'+mult.toFixed(1)+'!','#ffcc00',true);
      }
      SFX.judgementCut();
      triggerScreenFlash('#4466cc',15);
      addLog((f.side===0?'P1':'P2')+' JUDGEMENT CUT!');
      // Bounce away after slash
      const ka=angle(enemy,f);
      f.vx=Math.cos(ka)*8;f.vy=Math.sin(ka)*8;
    }
    f.specialTimer=0;f.specialActive=false;
  }
}

        Math.cos(pa+Math.PI)*3,Math.sin(pa+Math.PI)*3,20,3);

    // Geometric shapes in background (drawn in drawBattle)

      if(lowestHP){

          x:f.x+Math.cos(ba)*f.radius,y:f.y+Math.sin(ba)*f.radius,
          vx:Math.cos(ba)*12,vy:Math.sin(ba)*12,

          life:80,radius:35,dmg:beamDmg,
