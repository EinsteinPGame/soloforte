function getTierNum(charId){return TIER_MAP[charId]||1;}
// Sponsor rules (Kyle sync #141 — updated 2026-07-22):
// C tier (1-2): can call sponsors from all C (1-2) + B- (3)
// B tier (3-5): can call sponsors from all B (3-5) + A- (6)
// A tier (6-8): can call sponsors from all A (6-8) only
// S tier (9+): NO sponsors at all
// Sponsor cannot already be in the arena
// Lore combos: specific canon pairs with cutscene attacks (follow same tier rules)
// Ally combos (future 2v2/boss): allies ult at same time → special cutscene

// Sponsor state
let sponsorCutsceneActive=false;
let sponsorCutsceneTimer=0;
let sponsorCutsceneData=null; // {combo, caller, target, phase}

function findLoreCombo(charId){
  return LORE_COMBOS.find(c=>c.pair.includes(charId));
}
function getLoreSponsor(charId){
  const combo=findLoreCombo(charId);
  if(!combo)return null;
  return combo.pair.find(id=>id!==charId);
}
// Sponsor tier range: returns {min,max} tier numbers the caller can sponsor from, or null if no sponsors
function getSponsorRange(callerTier){
  if(callerTier>=9)return null; // S tier+ = no sponsors
  if(callerTier>=6)return {min:6,max:8}; // A tier = all A only
  if(callerTier>=3)return {min:3,max:6}; // B tier = all B + A-
  return {min:1,max:3}; // C tier = all C + B-
}
function getEligibleSponsors(callerCharId,excludeIds){
  // Returns array of CHARS indices eligible as sponsors for this char
  const callerTier=getTierNum(callerCharId);
  if(callerTier>=9)return []; // S tier+ = no sponsors
  const range=getSponsorRange(callerTier);
  if(!range)return [];
  const exclude=new Set(excludeIds||[]);
  exclude.add(callerCharId);
  const eligible=[];
  CHARS.forEach((ch,i)=>{
    if(ch.isBoss)return; // bosses can't be sponsors
    if(exclude.has(ch.id))return;
    const t=getTierNum(ch.id);
    if(t>=range.min&&t<=range.max)eligible.push(i);
  });
  return eligible;
}
function canCallSponsor(callerCharId,enemyCharId,sponsorCharId){
  // sponsorCharId = the selected sponsor's id (from fighter.selectedSponsor)
  if(!sponsorCharId)return false;
  const callerTier=getTierNum(callerCharId);
  // S tier+ cannot call sponsors
  if(callerTier>=9)return false;
  // Sponsor must be within allowed tier range
  const range=getSponsorRange(callerTier);
  if(!range)return false;
  const sponsorTier=getTierNum(sponsorCharId);
  if(sponsorTier<range.min||sponsorTier>range.max)return false;
  // Sponsor cannot be in the arena (check all fighters)
  const inArena=fighters.some(f=>f&&f.alive&&f.char.id===sponsorCharId);
  if(inArena)return false;
  return true;
}

function triggerSponsorCutscene(caller,enemy){
  if(sponsorCutsceneActive)return;
  const combo=findLoreCombo(caller.char.id);
  const sponsorId=caller.selectedSponsor;
  const sponsorChar=CHARS.find(c=>c.id===sponsorId);
  if(!sponsorChar)return;
  const isLore=combo&&combo.pair.includes(sponsorId);
  sponsorCutsceneActive=true;
  const frames=isLore?combo.cutsceneFrames:60; // 1 second for generic
  sponsorCutsceneTimer=frames;
  sponsorCutsceneData={
    combo:isLore?combo:null,
    isLore,
    sponsorChar,
    caller,target:enemy,phase:0,hitDelivered:false,
    totalFrames:frames,
    color1:isLore?combo.color1:sponsorChar.color,
    color2:isLore?combo.color2:caller.char.color,
    dmgMult:isLore?combo.dmgMult:1.8,
    name:isLore?'LORE COMBO!':'SPONSOR: '+sponsorChar.name,
  };
  fighters.forEach(f=>{if(f)f._preSponsorVx=f.vx;f._preSponsorVy=f.vy;f.vx=0;f.vy=0;});
  SFX.relicActivate();
  triggerScreenFlash('#ffffff',isLore?12:8);
  shakeTimer=isLore?20:12;shakeAmt=isLore?10:6;
  addLog(isLore?'LORE COMBO!':'SPONSOR ASSIST: '+sponsorCutsceneData.name+'!');
}

function updateSponsorCutscene(dt){
  if(!sponsorCutsceneActive||!sponsorCutsceneData)return;
  const sd=sponsorCutsceneData;
  sponsorCutsceneTimer-=dt;
  const progress=1-(sponsorCutsceneTimer/sd.totalFrames);
  if(progress>=0.7&&!sd.hitDelivered&&sd.target&&sd.target.alive){
    sd.hitDelivered=true;
    const dmg=sd.caller.atk*sd.dmgMult;
    dealDamage(sd.caller,sd.target,dmg,false);
    triggerScreenFlash(sd.color1,sd.isLore?10:6);
    shakeTimer=sd.isLore?25:15;shakeAmt=sd.isLore?15:8;
    triggerHitFreeze(sd.isLore?8:4);
    spawnBurst(sd.target.x,sd.target.y,sd.color1,sd.isLore?25:15,sd.isLore?10:6);
    spawnBurst(sd.target.x,sd.target.y,sd.color2,sd.isLore?20:12,sd.isLore?8:5);
    if(sd.isLore)spawnBurst(sd.target.x,sd.target.y,'#ffffff',15,6);

    spawnDmgNum(sd.target.x,sd.target.y-sd.target.radius-45,sd.name,sd.color1,true);
    SFX.explode();
  }
  if(sponsorCutsceneTimer<=0){
    sponsorCutsceneActive=false;
    sponsorCutsceneData=null;
    fighters.forEach(f=>{if(f&&f._preSponsorVx!==undefined){f.vx=f._preSponsorVx;f.vy=f._preSponsorVy;}});
  }
}

function drawSponsorCutscene(){
  if(!sponsorCutsceneActive||!sponsorCutsceneData)return;
  const sd=sponsorCutsceneData;
  const progress=1-(sponsorCutsceneTimer/sd.totalFrames);
  // Dark overlay
  X.fillStyle='rgba(0,0,0,'+(0.5*Math.min(1,progress*3))+')';
  X.fillRect(0,0,W,H);
  X.save();
  X.font='bold '+(isMobile?16:20)+'px Consolas,monospace';X.textAlign='center';
  const textAlpha=progress<0.15?progress/0.15:progress>0.85?(1-progress)/0.15:1;
  X.globalAlpha=textAlpha;
  // Name with glow
  X.shadowColor=sd.color1;X.shadowBlur=20;
  X.fillStyle=sd.color1;
  X.fillText(sd.isLore?(sd.combo.franchise+' LORE COMBO!'):'SPONSOR: '+sd.sponsorChar.name,W/2,H/2-40);
  X.shadowBlur=0;
  // Tag
  X.font=(isMobile?10:12)+'px Consolas,monospace';
  X.fillStyle='#888';
  X.fillText(sd.isLore?sd.combo.desc:'SPONSOR ASSIST',W/2,H/2-20);
  X.globalAlpha=1;
  // Animated sponsor character silhouette
  const sc=sd.sponsorChar;
  if(sc&&progress>0.2&&progress<0.9){
    const enterProgress=Math.min(1,(progress-0.2)/0.3);
    const sx=sd.caller.side===0?W+40-enterProgress*120:enterProgress*120-40;
    const sy=H/2+20;
    X.globalAlpha=enterProgress*0.9;
    const sg=X.createRadialGradient(sx,sy,5,sx,sy,30);
    sg.addColorStop(0,sc.color);sg.addColorStop(0.6,sc.color+'88');sg.addColorStop(1,'transparent');
    X.fillStyle=sg;X.beginPath();X.arc(sx,sy,30,0,Math.PI*2);X.fill();
    X.font='bold 10px Consolas,monospace';X.textAlign='center';
    X.fillStyle=sc.color;
    X.fillText(sc.name,sx,sy-35);
    X.globalAlpha=1;
  }
  // Attack lines at impact
  if(progress>=0.65&&progress<=0.8){
    const impactAlpha=(progress-0.65)/0.15;
    X.globalAlpha=impactAlpha;
    const lineCount=sd.isLore?12:8;
    for(let i=0;i<lineCount;i++){
      const a=Math.PI*2*i/lineCount;
      const r1=120-impactAlpha*80;
      const r2=20;
      X.strokeStyle=i%2===0?sd.color1:sd.color2;X.lineWidth=sd.isLore?3:2;
      X.beginPath();
      X.moveTo(sd.target.x+Math.cos(a)*r1,sd.target.y+Math.sin(a)*r1);
      X.lineTo(sd.target.x+Math.cos(a)*r2,sd.target.y+Math.sin(a)*r2);
      X.stroke();
    }
    X.globalAlpha=1;
  }
  X.restore();
}

function applyWinBuffToFighter(f){

  // Apply the buff once for each round won (stacks)
  for(let i=0;i<count;i++)buff.apply(f);
}

function spawnParticle(x,y,color,vx,vy,life,size){particles.push({x,y,color,vx:vx||0,vy:vy||0,life:life||30,maxLife:life||30,size:size||3})}
function spawnBurst(x,y,color,count,spread){for(let i=0;i<(count||8);i++){const a=Math.random()*Math.PI*2;const s=(spread||3)*Math.random();spawnParticle(x,y,color,Math.cos(a)*s,Math.sin(a)*s,20+rand(0,15),2+Math.random()*3)}}
function spawnDmgNum(x,y,val,color,isCrit){dmgNums.push({x,y,val:typeof val==='string'?val:Math.round(val),color:color||'#fff',isCrit:isCrit||false,life:50,vy:-2})}
function addLog(msg){battleLog.unshift(msg);if(battleLog.length>6)battleLog.pop()}
function spawnSparks(x,y,color,count){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2;spawnParticle(x,y,color,Math.cos(a)*(2+Math.random()*3),Math.sin(a)*(2+Math.random()*3),10+rand(0,10),1+Math.random()*2)}}
function spawnExplosion(x,y,radius,color,dmg,owner,target){
  radius=radius||30; // safety default
  const bigR=radius*1.8; // explosions are MASSIVE
  explosions.push({x,y,radius:0,maxRadius:bigR,color,life:35,maxLife:35,dmg,owner,target,hit:false});
  SFX.megaExplosion();
  spawnBurst(x,y,color,45,12);
  spawnBurst(x,y,'#ffcc00',25,9);
  spawnBurst(x,y,'#ffffff',18,7);
  spawnBurst(x,y,'#ff8800',20,8);
  // Double shockwave rings
  for(let i=0;i<20;i++){const a=Math.PI*2*i/20;spawnParticle(x,y,color,Math.cos(a)*7,Math.sin(a)*7,22,5);}
  for(let i=0;i<12;i++){const a=Math.PI*2*i/12;spawnParticle(x,y,'#ffaa00',Math.cos(a)*5,Math.sin(a)*5,16,3);}
  // Second delayed shockwave
  explosions.push({x,y,radius:0,maxRadius:bigR*0.7,color:'#ffcc00',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
  shakeTimer=Math.max(shakeTimer,18);shakeAmt=Math.max(shakeAmt,bigR/3);
  triggerScreenFlash(color,8);triggerHitFreeze(3);
}

function spawnImpact(x,y,color,intensity){
  const count=Math.floor(12*intensity);
  spawnBurst(x,y,color,count,3+intensity*3);
  spawnBurst(x,y,'#ffffff',Math.floor(count/3),2+intensity*2);
  if(intensity>1.5){
    // Shockwave ring
    for(let i=0;i<12;i++){const a=Math.PI*2*i/12;spawnParticle(x,y,color,Math.cos(a)*4*intensity,Math.sin(a)*4*intensity,16,3);}
  }
}

    // Show "BACK TO BACK!!" above, keep both relic names visible
    relicTextSub=relicText; // previous relic text becomes sub-line
    relicTextSubTimer=150;relicTextSubColor=relicTextColor;
    relicText='BACK TO BACK!!';relicTextTimer=150;relicTextColor='#ffcc00';
    shakeTimer=20;shakeAmt=10;
    SFX.relicActivate();SFX.special();
    return;
  }
  relicText=text;relicTextTimer=150;relicTextColor=color;
  SFX.relicActivate();
  triggerScreenFlash(color,12);triggerHitFreeze(6);
}

// ============================================================
// CHAOS SCALING — hits + low HP = faster attacks + bigger effects
// ============================================================
function getChaosLevel(f){
  const hitChaos=f.totalHits*0.03;
  const hpRatio=1-f.hp/f.maxHp;
  const hpChaos=Math.max(0,hpRatio)*2.5;
  return Math.min(hitChaos+hpChaos,8); // cap at 8x
}

function getAttackInterval(f){
  const chaos=getChaosLevel(f);
  const base=f.char.baseAtkInterval;
  // Win buff attack interval multipliers
  const winMult=f._mechaAtkIntervalMult||f._mantisAtkIntervalMult||f._katanaAtkIntervalMult||1;
  // Katana: minimal scaling — stays at roughly base interval
  if(f.char.id==='katana')return Math.max(20,(base*winMult)/(1+chaos*0.1));
  // Berserk: fixed interval like PLS — scaling affects pellets/spread, not fire rate
  if(f.char.id==='berserk')return base*winMult;
  // Gojo: chaos = faster attack charge (his main scaling)
  if(f.char.id==='gojo')return Math.max(15,(base*winMult)/(1+chaos*0.4));
  return Math.max(4, (base*winMult)/(1+chaos*0.5));
}

// ============================================================
// PHYSICS — Random bouncing
// ============================================================
function updatePhysics(f,dt){
  if(!f.alive)return;
  let spdMult=1;
  if(f.sandyTimeScale<1)spdMult*=f.sandyTimeScale; // Sandevistan slow
  if(f.stunTimer>0)spdMult=0.15;
  if(f.freezeTimer>0)spdMult=0.08;
  if(f.projectionFrozenTimer>0)spdMult=0; // Naoya projection frame lock
  if(f.chosoPiercingFreeze>0)spdMult=0; // Choso frozen while aiming
  if(f.mechaMouthBlastActive)spdMult=0; // Mechamaru frozen while firing mouth blast
  if(f.kashimoAmberActive)spdMult=0; // Kashimo frozen during AMBER charge
  if(f.mahoSlamActive)spdMult=0; // Mahoraga frozen during slam
  if(f.mahoShinjukuAnim>0)spdMult=0; // Mahoraga frozen during Shinjuku transition
  if(f.dabPhaseTransition>0)spdMult=0; // Dabura frozen during phase transition
  if(f.dabDashing)spdMult=0; // Dabura movement handled by dash logic
  if(f.slowTimer>0)spdMult*=0.55;
  if(f.captureTimer>0)spdMult=0.05; // nearly immobile when captured

  // Monowire stays near captured enemy
  if(f.char.id==='monowire'){
    const enemy=fighters[1-f.side];
    if(enemy&&enemy.captureTimer>0&&enemy._capturedBy===f){
      const d=dist(f,enemy);
      if(d>100){
        const a=angle(f,enemy);
        f.vx+=Math.cos(a)*0.5;f.vy+=Math.sin(a)*0.5;
      }
    }
  }

  // Relic dash override
  if(f.relicDashing&&f.relicDashTarget){
    const t=f.relicDashTarget;
    const a=angle(f,t);
    f.vx=Math.cos(a)*12;
    f.vy=Math.sin(a)*12;
    spdMult=1;
  }

  f.x+=f.vx*spdMult*dt;
  f.y+=f.vy*spdMult*dt;

  let bounced=false;
  if(f.x-f.radius<ARENA.x){f.x=ARENA.x+f.radius;f.vx=Math.abs(f.vx)+(Math.random()-0.5)*0.8;bounced=true;}
  if(f.x+f.radius>ARENA.x+ARENA.w){f.x=ARENA.x+ARENA.w-f.radius;f.vx=-Math.abs(f.vx)+(Math.random()-0.5)*0.8;bounced=true;}
  if(f.y-f.radius<ARENA.y){f.y=ARENA.y+f.radius;f.vy=Math.abs(f.vy)+(Math.random()-0.5)*0.8;bounced=true;}
  if(f.y+f.radius>ARENA.y+ARENA.h){f.y=ARENA.y+ARENA.h-f.radius;f.vy=-Math.abs(f.vy)+(Math.random()-0.5)*0.8;bounced=true;}
  if(bounced){
    // Keep spin direction on wall bounce — only add slight variation, don't reverse
    f.spinSpeed+=((Math.random()-0.5)*0.03);
    SFX.wallBounce();
    spawnSparks(f.x,f.y,'#555',3);
    // Sandy+toxic: wall bounce shoots poison orbs in all directions
    if(f.char.id==='sandy'&&f.elementActive&&f.elem.id==='toxic'){
      for(let i=0;i<8;i++){
        const pa=Math.PI*2*i/8;
        projectiles.push({
          x:f.x+Math.cos(pa)*f.radius,y:f.y+Math.sin(pa)*f.radius,
          vx:Math.cos(pa)*4,vy:Math.sin(pa)*4,
          owner:f,target:null,color:'#aa44cc',life:40,radius:5,
          dmg:f.atk*0.25,explosive:false,homing:false,
        });
      }
      spawnBurst(f.x,f.y,'#aa44cc',12,5);
    }
  }

  if(Math.random()<0.03){f.vx+=(Math.random()-0.5)*1.2;f.vy+=(Math.random()-0.5)*1.2;}

  const spd=Math.hypot(f.vx,f.vy);
  const targetSpd=2.5+f.speed*0.5;
  if(spd<targetSpd*0.6){const boost=targetSpd*0.8/Math.max(spd,0.1);f.vx*=boost;f.vy*=boost;}
  else if(spd>targetSpd*1.8){const damp=targetSpd*1.4/spd;f.vx*=damp;f.vy*=damp;}

  const turnScale=f.sandyTimeScale<1?f.sandyTimeScale:1;
  f.rotation+=f.spinSpeed*dt*turnScale;
  f.weaponAngle+=f.spinSpeed*dt*turnScale;
  // Weapons always at full length — no mysterious extending/retracting
  f.weaponExtend=1;
  if(f.weaponFlash>0)f.weaponFlash-=dt;
  if(f.attackAnim>0)f.attackAnim-=dt;
}

// ============================================================
// BALL COLLISION — Elastic bounce + weapon deflect
// ============================================================
function checkBallCollision(f1,f2){
  if(!f1.alive||!f2.alive)return;
  const d=dist(f1,f2);
  const minD=f1.radius+f2.radius;
  if(d>=minD)return;

  const overlap=minD-d;
  const nx=(f2.x-f1.x)/(d||1);
  const ny=(f2.y-f1.y)/(d||1);
  f1.x-=nx*overlap*0.5;f1.y-=ny*overlap*0.5;
  f2.x+=nx*overlap*0.5;f2.y+=ny*overlap*0.5;

  // Elastic collision
  const dvx=f1.vx-f2.vx,dvy=f1.vy-f2.vy;
  const dot=dvx*nx+dvy*ny;
  f1.vx-=dot*nx*0.8;f1.vy-=dot*ny*0.8;
  f2.vx+=dot*nx*0.8;f2.vy+=dot*ny*0.8;
  f1.vx+=(Math.random()-0.5)*2;f1.vy+=(Math.random()-0.5)*2;
  f2.vx+=(Math.random()-0.5)*2;f2.vy+=(Math.random()-0.5)*2;

  f1.spinSpeed=(Math.random()-0.5)*0.22;
  f2.spinSpeed=(Math.random()-0.5)*0.22;

  // Weapon deflect visuals — keep natural spin angle, don't snap to enemy
  f1.weaponExtend=1;f2.weaponExtend=1;
  f1.weaponFlash=15;f2.weaponFlash=15;

  const mx=(f1.x+f2.x)/2,my=(f1.y+f2.y)/2;
  spawnBurst(mx,my,'#ffffff',10,5);
  spawnBurst(mx,my,f1.char.color,6,3);
  spawnBurst(mx,my,f2.char.color,6,3);
  spawnSparks(mx,my,'#ffcc00',6); // weapon deflect sparks
  shakeTimer=8;shakeAmt=5;
  SFX.clash();

  // Sandevistan deals body collision damage (speed-based) — with cooldown to prevent corner stunlock
  [f1,f2].forEach(sandy=>{
    if(sandy.char.id!=='sandy')return;
    if(sandy._bodyHitCD>0)return; // cooldown prevents rapid corner bouncing
    const enemy=sandy===f1?f2:f1;
    const spd=Math.hypot(sandy.vx,sandy.vy);
    const spdDmg=sandy.atk*(0.4+spd*0.25);
    dealDamage(sandy,enemy,spdDmg);
    sandy._bodyHitCD=18; // ~0.3 sec cooldown between body hits
    SFX.punch();
    spawnBurst(mx,my,'#4488ff',12,5);
    shakeTimer=Math.max(shakeTimer,8);shakeAmt=Math.max(shakeAmt,5);
    // Sandy bounces away after body hit
    const ka=angle(enemy,sandy);
    sandy.vx=Math.cos(ka)*7;sandy.vy=Math.sin(ka)*7;
  });
  // Non-sandy body collision: no damage
}

// ============================================================
// DAMAGE SYSTEM
// ============================================================
function dealDamage(attacker,defender,baseDmg,canCrit){
  if(!defender.alive)return 0;
  // Mechamaru transition i-frames — invulnerable during form switch
  if(defender.mechaTransitionAnim>0)return 0;
  // Naoya transition i-frames — invulnerable during cursed spirit transformation
  if(defender.naoyaTransitionTimer>0)return 0;
  // Gojo revival invulnerability — no damage in or out during float-up
  if(attacker.gojoReviving||defender.gojoReviving)return 0;
  // Captured enemies cannot damage the monowire that captured them
  if(attacker.captureTimer>0&&defender===attacker._capturedBy)return 0;
  if(canCrit===undefined)canCrit=true;
  // Dodge check (Sandevistan)
  const totalDodge=defender.dodgeChance+defender.sandyDodgeBoost;
  if(totalDodge>0&&Math.random()<totalDodge){
    spawnDmgNum(defender.x,defender.y-defender.radius-15,'DODGE','#4488ff',true);
    spawnBurst(defender.x,defender.y,'#4488ff',8,4);
    return 0;
  }
  // Gojo Infinity — absorbs attacks, deals 0 damage. Specials + Executioner Sword bypass.
  if(defender.char.id==='gojo'&&defender.gojoInfinityCharges>0
    &&defender.captureTimer<=0&&defender.stunTimer<=0&&defender.freezeTimer<=0
    &&!(attacker.specialActive)&&!(attacker.higurumaSwordActive)
    &&!defender.tojiEnemyDebuff){
    // Dabura vs Gojo: light attacks partially penetrate Infinity (30% damage bleeds through)
    if(attacker.char.id==='dabura'&&attacker.dabLightMode){
      defender.gojoInfinityCharges--;
      const bleedDmg=Math.round(baseDmg*0.3);
      spawnDmgNum(defender.x,defender.y-defender.radius-15,'LIGHT PIERCE','#ffcc44',true);
      spawnBurst(defender.x,defender.y,'#ffcc44',8,4);
      spawnBurst(defender.x,defender.y,'#8888ff',5,2);
      defender.specialBar=Math.min(defender.specialMax,defender.specialBar+2*(defender.char.relicChargeRate||1));
      return bleedDmg;
    }
    defender.gojoInfinityCharges--;
    spawnDmgNum(defender.x,defender.y-defender.radius-15,'INFINITY','#8888ff',true);
    spawnBurst(defender.x,defender.y,'#8888ff',10,4);
    spawnBurst(defender.x,defender.y,'#ffffff',5,2);
    // Attacks slow down and deflect away visually
    const ka=angle(defender,attacker);
    attacker.vx+=Math.cos(ka)*3;attacker.vy+=Math.sin(ka)*3;
    defender.specialBar=Math.min(defender.specialMax,defender.specialBar+3*(defender.char.relicChargeRate||1));
    return 0;
  }

  // Katana deflect — deflects from ALL directions. Only specials bypass.
  // No deflect during counter-dash (unless relic rushing). After counter-dash: 1s of 80% dmg reduction.
  if(defender.char.id==='katana'
    &&defender.captureTimer<=0&&defender.stunTimer<=0&&defender.freezeTimer<=0
    &&!(attacker.specialActive)
    &&(!defender.katanaDashing||defender.katanaRushing)
    &&!defender.tojiEnemyDebuff
    &&defender.higurumaDisableTimer<=0){
    // Post counter-dash cooldown (1 second): 80% damage reduction, no full deflect
    if(defender.katanaPostDashTimer>0){
      const isCrit=canCrit&&Math.random()*100<attacker.crit;
      let earlyDmg=baseDmg*(isCrit?2:1);
      const actualDef=Math.max(0,defender.def-defender.defReduction);
      earlyDmg=Math.max(1,earlyDmg-actualDef*0.3);
      earlyDmg=Math.round(earlyDmg*0.2); // 80% reduction
      defender.hp-=earlyDmg;defender.hitFlash=6;
      spawnDmgNum(defender.x,defender.y-defender.radius-15,earlyDmg,'#ffaa00');
      spawnBurst(defender.x,defender.y,'#ffcc00',8,3);
      if(defender.hp<=0){defender.hp=0;defender.alive=false;defender.deathAnim=60;checkVictory(attacker);}
      // Ice wall on post-dash hits: only every 3rd deflect (cooldown-based)
      if(defender.elementActive&&defender.elem.id==='cryo'&&(defender.katanaIceWallCD||0)<=0){
        const behindAngle=angle(defender,attacker);
        iceWalls.push({x:attacker.x+Math.cos(behindAngle)*60,y:attacker.y+Math.sin(behindAngle)*60,
          angle:behindAngle,life:120,maxLife:120,owner:defender});
        defender.katanaIceWallCD=90; // ~1.5s cooldown between ice walls
        SFX.freeze();
      }
      return earlyDmg;
    }
    // Full deflect — no damage, counter-dash
    SFX.katanaDeflect();
    defender.katanaDeflecting=40; // 40 frame deflect pose — very obvious
    // Big golden burst on defender
    spawnBurst(defender.x,defender.y,'#ffcc00',25,8);
    spawnBurst(defender.x,defender.y,'#ffffff',15,5);
    spawnSparks(defender.x,defender.y,'#ffcc00',15);
    spawnDmgNum(defender.x,defender.y-defender.radius-25,'DEFLECTED','#ffcc00',true);
    shakeTimer=Math.max(shakeTimer,8);shakeAmt=Math.max(shakeAmt,5);
    defender.specialBar=Math.min(defender.specialMax,defender.specialBar+12*(defender.char.relicChargeRate||1));
    defender.katanaDeflectCount++;
    if(!defender.katanaRushing&&!defender.katanaDashing){
      defender.katanaDashing=true;
      defender.katanaDashTimer=90; // max 1.5s dash before auto-cancel
      defender.katanaDashTarget=attacker;
    }
    if(defender.elementActive&&defender.elem.id==='fire'){
      spawnExplosion(attacker.x,attacker.y,40,'#ff4400',defender.atk*0.5,defender,attacker);
      attacker.hp-=defender.atk*0.5;attacker.hitFlash=8;
      if(attacker.hp<=0){attacker.hp=0;attacker.alive=false;attacker.deathAnim=60;checkVictory(defender);}
    }
    // Ice wall on full deflect: cooldown-based, not every single deflect
    if(defender.elementActive&&defender.elem.id==='cryo'&&(defender.katanaIceWallCD||0)<=0){
      const behindAngle=angle(defender,attacker);
      iceWalls.push({x:attacker.x+Math.cos(behindAngle)*60,y:attacker.y+Math.sin(behindAngle)*60,
        angle:behindAngle,life:120,maxLife:120,owner:defender});
      defender.katanaIceWallCD=90; // ~1.5s cooldown between ice walls
      SFX.freeze();
    }
    if(defender.katanaRushing)defender.katanaRushDeflects++;
    return 0;
  }
  // Berserk invincible during relic
  if(defender.berserkInvincible){
    spawnDmgNum(defender.x,defender.y-defender.radius-15,'INVINCIBLE','#dd2222',true);
    spawnBurst(defender.x,defender.y,'#dd2222',4,2);
    return 0;
  }

  const isCrit=canCrit&&Math.random()*100<attacker.crit;
  let dmg=baseDmg*(isCrit?2:1);
  const actualDef=Math.max(0,defender.def-defender.defReduction);
  dmg=Math.max(1,dmg-actualDef*0.3);

  // Chaos scaling: more damage at higher chaos — very aggressive
  const chaos=getChaosLevel(attacker);
  // Katana: no chaos damage scaling (early powerhouse, falls off late)
  if(attacker.char.id!=='katana')dmg*=(1+chaos*0.15);

  if(attacker.elementActive&&attacker.elem.id!=='none')applyElementEffect(attacker,defender);
  // Choso Flowing Red Scale: 20% damage reduction (disabled by Toji Inverted Spear)
  if(defender.chosoRedScaleActive&&!defender.tojiDmgTakenDebuff)dmg*=0.8;
  // Mechamaru Ultimate Shield: 50% damage reduction
  if(defender.mechaUltShield)dmg*=0.5;
  // Mechamaru cryo+shield: slow attacker on hit
  if(defender.mechaUltShield&&defender.elementActive&&defender.elem.id==='cryo'){
    attacker.slowTimer=Math.max(attacker.slowTimer,60);
  }
  // Toji Split Soul Katana: +10% damage taken
  if(defender.tojiDmgTakenDebuff)dmg*=1.1;
  // Yuji Cryo: takes more damage (glass cannon)
  if(defender.char&&defender.char.id==='yuji'&&defender.yujiIceDmgMult>1)dmg*=defender.yujiIceDmgMult;
  // Mahoraga Negation Shield — blocks ALL damage while active
  if(defender.char.id==='mahoraga'&&defender.mahoNegationActive){
    spawnDmgNum(defender.x,defender.y-defender.radius-15,'NEGATED','#00ffaa',true);
    spawnBurst(defender.x,defender.y,'#00ffaa',8,4);
    return 0;
  }
  // Mahoraga Adaptation Wheel — stacking damage reduction per attack type
  // Blocked by Higuruma confiscation (higurumaDisableTimer > 0)
  if(defender.char.id==='mahoraga'&&!defender.mahoShinjuku&&defender.higurumaDisableTimer<=0){
    const atkType=attacker.char.id; // adapt per character type
    if(!defender.mahoAdapt[atkType])defender.mahoAdapt[atkType]=0;
    const reduction=Math.min(defender.mahoAdaptMax,defender.mahoAdapt[atkType]*defender.mahoAdaptPerStack);
    if(reduction>0){
      dmg*=(1-reduction);
      dmg=Math.max(dmg,attacker.atk*0.15); // minimum 15% of base ATK always gets through
      if(reduction>=0.5){
        spawnDmgNum(defender.x+rand(-10,10),defender.y-defender.radius-25,'ADAPTED','#00ff88',false);
      }
    }
    // Increment adaptation stacks for this attack type
    defender.mahoAdapt[atkType]++;
    defender.mahoWheelAnim=30; // spin wheel visual
    defender.mahoLastAdaptType=atkType;
    defender.mahoAdaptPulse=15;
  } else if(defender.char.id==='mahoraga'&&defender.higurumaDisableTimer>0){
    // Confiscation blocks adaptation — show it
    if(battleTime%30<2)spawnDmgNum(defender.x+rand(-10,10),defender.y-defender.radius-25,'ADAPT BLOCKED','#ffcc00',false);
  }
  // Mahoraga Shinjuku mode — attacker bypasses ALL defender defenses (already applied above via reduced def)
  if(attacker.char.id==='mahoraga'&&attacker.mahoShinjuku){
    dmg*=1.5; // 50% more damage in Shinjuku mode
  }
  // Dabura Karaba — elemental damage modifiers + darkness self-damage
  if(attacker.char.id==='dabura'&&attacker.elementActive){
    const eId=attacker.elem.id;
    if(eId==='fire'){dmg*=attacker.dabLightMode?1.3:0.8;} // fire: light+/dark-
    else if(eId==='toxic'){dmg*=attacker.dabLightMode?0.8:1.3;} // toxic: opposite fire
    else if(eId==='electric'){dmg*=0.85;} // lightning: less damage
  }
  // Dabura darkness mode: more base damage but self-damage on dark attacks
  if(attacker.char.id==='dabura'&&attacker.dabDarkFlip){
    dmg*=1.25; // darkness mode = more damage overall
  }
  defender.hp-=dmg;
  defender.hitFlash=8;
  attacker.totalHits++;
  // Berserk: speed boost on taking damage
  if(defender.char.id==='berserk'&&defender.alive){
    defender.berserkSpeedBoost=Math.min(3,defender.berserkSpeedBoost+0.3);
    defender.speed=defender.baseSpeed+defender.berserkSpeedBoost;
  }

  if(isCrit){SFX.critSlash();spawnImpact(defender.x,defender.y,'#ffff00',2);addLog((attacker.side===0?'P1':'P2')+' CRIT! '+Math.round(dmg));triggerHitFreeze(6);triggerScreenFlash('#ff8800',8);spawnBurst(defender.x,defender.y,'#ff8800',12,5);spawnSparks(defender.x,defender.y,'#ffaa00',8);}
  spawnDmgNum(defender.x+rand(-15,15),defender.y-defender.radius-10,dmg,isCrit?'#ffff00':'#fff',isCrit);
  spawnImpact(defender.x,defender.y,attacker.char.color,dmg>30?1.5:0.8);
  addCombo(attacker.side);
  trackDamageBar(defender,defender.hp+dmg);

  if(attacker.side===0){battleStats.p1Hits++;battleStats.p1Dmg+=dmg;if(isCrit)battleStats.p1Crits++;}
  else{battleStats.p2Hits++;battleStats.p2Dmg+=dmg;if(isCrit)battleStats.p2Crits++;}

  const atkChargeRate=attacker.char.isBoss?0.06:1; // bosses charge ults WAY slower from dealing damage
  attacker.specialBar=Math.min(attacker.specialMax,attacker.specialBar+(6+Math.random()*2)*(attacker.char.relicChargeRate||1)*atkChargeRate);
  defender.specialBar=Math.min(defender.specialMax,defender.specialBar+(2+Math.random())*(defender.char.relicChargeRate||1));

  if(dmg>20){shakeTimer=Math.max(shakeTimer,6);shakeAmt=Math.max(shakeAmt,dmg>40?8:4);}
  if(dmg>50){SFX.heavyHit();triggerHitFreeze(3);triggerScreenFlash(attacker.char.color,6);}
  if(dmg>80){triggerHitFreeze(5);triggerScreenFlash('#ffffff',10);}

  if(defender.hp<=0){
    // Gojo revival — first death triggers awakened state
    if(defender.char.id==='gojo'&&!defender.gojoRevived){
      defender.hp=1;defender.gojoRevived=true;defender.gojoReviving=true;defender.gojoReviveTimer=120;
      defender.stunTimer=0;defender.freezeTimer=0;defender.projectionFrozenTimer=0;defender.captureTimer=0;
      SFX.gojoRevive();
      showRelicText('I ALONE AM THE HONOURED ONE',defender.char.color);
      spawnBurst(defender.x,defender.y,'#8888ff',40,10);
      spawnBurst(defender.x,defender.y,'#ffffff',25,7);
      for(let r=0;r<3;r++){explosions.push({x:defender.x,y:defender.y,radius:0,maxRadius:60+r*25,color:'#5577ff',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});}
      shakeTimer=25;shakeAmt=14;triggerScreenFlash('#5577ff',15);
      addLog('GOJO REVIVES!');
      return dmg;
    }
    // Mahoraga Shinjuku mode — at 18% HP, doesn't die, enters Shinjuku
    if(defender.char.id==='mahoraga'&&!defender.mahoShinjuku&&defender.hp<=0){
      defender.hp=defender.maxHp*0.18;
      defender.mahoShinjuku=true;
      defender.mahoShinjukuAnim=90;
      defender.mahoAdapt={}; // reset all adaptations — fresh start
      defender.stunTimer=0;defender.freezeTimer=0;defender.projectionFrozenTimer=0;defender.captureTimer=0;
      // Shinjuku stats: faster, stronger, bypasses defenses
      defender.speed=defender.baseSpeed*1.5;
      defender.atk=Math.round(defender.baseAtk*1.6);
      defender.def=Math.round(defender.baseDef*0.6); // trades defense for offense
      defender.specialBar=0;
      SFX.relicActivate();
      showRelicText('SHINJUKU MODE','#ff2244');
      spawnBurst(defender.x,defender.y,'#ff2244',50,12);
      spawnBurst(defender.x,defender.y,'#1a1a2e',30,8);
      for(let r=0;r<4;r++){explosions.push({x:defender.x,y:defender.y,radius:0,maxRadius:80+r*30,color:'#ff2244',life:25,maxLife:25,dmg:defender.atk*0.3,owner:defender,target:null,hit:false});}
      shakeTimer=30;shakeAmt=18;triggerScreenFlash('#ff2244',20);
      addLog('MAHORAGA — SHINJUKU MODE!');
      return dmg;
    }
    // Dabura Karaba — RCT prevents death at phase 5
    if(defender.char.id==='dabura'&&defender.dabRCTActive&&defender.dabRCTHealed<defender.dabRCTCap){
      defender.hp=1;
      const heal=Math.min(3,defender.dabRCTCap-defender.dabRCTHealed);
      defender.hp+=heal;defender.dabRCTHealed+=heal;
      spawnDmgNum(defender.x,defender.y-defender.radius-20,'+'+Math.round(heal),'#00ff88',false);
      return dmg;
    }
    // Naoya — no resurrection (removed Phase 2)
    defender.hp=0;defender.alive=false;defender.deathAnim=90;
    // Sandy slow cleanup — if a Sandy dies, un-slow everyone it was affecting
    if(defender.char.id==='sandy'){
      fighters.forEach(other=>{
        if(other&&other!==defender&&other.sandyTimeScale<1){
          const otherSandy=fighters.find(s=>s&&s!==defender&&s.alive&&s.sandyActive&&s!==other);
          if(!otherSandy)other.sandyTimeScale=1;
        }
      });
    }
    // Dramatic death explosion
    SFX.deathExplosion();
    triggerHitFreeze(8);triggerScreenFlash('#ffffff',15);
    shakeTimer=25;shakeAmt=16;
    spawnImpact(defender.x,defender.y,defender.char.color,3);
    spawnImpact(defender.x,defender.y,'#ffcc00',2);
    // Death particle ring
    for(let i=0;i<24;i++){const a=Math.PI*2*i/24;spawnParticle(defender.x,defender.y,defender.char.color,Math.cos(a)*6,Math.sin(a)*6,40,4);}
    for(let i=0;i<16;i++){const a=Math.PI*2*i/16;spawnParticle(defender.x,defender.y,'#ffffff',Math.cos(a)*4,Math.sin(a)*4,25,3);}
    explosions.push({x:defender.x,y:defender.y,radius:0,maxRadius:120,color:defender.char.color,life:30,maxLife:30,dmg:0,owner:null,target:null,hit:true});
    checkVictory(attacker);
  }
  return dmg;
}

let wasDefeat=false; // boss won in boss mode
function checkVictory(lastAttacker){
  const side0Alive=fighters.filter(f=>f.side===0&&f.alive);
  const side1Alive=fighters.filter(f=>f.side===1&&f.alive);
  if(side0Alive.length===0){
    battleOver=true;winner=lastAttacker||side1Alive[0];
    const winLabel=gameMode==='boss'?(winner.char.isBoss?'BOSS':'TEAM'):(winner.side===0?'P1':'P2');
    addLog(winLabel+' '+winner.char.name+' WINS!');
    wasDefeat=gameMode==='boss'&&winner.char.isBoss;
    showVoiceline(winner.char.id,'victory',winner.side);
    // Show defeat line for losers in boss mode
    if(wasDefeat&&side0Alive.length===0){const loser=fighters.find(f=>f.side===0);if(loser)setTimeout(()=>showVoiceline(loser.char.id,'defeat',0),1500);}
    SFX.ko();setTimeout(()=>wasDefeat?SFX.defeat():SFX.victory(),500);
  } else if(side1Alive.length===0){
    battleOver=true;winner=lastAttacker||side0Alive[0];
    const winLabel=gameMode==='boss'?(winner.char.isBoss?'BOSS':'TEAM'):(winner.side===0?'P1':'P2');
    addLog(winLabel+' '+winner.char.name+' WINS!');
    wasDefeat=false;
    showVoiceline(winner.char.id,'victory',winner.side);
    SFX.ko();setTimeout(()=>SFX.victory(),500);
  }
}

// ============================================================
// WEAPON ATTACK SYSTEM — Weapons only attack when they spin to face enemy
// ============================================================
// Check if weapon's natural spin angle is pointing at the enemy (within an arc)
function isWeaponFacingEnemy(f,enemy){
  const toEnemy=angle(f,enemy);
  let diff=f.weaponAngle-toEnemy;
  while(diff>Math.PI)diff-=Math.PI*2;
  while(diff<-Math.PI)diff+=Math.PI*2;
  // Arc depends on weapon type — wider arcs so attacks connect more often
  const arc=f.char.id==='pls'?0.7:f.char.id==='gorilla'?0.65:f.char.id==='monowire'?0.6:f.char.id==='sandy'?0.9:f.char.id==='katana'?0.7:f.char.id==='berserk'?0.8:f.char.id==='smasher'?0.9:f.char.id==='gojo'?0.95:f.char.id==='mechamaru'?0.8:f.char.id==='kashimo'?0.7:f.char.id==='nanami'?0.65:f.char.id==='ryu'?0.9:f.char.id==='higuruma'?0.75:f.char.id==='mahoraga'?0.85:f.char.id==='dabura'?0.8:0.55;
  return Math.abs(diff)<arc;
}

function performWeaponAttack(f,enemy){
  if(!f.alive||!enemy.alive)return;
  if(f.captureTimer>0)return;
  if(f.stunTimer>0||f.freezeTimer>0)return;
  if(f.projectionFrozenTimer>0)return; // Naoya frame lock
  if(f.chosoPiercingFreeze>0)return; // Choso frozen while firing beam
  if(f.mechaMouthBlastActive)return; // Mechamaru frozen while firing mouth blast
  if(f.kashimoAmberActive)return; // Kashimo frozen during AMBER
  // Ryu special is fire-and-forget, no freeze needed
  if(f.kashimoDartPhase!=='idle')return; // Kashimo in dart rush sequence
  // Monowire+electric: short circuit makes attacks miss sometimes
  if(f.missChance>0&&Math.random()<f.missChance){
    spawnDmgNum(f.x,f.y-f.radius-10,'MISS','#ffcc00',false);
    spawnSparks(f.x,f.y,'#ffcc00',3);
    f.attackAnim=8;return;
  }

  const chaos=getChaosLevel(f);
  // DON'T snap weapon to enemy — use natural spin angle
  f.attackAnim=12;

  switch(f.char.id){
    case 'mantis':attackMantis(f,enemy,chaos);break;
    case 'gorilla':attackGorilla(f,enemy,chaos);break;
    case 'monowire':attackMonowire(f,enemy,chaos);break;
    case 'pls':attackPLS(f,enemy,chaos);break;
    case 'sandy':attackSandy(f,enemy,chaos);break;
    case 'throw':attackThrow(f,enemy,chaos);break;
    case 'katana':attackKatana(f,enemy,chaos);break;
    case 'berserk':attackBerserk(f,enemy,chaos);break;
    case 'smasher':attackSmasher(f,enemy,chaos);break;
    case 'gojo':attackGojo(f,enemy,chaos);break;
    case 'choso':attackChoso(f,enemy,chaos);break;
    case 'toji':attackToji(f,enemy,chaos);break;
    case 'mechamaru':attackMechamaru(f,enemy,chaos);break;
    case 'kashimo':attackKashimo(f,enemy,chaos);break;
    case 'nanami':attackNanami(f,enemy,chaos);break;
    case 'ryu':attackRyu(f,enemy,chaos);break;
    case 'higuruma':attackHiguruma(f,enemy,chaos);break;
    case 'yuji':attackYuji(f,enemy,chaos);break;
    case 'naoya':attackNaoya(f,enemy,chaos);break;
    case 'yuta':attackYuta(f,enemy,chaos);break;
    case 'todo':attackTodo(f,enemy,chaos);break;
    case 'mahoraga':attackMahoraga(f,enemy,chaos);break;
    case 'dabura':attackDabura(f,enemy,chaos);break;
    case 'yuki':attackYuki(f,enemy,chaos);break;
    case 'megumi':attackMegumi(f,enemy,chaos);break;
    case 'mahito':attackMahito(f,enemy,chaos);break;
  }
}

function attackMantis(f,enemy,chaos){
  // Alternating left/right slash — uses current weapon facing
  f.attackSide*=-1;
  f.weaponExtend=1;
  f.weaponFlash=12;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*8;
  const facing=isWeaponFacingEnemy(f,enemy);

  SFX.slash();
  if(d<effectiveRange){
    const dmg=dealDamage(f,enemy,f.atk);
    const bleedChance=0.10+chaos*0.02;
    if(Math.random()<bleedChance&&dmg>0){
      applyBleed(enemy,f.atk*0.35,50);
    }
    // Big slash arc visual toward enemy
    const sa=f.weaponAngle;
    for(let i=0;i<10;i++){
      const spread=(Math.random()-0.5)*1.2;
      const speed=3+Math.random()*4;
      spawnParticle(f.x+Math.cos(sa)*f.radius,f.y+Math.sin(sa)*f.radius,
        pick(['#ff6644','#ff4422','#ffaa44']),Math.cos(sa+spread)*speed,Math.sin(sa+spread)*speed,16,3);
    }
    spawnBurst(enemy.x,enemy.y,'#ff4422',8,4);
    shakeTimer=Math.max(shakeTimer,5);shakeAmt=Math.max(shakeAmt,3);
  } else {
    // Whiff — visible slash arc
    const whiffX=f.x+Math.cos(f.weaponAngle)*f.radius*1.5;
    const whiffY=f.y+Math.sin(f.weaponAngle)*f.radius*1.5;
    spawnSparks(whiffX,whiffY,'#ff3333',5);
    spawnBurst(whiffX,whiffY,'#ff6644',4,2);
  }
}

function attackGorilla(f,enemy,chaos){
  f.attackPhase=(f.attackPhase+1)%3; // 0=left, 1=right, 2=downslam
  f.weaponExtend=1;
  f.weaponFlash=15;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*5;
  const isDownslam=f.attackPhase===2;
  const facing=isWeaponFacingEnemy(f,enemy);

  if(isDownslam){
    // Downslam — MASSIVE AoE ground crack
    SFX.punch();SFX.thunderclap();
    const aoeRadius=75+chaos*15;
    const kbMult=f.gorillaKnockbackMult||1;
    if(d<aoeRadius){
      dealDamage(f,enemy,f.atk*1.5);
      const ka=angle(f,enemy);
      enemy.vx+=Math.cos(ka)*8*kbMult;
      enemy.vy+=Math.sin(ka)*8*kbMult;
    }
    spawnBurst(f.x,f.y+f.radius,'#ff8800',30,10);
    spawnBurst(f.x,f.y,'#ffcc00',15,7);
    for(let i=0;i<18;i++){
      const a=Math.PI*2*i/18;
      spawnParticle(f.x,f.y,'#996600',Math.cos(a)*5,Math.sin(a)*5,30,4);
    }
    // Ground crack lines radiating out
    for(let i=0;i<8;i++){
      const a=Math.PI*2*i/8;
      for(let j=0;j<4;j++){
        spawnParticle(f.x+Math.cos(a)*j*12,f.y+Math.sin(a)*j*12,'#ffaa00',Math.cos(a)*2,Math.sin(a)*2,20,2);
      }
    }
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:aoeRadius,color:'#ff8800',life:20,maxLife:20,dmg:0,owner:f,target:null,hit:true});
    spawnWallCrack(f.x,f.y,f); // ground crack at slam point
    shakeTimer=18;shakeAmt=12;
  } else {
    // Left/right heavy punch
    SFX.punch();
    const kbMult2=f.gorillaKnockbackMult||1;
    if(d<effectiveRange){
      dealDamage(f,enemy,f.atk);
      const ka=angle(f,enemy);
      enemy.vx+=Math.cos(ka)*3*kbMult2;
      enemy.vy+=Math.sin(ka)*3*kbMult2;
    }
    spawnBurst(f.x+Math.cos(f.weaponAngle)*f.radius,f.y+Math.sin(f.weaponAngle)*f.radius,'#ff8800',6,3);
  }
}

function attackMonowire(f,enemy,chaos){
  f.weaponExtend=1;
  f.weaponFlash=15;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*10;
  const facing=isWeaponFacingEnemy(f,enemy);

  SFX.whip();
  if(d<effectiveRange){
    dealDamage(f,enemy,f.atk);
    let captureChance=0.30+chaos*0.04;
    const captureDuration=90+chaos*15;
    // Monowire+cryo: slowed enemies are easier to capture
    if(f.elementActive&&f.elem.id==='cryo'&&enemy.slowTimer>0)captureChance+=0.20;
    if(Math.random()<captureChance&&enemy.captureTimer<=0){
      applyCaptureWrap(enemy,captureDuration);
    }
  }
  // Wire launch visual in weapon facing direction (not toward enemy)
  const wa=f.weaponAngle;
  for(let i=0;i<8;i++){
    const t=i/8;
    spawnParticle(
      lerp(f.x,f.x+Math.cos(wa)*effectiveRange,t),
      lerp(f.y,f.y+Math.sin(wa)*effectiveRange,t),
      '#00ddff',0,0,15,1.5);
  }
}

function attackPLS(f,enemy,chaos){
  // Staff launches energy orb toward enemy (fires on interval, not facing)
  f.weaponExtend=0.6;
  f.weaponFlash=12;
  const a=angle(f,enemy)+(Math.random()-0.5)*0.2;
  const speed=6+chaos*0.6;
  const explosionRadius=f.plsExplosionRadius+chaos*10;

  projectiles.push({
    x:f.x+Math.cos(a)*f.radius,
    y:f.y+Math.sin(a)*f.radius,
    vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,
    owner:f,target:enemy,
    color:'#33ff66',life:120,radius:16+chaos*2,
    dmg:f.atk*(1+chaos*0.12),
    explosive:true,explosionRadius:explosionRadius*1.8,
    homing:false,isPlsOrb:true,
  });
  SFX.missile();
  // Win buff: extra projectiles with slight spread
  const extraCount=f._plsExtraProjectiles||0;
  for(let ei=0;ei<extraCount;ei++){
    const spreadA=a+(ei%2===0?1:-1)*(0.25+ei*0.1);
    projectiles.push({
      x:f.x+Math.cos(spreadA)*f.radius,y:f.y+Math.sin(spreadA)*f.radius,
      vx:Math.cos(spreadA)*speed,vy:Math.sin(spreadA)*speed,
      owner:f,target:enemy,color:'#33ff66',life:100,radius:12+chaos,
      dmg:f.atk*(0.6+chaos*0.06),explosive:true,explosionRadius:explosionRadius*1.2,
      homing:false,isPlsOrb:true,
    });
  }
  // Green energy crescent at staff tip
  spawnBurst(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#66ff66',10,5);
  spawnBurst(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#aaffaa',5,3);

  // PLS scaling: hits = faster fire + bigger explosions
  f.plsExplosionRadius=35+f.totalHits*0.4;
}

function attackSandy(f,enemy,chaos){
  // Unarmed — speed = damage. Hits when facing and in range, then bounces away
  f.weaponFlash=12;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*5;
  const facing=isWeaponFacingEnemy(f,enemy);
  const spd=Math.hypot(f.vx,f.vy);
  // Damage scales with speed — faster = harder hit
  const spdDmg=f.atk*(0.5+spd*0.3)+chaos*2;

  SFX.punch();
  if(d<effectiveRange){
    dealDamage(f,enemy,spdDmg);
    // Bounce away after hitting — prevents stunlock
    const ka=angle(enemy,f);
    f.vx=Math.cos(ka)*7;f.vy=Math.sin(ka)*7;
    // Knockback enemy slightly
    const ka2=angle(f,enemy);
    enemy.vx+=Math.cos(ka2)*2;enemy.vy+=Math.sin(ka2)*2;
    spawnBurst(enemy.x,enemy.y,'#4488ff',10,4);
    shakeTimer=6;shakeAmt=4;
    // Sandy+cryo: faster = more slow on enemy
    if(f.elementActive&&f.elem.id==='cryo'){
      const slowAmt=Math.min(120,30+spd*10);
      enemy.slowTimer=Math.max(enemy.slowTimer,slowAmt);
      spawnDmgNum(enemy.x,enemy.y-enemy.radius-20,'SLOW','#77ddff',false);
    }
  } else {
    // Whiff
    spawnSparks(f.x+Math.cos(f.weaponAngle)*f.radius,f.y+Math.sin(f.weaponAngle)*f.radius,'#4488ff',3);
  }

  // Kerenzikov dodge scaling — increases with hits, caps lower
  f.dodgeChance=Math.min(0.18,0.02+f.totalHits*0.002);
}

function attackThrow(f,enemy,chaos){
  // Throwing weapons — fires projectile at enemy, uses active weapon
  const tw=f.throwWeapons[f.throwActiveIdx];
  if(!tw||!tw.available)return;
  f.weaponFlash=12;
  const a=angle(f,enemy)+(Math.random()-0.5)*0.1;
  const speed=8+chaos*0.5;
  const dmg=f.atk*tw.dmgMult*(1+chaos*0.1);
  // Fire rate bonus from fire element
  const fireBonus=f.elementActive&&f.elem.id==='fire'?0.7:1;

  projectiles.push({
    x:f.x+Math.cos(a)*f.radius,y:f.y+Math.sin(a)*f.radius,
    vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,
    owner:f,target:enemy,color:tw.color,life:180,radius:10,
    dmg:dmg,explosive:tw.id==='agaou',
    explosionRadius:tw.id==='agaou'?60+chaos*8:0,
    homing:false,throwWeaponId:tw.id,throwIdx:f.throwActiveIdx,
    isThrowWeapon:true,
  });
  tw.available=false;
  SFX.missile();
  spawnBurst(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,tw.color,6,3);
}

function attackKatana(f,enemy,chaos){
  // Katana — quick slash, NO chaos damage scaling (early powerhouse, no scaling)
  f.weaponExtend=1;f.weaponFlash=12;
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius; // no chaos range boost
  SFX.katanaSlash();
  if(d<effectiveRange){
    // Katana doesn't scale with chaos — use base atk only
    const dmg=f.atk; // flat damage, no chaos mult
    dealDamage(f,enemy,dmg);
    const sa=f.weaponAngle;
    for(let i=0;i<8;i++){
      const spread=(Math.random()-0.5)*1.0;
      const speed=3+Math.random()*3;
      spawnParticle(f.x+Math.cos(sa)*f.radius,f.y+Math.sin(sa)*f.radius,
        pick(['#ff8844','#ff6644','#ffaa44']),Math.cos(sa+spread)*speed,Math.sin(sa+spread)*speed,14,2.5);
    }
    spawnBurst(enemy.x,enemy.y,'#ff6644',6,3);
    shakeTimer=Math.max(shakeTimer,4);shakeAmt=Math.max(shakeAmt,3);
  } else {
    const whiffX=f.x+Math.cos(f.weaponAngle)*f.radius*1.5;
    const whiffY=f.y+Math.sin(f.weaponAngle)*f.radius*1.5;
    spawnSparks(whiffX,whiffY,'#ff6644',4);
  }
}

function attackBerserk(f,enemy,chaos){
  // Berserk — SHOTGUN: many pellets in spread cone
  if(f.berserkReloadTimer>0)return; // still reloading
  f.weaponExtend=1;f.weaponFlash=15;
  SFX.shotgun();
  const baseAngle=angle(f,enemy);
  f.weaponAngle=baseAngle; // snap gun barrel to face enemy when firing
  let pelletCount=Math.floor(6+chaos*0.8); // more pellets with chaos
  let spread=Math.max(0.15, 0.6-chaos*0.04); // tighter spread with chaos
  let speed=10+chaos*0.3;
  const pelletDmg=f.atk*(1+chaos*0.12);
  let pelletLife=35;
  // Fire element: faster pellets + tighter spread
  if(f.elementActive&&f.elem.id==='fire'){speed*=1.3;spread*=0.7;}
  // Cryo element: slow lingering pellets persist longer
  if(f.elementActive&&f.elem.id==='cryo'){pelletLife=70;speed*=0.75;}

  for(let i=0;i<pelletCount;i++){
    const a=baseAngle+(Math.random()-0.5)*2*spread;
    const s=speed*(0.9+Math.random()*0.2);
    projectiles.push({
      x:f.x+Math.cos(baseAngle)*f.radius,
      y:f.y+Math.sin(baseAngle)*f.radius,
      vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      owner:f,target:enemy,color:'#ff3333',
      life:pelletLife,radius:7,dmg:pelletDmg,
      explosive:false,explosionRadius:0,homing:false,
      isShotgunPellet:true,
    });
  }
  // Muzzle flash burst
  spawnBurst(f.x+Math.cos(baseAngle)*f.radius,f.y+Math.sin(baseAngle)*f.radius,'#ff4444',12,5);
  spawnBurst(f.x+Math.cos(baseAngle)*f.radius,f.y+Math.sin(baseAngle)*f.radius,'#ffaa44',8,3);
  shakeTimer=Math.max(shakeTimer,8);shakeAmt=Math.max(shakeAmt,5);
  // Knockback self slightly (recoil)
  f.vx-=Math.cos(baseAngle)*2;f.vy-=Math.sin(baseAngle)*2;
  // Start reload
  const reloadTime=f.berserkInvincible?45:Math.max(60,150-chaos*12); // faster reload during relic
  f.berserkReloadTimer=reloadTime;
}

function attackSmasher(f,enemy,chaos){
  // Adam Smasher — range-based attacks:
  // Close: cybernetic fist punch + blade slash
  // Mid/Far: heavy explosive burst projectiles with knockback (warning cone first)
  // During ult (relic active): melee only, no stationary blast
  if(f.specialActive&&!f._smasherRelicMelee)return;
  const d=dist(f,enemy);
  const meleeRange=f.radius+enemy.radius+35;
  if(d<meleeRange){
    // Close-quarters: cybernetic fist + blade
    f.weaponExtend=1;f.weaponFlash=12;
    const fistDmg=f.atk*(1.2+chaos*0.15);
    dealDamage(f,enemy,fistDmg,true);
    // Severe knockback from fist
    const ka=angle(f,enemy);
    const kb=8+chaos*0.6;
    enemy.vx+=Math.cos(ka)*kb;enemy.vy+=Math.sin(ka)*kb;
    SFX.punch();
    spawnBurst(enemy.x,enemy.y,'#ff4444',10,4);
    spawnBurst(enemy.x,enemy.y,'#ffaa44',6,3);
    // Blade slash follow-up (50% chance at high chaos)
    if(chaos>2&&Math.random()<0.5){
      const bladeDmg=f.atk*(0.6+chaos*0.1);
      dealDamage(f,enemy,bladeDmg);
      SFX.slash();
      spawnBurst(enemy.x,enemy.y,'#cc2222',8,3);
      spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'BLADE','#ff6644',false);
    }
  } else {
    // Ranged: heavy explosive burst — warning cone then fire
    if(f.specialActive)return; // No stationary blast during ult
    if(f.smasherWarning>0)return;
    const baseAngle=angle(f,enemy);
    let warningDuration=Math.max(30, 55-chaos*2); // scales with chaos
    if(f.elementActive&&f.elem.id==='electric')warningDuration*=0.6;
    f.smasherWarning=warningDuration;
    f.smasherWarningAngle=baseAngle;
    f.smasherWarningReady=true;
    f.weaponAngle=baseAngle;
    f.weaponExtend=0.5;
    SFX.warning();
  }
}

function attackChoso(f,enemy,chaos){
  // During Blood Edge (special melee mode): slash with weapon
  if(f.chosoBloodEdge){
    f.weaponExtend=1;f.weaponFlash=12;
    const d=dist(f,enemy);
    const isSword=f.chosoEdgeForm==='sword';
    const meleeRange=isSword?(100+chaos*5):(70+chaos*3);
    const meleeDmg=isSword?f.atk*(1.3+chaos*0.1):f.atk*(0.9+chaos*0.08);
    SFX.chosoSlash();
    if(d<meleeRange+enemy.radius){
      dealDamage(f,enemy,meleeDmg);
      f.chosoBloodHits++;
      spawnBurst(enemy.x,enemy.y,'#8b0000',10,4);
      spawnBurst(enemy.x,enemy.y,'#cc0000',6,3);
      shakeTimer=5;shakeAmt=3;
    }
    // Check if Choso hit near any blood orbs — only manual trigger starts chain reaction
    if(f.chosoChainQueue.length===0){ // don't re-trigger during active chain
      let closestOrb=null,closestDist=meleeRange+60;
      f.chosoOrbs.forEach(orb=>{
        if(!orb.alive)return;
        const d=dist(f,orb);
        if(d<closestDist){closestDist=d;closestOrb=orb;}
      });
      if(closestOrb){
        // Detonate the hit orb immediately, then start chain reaction
        spawnDmgNum(closestOrb.x,closestOrb.y-15,'CHAIN START!','#ff4444',true);
        chosoDetonateOrb(f,closestOrb,enemy,chaos);
        // Queue remaining orbs as chain reaction (closest-first, accelerating)
        chosoStartChainReaction(f,closestOrb,enemy,chaos);
      }
    }
    // Poison element: 5 blood hits = poison stack
    if(f.elementActive&&f.elem.id==='toxic'&&f.chosoBloodHits>=5){
      f.chosoBloodHits=0;
      if(enemy.alive){
        enemy.burnTimer=Math.max(enemy.burnTimer,180);
        enemy.burnDmg=Math.max(enemy.burnDmg,f.atk*0.15);
        spawnDmgNum(enemy.x,enemy.y-enemy.radius-25,'BLOOD POISON','#aa44cc',false);
        spawnBurst(enemy.x,enemy.y,'#aa44cc',8,3);
      }
    }
    return;
  }
  // Normal: Piercing Blood — continuous beam for ~2.5s, then charge, repeat
  if(f.chosoBeamActive||f.chosoBeamCooldown>0)return; // already firing or charging
  f.chosoBeamActive=true;
  f.chosoBeamTimer=150; // ~2.5 seconds of beam
  f.chosoBeamAngle=angle(f,enemy);
  f.chosoPiercingFreeze=180; // frozen for beam + cooldown
  f.vx=0;f.vy=0;
  SFX.chosoPiercing();
  spawnBurst(f.x,f.y,'#8b0000',10,4);
}

function chosoDetonateOrb(f,orb,enemy,chaos){
  if(!orb.alive)return;
  orb.alive=false;
  const dmg=f.atk*(0.8+chaos*0.08);
  // Big explosion at orb position
  explosions.push({x:orb.x,y:orb.y,radius:0,maxRadius:70,color:'#cc0000',life:20,maxLife:20,dmg:dmg,owner:f,target:null,hit:false});
  spawnBurst(orb.x,orb.y,'#cc0000',20,6);
  spawnBurst(orb.x,orb.y,'#ff4444',12,4);
  SFX.chosoSupernova();
  shakeTimer=Math.max(shakeTimer,4);shakeAmt=Math.max(shakeAmt,4);
  // Ice element: spawn rotating buzzsaw at orb position
  if(f.elementActive&&f.elem.id==='cryo'){
    const sawAngle=Math.random()*Math.PI*2;
    projectiles.push({
      x:orb.x,y:orb.y,
      vx:Math.cos(sawAngle)*3,vy:Math.sin(sawAngle)*3,
      owner:f,target:null,color:'#77ddff',
      life:90,radius:14,dmg:f.atk*0.4,
      explosive:false,homing:false,isChosoBuzzsaw:true,
    });
  }
}

function chosoStartChainReaction(f,detonatedOrb,enemy,chaos){
  // Build chain queue: sort remaining alive orbs by distance from detonated orb (closest first)
  const alive=f.chosoOrbs.filter(o=>o.alive);
  if(alive.length===0)return;
  // Sort by distance from the detonated orb
  alive.sort((a,b)=>{
    const da=Math.hypot(a.x-detonatedOrb.x,a.y-detonatedOrb.y);
    const db=Math.hypot(b.x-detonatedOrb.x,b.y-detonatedOrb.y);
    return da-db;
  });
  f.chosoChainQueue=alive;
  f.chosoChainIdx=0;
  f.chosoChainTimer=30; // first chain delay (0.5s) — accelerates from here
  f._chosoChainEnemy=enemy;
  f._chosoChainChaos=chaos;
}

function attackToji(f,enemy,chaos){
  // 3-section staff — distance determines hit type
  f.weaponExtend=1;f.weaponFlash=12;
  const d=dist(f,enemy);
  const closeRange=60+chaos*3;
  const midRange=95+chaos*5;
  const farRange=130+chaos*5;
  SFX.tojiStaff();
  if(d<closeRange+enemy.radius){
    // CLOSE: knockback hit — smacks enemy away hard
    f.tojiStaffSection='close';
    const dmg=f.atk*(1.2+chaos*0.1);
    dealDamage(f,enemy,dmg);
    // Heavy knockback
    const ka=angle(f,enemy);
    enemy.vx+=Math.cos(ka)*12;
    enemy.vy+=Math.sin(ka)*12;
    SFX.tojiKnockback();
    spawnBurst(enemy.x,enemy.y,'#aaaacc',15,5);
    spawnBurst(enemy.x,enemy.y,'#666688',10,4);
    shakeTimer=6;shakeAmt=5;
    addLog((f.side===0?'P1':'P2')+' KNOCKBACK!');
  } else if(d<midRange+enemy.radius){
    // MID: sweep — catches and carries enemy in an arc
    f.tojiStaffSection='mid';
    const dmg=f.atk*(1.0+chaos*0.08);
    dealDamage(f,enemy,dmg);
    // Carry enemy in sweep arc (push perpendicular to angle + forward)
    const ka=angle(f,enemy);
    const perpAngle=ka+Math.PI/2;
    enemy.vx+=Math.cos(perpAngle)*6+Math.cos(ka)*4;
    enemy.vy+=Math.sin(perpAngle)*6+Math.sin(ka)*4;
    spawnBurst(enemy.x,enemy.y,'#8888aa',12,4);
    shakeTimer=4;shakeAmt=3;
  } else if(d<farRange+enemy.radius){
    // FAR: jab — precise tip hit, drives into wall
    f.tojiStaffSection='far';
    const dmg=f.atk*(1.4+chaos*0.12);
    dealDamage(f,enemy,dmg);
    // Drive toward nearest wall
    const ka=angle(f,enemy);
    enemy.vx+=Math.cos(ka)*15;
    enemy.vy+=Math.sin(ka)*15;
    spawnBurst(enemy.x,enemy.y,'#ccccdd',10,5);
    spawnBurst(enemy.x,enemy.y,'#aaaacc',8,4);
    shakeTimer=7;shakeAmt=6;
    addLog((f.side===0?'P1':'P2')+' WALL DRIVE!');
  } else {
    // Out of range — dash closer (Toji is melee focused)
    f.tojiStaffSection='close';
    const ka=angle(f,enemy);
    f.vx+=Math.cos(ka)*3;
    f.vy+=Math.sin(ka)*3;
    spawnBurst(f.x,f.y,'#2a2a3a',5,3);
  }
}

function attackMechamaru(f,enemy,chaos){
  // PHASE 1: Drill arms → projectiles → mini rockets
  if(f.mechaPhase===1){
    f.mechaDrillSide*=-1;
    f.weaponExtend=1;f.weaponFlash=12;
    const d=dist(f,enemy);
    const effectiveRange=f.range+enemy.radius+chaos*5;
    if(d<80+enemy.radius){
      // CLOSE: Drill arm melee
      SFX.mechaDrill();
      const dmg=f.atk*(1.1+chaos*0.08);
      dealDamage(f,enemy,dmg);
      // Knockback
      const ka=angle(f,enemy);
      enemy.vx+=Math.cos(ka)*4;enemy.vy+=Math.sin(ka)*4;
      spawnBurst(enemy.x,enemy.y,'#4a6a4a',10,4);
      spawnBurst(enemy.x,enemy.y,'#888',6,3);
      shakeTimer=4;shakeAmt=3;
      // Fire element: drill burn
      if(f.elementActive&&f.elem.id==='fire'){
        enemy.burnTimer=Math.max(enemy.burnTimer,120);
        enemy.burnDmg=Math.max(enemy.burnDmg,f.atk*0.12);
      }
    } else if(d<effectiveRange){
      // MID: Fire drill projectile
      SFX.mechaDrill();
      const a=angle(f,enemy);
      projectiles.push({
        x:f.x+Math.cos(a)*f.radius,y:f.y+Math.sin(a)*f.radius,
        vx:Math.cos(a)*6,vy:Math.sin(a)*6,

      });

    } else {
      // FAR: Mini rockets from BOTH arms (scaled by chaos)
      if(f.mechaRocketCD<=0){
        SFX.mechaRocket();
        const a=angle(f,enemy);
        const rocketCount=1+Math.floor(chaos*0.5);
        // Spawn rockets from both arms
        const armAngles=[f.weaponAngle,f.weaponAngle+Math.PI];
        for(let arm=0;arm<2;arm++){
          const armA=armAngles[arm];
          const spawnX=f.x+Math.cos(armA)*f.radius;
          const spawnY=f.y+Math.sin(armA)*f.radius;
          for(let i=0;i<Math.ceil(rocketCount/2);i++){
            const spread=(i-rocketCount/4+0.25)*0.15;
            projectiles.push({
              x:spawnX,y:spawnY,
              vx:Math.cos(a+spread)*4,vy:Math.sin(a+spread)*4,
              owner:f,target:null,color:'#aa4444',
              life:90,radius:5,dmg:f.atk*(0.5+chaos*0.04),
              explosive:true,explosionRadius:40,homing:false,isMechaRocket:true,
            });
          }
          // Muzzle flash from each arm
          spawnBurst(spawnX,spawnY,'#ff6644',6,3);
        }
        f.mechaRocketCD=40-Math.min(15,chaos*3);
        // Fire element: bigger explosion radius (applied in explosion handling)
      }
    }
    // Jet booster dash (random)
    if(f.mechaJetTimer<=0&&Math.random()<0.08){
      f.mechaJetTimer=15;
      f.mechaJetAngle=angle(f,enemy);
      SFX.mechaJet();
      spawnBurst(f.x,f.y,'#ff8844',8,4);
    }
  }
  // PHASE 2: Ultimate Mech — missiles from both arms (shoot and move on)
  else if(f.mechaPhase===2){
    f.weaponExtend=1;f.weaponFlash=12;
    SFX.mechaRocket();
    const a=angle(f,enemy);
    // Burst of missiles from both arms
    const armAs=[f.weaponAngle,f.weaponAngle+Math.PI];
    for(let arm=0;arm<2;arm++){
      const spX=f.x+Math.cos(armAs[arm])*f.radius;
      const spY=f.y+Math.sin(armAs[arm])*f.radius;
      const spread=(arm===0?-0.15:0.15);
      projectiles.push({
        x:spX,y:spY,
        vx:Math.cos(a+spread)*3.5,vy:Math.sin(a+spread)*3.5,
        owner:f,target:null,color:'#88aa44',
        life:120,radius:5,dmg:f.atk*(0.4+chaos*0.03),
        explosive:true,explosionRadius:40,homing:false,isMechaRocket:true,
      });
      spawnBurst(spX,spY,'#88aa44',5,3);
    }
    // Center missile
    projectiles.push({
      x:f.x+Math.cos(a)*f.radius,y:f.y+Math.sin(a)*f.radius,
      vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,
      owner:f,target:null,color:'#88aa44',
      life:120,radius:5,dmg:f.atk*(0.4+chaos*0.03),
      explosive:true,explosionRadius:40,homing:false,isMechaRocket:true,
    });
    // All attacks drain HP in Ultimate
    f.hp=Math.max(1,f.hp-f.maxHp*0.01);
    f.mechaUltHPDrain+=f.maxHp*0.01;
    // Poison element: missiles leave trails
    if(f.elementActive&&f.elem.id==='toxic'){
      fireTrails.push({x:f.x,y:f.y,life:40,maxLife:40});
    }
  }
  // PHASE 3: True Form — small pistol only
  else if(f.mechaPhase===3){
    // True form (Kokichi Muta) — desperate cursed energy bursts, nearly defenseless
    f.weaponExtend=1;f.weaponFlash=8;
    SFX.mechaBlast();
    const a=angle(f,enemy);
    projectiles.push({
      x:f.x+Math.cos(a)*f.radius,y:f.y+Math.sin(a)*f.radius,
      vx:Math.cos(a)*5,vy:Math.sin(a)*5,
      owner:f,target:null,color:'#77aaff',
      life:35,radius:4,dmg:f.atk*0.2,
      explosive:false,homing:false,
    });
    spawnBurst(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#77aaff',3,2);
  }
}

function attackKashimo(f,enemy,chaos){

  f.weaponExtend=1;f.weaponFlash=12;

    enemy.vx+=Math.cos(ka)*3;enemy.vy+=Math.sin(ka)*3;
    spawnBurst(enemy.x,enemy.y,'#ffcc00',8,4);
    spawnSparks(enemy.x,enemy.y,'#ffee66',4);
    shakeTimer=4;shakeAmt=3;
    // Visible lightning bolt from Kashimo to enemy (zigzag line)
    const segments=6;
    for(let s=0;s<segments;s++){
      const t1=s/segments,t2=(s+1)/segments;
      const x1=lerp(f.x,enemy.x,t1)+(s>0&&s<segments?rand(-12,12):0);
      const y1=lerp(f.y,enemy.y,t1)+(s>0&&s<segments?rand(-12,12):0);
      const x2=lerp(f.x,enemy.x,t2)+(s<segments-1?rand(-12,12):0);
      const y2=lerp(f.y,enemy.y,t2)+(s<segments-1?rand(-12,12):0);
      spawnParticle((x1+x2)/2,(y1+y2)/2,'#ffee00',rand(-0.5,0.5),rand(-0.5,0.5),8,2);
    }
    // Electric shock on hit (small zap)
    if(Math.random()<0.3+chaos*0.03){
      const zapDmg=f.atk*0.2;

  }
}

function attackNanami(f,enemy,chaos){
  // Bandage blade slash — methodical, very high crit rate
  f.weaponExtend=1;f.weaponFlash=12;
  SFX.nanamiSlash();
  const d=dist(f,enemy);
  const effectiveRange=f.range+enemy.radius+chaos*4;
  if(d<effectiveRange){
    f.nanamiRatioStacks=(f.nanamiRatioStacks||0)+1;
    const ratioGuaranteed=f.nanamiRatioStacks%7===0;

    // Crit calculation — very high base, scales with chaos
    let critChance=f.crit/100+chaos*0.015;
    if(f.nanamiOvertimeActive)critChance=Math.min(0.9,critChance+0.35);
    if(ratioGuaranteed)critChance=1;

    const isCrit=Math.random()<critChance;
    let dmgMult=1;
    let critMult=1.8;
    if(f.nanamiOvertimeActive)critMult=2.4;
    // Electric element: more base dmg, less crit mult
    if(f.elementActive&&f.elem.id==='electric'){dmgMult=1.25;critMult=1.4;}

    let baseDmg=f.atk*dmgMult;
    if(isCrit)baseDmg*=critMult;

    // Cryo element: unwrap blade
    if(f.elementActive&&f.elem.id==='cryo'){
      if(!f.nanamiIceShattered){
        if(!f.nanamiIceUnwrapped){
          f.nanamiIceUnwrapped=true;
          spawnDmgNum(f.x,f.y-f.radius-20,'UNWRAPPED','#77ddff',false);
          spawnBurst(f.x,f.y,'#77ddff',10,4);
        }
        baseDmg*=1.35;
        // 8% shatter risk per hit
        if(Math.random()<0.08){
          f.nanamiIceShattered=true;
          f.nanamiIceUnwrapped=false;
          spawnDmgNum(f.x,f.y-f.radius-20,'SHATTERED!','#ff4444',true);
          spawnBurst(f.x,f.y,'#77ddff',15,5);
          SFX.freeze();
        }
      } else {
        baseDmg*=0.5; // cloth fists — reduced dmg
      }
    }

    // Toxic element: non-crits deal bonus damage
    if(!isCrit&&f.elementActive&&f.elem.id==='toxic'){
      baseDmg*=1.3;
      spawnBurst(enemy.x,enemy.y,'#aa44cc',4,2);
    }

    const dealt=dealDamage(f,enemy,baseDmg,false); // canCrit=false — already handled

    if(dealt>0){
      const ka=angle(f,enemy);
      enemy.vx+=Math.cos(ka)*2;enemy.vy+=Math.sin(ka)*2;

      if(isCrit){
        f.nanamiCritStreak=(f.nanamiCritStreak||0)+1;
        SFX.crit();
        spawnBurst(enemy.x,enemy.y,'#ffcc00',12,5);
        spawnDmgNum(enemy.x,enemy.y-enemy.radius-20,ratioGuaranteed?'RATIO!':'CRIT!','#ffcc00',false);
        shakeTimer=5;shakeAmt=4;
        // Crit freeze — screen slow/pause on hit
        triggerHitFreeze(ratioGuaranteed?45:20);
        // Fire element: crits shatter (slow enemy)
        if(f.elementActive&&f.elem.id==='fire'){
          enemy.slowTimer=Math.max(enemy.slowTimer,60);
          spawnBurst(enemy.x,enemy.y,'#ff4400',6,3);
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-35,'SHATTER','#ff4400',false);
        }
      } else {
        f.nanamiCritStreak=0;
      }
      spawnBurst(enemy.x,enemy.y,isCrit?'#ffcc00':'#d4a843',8,4);
    }
  } else {
    // Whiff
    spawnSparks(f.x+Math.cos(f.weaponAngle)*f.radius,f.y+Math.sin(f.weaponAngle)*f.radius,'#d4a843',3);
  }
}

function ryuSpawnSplits(p){
  // Ryu special blast splits into homing beams in all directions
  SFX.ryuSplit();
  const count=p.ryuSplitCount||6;
  const splitDmg=p.ryuSplitDmg||p.dmg*0.5;
  const tracking=p.ryuSplitTrack; // ice element: splits track
  // Find nearest enemy for tracking splits
  let splitTarget=null;
  fighters.forEach(f=>{if(f&&f.alive&&f.side!==p.owner.side)splitTarget=f;});
  for(let si=0;si<count;si++){
    const sa=(si/count)*Math.PI*2+rand(-0.15,0.15);
    const splitSpd=tracking?3.5:5; // slower when homing — menacing approach
    projectiles.push({
      x:p.x,y:p.y,
      vx:Math.cos(sa)*splitSpd,vy:Math.sin(sa)*splitSpd,
      owner:p.owner,target:tracking?splitTarget:null,color:'#ff8844',
      life:100,radius:7,dmg:splitDmg,
      explosive:false,homing:tracking,homingStrength:tracking?0.035:0,isRyuSplit:true,
    });
  }
  spawnBurst(p.x,p.y,'#ff8844',25,8);
  spawnBurst(p.x,p.y,'#ffcc00',15,5);
  spawnDmgNum(p.x,p.y-20,'SPLIT!','#ff8844',true);
  shakeTimer=8;shakeAmt=6;
  addLog('Blast splits into '+count+' beams!');
}

    projectiles.push({
      x:f.x+Math.cos(ba)*f.radius,y:f.y+Math.sin(ba)*f.radius,
      vx:Math.cos(ba)*ringSpeed,vy:Math.sin(ba)*ringSpeed,
      owner:f,target:null,color:'#ff5500',
      life:30,radius:18+chaos*1,dmg:ringDmg,

  } else {
    // CANNON BLASTS — heavy orange-red fireballs with muzzle flash

      x:f.x+Math.cos(ba)*f.radius,y:f.y+Math.sin(ba)*f.radius,
      vx:Math.cos(ba)*projSpeed,vy:Math.sin(ba)*projSpeed,
      owner:f,target:null,color:'#ff6622',
      life:60,radius:projRadius,dmg:cannonDmg,
      explosive:true,explosionRadius:30+chaos*2,homing:false,isRyuCannon:true,
    });
    // At higher chaos, add extra blasts (no homing — fire in spread)
    const splitCount=chaos>=3?Math.min(Math.floor(chaos/2),4):0;
    if(splitCount>0){
      for(let i=0;i<splitCount;i++){
        const sa=ba+(i-(splitCount-1)/2)*0.25;
        const splitDmg=cannonDmg*0.4;
        projectiles.push({
          x:f.x+Math.cos(sa)*f.radius,y:f.y+Math.sin(sa)*f.radius,
          vx:Math.cos(sa)*(projSpeed*0.8),vy:Math.sin(sa)*(projSpeed*0.8),
          owner:f,target:null,color:'#ff4400',
          life:45,radius:6+chaos*0.3,dmg:splitDmg,
          explosive:false,homing:false,isRyuSplit:true,
        });
      }
    }
    // Muzzle flash burst — bright orange/yellow flash
    spawnBurst(f.x+Math.cos(ba)*f.radius,f.y+Math.sin(ba)*f.radius,'#ffaa00',10,5);
    spawnBurst(f.x+Math.cos(ba)*f.radius,f.y+Math.sin(ba)*f.radius,'#ff4400',6,3);
    shakeTimer=Math.max(shakeTimer,2);shakeAmt=Math.max(shakeAmt,2);
  }
}

function attackHiguruma(f,enemy,chaos){
  const d=dist(f,enemy);
  const ba=f.weaponAngle;
  const isFireElem=f.elementActive&&f.elem.id==='fire';
  const isElecElem=f.elementActive&&f.elem.id==='electric';
  const isToxicElem=f.elementActive&&f.elem.id==='toxic';

  // Executioner Sword — next attack after Execution verdict is a devastating sword strike (PIERCES ALL DEFENSES)
  if(f.higurumaNextSword&&enemy&&enemy.alive&&d<f.radius+enemy.radius+80){
    f.higurumaNextSword=false;
    f.higurumaSwordActive=false; // clear after follow-up sword used
    f.weaponExtend=1;f.weaponFlash=20;
    SFX.executionerSword();
    const swordDmg=f.atk*4; // massive single hit — pierces through all defenses
    const isCrit=Math.random()*100<f.crit;
    const rawDmg=Math.round(isCrit?swordDmg*2:swordDmg);
    // Raw damage — bypasses defense, shields, adaptation, negation
    enemy.hp-=rawDmg;enemy.hitFlash=12;
    if(enemy.hp<=0){enemy.hp=0;enemy.alive=false;enemy.deathAnim=60;checkVictory(f);}
    spawnDmgNum(enemy.x,enemy.y-enemy.radius-20,rawDmg+(isCrit?' CRIT!':''),'#ff0000',true);
    // Visual: big red slash + purple burst
    spawnDmgNum(enemy.x,enemy.y-enemy.radius-40,'EXECUTIONER SWORD!','#ff0000',true);
    spawnBurst(enemy.x,enemy.y,'#ff0000',30,10);
    spawnBurst(enemy.x,enemy.y,'#5a3a7a',20,7);
    spawnBurst(enemy.x,enemy.y,'#ffffff',12,5);
    // Slash line visual
    for(let i=0;i<15;i++){
      const t=i/15;
      spawnParticle(lerp(enemy.x-40,enemy.x+40,t),lerp(enemy.y-40,enemy.y+40,t),'#ff0000',0,0,18,2);
    }
    explosions.push({x:enemy.x,y:enemy.y,radius:0,maxRadius:70,color:'#5a3a7a',life:18,maxLife:18,dmg:0,owner:null,target:null,hit:true});
    shakeTimer=20;shakeAmt=12;
    triggerScreenFlash('#ff0000',8);triggerHitFreeze(5);
    addLog((f.side===0?'P1':'P2')+' EXECUTIONER SWORD STRIKE!');
    return;
  }

  // Fire element: ONLY big hammer swing (faster, bigger)
  // Electric element: ONLY small hammers (20-burst volley)
  // Toxic: both but faster small + knockback on large
  // Default: close=big swing, far=small throws

  // Mode enforcement: can't swing big while small hammers are in flight, and vice versa
  const smallHammersActive=f.higurumaHammerQueue&&f.higurumaHammerQueue.length>0;

  if(isElecElem){
    // 20-burst rapid small hammer volley — queued 1-by-1
    if(f.higurumaElecBurstCD>0)return;
    f.higurumaElecBurstCD=150+Math.floor(Math.random()*30); // 2.5-3s cooldown
    SFX.hammerThrow();
    f.weaponExtend=1;f.weaponFlash=12;
    const count=Math.min(20+Math.floor(chaos*2),24); // cap at 24
    const dmgPer=f.atk*(0.3+chaos*0.02);
    f.higurumaHammerQueue=[];
    for(let i=0;i<count;i++){
      const sa=ba+rand(-0.1,0.1);
      const spd=6+rand(-0.5,0.5)+chaos*0.2;
      f.higurumaHammerQueue.push({sa,spd,dmg:dmgPer,radius:4+chaos*0.2,life:40+Math.floor(rand(0,10)),knockback:1});
    }
    f.higurumaHammerQueueTimer=0;
    spawnBurst(f.x+Math.cos(ba)*f.radius,f.y+Math.sin(ba)*f.radius,'#7a5a9a',15,5);
    addLog((f.side===0?'P1':'P2')+' HAMMER VOLLEY!');
    spawnDmgNum(f.x,f.y-f.radius-20,'VOLLEY','#7a5a9a',false);
  } else if(isFireElem||(d<f.radius+enemy.radius+70&&!isElecElem&&!smallHammersActive)){
    // Big hammer swing — wide area, more damage (blocked while small hammers active)
    if(f.higurumaSwingCD>0&&!isFireElem)return;
    f.higurumaSwingCD=isFireElem?25:40;
    SFX.hammerSwing();
    f.weaponExtend=1;f.weaponFlash=15;
    const swingDmg=f.atk*(1.6+chaos*0.15)*(isFireElem?1.3:1)*(isToxicElem?1.25:1);
    const swingRadius=isFireElem?75+chaos*5:60+chaos*4;
    // Swing arc — hits in a wide cone (BIG hammer = BIG reach)
    const arcAngle=isFireElem?1.4:1.1;
    fighters.forEach(e=>{
      if(e===f||e.side===f.side||!e.alive)return;
      const ae=angle(f,e);
      const de=dist(f,e);
      let diff=ae-ba;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
      if(de<f.radius+swingRadius&&Math.abs(diff)<arcAngle){
        dealDamage(f,e,swingDmg,Math.random()<f.crit/100);
        if(isToxicElem){
          const kb=8+chaos*0.5;
          e.vx+=Math.cos(ae)*kb;e.vy+=Math.sin(ae)*kb;
        }
        spawnBurst(e.x,e.y,'#5a3a7a',8,4);
      }
    });
    // Swing visual — arc particles
    for(let i=0;i<12;i++){
      const sa=ba-arcAngle+(i/11)*arcAngle*2;
      const sr=f.radius+swingRadius*0.8;
      spawnParticle(f.x+Math.cos(sa)*sr,f.y+Math.sin(sa)*sr,'#8866aa',Math.cos(sa)*2,Math.sin(sa)*2,12,3);
    }
    shakeTimer=10;shakeAmt=7;
    spawnBurst(f.x+Math.cos(ba)*(f.radius+30),f.y+Math.sin(ba)*(f.radius+30),'#5a3a7a',15,7);
    // Ground impact visual — radial particles
    for(let j=0;j<8;j++){
      const ga=Math.PI*2*j/8;
      spawnParticle(f.x+Math.cos(ba)*(f.radius+20)+Math.cos(ga)*15,f.y+Math.sin(ba)*(f.radius+20)+Math.sin(ga)*15,'#5a3a7a',Math.cos(ga)*3,Math.sin(ga)*3,18,2);
    }
  } else if(!f.higurumaSwingCD||f.higurumaSwingCD<=0){
    // Small hammer throws — queued 1-by-1 (blocked during big hammer swing cooldown)
    SFX.hammerThrow();
    f.weaponExtend=1;f.weaponFlash=8;
    const count=Math.min(10+Math.floor(chaos*1.5),14); // cap at 14
    const dmgPer=f.atk*(0.45+chaos*0.03)*(isToxicElem?1.25:1);
    const spdBase=isToxicElem?7:5.5;
    f.higurumaHammerQueue=[];
    for(let i=0;i<count;i++){
      const sa=ba+rand(-0.08,0.08);
      const spd=spdBase+rand(-0.3,0.3)+chaos*0.15;
      f.higurumaHammerQueue.push({sa,spd,dmg:dmgPer,radius:5+chaos*0.3,life:50,knockback:isToxicElem?3:1});
    }
    f.higurumaHammerQueueTimer=0;
    spawnBurst(f.x+Math.cos(ba)*f.radius,f.y+Math.sin(ba)*f.radius,'#7a5a9a',8,4);
  }
}

function triggerBlackFlash(f,target){

  const tx=target.x,ty=target.y;

  triggerScreenFlash('#ffffff',4);
  // Huge screen shake
  shakeTimer=Math.max(shakeTimer,20);shakeAmt=Math.max(shakeAmt,14);
  // LONG hit freeze — time pause like crits but bigger
  triggerHitFreeze(10); // much longer freeze (was 4)
  // Black lightning bolts — many, long, dramatic
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2;

    spawnParticle(tx+Math.cos(a)*8,ty+Math.sin(a)*8,'#1111cc',Math.cos(a)*len*0.12,Math.sin(a)*len*0.12,28,4);
  }
  // Outer ring of sparks — bigger

    const a=Math.PI*2*i/16;

    spawnParticle(tx+Math.cos(a)*35,ty+Math.sin(a)*35,'#000000',Math.cos(a)*4,Math.sin(a)*4,20,4);
  }
  // Black flash burst — bigger, more dramatic
  spawnBurst(tx,ty,'#000000',30,12);
  spawnBurst(tx,ty,'#1111cc',20,8);
  spawnBurst(tx,ty,'#ffffff',10,5);
  // Multiple expanding dark ring explosions
  explosions.push({x:tx,y:ty,radius:0,maxRadius:80,color:'#000022',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
  explosions.push({x:tx,y:ty,radius:0,maxRadius:50,color:'#2222ff',life:15,maxLife:15,dmg:0,owner:null,target:null,hit:true});
  // Big, bold text
  spawnDmgNum(tx,ty-target.radius-35,'BLACK FLASH!!','#4444ff',true);
  SFX.crit();
  addLog((f.side===0?'P1':'P2')+' BLACK FLASH!!');
}

function attackYuji(f,enemy,chaos){
  const d=dist(f,enemy);
  if(d>f.radius+enemy.radius+45+chaos*3)return; // melee only
  if(f.yujiDivergentCD>0)return;

  const isFireElem=f.elementActive&&f.elem.id==='fire';
  const isToxicElem=f.elementActive&&f.elem.id==='toxic';
  const isCryoElem=f.elementActive&&f.elem.id==='cryo';

  f.yujiDivergentCD=f.baseAtkInterval;
  f.weaponExtend=1;f.weaponFlash=10;
  SFX.punch();

  // Primary punch — direct hit
  const punchDmg=f.atk*(1.2+chaos*0.1);
  const isBF=f.yujiBlackFlashActive||f.yujiIcePermanentBF||Math.random()<f.crit/100;
  dealDamage(f,enemy,punchDmg,false); // no built-in crit, we handle BF manually

  if(isBF){
    // Black Flash effect
    const bfMult=(f.yujiBlackFlashActive&&isCryoElem)?2.0:1.5;
    dealDamage(f,enemy,punchDmg*(bfMult-1),false); // bonus BF damage
    triggerBlackFlash(f,enemy);
    // Time pause (unless electric element during special, except last 1-2s)
    const isElecElem=f.elementActive&&f.elem.id==='electric';
    let shouldPause=true;
    if(isElecElem&&f.yujiBlackFlashActive){
      shouldPause=f.yujiBlackFlashTimer<=120; // only pause in last 2 seconds
    }
    if(shouldPause){
      // Brief time slow for dramatic effect
      fighters.forEach(e=>{if(e!==f)e.stunTimer=Math.max(e.stunTimer,8);});
      shakeTimer=8;shakeAmt=6;
    }
  }

  spawnBurst(enemy.x,enemy.y,'#ff69b4',8,4);

  // Delayed Divergent Fist (ghost blue punch — flies toward enemy)
  if(isToxicElem){
    // Poison: multiple ghost fists surrounding enemy then converge
    const count=3+Math.floor(chaos*0.5);
    const dmgPer=punchDmg*(0.5+chaos*0.03);
    for(let i=0;i<count;i++){
      const a=Math.PI*2*i/count;
      f.yujiGhostFists.push({
        target:enemy,timer:25+i*5,dmg:dmgPer,
        x:f.x+Math.cos(a)*30,y:f.y+Math.sin(a)*30,
        angle:a,isBF:isBF,isFireKB:false,flying:true,
      });
    }
  } else {
    // Normal/Fire/Electric/Cryo: single fist flies from Yuji toward enemy
    const ghostDmg=punchDmg*(isFireElem?1.6:1.0)*(1+chaos*0.08);
    const ba=angle(f,enemy);
    f.yujiGhostFists.push({
      target:enemy,timer:30,dmg:ghostDmg,
      x:f.x+Math.cos(ba)*20,y:f.y+Math.sin(ba)*20,
      angle:ba,isBF:isBF,isFireKB:isFireElem,flying:true,
    });
  }
}

function attackNaoya(f,enemy,chaos){
  if(f.naoyaProjectionCD>0||f.naoyaDashing||f.naoyaTransitionTimer>0)return;
  // Frame burn penalty — frozen, can't attack
  if(f.naoyaFrameBurned)return;
  const d=dist(f,enemy);
  if(d>f.range+enemy.radius+100+chaos*5)return; // needs to be somewhat close

  const isFireElem=f.elementActive&&f.elem.id==='fire';
  const isElecElem=f.elementActive&&f.elem.id==='electric';
  const isToxicElem=f.elementActive&&f.elem.id==='toxic';
  const isCryoElem=f.elementActive&&f.elem.id==='cryo';
  // Frame stacking: each dash consumes frames and gains speed
  // More stacks = more frames consumed at once, more speed boost
  const framesPerDash=1+Math.floor(f.naoyaFrameStack/4); // 1 at start, up to 7 at max stack
  f.naoyaFrameCount=(f.naoyaFrameCount+framesPerDash)%24;
  f.naoyaFrameStack=Math.min(24,f.naoyaFrameStack+1);

  // Speed scales with frame stack — high risk/high reward
  const stackSpeedBonus=1+f.naoyaFrameStack*0.035; // up to +84% speed at max
  const baseDashSpeed=12;
  f.naoyaDashing=true;
  f.naoyaDashTimer=16;
  f.naoyaDashAngle=angle(f,enemy);
  f.naoyaDashSpeed=baseDashSpeed*stackSpeedBonus;
  if(isElecElem)f.naoyaDashSpeed*=1.25;
  f.naoyaDashTrail=[];

  // Check if frames burned out (used all 24) — penalty freeze
  if(f.naoyaFrameCount===0&&f.naoyaFrameStack>=12){
    f.naoyaFrameBurned=true;
    f.naoyaFrameBurnCD=90; // 1.5s penalty freeze
    f.naoyaFrameStack=0;
    spawnDmgNum(f.x,f.y-f.radius-30,'FRAME BURNOUT!','#ff4444',true);
    spawnBurst(f.x,f.y,'#ff4444',15,6);
    SFX.warning();
  }

  // Cooldown — slightly faster at higher stacks
  const baseCd=f.baseAtkInterval;
  const stackCdReduction=Math.max(0.6,1-f.naoyaFrameStack*0.015); // up to 24% faster (was 40%)
  f.naoyaProjectionCD=Math.round((isElecElem?baseCd*0.7:baseCd)*stackCdReduction);

  SFX.punch();
  // Visual intensity scales with stack
  const burstSize=8+f.naoyaFrameStack;
  spawnBurst(f.x,f.y,'#00cc88',burstSize,4+Math.floor(f.naoyaFrameStack/4));
  if(f.naoyaFrameStack>=12)spawnBurst(f.x,f.y,'#88ffcc',6,3);
  if(f.naoyaFrameStack>=18){spawnBurst(f.x,f.y,'#ffffff',4,2);shakeTimer=Math.max(shakeTimer,3);shakeAmt=Math.max(shakeAmt,2);}
}

function attackYuta(f,enemy,chaos){
  const d=dist(f,enemy);
  if(d>f.radius+enemy.radius+50+chaos*3)return;
  if(f.yutaSlashCD>0)return;

  f.yutaSlashCD=f.baseAtkInterval;
  f.weaponExtend=1;f.weaponFlash=10;
  SFX.yutaSlash();

  const isFireElem=f.elementActive&&f.elem.id==='fire';
  const isElecElem=f.elementActive&&f.elem.id==='electric';
  const isToxicElem=f.elementActive&&f.elem.id==='toxic';

  // Katana slash
  const slashDmg=f.atk*(1.1+chaos*0.08);
  const dmg=dealDamage(f,enemy,slashDmg,true);
  spawnBurst(enemy.x,enemy.y,'#6644cc',6,3);

  // Cursed Energy I/O — Output: every 3rd hit, burst extra damage
  f.yutaHitCount++;
  if(f.yutaHitCount%3===0){
    const burstDmg=f.atk*(0.5+chaos*0.05);
    dealDamage(f,enemy,burstDmg,false);
    SFX.yutaOutput();
    spawnBurst(enemy.x,enemy.y,'#8866ee',10,5);
    spawnDmgNum(enemy.x,enemy.y-enemy.radius-30,'CE OUTPUT','#8866ee',false);
  }
  // Input: heal 3% of damage dealt
  f.hp=Math.min(f.maxHp,f.hp+dmg*0.03);

  // Copy system — chance to copy enemy technique
  if(f.yutaCopyCD<=0){
    const copyChance=isElecElem?0.30:(f.yutaDomainActive?1.0:0.20);
    if(Math.random()<copyChance){
      f.yutaCopyCD=90;
      if(f.yutaCopiedTech&&f.yutaCopiedTech.charId===enemy.char.id){
        f.yutaCopyCount=Math.min(4,f.yutaCopyCount+1);
        f.yutaCopiedTech.potency=Math.min(0.8,0.4+f.yutaCopyCount*0.1);
        addLog((f.side===0?'P1':'P2')+' RE-COPY: '+f.yutaCopiedTech.name+' '+Math.round(f.yutaCopiedTech.potency*100)+'%!');
      } else {
        f.yutaCopiedTech={charId:enemy.char.id,potency:0.4,color:enemy.char.color,name:enemy.char.name};
        f.yutaCopyCount=0;
        addLog((f.side===0?'P1':'P2')+' COPIED: '+f.yutaCopiedTech.name+'!');
      }
      f.yutaCopyFlash=20;
      SFX.yutaCopy();
      spawnDmgNum(f.x,f.y-f.radius-35,'COPY '+Math.round(f.yutaCopiedTech.potency*100)+'%',f.yutaCopiedTech.color,false);
      spawnBurst(f.x,f.y,f.yutaCopiedTech.color,12,5);

      // Auto-trigger copied technique projectile
      const copyDmg=f.atk*f.yutaCopiedTech.potency*(isFireElem?1.3:1);
      const ba=angle(f,enemy);
      projectiles.push({
        x:f.x+Math.cos(ba)*f.radius,y:f.y+Math.sin(ba)*f.radius,
        vx:Math.cos(ba)*5,vy:Math.sin(ba)*5,
        owner:f,target:enemy,color:f.yutaCopiedTech.color,
        life:90,maxLife:90,radius:7,
        dmg:copyDmg,explosive:false,homing:true,homingStrength:0.12,
        isYutaCopy:true,applyPoison:isToxicElem,
      });
    }
  }
}

function relicMahoraga(f,enemy){
  // Negation Shield: blocks all incoming damage for 3 seconds
  // Also rapidly drops adaptation counters (5-7 stacks removed)
  f.mahoNegationActive=true;
  f.mahoNegationTimer=180; // 3 seconds
  f.mahoNegationFlash=30;
  f.specialTimer=180;

  // Drop adaptation counters by 5-7 for all types
  const dropAmount=5+Math.floor(Math.random()*3);
  for(const key in f.mahoAdapt){
    f.mahoAdapt[key]=Math.max(0,f.mahoAdapt[key]-dropAmount);
  }

  // Burst shockwave that pushes enemies away
  fighters.filter(e=>e.side!==f.side&&e.alive).forEach(e=>{
    const d=dist(f,e);
    if(d<200){
      const ka=angle(f,e);
      const pushForce=12*(1-d/200);
      e.vx+=Math.cos(ka)*pushForce;
      e.vy+=Math.sin(ka)*pushForce;
      e.stunTimer=Math.max(e.stunTimer,20);
    }
  });

  SFX.relicActivate();
  spawnBurst(f.x,f.y,'#00ffaa',40,12);
  spawnBurst(f.x,f.y,'#1a1a2e',25,8);
  for(let r=0;r<3;r++){
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:100+r*40,color:'#00ffaa',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
  }
  triggerScreenFlash('#00ffaa',15);
  shakeTimer=20;shakeAmt=12;
  spawnDmgNum(f.x,f.y-f.radius-30,'NEGATION SHIELD','#00ffaa',false);
  addLog((f.side===0?'P1':'P2')+' NEGATION SHIELD!');
}
