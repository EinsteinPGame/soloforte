function updateRelicMantis(f,enemy,dt){
  if(f.relicDashTimer>0){
    f.relicDashTimer-=dt;
    // Pull-back phase — blades glow
    f.weaponFlash=10;
    spawnParticle(f.x+rand(-5,5),f.y+rand(-5,5),'#ff3333',0,0,10,2);
    if(f.relicDashTimer<=0){
      // Launch dash!
      f.relicDashing=true;
      SFX.dashHit();
    }
  }
  if(f.relicDashing&&enemy.alive){
    const d=dist(f,enemy);
    f.weaponAngle=angle(f,enemy);
    f.weaponExtend=1;f.weaponFlash=5;
    // Trail particles
    spawnParticle(f.x,f.y,'#ff6644',(-f.vx)*0.3,(-f.vy)*0.3,15,3);
    spawnParticle(f.x,f.y,'#ff0000',0,0,8,2);
    if(d<f.radius+enemy.radius+15){
      // DRAMATIC IMPACT!
      f.relicDashing=false;
      const dmg=dealDamage(f,enemy,f.atk*3.5,true);
      // Very high bleed chance on relic dash
      if(enemy.alive&&Math.random()<0.8){
        applyBleed(enemy,f.atk*0.7,120);
      }
      shakeTimer=25;shakeAmt=14;
      // Massive slash cross visual
      spawnBurst(enemy.x,enemy.y,'#ff0000',35,8);
      spawnBurst(enemy.x,enemy.y,'#ffcc00',20,6);
      spawnBurst(enemy.x,enemy.y,'#ffffff',10,4);
      // X-slash particle lines
      for(let i=0;i<20;i++){
        const t=i/20;
        spawnParticle(lerp(enemy.x-40,enemy.x+40,t),lerp(enemy.y-40,enemy.y+40,t),'#ff4444',0,0,18,2);
        spawnParticle(lerp(enemy.x+40,enemy.x-40,t),lerp(enemy.y-40,enemy.y+40,t),'#ff4444',0,0,18,2);
      }
      explosions.push({x:enemy.x,y:enemy.y,radius:0,maxRadius:80,color:'#ff3333',life:18,maxLife:18,dmg:0,owner:null,target:null,hit:true});
      f.specialTimer=0;f.specialActive=false;
      // Scatter away after hit
      const ka=angle(enemy,f);
      f.vx=Math.cos(ka)*8;f.vy=Math.sin(ka)*8;
    }
  }
}

function updateRelicGorilla(f,enemy,dt){
  f.relicShockwaveTimer-=dt;
  if(f.relicShockwaveTimer<=0&&f.relicShockwaveCount<8){
    f.relicShockwaveTimer=45;
    f.relicShockwaveCount++;
    SFX.thunderclap();
    // Punch in weapon facing direction — launch directional shockwave (NOT homing)
    const swAngle=f.weaponAngle;
    const swSpeed=6;
    const swSize=30+f.relicShockwaveCount*5;
    shockwaveProjectiles.push({
      x:f.x+Math.cos(swAngle)*f.radius,
      y:f.y+Math.sin(swAngle)*f.radius,
      vx:Math.cos(swAngle)*swSpeed,
      vy:Math.sin(swAngle)*swSpeed,
      owner:f,target:enemy,
      size:swSize,dmg:f.atk*1.2,
      life:60,maxLife:60,hit:false,
      color:'#ffaa00',
    });
    // Visual: shockwave ring at punch origin
    explosions.push({x:f.x,y:f.y,radius:0,maxRadius:swSize,color:'#ffaa00',life:12,maxLife:12,dmg:0,owner:f,target:null,hit:true});
    spawnBurst(f.x,f.y,'#ff8800',12,5);
    shakeTimer=8;shakeAmt=6;
    f.weaponExtend=1;f.weaponFlash=15;
  }
}

function spawnWallCrack(x,y,owner){
  // Pre-generate crack line lengths so they don't flicker each frame
  const crackLines=[];for(let i=0;i<10;i++){crackLines.push(0.5+Math.random()*0.5);}
  wallCracks.push({x,y,size:50+Math.random()*40,life:500,maxLife:500,owner:owner||null,dmgCooldown:0,crackLines});
  // Visual impact burst at crack point
  spawnBurst(x,y,'#ffaa00',14,6);
  spawnSparks(x,y,'#ffdd44',10);
  SFX.thunderclap();
}

function updateRelicMonowire(f,enemy,dt){
  if(f.relicWhipSpinTimer>0){
    f.relicWhipSpinTimer-=dt;
    f.rotation+=0.25*dt; // fast spin
    f.weaponExtend=1;

    // BB-8 whip spin — extended wires hit everything nearby
    const spinRange=110;
    const d=dist(f,enemy);
    // Strike every 12 frames
    if(Math.floor(f.relicWhipSpinTimer)%12===0&&d<spinRange&&enemy.alive){
      dealDamage(f,enemy,f.atk*0.6,true);
      SFX.whip();
      // Capture chance converts to quickhack chance during relic
      if(Math.random()<0.40&&!quickhackDisplay&&enemy.alive){
        applyQuickhack(f,enemy);
      }
      // Higher parry — deflect incoming projectiles
      spawnBurst(f.x,f.y,'#00ddff',6,4);
    }
    // Spin visual
    if(f.relicWhipSpinTimer%3<1){
      const a=f.rotation*3;
      spawnParticle(f.x+Math.cos(a)*spinRange*0.8,f.y+Math.sin(a)*spinRange*0.8,'#00ffff',0,0,10,2);
      spawnParticle(f.x+Math.cos(a+Math.PI)*spinRange*0.8,f.y+Math.sin(a+Math.PI)*spinRange*0.8,'#00aaff',0,0,10,2);
    }
  }
}

function updateRelicPLS(f,enemy,dt){
  if(f.relicChargeTimer>0){
    // Charging phase — big visible targeting reticle on enemy
    f.relicChargeTimer-=dt;
    f.weaponAngle=angle(f,enemy);
    // Lock-on lines from PLS to enemy
    if(battleTime%3<1){
      const a=angle(f,enemy);
      spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#ff3333',
        Math.cos(a)*5,Math.sin(a)*5,20,3);
    }
    // Swirling charge particles around PLS ball
    for(let i=0;i<2;i++){
      const a=battleTime*0.2+i*Math.PI;
      const cx=f.x+Math.cos(a)*35;
      const cy=f.y+Math.sin(a)*35;
      spawnParticle(cx,cy,'#33ff33',(f.x-cx)*0.15,(f.y-cy)*0.15,12,2);
    }
    // Red pulsing brackets on enemy
    if(battleTime%4<1){
      spawnParticle(enemy.x-enemy.radius-10,enemy.y,'#ff3333',0,0,10,3);
      spawnParticle(enemy.x+enemy.radius+10,enemy.y,'#ff3333',0,0,10,3);
      spawnParticle(enemy.x,enemy.y-enemy.radius-10,'#ff3333',0,0,10,3);
      spawnParticle(enemy.x,enemy.y+enemy.radius+10,'#ff3333',0,0,10,3);
    }
    if(f.relicChargeTimer<=0){
      // Start rapid fire
      SFX.special();
      addLog((f.side===0?'P1':'P2')+' PLS RAPID FIRE!');
    }
    return;
  }
  // Rapid-fire homing shots — all 10 in ~1-2 seconds (fire every 3 frames instead of 6)
  if(f.relicHomingShots>0&&battleTime%3<1){
    f.relicHomingShots--;
    const a=angle(f,enemy)+(Math.random()-0.5)*0.3;
    projectiles.push({
      x:f.x+Math.cos(a)*f.radius,
      y:f.y+Math.sin(a)*f.radius,
      vx:Math.cos(a)*8,vy:Math.sin(a)*8,
      owner:f,target:enemy,
      color:'#66ff66',life:120,radius:8,
      dmg:f.atk*0.6,
      explosive:true,explosionRadius:25+getChaosLevel(f)*4,
      homing:true,homingStrength:0.25,
    });
    SFX.missile();
    f.weaponFlash=6;f.weaponExtend=0.5;
    shakeTimer=3;shakeAmt=2;
    if(f.relicHomingShots<=0){
      f.specialTimer=0;f.specialActive=false;
    }
  }
}

function updateRelicSandy(f,enemy,dt){
  f.sandyTimer-=dt;
  // Afterimage trail — spawn ghostly copies
  if(battleTime%3<1){
    sandyAfterimages.push({x:f.x,y:f.y,radius:f.radius,rotation:f.rotation,color:f.char.color,life:45,maxLife:45});
  }
  // Blue glow particles
  if(battleTime%2<1){
    const a=Math.random()*Math.PI*2;
    spawnParticle(f.x+Math.cos(a)*f.radius,f.y+Math.sin(a)*f.radius,'#4488ff',Math.cos(a)*1.5,Math.sin(a)*1.5,15,3);
  }
  // Speed-based damage when hitting — handled by attackSandy already
  // Sandy+fire: leave fire trail
  if(f.elementActive&&f.elem.id==='fire'&&battleTime%4<1){
    fireTrails.push({x:f.x,y:f.y,life:90,maxLife:90,radius:14,owner:f,dmg:f.atk*0.15});
  }
  // Sandy+electric: rotating orbs
  if(f.elementActive&&f.elem.id==='electric'){
    f.sandyOrbAngle+=0.12*dt;
    // Check orb hits
    for(let oi=0;oi<2;oi++){
      const oa=f.sandyOrbAngle+oi*Math.PI;
      const ox=f.x+Math.cos(oa)*55,oy=f.y+Math.sin(oa)*55;
      if(enemy.alive&&dist({x:ox,y:oy},enemy)<enemy.radius+8&&battleTime%10<1){
        dealDamage(f,enemy,f.atk*0.4,false);
        spawnBurst(ox,oy,'#ffcc00',6,3);
      }
    }
  }
  // End of Sandevistan
  if(f.sandyTimer<=0){
    f.sandyActive=false;
    f.sandyDodgeBoost=0;
    f.speed=f.baseSpeed;
    // Restore time scale for all fighters slowed by this Sandy
    fighters.forEach(other=>{
      if(other&&other!==f&&other.sandyTimeScale<1){
        // Only restore if no OTHER active Sandy is still slowing them
        const otherSandy=fighters.find(s=>s&&s!==f&&s.alive&&s.sandyActive&&s!==other);
        if(!otherSandy)other.sandyTimeScale=1;
      }
    });
    f.specialTimer=0;f.specialActive=false;
    addLog((f.side===0?'P1':'P2')+' Sandevistan ended');
    spawnBurst(f.x,f.y,'#4488ff',10,4);
  }
}

function updateRelicThrow(f,enemy,dt){
  f.throwCamoTimer-=dt;
  // Subtle ripple particles (not obvious)
  if(battleTime%8<1){
    spawnParticle(f.x+rand(-15,15),f.y+rand(-15,15),'rgba(180,200,255,0.3)',0,-0.5,10,1);
  }
  // Auto-face enemy constantly during camo
  f.weaponAngle=angle(f,enemy);
  // Normal attack cycle handles throwing during camo — no machine gun override
  // Rush to pick up embedded weapons
  f.throwEmbedded.forEach(emb=>{
    if(!emb.active)return;
    const d=dist(f,emb);
    if(d<f.radius+20){
      // Pick up
      f.throwWeapons[emb.weaponIdx].available=true;
      f.throwWeapons[emb.weaponIdx].returnCD=0;
      emb.active=false;
      spawnBurst(emb.x,emb.y,f.throwWeapons[emb.weaponIdx].color,6,3);
    }
  });
  // End optical camo
  if(f.throwCamoTimer<=0){
    f.throwCamoActive=false;
    f.dodgeChance=0;
    f.speed=f.baseSpeed;
    f.specialTimer=0;f.specialActive=false;
    addLog((f.side===0?'P1':'P2')+' Optical Camo ended');
    spawnBurst(f.x,f.y,'#cc66ff',10,4);
  }
}

function updateRelicKatana(f,enemy,dt){
  f.katanaRushTimer-=dt;
  const d=enemy.alive?dist(f,enemy):999;
  // Slow steady approach toward enemy while deflecting (like slow mantis blade)
  if(enemy.alive){
    const a=angle(f,enemy);
    const rushSpeed=f.elementActive&&f.elem.id==='electric'?2.2:1.2; // lightning = faster rush
    f.vx=lerp(f.vx,Math.cos(a)*rushSpeed,0.08);
    f.vy=lerp(f.vy,Math.sin(a)*rushSpeed,0.08);
    // Face enemy with blade forward
    f.weaponAngle=a;
    f.weaponExtend=0.8;
    // Deflect glow trail — ominous slow approach
    if(battleTime%3<1){
      spawnParticle(f.x+rand(-8,8),f.y+rand(-8,8),'#ff6644',0,0,12,2);
      spawnParticle(f.x+rand(-8,8),f.y+rand(-8,8),'#ffcc00',0,0,8,1.5);
    }
    // Blade charge glow intensifies as closer
    if(d<150&&battleTime%2<1){
      spawnParticle(f.x+rand(-5,5),f.y+rand(-5,5),'#ffffff',0,-0.5,10,1.5);
    }
  }
  // Deliver single slash when close enough OR timer runs out
  if((d<f.radius+enemy.radius+25&&enemy.alive)||f.katanaRushTimer<=0||!enemy.alive){
    f.katanaRushing=false;
    if(enemy.alive){
      // Single devastating slash — like mantis blade finisher but slower build-up
      const baseDmg=f.atk*2; // nerfed from 3x
      const mult=1+f.katanaRushDeflects*0.5; // nerfed bonus from deflects during rush
      const totalDmg=baseDmg*mult;
      dealDamage(f,enemy,totalDmg,true);
      SFX.katanaSlash();SFX.crit();
      // MASSIVE X-slash visual (like mantis blade special)
      spawnBurst(enemy.x,enemy.y,'#ff6644',40,12);
      spawnBurst(enemy.x,enemy.y,'#ffcc00',25,8);
      spawnBurst(enemy.x,enemy.y,'#ffffff',15,5);
      // X-slash lines
      for(let i=0;i<20;i++){
        const t=i/20;
        spawnParticle(lerp(enemy.x-60,enemy.x+60,t),lerp(enemy.y-60,enemy.y+60,t),'#ff6644',0,0,20,2.5);
        spawnParticle(lerp(enemy.x+60,enemy.x-60,t),lerp(enemy.y-60,enemy.y+60,t),'#ff6644',0,0,20,2.5);
      }
      explosions.push({x:enemy.x,y:enemy.y,radius:0,maxRadius:100,color:'#ff6644',life:25,maxLife:25,dmg:0,owner:null,target:null,hit:true});
      shakeTimer=30;shakeAmt=18;
      if(f.katanaRushDeflects>0){
        spawnDmgNum(enemy.x,enemy.y-enemy.radius-25,'x'+mult.toFixed(1)+'!','#ffcc00',true);
      }
      SFX.judgementCut();
      triggerScreenFlash('#4466cc',15);
      addLog((f.side===0?'P1':'P2')+' JUDGEMENT CUT!');
      // Bounce away after slash
      const ka=angle(enemy,f);
      f.vx=Math.cos(ka)*8;f.vy=Math.sin(ka)*8;
    }
    f.specialTimer=0;f.specialActive=false;
  }
}

function updateRelicSmasher(f,enemy,dt){
  // Mortar barrage from back-mounted artillery + melee fists when close
  if(!f._smasherMortarCD)f._smasherMortarCD=0;
  f._smasherMortarCD-=dt;
  // Colorful relic aura particles + afterimage trail
  if(battleTime%3<1){
    const colors=['#cc4444','#ff6644','#ffcc00'];
    spawnParticle(f.x+rand(-15,15),f.y+rand(-15,15),pick(colors),0,-1,12,2);
  }
  // Spawn afterimage every 4 frames
  if(battleTime%4<1){
    if(!f.smasherAfterimages)f.smasherAfterimages=[];
    f.smasherAfterimages.push({x:f.x,y:f.y,alpha:0.6});
  }
  // Fade afterimages
  for(let i=(f.smasherAfterimages||[]).length-1;i>=0;i--){
    f.smasherAfterimages[i].alpha-=0.02*dt;
    if(f.smasherAfterimages[i].alpha<=0)f.smasherAfterimages.splice(i,1);
  }
  // Fire mortar rounds at enemy positions periodically
  if(f._smasherMortarCD<=0){
    f._smasherMortarCD=75; // fire every ~1.25s
    f._smasherMortarCount=(f._smasherMortarCount||0)+1;
    const enemies=fighters.filter(e=>e.side!==f.side&&e.alive);
    if(enemies.length>0){
      // Pick a random alive enemy to target
      const target=pick(enemies);
      // Mortar warning zone at target position (with slight prediction)
      const tx=target.x+target.vx*15+rand(-30,30);
      const ty=target.y+target.vy*15+rand(-30,30);
      smasherWarnings.push({x:tx,y:ty,radius:65,life:50,maxLife:50});
      SFX.warning();
      // Delayed mortar impact (mortar lands after warning fades)
      const chaos=getChaosLevel(f);
      const mortarDmg=f.atk*(1.5+chaos*0.15);
      setTimeout(()=>{
        if(!f.alive||!f.specialActive)return;
        spawnExplosion(tx,ty,65+chaos*3,'#ff4444',mortarDmg,f,null);
        spawnBurst(tx,ty,'#ff6644',25,8);
        spawnBurst(tx,ty,'#ffaa44',15,5);
        SFX.slamImpact();
        // Knockback enemies near impact
        fighters.forEach(e=>{
          if(e.side===f.side||!e.alive)return;
          const d=dist(e,{x:tx,y:ty});
          if(d<65+chaos*3){
            dealDamage(f,e,mortarDmg,true);
            const ka=angle({x:tx,y:ty},e);
            e.vx+=Math.cos(ka)*(8+chaos*0.5);e.vy+=Math.sin(ka)*(8+chaos*0.5);
          }
        });
        // Fire element: fire zone at impact
        if(f.elementActive&&f.elem.id==='fire'){
          fireZones.push({x:tx,y:ty,radius:45,life:240,maxLife:240,owner:f,dmg:f.atk*0.08});
        }
        wallCracks.push({x:tx,y:ty,size:35,life:200,maxLife:200,crackLines:Array.from({length:6},()=>0.5+Math.random()*0.5)});
      },50*1000/60); // ~50 frames delay matching warning
      // Every 3rd mortar fires a cluster (multiple impacts)
      if(f._smasherMortarCount%3===0){
        for(let i=0;i<2;i++){
          const ox=tx+rand(-50,50),oy=ty+rand(-50,50);
          smasherWarnings.push({x:ox,y:oy,radius:45,life:60,maxLife:60});
          setTimeout(()=>{
            if(!f.alive||!f.specialActive)return;
            spawnExplosion(ox,oy,45,'#ff6644',mortarDmg*0.6,f,null);
            spawnBurst(ox,oy,'#ffaa44',10,4);
            fighters.forEach(e=>{
              if(e.side===f.side||!e.alive)return;
              if(dist(e,{x:ox,y:oy})<45){
                dealDamage(f,e,mortarDmg*0.6,true);
                const ka=angle({x:ox,y:oy},e);
                e.vx+=Math.cos(ka)*6;e.vy+=Math.sin(ka)*6;
              }
            });
          },60*1000/60);
        }
      }
    }
  }
  // Melee fists+blades when enemies are close during relic
  if(f._smasherRelicMelee){
    const enemies=fighters.filter(e=>e.side!==f.side&&e.alive);
    enemies.forEach(e=>{
      if(dist(f,e)<f.radius+e.radius+40){
        if(!f._smasherRelicMeleeCD)f._smasherRelicMeleeCD=0;
        if(f._smasherRelicMeleeCD<=0){
          f._smasherRelicMeleeCD=25;
          const chaos=getChaosLevel(f);
          const fistDmg=f.atk*(1.0+chaos*0.1);
          dealDamage(f,e,fistDmg,true);
          const ka=angle(f,e);
          e.vx+=Math.cos(ka)*(6+chaos*0.4);e.vy+=Math.sin(ka)*(6+chaos*0.4);
          SFX.punch();
          spawnBurst(e.x,e.y,'#ff4444',8,3);
          f.weaponExtend=1;f.weaponFlash=8;
        }
      }
    });
    if(f._smasherRelicMeleeCD>0)f._smasherRelicMeleeCD-=dt;
  }
  // Keep enemies slowed during ult
  fighters.forEach(other=>{
    if(other&&other!==f&&other.alive)other.sandyTimeScale=Math.min(other.sandyTimeScale,0.3);
  });
  // End of relic
  if(f.specialTimer<=0){
    f._smasherRelicMelee=false;
    // Restore enemy time scale
    fighters.forEach(other=>{
      if(other&&other!==f){
        const otherSandy=fighters.some(o=>o!==other&&o.alive&&o.char.id==='sandy'&&o.sandyActive);
        if(!otherSandy)other.sandyTimeScale=1;
      }
    });
    f.smasherAfterimages=[];
    addLog((f.side===0?'P1':'P2')+' Smasher Protocol ended');
    spawnBurst(f.x,f.y,'#cc4444',10,4);
  }
}

// Choso continuous beam — runs independently of special
function updateChosoBeam(f,enemy,dt){
  // Piercing Blood freeze
  if(f.chosoPiercingFreeze>0){
    f.chosoPiercingFreeze-=dt;
    f.vx=0;f.vy=0;
  }
  // Continuous beam
  if(f.chosoBeamActive){
    f.chosoBeamTimer-=dt;
    f.vx=0;f.vy=0;
    // Slowly track beam toward enemy
    const targetAngle=angle(f,enemy);
    let diff=targetAngle-f.chosoBeamAngle;
    while(diff>Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    const trackSpeed=0.025+(f.elementActive&&f.elem.id==='electric'?0.02:0);
    f.chosoBeamAngle+=diff*trackSpeed*dt;
    f.weaponAngle=f.chosoBeamAngle;
    f.weaponFlash=5;
    // Beam hit detection — wide hitbox (beam is thick)
    if(f.chosoBeamHitCD<=0){
      const chaos=getChaosLevel(f);
      const beamLen=450;
      const bx=f.x+Math.cos(f.chosoBeamAngle)*f.radius;
      const by=f.y+Math.sin(f.chosoBeamAngle)*f.radius;
      if(enemy.alive){
        const ex=enemy.x-bx,ey=enemy.y-by;
        const along=ex*Math.cos(f.chosoBeamAngle)+ey*Math.sin(f.chosoBeamAngle);
        if(along>0&&along<beamLen){
          const perp=Math.abs(-ex*Math.sin(f.chosoBeamAngle)+ey*Math.cos(f.chosoBeamAngle));
          if(perp<enemy.radius+18){ // wide hitbox
            const beamDmg=f.atk*(1.0+chaos*0.08);
            dealDamage(f,enemy,beamDmg);
            f.chosoBloodHits++;
            f.chosoBeamHitCD=12;
            spawnBurst(enemy.x,enemy.y,'#cc0000',8,4);
            enemy.vx+=Math.cos(f.chosoBeamAngle)*3;
            enemy.vy+=Math.sin(f.chosoBeamAngle)*3;
            if(f.elementActive&&f.elem.id==='toxic'&&f.chosoBloodHits>=5){
              f.chosoBloodHits=0;
              enemy.burnTimer=Math.max(enemy.burnTimer,180);
              enemy.burnDmg=Math.max(enemy.burnDmg,f.atk*0.15);
              spawnDmgNum(enemy.x,enemy.y-enemy.radius-25,'BLOOD POISON','#aa44cc',false);
            }
          }
        }
      }
    }
    if(f.chosoBeamHitCD>0)f.chosoBeamHitCD-=dt;
    // Beam particles along the ray
    if(battleTime%2<1){
      const d=Math.random()*400;
      spawnParticle(
        f.x+Math.cos(f.chosoBeamAngle)*(f.radius+d),
        f.y+Math.sin(f.chosoBeamAngle)*(f.radius+d),
        pick(['#cc0000','#ff2222','#880000']),0,0,5,2
      );
    }
    if(f.elementActive&&f.elem.id==='fire'&&battleTime%8<1){
      const sideA=f.chosoBeamAngle+(Math.random()-0.5)*0.3;
      spawnParticle(f.x+Math.cos(sideA)*f.radius,f.y+Math.sin(sideA)*f.radius,'#ff4400',Math.cos(sideA)*4,Math.sin(sideA)*4,5,3);
    }
    if(f.chosoBeamTimer<=0){
      f.chosoBeamActive=false;
      f.chosoBeamCooldown=360+rand(0,60); // 6-7 seconds cooldown
      f.chosoPiercingFreeze=0; // unfreeze — can move during cooldown
      spawnDmgNum(f.x,f.y-f.radius-20,'RECHARGING...','#880000',false);
    }
  }
  // Beam cooldown — Choso moves freely while waiting to fire again
  if(f.chosoBeamCooldown>0){
    f.chosoBeamCooldown-=dt;
    if(f.chosoBeamCooldown<=0){
      f.chosoPiercingFreeze=0;
    }
  }
}

function updateRelicToji(f,enemy,dt){
  if(!f.tojiTriActive)return;
  f.tojiTriTimer-=dt;
  // Fade afterimages
  for(let i=f.tojiAfterimages.length-1;i>=0;i--){
    f.tojiAfterimages[i].alpha-=0.03*dt;
    if(f.tojiAfterimages[i].alpha<=0)f.tojiAfterimages.splice(i,1);
  }
  // DASH PHASE: teleport between 3 weapon positions
  if(f.tojiTriPhase==='dash'){
    f.tojiDashTimer-=dt;
    f.weaponFlash=10;
    if(f.tojiDashTimer<=0){
      const idx=f.tojiDashIdx;
      const chaos=getChaosLevel(f);
      // Spawn afterimage at current position before teleporting
      f.tojiAfterimages.push({x:f.x,y:f.y,alpha:1});
      // Teleport to weapon position
      const pt=f.tojiTriPoints[idx];
      f.x=pt.x;f.y=pt.y;f.vx=0;f.vy=0;
      SFX.tojiDash();
      spawnBurst(f.x,f.y,'#1a1a2a',15,5);
      spawnBurst(f.x,f.y,'#333355',10,4);
      // Each weapon does something different
      if(idx===0){
        // INVERTED SPEAR — disables defensive abilities
        const spearDmg=f.atk*(1.0+chaos*0.1);
        if(enemy.alive&&dist(f,enemy)<180){
          dealDamage(f,enemy,spearDmg);
          // Disable deflect/infinity/damage reduction for triangle duration
          f.tojiEnemyDebuff=true;
          enemy.katanaDeflectCount=0; // strip deflect charges
          enemy.gojoInfinityCharges=0; // strip infinity charges
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-30,'SPEAR — DEFENSES DISABLED','#ff4444',false);
          spawnBurst(enemy.x,enemy.y,'#ff4444',12,5);
        }
        shakeTimer=5;shakeAmt=4;
      } else if(idx===1){
        // SPLIT SOUL KATANA — removes dmg reduction + 10% increased dmg taken
        const katDmg=f.atk*(1.2+chaos*0.1);
        if(enemy.alive&&dist(f,enemy)<180){
          dealDamage(f,enemy,katDmg);
          f.tojiDmgTakenDebuff=true;
          enemy.tojiDmgTakenDebuff=true;
          enemy.defReduction=Math.max(enemy.defReduction,enemy.def*0.5); // halve effective def
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-30,'SPLIT SOUL — +10% DMG TAKEN','#ff8844',false);
          spawnBurst(enemy.x,enemy.y,'#ff8844',12,5);
        }
        shakeTimer=6;shakeAmt=5;
      } else if(idx===2){
        // PLAYFUL CLOUD — massive hit
        const cloudDmg=f.atk*(1.8+chaos*0.15);
        if(enemy.alive&&dist(f,enemy)<180){
          dealDamage(f,enemy,cloudDmg);
          // Heavy knockback toward center of triangle
          const tcx=(f.tojiTriPoints[0].x+f.tojiTriPoints[1].x+f.tojiTriPoints[2].x)/3;
          const tcy=(f.tojiTriPoints[0].y+f.tojiTriPoints[1].y+f.tojiTriPoints[2].y)/3;
          const ka=Math.atan2(tcy-enemy.y,tcx-enemy.x);
          enemy.vx+=Math.cos(ka)*8;
          enemy.vy+=Math.sin(ka)*8;
          spawnDmgNum(enemy.x,enemy.y-enemy.radius-30,'PLAYFUL CLOUD','#aaaaff',false);
          spawnBurst(enemy.x,enemy.y,'#aaaaff',15,6);
          spawnBurst(enemy.x,enemy.y,'#ffffff',10,5);
        }
        shakeTimer=8;shakeAmt=7;
        triggerHitFreeze(4);
      }
      f.tojiDashIdx++;
      if(f.tojiDashIdx>=3){
        // Dash phase complete — enter linger phase (4-5 seconds)
        f.tojiTriPhase='linger';
        // Return Toji to triangle center
        const tcx=(f.tojiTriPoints[0].x+f.tojiTriPoints[1].x+f.tojiTriPoints[2].x)/3;
        const tcy=(f.tojiTriPoints[0].y+f.tojiTriPoints[1].y+f.tojiTriPoints[2].y)/3;
        f.tojiAfterimages.push({x:f.x,y:f.y,alpha:1});
        f.x=tcx;f.y=tcy;f.vx=0;f.vy=0;
        SFX.tojiChain();
        addLog('Chain triangle active!');
      } else {
        f.tojiDashTimer=25; // pause before next teleport (~0.4s)
      }
    }
  }
  // LINGER PHASE: triangle stays, traps enemies, Toji gets buffs inside
  if(f.tojiTriPhase==='linger'){
    // Toji buffs while triangle is active: +50% atk, +40% speed, +30% def
    f.atk=Math.round(f.baseAtk*1.5);
    f.speed=f.baseSpeed*1.4;
    f.def=Math.round(f.baseDef*1.3);
    const pts=f.tojiTriPoints;
    const shrink=f.tojiTriShrink;
    // Calculate triangle center
    const tcx=(pts[0].x+pts[1].x+pts[2].x)/3;
    const tcy=(pts[0].y+pts[1].y+pts[2].y)/3;
    // Shrunk points (for ice element)
    const sPts=pts.map(p=>({
      x:p.x+(tcx-p.x)*shrink,
      y:p.y+(tcy-p.y)*shrink,
    }));
    // Keep Toji inside the triangle too
    const tojiInside=pointInTriangle(f.x,f.y,sPts[0],sPts[1],sPts[2]);
    if(!tojiInside){
      const ka=Math.atan2(tcy-f.y,tcx-f.x);
      f.vx+=Math.cos(ka)*2;
      f.vy+=Math.sin(ka)*2;
    }
    // Check if enemy is inside triangle — keep them trapped
    if(enemy.alive){
      const inside=pointInTriangle(enemy.x,enemy.y,sPts[0],sPts[1],sPts[2]);
      // Push enemy back inside if they try to leave
      if(!inside){
        const ka=Math.atan2(tcy-enemy.y,tcx-enemy.x);
        enemy.vx+=Math.cos(ka)*2;
        enemy.vy+=Math.sin(ka)*2;
      }
      // Element effects inside triangle
      if(f.elementActive){
        const elem=f.elem.id;
        if(elem==='fire'&&battleTime%10<1){
          // Fire: ground burns
          if(inside||dist(enemy,{x:tcx,y:tcy})<150){
            const fireDmg=f.atk*0.12;
            dealDamage(f,enemy,fireDmg,false);
            spawnBurst(enemy.x,enemy.y,'#ff4400',4,2);
            spawnParticle(enemy.x+rand(-20,20),enemy.y+rand(-10,10),'#ff4400',0,-2,15,3);
          }
        }
        if(elem==='electric'&&battleTime%20<1){
          // Lightning: weapons auto-slash (extra damage)
          const autoSlashDmg=f.atk*0.3;
          if(dist(enemy,{x:tcx,y:tcy})<180){
            dealDamage(f,enemy,autoSlashDmg,false);
            // Visual: slash lines from each weapon point
            sPts.forEach(p=>{
              spawnBurst(p.x,p.y,'#ffcc00',6,3);
              spawnParticle(p.x,p.y,'#ffcc00',rand(-3,3),rand(-3,3),10,2);
            });
            spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'AUTO-SLASH','#ffcc00',false);
          }
        }
        if(elem==='toxic'){
          // Poison: chain barrier deals contact damage
          for(let i=0;i<3;i++){
            const p1=sPts[i],p2=sPts[(i+1)%3];
            const edgeDist=pointToSegDist(enemy.x,enemy.y,p1.x,p1.y,p2.x,p2.y);
            if(edgeDist<enemy.radius+15&&battleTime%8<1){
              const chainDmg=f.atk*0.15;
              dealDamage(f,enemy,chainDmg,false);
              spawnBurst(enemy.x,enemy.y,'#aa44cc',5,2);
              spawnDmgNum(enemy.x,enemy.y-enemy.radius-15,'CHAIN BURN','#aa44cc',false);
              break;
            }
          }
        }
        if(elem==='cryo'){
          // Ice: triangle compresses smaller over time
          f.tojiTriShrink=Math.min(0.6,f.tojiTriShrink+0.001*dt);
          // Ice particles on chain
          if(battleTime%6<1){
            const ri=Math.floor(Math.random()*3);
            const p1=sPts[ri],p2=sPts[(ri+1)%3];
            const t=Math.random();
            spawnParticle(p1.x+(p2.x-p1.x)*t,p1.y+(p2.y-p1.y)*t,'#77ddff',0,-1,12,2);
          }
        }
      }
    }
    // Chain visual particles
    if(battleTime%4<1){
      const ri=Math.floor(Math.random()*3);
      const p1=sPts[ri],p2=sPts[(ri+1)%3];
      const t=Math.random();
      spawnParticle(p1.x+(p2.x-p1.x)*t,p1.y+(p2.y-p1.y)*t,'#888899',0,0,10,1.5);
    }
  }
  // Timer expired — end triangle
  if(f.tojiTriTimer<=0){
    f.tojiTriActive=false;
    f.tojiTriPhase='dash';
    f.tojiDashIdx=0;
    f.tojiAfterimages=[];
    f.tojiTriShrink=0;
    // Remove debuffs from enemy
    if(enemy.alive){
      enemy.tojiDmgTakenDebuff=false;
      enemy.defReduction=0;
    }
    f.tojiEnemyDebuff=false;
    f.tojiDmgTakenDebuff=false;
    f.atk=f.baseAtk;
    f.speed=f.baseSpeed;
    f.def=f.baseDef;
    addLog('Heavenly Restriction faded');
    spawnBurst(f.x,f.y,'#2a2a3a',10,4);
  }
}

function updateRelicMechamaru(f,enemy,dt){
  // Phase 1 mouth blast
  if(f.mechaMouthBlastActive){
    f.mechaMouthBlastTimer-=dt;
    f.vx=0;f.vy=0;
    f.weaponFlash=10;
    // Track toward enemy
    const targetAngle=angle(f,enemy);
    let diff=targetAngle-f.mechaMouthBlastAngle;
    while(diff>Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    f.mechaMouthBlastAngle+=diff*0.03*dt;
    f.weaponAngle=f.mechaMouthBlastAngle;
    // Beam hit detection
    if(f.mechaMouthBlastCD<=0){
      const beamLen=400;
      const bx=f.x+Math.cos(f.mechaMouthBlastAngle)*f.radius;
      const by=f.y+Math.sin(f.mechaMouthBlastAngle)*f.radius;
      if(enemy.alive){
        const ex=enemy.x-bx,ey=enemy.y-by;
        const along=ex*Math.cos(f.mechaMouthBlastAngle)+ey*Math.sin(f.mechaMouthBlastAngle);
        if(along>0&&along<beamLen){
          const perp=Math.abs(-ex*Math.sin(f.mechaMouthBlastAngle)+ey*Math.cos(f.mechaMouthBlastAngle));
          if(perp<enemy.radius+22){
            dealDamage(f,enemy,f.atk*2.0);
            f.mechaMouthBlastCD=10;
            spawnBurst(enemy.x,enemy.y,'#88aa44',8,4);
            enemy.vx+=Math.cos(f.mechaMouthBlastAngle)*4;
            enemy.vy+=Math.sin(f.mechaMouthBlastAngle)*4;
          }
        }
      }
    }
    if(f.mechaMouthBlastCD>0)f.mechaMouthBlastCD-=dt;
    // Beam particles
    if(battleTime%2<1){
      const d=Math.random()*350;
      spawnParticle(f.x+Math.cos(f.mechaMouthBlastAngle)*(f.radius+d),f.y+Math.sin(f.mechaMouthBlastAngle)*(f.radius+d),pick(['#4a6a4a','#88aa44','#ffcc00']),0,0,5,2);
    }
    if(f.mechaMouthBlastTimer<=0){
      f.mechaMouthBlastActive=false;
      spawnDmgNum(f.x,f.y-f.radius-20,'COOLING...','#4a6a4a',false);
    }
  }
  // Phase 2 defense shield
  if(f.mechaUltShield){
    f.mechaUltShieldTimer-=dt;
    // Shield aura visual
    if(battleTime%4<1){
      const a=Math.random()*Math.PI*2;
      spawnParticle(f.x+Math.cos(a)*(f.radius+10),f.y+Math.sin(a)*(f.radius+10),'#44aaff',0,0,8,2);
    }
    if(f.mechaUltShieldTimer<=0){
      f.mechaUltShield=false;
      addLog((f.side===0?'P1':'P2')+' Shield expired');
      spawnBurst(f.x,f.y,'#44aaff',8,3);
    }
  }
}

        spawnBurst(p.x,p.y,'#ffcc00',6,3);

      }
    }
    // Orbit particles
    spawnParticle(staffX,staffY,pick(['#ffcc00','#ffee66','#fff']),-Math.sin(f.kashimoStaffOrbitAngle)*2,Math.cos(f.kashimoStaffOrbitAngle)*2,8,2);
    if(f.kashimoAmberTimer<=0){
      f.kashimoAmberPhase='charge';
      f.kashimoAmberTimer=270; // 4.5s charge
      SFX.kashimoAmber();
      addLog((f.side===0?'P1':'P2')+' CHARGING...');
      spawnDmgNum(f.x,f.y-f.radius-20,'CHARGING...','#ffcc00',true);
    }
  }
  else if(f.kashimoAmberPhase==='charge'){
    // Longest charge in game — electricity builds
    f.weaponFlash=8;
    const progress=1-(f.kashimoAmberTimer/270);
    // Growing electric aura
    if(battleTime%3<1){
      const a=Math.random()*Math.PI*2;
      const dist2=30+progress*50;
      spawnParticle(f.x+Math.cos(a)*dist2,f.y+Math.sin(a)*dist2,pick(['#ffcc00','#ffee00','#fff']),Math.cos(a)*(-1),Math.sin(a)*(-1),12,2+progress*3);
    }
    // Staff still orbiting during charge
    f.kashimoStaffOrbitAngle+=0.06*dt;
    // Screen shake builds
    if(progress>0.5){shakeTimer=Math.max(shakeTimer,2);shakeAmt=Math.max(shakeAmt,2+progress*4);}
    if(f.kashimoAmberTimer<=0){
      // FLOOD — electricity floods the arena
      f.kashimoAmberPhase='flood';
      f.kashimoAmberTimer=60; // 1s flood
      SFX.kashimoFlood();
      triggerScreenFlash('#ffcc00',15);
      shakeTimer=30;shakeAmt=15;
      addLog((f.side===0?'P1':'P2')+' AMBER UNLEASHED!');
      spawnDmgNum(f.x,f.y-f.radius-30,'AMBER UNLEASHED!','#ffcc00',true);
    }
  }
  else if(f.kashimoAmberPhase==='flood'){
    // Electricity floods the entire arena
    f.weaponFlash=12;
    // Deal massive damage every few frames
    if(battleTime%4<1&&enemy.alive){
      const isBoss=enemy.char&&(enemy.char.id==='smasher'||enemy.char.id==='gojo'||enemy.char.id==='sukuna');
      const floodDmg=isBoss?enemy.maxHp*0.14:enemy.maxHp*1.5; // one-tap normals, 60-70% boss HP over flood
      const elecMult=f.elementActive&&f.elem.id==='electric'?1.5:1;
      dealDamage(f,enemy,floodDmg*elecMult/15); // spread over 15 ticks
      spawnBurst(enemy.x,enemy.y,'#ffcc00',6,4);
    }
    // Arena-wide lightning bolts visual
    if(battleTime%2<1){
      for(let i=0;i<3;i++){
        const lx=Math.random()*W,ly=Math.random()*H;
        spawnParticle(lx,ly,pick(['#ffcc00','#ffee66','#fff']),0,0,15,4);
      }
    }
    if(f.kashimoAmberTimer<=0){
      // Done — Kashimo reappears at 1 HP, special gone forever
      f.kashimoAmberPhase='done';
      f.kashimoAmberActive=false;
      f.kashimoStaffMode=true;
      f.hp=1;
      f.specialBar=0;
      f.specialActive=false;
      f.specialTimer=0;
      // Cryo element: staff rushes enemies after ult
      if(f.elementActive&&f.elem.id==='cryo'&&enemy.alive){
        const rushA=angle(f,enemy);
        f.vx=Math.cos(rushA)*12;f.vy=Math.sin(rushA)*12;
        spawnBurst(f.x,f.y,'#77ddff',15,5);
      }
      spawnBurst(f.x,f.y,'#ffcc00',30,8);
      spawnDmgNum(f.x,f.y-f.radius-20,'1 HP','#ff4444',true);
      addLog((f.side===0?'P1':'P2')+' Amber spent — 1 HP remains');
    }
  }
}

// Helper: point inside triangle
function pointInTriangle(px,py,a,b,c){
  const d1=(px-b.x)*(a.y-b.y)-(a.x-b.x)*(py-b.y);
  const d2=(px-c.x)*(b.y-c.y)-(b.x-c.x)*(py-c.y);
  const d3=(px-a.x)*(c.y-a.y)-(c.x-a.x)*(py-a.y);
  const hasNeg=(d1<0)||(d2<0)||(d3<0);
  const hasPos=(d1>0)||(d2>0)||(d3>0);
  return !(hasNeg&&hasPos);
}

// Helper: distance from point to line segment
function pointToSegDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1;
  const lenSq=dx*dx+dy*dy;
  if(lenSq===0)return Math.hypot(px-x1,py-y1);
  let t=((px-x1)*dx+(py-y1)*dy)/lenSq;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}

// ============================================================
// BATTLE UPDATE
// ============================================================
function updateBattle(dt){
  if(battleOver)return;
  battleTime+=dt;
  const f1=fighters[0],f2=fighters[1];

  // Update smasher warnings
  for(let i=smasherWarnings.length-1;i>=0;i--){
    smasherWarnings[i].life-=dt;
    if(smasherWarnings[i].life<=0)smasherWarnings.splice(i,1);
  }

  fighters.forEach((f,i)=>{
    // In boss mode, find the best enemy (closest alive)
    let enemy;
    if(gameMode==='boss'){
      const enemies=fighters.filter(e=>e.side!==f.side&&e.alive);
      enemy=enemies.length>0?enemies.reduce((a,b)=>dist(f,a)<dist(f,b)?a:b):null;
      if(!enemy)return;
    } else {
      enemy=i===0?f2:f1;
    }
    if(!f.alive)return;

    // Timers
    if(f.hitFlash>0)f.hitFlash-=dt;
    if(f._bodyHitCD>0)f._bodyHitCD-=dt;
    if(f.stunTimer>0)f.stunTimer-=dt;
    if(f.slowTimer>0)f.slowTimer-=dt;
    if(f.freezeTimer>0)f.freezeTimer-=dt;
    if(f.captureTimer>0){
      f.captureTimer-=dt;
      // Captured enemies take constant crush damage
      if(battleTime%10<dt&&f._capturedBy&&f._capturedBy.alive){
        const crushDmg=f._capturedBy.atk*0.25;
        f.hp-=crushDmg;f.hitFlash=4;
        spawnDmgNum(f.x+rand(-10,10),f.y-f.radius-10,crushDmg,'#00ddff',false);
        spawnParticle(f.x+rand(-20,20),f.y+rand(-20,20),'#00ddff',0,-1,12,2);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(f._capturedBy);}
      }
    }
    if(f.defReductionTimer>0)f.defReductionTimer-=dt;else f.defReduction=0;
    if(f.specialTimer>0)f.specialTimer-=dt;else if(f.specialActive){f.specialActive=false;f.relicDashing=false;}

    // Bleed DOT
    if(f.bleedTimer>0){
      f.bleedTimer-=dt;
      if(!f._bleedTickCD)f._bleedTickCD=0;f._bleedTickCD-=dt;
      if(f._bleedTickCD<=0){f._bleedTickCD=15;
        f.hp-=f.bleedDmg;
        spawnParticle(f.x+rand(-8,8),f.y+rand(-8,8),'#cc0000',rand(-1,1),-1,12,2);
        spawnDmgNum(f.x+rand(-10,10),f.y-f.radius-5,f.bleedDmg,'#cc0000',false);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(enemy);}
      }
    } else {f.bleedIcon=false;}

    // Burn DOT
    if(f.burnTimer>0){
      f.burnTimer-=dt;
      if(!f._burnTickCD)f._burnTickCD=0;f._burnTickCD-=dt;
      if(f._burnTickCD<=0){f._burnTickCD=10;
        f.hp-=f.burnDmg;
        spawnParticle(f.x+rand(-10,10),f.y-f.radius,'#ff4400',0,-1,15,2);
        if(f.hp<=0){f.hp=0;f.alive=false;f.deathAnim=60;checkVictory(enemy);}
      }
    }

    // Element activation at 25% HP
    if(!f.elementActive&&f.elem.id!=='none'&&f.hp<=f.maxHp*0.25){
      f.elementActive=true;f.elementFlash=30;
      SFX.elementActivate();
      const comboKey=f.char.id+'_'+f.elem.id;
      addLog((f.side===0?'P1':'P2')+' '+f.elem.name+' ELEMENT ACTIVATED!');
      addLog('  >> '+(COMBO_EFFECTS[comboKey]||''));
      spawnBurst(f.x,f.y,f.elem.color,20,5);
      switch(f.elem.id){
        case 'fire':f.atk=f.baseAtk*1.3;break;
        case 'electric':f.speed=f.baseSpeed*1.2;f.crit+=8;break;
        case 'toxic':f.atk=f.baseAtk*1.15;break;
        case 'cryo':f.def=f.baseDef+5;break;
      }
    }
    if(f.elementFlash>0)f.elementFlash-=dt;

    // Special bar passive fill (slow time-based + attack bonus is the main driver)
    f.specialBar=Math.min(f.specialMax,f.specialBar+0.025*(f.char.relicChargeRate||1)*dt);
    // Kashimo: time-based charge (~25 seconds), combat contributes minimally
    if(f.char.id==='kashimo')f.specialBar=Math.min(f.specialMax,f.specialBar+0.067*dt);

    // Check if should use relic special
    if(f.specialBar>=f.specialMax&&!f.specialActive&&enemy.alive){
      useSpecial(f,enemy);
    }

    // Update active relic special
    if(f.specialActive){
      switch(f.char.id){
        case 'mantis':updateRelicMantis(f,enemy,dt);break;
        case 'gorilla':updateRelicGorilla(f,enemy,dt);break;
        case 'monowire':updateRelicMonowire(f,enemy,dt);break;
        case 'pls':updateRelicPLS(f,enemy,dt);break;
        case 'sandy':updateRelicSandy(f,enemy,dt);break;
        case 'throw':updateRelicThrow(f,enemy,dt);break;
        case 'katana':updateRelicKatana(f,enemy,dt);break;
        case 'berserk':updateRelicBerserk(f,enemy,dt);break;
        case 'smasher':updateRelicSmasher(f,enemy,dt);break;
        case 'gojo':updateRelicGojo(f,enemy,dt);break;
        case 'choso':updateRelicChoso(f,enemy,dt);break;
        case 'toji':updateRelicToji(f,enemy,dt);break;
        case 'mechamaru':updateRelicMechamaru(f,enemy,dt);break;
        case 'kashimo':updateRelicKashimo(f,enemy,dt);break;
        case 'nanami':updateRelicNanami(f,enemy,dt);break;
        case 'ryu':updateRelicRyu(f,enemy,dt);break;
      }
    }

    // Choso beam runs always (not just during special)
    if(f.char.id==='choso'&&(f.chosoBeamActive||f.chosoBeamCooldown>0||f.chosoPiercingFreeze>0)){
      updateChosoBeam(f,enemy,dt);
    }

    // Mechamaru per-frame: phase management, jet boosters, Ultimate missiles, True Form timer
    if(f.char.id==='mechamaru'){
      // Rocket cooldown
      if(f.mechaRocketCD>0)f.mechaRocketCD-=dt;
      // Jet booster dash
      if(f.mechaJetTimer>0){
        f.mechaJetTimer-=dt;
        const jetSpd=f.mechaPhase===2?10:7;
        f.vx=Math.cos(f.mechaJetAngle)*jetSpd;
        f.vy=Math.sin(f.mechaJetAngle)*jetSpd;
        // Electric element: faster jets
        if(f.elementActive&&f.elem.id==='electric'){
          f.vx*=1.3;f.vy*=1.3;
        }
        // Jet particles
        spawnParticle(f.x-Math.cos(f.mechaJetAngle)*f.radius,f.y-Math.sin(f.mechaJetAngle)*f.radius,pick(['#ff6644','#ffcc00','#ff8844']),(-f.vx)*0.3,(-f.vy)*0.3,12,3);
      }
      // Mouth blast runs always (like choso beam)
      if(f.mechaMouthBlastActive){
        // handled in updateRelicMechamaru but need freeze
        f.vx=0;f.vy=0;
      }
      // Phase 2: constant weak missiles from alternating arms (every ~30 frames)
      if(f.mechaPhase===2&&enemy.alive){
        f.mechaUltMissileTimer-=dt;
        if(f.mechaUltMissileTimer<=0){
          f.mechaUltMissileTimer=30;
          // Alternate which arm fires
          f.mechaArmToggle=!f.mechaArmToggle;
          const armOff=f.mechaArmToggle?0:Math.PI;
          const armA=f.weaponAngle+armOff;
          const spX=f.x+Math.cos(armA)*f.radius;
          const spY=f.y+Math.sin(armA)*f.radius;
          const a=angle(f,enemy)+(Math.random()-0.5)*0.5;
          projectiles.push({
            x:spX,y:spY,
            vx:Math.cos(a)*3,vy:Math.sin(a)*3,
            owner:f,target:null,color:'#88aa44',
            life:80,radius:4,dmg:f.atk*0.25,
            explosive:false,homing:false,isMechaRocket:true,
          });
          spawnBurst(spX,spY,'#88aa44',4,2);
          // HP drain for constant missiles
          f.hp=Math.max(1,f.hp-f.maxHp*0.003);
        }
        // Ultimate special cooldown (auto-fires every 5-8s)
        if(f.mechaUltSpecialCD>0){
          f.mechaUltSpecialCD-=dt;
        } else if(f.specialBar>=f.specialMax){
          useSpecial(f,enemy);
          f.mechaUltSpecialCD=300+rand(0,180); // 5-8 seconds
        }
        // Phase 2 -> Phase 3 transition: HP hits 0 or very low
        if(f.hp<=1&&!f.mechaTrueFormReform){
          // Transition to True Form
          f.mechaPhase=3;
          f.mechaTransitionAnim=30;
          f.mechaTrueFormTimer=720+rand(0,180); // 12-15 seconds
          f.radius=30; // smaller ball
          f.atk=Math.round(f.baseAtk*0.3);
          f.speed=f.baseSpeed*1.8; // faster to dodge
          f.def=Math.round(f.baseDef*0.5);
          f.hp=f.maxHp*0.15;
          f.mechaUltShield=false;
          SFX.mechaTrueForm();
          spawnBurst(f.x,f.y,'#888888',30,8);
          spawnBurst(f.x,f.y,'#ffcc00',15,5);
          triggerScreenFlash('#ffffff',6);
          shakeTimer=12;shakeAmt=8;
          addLog((f.side===0?'P1':'P2')+' TRUE FORM! Survive...');
          spawnDmgNum(f.x,f.y-f.radius-30,'TRUE FORM','#ffffff',true);
        }
      }
      // Phase 3: survive timer → reform to Phase 1
      if(f.mechaPhase===3){
        f.mechaTrueFormTimer-=dt;
        // Desperate particles
        if(battleTime%8<1){
          spawnParticle(f.x+rand(-10,10),f.y+rand(-10,10),'#888',rand(-1,1),rand(-1,1),10,1);
        }
        if(f.mechaTrueFormTimer<=0){
          // REFORM to Phase 1
          f.mechaPhase=1;
          f.mechaUltUsed=true; // can't go Ultimate again
          f.radius=45;
          f.atk=f.baseAtk;
          f.speed=f.baseSpeed;
          f.def=f.baseDef;
          f.hp=Math.min(f.maxHp,f.maxHp*0.5); // reform at 50% HP

          SFX.mechaUltimate();
          spawnBurst(f.x,f.y,'#4a6a4a',40,10);
          spawnBurst(f.x,f.y,'#88aa44',25,7);
          triggerScreenFlash('#4a6a4a',6);
          shakeTimer=15;shakeAmt=10;
          addLog((f.side===0?'P1':'P2')+' MECH REFORMED!');
          spawnDmgNum(f.x,f.y-f.radius-30,'REFORMED!','#4a6a4a',true);
        }
      }
      // Phase 1 → Phase 2 transition: first time HP drops below 30%
      if(f.mechaPhase===1&&!f.mechaUltUsed&&f.hp<=f.maxHp*0.3){
        f.mechaPhase=2;
        f.mechaTransitionAnim=30;
        f.mechaUltMissileTimer=0;
        f.mechaUltSpecialCD=300; // first special after 5s
        f.radius=55; // bigger ball
        f.atk=Math.round(f.baseAtk*1.5);
        f.speed=f.baseSpeed*0.8; // slower but stronger
        f.def=Math.round(f.baseDef*1.5);
        f.hp=f.maxHp*0.7; // restore some HP
        f.specialBar=0;
        SFX.mechaUltimate();
        spawnBurst(f.x,f.y,'#4a6a4a',50,12);
        spawnBurst(f.x,f.y,'#ffcc00',30,8);
        spawnBurst(f.x,f.y,'#ffffff',20,6);
        for(let r=0;r<3;r++){
          explosions.push({x:f.x,y:f.y,radius:0,maxRadius:70+r*25,color:'#4a6a4a',life:20,maxLife:20,dmg:0,owner:null,target:null,hit:true});
        }
        triggerScreenFlash('#88aa44',8);
        shakeTimer=20;shakeAmt=12;
        addLog((f.side===0?'P1':'P2')+' ULTIMATE MECH!');
        spawnDmgNum(f.x,f.y-f.radius-30,'ULTIMATE MECH!','#ffcc00',true);
      }
      // Transition animation
      if(f.mechaTransitionAnim>0)f.mechaTransitionAnim-=dt;
    }

    // Kashimo per-frame: dart rush sequence + random bolts
    if(f.char.id==='kashimo'){
      const chaos=getChaosLevel(f);
      // Dart rush cooldown
      if(f.kashimoDartCD>0&&f.kashimoDartPhase==='idle'&&!f.kashimoAmberActive)f.kashimoDartCD-=dt;

      // Trigger dart rush when cooldown expires
      if(f.kashimoDartCD<=0&&f.kashimoDartPhase==='idle'&&!f.kashimoAmberActive&&enemy.alive){
        f.kashimoDartPhase='throw';
        f.kashimoStaffMode=false;
        f.kashimoStaffThrown=true;
        f.kashimoStaffAngle=angle(f,enemy);
        f.kashimoDartDashes=0;
        f.kashimoDartMaxDashes=3+Math.floor(chaos*0.3);
        f.kashimoDartTimer=20; // throw animation
        SFX.kashimoThrow();
        spawnBurst(f.x,f.y,'#ffcc00',10,4);
        addLog((f.side===0?'P1':'P2')+' DART RUSH!');
      }

      // Dart rush state machine
      if(f.kashimoDartPhase==='throw'){
        f.kashimoDartTimer-=dt;
