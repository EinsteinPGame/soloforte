<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Notes - All Subjects</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a3a,#2a1a4a);padding:20px;text-align:center;border-bottom:2px solid #333}
.header h1{font-size:1.8em;background:linear-gradient(90deg,#7b68ee,#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#888;font-size:0.85em;margin-top:4px}
.subject-tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:16px;background:#111122}
.subject-tab{padding:10px 18px;border:2px solid #333;border-radius:8px;cursor:pointer;font-size:0.9em;font-weight:600;transition:all 0.2s;background:transparent;color:#aaa}
.subject-tab:hover{border-color:#7b68ee;color:#7b68ee}
.subject-tab.active{background:#7b68ee;color:#fff;border-color:#7b68ee}
.year-toggle{display:flex;justify-content:center;gap:12px;padding:12px;background:#0d0d22}
.year-btn{padding:8px 24px;border:2px solid #444;border-radius:20px;cursor:pointer;font-weight:600;background:transparent;color:#aaa;transition:all 0.2s}
.year-btn:hover{border-color:#00ccff;color:#00ccff}
.year-btn.active{background:#00ccff;color:#000;border-color:#00ccff}
.search-bar{padding:12px 20px;background:#0d0d22}
.search-bar input{width:100%;padding:10px 16px;border:2px solid #333;border-radius:8px;background:#1a1a2e;color:#fff;font-size:0.95em;outline:none}
.search-bar input:focus{border-color:#7b68ee}
.search-bar input::placeholder{color:#555}
.content{max-width:900px;margin:0 auto;padding:16px}
.topic-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color 0.2s}
.topic-card:hover{border-color:#7b68ee44}
.topic-header{padding:16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.topic-header:hover{background:#1e1e38}
.topic-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85em;flex-shrink:0}
.topic-title{flex:1}
.topic-title h3{font-size:1em;color:#fff;margin-bottom:2px}
.topic-title .summary{font-size:0.82em;color:#888;line-height:1.4}
.keywords{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.keyword{padding:2px 8px;background:#2a2a4a;border-radius:4px;font-size:0.72em;color:#7b68ee}
.expand-icon{color:#555;font-size:1.2em;transition:transform 0.3s;flex-shrink:0}
.topic-card.open .expand-icon{transform:rotate(180deg);color:#7b68ee}
.topic-details{display:none;padding:0 16px 16px;border-top:1px solid #2a2a4a;animation:slideDown 0.3s ease}
.topic-card.open .topic-details{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.detail-section{margin-top:12px}
.detail-section h4{color:#7b68ee;font-size:0.9em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.detail-section h4::before{content:'';width:3px;height:14px;background:#7b68ee;border-radius:2px}
.detail-section p,.detail-section ul{font-size:0.85em;color:#ccc;line-height:1.7}
.detail-section ul{padding-left:20px}
.detail-section li{margin-bottom:4px}
/* Fraction rendering */
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 3px;font-size:0.85em}
.frac .num{border-bottom:1.5px solid #ccc;padding:0 4px 2px;line-height:1.2}
.frac .den{padding:2px 4px 0;line-height:1.2}
.formula{background:#1e1e38;padding:8px 14px;border-radius:6px;margin:8px 0;font-family:'Courier New',monospace;color:#00ccff;display:inline-block}
/* Diagram containers */
.diagram{background:#12122a;border:1px solid #2a2a4a;border-radius:8px;padding:16px;margin:10px 0;text-align:center}
.diagram canvas{max-width:100%;border-radius:4px}
.diagram .caption{font-size:0.75em;color:#666;margin-top:6px}
/* SVG diagrams */
.diagram svg{max-width:100%;height:auto}
.no-results{text-align:center;padding:40px;color:#555;font-size:0.95em}
.stats-bar{display:flex;justify-content:center;gap:20px;padding:8px;background:#0a0a18;font-size:0.75em;color:#555}
@media(max-width:600px){
  .subject-tab{padding:8px 12px;font-size:0.8em}
  .header h1{font-size:1.3em}
  .content{padding:10px}
}
</style>
</head>

<p>A theme is NOT the same as a topic. Topic = love. Theme = "Love requires sacrifice and understanding."</p>
<p>Always link themes to specific evidence from the text.</p>
</div>`
      },
      {
        title: 'Literature Essay Writing',
        summary: 'How to structure and write effective literature essays and responses.',
        keywords: ['essay', 'literature essay', 'PEEL', 'thesis', 'close reading'],
        details: `<div class="detail-section"><h4>Essay Structure</h4>
<ul>
<li><b>Introduction:</b> Name the text/author, state your argument/thesis clearly</li>
<li><b>Body (PEEL):</b> Point → Evidence (quote) → Explanation → Link to question</li>
<li><b>Conclusion:</b> Summarise your argument, offer a final insight</li>
</ul></div>
<div class="detail-section"><h4>Top Tips</h4>
<ul>
<li>Always embed quotes: "The author describes the forest as 'a cathedral of green'" — not just dropping them in</li>
<li>Analyse language: don't just say WHAT happens — explain HOW the writer achieves the effect</li>
<li>Use literary terms naturally: "The simile... suggests..."</li>
<li>Link back to the question at the end of every paragraph</li>
<li>Write about the writer's PURPOSE: "The author uses this to convey..."</li>
</ul></div>`
      },
      {
        title: 'Comparative Analysis',
        summary: 'Comparing two texts or characters: similarities, differences, and techniques.',
        keywords: ['comparison', 'contrast', 'similarly', 'whereas', 'both texts'],
        details: `<div class="detail-section"><h4>How to Compare</h4>
<ul>
<li><b>Structure:</b> Compare point-by-point (not text-by-text). For each point, discuss both texts</li>
<li><b>Similarities:</b> "Both texts explore the theme of... Similarly, Text B also..."</li>
<li><b>Differences:</b> "While Text A presents... Text B takes a contrasting approach..."</li>
<li><b>Techniques:</b> Compare HOW each writer achieves their effect, not just what happens</li>
</ul></div>
<div class="detail-section"><h4>Useful Comparison Phrases</h4>
<ul>
<li>Similarly / Likewise / In the same way</li>
<li>In contrast / However / On the other hand / Whereas</li>
<li>Both writers... / While [Author A]... [Author B]...</li>
<li>"This is reminiscent of..." / "This echoes..."</li>
</ul></div>`
      },
    ],
  },
};

// ============================================================
// APP LOGIC
// ============================================================
let currentSubject = 'math';
let currentYear = 1;

function init() {
  // Build subject tabs
  const tabsEl = document.getElementById('subjectTabs');
  SUBJECTS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'subject-tab' + (s.id === currentSubject ? ' active' : '');
    btn.style.setProperty('--sc', s.color);
    btn.textContent = s.name;
    btn.onclick = () => setSubject(s.id);
    btn.dataset.id = s.id;
    tabsEl.appendChild(btn);
  });
  render();
}

function setSubject(id) {
  currentSubject = id;
  document.querySelectorAll('.subject-tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  render();
}

function setYear(y) {
  currentYear = y;
  document.querySelectorAll('.year-btn').forEach((b, i) => b.classList.toggle('active', i === y - 1));
  render();
}

function filterTopics() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  document.querySelectorAll('.topic-card').forEach(card => {
    if (!q) { card.style.display = ''; return; }
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(q) ? '' : 'none';
  });
  updateStats();
}

function updateStats() {
  const visible = document.querySelectorAll('.topic-card:not([style*="display: none"])').length;
  const total = document.querySelectorAll('.topic-card').length;
  const sub = SUBJECTS.find(s => s.id === currentSubject);
  document.getElementById('statsBar').textContent =
    sub.name + ' — Year ' + currentYear + ' — ' + visible + (visible !== total ? '/' + total : '') + ' topics';
}

function render() {
  const el = document.getElementById('content');
  const topics = DATA[currentSubject]?.[currentYear] || [];
  const sub = SUBJECTS.find(s => s.id === currentSubject);

  if (topics.length === 0) {
    el.innerHTML = '<div class="no-results">No topics available yet for this selection.</div>';
    updateStats();
    return;
  }

  el.innerHTML = topics.map((t, i) => `
    <div class="topic-card" onclick="toggleTopic(this)">
      <div class="topic-header">
        <div class="topic-num" style="background:${sub.color}22;color:${sub.color}">${i + 1}</div>
        <div class="topic-title">
          <h3>${t.title}</h3>
          <div class="summary">${t.summary}</div>
          <div class="keywords">${t.keywords.map(k => '<span class="keyword">' + k + '</span>').join('')}</div>
        </div>
        <span class="expand-icon">&#9660;</span>
      </div>
      <div class="topic-details">${t.details}</div>
    </div>
  `).join('');

  document.getElementById('searchInput').value = '';
  updateStats();
}

function toggleTopic(card) {
  card.classList.toggle('open');
}

init();
</script>
</body>
</html>
