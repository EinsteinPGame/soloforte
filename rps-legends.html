// WEB AUDIO API — SFX SYSTEM
// ============================================================
const SFX={
  ctx:null,
  _init(){if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},
  _tone(freq,dur,type,vol,delay){
    this._init();if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(freq,this.ctx.currentTime);
    g.gain.setValueAtTime(vol||0.15,this.ctx.currentTime+(delay||0));
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+(delay||0)+dur);
    o.connect(g);g.connect(this.ctx.destination);
    o.start(this.ctx.currentTime+(delay||0));o.stop(this.ctx.currentTime+(delay||0)+dur);
  },
  _noise(dur,vol){
    this._init();if(!this.ctx)return;
    const bufSz=this.ctx.sampleRate*dur;const buf=this.ctx.createBuffer(1,bufSz,this.ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<bufSz;i++)d[i]=(Math.random()*2-1)*(vol||0.1);
    const s=this.ctx.createBufferSource();const g=this.ctx.createGain();
    s.buffer=buf;g.gain.setValueAtTime(vol||0.1,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    s.connect(g);g.connect(this.ctx.destination);s.start();s.stop(this.ctx.currentTime+dur);
  },
  click(){this._tone(800,0.05,'square',0.06)},
  hit(type){
    if(type==='Rock'){this._tone(120,0.15,'sine',0.2);this._noise(0.1,0.12)}
    else if(type==='Paper'){this._tone(400,0.12,'sine',0.1);this._tone(600,0.08,'sine',0.08,0.04)}
    else if(type==='Scissors'){this._tone(900,0.08,'sawtooth',0.12);this._tone(1200,0.06,'sawtooth',0.1,0.03)}
    else{this._tone(300,0.12,'triangle',0.12)}
  },
  crit(){this._tone(600,0.1,'sawtooth',0.25);this._tone(900,0.15,'square',0.2,0.05);this._noise(0.08,0.15)},
  superEffective(){this._tone(500,0.08,'square',0.2);this._tone(700,0.1,'square',0.18,0.08);this._tone(1000,0.12,'square',0.15,0.16)},
  buff(){this._tone(400,0.1,'sine',0.12);this._tone(500,0.1,'sine',0.1,0.1);this._tone(600,0.12,'sine',0.08,0.2)},
  heal(){this._tone(440,0.12,'sine',0.1);this._tone(550,0.12,'sine',0.08,0.12);this._tone(660,0.15,'sine',0.06,0.24)},
  statusApplied(){this._tone(150,0.2,'sawtooth',0.1);this._tone(120,0.15,'square',0.08,0.1)},
  death(){this._tone(300,0.15,'sine',0.2);this._tone(200,0.2,'sine',0.15,0.15);this._tone(100,0.3,'sine',0.1,0.35)},
  victory(){[523,659,784,1047].forEach((f,i)=>this._tone(f,0.2,'sine',0.15,i*0.15))},
  bossAppear(){this._tone(80,0.3,'sawtooth',0.25);this._tone(60,0.4,'sawtooth',0.2,0.3);this._noise(0.2,0.1)},

  pickup(){this._tone(800,0.06,'sine',0.1);this._tone(1000,0.08,'sine',0.08,0.06)},
};

function drawRockShape(cx,cy,sz,c1,c2,rot){
  X.save();X.translate(cx,cy);X.rotate(rot||0);
  X.fillStyle=c1;X.beginPath();
  X.moveTo(-sz*0.8,-sz*0.3);X.lineTo(-sz*0.4,-sz);X.lineTo(sz*0.3,-sz*0.8);
  X.lineTo(sz*0.9,-sz*0.1);X.lineTo(sz*0.6,sz*0.7);X.lineTo(-sz*0.2,sz*0.9);
  X.lineTo(-sz*0.9,sz*0.4);X.closePath();X.fill();
  X.fillStyle=c2;X.beginPath();
  X.moveTo(-sz*0.3,-sz*0.2);X.lineTo(sz*0.1,-sz*0.6);X.lineTo(sz*0.5,0);
  X.lineTo(0,sz*0.3);X.closePath();X.fill();
  X.restore();
}
function drawBladeShape(cx,cy,len,w,c,rot){
  X.save();X.translate(cx,cy);X.rotate(rot||0);
  X.fillStyle=c;X.beginPath();
  X.moveTo(-len/2,0);X.lineTo(-len/4,-w/2);X.lineTo(len/2,0);
  X.lineTo(-len/4,w/2);X.closePath();X.fill();
  X.strokeStyle='rgba(255,255,255,0.5)';X.lineWidth=1;
  X.beginPath();X.moveTo(-len/3,0);X.lineTo(len/2,0);X.stroke();
  X.restore();
}
function drawPaperShape(cx,cy,sz,c,rot){
  X.save();X.translate(cx,cy);X.rotate(rot||0);
  X.fillStyle=c;X.fillRect(-sz/2,-sz*0.7,sz,sz*1.4);
  X.strokeStyle='rgba(0,0,0,0.2)';X.lineWidth=1;
  for(let i=-2;i<=2;i++)X.strokeRect(-sz/2+2,-sz*0.7+sz*0.28*i+sz*0.14,sz-4,0);
  X.restore();
}
function drawStarShape(cx,cy,sz,c,rot,points){
  const p=points||4;X.save();X.translate(cx,cy);X.rotate(rot||0);
  X.fillStyle=c;X.beginPath();
  for(let i=0;i<p*2;i++){const a=i*Math.PI/p-Math.PI/2;const r=i%2===0?sz:sz*0.4;
    i===0?X.moveTo(Math.cos(a)*r,Math.sin(a)*r):X.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
  X.closePath();X.fill();X.restore();
}
function drawFlameParticle(cx,cy,sz,t){
  const colors=['#ff2200','#ff6600','#ffaa00','#ffdd44'];
  colors.forEach((c,i)=>{X.fillStyle=c;X.globalAlpha=0.8-i*0.15-t*0.3;
    X.beginPath();X.arc(cx+(Math.random()-0.5)*4,cy-i*sz*0.3+(Math.random()-0.5)*3,sz*(1-i*0.2),0,Math.PI*2);X.fill()});
}
function drawIceCrystal(cx,cy,sz,c,rot){
  X.save();X.translate(cx,cy);X.rotate(rot||0);X.strokeStyle=c;X.lineWidth=2;X.lineCap='round';
  for(let i=0;i<6;i++){const a=i*Math.PI/3;
    X.beginPath();X.moveTo(0,0);X.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);X.stroke();
    X.beginPath();X.moveTo(Math.cos(a)*sz*0.5+Math.cos(a+0.5)*sz*0.3,Math.sin(a)*sz*0.5+Math.sin(a+0.5)*sz*0.3);
    X.lineTo(Math.cos(a)*sz*0.5,Math.sin(a)*sz*0.5);
    X.lineTo(Math.cos(a)*sz*0.5+Math.cos(a-0.5)*sz*0.3,Math.sin(a)*sz*0.5+Math.sin(a-0.5)*sz*0.3);X.stroke()}
  X.restore();
}
function drawLightningBolt(x1,y1,x2,y2,c,w,segments){
  const segs=segments||8;X.strokeStyle=c;X.lineWidth=w;X.lineCap='round';X.beginPath();X.moveTo(x1,y1);
  for(let i=1;i<segs;i++){const f=i/segs;const mx=x1+(x2-x1)*f+(Math.random()-0.5)*30;
    const my=y1+(y2-y1)*f+(Math.random()-0.5)*20;X.lineTo(mx,my)}
  X.lineTo(x2,y2);X.stroke();
}
function drawCraneShape(cx,cy,sz,c,rot){
  X.save();X.translate(cx,cy);X.rotate(rot||0);X.fillStyle=c;
  X.beginPath();X.moveTo(-sz,0);X.lineTo(-sz*0.3,-sz*0.5);X.lineTo(sz*0.5,0);
  X.lineTo(-sz*0.3,sz*0.5);X.closePath();X.fill();
  X.beginPath();X.moveTo(-sz*0.3,-sz*0.3);X.lineTo(0,-sz*0.8);X.lineTo(sz*0.2,-sz*0.3);X.closePath();X.fill();
  X.beginPath();X.moveTo(-sz*0.3,sz*0.3);X.lineTo(0,sz*0.8);X.lineTo(sz*0.2,sz*0.3);X.closePath();X.fill();
  X.restore();
}
function drawVineWrap(cx,cy,radius,t,c){
  X.strokeStyle=c;X.lineWidth=3;X.lineCap='round';
  for(let v=0;v<4;v++){X.beginPath();
    for(let i=0;i<=20;i++){const a=v*Math.PI/2+i*0.5*t*Math.PI;const r=radius*(0.5+0.5*Math.sin(i*0.3+v));
      const px=cx+Math.cos(a)*r;const py=cy+Math.sin(a)*r;i===0?X.moveTo(px,py):X.lineTo(px,py)}X.stroke()}
}

// Animation state
let animState=null;

function getAnimConfig(moveName){
  if(MOVE_ANIMS[moveName])return MOVE_ANIMS[moveName];
  const base=moveName.replace(/\s+(II|III|IV|V|VI)$/,'');
  if(MOVE_ANIMS[base])return MOVE_ANIMS[base];
  return{type:'projectile',color:'#ffffff',color2:'#aaaaaa',shape:'ball',size:10,trail:'sparks',impact:'flash'};
}

function startMoveAnim(moveName,isPlayerAttack,moveType){
  const cfg=getAnimConfig(moveName);
  const pX=isMobile?100:145, pY=isMobile?80:105;
  const eX=isMobile?W-100:W-145, eY=isMobile?80:112;
  const fromX=isPlayerAttack?pX:eX, fromY=isPlayerAttack?pY:eY;
  const toX=isPlayerAttack?eX:pX, toY=isPlayerAttack?eY:pY;
  // Variable durations: buffs short, signature moves longer
  let dur=500;
  if(moveType==='Buff'||cfg.type==='buff')dur=450;
  else if(cfg.type==='delayed')dur=1000;
  else if(cfg.type==='multi')dur=900;
  else if(cfg.type==='roll')dur=800;
  else if(cfg.type==='chaos')dur=700;
  else if(cfg.type==='vortex'||cfg.type==='implosion')dur=850;
  else if(cfg.type==='rain')dur=750;
  else if(cfg.type==='surround')dur=700;
  else if(cfg.impact==='bigshake')dur=700;
  else dur=550;

  animState={
    active:true,t:0,duration:dur,
    type:cfg.type,fromX,fromY,toX,toY,
    color:cfg.color||'#fff',color2:cfg.color2||'#aaa',
    shape:cfg.shape||'ball',size:cfg.size||12,
    trail:cfg.trail||null,impact:cfg.impact||'flash',
    spin:cfg.spin||false,count:cfg.count||8,
    speed:cfg.speed||1,
    extra:cfg.extra||null,
    isBuff:moveType==='Buff'||(cfg.extra==='heal')||(cfg.type==='buff'),
    particleList:[],
    hitTriggered:false
  };
  // Pre-generate particles for various effects
  for(let i=0;i<30;i++){
    animState.particleList.push({
      x:0,y:0,
      vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,
      life:0.3+Math.random()*0.7,sz:2+Math.random()*5,
      color:Math.random()>0.5?cfg.color:cfg.color2,
      ang:Math.random()*Math.PI*2,
      delay:Math.random()*0.5
    });
  }
}

// Hit impact helper — triggers shake and enemy flash
function triggerHitImpact(impactType){
  if(impactType==='bigshake'){triggerShake(8);enemyHitFlash=12}
  else if(impactType==='shake'){triggerShake(4);enemyHitFlash=8}
  else if(impactType==='flash'){triggerShake(1);enemyHitFlash=10}
  else if(impactType==='freeze'){triggerShake(3);enemyHitFlash=15}
  else if(impactType==='poison'){triggerShake(2);enemyHitFlash=8}
  else if(impactType==='splash'){triggerShake(2);enemyHitFlash=6}
  else{triggerShake(1);enemyHitFlash=6}
}

// Trail drawing helper
function drawTrail(positions,color,color2,trailType,sz){
  positions.forEach((p,i)=>{
    const alpha=0.6-i*0.1;if(alpha<=0)return;
    X.globalAlpha=alpha;const s=sz*(1-i*0.12);
    if(trailType==='fire'){
      drawFlameParticle(p.x,p.y,s*0.6,i*0.1);
    }else if(trailType==='frost'||trailType==='ice'){
      X.fillStyle='#d0f0ff';X.beginPath();X.arc(p.x+(Math.random()-0.5)*4,p.y+(Math.random()-0.5)*4,s*0.5,0,Math.PI*2);X.fill();
    }else if(trailType==='dark'){
      X.fillStyle='rgba(30,0,60,0.6)';X.beginPath();X.arc(p.x,p.y,s*0.8,0,Math.PI*2);X.fill();
    }else if(trailType==='magic'){
      X.fillStyle=i%2?color:color2;drawStarShape(p.x,p.y,s*0.4,X.fillStyle,i*0.5,4);
    }else if(trailType==='sparkle'){
      X.fillStyle='#ffffff';X.beginPath();X.arc(p.x+(Math.random()-0.5)*6,p.y+(Math.random()-0.5)*6,2,0,Math.PI*2);X.fill();
    }else if(trailType==='poison'||trailType==='drip'){
      X.fillStyle='#8000c0';X.beginPath();X.arc(p.x,p.y+i*2,s*0.4+Math.random()*2,0,Math.PI*2);X.fill();
    }else if(trailType==='blood'){
      X.fillStyle='#aa0000';for(let d=0;d<3;d++){X.beginPath();X.arc(p.x+(Math.random()-0.5)*8,p.y+(Math.random()-0.5)*8+i*2,1+Math.random()*2,0,Math.PI*2);X.fill()}
    }else if(trailType==='ink'){
      X.fillStyle='#1828aa';X.beginPath();X.arc(p.x+(Math.random()-0.5)*5,p.y+(Math.random()-0.5)*5,s*0.5+Math.random()*2,0,Math.PI*2);X.fill();
    }else if(trailType==='shadow'){
      X.fillStyle='rgba(40,30,60,0.5)';X.beginPath();X.arc(p.x,p.y,s*0.7,0,Math.PI*2);X.fill();
    }else if(trailType==='dust'){
      X.fillStyle='#c8b496';for(let d=0;d<2;d++){X.beginPath();X.arc(p.x+(Math.random()-0.5)*8,p.y+Math.random()*4,2+Math.random()*2,0,Math.PI*2);X.fill()}
    }else if(trailType==='sparks'){
      X.fillStyle='#ffdd88';for(let d=0;d<2;d++){X.beginPath();X.arc(p.x+(Math.random()-0.5)*6,p.y+(Math.random()-0.5)*6,1+Math.random(),0,Math.PI*2);X.fill()}
    }else if(trailType==='paper'){
      X.fillStyle=color;X.save();X.translate(p.x,p.y);X.rotate(i*0.3);X.fillRect(-3,-4,6,8);X.restore();
    }else{
      X.fillStyle=color;X.beginPath();X.arc(p.x,p.y,s*0.5,0,Math.PI*2);X.fill();
    }
  });
  X.globalAlpha=1;
}

// Main projectile shape drawer
function drawProjectileShape(cx,cy,sz,shape,color,color2,rot,t){
  if(shape==='rock'||shape==='dark_rock'||shape==='fossil'){
    drawRockShape(cx,cy,sz,color,color2,rot);
  }else if(shape==='ice'||shape==='ice_rock'){
    drawRockShape(cx,cy,sz,color,'#ffffff',rot);
    X.fillStyle='rgba(200,240,255,0.4)';X.beginPath();X.arc(cx,cy,sz*0.8,0,Math.PI*2);X.fill();
  }else if(shape==='flame_rock'||shape==='lava'){
    drawRockShape(cx,cy,sz,'#883300',color2,rot);
    drawFlameParticle(cx,cy-sz*0.5,sz*0.6,t);
  }else if(shape==='meteor'){
    drawRockShape(cx,cy,sz*1.2,'#884400','#cc6600',rot);
    drawFlameParticle(cx-sz*0.3,cy,sz*0.8,t);drawFlameParticle(cx+sz*0.2,cy+sz*0.2,sz*0.5,t);
  }else if(shape==='crystal'){
    X.fillStyle=color;X.beginPath();X.moveTo(cx,cy-sz);X.lineTo(cx+sz*0.6,cy);X.lineTo(cx,cy+sz*0.6);X.lineTo(cx-sz*0.6,cy);X.closePath();X.fill();
    X.fillStyle=color2;X.beginPath();X.moveTo(cx,cy-sz);X.lineTo(cx+sz*0.3,cy-sz*0.2);X.lineTo(cx,cy+sz*0.3);X.lineTo(cx-sz*0.3,cy-sz*0.2);X.closePath();X.fill();
  }else if(shape==='page'||shape==='scroll'||shape==='dark_page'){
    drawPaperShape(cx,cy,sz,color,rot);
  }else if(shape==='crane'){
    drawCraneShape(cx,cy,sz,color,rot);
  }else if(shape==='star'){
    drawStarShape(cx,cy,sz,color,rot,4);
  }else if(shape==='disc'){
    X.save();X.translate(cx,cy);X.rotate(rot);X.fillStyle=color;X.beginPath();X.ellipse(0,0,sz,sz*0.5,0,0,Math.PI*2);X.fill();
    X.strokeStyle=color2;X.lineWidth=2;X.beginPath();X.ellipse(0,0,sz*0.7,sz*0.35,0,0,Math.PI*2);X.stroke();X.restore();
  }else if(shape==='rune'){
    X.fillStyle=color;X.beginPath();X.arc(cx,cy,sz,0,Math.PI*2);X.fill();
    X.strokeStyle=color2;X.lineWidth=2;X.font='bold '+Math.round(sz*1.2)+'px Consolas,monospace';X.textAlign='center';X.textBaseline='middle';
    X.fillStyle=color2;X.fillText(pick(['R','X','Z','W','Y']),cx,cy);
  }else if(shape==='book'){
    X.fillStyle='#8B4513';X.fillRect(cx-sz*0.6,cy-sz*0.5,sz*1.2,sz);
    X.fillStyle=color;X.fillRect(cx-sz*0.5,cy-sz*0.4,sz,sz*0.8);
    X.strokeStyle=color2;X.lineWidth=1;X.strokeRect(cx-sz*0.5,cy-sz*0.4,sz,sz*0.8);
  }else if(shape==='kunai'){
    X.save();X.translate(cx,cy);X.rotate(rot||0);X.fillStyle=color;
    X.beginPath();X.moveTo(-sz,0);X.lineTo(0,-sz*0.3);X.lineTo(sz*0.8,0);X.lineTo(0,sz*0.3);X.closePath();X.fill();
    X.fillStyle='#8b4513';X.fillRect(-sz*1.2,-sz*0.1,sz*0.4,sz*0.2);X.restore();
  }else if(shape==='fang'){
    X.save();X.translate(cx,cy);X.rotate(rot||0);X.fillStyle=color;
    X.beginPath();X.moveTo(-sz*0.3,-sz);X.quadraticCurveTo(sz*0.2,-sz*0.3,sz*0.1,sz*0.5);
    X.lineTo(-sz*0.1,sz*0.5);X.quadraticCurveTo(-sz*0.6,-sz*0.3,-sz*0.3,-sz);X.fill();X.restore();
  }else if(shape==='fist'||shape==='fist_big'){
    const m=shape==='fist_big'?1.3:1;X.fillStyle=color;
    X.beginPath();X.arc(cx,cy,sz*0.7*m,0,Math.PI*2);X.fill();
    X.fillStyle=color2;for(let f=0;f<4;f++){X.beginPath();X.arc(cx+sz*0.3*m*Math.cos(f*0.4-0.6),cy-sz*0.5*m+f*sz*0.2*m,sz*0.18*m,0,Math.PI*2);X.fill()}
  }else if(shape==='spirit'){
    X.globalAlpha=0.7;X.fillStyle=color;X.beginPath();X.arc(cx,cy,sz,0,Math.PI*2);X.fill();
    X.globalAlpha=0.5;X.fillStyle=color2;X.beginPath();X.arc(cx,cy,sz*0.6,0,Math.PI*2);X.fill();
    X.globalAlpha=0.3;for(let i=0;i<4;i++){const a=t*5+i*Math.PI/2;X.fillStyle=color;X.beginPath();X.arc(cx+Math.cos(a)*sz*0.8,cy+Math.sin(a)*sz*0.8,sz*0.3,0,Math.PI*2);X.fill()}
    X.globalAlpha=1;
  }else if(shape==='inkblob'){
    X.fillStyle=color;for(let b=0;b<5;b++){X.beginPath();X.arc(cx+(Math.random()-0.5)*sz*0.6,cy+(Math.random()-0.5)*sz*0.6,sz*0.4+Math.random()*sz*0.3,0,Math.PI*2);X.fill()}
  }else if(shape==='marble'){
    X.fillStyle=color;X.beginPath();X.arc(cx,cy,sz,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,255,255,0.5)';X.beginPath();X.arc(cx-sz*0.25,cy-sz*0.25,sz*0.35,0,Math.PI*2);X.fill();
    X.strokeStyle=color2;X.lineWidth=2;X.beginPath();X.arc(cx,cy,sz,0,Math.PI*2);X.stroke();
  }else if(shape==='leaf'){
    X.save();X.translate(cx,cy);X.rotate(rot||0);X.fillStyle=color;
    X.beginPath();X.moveTo(-sz,0);X.quadraticCurveTo(0,-sz*0.8,sz,0);X.quadraticCurveTo(0,sz*0.8,-sz,0);X.fill();
    X.strokeStyle='#2a6a2a';X.lineWidth=1;X.beginPath();X.moveTo(-sz,0);X.lineTo(sz,0);X.stroke();X.restore();
  }else{
    // Default ball
    X.fillStyle=color;X.beginPath();X.arc(cx,cy,sz,0,Math.PI*2);X.fill();
    X.fillStyle=color2;X.beginPath();X.arc(cx,cy,sz*0.6,0,Math.PI*2);X.fill();
  }
}

function updateAndDrawAnim(){
  if(!animState||!animState.active)return false;
  const a=animState;
  const dt=16.67/a.duration;
  a.t+=dt;
  if(a.t>=1){a.active=false;return false}
  const t=a.t;

  // Apply screen shake
  updateShake();
  X.save();
  X.translate(screenShake.x,screenShake.y);
  X.globalAlpha=1;

  // Trigger hit impact at the right moment
  const hitTime=a.type==='delayed'?0.7:(a.type==='roll'||a.type==='lunge'?0.8:(a.type==='beam'||a.type==='rainbow_beam'||a.type==='lightning'?0.45:0.7));
  if(!a.hitTriggered&&t>=hitTime&&!a.isBuff){
    triggerHitImpact(a.impact);
    a.hitTriggered=true;
  }

  // ===== BUFF / HEAL ANIMATIONS =====
  if(a.isBuff||a.type==='buff'){
    const cx=a.fromX,cy=a.fromY;
    // Buff-specific shapes
    if(a.shape==='shell'||a.shape==='ice_shell'||a.shape==='crystal_shell'){
      // Stone/ice shell forming around character
      const expand=t<0.5?t/0.5:1;const fade=t>0.7?(1-(t-0.7)/0.3):1;
      X.globalAlpha=fade*0.6;
      for(let i=0;i<8;i++){const ang=i*Math.PI/4;const r=20*expand+5;
        const px=cx+Math.cos(ang)*r;const py=cy+Math.sin(ang)*r;
        X.fillStyle=a.color;X.fillRect(px-4,py-4,8*expand,8*expand)}
      X.globalAlpha=fade*0.3;X.fillStyle=a.color;X.beginPath();X.arc(cx,cy,25*expand,0,Math.PI*2);X.fill();
    }else if(a.shape==='shield'||a.shape==='wall'||a.shape==='titan_wall'){
      // Shield forming in front
      const expand=t<0.4?t/0.4:1;const fade=t>0.7?(1-(t-0.7)/0.3):1;
      const sw=a.shape==='titan_wall'?50:35;
      X.globalAlpha=fade*0.7;X.fillStyle=a.color;
      X.beginPath();X.arc(cx+20,cy,sw*expand,Math.PI*1.3,Math.PI*0.7);X.fill();
      X.strokeStyle=a.color2;X.lineWidth=3;X.beginPath();X.arc(cx+20,cy,sw*expand,Math.PI*1.3,Math.PI*0.7);X.stroke();
    }else if(a.shape==='fire_aura'||a.shape==='magma'){
      // Fire licking up around character
      for(let i=0;i<6;i++){const ang=i*Math.PI/3+t*2;const r=15+Math.sin(t*8+i)*5;
        X.globalAlpha=0.8-t*0.5;drawFlameParticle(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r-t*15,5,t)}
    }else if(a.shape==='electric'){
      // Sparks jumping around character
      X.globalAlpha=0.8-t*0.3;
      for(let i=0;i<4;i++){const a1=Math.random()*Math.PI*2;const a2=a1+Math.random()*2-1;
        drawLightningBolt(cx+Math.cos(a1)*10,cy+Math.sin(a1)*10,cx+Math.cos(a2)*25,cy+Math.sin(a2)*25,a.color,2,4)}
    }else if(a.shape==='smoke'||a.shape==='clone'){
      // Smoke poof
      const expand=t<0.3?t/0.3:1;const fade=t>0.4?(1-(t-0.4)/0.6):1;
      for(let i=0;i<8;i++){X.globalAlpha=fade*0.4;X.fillStyle=i%2?a.color:a.color2;
        const px=cx+(Math.random()-0.5)*40*expand;const py=cy+(Math.random()-0.5)*30*expand-t*20;
        X.beginPath();X.arc(px,py,6+Math.random()*8,0,Math.PI*2);X.fill()}
    }else if(a.shape==='howl'){
      // Sound waves expanding outward
      for(let i=0;i<4;i++){const r=(20+i*15)*t*2;X.globalAlpha=(1-t)*(1-i*0.2);
        X.strokeStyle=a.color;X.lineWidth=2;X.beginPath();X.arc(cx,cy,r,Math.PI*0.3,Math.PI*0.7);X.stroke();
        X.beginPath();X.arc(cx,cy,r,Math.PI*1.3,Math.PI*1.7);X.stroke()}
    }else if(a.shape==='flower'||a.shape==='sprout'){
      // Bloom effect with petals opening
      const expand=t<0.5?t/0.5:1;const fade=t>0.8?(1-(t-0.8)/0.2):1;
      X.globalAlpha=fade;
      for(let i=0;i<6;i++){const ang=i*Math.PI/3+t;
        X.fillStyle=i%2?a.color:a.color2;
        X.beginPath();const px=cx+Math.cos(ang)*12*expand;const py=cy+Math.sin(ang)*12*expand;
        X.ellipse(px,py,8*expand,4*expand,ang,0,Math.PI*2);X.fill()}
      X.fillStyle='#ffff00';X.beginPath();X.arc(cx,cy,5,0,Math.PI*2);X.fill();
    }else if(a.shape==='rune_circle'||a.shape==='ward'){
      // Glowing rune circle appears beneath
      const expand=t<0.4?t/0.4:1;const fade=t>0.7?(1-(t-0.7)/0.3):1;
      X.globalAlpha=fade*0.6;X.strokeStyle=a.color;X.lineWidth=2;
      X.beginPath();X.arc(cx,cy+15,25*expand,0,Math.PI*2);X.stroke();
      X.strokeStyle=a.color2;X.beginPath();X.arc(cx,cy+15,18*expand,0,Math.PI*2);X.stroke();
      // Rune symbols
      for(let i=0;i<6;i++){const ang=i*Math.PI/3+t*2;const r=22*expand;
        X.fillStyle=a.color2;X.font='8px Consolas';X.textAlign='center';
        X.fillText(pick(['*','+','o','x']),cx+Math.cos(ang)*r,cy+15+Math.sin(ang)*r)}
    }else if(a.shape==='halo'||a.shape==='focus'){
      // Halo above head
      const expand=t<0.3?t/0.3:1;const fade=t>0.7?(1-(t-0.7)/0.3):1;
      X.globalAlpha=fade*0.8;X.strokeStyle=a.color;X.lineWidth=3;
      X.beginPath();X.ellipse(cx,cy-30,20*expand,6*expand,0,0,Math.PI*2);X.stroke();
      X.strokeStyle=a.color2;X.lineWidth=1;X.beginPath();X.ellipse(cx,cy-30,22*expand,8*expand,0,0,Math.PI*2);X.stroke();
    }else if(a.shape==='blood_aura'){
      // Blood dripping upward
      for(let i=0;i<6;i++){const px=cx+(Math.random()-0.5)*30;const py=cy-t*40-Math.random()*20;
        X.globalAlpha=(1-t)*0.7;X.fillStyle='#cc0000';X.beginPath();X.arc(px,py,2+Math.random()*3,0,Math.PI*2);X.fill()}
    }else if(a.shape==='crane_circle'){
      // Cranes circling
      const fade=t>0.8?(1-(t-0.8)/0.2):1;X.globalAlpha=fade;
      for(let i=0;i<6;i++){const ang=t*Math.PI*3+i*Math.PI/3;const r=20+t*10;
        drawCraneShape(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r,5,a.color,ang+Math.PI/2)}
    }else if(a.shape==='eye'||a.shape==='eye_dark'||a.shape==='predator'){
      // Eye opening above character
      const open=t<0.3?t/0.3:(t>0.7?(1-(t-0.7)/0.3):1);
      X.globalAlpha=open*0.8;X.fillStyle=a.color;
      X.beginPath();X.ellipse(cx,cy-25,15,8*open,0,0,Math.PI*2);X.fill();
      X.fillStyle=a.shape==='eye_dark'?'#ff0000':'#000';X.beginPath();X.arc(cx,cy-25,4*open,0,Math.PI*2);X.fill();
    }else if(a.shape==='mandala'){
      // Mandala pattern
      const expand=t<0.5?t/0.5:1;const fade=t>0.7?(1-(t-0.7)/0.3):1;
      X.globalAlpha=fade*0.5;X.strokeStyle=a.color;X.lineWidth=1;
      for(let r=10;r<=30;r+=10){X.beginPath();X.arc(cx,cy,r*expand,0,Math.PI*2);X.stroke()}
      for(let i=0;i<8;i++){const ang=i*Math.PI/4+t;X.beginPath();X.moveTo(cx,cy);
        X.lineTo(cx+Math.cos(ang)*30*expand,cy+Math.sin(ang)*30*expand);X.stroke()}
    }else if(a.shape==='absorb'){
      // Particles pulling inward
      for(let i=0;i<8;i++){const ang=i*Math.PI/4+t*3;const r=30*(1-t)+5;
        X.globalAlpha=(1-t)*0.7;X.fillStyle=a.color2;X.beginPath();
        X.arc(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r,3,0,Math.PI*2);X.fill()}
    }else if(a.shape==='drip'){
      // Acid/poison dripping
      for(let i=0;i<5;i++){X.globalAlpha=(1-t)*0.7;X.fillStyle=a.color;
        const px=cx+(i-2)*8;const py=cy-10+t*30+Math.sin(i*2)*5;
        X.beginPath();X.arc(px,py,3,0,Math.PI*2);X.fill();
        X.beginPath();X.moveTo(px,py-4);X.lineTo(px-2,py);X.lineTo(px+2,py);X.closePath();X.fill()}
    }else if(a.shape==='cocoon'){
      const expand=t<0.5?t/0.5:1;const fade=t>0.7?(1-(t-0.7)/0.3):1;
      X.globalAlpha=fade*0.5;X.fillStyle=a.color;
      X.beginPath();X.ellipse(cx,cy,15*expand,22*expand,0,0,Math.PI*2);X.fill();
      X.strokeStyle=a.color2;X.lineWidth=1;
      for(let i=0;i<6;i++){const y2=cy-20+i*8;X.beginPath();X.moveTo(cx-15*expand,y2);X.bezierCurveTo(cx-5,y2-4,cx+5,y2+4,cx+15*expand,y2);X.stroke()}
    }else if(a.shape==='data_ring'){
      const r=20+t*10;const fade=t>0.7?(1-(t-0.7)/0.3):1;X.globalAlpha=fade*0.7;
      X.strokeStyle=a.color;X.lineWidth=1;X.beginPath();X.arc(cx,cy,r,0,Math.PI*2);X.stroke();
      X.font='8px Consolas';X.fillStyle=a.color2;
      for(let i=0;i<8;i++){const ang=i*Math.PI/4+t*4;X.fillText(pick(['0','1']),cx+Math.cos(ang)*r,cy+Math.sin(ang)*r)}
    }else{
      // Default buff: radial glow + rising particles
      const rad=30+t*25;
      const g=X.createRadialGradient(cx,cy,5,cx,cy,rad);
      g.addColorStop(0,a.color+'88');g.addColorStop(0.5,a.color+'44');g.addColorStop(1,a.color+'00');
      X.fillStyle=g;X.beginPath();X.arc(cx,cy,rad,0,Math.PI*2);X.fill();
      for(let i=0;i<8;i++){const px=cx+(Math.sin(t*10+i*0.8))*20;const py=cy-t*60-i*5;
        X.globalAlpha=1-t;X.fillStyle=a.color2;X.beginPath();X.arc(px,py,3,0,Math.PI*2);X.fill()}
    }
  }
  // ===== PROJECTILE =====
  else if(a.type==='projectile'){
    const px=a.fromX+(a.toX-a.fromX)*t;
    const py=a.fromY+(a.toY-a.fromY)*t-Math.sin(t*Math.PI)*30;
    const rot=a.spin?t*Math.PI*6:Math.atan2(a.toY-a.fromY,a.toX-a.fromX);
    // Trail positions
    const trails=[];
    for(let i=1;i<=6;i++){const tt=Math.max(0,t-i*0.035);
      trails.push({x:a.fromX+(a.toX-a.fromX)*tt,y:a.fromY+(a.toY-a.fromY)*tt-Math.sin(tt*Math.PI)*30})}
    drawTrail(trails,a.color,a.color2,a.trail,a.size);
    X.globalAlpha=1;
    drawProjectileShape(px,py,a.size,a.shape,a.color,a.color2,rot,t);
    // Impact burst at end
    if(t>0.85){const it=(t-0.85)/0.15;X.globalAlpha=1-it;
      a.particleList.slice(0,10).forEach((p,i)=>{const ipx=a.toX+p.vx*it*25;const ipy=a.toY+p.vy*it*25;
        X.fillStyle=p.color;X.beginPath();X.arc(ipx,ipy,p.sz*(1-it),0,Math.PI*2);X.fill()})}
  }
  // ===== SLASH =====
  else if(a.type==='slash'){
    const cx=a.toX,cy=a.toY;
    const windUp=t<0.2?t/0.2:1;
    const progress=t<0.2?0:(t<0.5?(t-0.2)/0.3:1);
    const fade=t>0.6?(1-(t-0.6)/0.4):1;
    X.globalAlpha=fade;
    // Blade-style slash with motion blur
    const ang=Math.PI*0.25;const len=(35+a.size)*progress;
    // Motion blur (multiple semi-transparent slashes offset)
    for(let b=0;b<4;b++){X.globalAlpha=fade*(0.3-b*0.06);
      const off=b*2;X.strokeStyle=a.color;X.lineWidth=4+a.size*0.3-b;X.lineCap='round';
      X.beginPath();X.moveTo(cx-Math.cos(ang)*len+off,cy-Math.sin(ang)*len+off);
      X.lineTo(cx+Math.cos(ang)*len+off,cy+Math.sin(ang)*len+off);X.stroke()}
    // Main slash line
    X.globalAlpha=fade;X.strokeStyle=a.color;X.lineWidth=4+a.size*0.3;X.lineCap='round';
    X.beginPath();X.moveTo(cx-Math.cos(ang)*len,cy-Math.sin(ang)*len);
    X.lineTo(cx+Math.cos(ang)*len,cy+Math.sin(ang)*len);X.stroke();
    // Inner bright core
    X.strokeStyle=a.color2;X.lineWidth=2;
    X.beginPath();X.moveTo(cx-Math.cos(ang)*len*0.8,cy-Math.sin(ang)*len*0.8);
    X.lineTo(cx+Math.cos(ang)*len*0.8,cy+Math.sin(ang)*len*0.8);X.stroke();
    // Claw-specific: 3 parallel lines
    if(a.shape==='claw3'){for(let c=0;c<3;c++){const off=(c-1)*8;
      X.globalAlpha=fade*0.7;X.strokeStyle=a.color;X.lineWidth=3;
      X.beginPath();X.moveTo(cx-Math.cos(ang)*len+off,cy-Math.sin(ang)*len-off);
      X.lineTo(cx+Math.cos(ang)*len+off,cy+Math.sin(ang)*len-off);X.stroke()}}
    // Blood trail for blood_blade
    if(a.trail==='blood'&&progress>0.3){for(let i=0;i<6;i++){X.globalAlpha=fade*0.5;X.fillStyle='#aa0000';
      X.beginPath();X.arc(cx+(Math.random()-0.5)*len,cy+(Math.random()-0.5)*len,1+Math.random()*2,0,Math.PI*2);X.fill()}}
    // Impact sparks
    if(t>0.4){a.particleList.slice(0,12).forEach(p=>{const pt=t-0.4;const ppx=cx+p.vx*pt*35;const ppy=cy+p.vy*pt*35;
      X.globalAlpha=fade*p.life*(1-pt*1.2);X.fillStyle=p.color;X.beginPath();X.arc(ppx,ppy,p.sz*(1-pt*0.5),0,Math.PI*2);X.fill()})}
  }
  // ===== CROSS SLASH (X-shaped) =====
  else if(a.type==='crossslash'){
    const cx=a.toX,cy=a.toY;
    const p1=t<0.35?t/0.35:1;
    const p2=t<0.2?0:(t<0.5?(t-0.2)/0.3:1);
    const fade=t>0.6?(1-(t-0.6)/0.4):1;
    const len=30+a.size;
    // First slash (\)
    X.globalAlpha=fade;X.strokeStyle=a.color;X.lineWidth=5;X.lineCap='round';
    X.beginPath();X.moveTo(cx-len*p1,cy-len*p1);X.lineTo(cx+len*p1,cy+len*p1);X.stroke();
    // Second slash (/)
    X.strokeStyle=a.color2;X.lineWidth=4;
    X.beginPath();X.moveTo(cx+len*p2,cy-len*p2);X.lineTo(cx-len*p2,cy+len*p2);X.stroke();
    // Core glow at intersection
    if(p2>0.5){X.globalAlpha=fade*0.6;const g=X.createRadialGradient(cx,cy,0,cx,cy,15);
      g.addColorStop(0,'#ffffff');g.addColorStop(1,a.color+'00');X.fillStyle=g;X.beginPath();X.arc(cx,cy,15,0,Math.PI*2);X.fill()}
    // Sparks
    if(t>0.35){a.particleList.slice(0,15).forEach(p=>{const pt=t-0.35;
      X.globalAlpha=fade*0.7*(1-pt);X.fillStyle=p.color;X.beginPath();
      X.arc(cx+p.vx*pt*40,cy+p.vy*pt*40,p.sz*(1-pt*0.5),0,Math.PI*2);X.fill()})}
  }
  // ===== SWEEP (full-screen horizontal slash) =====
  else if(a.type==='sweep'){
    const cx=a.toX,cy=a.toY;
    const dir=a.fromX<a.toX?1:-1;
    const sweepProgress=t<0.4?t/0.4:1;
    const fade=t>0.5?(1-(t-0.5)/0.5):1;
    // Horizontal blade sweeping across
    const startX=dir>0?0:W;const endX=dir>0?W:0;
    const bladeX=startX+(endX-startX)*sweepProgress;
    X.globalAlpha=fade*0.8;X.strokeStyle=a.color;X.lineWidth=3+a.size*0.2;X.lineCap='round';
    X.beginPath();X.moveTo(bladeX-dir*60,cy-15);X.lineTo(bladeX,cy);X.lineTo(bladeX-dir*60,cy+15);X.stroke();
    // Motion blur trail
    for(let b=1;b<=5;b++){X.globalAlpha=fade*0.15;X.strokeStyle=a.color2;X.lineWidth=2;
      X.beginPath();X.moveTo(bladeX-dir*(60+b*15),cy-15);X.lineTo(bladeX-dir*b*15,cy);X.lineTo(bladeX-dir*(60+b*15),cy+15);X.stroke()}
    // Wound mark on enemy
    if(t>0.4&&sweepProgress>=1){X.globalAlpha=fade*0.9;X.strokeStyle=a.color;X.lineWidth=3;
      X.beginPath();X.moveTo(cx-30,cy);X.lineTo(cx+30,cy);X.stroke();
      X.strokeStyle=a.color2;X.lineWidth=1;X.beginPath();X.moveTo(cx-25,cy-2);X.lineTo(cx+25,cy-2);X.stroke()}
  }
  // ===== ROLL (character rolls like Sonic toward enemy) =====
  else if(a.type==='roll'){
    const spinUp=t<0.3?t/0.3:1;
    const launch=t<0.3?0:(t<0.85?(t-0.3)/0.55:1);
    const impact=t>0.85?(t-0.85)/0.15:0;
    const sz=a.size;
    if(launch<1){
      // Rolling ball moving toward enemy
      const rx=a.fromX+(a.toX-a.fromX)*launch;
      const ry=a.fromY+(a.toY-a.fromY)*launch;
      const rot=t*Math.PI*12;
      // Spin-up effect at start
      if(t<0.3){for(let i=0;i<6;i++){const ang=spinUp*Math.PI*4+i*Math.PI/3;const r=sz+5;
        X.globalAlpha=0.3;X.fillStyle=a.color2;X.beginPath();X.arc(a.fromX+Math.cos(ang)*r,a.fromY+Math.sin(ang)*r,3,0,Math.PI*2);X.fill()}}
      // Trail
      const trails=[];for(let i=1;i<=6;i++){const tt=Math.max(0,launch-i*0.04);
        trails.push({x:a.fromX+(a.toX-a.fromX)*tt,y:a.fromY+(a.toY-a.fromY)*tt})}
      drawTrail(trails,a.color,a.color2,a.trail||'dust',sz);
      // The rolling ball
      X.globalAlpha=1;X.fillStyle=a.color;X.beginPath();X.arc(rx,ry,sz,0,Math.PI*2);X.fill();
      X.save();X.translate(rx,ry);X.rotate(rot);
      X.strokeStyle=a.color2;X.lineWidth=2;X.beginPath();X.moveTo(-sz,0);X.lineTo(sz,0);X.stroke();
      X.beginPath();X.moveTo(0,-sz);X.lineTo(0,sz);X.stroke();X.restore();
    }
    // Impact explosion
    if(impact>0){const cx=a.toX,cy=a.toY;
      X.globalAlpha=1-impact;const rad=sz*2*impact;
      const g=X.createRadialGradient(cx,cy,0,cx,cy,rad+10);
      g.addColorStop(0,'#ffffff');g.addColorStop(0.3,a.color);g.addColorStop(1,a.color+'00');
      X.fillStyle=g;X.beginPath();X.arc(cx,cy,rad+10,0,Math.PI*2);X.fill();
      a.particleList.slice(0,15).forEach(p=>{X.globalAlpha=(1-impact)*0.8;X.fillStyle=p.color;
        X.beginPath();X.arc(cx+p.vx*impact*30,cy+p.vy*impact*30,p.sz*(1-impact*0.5),0,Math.PI*2);X.fill()})}
  }
  // ===== BURST (explosion at target) =====
  else if(a.type==='burst'){
    const cx=a.toX,cy=a.toY;
    const expand=t<0.4?t/0.4:1;
    const fade=t>0.5?(1-(t-0.5)/0.5):1;
    const rad=(a.size||20)*expand*1.5;
    // Ring shapes for special bursts
    if(a.shape==='rune_ring'||a.shape==='mandala_big'||a.shape==='data_burst'){
      X.globalAlpha=fade*0.5;X.strokeStyle=a.color;X.lineWidth=3;
      X.beginPath();X.arc(cx,cy,rad,0,Math.PI*2);X.stroke();
      X.strokeStyle=a.color2;X.lineWidth=1;X.beginPath();X.arc(cx,cy,rad*0.7,0,Math.PI*2);X.stroke();
      for(let i=0;i<8;i++){const ang=i*Math.PI/4+t*3;X.globalAlpha=fade*0.3;
        X.beginPath();X.moveTo(cx,cy);X.lineTo(cx+Math.cos(ang)*rad,cy+Math.sin(ang)*rad);X.stroke()}
    }else if(a.shape==='web'){
      X.globalAlpha=fade*0.6;X.strokeStyle=a.color;X.lineWidth=1;
      for(let ring=0;ring<4;ring++){const r=rad*(ring+1)/4;
        X.beginPath();for(let i=0;i<=8;i++){const ang=i*Math.PI/4;const px=cx+Math.cos(ang)*r;const py=cy+Math.sin(ang)*r;
          i===0?X.moveTo(px,py):X.lineTo(px,py)}X.closePath();X.stroke()}
      for(let i=0;i<8;i++){const ang=i*Math.PI/4;X.beginPath();X.moveTo(cx,cy);X.lineTo(cx+Math.cos(ang)*rad,cy+Math.sin(ang)*rad);X.stroke()}
    }else if(a.shape==='ink_explosion'){
      for(let i=0;i<12;i++){X.globalAlpha=fade*0.7;X.fillStyle=i%3?a.color:a.color2;
        const ang=i*Math.PI/6+t;const r=rad*(0.5+Math.random()*0.5);
        X.beginPath();X.arc(cx+Math.cos(ang)*r*expand,cy+Math.sin(ang)*r*expand,4+Math.random()*6,0,Math.PI*2);X.fill()}
    }else if(a.shape==='shatter'){
      // Crystal shatter - shards flying out
      for(let i=0;i<10;i++){const ang=i*Math.PI/5;const r=rad*expand*(0.5+Math.random()*0.5);
        X.globalAlpha=fade*0.8;X.fillStyle=i%2?a.color:a.color2;

      const ang=i*Math.PI/10+t*2;
      const startR=maxR*1.5;
      const r=collapse<1?startR*(1-collapse*0.8):startR*0.2;
      X.globalAlpha=fade*0.6;X.fillStyle=i%3?a.color:a.color2;
      X.beginPath();X.arc(cx+Math.cos(ang)*r*expand,cy+Math.sin(ang)*r*expand,2+Math.sin(i)*1.5,0,Math.PI*2);X.fill();}
    // Growing dark sphere
    if(expand>0.5){X.globalAlpha=fade*0.7;X.fillStyle='#000000';
      const sr=collapse<1?5+collapse*15:20;
      X.beginPath();X.arc(cx,cy,sr,0,Math.PI*2);X.fill();
      X.globalAlpha=fade*0.3;X.strokeStyle=a.color2;X.lineWidth=2;X.beginPath();X.arc(cx,cy,sr+3,0,Math.PI*2);X.stroke()}
    // Shockwave on collapse
    if(collapse>0.8){const sw=(collapse-0.8)/0.2;X.globalAlpha=(1-sw)*fade*0.4;X.strokeStyle=a.color2;X.lineWidth=3;
      X.beginPath();X.arc(cx,cy,sw*maxR*2,0,Math.PI*2);X.stroke()}
  }
  // ===== LUNGE (thrust forward) =====
  else if(a.type==='lunge'){
    const windUp=t<0.3?t/0.3:1;
    const thrust=t<0.3?0:(t<0.6?(t-0.3)/0.3:1);
    const recoil=t>0.6?(t-0.6)/0.4:0;
    const fade=t>0.8?(1-(t-0.8)/0.2):1;
    // Draw back during wind-up, then thrust forward
    const dx=a.toX-a.fromX,dy=a.toY-a.fromY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const nx=dx/dist,ny=dy/dist;
    const px=a.fromX-nx*10*windUp+nx*(dist*0.7)*thrust-nx*20*recoil;
    const py=a.fromY-ny*10*windUp+ny*(dist*0.7)*thrust-ny*20*recoil;
    const rot=Math.atan2(dy,dx);
    X.globalAlpha=fade;
    if(a.shape==='rapier'||a.shape==='sai'){
      // Thin blade
      drawBladeShape(px+nx*15,py+ny*15,30,4,a.color,rot);
      X.strokeStyle='#ffffff';X.lineWidth=1;X.globalAlpha=fade*0.5;
      X.beginPath();X.moveTo(px,py);X.lineTo(px+nx*30,py+ny*30);X.stroke();
    }else{
      // Fist/punch
      X.fillStyle=a.color;X.beginPath();X.arc(px+nx*10,py+ny*10,a.size*0.7,0,Math.PI*2);X.fill();
      X.fillStyle=a.color2;X.beginPath();X.arc(px+nx*10,py+ny*10,a.size*0.4,0,Math.PI*2);X.fill();
    }
    // Motion lines
    if(thrust>0.3){X.globalAlpha=fade*0.4;X.strokeStyle=a.color2;X.lineWidth=1;
      for(let i=0;i<4;i++){const off=(Math.random()-0.5)*10;
        X.beginPath();X.moveTo(px-nx*20+ny*off,py-ny*20-nx*off);X.lineTo(px-nx*40+ny*off,py-ny*40-nx*off);X.stroke()}}
    // Impact at target
    if(thrust>=1&&recoil<0.5){X.globalAlpha=fade*0.6*(1-recoil*2);
      const g=X.createRadialGradient(a.toX,a.toY,0,a.toX,a.toY,15);
      g.addColorStop(0,'#ffffff');g.addColorStop(1,a.color+'00');X.fillStyle=g;
      X.beginPath();X.arc(a.toX,a.toY,15,0,Math.PI*2);X.fill()}
  }
  // ===== EYE BEAM (Foresight) =====
  else if(a.type==='eye_beam'){
    const cx=(a.fromX+a.toX)/2,cy=Math.min(a.fromY,a.toY)-30;
    const eyeOpen=t<0.3?t/0.3:(t>0.7?(1-(t-0.7)/0.3):1);
    const beamFire=t>0.3&&t<0.7?(t-0.3)/0.4:0;
    // Giant eye appears
    X.globalAlpha=eyeOpen*0.7;X.fillStyle=a.color;
    X.beginPath();X.ellipse(cx,cy,25,12*eyeOpen,0,0,Math.PI*2);X.fill();
    X.fillStyle='#000000';X.beginPath();X.arc(cx,cy,6*eyeOpen,0,Math.PI*2);X.fill();
    X.fillStyle=a.color2;X.beginPath();X.arc(cx-2,cy-2,2*eyeOpen,0,Math.PI*2);X.fill();
    // Beam from eye to target
    if(beamFire>0){X.globalAlpha=0.6*(1-(t>0.7?(t-0.7)/0.3:0));X.strokeStyle=a.color2;X.lineWidth=4;
      X.beginPath();X.moveTo(cx,cy+12*eyeOpen);X.lineTo(a.toX,a.toY);X.stroke();
      X.strokeStyle='#ffffff';X.lineWidth=1.5;X.beginPath();X.moveTo(cx,cy+12*eyeOpen);X.lineTo(a.toX,a.toY);X.stroke()}
  }
  // ===== CHOMP (Bite - jaws closing) =====
  else if(a.type==='chomp'){
    const cx=a.toX,cy=a.toY;
    const open=t<0.3?1-t/0.3*0.3:0.7;
    const close=t>0.3&&t<0.5?(t-0.3)/0.2:0;
    const hold=t>0.5?1:0;
    const fade=t>0.7?(1-(t-0.7)/0.3):1;
    const jawOpen=t<0.3?0.4:(t<0.5?0.4*(1-close):0);
    // Upper jaw
    X.globalAlpha=fade*0.8;X.fillStyle=a.color;
    X.beginPath();X.moveTo(cx-a.size,cy-jawOpen*30-5);X.lineTo(cx+a.size,cy-jawOpen*30-5);
    X.lineTo(cx+a.size*0.7,cy-jawOpen*15);X.lineTo(cx-a.size*0.7,cy-jawOpen*15);X.closePath();X.fill();
    // Teeth
    X.fillStyle='#ffffff';for(let i=0;i<4;i++){const tx=cx-a.size*0.5+i*a.size*0.33;
      X.beginPath();X.moveTo(tx,cy-jawOpen*15);X.lineTo(tx+4,cy-jawOpen*8);X.lineTo(tx+8,cy-jawOpen*15);X.closePath();X.fill()}
    // Lower jaw
    X.fillStyle=a.color2;
    X.beginPath();X.moveTo(cx-a.size,cy+jawOpen*30+5);X.lineTo(cx+a.size,cy+jawOpen*30+5);
    X.lineTo(cx+a.size*0.7,cy+jawOpen*15);X.lineTo(cx-a.size*0.7,cy+jawOpen*15);X.closePath();X.fill();
    // Lower teeth
    X.fillStyle='#ffffff';for(let i=0;i<4;i++){const tx=cx-a.size*0.5+i*a.size*0.33;
      X.beginPath();X.moveTo(tx,cy+jawOpen*15);X.lineTo(tx+4,cy+jawOpen*8);X.lineTo(tx+8,cy+jawOpen*15);X.closePath();X.fill()}
    // Impact on close
    if(hold&&t<0.65){X.globalAlpha=fade*0.4;X.fillStyle='#ffffff';X.beginPath();X.arc(cx,cy,10*(1-(t-0.5)/0.15),0,Math.PI*2);X.fill()}
  }
  // ===== TRANSFORM (character morphs briefly) =====
  else if(a.type==='transform'){
    const cx=a.fromX,cy=a.fromY;
    const tx=a.toX,ty=a.toY;
    const morph=t<0.3?t/0.3:1;
    const charge=t>0.3&&t<0.6?(t-0.3)/0.3:0;
    const strike=t>0.6?(t-0.6)/0.4:0;
    const fade=t>0.85?(1-(t-0.85)/0.15):1;
    // Morphing aura
    if(morph<1){X.globalAlpha=morph*0.5;X.fillStyle=a.color;
      X.beginPath();X.arc(cx,cy,25+morph*15,0,Math.PI*2);X.fill()}
    // Dragon shape flying toward enemy
    if(t>0.3){
      const px=cx+(tx-cx)*Math.min(1,strike*1.2);const py=cy+(ty-cy)*Math.min(1,strike*1.2);
      X.globalAlpha=fade*0.9;X.fillStyle=a.color;
      // Dragon body
      X.save();X.translate(px,py);const dRot=Math.atan2(ty-cy,tx-cx);X.rotate(dRot);
      X.beginPath();X.moveTo(20,0);X.lineTo(-10,-12);X.lineTo(-5,0);X.lineTo(-10,12);X.closePath();X.fill();
      // Wings
      X.fillStyle=a.color2;
      X.beginPath();X.moveTo(-5,-5);X.lineTo(-15,-20+Math.sin(t*15)*5);X.lineTo(5,-3);X.closePath();X.fill();
      X.beginPath();X.moveTo(-5,5);X.lineTo(-15,20-Math.sin(t*15)*5);X.lineTo(5,3);X.closePath();X.fill();
      X.restore();
      // Fire trail
      if(strike>0.2){const trails=[];for(let i=1;i<=5;i++){const tt=Math.max(0,strike-i*0.04);
        trails.push({x:cx+(tx-cx)*tt,y:cy+(ty-cy)*tt})}
        drawTrail(trails,a.color,a.color2,'fire',8)}
    }
    // Impact
    if(strike>0.8){const it=(strike-0.8)/0.2;X.globalAlpha=(1-it)*fade;
      X.fillStyle=a.color;X.beginPath();X.arc(tx,ty,20*it,0,Math.PI*2);X.fill()}
  }
  // ===== CHAOS (random animation each frame) =====
  else if(a.type==='chaos'){
    const cx=a.toX,cy=a.toY;
    const fade=t>0.7?(1-(t-0.7)/0.3):1;
    // Random mix of effects every few frames
    for(let i=0;i<18;i++){
      const px=cx+(Math.random()-0.5)*70;const py=cy+(Math.random()-0.5)*70;
      const hue=Math.random()*360;
      X.globalAlpha=fade*0.7;X.fillStyle=`hsl(${hue},90%,60%)`;
      const r=Math.random();
      if(r<0.3){X.beginPath();X.arc(px,py,2+Math.random()*6,0,Math.PI*2);X.fill()}
      else if(r<0.6){X.strokeStyle=`hsl(${hue},90%,60%)`;X.lineWidth=2;
        X.beginPath();X.moveTo(px-10,py-10);X.lineTo(px+10,py+10);X.stroke()}
      else{drawStarShape(px,py,3+Math.random()*4,`hsl(${hue},90%,60%)`,Math.random()*Math.PI,Math.floor(3+Math.random()*4))}
    }
    // Occasional screen flash with random color
    if(Math.random()<0.1){X.globalAlpha=0.1;X.fillStyle=`hsl(${Math.random()*360},80%,50%)`;X.fillRect(0,0,W,H)}
  }
  else{
    // Fallback: simple projectile
    const px=a.fromX+(a.toX-a.fromX)*t;const py=a.fromY+(a.toY-a.fromY)*t-Math.sin(t*Math.PI)*30;
    X.fillStyle=a.color;X.beginPath();X.arc(px,py,a.size,0,Math.PI*2);X.fill();
  }

  X.restore();
  return true;
}

const RARITIES={
  Common:  {name:'Common',  color:'#c0c0c0',weight:50},
  Uncommon:{name:'Uncommon',color:'#3fc03f',weight:30},
  Rare:    {name:'Rare',    color:'#4090ff',weight:15},
  Epic:    {name:'Epic',    color:'#b040f0',weight:4},
  Legendary:{name:'Legendary',color:'#ffaa00',weight:1},
};
function rarityColor(r){return RARITIES[r]?RARITIES[r].color:'#c0c0c0'}

function pickRarity(floor){
  // Rarer items are harder to get — Epic/Legendary scale slower
  const weights={Common:Math.max(10,55-floor*0.6),Uncommon:Math.max(8,32-floor*0.25),Rare:Math.min(25,10+floor*0.2),Epic:Math.min(15,2+floor*0.08),Legendary:Math.min(8,0.3+floor*0.02)};
  const total=Object.values(weights).reduce((a,b)=>a+b,0);
  let roll=Math.random()*total;
  for(const [k,v] of Object.entries(weights)){roll-=v;if(roll<=0)return k}
  return 'Common';
}

function pickFreeItems(floor,count){
  const pool=FREE_ITEMS.slice();
  const result=[];
  for(let i=0;i<count;i++){
    const rar=pickRarity(floor);
    const matching=pool.filter(x=>x.rarity===rar);
    const chosen=matching.length?pick(matching):pick(pool);
    result.push({...chosen});
    const idx=pool.indexOf(chosen);
    if(idx>=0)pool.splice(idx,1);
  }
  return result;
}

function genEnemyData(name,floor,biome){
  const type=pick(TYPES);const scale=1+floor*0.04;
  const baseHp=30+floor*2;const baseAtk=6+floor*0.8;
  return{name,type,hp:Math.floor(baseHp*scale*(0.8+Math.random()*0.4)*diffEnemyHpMult()),maxHp:0,atk:Math.floor(baseAtk*scale*(0.8+Math.random()*0.4)*diffEnemyAtkMult()),
    color:biome.style==='bright'?pick(['#32c832','#64b432','#c8c800','#32c8c8','#c89632']):biome.style==='dark'?pick(['#a03cc8','#6432a0','#c83232','#646496','#969696']):pick(['#00ff41','#00c832','#00a064','#32ff96','#64ffc8']),
    isBoss:false,phase:1,statuses:[],ability:null};
}
function genBoss(floor){
  const scale=1+floor*0.03;const bossNum=Math.floor(floor/10);
  const names=['Slime King','Shadow Thief','Paper Witch','Iron Giant','Blade Dancer','Ancient Scroll','Void Walker','Storm Reaper','Cosmic Sage','The Absolute',
    'Crystal Emperor','Flame Titan','Dark Overlord','Ice Queen','Thunder God','Nature\'s Wrath','Chaos Lord','Time Weaver','Space Bender','The Creator',
    'Diamond King','Molten Core','Shadow Prime','Frost Monarch','Spark Overlord','Silk Empress','Obsidian Lord','Razor Queen','Oracle Supreme','The Infinite'];
  const quotes=['You dare challenge me?!','Your treasures will be mine!','I\'ll fold you into nothing!','CRUSH. SMASH. DESTROY.',
    'My blades dance!','I contain ancient wisdom...','The void consumes all...','Feel the tempest!',
    'The stars foretell your defeat.','I am all types. I am THE ABSOLUTE.',
    'My crystals will shatter you!','Burn in eternal flame!','Darkness is my domain!','Freeze in place!',
    'Thunder strikes twice!','Nature reclaims all!','Chaos reigns supreme!','Time means nothing to me!',
    'Space bends to my will!','I created everything... including your doom.',
    'Diamonds are forever!','The earth\'s core answers to me!','I am the prime shadow!','Winter is eternal!',
    'Lightning never strikes the same place... except when I command it!','My web is inescapable!',
    'I am the void made manifest!','A thousand cuts await you!','I have seen all possible futures... you lose.',
    'This is the final challenge. Are you ready?'];
  const idx=Math.min(bossNum-1,names.length-1);
  const hp=Math.floor((150+bossNum*30)*scale*diffEnemyHpMult());const isLast=floor===300;
  return{name:names[idx]||`Boss Lv.${bossNum}`,type:pick(TYPES),hp,maxHp:hp,atk:Math.floor((18+bossNum*3)*scale*diffEnemyAtkMult()),
    color:isLast?'#ffd700':'#ff6464',isBoss:true,quote:quotes[idx]||'Prepare yourself!',
    phase:1,phase2Hp:isLast?Math.floor(hp*0.6):floor%50===0?Math.floor(hp*0.5):0,
    phase2Atk:isLast?Math.floor((18+bossNum*3)*scale*1.5):Math.floor((18+bossNum*3)*scale*1.3),
    statuses:[],ability:bossNum>5?pick(['regenerate','enrage','shield']):null,
    dialogue:[quotes[idx]||'...','You cannot defeat me!','This isn\'t over!']};
}

// Backward-compatible save loading: accepts both rps4 (v4) and rps5 (v5) keys
function loadSave(){try{const d=JSON.parse(localStorage.getItem('rps5'))||JSON.parse(localStorage.getItem('rps4'));if(d){S.soulCrystals=d.sc||0;S.unlocked=d.ul||['Stone','Blade','Scroll'];S.eternals=d.et||S.eternals;S.highestFloor=d.hf||0;S.totalRuns=d.tr||0;S.classicWon=d.cw||false;S.settings=d.st||S.settings;if(!S.settings.musicOn)S.settings.musicOn=false}}catch(e){}}
function save(){try{localStorage.setItem('rps5',JSON.stringify({sc:S.soulCrystals,ul:S.unlocked,et:S.eternals,hf:S.highestFloor,tr:S.totalRuns,cw:S.classicWon,st:S.settings}))}catch(e){}}
function addMsg(t,d=180){S.messages.push({text:t,timer:d})}
function addLog(t){S.eventLog.push({text:t,floor:S.floor});if(S.eventLog.length>50)S.eventLog.shift()}
function addInv(name,effect){const f=S.inventory.find(x=>x.name===name);if(f)f.count++;else S.inventory.push({name,effect,count:1})}
function addStatus(target,type){if(!target.statuses)target.statuses=[];const fx=STATUS_FX[type];if(!fx)return;if(target.statuses.find(s=>s.type===type))return;target.statuses.push({type,name:fx.name,dur:fx.dur,color:fx.color});SFX.statusApplied()}
function pal(){const style=['menu','charSelect','difficultySelect','eternalShop','howToPlay','settings','modeSelect','charShop'].includes(S.scene)?'menu':S.runActive?getStyle(S.floor):'menu';return STYLES[style]}
function evoName(){if(!S.charData)return'';if(S.evoStage===0)return S.charName;if(S.evoStage===1)return S.charData.evo1;if(S.evoStage===2)return S.charData.evo2;if(S.evoStage===3)return (S.charData.evo2||S.charData.evo1)+' Prime';return (S.charData.evo2||S.charData.evo1)+' Absolute';}
function checkUnlocks(){CHARS.forEach(c=>{if(!S.unlocked.includes(c.name)&&c.cost===0)S.unlocked.push(c.name)})}

function effAtk(){return Math.max(1,S.atk+S.tempAtk)}
function effDef(){return Math.max(0,S.def+S.tempDef)}
function effSpd(){return Math.max(0,S.spd+S.tempSpd)}
function resetTempStats(){S.tempAtk=0;S.tempDef=0;S.tempSpd=0}

// Difficulty multipliers — Hard is baseline (no change)
function diffEnemyHpMult(){return S.difficulty==='easy'?0.7:S.difficulty==='normal'?0.85:1}
function diffEnemyAtkMult(){return S.difficulty==='easy'?0.75:S.difficulty==='normal'?0.9:1}
function diffXpMult(){return S.difficulty==='easy'?1.5:S.difficulty==='normal'?1.25:1}
function diffPlayerHpBonus(){return S.difficulty==='easy'?1.2:S.difficulty==='normal'?1.1:1}
function diffShopCostMult(){return S.difficulty==='easy'?0.8:1}
function diffPpRestore(){return S.difficulty==='easy'?3:2}

// ITEM EFFECT APPLICATION
// ============================================================
function applyItemEffect(effect,permanent){
  if(!effect)return'';
  if(effect.includes('_')){
    return effect.split('_').map(e=>applyItemEffect(e,permanent)).filter(Boolean).join(', ');
  }
  if(effect==='heal30'){S.hp=Math.min(S.maxHp,S.hp+30);SFX.heal();return'+30 HP'}
  if(effect==='heal40'){S.hp=Math.min(S.maxHp,S.hp+40);SFX.heal();return'+40 HP'}
  if(effect==='heal50'){S.hp=Math.min(S.maxHp,S.hp+50);SFX.heal();return'+50 HP'}
  if(effect==='heal80'){S.hp=Math.min(S.maxHp,S.hp+80);SFX.heal();return'+80 HP'}
  if(effect==='heal_full'){S.hp=S.maxHp;SFX.heal();return'Full HP!'}
  if(effect==='heal25'){S.hp=Math.min(S.maxHp,S.hp+25);SFX.heal();return'+25 HP'}
  if(effect==='heal35'){S.hp=Math.min(S.maxHp,S.hp+35);SFX.heal();return'+35 HP'}
  if(effect==='bomb40'&&S.enemy){S.enemy.hp-=40;return'40 dmg!'}
  if(effect==='bomb100'&&S.enemy){S.enemy.hp-=100;return'100 dmg!'}
  if(effect==='cure_status'){S.statuses=[];return'Status cured!'}
  if(effect==='pp_restore'){S.moves.forEach(m=>m.pp=m.maxPp);return'PP restored!'}
  if(effect==='random_buff'){const s=['atk','def','spd'][rand(0,2)];const v=rand(3,8);if(permanent){S[s]+=v;}else{S['temp'+s.charAt(0).toUpperCase()+s.slice(1)]+=v;}SFX.buff();return`${s.toUpperCase()}+${v}`}
  if(effect==='lifesteal')return'';
  if(effect==='doublestrike'){S.doubleStrike=true;return'Double-strike enabled!'}
  if(effect==='priority_passive'){S.priorityPassive=true;return'10% move-first enabled!'}
  if(effect==='revive_passive'){S.reviveUsed=false;return'Revival ready!'}
  if(effect==='burn_passive'){S.burnPassive=true;return'Burn-on-hit enabled!'}
  if(effect==='reflect_passive'){S.reflectPassive=true;return'20% damage reflect!'}
  if(effect==='ultimate_passive'){S.doubleStrike=true;S.priorityPassive=true;S.crit+=25;return'Ultimate passives activated!'}
  const atkM=effect.match(/^atk\+(\d+)$/);if(atkM){const v=parseInt(atkM[1]);if(permanent){S.permAtk=(S.permAtk||0)+v;S.atk+=v;}else S.tempAtk+=v;SFX.buff();return`ATK+${v}`}
  const defM=effect.match(/^def\+(\d+)$/);if(defM){const v=parseInt(defM[1]);if(permanent){S.permDef=(S.permDef||0)+v;S.def+=v;}else S.tempDef+=v;SFX.buff();return`DEF+${v}`}
  const spdM=effect.match(/^spd\+(\d+)$/);if(spdM){const v=parseInt(spdM[1]);if(permanent){S.permSpd=(S.permSpd||0)+v;S.spd+=v;}else S.tempSpd+=v;SFX.buff();return`SPD+${v}`}
  const critM=effect.match(/^crit\+(\d+)$/);if(critM){S.crit+=parseInt(critM[1]);return`Crit+${critM[1]}%`}
  const dodgeM=effect.match(/^dodge\+(\d+)$/);if(dodgeM){S.dodge+=parseInt(dodgeM[1]);return`Dodge+${dodgeM[1]}%`}
  const hpM=effect.match(/^maxhp\+(\d+)$/);if(hpM){const v=parseInt(hpM[1]);S.maxHp+=v;S.hp+=Math.floor(v/2);return`MaxHP+${v}`}
  const allM=effect.match(/^all\+(\d+)$/);if(allM){const v=parseInt(allM[1]);if(permanent){S.permAtk=(S.permAtk||0)+v;S.permDef=(S.permDef||0)+v;S.permSpd=(S.permSpd||0)+v;S.atk+=v;S.def+=v;S.spd+=v;}else{S.tempAtk+=v;S.tempDef+=v;S.tempSpd+=v;}SFX.buff();return`All+${v}`}
  return'';
}

function applyEffect(effect){return applyItemEffect(effect,true)}

function initChar(name){
  const d=CHAR_MAP[name];S.charName=name;S.charData=d;
  S.maxHp=Math.floor((d.hp+S.eternals.maxHp*10)*diffPlayerHpBonus());S.hp=S.maxHp;
  S.atk=d.atk+S.eternals.atk*2;S.def=d.def+S.eternals.def*2;S.spd=d.spd;
  S.permAtk=d.atk+S.eternals.atk*2;S.permDef=d.def+S.eternals.def*2;S.permSpd=d.spd;
  S.tempAtk=0;S.tempDef=0;S.tempSpd=0;
  S.gold=0;S.crit=5+(TYPE_SPEC[d.type].critBonus||0);S.dodge=0;S.evoStage=0;
  S.level=1;S.xp=0;S.xpNext=13;S.xpMult=1+S.eternals.xp*0.1;
  S.moves=d.moves.map(m=>({...m,pp:m.maxPp}));
  S.inventory=[{name:'Healing Potion',effect:'heal30',count:3}];
  S.artifacts=[];S.statuses=[];S.runActive=true;S.floor=1;
  S.eventLog=[];S.showItems=false;S.showLog=false;S.showMiniShop=false;
  S.freeItemPicks=null;S.freeItemFloor=-1;
  S.reviveUsed=false;S.burnPassive=false;S.reflectPassive=false;
  S.doubleStrike=false;S.priorityPassive=false;S.ultimatePassive=false;
  if(d.ability==='Wisdom: Gains 20% more XP')S.xpMult*=1.2;
  if(d.ability&&d.ability.includes('Stealth'))S.dodge+=20;
  // Debug mode: extra starting stats
  if(rpsDebugMode){
    S.maxHp=Math.floor(S.maxHp*1.2);S.hp=S.maxHp;
    S.atk+=3;S.permAtk+=3;
    S.gold+=50;
  }
  addLog(`Started run with ${name}`);
}

function gainXP(amount){
  amount=Math.floor(amount*S.xpMult*diffXpMult());S.xp+=amount;
  while(S.xp>=S.xpNext){S.xp-=S.xpNext;S.level++;S.xpNext=Math.floor(S.xpNext*1.1)+3;
    S.maxHp+=5;S.hp=Math.min(S.hp+5,S.maxHp);S.atk+=1;S.permAtk+=1;S.def+=1;S.permDef+=1;
    if(S.level%3===0){S.spd+=1;S.permSpd+=1}
    addMsg(`Level Up! Lv.${S.level}`);addLog(`Reached Level ${S.level}`);
    SFX.levelUp();
    if(S.level%5===0&&S.moves.length<8){
      const tier=Math.floor(S.level/5);const suffix=['II','III','IV','V','VI','VII','VIII','IX','X'][tier-1]||'X';
      const t=S.charData.type;
      const newMoves=[
        mv('Power Strike',t,20+S.level,12),
        mv('Guard','Buff',0,10,'def+'+(3+Math.floor(S.level/5))),
        mv('Drain Hit',t,15+Math.floor(S.level*0.5),10,'lifesteal'),
        mv('Status Strike',t,12+Math.floor(S.level*0.3),14,null,30,pick(['bleed','burn','poison'])),
        mv('Haste Buff','Buff',0,8,'spd+'+(4+Math.floor(S.level/4))),
        mv('Heavy Blow',t,35+Math.floor(S.level*0.8),6),
        mv('Double Strike',t,14+Math.floor(S.level*0.4),16),
        mv('Venom Strike',t,10+Math.floor(S.level*0.3),18,null,40,'poison'),
        mv('Charge Up','Buff',0,8,'atk+'+(5+Math.floor(S.level/4))),
        mv('Burst Slash',t,28+Math.floor(S.level*0.7),8,null,20,pick(['bleed','defDown'])),
        mv('Echo Strike',t,18+Math.floor(S.level*0.5),10),
      ];
      const nm={...pick(newMoves)};nm.name=nm.name.replace(/ (II|III|IV|V|VI|VII|VIII|IX|X)$/,'')+' '+suffix;
      S.pendingMove=nm;
    }
  }
}

function processStatuses(target,isPlayer){
  if(!target.statuses)return;
  target.statuses=target.statuses.filter(s=>{
    const fx=STATUS_FX[s.type];
    if(fx&&fx.dmgPct){
      const dmg=Math.max(1,Math.floor((isPlayer?S.maxHp:target.maxHp)*fx.dmgPct));
      if(isPlayer)S.hp-=dmg;else target.hp-=dmg;
      S.combatLog.push({msg:`${fx.name}: ${dmg} damage`,color:fx.color});
    }
    s.dur--;return s.dur>0;
  });
}

function calcDmg(baseDmg,moveType,atkStat,defStat,targetType,isPlayer){
  let dmg=baseDmg+atkStat-Math.floor(defStat/2);
  let mult=1.0;let aType=moveType==='Random'?pick(TYPES):moveType;
  let typeMsg=null;
  if(TADV[aType]===targetType){mult=1.3;typeMsg='type advantage';}
  else if(TADV[targetType]===aType){mult=0.8;typeMsg='type disadvantage';}
  // else same type: 1.0x
  if(isPlayer){
    const spec=TYPE_SPEC[S.charData.type];
    if(spec.dmgMult)mult*=spec.dmgMult;
  }
  for(const a of S.artifacts){
    if(a.effect==='rock_boost'&&aType==='Rock')mult*=1.2;
    if(a.effect==='scissors_boost'&&aType==='Scissors')mult*=1.2;
    if(a.effect==='paper_boost'&&aType==='Paper')mult*=1.2;
  }
  if(!isPlayer)mult*=[0.8,1,1.3,1.6][S.settings.difficulty];
  const isCrit=Math.random()*100<(isPlayer?S.crit:5);
  if(isCrit)mult*=1.5;
  if(isPlayer&&S.statuses.find(s=>s.type==='burn'))mult*=0.9;
  dmg=Math.max(1,Math.floor(dmg*mult));
  return{dmg,isSuper:typeMsg==='type advantage'&&!isCrit,isCrit,aType,typeMsg};
}

// Pending move execution (called after animation completes)
let pendingMoveAction=null;

function doStruggle(){
  if(S.combatState==='animating')return;
  S.combatState='animating';
  startMoveAnim('Rock Throw',true,'Rock');
  SFX.click();
  pendingMoveAction=()=>{
    const e=S.enemy;
    const struggleDmg=Math.max(1,Math.floor(effAtk()*0.5));
    e.hp-=struggleDmg;
    const recoil=Math.max(1,Math.floor(S.maxHp*0.1));
    S.hp-=recoil;
    S.combatLog.push({msg:`Struggle! ${struggleDmg} dmg (recoil ${recoil})`,color:'#c8c8c8'});
    if(e.hp<=0){afterCombatWin();}
    else{enemyTurn();if(S.hp<=0)handleDeath();else S.combatState='choose';}
  };
}
function doMove(i){
  if(S.combatState==='animating')return; // Block input during animation
  const m=S.moves[i];if(m.pp<=0)return;
  // Start animation, then execute move after it completes
  S.combatState='animating';
  const moveType=m.type==='Buff'||(m.effect&&m.dmg===0)?'Buff':m.type;
  startMoveAnim(m.name,true,moveType);
  SFX.click();
  pendingMoveAction=()=>executeMoveLogic(i);
}

function executeMoveLogic(i){
  const m=S.moves[i];m.pp--;
  const e=S.enemy;
  if(S.statuses.find(s=>s.type==='freeze')){
    S.combatLog.push({msg:'You are frozen!',color:'#64dcff'});
    S.statuses=S.statuses.filter(s=>s.type!=='freeze');
    enemyTurn();if(S.hp<=0)handleDeath();else S.combatState='choose';return;
  }
  processStatuses(S,true);if(S.hp<=0){handleDeath();return}
  if(S.charData.ability&&S.charData.ability.includes('Cursed'))S.hp-=Math.floor(S.maxHp*0.03);
  if(m.type==='Buff'||(m.effect&&m.dmg===0)){
    const r=applyItemEffect(m.effect,false);
    S.combatLog.push({msg:r||m.name,color:'#28c8dc'});addLog(`Used ${m.name}: ${r}`);
    SFX.buff();
  }else{
    const{dmg,isSuper,isCrit,aType,typeMsg}=calcDmg(m.dmg,m.type,effAtk(),0,e.type,true);
    let hits=1;
    const hasDoubleStrike=S.doubleStrike||(S.charData.ability&&S.charData.ability.includes('Attacks twice'));
    if(hasDoubleStrike)hits=2;
    else if(S.charData.ability&&S.charData.ability.includes('Shadow Step'))hits=2;
    let totalDmg=0;
    for(let h=0;h<hits;h++){
      let d=hits>1?Math.floor(dmg*0.6):dmg;
      e.hp-=d;totalDmg+=d;
      const statusChanceBonus=S.charData.ability&&S.charData.ability.includes('status chance')?15:0;
      const entangleBonus=S.charData.ability&&S.charData.ability.includes('Entangle')?15:0;
      if(m.statusType&&Math.random()*100<(m.statusChance+statusChanceBonus+entangleBonus))addStatus(e,m.statusType);
      if(S.burnPassive&&Math.random()<0.4)addStatus(e,'burn');
    }
    if(!hasDoubleStrike&&S.doubleStrike===false&&S.charData.ability&&!S.charData.ability.includes('Shadow')&&Math.random()<0.25){
      const bonus=Math.floor(dmg*0.5);e.hp-=bonus;totalDmg+=bonus;
      S.combatLog.push({msg:`Double-strike! +${bonus} bonus dmg!`,color:'#b040f0'});
    }
    let msg=`${m.name}! `;if(hits>1)msg+=`x${hits} `;if(isSuper)msg+='SUPER! ';if(isCrit)msg+='CRITICAL HIT! ';msg+=`${totalDmg} dmg`;
    S.combatLog.push({msg,color:isCrit?'#ffd700':isSuper?'#28c8dc':'#32c832'});
    if(rpsDebugMode){
      const typeMStr=isSuper?'1.3':(typeMsg==='type disadvantage'?'0.8':'1.0');
      S.combatLog.push({msg:`DEBUG: base=${m.dmg} + atk=${effAtk()} - def/2=0 \u00d7 type=${typeMStr} \u00d7 crit=${isCrit?'1.5':'1.0'} = ${dmg}`,color:'#00ff41'});
    }
    if(isCrit){S.critFlash=40;triggerShake(10);}
    addLog(`${m.name}: ${totalDmg} dmg to ${e.name}`);
    // SFX
    if(isCrit)SFX.crit();else if(isSuper)SFX.superEffective();else SFX.hit(aType);
    if(m.effect==='lifesteal'||S.artifacts.find(a=>a.effect==='lifesteal')){S.hp=Math.min(S.maxHp,S.hp+Math.max(1,Math.floor(totalDmg*0.1)))}
    if(S.charData.ability&&S.charData.ability.includes('Absorb'))S.hp=Math.min(S.maxHp,S.hp+Math.floor(totalDmg*0.05));
    if(S.charData.ability&&S.charData.ability.includes('Execute')&&e.hp>0&&e.hp<e.maxHp*0.2){e.hp-=totalDmg;S.combatLog.push({msg:'EXECUTE!',color:'#dc0000'})}
  }
  if(e.hp<=0){
    if(e.isBoss&&e.phase===1&&e.phase2Hp>0){
      e.phase=2;e.hp=e.phase2Hp;e.maxHp=e.phase2Hp;e.atk=e.phase2Atk;e.statuses=[];
      S.combatLog.push({msg:'PHASE 2!',color:'#dc3232'});
      if(e.dialogue&&e.dialogue[1])S.combatLog.push({msg:`"${e.dialogue[1]}"`,color:'#ffdc00'});
      S.combatState='choose';
    }else{afterCombatWin()}
  }else{
    if(S.priorityPassive&&Math.random()<0.1){
      S.combatLog.push({msg:'Priority strike! Moving first!',color:'#ffaa00'});
      S.combatState='choose';
    }else{
      enemyTurn();if(S.hp<=0)handleDeath();else S.combatState='choose';
    }
  }
}

function enemyTurn(){
  const e=S.enemy;if(!e||e.hp<=0)return;
  if(e.ability==='regenerate')e.hp=Math.min(e.maxHp,e.hp+Math.floor(e.maxHp*0.03));
  if(e.ability==='enrage'&&e.hp<e.maxHp*0.3)e.atk=Math.floor(e.atk*1.05);
  processStatuses(e,false);if(e.hp<=0)return;
  if(e.statuses&&e.statuses.find(s=>s.type==='freeze')){S.combatLog.push({msg:'Enemy is frozen!',color:'#64dcff'});return}
  if(Math.random()*100<S.dodge){S.combatLog.push({msg:'You dodged!',color:'#28c8dc'});return}
  let eType=e.type==='Random'?pick(TYPES):e.type;
  const spec=TYPE_SPEC[S.charData.type];
  let dmg=Math.max(1,e.atk-Math.floor(effDef()/3));
  if(spec.defMult)dmg=Math.floor(dmg*spec.defMult);
  if(spec.dmgTaken)dmg=Math.floor(dmg*spec.dmgTaken);
  for(const a of S.artifacts){if(a.effect==='harmony')dmg=Math.floor(dmg*0.9)}
  if(S.charData.ability&&S.charData.ability.includes('Harmony'))dmg=Math.floor(dmg*0.9);
  if(TADV[eType]===S.charData.type){dmg=Math.floor(dmg*1.3);S.combatLog.push({msg:`Enemy ${eType} advantage! ${dmg} dmg!`,color:'#dc3232'})}
  else if(TADV[S.charData.type]===eType){dmg=Math.floor(dmg*0.8);S.combatLog.push({msg:`Enemy ${eType} resisted! ${dmg} dmg!`,color:'#64c8ff'})}
  else S.combatLog.push({msg:`Enemy attacks! ${dmg} dmg!`,color:'#f08c1e'});
  if(rpsDebugMode){
    const typeM=TADV[eType]===S.charData.type?'1.3':(TADV[S.charData.type]===eType?'0.8':'1.0');
    S.combatLog.push({msg:`DEBUG: base=${e.atk} + atk=0 - def/2=${Math.floor(effDef()/3)} \u00d7 type=${typeM} \u00d7 crit=1.0 = ${dmg}`,color:'#00ff41'});
  }
  if(S.reflectPassive){const ref=Math.floor(dmg*0.2);e.hp-=ref;S.combatLog.push({msg:`Reflected ${ref} dmg!`,color:'#b040f0'})}
  S.hp-=dmg;
  SFX.hit(eType);
  if(S.hp<=0&&!S.reviveUsed){S.hp=Math.floor(S.maxHp*0.3);S.reviveUsed=true;S.combatLog.push({msg:'Soul Gem activated! Revived at 30% HP!',color:'#ffaa00'})}
  if(S.charData.ability&&S.charData.ability.includes('Thorns'))e.hp-=Math.max(1,Math.floor(dmg*0.1));
  if(S.charData.ability&&S.charData.ability.includes('Static'))addStatus(e,'spdDown');
}

function advanceFloor(){
  S.floor++;S.showMiniShop=false;
  // PP partial restore each floor (difficulty-dependent)
  S.moves.forEach(m=>{m.pp=Math.min(m.maxPp,m.pp+diffPpRestore())});
  if(S.floor>S.highestFloor){S.highestFloor=S.floor}
  if(S.floor===25&&S.evoStage===0){S.evoStage=1;S.maxHp+=30;S.hp=Math.min(S.hp+30,S.maxHp);S.atk+=5;S.permAtk+=5;S.def+=3;S.permDef+=3;addMsg(`EVOLVED into ${evoName()}!`);SFX.levelUp();addLog(`Evolved into ${evoName()}`)}
  else if(S.floor===50&&S.evoStage===1){S.evoStage=2;S.maxHp+=50;S.hp=Math.min(S.hp+50,S.maxHp);S.atk+=8;S.permAtk+=8;S.def+=5;S.permDef+=5;addMsg(`EVOLVED into ${evoName()}!`);SFX.levelUp();addLog(`Evolution stage 2: ${evoName()}`)}
  else if(S.floor===75&&S.evoStage===2){S.evoStage=3;S.maxHp+=70;S.hp=Math.min(S.hp+70,S.maxHp);S.atk+=12;S.permAtk+=12;S.def+=8;S.permDef+=8;S.spd+=3;S.permSpd+=3;addMsg(`PRIME EVOLUTION: ${evoName()}!`);SFX.levelUp();addLog(`Prime evolution: ${evoName()}`)}
  else if(S.floor===100&&S.evoStage===3){S.evoStage=4;S.maxHp+=100;S.hp=Math.min(S.hp+100,S.maxHp);S.atk+=18;S.permAtk+=18;S.def+=12;S.permDef+=12;S.spd+=5;S.permSpd+=5;addMsg(`ABSOLUTE EVOLUTION: ${evoName()}!`);SFX.levelUp();addLog(`Absolute evolution: ${evoName()}`)}
  const maxFloor=S.mode==='classic'?300:Infinity;
  if(S.floor>maxFloor&&S.mode==='classic'){handleVictory();return}
  if(S.mode==='endless'&&S.floor>300&&S.floor%50===1){addMsg('Difficulty increased!');addLog('Endless: difficulty spike!')}
  if(S.floor%10===0)startCombat(true);
  else if(S.floor%25===0&&S.floor%10!==0)startRival();
  // v5.0: Removed regular shop. Floor%5 now shows mini-shop (encounter or combat)
  else if(S.floor%5===0&&S.floor%10!==0){
    // Instead of old shop, start a regular combat (mini-shop appears after winning)
    startCombat(false);
  }
  else if(Math.random()<0.22)startEncounter();
  else startCombat(false);
}

function startCombat(isBoss){
  if(isBoss)resetTempStats();
  if(isBoss){
    S.enemy=genBoss(S.floor);SFX.bossAppear();
    S.bossPreview={boss:S.enemy,timer:210}; // ~3.5s at 60fps
    S.scene='bossPreview';
    return;
  }else{
    const biome=getBiome(S.floor);const eName=pick(biome.enemies);
    S.enemy=genEnemyData(eName,S.floor,biome);S.enemy.maxHp=S.enemy.hp;
  }
  _enterCombat();
}
function _enterCombat(){
  S.combatLog=[];S.combatState='choose';S.showItems=false;S.scene='combat';
  if(S.enemy.isBoss){
    S.combatLog.push({msg:`BOSS: ${S.enemy.name}!`,color:'#ffd700'});
    if(S.enemy.quote)S.combatLog.push({msg:`"${S.enemy.quote}"`,color:'#ffdc00'});
    addLog(`Boss fight: ${S.enemy.name}`);
  }
  // Debug: show enemy type weakness
  if(rpsDebugMode&&S.enemy){
    const eType=S.enemy.type;
    const weakTo=Object.keys(TADV).find(k=>TADV[k]===eType)||'None';
    S.combatLog.push({msg:`DEBUG: Enemy is ${eType}. Use ${weakTo} moves for 1.3x damage.`,color:'#00ff41'});
  }
  if(TYPE_SPEC[S.charData.type].healPct)S.hp=Math.min(S.maxHp,S.hp+Math.floor(S.maxHp*TYPE_SPEC[S.charData.type].healPct));
  if(S.charData.ability&&S.charData.ability.includes('Meditate'))S.moves.forEach(m=>{if(m.pp<m.maxPp)m.pp=Math.min(m.maxPp,m.pp+2)});
}

function startRival(){
  resetTempStats();
  const r=Math.random();
  let rType;
  if(r<0.7)rType=TADV[S.charData.type];
  else if(r<0.9)rType=S.charData.type;
  else rType=Object.keys(TADV).find(k=>TADV[k]===S.charData.type);
  const scale=1+S.floor*0.04;const hp=Math.floor((100+S.floor*2)*scale);
  S.enemy={name:'RIVAL',type:rType,hp,maxHp:hp,atk:Math.floor((12+S.floor*0.7)*scale),
    color:'#ff3264',isBoss:false,isRival:true,phase:1,statuses:[],
    quote:'We meet again! This time I won\'t lose!'};
  S.combatLog=[{msg:'RIVAL BATTLE!',color:'#ff3264'},{msg:`"${S.enemy.quote}"`,color:'#ffdc00'}];
  if(rpsDebugMode){
    const weakTo=Object.keys(TADV).find(k=>TADV[k]===rType)||'None';
    S.combatLog.push({msg:`DEBUG: Enemy is ${rType}. Use ${weakTo} moves for 1.3x damage.`,color:'#00ff41'});
  }
  S.combatState='choose';S.showItems=false;S.scene='combat';addLog('Rival battle!');
}

function startEncounter(){S.encounter=pick(ENCOUNTERS);S.scene='encounter'}

function afterCombatWin(){
  const e=S.enemy;
  const ge=Math.floor((10+rand(5,15)+S.floor*2)*(1+S.eternals.goldMult*0.1));
  S.gold+=ge;SFX.coin();
  if(S.charData.ability&&S.charData.ability.includes('Sparkle'))S.gold+=Math.floor(ge*0.2);
  const xpGain=8+S.floor+rand(0,8)+(e.isBoss?S.floor*2:0);
  gainXP(xpGain);
  S.combatLog.push({msg:`+${ge}g +${Math.floor(xpGain*S.xpMult)}xp`,color:'#ffd700'});
  addLog(`Defeated ${e.name} (+${ge}g)`);
  if(e.isBoss){
    S.statuses=[];
    S.hp=S.maxHp;
    S.combatLog.push({msg:'BOSS DEFEATED! Full heal! Statuses cleared!',color:'#ffd700'});
    S.moves.forEach(m=>m.pp=m.maxPp);addMsg('Boss slain! Full HP restored!');SFX.heal();
  }
  if(e.isRival){S.combatLog.push({msg:'RIVAL DEFEATED!',color:'#ff3264'});S.gold+=50}
  if(Math.random()<0.08+S.eternals.luck*0.05&&S.artifacts.length<5){
    const arts=[{name:'Stone Pendant',effect:'rock_boost'},{name:'Sharp Ring',effect:'scissors_boost'},{name:'Paper Talisman',effect:'paper_boost'},
      {name:'Life Crystal',effect:'hp+30'},{name:'Vampire Fang',effect:'lifesteal'},{name:'Swift Cloak',effect:'swift'},{name:'Harmony Orb',effect:'harmony'}];
    const avail=arts.filter(a=>!S.artifacts.find(x=>x.effect===a.effect));
    if(avail.length){const a=pick(avail);S.artifacts.push(a);addMsg(`Found artifact: ${a.name}!`);SFX.pickup()}
  }
  S.combatState='result';
  if(S.freeItemFloor!==S.floor){
    S.freeItemPicks=pickFreeItems(S.floor,4);
    S.freeItemFloor=S.floor;
  }
  // Auto-show mini-shop after combat win
  S.showMiniShop=true;
}

function handleDeath(){
  const cr=Math.floor(S.floor/5)+(S.floor>=50?10:0)+(S.floor>=100?20:0);
  S.soulCrystals+=cr;S.totalRuns++;checkUnlocks();save();
  addMsg(`+${cr} Soul Crystals`);addLog(`Defeated at Floor ${S.floor}`);
  SFX.death();
  S.runActive=false;S.scene='death';
}

function handleVictory(){
  const cr=Math.floor(S.floor/5)+30;S.soulCrystals+=cr;S.totalRuns++;
  S.classicWon=true;checkUnlocks();save();S.runActive=false;S.scene='victory';
  SFX.victory();
}

let btns=[];let mX=0,mY=0;
const FS=isMobile?0.85:1; // Font scale factor for mobile
const BS=isMobile?1.15:1; // Button scale factor for mobile
function clrBtns(){btns=[]}
function addBtn(x,y,w,h,act,id){btns.push({x,y,w,h,action:act,id})}
function mIn(x,y,w,h){return mX>=x&&mX<=x+w&&mY>=y&&mY<=y+h}
function dRect(x,y,w,h,c,r=0){X.fillStyle=c;if(r){X.beginPath();X.roundRect(x,y,w,h,r);X.fill()}else X.fillRect(x,y,w,h)}
function dBorder(x,y,w,h,c,lw=2,r=0){X.strokeStyle=c;X.lineWidth=lw;if(r){X.beginPath();X.roundRect(x,y,w,h,r);X.stroke()}else X.strokeRect(x,y,w,h)}

function dChar(cx,cy,sz,col,sty,evo=0){
  if(sty==='terminal'){dText('  O  ',cx-18,cy-sz/2,col,sz/3);dText(' /|\\ ',cx-18,cy-sz/2+sz/3,col,sz/3);dText(' / \\ ',cx-18,cy-sz/2+sz*2/3,col,sz/3);return}
  const hr=sz*0.25,hy=cy-sz/2;
  if(evo>=1){X.globalAlpha=0.15+evo*0.05;X.fillStyle=col;X.beginPath();X.arc(cx,cy-sz/4,sz*0.7,0,Math.PI*2);X.fill();X.globalAlpha=1}
  dRect(cx-sz/4,hy+hr,sz/2,sz*0.4,col);
  X.fillStyle=col;X.beginPath();X.arc(cx,hy,hr,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';X.beginPath();X.arc(cx-hr/3,hy-2,Math.max(2,hr/5),0,Math.PI*2);X.fill();
  X.beginPath();X.arc(cx+hr/3,hy-2,Math.max(2,hr/5),0,Math.PI*2);X.fill();
  X.fillStyle='#000';X.beginPath();X.arc(cx-hr/3,hy-2,Math.max(1,hr/8),0,Math.PI*2);X.fill();
  X.beginPath();X.arc(cx+hr/3,hy-2,Math.max(1,hr/8),0,Math.PI*2);X.fill();
  X.strokeStyle=col;X.lineWidth=3;const ly=hy+hr+sz*0.4;
  X.beginPath();X.moveTo(cx-sz/6,ly);X.lineTo(cx-sz/4,ly+sz/3);X.stroke();
  X.beginPath();X.moveTo(cx+sz/6,ly);X.lineTo(cx+sz/4,ly+sz/3);X.stroke();
  if(evo>=2){X.fillStyle='#ffd700';X.beginPath();X.moveTo(cx-hr,hy-hr);X.lineTo(cx-hr/2,hy-hr-12);X.lineTo(cx,hy-hr-5);X.lineTo(cx+hr/2,hy-hr-12);X.lineTo(cx+hr,hy-hr);X.closePath();X.fill()}
  if(evo>=3){// Wings at prime evolution
    X.fillStyle='rgba(160,80,255,0.5)';
    X.beginPath();X.moveTo(cx-sz/4,hy+hr);X.lineTo(cx-sz*0.8,hy-hr*0.5);X.lineTo(cx-sz/4,hy+hr*0.5);X.closePath();X.fill();
    X.beginPath();X.moveTo(cx+sz/4,hy+hr);X.lineTo(cx+sz*0.8,hy-hr*0.5);X.lineTo(cx+sz/4,hy+hr*0.5);X.closePath();X.fill();
  }
  if(evo>=4){// Absolute: glowing crown aura
    X.globalAlpha=0.5+Math.sin(S.tick*0.08)*0.2;
    X.fillStyle='#ffd700';X.beginPath();X.arc(cx,cy-sz/4,sz*0.85,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }
}

function dEnemy(cx,cy,sz,name,col,sty,enemyData){
  const bob=Math.sin(S.tick*0.05)*3; // Idle bobbing for all enemies
  cy+=bob;

  if(sty==='terminal'){
    if(enemyData&&enemyData.isBoss){
      dText(' [====] ',cx-38,cy-sz/2,col,14);dText(' (O__O) ',cx-38,cy-sz/2+16,col,14);
      dText('  /||\\  ',cx-38,cy-sz/2+32,col,14);dText('  /  \\  ',cx-38,cy-sz/2+48,col,14);
    }else if(enemyData&&enemyData.isRival){
      dText('  (!)  ',cx-28,cy-sz/2,col,12);dText(' (>_<) ',cx-28,cy-sz/2+14,'#ff3264',12);
      dText('  /|\\  ',cx-28,cy-sz/2+28,col,12);dText('  / \\  ',cx-28,cy-sz/2+42,col,12);
    }else{
      dText('  ???  ',cx-28,cy-sz/2,col,12);dText(' (o_o) ',cx-28,cy-sz/2+14,col,12);
      dText('  /|\\  ',cx-28,cy-sz/2+28,col,12);dText('  / \\  ',cx-28,cy-sz/2+42,col,12);
    }
    return;
  }

  const isBoss=enemyData&&enemyData.isBoss;
  const isRival=enemyData&&enemyData.isRival;
  const phase2=isBoss&&enemyData.phase===2;

  if(isBoss){
    // BOSS: Full detailed sprite with armor, glowing eyes, particle aura
    const bsz=sz*0.55;
    // Particle aura
    X.globalAlpha=0.2+Math.sin(S.tick*0.08)*0.1;
    const auraCol=phase2?'#ff0000':col;
    for(let i=0;i<8;i++){
      const ang=S.tick*0.03+i*(Math.PI/4);
      const r=bsz+10+Math.sin(S.tick*0.05+i)*5;
      X.fillStyle=auraCol;
      X.beginPath();X.arc(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r,3+Math.random()*2,0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;
    // Body (armored)
    const bodyCol=phase2?'#880000':col;
    X.fillStyle=bodyCol;
    X.beginPath();X.arc(cx,cy-bsz*0.3,bsz*0.5,0,Math.PI*2);X.fill(); // Head
    // Armor body
    dRect(cx-bsz*0.45,cy-bsz*0.1,bsz*0.9,bsz*0.7,bodyCol,4);
    // Armor lines
    X.strokeStyle=phase2?'#ff4444':'rgba(255,255,255,0.3)';X.lineWidth=2;
    X.beginPath();X.moveTo(cx-bsz*0.4,cy);X.lineTo(cx+bsz*0.4,cy);X.stroke();
    X.beginPath();X.moveTo(cx,cy-bsz*0.1);X.lineTo(cx,cy+bsz*0.5);X.stroke();
    // Arms
    X.strokeStyle=bodyCol;X.lineWidth=4;
    X.beginPath();X.moveTo(cx-bsz*0.45,cy+bsz*0.1);X.lineTo(cx-bsz*0.7,cy+bsz*0.5);X.stroke();
    X.beginPath();X.moveTo(cx+bsz*0.45,cy+bsz*0.1);X.lineTo(cx+bsz*0.7,cy+bsz*0.5);X.stroke();
    // Legs
    X.beginPath();X.moveTo(cx-bsz*0.2,cy+bsz*0.6);X.lineTo(cx-bsz*0.3,cy+bsz);X.stroke();
    X.beginPath();X.moveTo(cx+bsz*0.2,cy+bsz*0.6);X.lineTo(cx+bsz*0.3,cy+bsz);X.stroke();
    // Glowing eyes
    const eyeGlow=phase2?'#ff0000':'#ffff00';
    X.fillStyle=eyeGlow;
    X.shadowColor=eyeGlow;X.shadowBlur=8;
    X.beginPath();X.arc(cx-bsz*0.15,cy-bsz*0.35,bsz*0.08,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+bsz*0.15,cy-bsz*0.35,bsz*0.08,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
    // Crown/horns for boss
    X.fillStyle=phase2?'#ff3333':'#ffd700';
    X.beginPath();X.moveTo(cx-bsz*0.3,cy-bsz*0.6);X.lineTo(cx-bsz*0.15,cy-bsz*0.9);X.lineTo(cx,cy-bsz*0.65);X.fill();
    X.beginPath();X.moveTo(cx+bsz*0.3,cy-bsz*0.6);X.lineTo(cx+bsz*0.15,cy-bsz*0.9);X.lineTo(cx,cy-bsz*0.65);X.fill();
  }else if(isRival){
    // RIVAL: More detailed, pulsing red aura, body + arms + weapon
    const rsz=sz*0.42;
    // Pulsing red aura
    X.globalAlpha=0.15+Math.sin(S.tick*0.1)*0.1;
    X.fillStyle='#ff3264';
    X.beginPath();X.arc(cx,cy,rsz*1.5,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
    // Body
    X.fillStyle=col;
    X.beginPath();X.arc(cx,cy-rsz*0.4,rsz*0.4,0,Math.PI*2);X.fill(); // Head
    dRect(cx-rsz*0.35,cy-rsz*0.1,rsz*0.7,rsz*0.6,col,3);
    // Arms
    X.strokeStyle=col;X.lineWidth=3;
    X.beginPath();X.moveTo(cx-rsz*0.35,cy+rsz*0.1);X.lineTo(cx-rsz*0.6,cy+rsz*0.5);X.stroke();
    X.beginPath();X.moveTo(cx+rsz*0.35,cy+rsz*0.1);X.lineTo(cx+rsz*0.6,cy+rsz*0.5);X.stroke();
    // Weapon (sword)
    X.strokeStyle='#c0c0c0';X.lineWidth=2;
    X.beginPath();X.moveTo(cx+rsz*0.6,cy+rsz*0.5);X.lineTo(cx+rsz*0.8,cy);X.stroke();
    // Eyes (angry)
    X.fillStyle='#ff0000';
    X.beginPath();X.arc(cx-rsz*0.12,cy-rsz*0.45,rsz*0.08,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+rsz*0.12,cy-rsz*0.45,rsz*0.08,0,Math.PI*2);X.fill();
  }else{
    // BASIC ENEMY: Simple circle with eyes + idle bob (already applied)
    const fierce=S.floor>150;
    X.fillStyle=col;X.beginPath();X.arc(cx,cy,sz/3,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(255,255,255,0.3)';X.lineWidth=2;X.beginPath();X.arc(cx,cy,sz/3,0,Math.PI*2);X.stroke();
    const eyeSize=fierce?sz/8:sz/10;
    X.fillStyle=fierce?'#ff0000':'#fff';X.beginPath();X.arc(cx-sz/7,cy-sz/10,eyeSize,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+sz/7,cy-sz/10,eyeSize,0,Math.PI*2);X.fill();
    X.fillStyle='#000';X.beginPath();X.arc(cx-sz/7,cy-sz/10,eyeSize/2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+sz/7,cy-sz/10,eyeSize/2,0,Math.PI*2);X.fill();
    if(fierce){X.strokeStyle='#fff';X.lineWidth=1;X.beginPath();X.moveTo(cx-sz/6,cy+sz/8);X.lineTo(cx,cy+sz/6);X.lineTo(cx+sz/6,cy+sz/8);X.stroke()}
  }
  dText(name,cx,cy+sz/2+8,col,10,'center');
}

// ============================================================
function doRun(){
  if(S.combatState==='animating')return;
  if(S.enemy.isBoss){S.combatLog.push({msg:"Can't run from boss!",color:'#dc3232'});return}
  if(S.enemy.isRival){S.combatLog.push({msg:"Can't run from rival!",color:'#dc3232'});return}
  if(Math.random()<0.5+effSpd()*0.02){S.combatLog.push({msg:'Escaped!',color:'#32c832'});addLog('Escaped from battle');S.combatState='result'}
  else{S.combatLog.push({msg:"Couldn't escape!",color:'#dc3232'});enemyTurn();if(S.hp<=0)handleDeath()}
}
function doSurrender(){
  if(S.combatState==='animating')return;
  addMsg('Surrendered — moving to next floor');
  addLog(`Surrendered at floor ${S.floor}`);
  S.combatState='result';
  S.showMiniShop=false;
  advanceFloor();
}
