  S.eternalItems.forEach((u,i)=>{const lv=S.eternals[u.key]||0;const cost=u.base*(lv+1);const ok=S.soulCrystals>=cost;
    const y=90+i*(isMobile?50:58);dBtn(isMobile?30:100,y,W-(isMobile?60:200),isMobile?44:50,`${u.name} (Lv.${lv}) — ${cost} SC`,p,()=>{
      if(S.soulCrystals>=cost){SFX.coin();S.soulCrystals-=cost;S.eternals[u.key]=(S.eternals[u.key]||0)+1;save();addMsg('Upgraded!')}
    },'es_'+i,ok);
  });
  dBtn(W/2-60,H-45,120,32,'Back',p,()=>{S.scene='menu'},'es_bk');
}

// ============================================================
// SETTINGS
// ============================================================
function drawSettings(){
  const p=STYLES.menu;dRect(0,0,W,H,p.bg);
  dText('Settings',W/2,30,p.title,isMobile?22:28,'center',true);
  const diffs=['Easy','Normal','Hard','Extreme'];
  dText('Difficulty:',W/2,isMobile?80:100,p.text,isMobile?14:18,'center');
  diffs.forEach((d,i)=>{const x=W/2-200+i*100;
    const sel=S.settings.difficulty===i;
    dBtn(x,isMobile?100:130,90,35,d,p,()=>{S.settings.difficulty=i;save()},'sd_'+i);
    if(sel)dBorder(x,isMobile?100:130,90,35,'#ffd700',3,8);
  });
  const speeds=['0.5x','1x','1.5x','2x'];
  dText('Game Speed:',W/2,isMobile?160:200,p.text,isMobile?14:18,'center');
  speeds.forEach((s,i)=>{const x=W/2-200+i*100;const vals=[0.5,1,1.5,2];
    const sel=S.settings.speed===vals[i];
    dBtn(x,isMobile?180:230,90,35,s,p,()=>{S.settings.speed=vals[i];save()},'ss_'+i);
    if(sel)dBorder(x,isMobile?180:230,90,35,'#ffd700',3,8);
  });
  dBtn(W/2-60,isMobile?280:350,120,38,'Back',p,()=>{S.scene='menu'},'set_bk');
}
// ============================================================
// HOW TO PLAY (updated for v5.0)
// ============================================================
function drawHowToPlay(){
  const p=STYLES.menu;dRect(0,0,W,H,p.bg);
  dText('How to Play — RPS Legends v5.0',W/2,8,p.title,isMobile?14:20,'center',true);
  const sections=[
    {title:'BASICS',color:p.accent,lines:[
      'Rock beats Scissors (1.5x) | Scissors beats Paper (1.5x) | Paper beats Rock (1.5x)',
      'Weak matchup = 0.6x damage. CRITS deal 1.5x damage.',
    ]},
    {title:'TYPE SPECIALTIES',color:'#28c8dc',lines:[
      'Rock: +10% dmg, -15% dmg taken, -20% speed',
      'Paper: Heals 3% HP/turn passively, but easier to hit',
      'Scissors: +25% crit chance, +15% speed, but 20% more dmg taken',
    ]},
    {title:'ITEM RARITY',color:RARITIES.Legendary.color,lines:[
      'Common (white) | Uncommon (green) | Rare (blue) | Epic (purple) | Legendary (gold)',
      'After each battle win: open Item Shop to BUY potions AND pick 1 FREE item.',
      'Epic/Legendary items grant powerful passives.',
    ]},
    {title:'v5.0 CHANGES',color:'#ff5000',lines:[
      'Every move now has unique visual animations!',
      'Procedural sound effects via Web Audio API.',
      'Bosses and rivals have detailed visual tiers.',
      'Mobile-optimized layout with larger tap targets.',
      'Regular shop removed — mini-shop is the only shop now.',
    ]},
    {title:'PROGRESSION',color:'#32c832',lines:[
      '300 floors Classic + Endless Mode (unlock after beating Classic).',
      'Boss every 10 floors | Rival every 25 floors.',
      'Evolve at Floor 25 (Stage 1) and Floor 50 (Final).',
    ]},
  ];
  let y=32;
  if(!S._htpScroll)S._htpScroll=0;
  X.save();X.beginPath();X.rect(0,30,W,H-60);X.clip();
  const offsetY=S._htpScroll||0;
  sections.forEach(sec=>{
    dText(sec.title,40,y+offsetY,sec.color,13,undefined,true);y+=18;
    sec.lines.forEach(l=>{dText('  '+l,40,y+offsetY,p.text,isMobile?8:10);y+=14});
    y+=6;
  });
  X.restore();
  dBtn(W/2-100,H-38,90,28,'Scroll Up',p,()=>{S._htpScroll=(S._htpScroll||0)+60},'htp_u');
  dBtn(W/2+10,H-38,90,28,'Scroll Down',p,()=>{S._htpScroll=(S._htpScroll||0)-60},'htp_d');
  dBtn(W-130,H-38,110,28,'Back',p,()=>{S.scene='menu';S._htpScroll=0},'htp_bk');
}

// ============================================================
// DEATH / VICTORY
// ============================================================
function drawDeath(){
  dRect(0,0,W,H,'#0f0505');
  dText('DEFEATED',W/2,80,'#dc3232',isMobile?28:36,'center',true);
  const cr=Math.floor(S.floor/5)+(S.floor>=50?10:0)+(S.floor>=100?20:0);
  [`Floor ${S.floor}`,`${evoName()} Lv.${S.level}`,`Gold: ${S.gold}`,`+${cr} Soul Crystals`].forEach((l,i)=>dText(l,W/2,170+i*30,'#e0e0e0',isMobile?14:18,'center'));
  dBtn(W/2-100,350,200,44,'Return to Menu',STYLES.menu,()=>{S.runActive=false;S.scene='menu'},'d_m');
}

function drawVictory(){
  dRect(0,0,W,H,'#050519');
  dText('VICTORY!',W/2,60,'#ffd700',isMobile?30:40,'center',true);
  dText('Conquered all 300 floors!',W/2,115,'#28c8dc',isMobile?14:20,'center');
  const cr=Math.floor(S.floor/5)+30;
  [`${evoName()} Lv.${S.level}`,`HP: ${S.hp}/${S.maxHp}`,`Gold: ${S.gold}`,`+${cr} Soul Crystals`,'Endless Mode Unlocked!'].forEach((l,i)=>dText(l,W/2,170+i*30,'#e0e0e0',isMobile?14:18,'center'));
  dBtn(W/2-100,370,200,44,'Return to Menu',STYLES.menu,()=>{S.runActive=false;S.scene='menu'},'v_m');
}

function drawMsgs(){
  let y=H-60;
  S.messages.slice().reverse().slice(0,3).forEach(m=>{
    dRect(15,y,W-30,24,'rgba(0,0,0,0.75)',4);dText(m.text,25,y+4,'#ffd700',isMobile?10:12);y-=28;
  });
}

// ============================================================
// INPUT
// ============================================================
function handleClick(ex,ey){
  mX=ex;mY=ey;
  SFX._init(); // Init audio context on first user gesture
  for(let i=btns.length-1;i>=0;i--){const b=btns[i];if(ex>=b.x&&ex<=b.x+b.w&&ey>=b.y&&ey<=b.y+b.h){b.action();return}}
}
C.addEventListener('mousemove',e=>{const p=gmp(e);mX=p.x;mY=p.y});
C.addEventListener('click',e=>{const p=gmp(e);handleClick(p.x,p.y)});
C.addEventListener('touchstart',e=>{e.preventDefault();const p=gmp(e);handleClick(p.x,p.y)},{passive:false});

// Keyboard handler for tester code input
window.addEventListener('keydown',e=>{
  if(!_testerInputActive)return;
  if(e.key==='Backspace'){_testerInputValue=_testerInputValue.slice(0,-1);e.preventDefault();return}
  if(e.key==='Enter'){
    if(_testerInputValue.toLowerCase()==='jk2e3'){
      try{localStorage.setItem('rps_tester','JK2E3')}catch(ex){}
      rpsDebugMode=true;addMsg('Tester mode activated!');
    }else{addMsg('Invalid code.')}
    _testerInputActive=false;_testerInputValue='';return;
  }
  if(e.key==='Escape'){_testerInputActive=false;_testerInputValue='';return}
  if(e.key.length===1&&_testerInputValue.length<10){_testerInputValue+=e.key;e.preventDefault()}
});

// ============================================================
// MAIN LOOP
// ============================================================
loadSave();
function loop(){
  S.tick++;X.save();X.scale(sc,sc);clrBtns();

  // Check if animation completed and execute pending move
  if(animState&&!animState.active&&pendingMoveAction){
    const action=pendingMoveAction;
    pendingMoveAction=null;
    animState=null;
    action();
  }

  const s=S.scene;
  if(s==='menu')drawMenu();
  else if(s==='modeSelect')drawModeSelect();
  else if(s==='charSelect')drawCharSelect();
  else if(s==='difficultySelect')drawDifficultySelect();
  else if(s==='charShop')drawCharShop();
  else if(s==='combat')drawCombat();
  else if(s==='bossPreview')drawBossPreview();
  else if(s==='encounter')drawEncounter();
  else if(s==='eternalShop')drawEternalShop();
  else if(s==='howToPlay')drawHowToPlay();
  else if(s==='settings')drawSettings();
  else if(s==='death')drawDeath();
  else if(s==='victory')drawVictory();
  else if(s==='learnMove')drawLearnMove();
  // Debug badge
  if(rpsDebugMode){
    dText('\uD83D\uDD27 TESTER',W-10,5,'#00ff41',11,'right',true);
  }
  drawMsgs();
  S.messages=S.messages.filter(m=>{m.timer--;return m.timer>0});
  X.restore();
  requestAnimationFrame(loop);
}
loop();
</script>
