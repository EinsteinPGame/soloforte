<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>TIMESTRIKE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;touch-action:none;user-select:none;font-family:'Courier New',monospace}
canvas{display:block}
.screen-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.95);z-index:10;color:#fff}
.screen-overlay h1{font-size:3rem;margin-bottom:10px;text-shadow:0 0 30px currentColor}
.screen-overlay p{color:#888;margin:4px 0;font-size:0.9rem}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:12px 0}
.gbtn{padding:10px 28px;font-size:1rem;font-family:'Courier New',monospace;border:2px solid #0ff;background:transparent;color:#0ff;border-radius:4px;cursor:pointer;transition:all 0.2s}
.gbtn:hover{background:#0ff3;box-shadow:0 0 20px #0ff5}
.gbtn.locked{border-color:#333;color:#333;cursor:default;pointer-events:none}
.level-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:600px;margin:12px auto}
@media(max-width:600px){.level-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<script src="auth.js"></script>
<script src="back-btn.js"></script>
<canvas id="c"></canvas>

<div id="title-screen" class="screen-overlay">
  <h1 style="color:#0ff">TIMESTRIKE</h1>
  <p style="color:#a8f;font-size:1.1rem">BULLET TIME SHOOTER V3</p>
  <p id="controls-hint">WASD: Move | Mouse: Aim | Click: Shoot</p>
  <p id="controls-hint2">R: Switch Weapon | E/Space: Melee | Stop Moving = Bullet Time</p>
  <div class="btn-row" style="margin-top:16px" id="mode-row">
    <button class="gbtn" onclick="setMode('fps')" id="mode-fps" style="border-color:#0ff;color:#0ff">FPS MODE</button>
    <button class="gbtn" onclick="setMode('classic')" id="mode-classic" style="border-color:#a8f;color:#a8f">CLASSIC MODE</button>
  </div>
  <p id="mode-desc" style="color:#666;font-size:0.8rem;margin:4px 0">FPS: First-person raycaster | Classic: Top-down shooter</p>
  <div class="btn-row">
    <button class="gbtn" onclick="showLevelSelect()">CAMPAIGN</button>
    <button class="gbtn" onclick="startSurvival()" style="border-color:#f80;color:#f80">SURVIVAL</button>
  </div>
  <p id="survival-best" style="color:#555;font-size:0.75rem;margin-top:2px"></p>
  <div class="btn-row" id="continue-row" style="display:none">
    <button class="gbtn" id="continue-btn">CONTINUE</button>
  </div>
</div>

<div id="levelselect-screen" class="screen-overlay" style="display:none">
  <h1 style="color:#0ff;font-size:1.8rem">SELECT LEVEL</h1>
  <div class="level-grid" id="level-grid"></div>
  <div class="btn-row"><button class="gbtn" onclick="showTitle()">BACK</button></div>
</div>

<div id="complete-screen" class="screen-overlay" style="display:none">
  <h1 style="color:#0f0">LEVEL COMPLETE</h1>
  <p id="complete-rating" style="font-size:4rem;color:#ff0"></p>
  <p id="complete-stats"></p>
  <div class="btn-row">
    <button class="gbtn" id="next-level-btn">NEXT LEVEL</button>
    <button class="gbtn" onclick="showLevelSelect()">LEVEL SELECT</button>
  </div>
</div>

<div id="gameover-screen" class="screen-overlay" style="display:none">
  <h1 style="color:#f44">GAME OVER</h1>
  <p id="gameover-stats"></p>
  <div class="btn-row">
    <button class="gbtn" id="retry-btn">RETRY</button>
    <button class="gbtn" id="gameover-menu-btn" onclick="showTitle()">MENU</button>
  </div>
</div>

function playSound(freq,dur,type='square',vol=0.15){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,actx.currentTime);
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+dur);
}

// Wave definitions
function getWaves(lvl){
  const w=[];
  switch(lvl){
    case 1:w.push([{type:'grunt',count:3}]);w.push([{type:'grunt',count:5}]);break;
    case 2:w.push([{type:'grunt',count:4}]);w.push([{type:'grunt',count:3},{type:'rusher',count:2}]);break;

    case 4:w.push([{type:'grunt',count:3},{type:'rusher',count:3}]);w.push([{type:'grunt',count:4},{type:'rusher',count:3},{type:'sniper_e',count:1}]);break;
    case 5:w.push([{type:'grunt',count:5},{type:'rusher',count:3}]);w.push([{type:'grunt',count:4},{type:'sniper_e',count:2},{type:'rusher',count:3}]);break;

    case 12:w.push([{type:'tank',count:3},{type:'rusher',count:3},{type:'bomber',count:2}]);w.push([{type:'tank',count:3},{type:'shield',count:3},{type:'teleporter',count:2},{type:'grunt',count:4}]);break;

function getSurvivalWaves(wave){
  const w=[];
  const types=['grunt','rusher','sniper_e','bomber','teleporter','tank','shield'];
  const available=types.slice(0,Math.min(2+Math.floor(wave/2),types.length));
  const baseCount=3+Math.floor(wave*0.8);
  const numTypes=Math.min(1+Math.floor(wave/3),available.length);
  // Wave 1 composition
  const w1=[];
  for(let i=0;i<numTypes;i++){
    const t=available[Math.min(i,available.length-1)];
    const c=Math.max(1,Math.floor(baseCount/(numTypes+1))+(i===0?2:0));
    w1.push({type:t,count:c});
  }
  w.push(w1);
  // Wave 2 (harder)
  if(wave>1){
    const w2=[];
    for(let i=0;i<Math.min(numTypes+1,available.length);i++){
      const t=available[i%available.length];
      const c=Math.max(1,Math.floor(baseCount/numTypes));
      w2.push({type:t,count:c});
    }
    w.push(w2);
  }
  // Boss every 5 waves
  if(wave>0&&wave%5===0){
    w.push([{type:wave%10===0?'boss_final':'boss_mini',count:1}]);
  }
  return w;
}

// ── LEVEL INIT ──
function initLevel(lvl){
  currentLevel=lvl;
  const map=MAPS[Math.min(lvl-1,MAPS.length-1)];
  worldMap=[];walls=[];barrels=[];movingWalls=[];
  enemies=[];bullets=[];particles=[];
  let spawnX=10.5,spawnY=7.5;
  for(let r=0;r<map.length;r++){
    worldMap[r]=[];
    for(let c=0;c<map[r].length;c++){
      const ch=map[r][c];
      if(ch==='#'){worldMap[r][c]=1;}
      else{
        worldMap[r][c]=0;
        if(ch==='S'){spawnX=c+0.5;spawnY=r+0.5;}
        else if(ch==='B'){barrels.push({x:c+0.5,y:r+0.5,r:0.3,hp:30,alive:true});}
      }
    }
  }
  player={x:spawnX,y:spawnY,angle:0,pitch:0,hp:100,maxHp:100,
    fireCooldown:0,invuln:0,bobPhase:0,muzzleFlash:0,weaponBob:0};
  waveIndex=0;waveTimer=1;wavesCleared=false;
  if(survivalMode){currentWaves=getSurvivalWaves(1);survivalWave=0;}
  levelTimer=0;killCount=0;shotsFired=0;shotsHit=0;
  gameOver=false;levelComplete=false;
  bossActive=false;bossHP=0;bossMaxHP=0;
  timeScale=1;targetTimeScale=1;
  shakeMag=0;damageVignette=0;hitMarkerTimer=0;
  meleeActive=false;meleeTimer=0;meleeCooldown=0;
  comboCount=0;comboTimer=0;score=0;bestCombo=0;hpPickups=[];
  if(lvl===4||lvl===5){
    for(let i=0;i<3;i++){
      movingWalls.push({x:5+i*4,y:3+i*2,vx:(i%2?1:-1)*0.01,vy:0});
    }
  }
}

function isWall(cx,cy){
  const ix=Math.floor(cx),iy=Math.floor(cy);
  if(ix<0||ix>=MAP_W||iy<0||iy>=MAP_H)return true;
  return worldMap[iy]&&worldMap[iy][ix]===1;
}

function spawnEnemiesForWave(waveDef){
  const spawnPoints=[];
  for(let r=1;r<MAP_H-1;r++){
    for(let c=1;c<MAP_W-1;c++){
      if(worldMap[r][c]===0){
        const sx=c+0.5,sy=r+0.5;
        const dx=sx-player.x,dy=sy-player.y;
        if(Math.sqrt(dx*dx+dy*dy)>4)spawnPoints.push({x:sx,y:sy});
      }
    }
  }
  for(const group of waveDef){
    for(let i=0;i<group.count;i++){
      const sp=spawnPoints[Math.floor(Math.random()*spawnPoints.length)]||{x:15,y:3};
      enemies.push(createEnemy(group.type,sp.x,sp.y));
    }
  }
}

// ── INPUT ──
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key==='r'||e.key==='R')switchWeapon();
  if(e.key==='e'||e.key==='E'||e.key===' ')triggerMelee();
  if(gameState==='game')e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
document.addEventListener('mousemove',e=>{
  if(gameMode==='fps'){
    if(pointerLocked&&gameState==='game'){mouseDx+=e.movementX;mouseDy+=e.movementY;}
  }else{
    mouseX=e.clientX;mouseY=e.clientY;
  }
});
document.addEventListener('mousedown',e=>{mouseDown=true;initAudio();
  if(gameState==='game'&&gameMode==='fps'&&!pointerLocked)C.requestPointerLock();
});
document.addEventListener('mouseup',()=>{mouseDown=false});
document.addEventListener('pointerlockchange',()=>{pointerLocked=!!document.pointerLockElement});

// ── MOBILE TOUCH CONTROLS ──
let touchJoystick={active:false,id:null,cx:0,cy:0,dx:0,dy:0};
let touchAim={active:false,id:null,x:0,y:0};
let mobileFireHeld=false;

if(isMobile){
  // Force classic mode on mobile
  gameMode='classic';

  // Hide FPS mode button, update hints
  document.addEventListener('DOMContentLoaded',()=>{
    const modeRow=document.getElementById('mode-row');
    if(modeRow)modeRow.style.display='none';
    const h1=document.getElementById('controls-hint');
    const h2=document.getElementById('controls-hint2');
    if(h1)h1.textContent='Left: Move joystick | Right: Aim & shoot';
    if(h2)h2.textContent='Buttons: Melee, Switch weapon | Stop = Bullet Time';
    const desc=document.getElementById('mode-desc');
    if(desc)desc.textContent='Classic mode (optimized for touch)';
  });

  C.addEventListener('touchstart',e=>{
    e.preventDefault();initAudio();
    for(const t of e.changedTouches){
      const tx=t.clientX,ty=t.clientY;
      // Left 40% = joystick
      if(tx<innerWidth*0.4&&!touchJoystick.active){
        touchJoystick.active=true;touchJoystick.id=t.identifier;
        touchJoystick.cx=tx;touchJoystick.cy=ty;touchJoystick.dx=0;touchJoystick.dy=0;
      }
      // Right 60% = aim + shoot + buttons
      else if(tx>=innerWidth*0.4){
        // Check button areas first (bigger hit zones for mobile)
        const meleeR=50,swR=50;
        const meleeX=innerWidth-60,meleeY=innerHeight-100;
        const swX=innerWidth-140,swY=innerHeight-100;
        const dMelee=Math.sqrt((tx-meleeX)**2+(ty-meleeY)**2);
        const dSwitch=Math.sqrt((tx-swX)**2+(ty-swY)**2);
        if(dMelee<meleeR){triggerMelee();}
        else if(dSwitch<swR){switchWeapon();}
        else{
          touchAim.active=true;touchAim.id=t.identifier;
          touchAim.x=tx;touchAim.y=ty;
          mouseX=tx;mouseY=ty;
          mobileFireHeld=true;mouseDown=true;
        }
      }
    }
  },{passive:false});

  C.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===touchJoystick.id&&touchJoystick.active){
        touchJoystick.dx=t.clientX-touchJoystick.cx;
        touchJoystick.dy=t.clientY-touchJoystick.cy;
        // Clamp to joystick radius
        const maxR=60;
        const d=Math.sqrt(touchJoystick.dx*touchJoystick.dx+touchJoystick.dy*touchJoystick.dy);
        if(d>maxR){touchJoystick.dx*=maxR/d;touchJoystick.dy*=maxR/d;}
      }
      if(t.identifier===touchAim.id&&touchAim.active){
        touchAim.x=t.clientX;touchAim.y=t.clientY;
        mouseX=t.clientX;mouseY=t.clientY;
      }
    }
  },{passive:false});

  C.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===touchJoystick.id){
        touchJoystick.active=false;touchJoystick.dx=0;touchJoystick.dy=0;
      }
      if(t.identifier===touchAim.id){
        touchAim.active=false;mobileFireHeld=false;mouseDown=false;
      }
    }
  },{passive:false});

  C.addEventListener('touchcancel',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===touchJoystick.id){
        touchJoystick.active=false;touchJoystick.dx=0;touchJoystick.dy=0;
      }
      if(t.identifier===touchAim.id){
        touchAim.active=false;mobileFireHeld=false;mouseDown=false;
      }
    }
  },{passive:false});
}

function switchWeapon(){
  if(gameState!=='game')return;
  let next=(currentWeapon+1)%WEAPONS.length;
  while(!isWeaponUnlocked(next)&&next!==currentWeapon)next=(next+1)%WEAPONS.length;
  currentWeapon=next;
}
function isWeaponUnlocked(idx){
  if(idx===0)return true;
  if(idx===1)return save.level>=3;
  if(idx===2)return save.level>=6;
  if(idx===3)return save.level>=9;
  return false;
}
function triggerMelee(){
  if(gameState!=='game'||meleeCooldown>0)return;
  meleeActive=true;meleeTimer=0.2;meleeCooldown=0.5;
  sfxMelee();
  // Melee damage to nearby enemies
  for(const e of enemies){
    if(!e.alive)continue;
    const dx=e.x-player.x,dy=e.y-player.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<1.5){
      const aToE=Math.atan2(dy,dx);
      let diff=aToE-player.angle;
      while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
      if(Math.abs(diff)<Math.PI*0.5){
        damageEnemy(e,60);
        e.knockback.x=Math.cos(aToE)*0.15;e.knockback.y=Math.sin(aToE)*0.15;
      }
    }
  }
  // Deflect bullets
  for(const b of bullets){
    if(!b.enemy)continue;
    const dx=b.x-player.x,dy=b.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<1){
      b.enemy=false;
      b.vx=Math.cos(player.angle)*0.15;b.vy=Math.sin(player.angle)*0.15;
      b.color='#0ff';
    }
  }
}

// ── RAYCASTING ──
function castRay(angle){
  const dx=Math.cos(angle),dy=Math.sin(angle);
  let x=player.x,y=player.y;
  const stepX=dx>0?1:-1,stepY=dy>0?1:-1;
  let mapX=Math.floor(x),mapY=Math.floor(y);
  const dDistX=Math.abs(1/dx),dDistY=Math.abs(1/dy);
  let sDistX=dx>0?(mapX+1-x)*dDistX:(x-mapX)*dDistX;
  let sDistY=dy>0?(mapY+1-y)*dDistY:(y-mapY)*dDistY;
  let side=0,dist=0;
  for(let i=0;i<60;i++){
    if(sDistX<sDistY){sDistX+=dDistX;mapX+=stepX;side=0;dist=sDistX-dDistX;}
    else{sDistY+=dDistY;mapY+=stepY;side=1;dist=sDistY-dDistY;}
    if(mapX<0||mapX>=MAP_W||mapY<0||mapY>=MAP_H)break;
    if(worldMap[mapY]&&worldMap[mapY][mapX]===1)return{dist,side,mapX,mapY};
  }
  return{dist:MAX_DEPTH,side:0,mapX,mapY};
}

// ── UPDATE ──
function update(dt){
  if(gameState!=='game')return;
  if(gameOver||levelComplete)return;
  const realDt=dt;

  // Mobile joystick → keys mapping (analog proportional)
  let mobileAnalogX=0,mobileAnalogY=0;
  if(isMobile&&touchJoystick.active){
    const jd=Math.sqrt(touchJoystick.dx*touchJoystick.dx+touchJoystick.dy*touchJoystick.dy);
    const deadZone=Math.min(18,innerWidth*0.025);
    const maxR=60;
    if(jd>deadZone){
      mobileAnalogX=touchJoystick.dx/maxR;mobileAnalogY=touchJoystick.dy/maxR;
      // Clamp to -1..1
      const mag=Math.sqrt(mobileAnalogX*mobileAnalogX+mobileAnalogY*mobileAnalogY);
      if(mag>1){mobileAnalogX/=mag;mobileAnalogY/=mag;}
    }
    keys['w']=touchJoystick.dy<-deadZone;
    keys['s']=touchJoystick.dy>deadZone;
    keys['a']=touchJoystick.dx<-deadZone;
    keys['d']=touchJoystick.dx>deadZone;
  } else if(isMobile&&!touchJoystick.active){
    keys['w']=false;keys['a']=false;keys['s']=false;keys['d']=false;
  }

  // Bullet time
  const moving=keys['w']||keys['a']||keys['s']||keys['d']||
    keys['arrowup']||keys['arrowleft']||keys['arrowdown']||keys['arrowright'];
  // Mobile: small grace period before bullet time (0.3s) so lifting joystick doesn't instantly freeze
  if(!player._btGrace)player._btGrace=0;
  if(moving){player._btGrace=isMobile?0.5:0;}
  else if(player._btGrace>0){player._btGrace-=realDt;}
  const btActive=!moving&&player._btGrace<=0;
  targetTimeScale=btActive?0.03:0.7;
  // Smooth SUPERHOT-style transition: slow to enter bullet time, faster to exit
  const lerpSpeed=btActive?realDt*(isMobile?3:6):realDt*5;
  timeScale+=(targetTimeScale-timeScale)*lerpSpeed;
  if(btActive&&slowmoTimer<=0){slowmoTimer=0.5;sfxSlowmo();}
  if(!btActive)slowmoTimer=0;else slowmoTimer-=realDt;

  const ts=timeScale;
  const gdt=dt*ts;
  levelTimer+=gdt;

  // Mouse look / aim
  if(gameMode==='fps'){
    if(mouseDx!==0){player.angle+=mouseDx*MOUSE_SENS;mouseDx=0;}
    if(mouseDy!==0){player.pitch=Math.max(-C.height*0.35,Math.min(C.height*0.35,player.pitch-mouseDy*0.5));mouseDy=0;}
  }else{
    // Classic mode: aim toward mouse/touch position
    const cw=W||C.width,ch=H||C.height;
    const viewScale=Math.min(cw,ch)*0.045;
    const offX=cw/2-player.x*viewScale;
    const offY=ch/2-player.y*viewScale;
    const worldMX=(mouseX-offX)/viewScale;
    const worldMY=(mouseY-offY)/viewScale;
    player.angle=Math.atan2(worldMY-player.y,worldMX-player.x);
  }

  // Player movement
  let mx=0,my=0;
  if(gameMode==='fps'){
    if(keys['w']||keys['arrowup']){mx+=Math.cos(player.angle);my+=Math.sin(player.angle);}
    if(keys['s']||keys['arrowdown']){mx-=Math.cos(player.angle);my-=Math.sin(player.angle);}
    if(keys['a']||keys['arrowleft']){mx+=Math.cos(player.angle-Math.PI/2);my+=Math.sin(player.angle-Math.PI/2);}
    if(keys['d']||keys['arrowright']){mx+=Math.cos(player.angle+Math.PI/2);my+=Math.sin(player.angle+Math.PI/2);}
  }else{
    if(keys['w']||keys['arrowup'])my=-1;
    if(keys['s']||keys['arrowdown'])my=1;
    if(keys['a']||keys['arrowleft'])mx=-1;
    if(keys['d']||keys['arrowright'])mx=1;
  }
  const mlen=Math.sqrt(mx*mx+my*my);
  if(mlen>0){mx/=mlen;my/=mlen;}

  // On mobile, use analog joystick magnitude for proportional speed
  const spd=MOVE_SPEED*(60*realDt); // frame-rate independent (base tuned for 60fps)
  if(isMobile&&(mobileAnalogX!==0||mobileAnalogY!==0)){
    mx=mobileAnalogX;my=mobileAnalogY;
  }
  const nx=player.x+mx*spd;
  const ny=player.y+my*spd;
  const margin=0.2;
  if(!isWall(nx+margin,player.y)&&!isWall(nx-margin,player.y))player.x=nx;
  if(!isWall(player.x,ny+margin)&&!isWall(player.x,ny-margin))player.y=ny;

  // Weapon bob
  if(mlen>0){player.bobPhase+=realDt*8;player.weaponBob=Math.sin(player.bobPhase)*4;}
  else{player.weaponBob*=0.9;}

  // Invulnerability
  if(player.invuln>0)player.invuln-=realDt;

  // Melee timer
  if(meleeActive){meleeTimer-=realDt;if(meleeTimer<=0)meleeActive=false;}
  if(meleeCooldown>0)meleeCooldown-=realDt;

  // Muzzle flash
  if(player.muzzleFlash>0)player.muzzleFlash-=realDt*8;

  // Shooting
  if(player.fireCooldown>0)player.fireCooldown-=realDt;
  if(mouseDown&&player.fireCooldown<=0&&!meleeActive&&(pointerLocked||gameMode==='classic')){
    const wp=WEAPONS[currentWeapon];
    const spread=(Math.random()-0.5)*wp.spread;
    const shootAngle=player.angle+spread;
    player.fireCooldown=wp.fireRate;
    shotsFired++;
    wp.sfx();
    player.muzzleFlash=1;
    shakeMag=Math.max(shakeMag,currentWeapon===2?4:currentWeapon===3?3:2);

    if(wp.projectile){
      // Machine gun: visible projectile bullets with tracer trails
      const bvx=Math.cos(shootAngle)*wp.bulletSpeed;
      const bvy=Math.sin(shootAngle)*wp.bulletSpeed;
      bullets.push({
        x:player.x+Math.cos(shootAngle)*0.3,
        y:player.y+Math.sin(shootAngle)*0.3,
        vx:bvx,vy:bvy,
        damage:wp.damage,color:wp.color,
        enemy:false,r:wp.bulletR,life:wp.bulletLife,
        pierce:wp.pierce,
        tracer:true,trail:[]
      });
      // Shell casing particle
      const casingAngle=player.angle+(Math.random()>0.5?1:-1)*Math.PI/2;
      addParticles(player.x,player.y,1,'#cc8800',0.02);
    }else{
    // Hitscan weapons (pistol, SMG, sniper)
    const dx=Math.cos(shootAngle),dy=Math.sin(shootAngle);
    let rx=player.x,ry=player.y;
    let hit=false;
    for(let step=0;step<200;step++){
      rx+=dx*0.05;ry+=dy*0.05;
      if(isWall(rx,ry)){
        addParticles(rx,ry,3,'#ff8',0.05);break;
      }
      // Check enemy hits
      let hitEnemy=false;
      for(const e of enemies){
        if(!e.alive)continue;
        const edx=rx-e.x,edy=ry-e.y;
        if(Math.sqrt(edx*edx+edy*edy)<e.r){
          damageEnemy(e,wp.damage);
          shotsHit++;
          hitMarkerTimer=0.2;
          hitEnemy=true;
          if(!wp.pierce){hit=true;break;}
        }
      }
      if(hit||hitEnemy&&!wp.pierce)break;
      // Check barrel hits
      for(const br of barrels){
        if(!br.alive)continue;
        const bdx=rx-br.x,bdy=ry-br.y;
        if(Math.sqrt(bdx*bdx+bdy*bdy)<br.r){
          br.hp-=wp.damage;
          if(br.hp<=0)explodeBarrel(br);
          hit=true;break;
        }
      }
      if(hit)break;
    }
    }
  }

  // Update enemies
  for(const e of enemies){
    if(!e.alive)continue;
    e.hitFlash=Math.max(0,e.hitFlash-realDt*5);
    e.knockback.x*=0.9;e.knockback.y*=0.9;
    e.x+=e.knockback.x*ts;e.y+=e.knockback.y*ts;

    const aToP=Math.atan2(player.y-e.y,player.x-e.x);
    const dToP=Math.sqrt((player.x-e.x)**2+(player.y-e.y)**2);

    if(e.type==='shield')e.shieldAngle=aToP;

    if(e.isBoss){
      updateBoss(e,gdt,ts);
    }else if(e.type==='rusher'){
      if(dToP>e.rushDist){e.x+=Math.cos(aToP)*e.speed*ts;e.y+=Math.sin(aToP)*e.speed*ts;}
      if(dToP<0.5&&player.invuln<=0){
        player.hp-=e.damage*0.5;player.invuln=0.3;
        shakeMag=Math.max(shakeMag,5);sfxHit();damageVignette=1;
      }
      e.angle=aToP;
    }else if(e.type==='sniper_e'){
      const pref=e.preferDist||5;
      if(dToP<pref-0.5){e.x-=Math.cos(aToP)*e.speed*ts;e.y-=Math.sin(aToP)*e.speed*ts;}
      else if(dToP>pref+0.5){e.x+=Math.cos(aToP)*e.speed*ts;e.y+=Math.sin(aToP)*e.speed*ts;}
      e.angle=aToP;
      e.fireCooldown-=gdt;
      if(e.fireCooldown<=0&&dToP<10){enemyShoot(e,aToP);e.fireCooldown=e.fireRate;}
    }else if(e.type==='bomber'){
      // Rushes toward player, explodes on death (handled in damageEnemy)
      if(dToP>e.rushDist){e.x+=Math.cos(aToP)*e.speed*ts;e.y+=Math.sin(aToP)*e.speed*ts;}
      if(dToP<0.6&&player.invuln<=0){
        e.hp=0;e.alive=false;e.deathTimer=0.3;killCount++;sfxKill();
        addParticles(e.x,e.y,25,'#f80',0.1);shakeMag=Math.max(shakeMag,8);sfxBoss();
        // Explosion damage
        const pdx2=player.x-e.x,pdy2=player.y-e.y;
        if(Math.sqrt(pdx2*pdx2+pdy2*pdy2)<e.explodeR){
          player.hp-=e.explodeDmg;player.invuln=0.5;damageVignette=1;
        }
        for(const other of enemies){if(!other.alive||other===e)continue;
          const odx=other.x-e.x,ody=other.y-e.y;
          if(Math.sqrt(odx*odx+ody*ody)<e.explodeR)damageEnemy(other,e.explodeDmg);}
        comboCount++;comboTimer=2;score+=100*Math.min(5,1+Math.floor(comboCount/3));bestCombo=Math.max(bestCombo,comboCount);
      }
      e.angle=aToP;
    }else if(e.type==='teleporter'){
      // Teleports randomly, shoots from distance
      if(dToP>3){e.x+=Math.cos(aToP)*e.speed*ts;e.y+=Math.sin(aToP)*e.speed*ts;}
      e.angle=aToP;
      e.fireCooldown-=gdt;
      if(e.fireCooldown<=0&&dToP<10){enemyShoot(e,aToP);e.fireCooldown=e.fireRate;}
      // Teleport logic
      if(!e.teleportCD)e.teleportCD=0;
      e.teleportCD-=gdt;
      if(e.teleportCD<=0){
        // Teleport to random open tile at least 3 units from player
        let tx,ty,attempts=0;
        do{tx=1+Math.random()*(MAP_W-2);ty=1+Math.random()*(MAP_H-2);attempts++;}
        while((isWall(tx,ty)||Math.sqrt((tx-player.x)**2+(ty-player.y)**2)<3)&&attempts<20);
        if(!isWall(tx,ty)){
          addParticles(e.x,e.y,10,'#c0f',0.06);
          e.x=tx;e.y=ty;
          addParticles(e.x,e.y,10,'#c0f',0.06);
        }
        e.teleportCD=e.teleportInterval;
      }
    }else if(e.type==='tank'){
      // Slow, armored, keeps distance and shoots
      if(dToP>3){e.x+=Math.cos(aToP)*e.speed*ts;e.y+=Math.sin(aToP)*e.speed*ts;}
      e.angle=aToP;
      e.fireCooldown-=gdt;
      if(e.fireCooldown<=0&&dToP<10){enemyShoot(e,aToP);e.fireCooldown=e.fireRate;}
    }else if(e.type==='shield'){
      if(dToP>2){e.x+=Math.cos(aToP)*e.speed*ts;e.y+=Math.sin(aToP)*e.speed*ts;}
      e.angle=aToP;
      e.fireCooldown-=gdt;
      if(e.fireCooldown<=0){enemyShoot(e,aToP);e.fireCooldown=e.fireRate;}
    }else{
      // grunt
      if(dToP>2.5){e.x+=Math.cos(aToP)*e.speed*ts;e.y+=Math.sin(aToP)*e.speed*ts;}
      e.angle=aToP;
      e.fireCooldown-=gdt;
      if(e.fireCooldown<=0&&dToP<8){enemyShoot(e,aToP);e.fireCooldown=e.fireRate;}
    }
    // Wall collision for enemies
    const em=e.r;
    if(isWall(e.x+em,e.y))e.x=Math.floor(e.x+em)-em;
    if(isWall(e.x-em,e.y))e.x=Math.ceil(e.x-em)+em;
    if(isWall(e.x,e.y+em))e.y=Math.floor(e.y+em)-em;
    if(isWall(e.x,e.y-em))e.y=Math.ceil(e.y-em)+em;
  }

  // Boss tracking
  const boss=enemies.find(e=>e.isBoss&&e.alive);
  if(boss){bossActive=true;bossHP=boss.hp;bossMaxHP=boss.maxHp;}
  else bossActive=false;

  // Update bullets (enemy + player projectiles)
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    const spd=b.enemy?ts:(b.tracer?1:1);
    b.x+=b.vx*spd;b.y+=b.vy*spd;
    // Tracer trail — store positions for slow-mo rendering
    if(b.tracer&&b.trail){b.trail.push({x:b.x,y:b.y,t:8});if(b.trail.length>12)b.trail.shift();}
    if(b.trail){for(const t of b.trail)t.t-=realDt*3;}
    b.life-=gdt;
    if(isWall(b.x,b.y)){addParticles(b.x,b.y,3,b.color,0.03);bullets.splice(i,1);continue;}
    if(b.enemy){
      const dx=b.x-player.x,dy=b.y-player.y;
      if(Math.sqrt(dx*dx+dy*dy)<0.3&&player.invuln<=0){
        player.hp-=b.damage;player.invuln=0.2;
        shakeMag=Math.max(shakeMag,3);sfxHit();damageVignette=1;
        bullets.splice(i,1);continue;
      }
    }else{
      for(const e of enemies){
        if(!e.alive)continue;
        const dx=b.x-e.x,dy=b.y-e.y;
        if(Math.sqrt(dx*dx+dy*dy)<e.r){
          damageEnemy(e,b.damage||25);
          shotsHit++;hitMarkerTimer=0.2;
          if(!b.pierce){bullets.splice(i,1);break;}
        }
      }
    }
    if(bullets[i]&&b.life<=0)bullets.splice(i,1);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*ts;p.y+=p.vy*ts;
    p.life-=realDt*2;
    if(p.life<=0)particles.splice(i,1);
  }

  // Combo timer decay
  if(comboTimer>0){comboTimer-=realDt;if(comboTimer<=0)comboCount=0;}

  // HP pickups
  for(let i=hpPickups.length-1;i>=0;i--){
    const hp=hpPickups[i];
    hp.life-=realDt;
    if(hp.life<=0){hpPickups.splice(i,1);continue;}
    const dx=player.x-hp.x,dy=player.y-hp.y;
    if(Math.sqrt(dx*dx+dy*dy)<0.6){
      player.hp=Math.min(player.maxHp,player.hp+hp.amount);
      addParticles(hp.x,hp.y,6,'#0f0',0.04);
      hpPickups.splice(i,1);
    }
  }

  // Damage vignette
  if(damageVignette>0)damageVignette-=realDt*2;
  if(hitMarkerTimer>0)hitMarkerTimer-=realDt;

  // Screen shake
  if(shakeMag>0){
    shakeX=(Math.random()-0.5)*shakeMag;shakeY=(Math.random()-0.5)*shakeMag;
    shakeMag*=0.85;if(shakeMag<0.3)shakeMag=0;
  }else{shakeX=0;shakeY=0;}

  // Wave spawning
  const aliveCount=enemies.filter(e=>e.alive).length;
  enemiesRemaining=aliveCount;
  if(aliveCount===0&&!wavesCleared){
    const allWaves=survivalMode?currentWaves:getWaves(currentLevel);
    if(waveIndex<allWaves.length){
      waveTimer-=realDt;
      if(waveTimer<=0){spawnEnemiesForWave(allWaves[waveIndex]);waveIndex++;waveTimer=2;}
    }else{wavesCleared=true;completeLevel();}
  }

  // Player death
  if(player.hp<=0&&!gameOver){
    gameOver=true;shakeMag=15;
    overlayText='YOU DIED';overlayColor='#f44';overlayAlpha=1;
    setTimeout(()=>{
      overlayAlpha=0;
      gameState='gameover';
      document.exitPointerLock&&document.exitPointerLock();
      showGameOver();
    },2000);
  }

  // Remove dead enemies
  enemies=enemies.filter(e=>e.alive||e.deathTimer>0);
  for(const e of enemies){
    if(e.deathTimer!==undefined){e.deathTimer-=realDt;if(e.deathTimer<=0)e.remove=true;}
  }
  enemies=enemies.filter(e=>!e.remove);
}

function updateBoss(e,gdt,ts){
  const aToP=Math.atan2(player.y-e.y,player.x-e.x);
  const dToP=Math.sqrt((player.x-e.x)**2+(player.y-e.y)**2);
  e.angle=aToP;e.phaseTimer+=gdt;

  if(e.type==='boss_mini'){
    if(e.phase===0){
      const ca=aToP+Math.PI/2;
      e.x+=Math.cos(ca)*e.speed*ts;e.y+=Math.sin(ca)*e.speed*ts;
      e.fireCooldown-=gdt;
      if(e.fireCooldown<=0){enemyShoot(e,aToP);e.fireCooldown=e.fireRate;}
      if(e.phaseTimer>3){e.phase=1;e.phaseTimer=0;}
    }else{
      e.x+=Math.cos(aToP)*e.speed*2.5*ts;e.y+=Math.sin(aToP)*e.speed*2.5*ts;
      if(dToP<0.5&&player.invuln<=0){player.hp-=25;player.invuln=0.5;shakeMag=8;sfxHit();damageVignette=1;}
      if(e.phaseTimer>1.5){e.phase=0;e.phaseTimer=0;}
    }
  }else if(e.type==='boss_final'){
    const hpPct=e.hp/e.maxHp;
    if(hpPct>0.66){
      if(dToP>3){e.x+=Math.cos(aToP)*e.speed*ts;e.y+=Math.sin(aToP)*e.speed*ts;}
      e.fireCooldown-=gdt;
      if(e.fireCooldown<=0){
        for(let i=-2;i<=2;i++){
          const a=aToP+i*0.2;
          bullets.push({x:e.x+Math.cos(a)*e.r,y:e.y+Math.sin(a)*e.r,vx:Math.cos(a)*e.bulletSpeed,vy:Math.sin(a)*e.bulletSpeed,damage:e.damage,color:e.bulletColor,enemy:true,r:0.08,life:3});
        }
        e.fireCooldown=e.fireRate*3;
      }
    }else if(hpPct>0.33){
      const ca=aToP+Math.PI/2;
      e.x+=Math.cos(ca)*e.speed*1.8*ts;e.y+=Math.sin(ca)*e.speed*1.8*ts;
      e.fireCooldown-=gdt;
      if(e.fireCooldown<=0){
        for(let i=0;i<12;i++){
          const a=(Math.PI*2/12)*i;
          bullets.push({x:e.x+Math.cos(a)*e.r,y:e.y+Math.sin(a)*e.r,vx:Math.cos(a)*0.08,vy:Math.sin(a)*0.08,damage:e.damage*0.6,color:'#f80',enemy:true,r:0.08,life:2.5});
        }
        e.fireCooldown=e.fireRate*5;
      }
    }else{
      e.x+=Math.cos(aToP)*e.speed*2*ts;e.y+=Math.sin(aToP)*e.speed*2*ts;
      e.fireCooldown-=gdt;
      if(e.fireCooldown<=0){
        const spiralBase=e.phaseTimer*3;
        for(let i=0;i<8;i++){
          const a=spiralBase+(Math.PI*2/8)*i;
          bullets.push({x:e.x+Math.cos(a)*e.r,y:e.y+Math.sin(a)*e.r,vx:Math.cos(a)*0.1,vy:Math.sin(a)*0.1,damage:e.damage*0.5,color:'#f00',enemy:true,r:0.08,life:2});
        }
        e.fireCooldown=e.fireRate*4;
      }
      if(dToP<0.5&&player.invuln<=0){player.hp-=30;player.invuln=0.5;shakeMag=10;sfxHit();damageVignette=1;}
    }
  }
  // Wall collision
  const em=e.r;
  if(isWall(e.x+em,e.y))e.x=Math.floor(e.x+em)-em;
  if(isWall(e.x-em,e.y))e.x=Math.ceil(e.x-em)+em;
  if(isWall(e.x,e.y+em))e.y=Math.floor(e.y+em)-em;
  if(isWall(e.x,e.y-em))e.y=Math.ceil(e.y-em)+em;
}

function enemyShoot(e,angle){
  const spread=(Math.random()-0.5)*0.1;
  bullets.push({
    x:e.x+Math.cos(angle)*e.r,y:e.y+Math.sin(angle)*e.r,
    vx:Math.cos(angle+spread)*(e.bulletSpeed||0.08),vy:Math.sin(angle+spread)*(e.bulletSpeed||0.08),
    damage:e.damage,color:e.bulletColor||'#f88',enemy:true,r:0.08,life:3
  });
}

function damageEnemy(e,dmg){
  // Tank armor reduces damage
  if(e.armor)dmg=Math.max(1,Math.round(dmg*(1-e.armor)));
  e.hp-=dmg;e.hitFlash=1;
  addParticles(e.x,e.y,4,e.color,0.05);
  shakeMag=Math.max(shakeMag,2);
  if(e.hp<=0){
    e.alive=false;e.deathTimer=0.3;
    killCount++;sfxKill();
    addParticles(e.x,e.y,15,e.color,0.08);
    if(e.isBoss){shakeMag=15;sfxBoss();}
    // Bomber: explode on death
    if(e.explodeOnDeath){
      addParticles(e.x,e.y,25,'#f80',0.1);
      shakeMag=Math.max(shakeMag,8);sfxBoss();
      for(const other of enemies){
        if(!other.alive||other===e)continue;
        const edx=other.x-e.x,edy=other.y-e.y;
        if(Math.sqrt(edx*edx+edy*edy)<e.explodeR)damageEnemy(other,e.explodeDmg);
      }
      const pdx=player.x-e.x,pdy=player.y-e.y;
      if(Math.sqrt(pdx*pdx+pdy*pdy)<e.explodeR&&player.invuln<=0){
        player.hp-=e.explodeDmg;player.invuln=0.5;damageVignette=1;
      }
    }
    // Combo system
    comboCount++;comboTimer=2;
    const multiplier=Math.min(5,1+Math.floor(comboCount/3));
    score+=100*multiplier;
    bestCombo=Math.max(bestCombo,comboCount);
    // HP drop chance (20%, more likely at low HP)
    const dropChance=player.hp<40?0.35:0.20;
    if(Math.random()<dropChance){
      hpPickups.push({x:e.x,y:e.y,amount:15,life:8});
    }
  }
}

function explodeBarrel(br){
  br.alive=false;shakeMag=10;
  addParticles(br.x,br.y,25,'#f80',0.1);
  sfxBoss();
  for(const e of enemies){
    if(!e.alive)continue;
    const dx=e.x-br.x,dy=e.y-br.y;
    if(Math.sqrt(dx*dx+dy*dy)<2.5)damageEnemy(e,60);
  }
  const pdx=player.x-br.x,pdy=player.y-br.y;
  if(Math.sqrt(pdx*pdx+pdy*pdy)<2.5&&player.invuln<=0){
    player.hp-=30;player.invuln=0.5;damageVignette=1;
  }
}

function addParticles(x,y,count,color,speed=0.05){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*speed+speed*0.3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,r:0.05+Math.random()*0.05});
  }
}

let overlayText='',overlayAlpha=0,overlayColor='#0f0';
function completeLevel(){
  if(survivalMode){
    // Survival: heal 25%, start next wave
    survivalWave++;
    if(survivalWave>save.survivalBest){save.survivalBest=survivalWave;saveSave();}
    player.hp=Math.min(player.maxHp,player.hp+player.maxHp*0.25);
    overlayText='WAVE '+survivalWave+' CLEAR!';overlayColor='#0ff';overlayAlpha=1;
    sfxLevelComplete();
    setTimeout(()=>{
      overlayAlpha=0;
      // Load next survival wave
      const nextWaves=getSurvivalWaves(survivalWave+1);
      waveIndex=0;waveTimer=0;wavesCleared=false;
      levelComplete=false;
      currentWaves=nextWaves;
    },1500);
    return;
  }
  levelComplete=true;sfxLevelComplete();
  if(currentLevel<=15&&currentLevel>=save.level){save.level=Math.min(currentLevel+1,16);}
  const timeKey='l'+currentLevel;
  if(!save.bestTimes[timeKey]||levelTimer<save.bestTimes[timeKey])save.bestTimes[timeKey]=levelTimer;
  saveSave();
  overlayText='LEVEL COMPLETE!';overlayColor='#0f0';overlayAlpha=1;
  setTimeout(()=>{
    overlayAlpha=0;
    gameState='complete';
    document.exitPointerLock&&document.exitPointerLock();
    showComplete();
  },2000);
}

// ── RENDERING ──
function renderClassic(){
  W=C.width;H=C.height;
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  if(gameState!=='game')return;

  X.save();
  X.translate(shakeX,shakeY);

  // Camera centered on player
  const viewScale=Math.min(W,H)*0.045;
  const camX=W/2-player.x*viewScale;
  const camY=H/2-player.y*viewScale;
  X.save();X.translate(camX,camY);

  // Draw walls
  for(let r=0;r<MAP_H;r++){
    for(let c=0;c<MAP_W;c++){
      if(worldMap[r]&&worldMap[r][c]===1){
        X.fillStyle='#334';X.fillRect(c*viewScale,r*viewScale,viewScale,viewScale);
        X.strokeStyle='#445';X.lineWidth=0.5;X.strokeRect(c*viewScale,r*viewScale,viewScale,viewScale);
      }
    }
  }

  // Draw barrels
  for(const br of barrels){
    if(!br.alive)continue;
    X.fillStyle='#843';
    X.beginPath();X.arc(br.x*viewScale,br.y*viewScale,br.r*viewScale,0,Math.PI*2);X.fill();
    X.fillStyle='#f80';
    X.beginPath();X.arc(br.x*viewScale,br.y*viewScale,br.r*viewScale*0.4,0,Math.PI*2);X.fill();
  }

  // Draw HP pickups
  for(const hp of hpPickups){
    const bob=Math.sin(Date.now()*0.005)*2;
    const alpha=Math.min(1,hp.life/2);
    X.save();X.globalAlpha=alpha;
    X.fillStyle='#0f0';X.shadowColor='#0f0';X.shadowBlur=8;
    X.beginPath();X.arc(hp.x*viewScale,hp.y*viewScale+bob,0.2*viewScale,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
    // Cross icon
    X.fillStyle='#fff';
    X.fillRect(hp.x*viewScale-0.08*viewScale,hp.y*viewScale-0.02*viewScale+bob,0.16*viewScale,0.04*viewScale);
    X.fillRect(hp.x*viewScale-0.02*viewScale,hp.y*viewScale-0.08*viewScale+bob,0.04*viewScale,0.16*viewScale);
    X.restore();
  }

  // Draw particles
  for(const p of particles){
    X.save();X.globalAlpha=p.life;X.fillStyle=p.color;
    X.beginPath();X.arc(p.x*viewScale,p.y*viewScale,(p.r||0.05)*viewScale*2,0,Math.PI*2);X.fill();
    X.restore();
  }

  // Draw bullets
  for(const b of bullets){
    // Tracer trail in slow-mo — glowing line behind projectile
    if(b.tracer&&b.trail&&b.trail.length>1&&timeScale<0.5){
      for(let ti=1;ti<b.trail.length;ti++){
        const t0=b.trail[ti-1],t1=b.trail[ti];
        const alpha=Math.max(0,Math.min(1,ti/b.trail.length*0.6));
        X.strokeStyle=b.color;X.globalAlpha=alpha;X.lineWidth=Math.max(1,(b.r||0.08)*viewScale*(ti/b.trail.length));
        X.shadowColor=b.color;X.shadowBlur=timeScale<0.15?12:6;
        X.beginPath();X.moveTo(t0.x*viewScale,t0.y*viewScale);X.lineTo(t1.x*viewScale,t1.y*viewScale);X.stroke();
        X.shadowBlur=0;
      }
      X.globalAlpha=1;
    }
    X.fillStyle=b.color;X.shadowColor=b.color;X.shadowBlur=timeScale<0.3?8:3;
    const bSize=b.tracer?(b.r||0.08)*viewScale*2:(b.r||0.08)*viewScale*1.5;
    X.beginPath();X.arc(b.x*viewScale,b.y*viewScale,bSize,0,Math.PI*2);X.fill();
    // Extra glow ring for tracer bullets in bullet time
    if(b.tracer&&timeScale<0.3){
      X.strokeStyle=b.color;X.globalAlpha=0.4;X.lineWidth=1.5;
      X.beginPath();X.arc(b.x*viewScale,b.y*viewScale,bSize*1.8,0,Math.PI*2);X.stroke();
      X.globalAlpha=1;
    }
    X.shadowBlur=0;
  }

  // Draw enemies
  for(const e of enemies){
    if(e.alive===false&&!e.deathTimer)continue;
    X.save();
    if(!e.alive)X.globalAlpha=(e.deathTimer||0)/0.3;
    X.fillStyle=e.hitFlash>0?'#fff':e.color;
    X.shadowColor=e.color;X.shadowBlur=e.isBoss?12:6;
    X.beginPath();X.arc(e.x*viewScale,e.y*viewScale,e.r*viewScale,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
    // Eyes
    if(e.alive!==false){
      const eyeOff=e.r*0.3;
      const ex1=e.x+Math.cos(e.angle-0.3)*eyeOff,ey1=e.y+Math.sin(e.angle-0.3)*eyeOff;
      const ex2=e.x+Math.cos(e.angle+0.3)*eyeOff,ey2=e.y+Math.sin(e.angle+0.3)*eyeOff;
      X.fillStyle='#f00';
      X.beginPath();X.arc(ex1*viewScale,ey1*viewScale,e.r*viewScale*0.15,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(ex2*viewScale,ey2*viewScale,e.r*viewScale*0.15,0,Math.PI*2);X.fill();
    }
    // HP bar
    if(e.alive!==false&&e.hp<e.maxHp&&!e.isBoss){
      const bw=e.r*2*viewScale;
      X.fillStyle='#300';X.fillRect((e.x-e.r)*viewScale,(e.y-e.r-0.3)*viewScale,bw,3);
      X.fillStyle='#0f0';X.fillRect((e.x-e.r)*viewScale,(e.y-e.r-0.3)*viewScale,bw*(e.hp/e.maxHp),3);
    }
    // Shield
    if(e.type==='shield'&&e.alive!==false){
      X.strokeStyle='#8cf';X.lineWidth=2;X.globalAlpha=0.6;
      X.beginPath();X.arc(e.x*viewScale,e.y*viewScale,(e.r+0.15)*viewScale,e.shieldAngle-e.shieldArc/2,e.shieldAngle+e.shieldArc/2);X.stroke();
      X.globalAlpha=1;
    }
    // Bomber glow pulse
    if(e.type==='bomber'&&e.alive!==false){
      const pulse=0.3+Math.sin(Date.now()*0.01)*0.2;
      X.globalAlpha=pulse;X.fillStyle='#f80';
      X.beginPath();X.arc(e.x*viewScale,e.y*viewScale,(e.r+0.2)*viewScale,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }
    // Tank armor ring
    if(e.type==='tank'&&e.alive!==false){
      X.strokeStyle='#8fc';X.lineWidth=3;X.globalAlpha=0.5;
      X.beginPath();X.arc(e.x*viewScale,e.y*viewScale,(e.r+0.05)*viewScale,0,Math.PI*2);X.stroke();
      X.globalAlpha=1;
    }
    // Teleporter shimmer
    if(e.type==='teleporter'&&e.alive!==false){
      const shimmer=0.2+Math.sin(Date.now()*0.008)*0.15;
      X.globalAlpha=shimmer;X.strokeStyle='#e8f';X.lineWidth=2;
      X.setLineDash([3,3]);
      X.beginPath();X.arc(e.x*viewScale,e.y*viewScale,(e.r+0.1)*viewScale,0,Math.PI*2);X.stroke();
      X.setLineDash([]);X.globalAlpha=1;
    }
    X.restore();
  }

  // Draw player
  X.fillStyle='#0ff';X.shadowColor='#0ff';X.shadowBlur=10;
  X.beginPath();X.arc(player.x*viewScale,player.y*viewScale,0.25*viewScale,0,Math.PI*2);X.fill();
  X.shadowBlur=0;
  // Aim direction line
  const aimLen=1.5*viewScale;
  X.strokeStyle='#0ff8';X.lineWidth=2;
  X.beginPath();X.moveTo(player.x*viewScale,player.y*viewScale);
  X.lineTo((player.x+Math.cos(player.angle)*1.5)*viewScale,(player.y+Math.sin(player.angle)*1.5)*viewScale);
  X.stroke();

  X.restore(); // camera transform

  X.restore(); // shake transform

  // Damage vignette
  if(damageVignette>0){
    X.save();
    const grd=X.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.7);
    grd.addColorStop(0,'rgba(0,0,0,0)');
    grd.addColorStop(1,`rgba(255,0,0,${0.5*damageVignette})`);
    X.fillStyle=grd;X.fillRect(0,0,W,H);
    X.restore();
  }

  // Bullet time effect
  if(timeScale<0.3){
    X.save();
    const intensity=1-timeScale/0.3;
    X.strokeStyle=`rgba(100,60,200,${0.15*intensity})`;X.lineWidth=1;
    for(let i=0;i<4;i++){const y=Math.random()*H;X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
    X.fillStyle=`rgba(40,20,80,${0.2*intensity})`;
    X.fillRect(0,0,W,4);X.fillRect(0,H-4,W,4);
    X.restore();
  }

  drawHUD();
}

function render(){
  W=C.width;H=C.height;
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);

  if(gameState!=='game')return;

  X.save();
  X.translate(shakeX,shakeY);

  const pitchOff=player.pitch||0;
  const horizon=H/2+pitchOff;
  const fov=FOV;
  const numRays=Math.floor(W/NUM_RAYS_DIV);

  // Floor/ceiling
  X.fillStyle='#181828';X.fillRect(0,horizon,W,H-horizon);
  X.fillStyle='#0e0e1e';X.fillRect(0,0,W,horizon);

  // Raycasting walls
  const zBuffer=new Float32Array(numRays);
  for(let i=0;i<numRays;i++){
    const angle=(player.angle-fov/2)+(i/numRays)*fov;
    const{dist,side}=castRay(angle);
    const corrected=dist*Math.cos(angle-player.angle);
    zBuffer[i]=corrected;
    const wallH=Math.min(H,(1/corrected)*H*0.7);
    const brightness=Math.max(0,1-corrected/MAX_DEPTH);
    const s=Math.floor(brightness*180);
    const darkMod=side?0.7:1;
    const r=Math.floor(s*0.5*darkMod),g=Math.floor(s*0.4*darkMod),b=Math.floor(s*0.7*darkMod);
    X.fillStyle=`rgb(${r},${g},${b})`;
    const stripW=W/numRays;
    X.fillRect(i*stripW,horizon-wallH/2,stripW+1,wallH);
  }

  // Sprite rendering (enemies, barrels, bullets, particles)
  const sprites=[];
  for(const e of enemies){
    if(e.alive===false&&!e.deathTimer)continue;
    const dx=e.x-player.x,dy=e.y-player.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    sprites.push({type:'enemy',obj:e,dx,dy,dist});
  }
  for(const br of barrels){
    if(!br.alive)continue;
    const dx=br.x-player.x,dy=br.y-player.y;
    sprites.push({type:'barrel',obj:br,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)});
  }
  for(const b of bullets){
    const dx=b.x-player.x,dy=b.y-player.y;
    sprites.push({type:'bullet',obj:b,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)});
  }
  for(const p of particles){
    const dx=p.x-player.x,dy=p.y-player.y;
    sprites.push({type:'particle',obj:p,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)});
  }
  for(const hp of hpPickups){
    const dx=hp.x-player.x,dy=hp.y-player.y;
    sprites.push({type:'hpPickup',obj:hp,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)});
  }
  sprites.sort((a,b)=>b.dist-a.dist);

  for(const s of sprites){
    const{dx,dy,dist}=s;
    if(dist<0.2)continue;
    let sa=Math.atan2(dy,dx)-player.angle;
    while(sa>Math.PI)sa-=Math.PI*2;while(sa<-Math.PI)sa+=Math.PI*2;
    if(Math.abs(sa)>fov*0.6)continue;
    const screenX=((sa/fov)+0.5)*W;
    const rayIdx=Math.floor(screenX/(W/numRays));

    if(s.type==='enemy'){
      const e=s.obj;
      const h=Math.min(H,(1/Math.max(dist,0.3))*H*0.6*(e.r/0.3));
      const w2=h*0.8;
      if(rayIdx>=0&&rayIdx<numRays&&dist<zBuffer[rayIdx]){
        X.save();
        if(e.alive===false){X.globalAlpha=(e.deathTimer||0)/0.3;}
        else if(e.hitFlash>0){X.globalAlpha=1;}
        X.fillStyle=e.hitFlash>0?'#fff':e.color;
        X.shadowColor=e.color;X.shadowBlur=h>50?15:8;
        // Body
        X.beginPath();X.ellipse(screenX,horizon,w2/2,h/2,0,0,Math.PI*2);X.fill();
        X.shadowBlur=0;
        // Eyes
        if(e.alive!==false){
          const eyeY=horizon-h*0.15;
          const eyeOff=w2*0.15;
          X.fillStyle='#000';
          X.beginPath();X.arc(screenX-eyeOff,eyeY,h*0.06,0,Math.PI*2);X.fill();
          X.beginPath();X.arc(screenX+eyeOff,eyeY,h*0.06,0,Math.PI*2);X.fill();
          X.fillStyle='#f00';
          X.beginPath();X.arc(screenX-eyeOff,eyeY,h*0.03,0,Math.PI*2);X.fill();
          X.beginPath();X.arc(screenX+eyeOff,eyeY,h*0.03,0,Math.PI*2);X.fill();
        }
        // HP bar
        if(e.alive!==false&&e.hp<e.maxHp){
          const bw=w2;
          X.fillStyle='#300';X.fillRect(screenX-bw/2,horizon-h/2-10,bw,4);
          X.fillStyle=e.isBoss?'#fc0':'#0f0';X.fillRect(screenX-bw/2,horizon-h/2-10,bw*(e.hp/e.maxHp),4);
        }
        // Shield
        if(e.type==='shield'&&e.alive!==false){
          X.strokeStyle='#8cf';X.lineWidth=3;X.globalAlpha=0.6;
          X.beginPath();X.arc(screenX,horizon,w2/2+5,Math.PI-0.5,Math.PI+0.5);X.stroke();
          X.globalAlpha=1;
        }
        // Bomber glow
        if(e.type==='bomber'&&e.alive!==false){
          const pulse=0.2+Math.sin(Date.now()*0.01)*0.15;
          X.globalAlpha=pulse;X.fillStyle='#f80';
          X.beginPath();X.ellipse(screenX,horizon,w2/2+6,h/2+6,0,0,Math.PI*2);X.fill();
          X.globalAlpha=1;
        }
        // Tank armor
        if(e.type==='tank'&&e.alive!==false){
          X.strokeStyle='#8fc';X.lineWidth=3;X.globalAlpha=0.4;
          X.beginPath();X.ellipse(screenX,horizon,w2/2+4,h/2+4,0,0,Math.PI*2);X.stroke();
          X.globalAlpha=1;
        }
        // Teleporter shimmer
        if(e.type==='teleporter'&&e.alive!==false){
          X.globalAlpha=0.2+Math.sin(Date.now()*0.008)*0.1;X.strokeStyle='#e8f';X.lineWidth=2;
          X.setLineDash([4,4]);
          X.beginPath();X.ellipse(screenX,horizon,w2/2+3,h/2+3,0,0,Math.PI*2);X.stroke();
          X.setLineDash([]);X.globalAlpha=1;
        }
        X.restore();
      }
    }else if(s.type==='barrel'){
      const h=Math.min(H,(1/Math.max(dist,0.3))*H*0.3);
      if(rayIdx>=0&&rayIdx<numRays&&dist<zBuffer[rayIdx]){
        X.fillStyle='#843';
        X.beginPath();X.ellipse(screenX,horizon,h*0.3,h*0.4,0,0,Math.PI*2);X.fill();
        X.fillStyle='#f80';
        X.beginPath();X.arc(screenX,horizon-h*0.15,h*0.08,0,Math.PI*2);X.fill();
      }
    }else if(s.type==='bullet'){
      const b=s.obj;
      const h=Math.max(4,(b.tracer?28:20)/Math.max(dist,0.3));
      X.save();X.fillStyle=b.color;X.shadowColor=b.color;X.shadowBlur=timeScale<0.5?12:6;
      X.beginPath();X.arc(screenX,horizon,h/2,0,Math.PI*2);X.fill();
      // Tracer glow ring in bullet time
      if(b.tracer&&timeScale<0.3){
        X.strokeStyle=b.color;X.globalAlpha=0.5;X.lineWidth=2;
        X.beginPath();X.arc(screenX,horizon,h,0,Math.PI*2);X.stroke();
        X.globalAlpha=1;
      }
      X.shadowBlur=0;X.restore();
    }else if(s.type==='particle'){
      const p=s.obj;
      const h=Math.max(2,8/Math.max(dist,0.3));
      X.save();X.globalAlpha=p.life;X.fillStyle=p.color;
      X.beginPath();X.arc(screenX,horizon,h/2,0,Math.PI*2);X.fill();
      X.restore();
    }else if(s.type==='hpPickup'){
      const hp2=s.obj;
      const h=Math.max(6,20/Math.max(dist,0.3));
      const bob=Math.sin(Date.now()*0.005)*h*0.1;
      X.save();X.fillStyle='#0f0';X.shadowColor='#0f0';X.shadowBlur=10;
      X.beginPath();X.arc(screenX,horizon+bob,h/2,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
      X.fillStyle='#fff';
      X.fillRect(screenX-h*0.25,horizon+bob-h*0.06,h*0.5,h*0.12);
      X.fillRect(screenX-h*0.06,horizon+bob-h*0.25,h*0.12,h*0.5);
      X.restore();
    }
  }

  X.restore();

  // Weapon view (first person)
  drawWeaponView();

  // Crosshair
  const cx=W/2,cy=H/2;
  X.strokeStyle=hitMarkerTimer>0?'#f00':'#0ff';
  X.lineWidth=2;X.shadowColor=X.strokeStyle;X.shadowBlur=6;
  const cs=hitMarkerTimer>0?12:8;
  X.beginPath();X.moveTo(cx-cs,cy);X.lineTo(cx-cs/3,cy);X.stroke();
  X.beginPath();X.moveTo(cx+cs/3,cy);X.lineTo(cx+cs,cy);X.stroke();
  X.beginPath();X.moveTo(cx,cy-cs);X.lineTo(cx,cy-cs/3);X.stroke();
  X.beginPath();X.moveTo(cx,cy+cs/3);X.lineTo(cx,cy+cs);X.stroke();
  X.shadowBlur=0;

  // Melee slash
  if(meleeActive){
    X.save();X.strokeStyle='#fff';X.lineWidth=4;X.shadowColor='#fff';X.shadowBlur=20;
    X.beginPath();X.arc(W/2,H/2,60,Math.PI*0.8,Math.PI*1.2);X.stroke();
    X.shadowBlur=0;X.restore();
  }

  // Damage vignette
  if(damageVignette>0){
    X.save();
    const grd=X.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.7);
    grd.addColorStop(0,'rgba(0,0,0,0)');
    grd.addColorStop(1,`rgba(255,0,0,${0.5*damageVignette})`);
    X.fillStyle=grd;X.fillRect(0,0,W,H);
    X.restore();
  }

  // Bullet time effect
  if(timeScale<0.5){
    X.save();
    const intensity=1-timeScale/0.5;
    const grd=X.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W*0.6);
    grd.addColorStop(0,'rgba(0,0,0,0)');
    grd.addColorStop(1,`rgba(40,20,80,${0.35*intensity})`);
    X.fillStyle=grd;X.fillRect(0,0,W,H);
    // Scan lines
    X.strokeStyle=`rgba(100,60,200,${0.1*intensity})`;X.lineWidth=1;
    for(let i=0;i<6;i++){const y=Math.random()*H;X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
    X.restore();
  }

  // HUD
  drawHUD();
}

function drawWeaponView(){
  const bob=player.weaponBob||0;
  const flash=player.muzzleFlash||0;
  const wx=W/2+40+bob*0.5,wy=H-80+Math.abs(bob);

  X.save();
  // Weapon body
  if(currentWeapon===0){
    // Pistol
    X.fillStyle='#444';X.fillRect(wx-8,wy-40,16,50);
    X.fillStyle='#555';X.fillRect(wx-12,wy+10,24,20);
    X.fillStyle='#333';X.fillRect(wx-4,wy-45,8,10);
  }else if(currentWeapon===1){
    // SMG
    X.fillStyle='#3a3a3a';X.fillRect(wx-10,wy-55,20,65);
    X.fillStyle='#555';X.fillRect(wx-14,wy+10,28,22);
    X.fillStyle='#2a2a2a';X.fillRect(wx-5,wy-65,10,15);
    X.fillStyle='#333';X.fillRect(wx+10,wy-20,15,8);
  }else if(currentWeapon===2){
    // Sniper
    X.fillStyle='#2a2a4a';X.fillRect(wx-6,wy-70,12,80);
    X.fillStyle='#3a3a5a';X.fillRect(wx-3,wy-80,6,15);
    X.fillStyle='#555';X.fillRect(wx-12,wy+10,24,20);
    // Scope
    X.strokeStyle='#88f';X.lineWidth=2;
    X.beginPath();X.arc(wx,wy-55,8,0,Math.PI*2);X.stroke();
  }else if(currentWeapon===3){
    // Machine Gun — chunky, heavy, intimidating
    X.fillStyle='#3a2a1a';X.fillRect(wx-14,wy-60,28,75); // body
    X.fillStyle='#4a3a2a';X.fillRect(wx-18,wy+15,36,18); // stock
    X.fillStyle='#2a1a0a';X.fillRect(wx-6,wy-75,12,20); // barrel
    X.fillStyle='#1a0a00';X.fillRect(wx-4,wy-85,8,15); // barrel tip
    // Barrel heat glow
    const heat=Math.max(0,1-player.fireCooldown/0.12);
    if(heat>0.3){X.fillStyle=`rgba(255,${Math.floor(120-heat*80)},0,${heat*0.4})`;X.fillRect(wx-5,wy-85,10,15);}
    // Ammo belt detail
    X.fillStyle='#886600';
    for(let ab=0;ab<4;ab++){X.fillRect(wx+14,wy-40+ab*12,8,5);}
    // Grip
    X.fillStyle='#333';X.fillRect(wx-8,wy+5,16,12);
  }
  // Muzzle flash
  if(flash>0.3){
    const flashColor=currentWeapon===3?`rgba(255,140,30,${flash})`:`rgba(255,200,50,${flash})`;
    const flashGlow=currentWeapon===3?'#f80':'#ff0';
    X.fillStyle=flashColor;
    X.shadowColor=flashGlow;X.shadowBlur=currentWeapon===3?40:30;
    const barrelY=currentWeapon===3?35:currentWeapon===2?25:0;
    X.beginPath();X.arc(wx,wy-50-barrelY,(currentWeapon===3?16:12)*flash,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
  }
  X.restore();
}

function drawHUD(){
  // HP bar
  X.fillStyle='#200';X.fillRect(10,H-40,180,20);
  X.fillStyle=player.hp>30?'#0f4':'#f44';
  X.fillRect(10,H-40,180*(Math.max(0,player.hp)/player.maxHp),20);
  X.strokeStyle='#0f48';X.lineWidth=1;X.strokeRect(10,H-40,180,20);
  X.fillStyle='#fff';X.font='12px "Courier New"';X.textAlign='left';
  X.fillText(`HP ${Math.max(0,Math.ceil(player.hp))}/${player.maxHp}`,15,H-25);

  // Weapon
  const wp=WEAPONS[currentWeapon];
  X.fillStyle=wp.color;X.font='14px "Courier New"';
  X.fillText(wp.name,10,H-50);
  X.fillStyle='#888';X.font='11px "Courier New"';
  X.fillText('[R] switch  [E] melee',10,H-8);

  // Level + enemies
  X.fillStyle='#fff';X.font='14px "Courier New"';X.textAlign='center';
  const lvlText=survivalMode?`SURVIVAL — WAVE ${survivalWave+1}`:currentLevel===16?'BOSS RUSH':`LEVEL ${currentLevel}`;
  X.fillText(lvlText,W/2,22);

  X.fillStyle='#f88';X.font='12px "Courier New"';X.textAlign='right';
  X.fillText(`ENEMIES: ${enemiesRemaining}`,W-10,22);

  X.fillStyle='#aaa';X.font='11px "Courier New"';
  X.fillText(formatTime(levelTimer),W-10,38);

  // Boss HP - big prominent healthbar
  if(bossActive){
    const bw=W*0.6;const bh=22;const by=40;
    // Background
    X.fillStyle='#200';X.fillRect(W/2-bw/2-2,by-2,bw+4,bh+4);
    X.fillStyle='#400';X.fillRect(W/2-bw/2,by,bw,bh);
    // HP fill with gradient
    const hpPct=bossHP/bossMaxHP;
    const grd=X.createLinearGradient(W/2-bw/2,by,W/2-bw/2+bw*hpPct,by);
    grd.addColorStop(0,hpPct>0.5?'#fc0':'#f60');
    grd.addColorStop(1,hpPct>0.5?'#ff0':'#f00');
    X.fillStyle=grd;X.fillRect(W/2-bw/2,by,bw*hpPct,bh);
    // Border
    X.strokeStyle='#fc0';X.lineWidth=2;X.strokeRect(W/2-bw/2,by,bw,bh);
    // Boss name + HP text
    const boss=enemies.find(e=>e.isBoss&&e.alive);
    const bossName=boss?(boss.type==='boss_final'?'FINAL BOSS':'MINI BOSS'):'BOSS';
    X.fillStyle='#fff';X.font='bold 14px "Courier New"';X.textAlign='center';
    X.shadowColor='#000';X.shadowBlur=4;
    X.fillText(`${bossName} — ${Math.ceil(bossHP)}/${bossMaxHP}`,W/2,by+16);
    X.shadowBlur=0;
    // Phase indicator
    if(boss&&boss.type==='boss_final'){
      const phase=hpPct>0.66?'PHASE 1':hpPct>0.33?'PHASE 2':'PHASE 3 — ENRAGED';
      const phaseColor=hpPct>0.66?'#0f0':hpPct>0.33?'#ff0':'#f00';
      X.fillStyle=phaseColor;X.font='bold 11px "Courier New"';
      X.fillText(phase,W/2,by+bh+14);
    }
  }

  // Score + Combo
  X.fillStyle='#fff';X.font='bold 14px "Courier New"';X.textAlign='left';
  X.fillText(`SCORE: ${score}`,10,22);
  if(comboCount>=2){
    const multiplier=Math.min(5,1+Math.floor(comboCount/3));
    const comboAlpha=Math.min(1,comboTimer);
    X.globalAlpha=comboAlpha;
    const comboScale=1+Math.min(0.3,(comboCount-2)*0.05);
    X.font=`bold ${Math.round(16*comboScale)}px "Courier New"`;
    X.fillStyle=multiplier>=4?'#f44':multiplier>=3?'#fa0':multiplier>=2?'#ff0':'#0ff';
    X.shadowColor=X.fillStyle;X.shadowBlur=10;
    X.fillText(`${comboCount}x COMBO! (${multiplier}x)`,10,42);
    X.shadowBlur=0;X.globalAlpha=1;
  }

  // Bullet time indicator
  if(timeScale<0.3){
    X.fillStyle='#c8f';X.font='bold 18px "Courier New"';X.textAlign='center';
    X.globalAlpha=0.7+Math.sin(Date.now()*0.005)*0.3;
    X.shadowColor='#c8f';X.shadowBlur=15;
    X.fillText('BULLET TIME',W/2,H-10);
    X.shadowBlur=0;X.globalAlpha=1;
  }

  // Melee cooldown
  if(meleeCooldown>0){
    X.fillStyle='#555';X.font='11px "Courier New"';X.textAlign='left';
    X.fillText('MELEE CD',200,H-25);
  }

  // Mobile touch controls overlay
  if(isMobile){
    X.save();
    // Virtual joystick (left side)
    const jx=touchJoystick.active?touchJoystick.cx:80;
    const jy=touchJoystick.active?touchJoystick.cy:H-120;
    // Outer ring
    X.globalAlpha=0.25;
    X.strokeStyle='#0ff';X.lineWidth=2;
    X.beginPath();X.arc(jx,jy,55,0,Math.PI*2);X.stroke();
    // Inner stick
    X.globalAlpha=0.4;
    X.fillStyle='#0ff';
    X.beginPath();X.arc(jx+touchJoystick.dx,jy+touchJoystick.dy,20,0,Math.PI*2);X.fill();

    // Action buttons (bottom right) — larger for mobile usability
    const btnSize=42;
    // Melee button
    const meleeX=W-60,meleeY=H-100;
    X.globalAlpha=meleeCooldown>0?0.15:0.35;
    X.fillStyle='#fff';
    X.beginPath();X.arc(meleeX,meleeY,btnSize,0,Math.PI*2);X.fill();
    X.globalAlpha=0.8;X.fillStyle=meleeCooldown>0?'#555':'#fff';
    X.font='bold 11px "Courier New"';X.textAlign='center';X.textBaseline='middle';
    X.fillText('MELEE',meleeX,meleeY);

    // Weapon switch button
    const swX=W-140,swY=H-100;
    X.globalAlpha=0.35;X.fillStyle=WEAPONS[currentWeapon].color;
    X.beginPath();X.arc(swX,swY,btnSize,0,Math.PI*2);X.fill();
    X.globalAlpha=0.8;X.fillStyle='#fff';
    X.fillText(WEAPONS[currentWeapon].name.slice(0,3),swX,swY);

    // Crosshair at aim point
    if(touchAim.active){
      X.globalAlpha=0.7;X.strokeStyle='#0ff';X.lineWidth=1.5;
      const cx=touchAim.x,cy=touchAim.y,cr=12;
      X.beginPath();X.moveTo(cx-cr,cy);X.lineTo(cx+cr,cy);X.stroke();
      X.beginPath();X.moveTo(cx,cy-cr);X.lineTo(cx,cy+cr);X.stroke();
      X.beginPath();X.arc(cx,cy,cr*0.6,0,Math.PI*2);X.stroke();
    }

    X.textBaseline='alphabetic';
    X.restore();
  }
}

function formatTime(t){
  const m=Math.floor(t/60),s=Math.floor(t%60),ms=Math.floor((t%1)*100);
  return`${m}:${s<10?'0':''}${s}.${ms<10?'0':''}${ms}`;
}

function getRating(){
  const t=levelTimer;
  if(t<30)return'S';if(t<60)return'A';if(t<90)return'B';return'C';
}

// ── SCREENS ──
function showTitle(){
  gameState='title';survivalMode=false;
  document.exitPointerLock&&document.exitPointerLock();
  document.getElementById('title-screen').style.display='flex';
  document.getElementById('levelselect-screen').style.display='none';
  document.getElementById('complete-screen').style.display='none';
  document.getElementById('gameover-screen').style.display='none';
  if(save.level>1){
    document.getElementById('continue-row').style.display='';
    document.getElementById('continue-btn').onclick=()=>{
      startLevel(Math.min(save.level,15));
    };
  }
  const bestEl=document.getElementById('survival-best');
  if(bestEl)bestEl.textContent=save.survivalBest>0?`SURVIVAL BEST: WAVE ${save.survivalBest}`:'';
}

function startSurvival(){
  survivalMode=true;survivalWave=0;
  // Use open arena map (last map - most open)
  startLevel(MAPS.length);
}

function showLevelSelect(){
  gameState='levelselect';
  document.exitPointerLock&&document.exitPointerLock();
  document.getElementById('title-screen').style.display='none';
  document.getElementById('levelselect-screen').style.display='flex';
  const grid=document.getElementById('level-grid');
  grid.innerHTML='';
  for(let i=1;i<=16;i++){
    const btn=document.createElement('button');
    const unlocked=i<=save.level;
    btn.className='gbtn'+(unlocked?'':' locked');
    btn.textContent=i===16?'BOSS RUSH':`LV ${i}`;
    if(unlocked){
      const lvl=i;
      btn.onclick=()=>startLevel(lvl);
    }
    const best=save.bestTimes['l'+i];
    if(best!==undefined&&unlocked){
      btn.innerHTML+=`<br><span style="font-size:0.7rem;color:#8f8">${formatTime(best)}</span>`;
    }
    grid.appendChild(btn);
  }
}

function startLevel(lvl){
  document.getElementById('title-screen').style.display='none';
  document.getElementById('levelselect-screen').style.display='none';
  document.getElementById('complete-screen').style.display='none';
  document.getElementById('gameover-screen').style.display='none';
  gameState='game';
  initLevel(lvl);
  initAudio();
  if(gameMode==='fps'&&!isMobile)C.requestPointerLock&&C.requestPointerLock();
  C.style.cursor=isMobile?'none':gameMode==='classic'?'crosshair':'none';
}

function showComplete(){
  const screen=document.getElementById('complete-screen');
  screen.style.display='flex';
  document.getElementById('complete-rating').textContent=getRating();
  const acc=shotsFired>0?Math.round(shotsHit/shotsFired*100):0;
  document.getElementById('complete-stats').innerHTML=
    `TIME: ${formatTime(levelTimer)} | KILLS: ${killCount} | ACCURACY: ${acc}%<br>SCORE: ${score} | BEST COMBO: ${bestCombo}x`;
  const nextBtn=document.getElementById('next-level-btn');
  if(currentLevel<15){
    nextBtn.style.display='';
    nextBtn.onclick=()=>startLevel(currentLevel+1);
    nextBtn.textContent='NEXT LEVEL';
  }else if(currentLevel===15){
    nextBtn.style.display='';
    nextBtn.textContent='BOSS RUSH';
    nextBtn.onclick=()=>startLevel(16);
  }else{
    nextBtn.style.display='none';
  }
}

function showGameOver(){
  const screen=document.getElementById('gameover-screen');
  screen.style.display='flex';
  if(survivalMode){
    if(survivalWave>save.survivalBest){save.survivalBest=survivalWave;saveSave();}
    document.getElementById('gameover-stats').innerHTML=
      `SURVIVED: WAVE ${survivalWave} | KILLS: ${killCount} | SCORE: ${score}<br>BEST COMBO: ${bestCombo}x | BEST WAVE: ${save.survivalBest}`;
    document.getElementById('retry-btn').onclick=()=>{startSurvival()};
  }else{
    document.getElementById('gameover-stats').innerHTML=
      `TIME: ${formatTime(levelTimer)} | KILLS: ${killCount} | SCORE: ${score}<br>BEST COMBO: ${bestCombo}x`;
    document.getElementById('retry-btn').onclick=()=>startLevel(currentLevel);
  }
}

// ── MAIN LOOP ──
let lastTime=0;
function loop(t){
  const dt=Math.min((t-lastTime)/1000,0.05);
  lastTime=t;
  update(dt);
  if(gameMode==='classic')renderClassic();
  else render();
  // Overlay text (level complete / game over)
  if(overlayAlpha>0){
    W=C.width;H=C.height;
    X.save();
    X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);
    X.fillStyle=overlayColor;X.font='bold 4rem "Courier New"';X.textAlign='center';
    X.shadowColor=overlayColor;X.shadowBlur=30;
    X.globalAlpha=overlayAlpha;
    X.fillText(overlayText,W/2,H/2);
    X.shadowBlur=0;X.globalAlpha=1;
    X.restore();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lastTime=t;loop(t)});
showTitle();

// Expose to global scope for HTML onclick
window.showTitle=showTitle;
window.showLevelSelect=showLevelSelect;
window.setMode=setMode;
window.startSurvival=startSurvival;

})();
</script>
