// ── RAYCASTING RENDERER ──────────────────────────────────────────────────────
// FOV defined at top
let currentFOV=FOV;
// const HALF_FOV=FOV/2;
const NUM_RAYS=320;
// MAX_DEPTH=20 already defined above
const CELL=64;
// const MAP_W=24,MAP_H=24;

// Simple open-arena map — walls only on border
const WORLD_MAP=(()=>{
  const m=[];
  for(let r=0;r<MAP_H;r++){
    const row=[];
    for(let c=0;c<MAP_W;c++){row.push((r===0||r===MAP_H-1||c===0||c===MAP_W-1)?1:0);}
    m.push(row);
  }
  // Some interior pillars for cover
  [[4,4],[4,8],[4,12],[4,16],[4,20],[8,4],[8,20],[12,4],[12,20],[16,4],[16,8],[16,12],[16,16],[16,20],[10,10],[10,14],[14,10],[14,14]].forEach(([r,c])=>{if(r<MAP_H&&c<MAP_W)m[r][c]=1;});
  return m;
})();

function castRay(angle){
  const cos=Math.cos(angle),sin=Math.sin(angle);
  for(let d=0;d<MAX_DEPTH;d+=0.05){
    const x=player.x+cos*d,y=player.y+sin*d;
    const mx=Math.floor(x),my=Math.floor(y);
    if(mx<0||mx>=MAP_W||my<0||my>=MAP_H||WORLD_MAP[my][mx])return{dist:d,hit:true};
  }
  return{dist:MAX_DEPTH,hit:false};
}

function renderScene(){
  const W=canvas.width,H=canvas.height;
  const ctx2=canvas.getContext('2d');
  const fov=currentFOV||FOV;
  // Floor/ceiling
  ctx2.fillStyle='#111';ctx2.fillRect(0,H/2,W,H/2);
  ctx2.fillStyle='#1a1a2e';ctx2.fillRect(0,0,W,H/2);

  // Cast rays
  const zBuffer=new Float32Array(NUM_RAYS);
  for(let i=0;i<NUM_RAYS;i++){
    const angle=(player.angle-fov/2)+(i/NUM_RAYS)*fov;
    const{dist}=castRay(angle);
    const corrected=dist*Math.cos(angle-player.angle);
    zBuffer[i]=corrected;
    const wallH=Math.min(H,(CELL/corrected)*H*0.5);
    const brightness=Math.max(0,1-corrected/MAX_DEPTH);
    const shade=Math.floor(brightness*200);
    ctx2.fillStyle=`rgb(${shade},${Math.floor(shade*0.7)},${Math.floor(shade*0.5)})`;
    ctx2.fillRect(i*(W/NUM_RAYS),H/2-wallH/2,W/NUM_RAYS+1,wallH);
  }

  // Sprite rendering (enemies, pickups)
  const sprites=[];
  enemies.forEach(e=>{
    const dx=e.x-player.x,dy=e.y-player.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    sprites.push({type:'enemy',e,dx,dy,dist});
  });
  pickups.forEach(p=>{
    const dx=p.x-player.x,dy=p.y-player.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    sprites.push({type:'pickup',p,dx,dy,dist});
  });
  sprites.sort((a,b)=>b.dist-a.dist);

  sprites.forEach(s=>{
    const{dx,dy,dist}=s;
    const spriteAngle=Math.atan2(dy,dx)-player.angle;
    let sa=spriteAngle;
    while(sa>Math.PI)sa-=Math.PI*2;while(sa<-Math.PI)sa+=Math.PI*2;
    if(Math.abs(sa)>fov)return;
    const screenX=((sa/fov)+0.5)*W;
    if(s.type==='enemy'){
      const e=s.e;
      const ET=ENEMY_TYPES.find(t=>t.name===e.typeName)||ENEMY_TYPES[0];
      const h=Math.min(H,(CELL/Math.max(dist,0.5))*H*0.5);
      const w2=h*(ET.spriteW/ET.spriteH||1);
      const x0=screenX-w2/2,y0=H/2-h/2;
      // Check z-buffer occlusion
      const rayIdx=Math.floor(screenX/(W/NUM_RAYS));
      if(rayIdx>=0&&rayIdx<NUM_RAYS&&dist<zBuffer[rayIdx]){
        ctx2.save();ctx2.globalAlpha=e.alpha||1;
        // Draw sprite using canvas shapes
        drawEnemySprite(ctx2,ET,x0,y0,w2,h,e);
        // HP bar
        if(e.hp<e.maxHp){
          const bw=w2*0.8;
          ctx2.fillStyle='#600';ctx2.fillRect(x0+w2*0.1,y0-8,bw,5);
          ctx2.fillStyle='#0f0';ctx2.fillRect(x0+w2*0.1,y0-8,bw*(e.hp/e.maxHp),5);
        }
        ctx2.restore();
      }
    } else if(s.type==='pickup'){
      const p=s.p;
      const h=32,w2=32;
      const rayIdx=Math.floor(screenX/(W/NUM_RAYS));
      if(rayIdx>=0&&rayIdx<NUM_RAYS&&dist<zBuffer[rayIdx]){
        ctx2.save();
        ctx2.fillStyle=p.type==='weapon'?'#ff0':p.type==='armor'?'#08f':p.type==='emblem'?'#a0f':p.type==='healthOrb'?'#0f0':'#fff';
        ctx2.beginPath();ctx2.arc(screenX,H/2,h/2,0,Math.PI*2);ctx2.fill();
        ctx2.fillStyle='#000';ctx2.font='bold 10px monospace';ctx2.textAlign='center';
        ctx2.fillText(p.type==='weapon'?'W':p.type==='armor'?'A':p.type==='emblem'?'E':p.type==='healthOrb'?'+':'?',screenX,H/2+4);
        ctx2.restore();
      }
    }
  });

  // Projectiles as sprites
  projectiles.forEach(pr=>{
    const dx=pr.x-player.x,dy=pr.y-player.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<0.3)return;
    const spriteAngle=Math.atan2(dy,dx)-player.angle;
    let sa=spriteAngle;
    while(sa>Math.PI)sa-=Math.PI*2;while(sa<-Math.PI)sa+=Math.PI*2;
    if(Math.abs(sa)>fov)return;
    const screenX=((sa/fov)+0.5)*W;
    const h=10,w2=10;
    ctx2.save();ctx2.globalAlpha=0.9;
    ctx2.fillStyle=pr.color||'#ff0';
    ctx2.beginPath();ctx2.arc(screenX,H/2,h/2,0,Math.PI*2);ctx2.fill();
    ctx2.restore();
  });
}

function drawEnemySprite(ctx,ET,x,y,w,h,e){
  // Fantasy enemy sprites using canvas shapes
  ctx.save();
  const flash=e.hitFlash&&e.hitFlash>0;
  if(flash){ctx.filter='brightness(3)';}
  // Body base color
  ctx.fillStyle=ET.color||'#888';
  // Simple silhouette: rectangle body + circle head
  const bx=x+w*0.2,by=y+h*0.35,bw=w*0.6,bh=h*0.5;
  ctx.fillRect(bx,by,bw,bh);
  // Head
  ctx.beginPath();ctx.arc(x+w/2,y+h*0.25,w*0.22,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle='#f00';
  ctx.beginPath();ctx.arc(x+w*0.4,y+h*0.22,w*0.04,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+w*0.6,y+h*0.22,w*0.04,0,Math.PI*2);ctx.fill();
  // Legs
  ctx.fillStyle=ET.color||'#888';
  ctx.fillRect(x+w*0.25,y+h*0.83,w*0.18,h*0.17);
  ctx.fillRect(x+w*0.55,y+h*0.83,w*0.18,h*0.17);
  // Boss crown
  if(e.isBoss){
    ctx.fillStyle='#ffd700';
    ctx.beginPath();
    ctx.moveTo(x+w*0.3,y+h*0.08);ctx.lineTo(x+w*0.5,y);ctx.lineTo(x+w*0.7,y+h*0.08);
    ctx.lineTo(x+w*0.65,y+h*0.15);ctx.lineTo(x+w*0.35,y+h*0.15);ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

// ── WEAPON VIEW ─────────────────────────────────────────────────────────────
function drawWeaponView(){
  const ctx2=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const w=getWeapon();
  if(!w)return;
  const bob=Math.sin(Date.now()/200)*4;
  const baseX=W*0.65,baseY=H*0.72+bob;
  ctx2.save();
  // Weapon color by tier
  const tierColors={'1':'#aaa','1+':'#4f4','2':'#48f','2+':'#a4f','3':'#fd0','UNIQUE':'#f44','BOSS':'#f44'};
  ctx2.strokeStyle=tierColors[w.tier||'1']||'#aaa';
  ctx2.lineWidth=5;ctx2.lineCap='round';
  const n=w.name;
  if(n==='Pistol'||n==='Dual Pistols'){
    // Pistol
    ctx2.beginPath();ctx2.moveTo(baseX,baseY);ctx2.lineTo(baseX+80,baseY-10);ctx2.stroke();
    ctx2.beginPath();ctx2.moveTo(baseX+10,baseY);ctx2.lineTo(baseX+10,baseY+25);ctx2.stroke();
  } else if(n==='Shotgun'||n==='Double Barrel'){
    ctx2.lineWidth=8;
    ctx2.beginPath();ctx2.moveTo(baseX,baseY);ctx2.lineTo(baseX+100,baseY-15);ctx2.stroke();
    ctx2.beginPath();ctx2.moveTo(baseX,baseY+10);ctx2.lineTo(baseX+100,baseY-5);ctx2.stroke();
    ctx2.lineWidth=5;
    ctx2.beginPath();ctx2.moveTo(baseX+5,baseY-8);ctx2.lineTo(baseX+5,baseY+18);ctx2.stroke();
  } else if(n.includes('Rifle')||n==='Crossbow'||n==='Rail Gun'){
    // Long rifle
    ctx2.beginPath();ctx2.moveTo(baseX-20,baseY);ctx2.lineTo(baseX+130,baseY-20);ctx2.stroke();
    ctx2.lineWidth=3;
    ctx2.beginPath();ctx2.moveTo(baseX+40,baseY-8);ctx2.lineTo(baseX+40,baseY+20);ctx2.stroke();
    if(player.scoped&&w.sniperScope){
      // Scope circle overlay
      ctx2.strokeStyle='rgba(0,255,0,0.5)';ctx2.lineWidth=2;
      ctx2.beginPath();ctx2.arc(W/2,H/2,80,0,Math.PI*2);ctx2.stroke();
      ctx2.beginPath();ctx2.moveTo(W/2-80,H/2);ctx2.lineTo(W/2+80,H/2);ctx2.stroke();
      ctx2.beginPath();ctx2.moveTo(W/2,H/2-80);ctx2.lineTo(W/2,H/2+80);ctx2.stroke();
    }
  } else if(n==='Katana'||n==='Energy Blade'){
    ctx2.lineWidth=4;
    // Blade
    ctx2.strokeStyle=n==='Energy Blade'?'#0ff':ctx2.strokeStyle;
    ctx2.beginPath();ctx2.moveTo(baseX+20,baseY+30);ctx2.lineTo(baseX+110,baseY-40);ctx2.stroke();
    // Guard
    ctx2.beginPath();ctx2.moveTo(baseX+30,baseY+15);ctx2.lineTo(baseX+50,baseY+5);ctx2.stroke();
    if(player.deflecting){
      ctx2.strokeStyle='rgba(0,200,255,0.6)';ctx2.lineWidth=12;
      ctx2.beginPath();ctx2.moveTo(baseX,baseY+40);ctx2.lineTo(baseX+130,-30);ctx2.stroke();
    }
  } else if(n==='Grenade Launcher'||n==='Rocket Launcher'){
    ctx2.lineWidth=12;
    ctx2.beginPath();ctx2.moveTo(baseX,baseY);ctx2.lineTo(baseX+110,baseY-20);ctx2.stroke();
    ctx2.lineWidth=5;
    ctx2.beginPath();ctx2.moveTo(baseX+10,baseY-6);ctx2.lineTo(baseX+10,baseY+22);ctx2.stroke();
  } else if(n==='Flamethrower'){
    ctx2.lineWidth=8;
    ctx2.beginPath();ctx2.moveTo(baseX,baseY);ctx2.lineTo(baseX+90,baseY-10);ctx2.stroke();
    // Flame effect
    ctx2.fillStyle='rgba(255,100,0,0.5)';
    ctx2.beginPath();ctx2.ellipse(baseX+110,baseY-15,30,15,0,0,Math.PI*2);ctx2.fill();
  } else if(n==='Battle Axe'||n==='Great Axe'){
    ctx2.lineWidth=6;
    ctx2.beginPath();ctx2.moveTo(baseX+30,baseY+40);ctx2.lineTo(baseX+80,baseY-30);ctx2.stroke();
    // Axe head
    ctx2.lineWidth=3;
    ctx2.beginPath();ctx2.moveTo(baseX+70,baseY-20);ctx2.lineTo(baseX+110,baseY-50);ctx2.lineTo(baseX+90,baseY);ctx2.closePath();ctx2.stroke();
  } else if(n==='Scythe'||n==='Death Scythe'){
    ctx2.lineWidth=4;
    ctx2.beginPath();ctx2.moveTo(baseX+20,baseY+40);ctx2.lineTo(baseX+100,baseY-20);ctx2.stroke();
    ctx2.beginPath();ctx2.moveTo(baseX+90,baseY-15);ctx2.quadraticCurveTo(baseX+130,baseY-60,baseX+80,baseY-50);ctx2.stroke();
  } else {
    // Generic weapon
    ctx2.beginPath();ctx2.moveTo(baseX,baseY);ctx2.lineTo(baseX+90,baseY-15);ctx2.stroke();
    ctx2.beginPath();ctx2.moveTo(baseX+10,baseY);ctx2.lineTo(baseX+10,baseY+20);ctx2.stroke();
  }
  // Reload overlay
  if(player.reloading){
    const prog=1-(player.reloadTimer/player.reloadDuration);
    ctx2.fillStyle='rgba(0,0,0,0.6)';ctx2.fillRect(baseX-10,baseY+40,120,12);
    ctx2.fillStyle='#ff0';ctx2.fillRect(baseX-10,baseY+40,120*prog,12);
    ctx2.fillStyle='#fff';ctx2.font='10px monospace';ctx2.fillText('RELOADING',baseX+5,baseY+51);
  }
  ctx2.restore();
}

// ── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD(){
  const ctx2=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx2.save();
  // HP bar
  const hpPct=player.hp/player.maxHp;
  ctx2.fillStyle='rgba(0,0,0,0.6)';ctx2.fillRect(10,H-44,200,18);
  ctx2.fillStyle=hpPct>0.5?'#0f0':hpPct>0.25?'#fa0':'#f00';
  ctx2.fillRect(10,H-44,200*hpPct,18);
  ctx2.strokeStyle='#fff';ctx2.lineWidth=1;ctx2.strokeRect(10,H-44,200,18);
  ctx2.fillStyle='#fff';ctx2.font='bold 11px monospace';
  ctx2.fillText(`HP ${Math.ceil(player.hp)}/${player.maxHp}`,14,H-30);

  // Low HP red vignette
  if(hpPct<0.4){
    const alpha=Math.max(0,Math.min(0.5,(0.4-hpPct)/0.4))*(0.7+0.3*Math.sin(Date.now()/300));
    const grad=ctx2.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
    grad.addColorStop(0,'rgba(180,0,0,0)');
    grad.addColorStop(1,`rgba(180,0,0,${alpha})`);
    ctx2.fillStyle=grad;ctx2.fillRect(0,0,W,H);
  }

  // Wave / score
  ctx2.fillStyle='#fff';ctx2.font='bold 13px monospace';
  ctx2.textAlign='left';
  ctx2.fillText(`Wave ${currentWave} | Kills ${player.kills} | Score ${score}`,10,22);

  // Character / weapon info
  const w=getWeapon();
  if(w){
    ctx2.fillText(`${w.name} [T${w.tier||1}]`,10,40);
    if(w.ammo!==Infinity){ctx2.fillText(`AMMO: ${w.ammo}`,10,56);}
  }

  // Armor info
  if(equippedArmorIndex>=0){
    const ar=player.armors[equippedArmorIndex];
    const cdText=armorAbilityCooldown>0?`${Math.ceil(armorAbilityCooldown/1000)}s`:'READY';
    ctx2.fillStyle=armorAbilityCooldown>0?'#fa0':'#0f0';
    ctx2.fillText(`[SHIFT] ${ar.name}: ${cdText}`,10,72);
  }

  // Skill / Ult cooldowns
  const skillCd=player.skillCooldown>0?`${Math.ceil(player.skillCooldown/1000)}s`:'READY';
  const ultCd=player.ultCooldown>0?`${Math.ceil(player.ultCooldown/1000)}s`:'READY';
  ctx2.fillStyle='#fff';
  ctx2.fillText(`[Q] Skill: ${skillCd}  [E] Ult: ${ultCd}`,10,88);

  // Crosshair
  const cx=W/2,cy=H/2;
  ctx2.strokeStyle='rgba(255,255,255,0.8)';ctx2.lineWidth=1.5;
  ctx2.beginPath();ctx2.moveTo(cx-10,cy);ctx2.lineTo(cx+10,cy);ctx2.stroke();
  ctx2.beginPath();ctx2.moveTo(cx,cy-10);ctx2.lineTo(cx,cy+10);ctx2.stroke();
  ctx2.beginPath();ctx2.arc(cx,cy,3,0,Math.PI*2);ctx2.stroke();

  // Minimap
  drawMinimap(ctx2,W,H);

  // Emblem pips
  let empX=W-10;
  Object.entries(player.emblems).forEach(([name,lv])=>{
    if(lv>0){
      const em=EMBLEM_TYPES.find(e=>e.name===name);
      if(!em)return;
      ctx2.fillStyle=em.color;ctx2.globalAlpha=0.85;
      ctx2.beginPath();ctx2.arc(empX,30,8,0,Math.PI*2);ctx2.fill();
      ctx2.globalAlpha=1;ctx2.fillStyle='#fff';ctx2.font='bold 8px monospace';ctx2.textAlign='center';
      ctx2.fillText(lv,empX,33);
      empX-=22;
    }
  });

  ctx2.textAlign='left';
  ctx2.restore();
}

function drawMinimap(ctx2,W,H){
  const mmX=W-130,mmY=H-130,mmW=120,mmH=120;
  const cellW=mmW/MAP_W,cellH=mmH/MAP_H;
  ctx2.save();ctx2.globalAlpha=0.55;
  ctx2.fillStyle='#000';ctx2.fillRect(mmX,mmY,mmW,mmH);
  for(let r=0;r<MAP_H;r++){
    for(let c=0;c<MAP_W;c++){
      if(WORLD_MAP[r][c]){
        ctx2.fillStyle='#556';ctx2.fillRect(mmX+c*cellW,mmY+r*cellH,cellW,cellH);
      }
    }
  }
  // Enemies
  enemies.forEach(e=>{
    const ex=mmX+e.x*cellW,ey=mmY+e.y*cellH;
    ctx2.fillStyle=e.isBoss?'#f00':'#f80';
    ctx2.beginPath();ctx2.arc(ex,ey,2,0,Math.PI*2);ctx2.fill();
  });
  // Player
  const px=mmX+player.x*cellW,py=mmY+player.y*cellH;
  ctx2.fillStyle='#0f0';ctx2.beginPath();ctx2.arc(px,py,4,0,Math.PI*2);ctx2.fill();
  ctx2.strokeStyle='#0f0';ctx2.lineWidth=1;
  ctx2.beginPath();
  ctx2.moveTo(px,py);
  ctx2.lineTo(px+Math.cos(player.angle)*10,py+Math.sin(player.angle)*10);
  ctx2.stroke();
  ctx2.globalAlpha=1;ctx2.restore();
}

// ── PROJECTILE UPDATE ────────────────────────────────────────────────────────
function updateProjectiles(dt){
  const toRemove=[];
  projectiles.forEach((pr,pi)=>{
    pr.x+=pr.vx*(dt/16);pr.y+=pr.vy*(dt/16);
    pr.life-=dt;
    if(pr.life<=0){toRemove.push(pi);return;}
    // Wall collision
    const mx=Math.floor(pr.x),my=Math.floor(pr.y);
    if(mx<0||mx>=MAP_W||my<0||my>=MAP_H||WORLD_MAP[my][mx]){
      if((pr.bouncesLeft||0)>0){
        // Determine bounce axis
        const mxTest=Math.floor(pr.x+pr.vx*0.05);
        const myTest=Math.floor(pr.y+pr.vy*0.05);
        if(mxTest<0||mxTest>=MAP_W||WORLD_MAP[myTest]?.[mxTest])pr.vx*=-1;
        else pr.vy*=-1;
        pr.bouncesLeft--;
      } else {toRemove.push(pi);}
      return;
    }
    // Enemy hit
    if(pr.fromPlayer){
      enemies.forEach(e=>{
        const dx=pr.x-e.x,dy=pr.y-e.y;
        if(dx*dx+dy*dy<(e.radius||0.35)*(e.radius||0.35)){
          let dmg=pr.damage;
          if(getEmblemLevel('Fire')>5&&getWeapon().burn)dmg*=1.2;
          applyEnemyDamage(e,dmg);
          if(pr.burn&&!e.burning){e.burning=true;e.burnTimer=3000;e.burnDmg=pr.damage*0.1;}
          if(pr.freeze&&!e.frozen){e.frozen=true;e.freezeTimer=2000;e.speed*=0.3;}
          if(pr.poison&&!e.poisoned){e.poisoned=true;e.poisonTimer=4000;e.poisonDmg=pr.damage*0.08;}
          if(pr.chainLightning){chainLightningHit(e,pr.damage*0.5,3);}
          if(pr.entangle){e.frozen=true;e.freezeTimer=3000;}
          if(getWeapon().scytheLifesteal>0){player.hp=Math.min(player.maxHp,player.hp+dmg*getWeapon().scytheLifesteal);}
          // Blood emblem lifesteal
          if(getEmblemLevel('Blood')>=5){player.hp=Math.min(player.maxHp,player.hp+dmg*0.05);}
          if(!pr.pierce&&(pr.bouncesLeft||0)<=0){toRemove.push(pi);}
          spawnParticles(pr.x,pr.y,6,pr.color||'#f80');
        }
      });
    } else {
      // Enemy projectile hits player
      const dx=pr.x-player.x,dy=pr.y-player.y;
      if(dx*dx+dy*dy<300){
        let dmg=pr.damage*(1-getArmorDef()*0.01);
        if(getEmblemLevel('Holy')>=10)dmg*=0.85;
        player.hp-=dmg;player.hitFlash=200;
        if(pr.freeze){player.speed=Math.max(1,player.speed*0.5);setTimeout(()=>player.speed=getBaseSpeed(),2000);}
        if(pr.burn){player.burning=true;player.burnTimer=2000;player.burnDmg=pr.damage*0.08;}
        if(pr.poison){player.poisoned=true;player.poisonTimer=3000;player.poisonDmg=pr.damage*0.06;}
        spawnParticles(player.x,player.y,4,'#f00');
        toRemove.push(pi);
        if(player.hp<=0)triggerDeath();
      }
    }
  });
  // Deflect mechanic: flip enemy projectiles
  if(player.deflecting){
    projectiles.forEach(pr=>{
      if(!pr.fromPlayer){
        const dx=pr.x-player.x,dy=pr.y-player.y;
        if(dx*dx+dy*dy<2500){
          pr.fromPlayer=true;pr.vx*=-1.5;pr.vy*=-1.5;pr.damage*=2;
          spawnParticles(player.x,player.y,8,'#0ff');
        }
      }
    });
  }
  for(let i=toRemove.length-1;i>=0;i--)projectiles.splice(toRemove[i],1);
}

function chainLightningHit(origin,dmg,count){
  let hits=0;
  enemies.forEach(e=>{
    if(e===origin||hits>=count)return;
    const dx=e.x-origin.x,dy=e.y-origin.y;
    if(dx*dx+dy*dy<90000){applyEnemyDamage(e,dmg);spawnParticles(e.x,e.y,5,'#ff0');hits++;}
  });
}

function getArmorDef(){
  if(equippedArmorIndex<0||!player.armors[equippedArmorIndex])return 0;
  return player.armors[equippedArmorIndex].defense||0;
}

// ── PARTICLE UPDATE ──────────────────────────────────────────────────────────
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);
    p.life-=dt;p.alpha=p.life/p.maxLife;
    if(p.life<=0)particles.splice(i,1);
  }
}

function spawnParticles(x,y,count,color){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2,speed=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,color,life:400+Math.random()*400,maxLife:800,alpha:1,size:2+Math.random()*3});
  }
}

// ── DAMAGE NUMBERS ────────────────────────────────────────────────────────────
function updateDamageNumbers(dt){
  for(let i=damageNumbers.length-1;i>=0;i--){
    const d=damageNumbers[i];
    d.y-=0.5*(dt/16);d.life-=dt;d.alpha=d.life/d.maxLife;
    if(d.life<=0)damageNumbers.splice(i,1);
  }
}

function spawnDamageNumber(x,y,dmg,color){
  // Project world coords to approximate screen coords
  const dx=x-player.x,dy=y-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<0.1)return;
  const angle=Math.atan2(dy,dx)-player.angle;
  let sa=angle;while(sa>Math.PI)sa-=Math.PI*2;while(sa<-Math.PI)sa+=Math.PI*2;
  if(Math.abs(sa)>player.currentFOV)return;
  const fov=player.currentFOV||FOV;
  const sx=((sa/fov)+0.5)*canvas.width;
  const h=Math.min(canvas.height,(CELL/Math.max(dist,0.5))*canvas.height*0.5);
  const sy=canvas.height/2-h/2;
  damageNumbers.push({sx,sy,text:Math.ceil(dmg).toString(),color:color||'#ff0',life:800,maxLife:800,alpha:1});
}

function renderDamageNumbers(ctx2){
  ctx2.save();
  damageNumbers.forEach(d=>{
    ctx2.globalAlpha=d.alpha;
    ctx2.fillStyle=d.color;
    ctx2.font=`bold 16px monospace`;
    ctx2.textAlign='center';
    ctx2.fillText(d.text,d.sx,d.sy);
  });
  ctx2.globalAlpha=1;ctx2.textAlign='left';ctx2.restore();
}

// ── ENEMY AI + DAMAGE ────────────────────────────────────────────────────────
function applyEnemyDamage(e,dmg){
  const isCrit=Math.random()<(player.critChance||0);
  if(isCrit)dmg*=2;
  // Emblem bonuses
  if(getEmblemLevel('Fire')>=10&&e.burning)dmg*=1.3;
  if(getEmblemLevel('Ice')>=10&&e.frozen)dmg*=1.4;
  e.hp-=dmg;e.hitFlash=150;
  spawnDamageNumber(e.x,e.y,dmg,isCrit?'#f00':'#ff0');
  if(e.hp<=0)killEnemy(e);
}

function killEnemy(e){
  e.dead=true;player.kills++;score+=e.isBoss?500:10+(currentWave*2);
  spawnParticles(e.x,e.y,15,e.isBoss?'#ffd700':'#f80');
  // Weapon tier upgrade (kill counts)
  const w=getWeapon();if(w){w.kills=(w.kills||0)+1;checkWeaponTierUpgrade(w);}
  // Drop loot
  if(e.isBoss){
    // Boss drops weapon + health orb
    pickups.push({x:e.x+rand(-20,20),y:e.y+rand(-20,20),type:'weapon',tier:'2+',life:20000});
    pickups.push({x:e.x,y:e.y,type:'healthOrb',healAmt:50,life:15000});
    showBossReward();
  } else {
    if(Math.random()<0.12)pickups.push({x:e.x,y:e.y,type:'weapon',tier:'1',life:12000});
    if(Math.random()<0.06)pickups.push({x:e.x,y:e.y,type:'armor',life:12000});
    if(Math.random()<0.08)pickups.push({x:e.x,y:e.y,type:'emblem',life:12000});
    if(Math.random()<0.2)pickups.push({x:e.x,y:e.y,type:'healthOrb',healAmt:10+Math.random()*15,life:10000});
  }
  // Check emblem select
  if(player.kills%10===0)showEmblemSelect();
}

function checkWeaponTierUpgrade(w){
  const thresholds=[10,25,50,100,200];
  const tiers=['1','1+','2','2+','3'];
  const idx=tiers.indexOf(String(w.tier||'1'));
  if(idx<0||idx>=tiers.length-1)return;
  if((w.kills||0)>=thresholds[idx]){
    w.tier=tiers[idx+1];w.damage=Math.floor(w.damage*1.25);
    announceAbility(`${w.name} TIER UP → T${w.tier}`,'#ffd700');
    playSound('levelUp');
  }
}

function updateEnemies(dt){
  const toRemove=[];
  enemies.forEach((e,i)=>{
    if(e.dead){toRemove.push(i);return;}
    if(e.hitFlash>0)e.hitFlash-=dt;
    // Status effects
    if(e.burning){e.burnTimer-=dt;if(e.burnTimer<=0)e.burning=false;else{e.hp-=e.burnDmg*(dt/1000)*60;if(e.hp<=0)killEnemy(e);}}
    if(e.frozen){e.freezeTimer-=dt;if(e.freezeTimer<=0){e.frozen=false;e.speed=ENEMY_TYPES.find(t=>t.name===e.typeName)?.speed||1;}}
    if(e.poisoned){e.poisonTimer-=dt;if(e.poisonTimer<=0)e.poisoned=false;else{e.hp-=e.poisonDmg*(dt/1000)*60;if(e.hp<=0)killEnemy(e);}}
    if(e.dead)return;

    const dx=player.x-e.x,dy=player.y-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const speed=e.speed*(e.frozen?0.2:1);

    // Boss abilities
    if(e.isBoss&&e.bossAbils){e.bossAbils.forEach(ab=>runBossAbility(e,ab,dt,dist));}

    // Move toward player
    if(dist>30){
      e.x+=dx/dist*speed*(dt/16);e.y+=dy/dist*speed*(dt/16);
    }

    // Melee attack
    if(dist<35){
      e.attackTimer=(e.attackTimer||0)+dt;
      if(e.attackTimer>e.attackCd){
        e.attackTimer=0;
        let dmg=e.damage*(1-getArmorDef()*0.01);
        if(getEmblemLevel('Holy')>=10)dmg*=0.85;
        takeDmg(dmg,200);
      }
    }
    // Ranged attack
    if(e.ranged&&dist<400&&dist>60){
      e.rangedTimer=(e.rangedTimer||0)+dt;
      if(e.rangedTimer>(e.rangedCd||2000)){
        e.rangedTimer=0;
        const ET=ENEMY_TYPES.find(t=>t.name===e.typeName)||ENEMY_TYPES[0];
        const angle=Math.atan2(dy,dx);
        const spread=e.isBoss?0.1:0.3;
        const projCount=e.isBoss?3:1;
        for(let k=0;k<projCount;k++){
          const a=angle+(Math.random()-0.5)*spread;
          projectiles.push({
            x:e.x,y:e.y,
            vx:Math.cos(a)*4,vy:Math.sin(a)*4,
            damage:e.damage*0.7,fromPlayer:false,
            color:ET.color,life:3000,
            freeze:ET.freezeOnHit,burn:ET.burns,poison:ET.poisonOnHit,
          });
        }
      }
    }
    // Lifesteal aura (some bosses)
    if(e.isBoss&&e.lifestealAura){
      if(dist<100){e.hp=Math.min(e.maxHp,e.hp+e.maxHp*0.0005*dt);}
    }
  });
  for(let i=toRemove.length-1;i>=0;i--)enemies.splice(toRemove[i],1);
}

// ── PICKUP UPDATE ─────────────────────────────────────────────────────────────
function updatePickups(dt){
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];
    p.life-=dt;
    if(p.life<=0){pickups.splice(i,1);continue;}
    const dx=player.x-p.x,dy=player.y-p.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    // Auto-pickup within range (weapons auto if slot available)
    const pickupRange=p.type==='healthOrb'?60:40;
    if(dist<pickupRange){
      if(p.type==='healthOrb'){player.hp=Math.min(player.maxHp,player.hp+(p.healAmt||15));playSound('heal');pickups.splice(i,1);}
      else if(p.type==='weapon'){
        // Auto-pickup if less than 4 weapons, else prompt
        if(player.weapons.length<4){
          const wt=WEAPON_TYPES[Math.floor(Math.random()*WEAPON_TYPES.length)];
          const newW={...wt,kills:0,ammo:wt.ammo||Infinity};
          // Apply tier
          if(p.tier){newW.tier=p.tier;}
          player.weapons.push(newW);playSound('pickupWeapon');pickups.splice(i,1);
        }
      } else if(p.type==='armor'){
        const ar=ARMORS[Math.floor(Math.random()*ARMORS.length)];
        player.armors.push({...ar});if(equippedArmorIndex<0)equippedArmorIndex=0;
        playSound('heal');pickups.splice(i,1);
      } else if(p.type==='emblem'){
        // Give random emblem XP
        const em=EMBLEM_TYPES[Math.floor(Math.random()*EMBLEM_TYPES.length)];
        player.emblems[em.name]=(player.emblems[em.name]||0)+3;
        announceAbility(`${em.name} EMBLEM ↑`,(em&&em.color)||'#a0f');
        playSound('levelUp');pickups.splice(i,1);
      }
    }
  }
}

// ── PASSIVE REGEN ─────────────────────────────────────────────────────────────
let passiveRegenTimer=0;
function updatePassiveRegen(dt){
  passiveRegenTimer+=dt;
  if(passiveRegenTimer>2000){
    passiveRegenTimer=0;
    let regen=1;
    if(getEmblemLevel('Nature')>=5)regen+=2;
    if(getEmblemLevel('Blood')>=15)regen+=3;
    player.hp=Math.min(player.maxHp,player.hp+regen);
  }
  // Burning damage
  if(player.burning){player.burnTimer-=dt;if(player.burnTimer<=0)player.burning=false;else{player.hp-=player.burnDmg*(dt/1000)*60;if(player.hp<=0)triggerDeath();}}
  if(player.poisoned){player.poisonTimer-=dt;if(player.poisonTimer<=0)player.poisoned=false;else{player.hp-=player.poisonDmg*(dt/1000)*60;if(player.hp<=0)triggerDeath();}}
}

// ── EMBLEM PASSIVES ─────────────────────────────────────────────────────────
function applyEmblemPassives(dt){
  // Arcane: random missiles at nearby enemies
  if(getEmblemLevel('Arcane')>=15){
    if(Math.random()<0.002*dt){
      if(enemies.length>0){
        const t=enemies[Math.floor(Math.random()*enemies.length)];
        const angle=Math.atan2(t.y-player.y,t.x-player.x);
        projectiles.push({x:player.x,y:player.y,vx:Math.cos(angle)*6,vy:Math.sin(angle)*6,damage:20+getEmblemLevel('Arcane'),fromPlayer:true,color:'#a0f',life:2000,pierce:false});
      }
    }
  }
  // Chaos: random chaos bolt
  if(getEmblemLevel('Chaos')>=10){
    if(Math.random()<0.001*dt){
      const angle=Math.random()*Math.PI*2;
      projectiles.push({x:player.x,y:player.y,vx:Math.cos(angle)*8,vy:Math.sin(angle)*8,damage:35,fromPlayer:true,color:'#f0f',life:1500,pierce:true});
    }
  }
  // Time: slow nearby enemies aura
  if(getEmblemLevel('Time')>=10){
    enemies.forEach(e=>{if(Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2)<150){e.frozen=true;e.freezeTimer=Math.max(e.freezeTimer||0,200);}});
  }
}

// ── PLAYER MOVEMENT ────────────────────────────────────────────────────────────
function getBaseSpeed(){
  let spd=3.0;
  if(getEmblemLevel('Wind')>=5)spd+=0.5;
  if(equippedArmorIndex>=0&&player.armors[equippedArmorIndex]){spd+=player.armors[equippedArmorIndex].speedBonus||0;}
  return spd;
}

function updatePlayer(dt){
  if(keys['w']||keys['arrowup']){player.x+=Math.cos(player.angle)*player.speed*(dt/16);player.y+=Math.sin(player.angle)*player.speed*(dt/16);}
  if(keys['s']||keys['arrowdown']){player.x-=Math.cos(player.angle)*player.speed*(dt/16);player.y-=Math.sin(player.angle)*player.speed*(dt/16);}
  if(keys['a']||keys['arrowleft']){player.x+=Math.cos(player.angle-Math.PI/2)*player.speed*(dt/16);player.y+=Math.sin(player.angle-Math.PI/2)*player.speed*(dt/16);}
  if(keys['d']||keys['arrowright']){player.x+=Math.cos(player.angle+Math.PI/2)*player.speed*(dt/16);player.y+=Math.sin(player.angle+Math.PI/2)*player.speed*(dt/16);}

  // Wall collision (cell units)
  const margin=0.2;
  const mx=Math.floor(player.x),my=Math.floor(player.y);
  const mxL=Math.floor(player.x-margin),mxR=Math.floor(player.x+margin);
  const myU=Math.floor(player.y-margin),myD=Math.floor(player.y+margin);
  const inBounds=(c,r)=>c>=0&&c<MAP_W&&r>=0&&r<MAP_H;
  if(inBounds(mxL,my)&&WORLD_MAP[my][mxL])player.x=mx+margin;
  if(inBounds(mxR,my)&&WORLD_MAP[my][mxR])player.x=(mx+1)-margin;
  if(inBounds(mx,myU)&&WORLD_MAP[myU][mx])player.y=my+margin;
  if(inBounds(mx,myD)&&WORLD_MAP[myD][mx])player.y=(my+1)-margin;

  // FOV interpolation (scope)
  const targetFOV=player.currentFOV||FOV;
  currentFOV+=(targetFOV-currentFOV)*0.15;

  // Cooldowns
  if(player.skillCooldown>0)player.skillCooldown-=dt;
  if(player.ultCooldown>0)player.ultCooldown-=dt;
  if(armorAbilityCooldown>0)armorAbilityCooldown-=dt;
  if(player.reloading){player.reloadTimer-=dt;if(player.reloadTimer<=0){player.reloading=false;const w=getWeapon();if(w)w.ammo=w.maxAmmo||30;}}

  // Ultimate visual timers
  if(player.hawkFlyTimer>0){player.hawkFlyTimer-=dt;}
  if(player.ultVisualTimer>0){player.ultVisualTimer-=dt;}

  // Kill streak auto-fire (some ults)
  if(player.killStreakActive){player.killStreakTimer-=dt;if(player.killStreakTimer<=0)player.killStreakActive=false;}

  // Auto-shoot if holding left click
  if(mouseDown){
    player.shootTimer=(player.shootTimer||0)+dt;
    const w=getWeapon();
    if(w&&player.shootTimer>=(w.fireRate||200)){player.shootTimer=0;playerShoot();}
  }
}

// ── SPAWNING ──────────────────────────────────────────────────────────────────
let currentWave=1,bossSpawnTimer=0,bossCountdown=0; // waveTimer declared above
function updateSpawning(dt){
  waveTimer+=dt;
  const waveInterval=Math.max(800,4500-gameTime/1000*55);
  if(waveTimer>=waveInterval){
    waveTimer=0;currentWave++;
    const count=Math.min(1+Math.floor(gameTime/25000),8);
    for(let i=0;i<count;i++)spawnEnemy();
  }
  // Boss every 60s
  bossSpawnTimer+=dt;
  if(bossSpawnTimer>=60000){bossSpawnTimer=0;spawnBoss();}
  // Boss countdown HUD
  if(bossCountdown>0){bossCountdown-=dt;}
}

function spawnEnemy(){
  const maxType=Math.min(ENEMY_TYPES.length-1,Math.floor(gameTime/20000)+2);
  const ET=ENEMY_TYPES[Math.floor(Math.random()*(maxType+1))];
  const angle=Math.random()*Math.PI*2;
  const dist=6+Math.random()*4;
  const scaling=1+gameTime/60000*1.3;
  enemies.push({
    x:player.x+Math.cos(angle)*dist,y:player.y+Math.sin(angle)*dist,
    typeName:ET.name,isBoss:false,
    hp:ET.hp*scaling,maxHp:ET.hp*scaling,
    damage:ET.damage*scaling,speed:ET.speed,
    attackCd:ET.attackCd||1200,attackTimer:0,
    ranged:ET.ranged||false,rangedCd:ET.rangedCd||2000,rangedTimer:0,
    radius:0.35,dead:false,hitFlash:0,
    burns:ET.burns,freezeOnHit:ET.freezeOnHit,poisonOnHit:ET.poisonOnHit,
  });
}

function spawnBoss(){
  const maxBoss=Math.min(BOSSES.length-1,Math.floor(gameTime/60000)+1);
  const BD=BOSSES[Math.floor(Math.random()*(maxBoss+1))];
  const angle=Math.random()*Math.PI*2;
  const scaling=1+gameTime/60000*1.5;
  bossCountdown=10000;
  setTimeout(()=>{
    enemies.push({
      x:player.x+Math.cos(angle)*9,y:player.y+Math.sin(angle)*9,
      typeName:BD.name,isBoss:true,name:BD.name,
      hp:BD.hp*scaling*1.8,maxHp:BD.hp*scaling*1.8,
      damage:BD.damage*scaling*1.5,speed:BD.speed,
      attackCd:1000,attackTimer:0,
      ranged:true,rangedCd:BD.rangedCd||3000,rangedTimer:0,
      radius:0.5,dead:false,hitFlash:0,
      bossAbils:BD.bossAbils||[],
      lifestealAura:BD.bossAbils?.includes('lifestealAura'),
    });
    startBGM(true);
    announceAbility(`BOSS: ${BD.name}`,'#f00');
  },bossCountdown);
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
let lastTime=0,score=0; // gameTime declared above

function gameLoop(ts){
  const dt=Math.min(ts-lastTime,50);lastTime=ts;
  const ctx2=canvas.getContext('2d');
  ctx2.clearRect(0,0,canvas.width,canvas.height);

  if(gameState==='playing'){
    gameTime+=dt;
    updatePlayer(dt);
    updateEnemies(dt);
    updateProjectiles(dt);
    updateParticles(dt);
    updateDamageNumbers(dt);
    updatePickups(dt);
    updatePassiveRegen(dt);
    applyEmblemPassives(dt);
    updateSpawning(dt);
    renderScene();
    drawWeaponView();
    // Render particles
    renderParticles(ctx2);
    renderDamageNumbers(ctx2);
    drawHUD();
    // Ultimate visual overlays
    if(player.hawkFlyTimer>0){
      ctx2.save();ctx2.globalAlpha=0.25;ctx2.fillStyle='#08f';
      ctx2.fillRect(0,0,canvas.width,canvas.height);ctx2.restore();
    }
    if(player.ultVisualTimer>0){
      ctx2.save();ctx2.globalAlpha=0.2;ctx2.fillStyle='#f00';
      ctx2.fillRect(0,0,canvas.width,canvas.height);ctx2.restore();
    }
    // Boss countdown
    if(bossCountdown>0&&bossCountdown<10000){
      ctx2.save();ctx2.fillStyle='#f00';ctx2.font='bold 2rem monospace';ctx2.textAlign='center';
      ctx2.fillText(`BOSS IN ${Math.ceil(bossCountdown/1000)}...`,canvas.width/2,80);
      ctx2.restore();
    }
    // Kill streak indicator
    if(player.killStreakActive){
      ctx2.save();ctx2.fillStyle='#fa0';ctx2.font='bold 1rem monospace';ctx2.textAlign='center';
      ctx2.globalAlpha=0.9+0.1*Math.sin(Date.now()/100);
      ctx2.fillText('KILL STREAK!',canvas.width/2,canvas.height-60);
      ctx2.restore();
    }
  } else if(gameState==='paused'){
    renderScene();
    ctx2.save();ctx2.fillStyle='rgba(0,0,0,0.55)';ctx2.fillRect(0,0,canvas.width,canvas.height);
    ctx2.fillStyle='#fff';ctx2.font='bold 2.5rem monospace';ctx2.textAlign='center';
    ctx2.fillText('PAUSED',canvas.width/2,canvas.height/2-20);
    ctx2.font='1rem monospace';ctx2.fillText('[P] or [Esc] to resume',canvas.width/2,canvas.height/2+30);
    ctx2.font='0.9rem monospace';ctx2.fillText('[I] Inventory  [Q] Skill  [E] Ult  [Shift] Armor',canvas.width/2,canvas.height/2+60);
    ctx2.restore();
  } else if(gameState==='emblemSelect'||gameState==='bossReward'){
    renderScene();
    ctx2.save();ctx2.fillStyle='rgba(0,0,0,0.7)';ctx2.fillRect(0,0,canvas.width,canvas.height);ctx2.restore();
  } else if(gameState==='inventory'){
    renderScene();
    ctx2.save();ctx2.fillStyle='rgba(0,0,0,0.75)';ctx2.fillRect(0,0,canvas.width,canvas.height);ctx2.restore();
  } else if(gameState==='gameOver'){
    ctx2.fillStyle='#000';ctx2.fillRect(0,0,canvas.width,canvas.height);
    ctx2.fillStyle='#f00';ctx2.font='bold 3rem monospace';ctx2.textAlign='center';
    ctx2.fillText('YOU DIED',canvas.width/2,canvas.height/2-60);
    ctx2.fillStyle='#fff';ctx2.font='1.2rem monospace';
    ctx2.fillText(`Score: ${score} | Kills: ${player.kills} | Wave: ${currentWave}`,canvas.width/2,canvas.height/2);
    ctx2.font='0.9rem monospace';
    ctx2.fillText('Click to restart',canvas.width/2,canvas.height/2+50);
  }

  requestAnimationFrame(gameLoop);
}

function renderParticles(ctx2){
  ctx2.save();
  particles.forEach(p=>{
    const dx=p.x-player.x,dy=p.y-player.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<0.1)return;
    const fov=player.currentFOV||FOV;
    const angle=Math.atan2(dy,dx)-player.angle;
    let sa=angle;while(sa>Math.PI)sa-=Math.PI*2;while(sa<-Math.PI)sa+=Math.PI*2;
    if(Math.abs(sa)>fov)return;
    const sx=((sa/fov)+0.5)*canvas.width;
    const sy=canvas.height/2+(Math.random()-0.5)*20;
    ctx2.globalAlpha=p.alpha*0.7;
    ctx2.fillStyle=p.color;
    ctx2.beginPath();ctx2.arc(sx,sy,p.size,0,Math.PI*2);ctx2.fill();
  });
  ctx2.globalAlpha=1;ctx2.restore();
}

function triggerDeath(){
  if(gameState==='gameOver')return;
  player.hp=0;gameState='gameOver';

  stopBGM();playSound('death');
}

});

function setupMobileControls(){
  const overlay=document.getElementById('mobile-overlay');
  const leftZone=document.getElementById('left-joy-zone');
  const rightZone=document.getElementById('right-joy-zone');
  const leftStick=document.getElementById('left-stick');
  const rightStick=document.getElementById('right-stick');

  function handleLeft(e){
    e.preventDefault();
    const t=[...e.touches].find(t=>t.target===leftZone||leftZone.contains(t.target));
    if(!t)return;
    const r=leftZone.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    const dx=t.clientX-cx,dy=t.clientY-cy;
    const len=Math.sqrt(dx*dx+dy*dy),max=60;
    const nx=Math.min(1,len/max)*(len>0?dx/len:0);
    const ny=Math.min(1,len/max)*(len>0?dy/len:0);
    leftStick.style.transform=`translate(${nx*max}px,${ny*max}px)`;
    leftJoyX=nx;leftJoyY=ny;leftJoyActive=true;
    // Map to keys
    keys['w']=ny<-0.3;keys['s']=ny>0.3;keys['a']=nx<-0.3;keys['d']=nx>0.3;
  }
  function handleRight(e){
    e.preventDefault();
    const t=[...e.touches].find(t=>t.target===rightZone||rightZone.contains(t.target));
    if(!t)return;
    const r=rightZone.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    const dx=t.clientX-cx,dy=t.clientY-cy;
    const len=Math.sqrt(dx*dx+dy*dy);
    if(len>0){player.angle+=dx/len*0.04;mouseDown=true;}
  }
  leftZone.addEventListener('touchstart',handleLeft,{passive:false});
  leftZone.addEventListener('touchmove',handleLeft,{passive:false});
  leftZone.addEventListener('touchend',()=>{leftJoyActive=false;leftStick.style.transform='';keys['w']=keys['s']=keys['a']=keys['d']=false;mouseDown=false;},{passive:false});
  rightZone.addEventListener('touchstart',handleRight,{passive:false});
  rightZone.addEventListener('touchmove',handleRight,{passive:false});
  rightZone.addEventListener('touchend',()=>{rightJoyActive=false;rightStick.style.transform='';mouseDown=false;},{passive:false});

  // Mobile action buttons
  document.getElementById('btn-skill')?.addEventListener('click',useSkill);
  document.getElementById('btn-ult')?.addEventListener('click',useUlt);
  document.getElementById('btn-inv')?.addEventListener('click',toggleInventory);
  document.getElementById('btn-armor')?.addEventListener('click',useArmorAbility);
  document.getElementById('btn-pause')?.addEventListener('click',togglePause);
}

// ── DOM ID ALIASES ─────────────────────────────────────────────────────────────
// Map our JS references to the actual HTML elements
Object.defineProperty(window,'_getEl',{value:function(id){return document.getElementById(id);}});

// Patch: showCharacterSelect uses '#char-select' but HTML has '#char-select-container'
// Patch: showEmblemSelect uses '#emblem-panel' but HTML has '#emblem-screen'
// Patch: toggleInventory uses '#inv-panel' but HTML has '#inventory-screen'
// Fix all references at runtime:
const _origGetElemById=document.getElementById.bind(document);
document.getElementById=function(id){
  const aliases={'char-select':'char-select-container','emblem-panel':'emblem-screen','inv-panel':'inventory-screen','mobile-overlay':null};
  if(id in aliases){const mapped=aliases[id];if(mapped===null)return null;return _origGetElemById(mapped)||_origGetElemById(id);}
  return _origGetElemById(id);
};

// Mobile: map joystick IDs
// The existing HTML has #move-joystick / #aim-joystick; re-map our setupMobileControls to use those
// Override setupMobileControls to use correct IDs
function setupMobileControls(){
  const leftZone=document.getElementById('move-joystick');
  const rightZone=document.getElementById('aim-joystick');
  const leftStick=document.getElementById('move-thumb');
  const rightStick=document.getElementById('aim-thumb');
  if(!leftZone||!rightZone)return;

  function handleLeft(e){
    e.preventDefault();
    const touches=[...e.touches];
    const t=touches.find(t=>{const r=leftZone.getBoundingClientRect();return t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom;});
    if(!t)return;
    const r=leftZone.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    const dx=t.clientX-cx,dy=t.clientY-cy;
    const len=Math.sqrt(dx*dx+dy*dy),max=50;
    const nx=Math.min(1,len/max)*(len>0?dx/len:0);
    const ny=Math.min(1,len/max)*(len>0?dy/len:0);
    if(leftStick)leftStick.style.transform=`translate(${nx*max}px,${ny*max}px)`;
    keys['w']=ny<-0.3;keys['s']=ny>0.3;keys['a']=nx<-0.3;keys['d']=nx>0.3;
  }
  function handleRight(e){
    e.preventDefault();
    const touches=[...e.touches];
    const r=rightZone.getBoundingClientRect();
    const t=touches.find(t=>t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom);
    if(!t)return;
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    const dx=t.clientX-cx,dy=t.clientY-cy;
    const len=Math.sqrt(dx*dx+dy*dy);
    if(len>5){player.angle+=dx/len*0.04;mouseDown=true;}
  }
  leftZone.addEventListener('touchstart',handleLeft,{passive:false});
  leftZone.addEventListener('touchmove',handleLeft,{passive:false});
  leftZone.addEventListener('touchend',e=>{e.preventDefault();if(leftStick)leftStick.style.transform='translate(-50%,-50%)';keys['w']=keys['s']=keys['a']=keys['d']=false;},{passive:false});
  rightZone.addEventListener('touchstart',handleRight,{passive:false});
  rightZone.addEventListener('touchmove',handleRight,{passive:false});
  rightZone.addEventListener('touchend',e=>{e.preventDefault();mouseDown=false;},{passive:false});
  // Action buttons
  const msb=document.getElementById('mobile-skill-btn');
  const mub=document.getElementById('mobile-ult-btn');
  const mib=document.getElementById('mobile-inv-btn');
  if(msb)msb.addEventListener('click',useSkill);
  if(mub)mub.addEventListener('click',useUlt);
  if(mib)mib.addEventListener('click',toggleInventory);
}

// Inventory toggle using correct IDs
function toggleInventory(){
  const panel=document.getElementById('inventory-screen');
  if(!panel)return;
  if(gameState==='playing'){
    gameState='inventory';document.exitPointerLock&&document.exitPointerLock();
    panel.style.display='block';
    // Render into #inv-content
    const content=document.getElementById('inv-content');
    if(content){content.innerHTML='';renderInventoryInto(content);}
  } else if(gameState==='inventory'){
    gameState='playing';panel.style.display='none';
    canvas.requestPointerLock&&canvas.requestPointerLock();
  }
}

function renderInventoryInto(container){
  // Weapons
  const wSec=document.createElement('div');wSec.className='inv-section';
  const wTitle=document.createElement('h3');wTitle.textContent='WEAPONS — click 2 to select, then FUSE';wSec.appendChild(wTitle);
  const wRow=document.createElement('div');wRow.className='inv-row';
  player.weapons.forEach((w,i)=>{
    const div=document.createElement('div');
    div.className='inv-item '+(fusionSelectIndices.includes(i)?'fuse-sel':'')+(i===player.weaponIndex?' selected':'');
    div.innerHTML=`<div class="inv-tooltip"><b>${w.name}</b><br>Tier: ${w.tier||'1'}<br>DMG: ${w.damage} | Rate: ${w.fireRate}ms<br>${w.desc||''}</div>${w.name}<br><small>T${w.tier||1} | DMG${w.damage}</small>${i===player.weaponIndex?'<br><small style="color:#0f0">[EQUIPPED]</small>':''}`;
    div.addEventListener('click',()=>{
      if(fusionSelectIndices.includes(i))fusionSelectIndices=fusionSelectIndices.filter(x=>x!==i);
      else if(fusionSelectIndices.length<2)fusionSelectIndices.push(i);
      else fusionSelectIndices=[i];
      player.weaponIndex=i;
      const content=document.getElementById('inv-content');if(content){content.innerHTML='';renderInventoryInto(content);}
    });
    wRow.appendChild(div);
  });
  wSec.appendChild(wRow);
  if(fusionSelectIndices.length===2){
    const fb=document.createElement('button');
    fb.style.cssText='margin-top:8px;padding:6px 16px;background:#ff0;color:#000;font-weight:bold;border:none;border-radius:4px;cursor:pointer;';
    fb.textContent='FUSE';fb.onclick=()=>{fuseWeapons(fusionSelectIndices[0],fusionSelectIndices[1]);const c=document.getElementById('inv-content');if(c){c.innerHTML='';renderInventoryInto(c);}};
    wSec.appendChild(fb);
  }
  container.appendChild(wSec);
  // Armors
  const aSec=document.createElement('div');aSec.className='inv-section';
  const aTitle=document.createElement('h3');aTitle.textContent='ARMORS — click to equip | Shift = ability';aSec.appendChild(aTitle);
  const aRow=document.createElement('div');aRow.className='inv-row';
  if(player.armors.length===0){const na=document.createElement('div');na.style.color='#888';na.textContent='None';aRow.appendChild(na);}
  player.armors.forEach((ar,i)=>{
    const div=document.createElement('div');div.className='inv-item '+(i===equippedArmorIndex?'selected':'');
    div.innerHTML=`<div class="inv-tooltip"><b>${ar.name}</b><br>DEF: ${ar.defense}<br>[Shift] ${ar.shiftAbility}</div>${ar.name}<br><small>DEF ${ar.defense}</small>${i===equippedArmorIndex?'<br><small style="color:#08f">[ON]</small>':''}`;
    div.addEventListener('click',()=>{equippedArmorIndex=i;armorAbilityCooldown=0;const c=document.getElementById('inv-content');if(c){c.innerHTML='';renderInventoryInto(c);}});
    aRow.appendChild(div);
  });
  aSec.appendChild(aRow);container.appendChild(aSec);
  // Emblems
  const eSec=document.createElement('div');eSec.className='inv-section';
  const eTitle=document.createElement('h3');eTitle.textContent='EMBLEMS';eSec.appendChild(eTitle);
  const eRow=document.createElement('div');eRow.className='inv-row';
  EMBLEM_TYPES.forEach(em=>{
    const lv=player.emblems[em.name]||0;
    const div=document.createElement('div');div.className='inv-item';
    div.style.borderColor=lv>0?em.color:'#333';
    div.innerHTML=`<div class="inv-tooltip" style="left:0;transform:none;right:auto;">${em.perks.map((p,pi)=>`<span style="color:${lv>pi*4?em.color:'#555'}">• ${p}</span>`).join('<br>')}</div><span style="color:${lv>0?em.color:'#666'}">${em.name}</span><br><small>Lv ${lv}/20</small>`;
    eRow.appendChild(div);
  });
  eSec.appendChild(eRow);container.appendChild(eSec);
  // Ability cards
  if(Object.keys(playerAbilityCards).length>0){
    const cSec=document.createElement('div');cSec.className='inv-section';
    const cTitle=document.createElement('h3');cTitle.textContent='ABILITY CARDS';cSec.appendChild(cTitle);
    const cRow=document.createElement('div');cRow.className='inv-row';
    Object.entries(playerAbilityCards).forEach(([name,tier])=>{
      const card=ABILITY_CARDS.find(c=>c.name===name);if(!card)return;
      const div=document.createElement('div');div.className='inv-item';div.style.borderColor=card.color;
      div.innerHTML=`<div class="inv-tooltip">${card.desc[tier]}</div><span style="color:${card.color}">${name}</span><br><small>Tier ${tier+1}</small>`;
      cRow.appendChild(div);
    });
    cSec.appendChild(cRow);container.appendChild(cSec);
  }
}

// Override showBossReward to use correct HTML
function showBossReward(){
  gameState='bossReward';paused=true;
  document.exitPointerLock&&document.exitPointerLock();
  stopBGM();
  const screen=document.getElementById('boss-reward-screen');
  if(!screen)return;
  screen.style.display='flex';
  const choices=document.getElementById('boss-reward-choices');
  if(!choices)return;choices.innerHTML='';
  const pool=[...ABILITY_CARDS].sort(()=>Math.random()-0.5).slice(0,3);
  pool.forEach(card=>{
    const existingTier=playerAbilityCards[card.name]!=null?playerAbilityCards[card.name]:-1;
    const newTier=Math.min(existingTier+1,card.desc.length-1);
    const div=document.createElement('div');div.className='buff-card';
    div.style.borderColor=card.color;
    div.innerHTML=`<h3 style="color:${card.color};margin-bottom:6px;">${card.name}</h3><div style="font-size:0.7rem;color:#888;margin-bottom:8px;">Tier ${newTier+1}${existingTier>=0?' (UPGRADE)':''}</div><p>${card.desc[newTier]}</p>`;
    div.addEventListener('click',()=>{
      playerAbilityCards[card.name]=newTier;
      applyAbilityCard(card.name,newTier);
      screen.style.display='none';
      gameState='playing';paused=false;
      startBGM(false);
      startUnpauseCountdown();
    });
    choices.appendChild(div);
  });
}

// Override showEmblemSelect to use correct HTML
function showEmblemSelect(){
  gameState='emblemSelect';paused=true;
  document.exitPointerLock&&document.exitPointerLock();
  const screen=document.getElementById('emblem-screen');
  const choices=document.getElementById('emblem-choices');
  if(!screen||!choices)return;
  screen.style.display='flex';choices.innerHTML='';
  playSound('levelUp');
  const shuffled=[...EMBLEM_TYPES].sort(()=>Math.random()-0.5).slice(0,3);
  shuffled.forEach(em=>{
    const lv=player.emblems[em.name]||0;
    const div=document.createElement('div');div.className='emblem-card';
    div.style.borderColor=em.color;
    const perkIdx=Math.floor(lv/4);
    const nextPerk=em.perks[Math.min(perkIdx,em.perks.length-1)]||'Max power';
    div.innerHTML=`<div class="em-icon" style="color:${em.color}">${em.icon||'★'}</div><h4 style="color:${em.color}">${em.name}</h4><p>Lv ${lv}→${lv+2}</p><p style="margin-top:6px;font-size:0.72rem;color:#ccc">${nextPerk}</p>`;
    div.addEventListener('click',()=>{
      player.emblems[em.name]=(player.emblems[em.name]||0)+2;
      screen.style.display='none';
      gameState='playing';paused=false;
      startUnpauseCountdown();
    });
    choices.appendChild(div);
  });
}

// Override showCharacterSelect to use correct HTML
function showCharacterSelect(){
  const titleScreen=document.getElementById('title-screen');
  const container=document.getElementById('char-select-container');
  if(!container)return;
  container.innerHTML='';
  // Difficulty highlight
  ['easy','medium','hard','nightmare'].forEach(d=>{
    const btn=document.getElementById(`diff-${d}`);
    if(btn)btn.style.opacity=selectedDifficulty.toLowerCase()===d?'1':'0.45';
  });
  const diffDesc=document.getElementById('diff-desc');
  const descs={easy:'Enemies deal 60% damage, move 80% speed',medium:'Standard experience',hard:'Enemies deal 140% damage, move 120% speed',nightmare:'Enemies deal 200% damage, bosses every 60s, 1.8x HP'};
  if(diffDesc)diffDesc.textContent=descs[selectedDifficulty.toLowerCase()]||'';

  CHARACTERS.forEach(ch=>{
    const card=document.createElement('div');card.className='char-card';
    card.style.borderColor=ch.color;
    card.innerHTML=`<h3 style="color:${ch.color}">${ch.name}</h3><p>HP: ${ch.hp} | SPD: ${ch.speed}</p><p>[Q] ${ch.skill}</p><p>[E] ${ch.ult}</p>${ch.desc?`<p style="margin-top:4px;color:#777">${ch.desc}</p>`:''}`;
    card.addEventListener('click',()=>{
      selectedChar=ch;
      player.maxHp=ch.hp;player.speed=ch.speed;player.critChance=ch.critChance||0.05;
      const diffMults={easy:0.6,medium:1,hard:1.4,nightmare:2};
      window._diffMult=diffMults[selectedDifficulty.toLowerCase()]||1;
      titleScreen.style.display='none';
      initGame();startGame();
    });
    container.appendChild(card);
  });
}

// Difficulty setter from HTML buttons
function setDifficulty(d){selectedDifficulty=d;diffSettings=DIFF_SETTINGS[d.toLowerCase()]||DIFF_SETTINGS.medium;showCharacterSelect();}

// ── FINAL INIT ────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  showCharacterSelect();
  requestAnimationFrame(gameLoop);
  // Mobile setup
  if(/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)||'ontouchstart' in window){
    setupMobileControls();
  }
});
</script>
