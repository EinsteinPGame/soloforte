<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Emblem Fury V6.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;color:#fff;user-select:none;-webkit-user-select:none;touch-action:none}
canvas{display:block}
#ui-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui-layer *{pointer-events:auto}
.screen-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.95);overflow-y:auto;padding:20px}
.screen-overlay h1{font-size:3.5rem;margin-bottom:16px;text-shadow:0 0 30px currentColor}
.screen-overlay h2{font-size:1.6rem;margin-bottom:16px;color:#888}
.screen-overlay p{color:#999;margin:4px 0;font-size:0.95rem}
.screen-overlay button{padding:10px 28px;font-size:1rem;font-family:'Courier New',monospace;border:2px solid;border-radius:4px;cursor:pointer;margin:5px;transition:all 0.2s;background:transparent;color:#fff}
.screen-overlay button:hover{transform:scale(1.05)}
.char-select{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap;justify-content:center;max-width:1200px}
.char-card{width:150px;padding:12px;border:2px solid #444;border-radius:8px;cursor:pointer;text-align:center;transition:all 0.3s;background:rgba(20,20,40,0.8)}
.char-card:hover{transform:translateY(-4px)}
.char-card h3{font-size:1rem;margin-bottom:6px}
.char-card p{font-size:0.7rem;color:#aaa;line-height:1.3}
.emblem-select{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:900px}
.emblem-card{width:190px;padding:14px;border:2px solid #555;border-radius:8px;cursor:pointer;text-align:center;transition:all 0.3s;background:rgba(20,20,40,0.9)}
.emblem-card:hover{transform:translateY(-3px);border-color:#fff}
.emblem-card .em-icon{font-size:2rem;margin-bottom:5px}
.emblem-card h4{font-size:0.9rem;margin-bottom:4px}
.emblem-card p{font-size:0.7rem;color:#aaa;line-height:1.25}
.buff-card{width:220px;padding:16px;border:2px solid #666;border-radius:8px;cursor:pointer;text-align:center;transition:all 0.3s;background:rgba(20,20,50,0.9);position:relative}
.buff-card:hover{transform:translateY(-3px);border-color:#0f0}
.buff-card p{font-size:0.85rem;color:#ccc;line-height:1.4}
#inventory-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.93);z-index:90;display:none;overflow-y:auto;padding:20px}
#inventory-screen h2{text-align:center;color:#7b68ee;font-size:1.5rem;margin-bottom:14px}
.inv-section{max-width:920px;margin:0 auto 14px;padding:12px;border:1px solid #333;border-radius:8px;background:rgba(15,15,30,0.8)}
.inv-section h3{color:#00d4ff;margin-bottom:8px;font-size:0.95rem}
.inv-row{display:flex;gap:8px;flex-wrap:wrap}
.inv-item{padding:6px 10px;border:2px solid #444;border-radius:4px;font-size:0.78rem;color:#ccc;background:rgba(30,30,60,0.5);cursor:pointer;position:relative;transition:border-color 0.15s}
.inv-item:hover{border-color:#7b68ee}
.inv-item:hover .inv-tooltip{display:block}
.inv-item.selected{border-color:#0f0;background:rgba(0,100,0,0.2)}
.inv-item.fuse-sel{border-color:#ff0;background:rgba(80,80,0,0.3)}
.inv-tooltip{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:rgba(10,10,30,0.97);border:1px solid #555;border-radius:6px;padding:10px;width:220px;font-size:0.73rem;color:#ddd;z-index:200;pointer-events:none;line-height:1.5;text-align:left;white-space:normal}
.inv-tooltip h4{color:#0f0;margin-bottom:4px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat-item{padding:5px;text-align:center;border:1px solid #333;border-radius:4px;font-size:0.78rem}
.stat-item .label{color:#888;font-size:0.62rem}
.stat-item .value{color:#0f0;font-size:0.95rem}
#close-inv{position:fixed;top:12px;right:16px;font-size:1.7rem;cursor:pointer;color:#888;z-index:91}
#close-inv:hover{color:#fff}
.tier-1{border-color:#aaa!important}
.tier-1p{border-color:#3d3!important;box-shadow:0 0 5px rgba(50,200,50,0.4)!important}
.tier-2{border-color:#44f!important;box-shadow:0 0 5px rgba(68,68,255,0.4)!important}
.tier-2p{border-color:#a4f!important;box-shadow:0 0 7px rgba(160,68,255,0.5)!important}
.tier-3{border-color:#fa0!important;box-shadow:0 0 9px rgba(255,170,0,0.5)!important}
.tier-u{border-color:#f40!important;box-shadow:0 0 12px rgba(255,68,0,0.7)!important;animation:uGlow 1.5s infinite}
@keyframes uGlow{0%,100%{box-shadow:0 0 8px rgba(255,68,0,0.5)!important}50%{box-shadow:0 0 20px rgba(255,140,0,0.9)!important}}
.mobile-controls-container{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;pointer-events:none}
.mobile-controls-container *{pointer-events:auto}
.joystick-base{position:fixed;width:120px;height:120px;border:2px solid rgba(255,255,255,0.25);border-radius:50%;background:rgba(255,255,255,0.05)}
.joystick-thumb{width:44px;height:44px;background:rgba(255,255,255,0.4);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#move-joystick{bottom:30px;left:25px;z-index:51}
#aim-joystick{bottom:30px;right:25px;z-index:51}
#aim-line{position:fixed;pointer-events:none;z-index:49;display:none}
#mobile-skill-btn{position:fixed;bottom:170px;right:35px;width:56px;height:56px;border:2px solid rgba(0,200,255,0.5);border-radius:50%;z-index:52;font-size:0.7rem;color:rgba(0,200,255,0.8);display:flex;align-items:center;justify-content:center;background:rgba(0,50,100,0.3);flex-direction:column;line-height:1.1}
#mobile-skill-btn .cd-overlay{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;background:rgba(0,0,0,0.6);pointer-events:none;display:none}
#mobile-ult-btn{position:fixed;bottom:240px;right:35px;width:56px;height:56px;border:2px solid rgba(255,200,0,0.4);border-radius:50%;z-index:52;font-size:0.7rem;color:rgba(255,200,0,0.6);display:flex;align-items:center;justify-content:center;background:rgba(100,80,0,0.2);flex-direction:column;line-height:1.1}
#mobile-ult-btn.charged{border-color:rgba(255,220,0,0.9);color:rgba(255,220,0,1);background:rgba(120,100,0,0.4);animation:ultPulse 1.2s infinite}
#mobile-ult-btn.grayed{opacity:0.4}
#mobile-inv-btn{position:fixed;top:12px;right:12px;width:40px;height:40px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;z-index:52;font-size:0.85rem;color:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;background:rgba(40,40,60,0.5)}
@keyframes ultPulse{0%,100%{box-shadow:0 0 8px rgba(255,200,0,0.3)}50%{box-shadow:0 0 20px rgba(255,200,0,0.7)}}
#ability-announce{position:fixed;top:33%;left:50%;transform:translateX(-50%);font-size:2.2rem;font-weight:bold;color:#fff;text-shadow:0 0 20px currentColor;pointer-events:none;z-index:200;opacity:0;transition:opacity 0.15s;text-align:center;white-space:nowrap}
#unpause-countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8rem;font-weight:bold;color:#fff;text-shadow:0 0 50px #fff,0 0 100px rgba(255,255,255,0.5);pointer-events:none;z-index:300;display:none;text-align:center}
@media(max-width:800px),(pointer:coarse){.mobile-controls-container{display:block}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-layer"></div>
<div id="ability-announce"></div>
<div id="unpause-countdown"></div>

<div id="title-screen" class="screen-overlay">
  <h1 style="color:#ff4444">EMBLEM FURY</h1>
  <h2 style="color:#666;font-size:1.1rem">DOOM-Style FPS Roguelike V6.1</h2>
  <p>WASD/Mouse to move & aim | Click to shoot | Q=Skill | E=Ult | TAB=Inventory</p>
  <h2 style="color:#aaa;font-size:1.1rem;margin-top:14px;margin-bottom:6px">Difficulty</h2>
  <div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap">
    <button onclick="setDifficulty('easy')" id="diff-easy" style="padding:7px 14px;border:2px solid #3ddc84;background:#0e2a1a;color:#3ddc84;border-radius:6px;cursor:pointer;font-size:0.85rem">EASY</button>
    <button onclick="setDifficulty('medium')" id="diff-medium" style="padding:7px 14px;border:2px solid #ffc85c;background:#2a2200;color:#ffc85c;border-radius:6px;cursor:pointer;font-size:0.85rem">MEDIUM</button>
    <button onclick="setDifficulty('hard')" id="diff-hard" style="padding:7px 14px;border:2px solid #ff6b6b;background:#2a0e0e;color:#ff6b6b;border-radius:6px;cursor:pointer;font-size:0.85rem">HARD</button>
    <button onclick="setDifficulty('nightmare')" id="diff-nightmare" style="padding:7px 14px;border:2px solid #cc44ff;background:#1a0028;color:#cc44ff;border-radius:6px;cursor:pointer;font-size:0.85rem">NIGHTMARE</button>
  </div>
  <p id="diff-desc" style="color:#888;font-size:0.82rem;margin-bottom:12px">Current: Medium</p>
  <h2 style="color:#aaa;font-size:1.1rem;margin-bottom:6px">Choose Your Hero (14 characters)</h2>
  <div class="char-select" id="char-select-container"></div>
</div>

<div id="emblem-screen" class="screen-overlay" style="display:none">
  <h1 style="color:#ffd700;font-size:2.2rem">LEVEL UP!</h1>
  <h2 style="font-size:1rem;color:#aaa">Choose an Emblem Power</h2>
  <div class="emblem-select" id="emblem-choices"></div>
</div>

<div id="boss-reward-screen" class="screen-overlay" style="display:none">
  <h1 style="color:#ff4444;font-size:2.2rem">BOSS DEFEATED!</h1>
  <h2 style="font-size:1rem;color:#aaa">Choose an Ability Card</h2>
  <div id="boss-reward-choices" style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:900px"></div>
</div>

<div id="death-screen" class="screen-overlay" style="display:none">
  <h1 style="color:#ff0000">YOU DIED</h1>
  <div id="death-stats" style="margin:16px 0"></div>
  <button onclick="location.reload()" style="border-color:#ff4444;color:#ff4444">TRY AGAIN</button>
</div>

<div id="inventory-screen">
  <span id="close-inv" onclick="toggleInventory()">&times;</span>
  <h2>INVENTORY</h2>
  <div id="inv-content"></div>
</div>

<div class="mobile-controls-container">
  <div id="move-joystick" class="joystick-base"><div id="move-thumb" class="joystick-thumb"></div></div>
  <div id="aim-joystick" class="joystick-base"><div id="aim-thumb" class="joystick-thumb"></div></div>
  <canvas id="aim-line" width="1" height="1"></canvas>
  <div id="mobile-skill-btn"><span class="sk-icon">Q</span><div class="cd-overlay"></div></div>
  <div id="mobile-ult-btn" class="grayed"><span>ULT</span></div>
  <div id="mobile-inv-btn">INV</div>
</div>

<script>
// ============================================================
// EMBLEM FURY V6 - Complete DOOM-Style FPS Roguelike
// ============================================================
const C=document.getElementById('game'),ctx=C.getContext('2d');
const canvas=C; // alias for V6 code
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const FOV=Math.PI/3; // Field of view - defined early for player object

// ── AUDIO ──
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx,bgmPlaying=false,bgmNodes=[],bgmTimeout=null;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx();}
['click','touchstart','keydown'].forEach(e=>document.addEventListener(e,function ai(){initAudio();document.removeEventListener(e,ai);},{once:true}));

function playSound(type,opts={}){
  if(!audioCtx)return;
  const now=audioCtx.currentTime,g=audioCtx.createGain();g.connect(audioCtx.destination);
  switch(type){
    case 'shoot':{
      const pitch=opts.pitch||800,n=audioCtx.createBufferSource();
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.08,audioCtx.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3));
      n.buffer=buf;const filt=audioCtx.createBiquadFilter();filt.type='bandpass';filt.frequency.value=pitch;filt.Q.value=1;
      n.connect(filt);filt.connect(g);g.gain.setValueAtTime(0.22,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      n.start(now);n.stop(now+0.08);break;}
    case 'reload':{
      const o=audioCtx.createOscillator();o.type='square';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(150,now+0.2);
      o.connect(g);g.gain.setValueAtTime(0.1,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);o.start(now);o.stop(now+0.25);break;}
    case 'hit':{
      const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(150,now);o.frequency.exponentialRampToValueAtTime(60,now+0.1);
      o.connect(g);g.gain.setValueAtTime(0.28,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.1);o.start(now);o.stop(now+0.1);break;}
    case 'enemyDeath':{
      const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(80,now+0.3);
      o.connect(g);g.gain.setValueAtTime(0.18,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);o.start(now);o.stop(now+0.3);break;}
    case 'playerHurt':{
      const o=audioCtx.createOscillator();o.type='square';o.frequency.setValueAtTime(80,now);o.frequency.setValueAtTime(60,now+0.05);
      o.connect(g);g.gain.setValueAtTime(0.18,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);o.start(now);o.stop(now+0.15);break;}
    case 'levelUp':{[523,659,784,1047].forEach((f,i)=>{const o=audioCtx.createOscillator(),gg=audioCtx.createGain();o.type='sine';o.frequency.value=f;o.connect(gg);gg.connect(audioCtx.destination);gg.gain.setValueAtTime(0.13,now+i*0.1);gg.gain.exponentialRampToValueAtTime(0.001,now+i*0.1+0.15);o.start(now+i*0.1);o.stop(now+i*0.1+0.15);});break;}
    case 'bossSpawn':{
      const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(50,now);o.frequency.linearRampToValueAtTime(40,now+0.6);
      o.connect(g);g.gain.setValueAtTime(0.28,now);g.gain.linearRampToValueAtTime(0.001,now+0.8);o.start(now);o.stop(now+0.8);break;}
    case 'bossDeath':{for(let i=0;i<5;i++){const n=audioCtx.createBufferSource(),buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate),d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.exp(-j/(d.length*0.4));n.buffer=buf;const gg=audioCtx.createGain();n.connect(gg);gg.connect(audioCtx.destination);gg.gain.setValueAtTime(0.22-i*0.04,now+i*0.12);gg.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.15);n.start(now+i*0.12);n.stop(now+i*0.12+0.15);}break;}
    case 'pickupWeapon':{const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(2400,now+0.08);o.connect(g);g.gain.setValueAtTime(0.13,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);o.start(now);o.stop(now+0.12);break;}
    case 'emblemSelect':{[800,1000,1200,1600].forEach((f,i)=>{const o=audioCtx.createOscillator(),gg=audioCtx.createGain();o.type='sine';o.frequency.value=f;o.connect(gg);gg.connect(audioCtx.destination);gg.gain.setValueAtTime(0.09,now+i*0.06);gg.gain.exponentialRampToValueAtTime(0.001,now+i*0.06+0.2);o.start(now+i*0.06);o.stop(now+i*0.06+0.2);});break;}
    case 'skillUse':{const n=audioCtx.createBufferSource(),buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++){const t=i/audioCtx.sampleRate;d[i]=Math.sin(t*3000*Math.exp(-t*10))*Math.exp(-t*8)*0.5;}n.buffer=buf;n.connect(g);g.gain.value=0.28;n.start(now);n.stop(now+0.15);break;}
    case 'ultimate':{const o1=audioCtx.createOscillator();o1.type='sawtooth';o1.frequency.setValueAtTime(100,now);o1.frequency.linearRampToValueAtTime(600,now+0.3);o1.connect(g);g.gain.setValueAtTime(0.22,now);g.gain.linearRampToValueAtTime(0.001,now+0.5);o1.start(now);o1.stop(now+0.5);break;}
    case 'headshot':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(1200,now+0.08);o.connect(g);g.gain.setValueAtTime(0.28,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);o.start(now);o.stop(now+0.12);break;}
    case 'bossWarning':{const o=audioCtx.createOscillator();o.type='square';o.frequency.value=110;o.connect(g);g.gain.setValueAtTime(0.18,now);g.gain.linearRampToValueAtTime(0.001,now+0.3);o.start(now);o.stop(now+0.3);break;}
    case 'explosion':{const n=audioCtx.createBufferSource(),buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.3,audioCtx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.5));n.buffer=buf;n.connect(g);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);n.start(now);n.stop(now+0.3);break;}
  }
}

function startBGM(bossMode){
  // BGM disabled — no background music
}
function stopBGM(){
  bgmPlaying=false;if(bgmTimeout){clearTimeout(bgmTimeout);bgmTimeout=null;}
  for(const n of bgmNodes){try{n.stop();}catch(e){}try{n.disconnect();}catch(e){}}bgmNodes=[];
}
function pauseBGM(){
  bgmPlaying=false;if(bgmTimeout){clearTimeout(bgmTimeout);bgmTimeout=null;}
  for(const n of bgmNodes){try{n.stop();}catch(e){}try{n.disconnect();}catch(e){}}bgmNodes=[];
}

// ── CONSTANTS ──
const TILE=1,HALF_FOV=FOV/2,MAX_DEPTH=20,MOVE_SPEED=0.025,MOUSE_SENS=0.0012;
const MAP_W=24,MAP_H=24,MAP=[];
function generateMap(){for(let y=0;y<MAP_H;y++){MAP[y]=[];for(let x=0;x<MAP_W;x++){MAP[y][x]=(x===0||y===0||x===MAP_W-1||y===MAP_H-1)?1:0;}}MAP[6][6]=3;MAP[6][17]=3;MAP[17][6]=3;MAP[17][17]=3;}
generateMap();
const WALL_COLORS=[null,{r:80,g:80,b:100},{r:120,g:40,b:40},{r:60,g:70,b:60}];

// ── GAME STATE ──
let gameState='title',gameTime=0,totalKills=0,waveTimer=0,bossTimer=0,nextBossIndex=0,difficultyMult=1,difficultyTimer=0,paused=false;
let selectedDifficulty='medium';

const DIFF_SETTINGS={
  easy:{enemyHpMult:0.6,enemyDmgMult:0.6,xpMult:1.75,playerHpMult:1.4,scalingRate:0.055,scalingInterval:35000,bossHpMult:1.0,label:'Easy'},
  medium:{enemyHpMult:0.9,enemyDmgMult:0.85,xpMult:1.2,playerHpMult:1.1,scalingRate:0.08,scalingInterval:22000,bossHpMult:1.4,label:'Medium'},
  hard:{enemyHpMult:1.3,enemyDmgMult:1.3,xpMult:0.8,playerHpMult:1.0,scalingRate:0.13,scalingInterval:17000,bossHpMult:2.0,label:'Hard'},
  nightmare:{enemyHpMult:1.6,enemyDmgMult:1.6,xpMult:0.6,playerHpMult:0.85,scalingRate:0.16,scalingInterval:13000,bossHpMult:3.0,label:'Nightmare'},
};
let diffSettings=DIFF_SETTINGS.medium;

// ── ABILITY CARD SYSTEM (Boss Win Rewards) ──
const ABILITY_CARDS=[
  {name:'Feather Storm',desc:['More feathers fly','Feathers track enemies','Feather rain from sky'],color:'#4488ff'},
  {name:'Inferno Rush',desc:['Fire trail on move','Fire trail deals AoE','Immune to fire damage'],color:'#ff6622'},
  {name:'Shadow Step',desc:['Teleport on skill','Leave clone decoys','Double teleport range'],color:'#aa44ff'},
  {name:'Iron Skin',desc:['+20% max HP','+30% max HP + thorns','Thorns deal 50% reflected dmg'],color:'#ffcc00'},
  {name:'Time Dilation',desc:['-20% cooldowns','-35% cooldowns','Cooldowns halved permanently'],color:'#8cf'},
  {name:'Soul Drain',desc:['5% lifesteal on hit','10% lifesteal + AoE','Lifesteal heals nearby allies too'],color:'#cc2222'},
  {name:'Arcane Power',desc:['+25% ability damage','+50% ability damage','Abilities chain to nearby enemies'],color:'#c4f'},
  {name:'Dragon Scale',desc:['+15% damage reduction','+25% dmg reduction','Immune to all elemental damage'],color:'#f84'},

let mouseDown=false,mouseRight=false,mouseDx=0,mouseDy=0,pointerLocked=false;

document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if((e.key==='Tab'||e.key.toLowerCase()==='i')&&(gameState==='playing'||gameState==='inventory')){e.preventDefault();toggleInventory();}
  if(e.key.toLowerCase()==='q'&&gameState==='playing')useSkill();
  if(e.key.toLowerCase()==='e'&&gameState==='playing')useUltimate();
  if(e.key==='Escape'&&gameState==='playing')togglePause();
  if(e.key==='p'&&gameState==='playing')togglePause();
  if(e.key>='1'&&e.key<='9'&&gameState==='playing'){const idx=parseInt(e.key)-1;if(idx<player.weapons.length){player.weaponIndex=idx;player.reloading=false;}}
  // Shift = armor ability
  if(e.key==='Shift'&&gameState==='playing')useArmorAbility();
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
document.addEventListener('mousemove',e=>{
  if(pointerLocked&&gameState==='playing'){mouseDx+=e.movementX;mouseDy+=e.movementY;}
});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&gameState==='playing'){mouseDown=true;if(!pointerLocked&&!isTouchDevice)C.requestPointerLock();}
  if(e.button===2&&gameState==='playing'){mouseRight=true;handleRightClick(true);}
});
document.addEventListener('mouseup',e=>{
  if(e.button===0)mouseDown=false;
  if(e.button===2){mouseRight=false;handleRightClick(false);}
});
document.addEventListener('pointerlockchange',()=>{pointerLocked=document.pointerLockElement===C;});
document.addEventListener('contextmenu',e=>e.preventDefault());

function handleRightClick(down){
  const w=getWeapon();if(!w)return;
  if(!down){player.scoped=false;player.deflecting=false;player.currentFOV=FOV;return;}
  if(w.sniperScope){player.scoped=true;player.currentFOV=FOV/5;}
  else if(w.katana||w.deflectStance){player.deflecting=true;}
  else if(w.name==='Assault Rifle'||w.name==='Plasma Rifle'){player.scoped=true;player.currentFOV=FOV*0.6;}// ADS
}

let pauseBGMState=false; // paused declared above
function togglePause(){
  if(gameState!=='playing'&&!paused)return;
  if(paused){
    // Unpause with countdown
    document.exitPointerLock&&document.exitPointerLock();
    startUnpauseCountdown();
  }else{
    paused=true;gameState='paused';
    pauseBGM();
    document.exitPointerLock&&document.exitPointerLock();
  }
}
function startUnpauseCountdown(){
  unpausing=true;unpauseTimer=3;
  const el=document.getElementById('unpause-countdown');
  el.style.display='block';el.textContent='3';
  let count=3;
  const tick=setInterval(()=>{
    count--;
    if(count<=0){
      clearInterval(tick);el.style.display='none';unpausing=false;
      paused=false;gameState='playing';
      if(!isTouchDevice)C.requestPointerLock();
      startBGM(!!activeBoss);
    }else{el.textContent=count;}
  },1000);
}

// ── MOBILE CONTROLS ──
const isTouchDevice=('ontouchstart' in window)||navigator.maxTouchPoints>0;
let joystickDx=0,joystickDy=0,moveTouchId=null,aimTouchId=null,mobileAiming=false,aimAngle=0;
const moveJoystick=document.getElementById('move-joystick'),moveThumb=document.getElementById('move-thumb');
const aimJoystick=document.getElementById('aim-joystick'),aimThumb=document.getElementById('aim-thumb');
const aimLineCanvas=document.getElementById('aim-line');
function getJoystickCenter(el){const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2,maxR:r.width/2};}
function clampJoystick(dx,dy,maxR){const d=Math.sqrt(dx*dx+dy*dy);if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR;}return{dx,dy,norm:Math.min(d/maxR,1)};}
moveJoystick.addEventListener('touchstart',e=>{e.preventDefault();if(moveTouchId!==null)return;const t=e.changedTouches[0];moveTouchId=t.identifier;updateMoveJoystick(t);},{passive:false});
moveJoystick.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===moveTouchId){updateMoveJoystick(t);break;}}},{passive:false});
['touchend','touchcancel'].forEach(ev=>moveJoystick.addEventListener(ev,e=>{for(const t of e.changedTouches){if(t.identifier===moveTouchId){moveTouchId=null;joystickDx=0;joystickDy=0;moveThumb.style.transform='translate(-50%,-50%)';break;}}}));
function updateMoveJoystick(touch){const c=getJoystickCenter(moveJoystick),dx=touch.clientX-c.x,dy=touch.clientY-c.y,cl=clampJoystick(dx,dy,c.maxR);moveThumb.style.transform=`translate(${cl.dx-22}px,${cl.dy-22}px)`;joystickDx=cl.dx/c.maxR;joystickDy=cl.dy/c.maxR;}
aimJoystick.addEventListener('touchstart',e=>{e.preventDefault();if(aimTouchId!==null)return;const t=e.changedTouches[0];aimTouchId=t.identifier;mobileAiming=true;mouseDown=true;updateAimJoystick(t);},{passive:false});
aimJoystick.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===aimTouchId){updateAimJoystick(t);break;}}},{passive:false});
['touchend','touchcancel'].forEach(ev=>aimJoystick.addEventListener(ev,e=>{for(const t of e.changedTouches){if(t.identifier===aimTouchId){aimTouchId=null;mobileAiming=false;mouseDown=false;aimThumb.style.transform='translate(-50%,-50%)';aimLineCanvas.style.display='none';break;}}}));
function updateAimJoystick(touch){const c=getJoystickCenter(aimJoystick),dx=touch.clientX-c.x,dy=touch.clientY-c.y,cl=clampJoystick(dx,dy,c.maxR);aimThumb.style.transform=`translate(${cl.dx-22}px,${cl.dy-22}px)`;if(cl.norm>0.15){aimAngle=Math.atan2(cl.dy,cl.dx);player.angle=aimAngle;drawAimLine(c.x,c.y,aimAngle);}}
function drawAimLine(cx,cy,angle){aimLineCanvas.width=W;aimLineCanvas.height=H;aimLineCanvas.style.display='block';aimLineCanvas.style.position='fixed';aimLineCanvas.style.top='0';aimLineCanvas.style.left='0';aimLineCanvas.style.width='100%';aimLineCanvas.style.height='100%';const alCtx=aimLineCanvas.getContext('2d');alCtx.clearRect(0,0,W,H);alCtx.beginPath();alCtx.moveTo(cx,cy);alCtx.lineTo(cx+Math.cos(angle)*100,cy+Math.sin(angle)*100);alCtx.strokeStyle='rgba(255,80,80,0.5)';alCtx.lineWidth=2;alCtx.setLineDash([6,4]);alCtx.stroke();}
document.getElementById('mobile-skill-btn').addEventListener('touchstart',e=>{e.preventDefault();useSkill();},{passive:false});
document.getElementById('mobile-ult-btn').addEventListener('touchstart',e=>{e.preventDefault();useUltimate();},{passive:false});
document.getElementById('mobile-inv-btn').addEventListener('touchstart',e=>{e.preventDefault();if(gameState==='playing'||gameState==='inventory')toggleInventory();},{passive:false});
if(isTouchDevice)C.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

function updateMobileButtons(){
  if(!isTouchDevice)return;
  const skillBtn=document.getElementById('mobile-skill-btn'),ultBtn=document.getElementById('mobile-ult-btn');
  const cdOverlay=skillBtn.querySelector('.cd-overlay');
  if(player.skillCooldown>0){const pct=player.skillCooldown/player.skillMaxCooldown;cdOverlay.style.display='block';cdOverlay.style.clipPath=`inset(${(1-pct)*100}% 0 0 0)`;}else{cdOverlay.style.display='none';}
  const skNames=['FAN','FIRE','DASH','SLAM','HEAL','RIP','CHAIN','PHASE','LANCE','RUSH','WAVE','GHOST','NAPL','HOLY'];
  skillBtn.querySelector('.sk-icon').textContent=skNames[player.character]||'Q';
  if(player.ultCooldown<=0){ultBtn.classList.add('charged');ultBtn.classList.remove('grayed');ultBtn.querySelector('span').textContent='ULT';}
  else{ultBtn.classList.remove('charged');ultBtn.classList.add('grayed');ultBtn.querySelector('span').textContent=Math.ceil(player.ultCooldown/1000)+'s';}
}

// ── UTILITIES ──
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function rand(mn,mx){return Math.random()*(mx-mn)+mn;}
function randInt(mn,mx){return Math.floor(rand(mn,mx+1));}
function isWall(x,y){return x<0||y<0||x>=MAP_W||y>=MAP_H||MAP[Math.floor(y)][Math.floor(x)]!==0;}
function canSee(x1,y1,x2,y2){const d=Math.sqrt((x2-x1)**2+(y2-y1)**2),steps=Math.ceil(d*4);for(let i=0;i<=steps;i++){const t=i/steps;if(isWall(lerp(x1,x2,t),lerp(y1,y2,t)))return false;}return true;}
function findSpawnPoint(){for(let a=0;a<100;a++){const x=rand(2,MAP_W-2),y=rand(2,MAP_H-2);if(!isWall(x,y)&&dist({x,y},player)>8)return{x,y};}return{x:3,y:3};}

// ── GAME START ──
function selectChar(idx){
  player.character=idx;
  player.weapons=[{...WEAPON_TYPES[0],tier:1,kills:0}];
  player.weaponIndex=0;
  player.maxHp=Math.floor(120*diffSettings.playerHpMult);
  player.hp=player.maxHp;
  document.getElementById('title-screen').style.display='none';
  gameState='playing';
  if(!isTouchDevice)C.requestPointerLock();
  initAudio();startBGM(false);
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function getEmblemLevel(name){return player.emblems[name]||0;}
function getWeapon(){return player.weapons[player.weaponIndex];}
function getTierClass(tier){
  if(tier==='u')return'tier-u';
  if(tier===3)return'tier-3';
  if(tier==='2+')return'tier-2p';
  if(tier===2)return'tier-2';
  if(tier==='1+')return'tier-1p';
  return'tier-1';
}
function tierLabel(tier){return tier==='u'?'UNIQUE':tier===3?'Tier 3 ★★★':tier==='2+'?'Tier 2+':tier===2?'Tier 2':tier==='1+'?'Tier 1+':'Tier 1';}

// ── ABILITY ANNOUNCE ──
function announceAbility(text,color){
  const el=document.getElementById('ability-announce');
  el.textContent=text;el.style.color=color||'#fff';el.style.textShadow=`0 0 20px ${color||'#fff'}`;
  el.style.opacity='1';
  clearTimeout(el._timer);el._timer=setTimeout(()=>{el.style.opacity='0';},1500);
}

// ── COMBAT ──
function calcDamage(baseDmg,isCrit){
  let dmg=baseDmg+player.atk*(1+player.allStatsBuff);
  dmg*=(1+player.weaponDmgBuff);
  dmg*=player.allDmgMult;
  if(player.dragonRage&&player.hp<player.maxHp*0.3)dmg*=1.5;
  if(player.bloodRage&&player.hp<player.maxHp*0.5)dmg*=1.3;
  if(player.bloodFrenzyTimer>0)dmg*=1.1;
  if(player.dragonFormTimer>0)dmg*=2;
  if(player.soulHarvestStacks>0&&player.soulHarvestTimer>0)dmg*=(1+player.soulHarvestStacks*0.02);
  if(player.nextDmgMult>1){dmg*=player.nextDmgMult;player.nextDmgMult=1;}
  if(isCrit)dmg*=player.critMult;
  // Ability card bonuses
  if(playerAbilityCards['Berserker Rage']!==undefined&&player.hp<player.maxHp*0.5)dmg*=1.4+playerAbilityCards['Berserker Rage']*0.1;
  if(playerAbilityCards['Arcane Power']!==undefined)dmg*=1.25+playerAbilityCards['Arcane Power']*0.25;
  return Math.floor(dmg);
}

function startReload(){
  const w=getWeapon();if(!w||w.ammo===Infinity||player.reloading)return;
  const reloadTimes={Pistol:1000,Shotgun:1800,Sniper:2500,'Assault Rifle':2000,'Machine Gun':2800,'Rocket Launcher':2200,'Grenade Launcher':2000,'Crossbow':1500,'Plasma Rifle':1800,'Ice Bow':1600,'Storm Bow':2000,'Void Cannon':2200,'Holy Javelin':1400};
  player.reloading=true;
  player.reloadDuration=(reloadTimes[w.name]||1500)/player.atkSpdMult;
  player.reloadTimer=player.reloadDuration;
  playSound('reload');
}

function playerShoot(){
  const w=getWeapon();if(!w)return;
  if(player.reloading)return;
  if(player.fireTimer>0)return;
  if(w.ammo!==Infinity&&w.ammo<=0){startReload();return;}
  player.fireTimer=Math.floor(w.fireRate/player.atkSpdMult);
  player.muzzleFlash=100;
  player.bobPhase+=0.5;
  if(w.ammo!==Infinity)w.ammo--;
  // Track weapon kills for tier upgrade
  if(!w.kills)w.kills=0;

  let soundPitch=w.fireRate<200?1200:w.fireRate<600?800:500;
  if(w.flamethrower)soundPitch=400;
  if(w.name==='Energy Blade'||w.name==='Katana')soundPitch=1800;
  if(w.name==='Battle Axe')soundPitch=200;
  playSound('shoot',{pitch:soundPitch});

  // Katana deflect stance
  if(w.katana&&player.deflecting){
    // reflect incoming projectiles
    for(let i=projectiles.length-1;i>=0;i--){
      const p=projectiles[i];if(p.friendly)continue;
      if(dist(p,player)<3){p.friendly=true;p.dx*=-1.5;p.dy*=-1.5;p.damage*=2;projectiles[i]=p;}
    }
    announceAbility('DEFLECT!','#cdf');
    return;
  }

  for(let p=0;p<(w.projCount||1);p++){
    const spread=(Math.random()-0.5)*(w.spread||0)*2*(player.scoped?0.2:1);
    const angle=player.angle+spread;
    castPlayerRay(angle,w,w.highCrit||0);
  }
  // Wind crescent echo
  if(player.windCrescentEcho)spawnCrescentEcho(player.x,player.y,player.angle);
  // Wind shockwave
  if(player.windShockwave){
    const cos=Math.cos(player.angle),sin=Math.sin(player.angle);
    for(const e of enemies){
      if(e.hp<=0)continue;const d=dist(e,player);
      if(d<6*player.windShockwaveSize&&d>2){const ex=e.x-player.x,ey=e.y-player.y,dot=(ex*cos+ey*sin)/d;
      if(dot>0.5){const sd=Math.floor((10+player.atk*0.3)*player.allDmgMult*player.windShockwaveSize);damageEnemy(e,sd,false);addDmgNum(e.x,e.y,sd,false);}}
    }
  }
  // Auto reload when empty
  if(w.ammo!==Infinity&&w.ammo<=0)startReload();
}

function castPlayerRay(angle,w,critBonus){
  const cos=Math.cos(angle),sin=Math.sin(angle);
  let bestDist=w.range||MAX_DEPTH,hitEnemy=null,pierceHits=[];
  // Throwing knife bounce (tracked as projectile)
  if(w.bounces>0){
    projectiles.push({x:player.x,y:player.y,dx:cos*0.12,dy:sin*0.12,life:4000,damage:Math.floor(calcDamage(w.damage,false)),friendly:true,color:w.color||'#777',size:2,bounces:w.bounces,bouncesLeft:w.bounces});
    return;
  }
  for(const e of enemies){
    if(e.hp<=0)continue;
    const dx=e.x-player.x,dy=e.y-player.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d>bestDist+2)continue;
    let angleDiff=Math.atan2(dy,dx)-angle;
    while(angleDiff>Math.PI)angleDiff-=Math.PI*2;while(angleDiff<-Math.PI)angleDiff+=Math.PI*2;
    const hitWidth=(e.size||0.4)/d;
    if(Math.abs(angleDiff)<hitWidth&&canSee(player.x,player.y,e.x,e.y)){
      if(w.pierce){pierceHits.push({enemy:e,dist:d});}
      else if(d<bestDist){bestDist=d;hitEnemy=e;}
    }
  }
  if(w.pierce&&pierceHits.length>0){
    pierceHits.sort((a,b)=>a.dist-b.dist);
    for(const ph of pierceHits){
      const isCrit=Math.random()*100<(player.crit+(critBonus||0))*(1+player.allStatsBuff);
      let dmg=calcDamage(w.damage,isCrit);
      const isHS=checkHeadshot(ph.dist,ph.enemy.size);
      if(isHS){dmg=Math.floor(dmg*2);playSound('headshot');player.headshotFlash=50;addDmgNum(ph.enemy.x,ph.enemy.y-0.3,0,false,'HEADSHOT!');}
      damageEnemy(ph.enemy,dmg,isCrit);addDmgNum(ph.enemy.x,ph.enemy.y,dmg,isCrit);
      applyOnHitEffects(ph.enemy,w,dmg,isCrit);
    }return;
  }
  if(hitEnemy){
    const isCrit=Math.random()*100<(player.crit+(critBonus||0))*(1+player.allStatsBuff);
    let dmg=calcDamage(w.damage,isCrit);
    const isHS=checkHeadshot(bestDist,hitEnemy.size);
    if(isHS){dmg=Math.floor(dmg*2);playSound('headshot');player.headshotFlash=50;addDmgNum(hitEnemy.x,hitEnemy.y-0.3,0,false,'HEADSHOT!');}
    if(player.executeThreshold>0&&hitEnemy.hp/hitEnemy.maxHp<player.executeThreshold)dmg=hitEnemy.hp+1;
    if(player.assassinate&&isCrit&&hitEnemy.hp/hitEnemy.maxHp<0.3)dmg=hitEnemy.hp+1;
    if(w.execute&&hitEnemy.hp/hitEnemy.maxHp<w.execute)dmg=hitEnemy.hp+1;
    damageEnemy(hitEnemy,dmg,isCrit,isHS);addDmgNum(hitEnemy.x,hitEnemy.y,dmg,isCrit);
    applyOnHitEffects(hitEnemy,w,dmg,isCrit);
  }
}

function checkHeadshot(dist,size){
  const spriteH=(size||0.4)/dist;
  const hitFrac=0.5+player.pitch/(spriteH*1.5+0.01);
  return hitFrac<0.25;
}

function applyOnHitEffects(hitEnemy,w,dmg,isCrit){
  // AoE
  if(w.aoe>0){for(const e2 of enemies){if(e2!==hitEnemy&&e2.hp>0&&dist(e2,hitEnemy)<w.aoe){damageEnemy(e2,Math.floor(dmg*0.6),false);}}player.screenShake=8;spawnExplosion(hitEnemy.x,hitEnemy.y,'#ff8800');playSound('explosion');}
  // Cleave
  if(w.cleave){for(const e2 of enemies){if(e2!==hitEnemy&&e2.hp>0&&(dist(e2,hitEnemy)<(w.aoe||3)||dist(e2,player)<4.5)){damageEnemy(e2,Math.floor(dmg*0.7),false);addDmgNum(e2.x,e2.y,Math.floor(dmg*0.7),false);}}player.screenShake=8;}
  // Scythe lifesteal
  if(w.scytheLifesteal)player.hp=Math.min(player.maxHp,player.hp+Math.floor(dmg*w.scytheLifesteal));
  // Burn
  if(w.burn||player.burnChance>0){if(w.burn||Math.random()<player.burnChance){hitEnemy.burning=true;hitEnemy.burnTimer=3000;hitEnemy.burnDmg=Math.floor(dmg*0.1*player.burnDmgMult);if(player.burnInfiniteStack){if(!hitEnemy.burnStacks)hitEnemy.burnStacks=0;hitEnemy.burnStacks++;}}}
  // Freeze
  if(w.freeze){hitEnemy.frozen=true;hitEnemy.freezeTimer=1800;}
  // Entangle
  if(w.entangle){hitEnemy.slowed=true;hitEnemy.slowTimer=3000;}
  // Chain lightning
  if(w.chainLightning||player.chainChance>0){
    const targets=w.chainCount||3;
    if(w.chainLightning||Math.random()<player.chainChance)chainLightning(hitEnemy,dmg*0.45,targets+(player.chainTargets||0));
  }
  // Wither
  if(w.wither||(player.witherChance>0&&Math.random()<player.witherChance)){if(!hitEnemy.witherStacks)hitEnemy.witherStacks=0;if(hitEnemy.witherStacks<(player.witherMaxStacks||3))hitEnemy.witherStacks++;hitEnemy.withering=true;hitEnemy.witherTimer=5000;hitEnemy.witherDmg=player.dotDamage+3;}
  // Poison
  if(w.poison){hitEnemy.poisoned=true;hitEnemy.poisonTimer=4000;hitEnemy.poisonDmg=Math.floor(dmg*0.15);}
  // Chaos weapon
  if(w.chaosWeapon){const cd=Math.floor(dmg*(0.5+Math.random()*1.5));damageEnemy(hitEnemy,cd,false);addDmgNum(hitEnemy.x,hitEnemy.y-0.2,cd,true,'CHAOS!');}
  // Knockback (Shotgun)
  if(w.knockback){const dx=hitEnemy.x-player.x,dy=hitEnemy.y-player.y,d=Math.sqrt(dx*dx+dy*dy)||1;const nx=hitEnemy.x+(dx/d)*w.knockback,ny=hitEnemy.y+(dy/d)*w.knockback;if(!isWall(nx,ny)){hitEnemy.x=nx;hitEnemy.y=ny;}}
  // Energy blade wave
  if(w.energyBlade){for(const e2 of enemies){if(e2!==hitEnemy&&e2.hp>0&&dist(e2,hitEnemy)<2.5){damageEnemy(e2,Math.floor(dmg*0.4),false);}}spawnExplosion(hitEnemy.x,hitEnemy.y,'#4ff');}
  // Chain whip
  if(w.chainOnHit)chainLightning(hitEnemy,dmg*0.5,2);
  // Blood moon
  if(player.bloodMoon&&!player._bloodMoonActive){}
  // Holy blind
  if(player.holyBlind&&Math.random()<0.12){hitEnemy.blinded=true;hitEnemy.blindTimer=2000;}
  // Slow
  if(player.slowChance>0&&Math.random()<player.slowChance){hitEnemy.slowed=true;hitEnemy.slowTimer=2500;}
  // Stun
  if(player.stunChance>0&&Math.random()<player.stunChance){hitEnemy.stunned=true;hitEnemy.stunTimer=1200;}
  // Mark of death
  if(player.markOfDeath&&isCrit){hitEnemy.marked=true;hitEnemy.markTimer=5000;}
  // Chaos
  if(player.chaosChance>0&&Math.random()<player.chaosChance){const cd=Math.floor(dmg*(0.5+Math.random()*1.5));damageEnemy(hitEnemy,cd,false);addDmgNum(hitEnemy.x,hitEnemy.y-0.2,cd,false,'CHAOS!');player.screenShake=4;}
  // Arcane overload
  if(player.arcaneOverload&&isCrit){for(const e2 of enemies){if(e2!==hitEnemy&&e2.hp>0&&dist(e2,hitEnemy)<3){const ad=Math.floor((20+player.abilityPower*0.5)*player.allDmgMult);damageEnemy(e2,ad,false);}};spawnExplosion(hitEnemy.x,hitEnemy.y,'#c4f');}
  // Crit reset skill
  if(player.critResetSkill&&isCrit)player.skillCooldown=0;
  // Lifesteal
  const ls=player.lifesteal+player.globalLifesteal+player.bloodLifesteal+(isCrit?player.shadowLifesteal:0);
  if(ls>0)player.hp=Math.min(player.maxHp,player.hp+Math.floor(dmg*ls));
  // Cleave dmg (emblem)
  if(player.cleaveDmg){for(const e2 of enemies){if(e2!==hitEnemy&&e2.hp>0&&dist(e2,hitEnemy)<2.2){damageEnemy(e2,Math.floor(dmg*0.4),false);}}}
  // Blade storm
  if(player.bladeStormCounter!==undefined){player.bladeStormCounter++;if(player.bladeStormCounter>=5){player.bladeStormCounter=0;for(const e2 of enemies){if(e2.hp>0&&dist(e2,player)<5.5)damageEnemy(e2,Math.floor(dmg*0.5),false);}}}
  // Death mark bonus
  if(player.deathMark&&hitEnemy.withering){const bd=Math.floor(dmg*0.3);damageEnemy(hitEnemy,bd,false);addDmgNum(hitEnemy.x,hitEnemy.y,bd,false);}
  // Fury card
  if(playerAbilityCards['Feather Storm']!==undefined&&isCrit){for(let i=0;i<3+playerAbilityCards['Feather Storm'];i++){const a=player.angle+(Math.random()-0.5)*1;projectiles.push({x:player.x,y:player.y,dx:Math.cos(a)*0.18,dy:Math.sin(a)*0.18,life:800,damage:Math.floor(player.atk*0.5),friendly:true,color:'#4488ff',size:2});}}
}

function damageEnemy(e,dmg,isCrit){
  if(e.hp<=0)return;
  if(e.marked)dmg=Math.floor(dmg*1.25);
  if(e.burning)dmg=Math.floor(dmg*1.2);
  if(e.frozen)dmg=Math.floor(dmg*1.3*(1+player.frozenBonusDmg));
  if(e.withering)dmg=Math.floor(dmg*(1+(e.witherStacks||0)*0.08));
  if(e.blinded)dmg=Math.floor(dmg*1.15);
  e.hp-=dmg;e.hitFlash=100;
  playSound('hit');
  if(e.hp<=0)onEnemyKill(e);
}

function addDmgNum(x,y,dmg,isCrit,customText){
  damageNumbers.push({x,y,dmg,isCrit,life:900,customText:customText||null});
}

function spawnExplosion(x,y,color){
  for(let i=0;i<14;i++)particles.push({x,y,dx:rand(-0.035,0.035),dy:rand(-0.035,0.035),life:450,color,size:rand(3,9)});
}

function chainLightning(source,dmg,targets){
  let last=source,hit=new Set([enemies.indexOf(source)]);
  for(let i=0;i<targets;i++){
    let closest=null,cd=5.5;
    for(let j=0;j<enemies.length;j++){if(hit.has(j)||enemies[j].hp<=0)continue;const d=dist(enemies[j],last);if(d<cd){cd=d;closest=j;}}
    if(closest!==null){hit.add(closest);damageEnemy(enemies[closest],Math.floor(dmg),false);addDmgNum(enemies[closest].x,enemies[closest].y,Math.floor(dmg),false);last=enemies[closest];}
  }
}

function onEnemyKill(e){
  totalKills++;player.kills++;
  if(e.isBoss)playSound('bossDeath');else playSound('enemyDeath');
  // Kill streak
  if(player.killStreakTimer>0)player.killStreakCount++;else player.killStreakCount=1;
  player.killStreakTimer=3000;
  const sn={2:'DOUBLE KILL',3:'TRIPLE KILL',4:'RAMPAGE',5:'UNSTOPPABLE'};
  if(player.killStreakCount>=2){player.killStreakText=sn[Math.min(player.killStreakCount,5)]||'UNSTOPPABLE';player.killStreakTextTimer=1500;}
  let xpGain=e.xp||5;
  if(player.doubleXPTimer>0)xpGain*=2;
  xpGain=Math.floor(xpGain*diffSettings.xpMult);
  player.xp+=xpGain;
  if(player.killStackMult>0)player.killStackTimer=15000;
  if(player.healOnKill>0)player.hp=Math.min(player.maxHp,player.hp+Math.floor(player.maxHp*player.healOnKill));
  if(player.soulHarvest){player.soulHarvestStacks++;player.soulHarvestTimer=10000;}
  if(player.soulReaper&&e.withering){player.hp=player.maxHp;spawnExplosion(e.x,e.y,'#8a2');}
  // Katana kill explosion
  const cw=getWeapon();
  if(cw&&(cw.katana||cw.name==='Katana')){for(const e2 of enemies){if(e2!==e&&e2.hp>0&&dist(e2,e)<2.8){damageEnemy(e2,Math.floor(player.atk*1.5*player.allDmgMult),false);}}spawnExplosion(e.x,e.y,'#cdf');player.screenShake=5;}
  if(player.chainOnKill)chainLightning(e,25,5);
  // Burn kill explosion
  if(e.burning&&(player.emblems['Fire']||0)>=8){for(const e2 of enemies){if(e2!==e&&e2.hp>0&&dist(e2,e)<3.2){damageEnemy(e2,Math.floor((e.burnDmg||3)*2),false);if(player.burnSpread){e2.burning=true;e2.burnTimer=3000;e2.burnDmg=e.burnDmg;}}}spawnExplosion(e.x,e.y,'#ff4400');}
  // Shatter
  if(e.frozen&&player.shatterExplosion){for(const e2 of enemies){if(e2!==e&&e2.hp>0&&dist(e2,e)<3.2)damageEnemy(e2,30,false);}spawnExplosion(e.x,e.y,'#44ccff');}
  // Weapon drop (15% chance)
  if(Math.random()<0.15&&e.weaponDrop!==undefined){
    const wt={...WEAPON_TYPES[Math.min(e.weaponDrop,WEAPON_TYPES.length-1)],kills:0};
    player.weapons.push(wt);playSound('pickupWeapon');addDmgNum(e.x,e.y,0,false,'NEW: '+wt.name);
  }
  // Health orb (22%)
  if(Math.random()<0.22)pickups.push({x:e.x,y:e.y,type:'health',timer:15000});
  if(player.natureBloom)player.hp=Math.min(player.maxHp,player.hp+Math.floor(player.maxHp*0.03));
  if(player.bloodFrenzy)player.bloodFrenzyTimer=5000;
  if(player.bloodPool)player.hp=Math.min(player.maxHp,player.hp+Math.floor(player.maxHp*0.02));
  if(player.bloodFeast&&e.hp<-10)player.hp=Math.min(player.maxHp,player.hp+Math.abs(e.hp));
  if(player.chaosExplosion&&Math.random()<0.3){for(const e2 of enemies){if(e2!==e&&e2.hp>0&&dist(e2,e)<4.5){const cd=Math.floor((30+player.atk)*player.allDmgMult);damageEnemy(e2,cd,false);}}spawnExplosion(e.x,e.y,'#f44');player.screenShake=8;}
  if(player.chaosMutate){const stats=['atk','def','crit','maxHp'];const s=stats[Math.floor(Math.random()*4)];if(s==='atk')player.atk+=1;else if(s==='def')player.def+=0.5;else if(s==='crit')player.crit+=0.3;else{player.maxHp+=3;player.hp+=3;}}
  // Weapon tier progression from kills
  if(cw&&!cw.tier_u){if(!cw.kills)cw.kills=0;cw.kills++;const upgrade={1:50,'1+':120,2:250,'2+':500};const next={'1':'1+','1+':2,2:'2+','2+':3};if(cw.tier!=='u'&&upgrade[cw.tier]&&cw.kills>=upgrade[cw.tier]){addDmgNum(player.x,player.y,0,false,'WEAPON EVOLVED!');const nt=next[cw.tier];if(nt){cw.tier=nt;cw.damage=Math.floor(cw.damage*1.2);}}}
  // Death particles
  for(let i=0;i<8;i++)particles.push({x:e.x,y:e.y,dx:rand(-0.025,0.025),dy:rand(-0.025,0.025),life:600,color:e.color||'#f00',size:rand(2,6)});
  // Blood emblem visual: bats fly from enemy to player
  if(player.bloodLifesteal>0||player.bloodLord){
    const healAmt=Math.floor((e.maxHp||50)*0.05*player.bloodLifesteal);
    if(healAmt>0){player.hp=Math.min(player.maxHp,player.hp+healAmt);for(let i=0;i<3;i++){const t=i/3;particles.push({x:lerp(e.x,player.x,t),y:lerp(e.y,player.y,t),dx:0,dy:0,life:300,color:'#c22',size:4});}}
  }
  // XP level up check
  while(player.xp>=player.xpNeeded){
    player.xp-=player.xpNeeded;player.level++;player.xpNeeded=10+player.level*5;
    player.atk+=2;player.def+=1;player.maxHp+=5;player.hp=player.maxHp;
    player.screenShake=7;
    for(let i=0;i<16;i++){const a=(Math.PI*2/16)*i;particles.push({x:player.x+Math.cos(a)*0.6,y:player.y+Math.sin(a)*0.6,dx:Math.cos(a)*0.03,dy:Math.sin(a)*0.03,life:900,color:['#ffd700','#ff44ff','#44ffff','#ff4444'][i%4],size:rand(3,8)});}
    playSound('levelUp');
    showEmblemSelect();
  }
}

// ── ENEMY AI ──
function updateEnemy(e,dt){
  if(e.hp<=0)return;
  if(e.stunned){e.stunTimer-=dt;if(e.stunTimer<=0)e.stunned=false;return;}
  const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy);
  if(player.invisible)return;
  let speed=e.speed*(e.slowed?0.35:1)*(e.frozen?0:1);

  // Boss-specific behaviors
  if(e.isBoss&&e.bossAbils){
    for(const abil of e.bossAbils){runBossAbility(e,abil,dt,d);}
  }

  // Movement
  if(d>(e.range||3)*0.6&&speed>0){
    let mx=dx/d*speed,my=dy/d*speed;
    if(!isWall(e.x+mx*5,e.y))e.x+=mx;else if(!isWall(e.x,e.y+my*5))e.y+=my;
    if(!isWall(e.x,e.y+my*5))e.y+=my;else if(!isWall(e.x+mx*5,e.y))e.x+=mx;
  }

  // Shooting
  if(!e.fireTimer)e.fireTimer=0;
  e.fireTimer-=dt;
  if(e.fireTimer<=0&&d<(e.range||8)&&canSee(e.x,e.y,player.x,player.y)){
    e.fireTimer=(e.fireRate||1500)*(0.8+Math.random()*0.4);
    enemyShoot(e,d);
  }

  // Status ticks
  if(e.burning){e.burnTimer-=dt;if(!e.burnTick)e.burnTick=0;e.burnTick-=dt;if(e.burnTick<=0){e.burnTick=500;let bd=e.burnDmg||3;if(e.burnStacks)bd*=e.burnStacks;e.hp-=bd;addDmgNum(e.x,e.y,bd,false);if(e.hp<=0)onEnemyKill(e);}if(e.burnTimer<=0&&!player.burnInfiniteStack){e.burning=false;e.burnStacks=0;}}
  if(e.poisoned){e.poisonTimer-=dt;if(!e.poisonTick)e.poisonTick=0;e.poisonTick-=dt;if(e.poisonTick<=0){e.poisonTick=500;e.hp-=(e.poisonDmg||3);if(e.hp<=0)onEnemyKill(e);}if(e.poisonTimer<=0)e.poisoned=false;}
  if(e.slowed){e.slowTimer-=dt;if(e.slowTimer<=0)e.slowed=false;}
  if(e.frozen){e.freezeTimer-=dt;if(e.freezeTimer<=0)e.frozen=false;}
  if(e.marked){e.markTimer-=dt;if(e.markTimer<=0)e.marked=false;}
  if(e.withering){e.witherTimer-=dt;if(!e.witherTick)e.witherTick=0;e.witherTick-=dt;if(e.witherTick<=0){e.witherTick=500;const wd=(e.witherDmg||3)*(e.witherStacks||1);e.hp-=wd;addDmgNum(e.x,e.y,wd,false);if(e.hp<=0)onEnemyKill(e);}if(e.witherTimer<=0){e.withering=false;e.witherStacks=0;}}
  if(e.blinded){e.blindTimer-=dt;if(e.blindTimer<=0)e.blinded=false;}
  if(e.hitFlash>0)e.hitFlash-=dt;
}

function runBossAbility(e,abil,dt,d){
  if(!e._abilTimers)e._abilTimers={};
  if(!e._abilTimers[abil])e._abilTimers[abil]=rand(2000,5000);
  e._abilTimers[abil]-=dt;
  if(e._abilTimers[abil]>0)return;
  const baseCd={teleport:2500,teleportBehind:4000,cloneDecoys:8000,cloneArmy:12000,groundSlam:5000,shockwave:4000,chainLightning:3000,groundSlamShock:6000,poisonSpray:4000,summonSnakes:10000,summonPest:10000,summonSkeletons:10000,fireBreath:4000,flyBomb:8000,iceShardVolley:4000,freezeNova:7000,gravityPull:6000,voidSiphon:5000,deathBeam:8000,lifestealAura:1000,healAura:2000,bloodNova:5000,chaosBlast:6000,randomBuff:12000,meteorSmash:8000,lavaBurst:5000,arcaneNova:5000,missileSalvo:7000,lightningStorm:6000,vineEntangle:5000,rebirthHeal:20000};
  e._abilTimers[abil]=(baseCd[abil]||5000)*(0.8+Math.random()*0.4);

  switch(abil){
    case 'teleport':{const a=Math.random()*Math.PI*2,nd=3+Math.random()*4;const nx=player.x+Math.cos(a)*nd,ny=player.y+Math.sin(a)*nd;if(!isWall(nx,ny)){e.x=nx;e.y=ny;}for(let i=0;i<6;i++)particles.push({x:e.x,y:e.y,dx:rand(-0.02,0.02),dy:rand(-0.02,0.02),life:600,color:e.color,size:3});break;}
    case 'teleportBehind':{const a=player.angle+Math.PI+rand(-0.5,0.5);const nx=player.x+Math.cos(a)*2.5,ny=player.y+Math.sin(a)*2.5;if(!isWall(nx,ny)){e.x=nx;e.y=ny;}break;}
    case 'cloneDecoys':case 'cloneArmy':{const count=abil==='cloneArmy'?6:3;for(let i=0;i<count;i++){const sa=Math.random()*Math.PI*2,sx=e.x+Math.cos(sa)*2,sy=e.y+Math.sin(sa)*2;if(!isWall(sx,sy)){const clone={x:sx,y:sy,hp:50*difficultyMult,maxHp:50*difficultyMult,speed:e.speed*1.2,damage:Math.floor(e.damage*0.4),fireRate:e.fireRate,range:e.range,color:e.color,size:e.size*0.6,name:'Clone',hitFlash:0,fireTimer:e.fireRate,xp:5};enemies.push(clone);}}break;}
    case 'groundSlam':{if(d<6){let dmg=Math.floor(e.damage*0.9*difficultyMult);dmg=Math.max(1,dmg-player.def*0.3);takeDmg(dmg,300);player.screenShake=16;spawnExplosion(e.x,e.y,e.color);}break;}
    case 'shockwave':{for(const en of enemies){if(en!==e&&en.hp>0&&dist(en,e)<5){en.stunned=true;en.stunTimer=1500;}}if(d<5){takeDmg(Math.floor(e.damage*0.7*difficultyMult),200);}spawnExplosion(e.x,e.y,'#4af');break;}
    case 'chainLightning':{if(canSee(e.x,e.y,player.x,player.y)){const ldmg=Math.floor(e.damage*0.7*difficultyMult);takeDmg(Math.max(1,ldmg-player.def*0.3),200);for(let i=0;i<8;i++)particles.push({x:lerp(e.x,player.x,i/8),y:lerp(e.y,player.y,i/8),dx:0,dy:0,life:500,color:'#4af',size:3});}break;}
    case 'groundSlamShock':{if(d<6)takeDmg(Math.floor(e.damage*0.8*difficultyMult),300);player.screenShake=14;spawnExplosion(e.x,e.y,'#4af');break;}
    case 'poisonSpray':{if(d<e.range&&canSee(e.x,e.y,player.x,player.y)){takeDmg(Math.floor(e.damage*0.4*difficultyMult),150);if(!player.immuneToBurn){player.speedBuff-=0.2;setTimeout(()=>player.speedBuff+=0.2,3000);}}break;}
    case 'summonSnakes':case 'summonPest':case 'summonSkeletons':{for(let i=0;i<4;i++){const sa=Math.random()*Math.PI*2,sx=e.x+Math.cos(sa)*2,sy=e.y+Math.sin(sa)*2;if(!isWall(sx,sy)){const mn=abil==='summonSkeletons'?ENEMY_TYPES[7]:abil==='summonSnakes'?ENEMY_TYPES[17]:ENEMY_TYPES[0];const minion={x:sx,y:sy,hp:Math.floor(mn.hp*difficultyMult*0.6),maxHp:Math.floor(mn.hp*difficultyMult*0.6),speed:mn.speed*1.1,damage:Math.floor(mn.damage*difficultyMult),fireRate:mn.fireRate,range:mn.range,color:mn.color,size:mn.size,name:mn.name,hitFlash:0,fireTimer:mn.fireRate,xp:3};enemies.push(minion);}}break;}
    case 'fireBreath':{const bcos=Math.cos(e.angle||0),bsin=Math.sin(e.angle||0);if(d<8){let fdmg=Math.floor(e.damage*0.6*difficultyMult);fdmg=Math.max(1,fdmg-player.def*0.3);takeDmg(fdmg,200);if(!player.immuneToBurn){player.hp-=Math.floor(fdmg*0.3);}}for(let i=0;i<6;i++)particles.push({x:e.x+rand(-1,1),y:e.y+rand(-1,1),dx:rand(-0.04,0.04),dy:rand(-0.04,0.04),life:500,color:'#f60',size:rand(3,8)});break;}
    case 'flyBomb':{if(d<10){const fdmg=Math.floor(e.damage*1.2*difficultyMult);takeDmg(Math.max(1,fdmg-player.def*0.3),300);player.screenShake=15;spawnExplosion(e.x,e.y,'#f60');}break;}
    case 'iceShardVolley':{if(canSee(e.x,e.y,player.x,player.y)&&d<e.range){const ba=Math.atan2(player.y-e.y,player.x-e.x);for(let i=-2;i<=2;i++){const a=ba+i*0.15;projectiles.push({x:e.x,y:e.y,dx:Math.cos(a)*0.07,dy:Math.sin(a)*0.07,life:3000,damage:Math.floor(e.damage*0.5*difficultyMult),friendly:false,color:'#8ef',size:2,freezeOnHit:true});}}break;}
    case 'freezeNova':{if(d<4){takeDmg(Math.floor(e.damage*0.7*difficultyMult),300);player.speedBuff-=0.3;setTimeout(()=>player.speedBuff+=0.3,3500);}spawnExplosion(e.x,e.y,'#8ef');break;}
    case 'gravityPull':{if(d<12&&d>2){const pull=0.5;const pdx=(e.x-player.x)/d*pull,pdy=(e.y-player.y)/d*pull;if(!isWall(player.x+pdx*3,player.y+pdy*3)){player.x+=pdx*3;player.y+=pdy*3;}player.screenShake=6;}break;}
    case 'voidSiphon':{if(d<8&&canSee(e.x,e.y,player.x,player.y)){const sd=Math.floor(e.damage*0.4*difficultyMult);takeDmg(Math.max(1,sd-player.def*0.3),200);e.hp=Math.min(e.maxHp,e.hp+Math.floor(sd*0.3));for(let i=0;i<6;i++){const t=i/6;particles.push({x:lerp(player.x,e.x,t),y:lerp(player.y,e.y,t),dx:0,dy:0,life:400,color:'#a0f',size:3});}}break;}
    case 'deathBeam':{if(d<12&&canSee(e.x,e.y,player.x,player.y)){const bd=Math.floor(e.damage*1.5*difficultyMult);takeDmg(Math.max(1,bd-player.def*0.3),350);for(let i=0;i<8;i++){const t=i/8;particles.push({x:lerp(e.x,player.x,t),y:lerp(e.y,player.y,t),dx:0,dy:0,life:600,color:'#a4a',size:4});}}break;}
    case 'lifestealAura':{if(d<6){const la=Math.floor(e.damage*0.15*difficultyMult);if(la>0){e.hp=Math.min(e.maxHp,e.hp+la);takeDmg(Math.max(1,la-player.def*0.3),100);}}break;}
    case 'healAura':{const nearby=enemies.filter(en=>en!==e&&en.hp>0&&dist(en,e)<6);for(const en of nearby){en.hp=Math.min(en.maxHp,en.hp+Math.floor(en.maxHp*0.05));}break;}
    case 'bloodNova':{if(d<6){takeDmg(Math.floor(e.damage*0.8*difficultyMult),300);}spawnExplosion(e.x,e.y,'#c22');break;}
    case 'chaosBlast':{const cd=Math.floor(e.damage*(0.5+Math.random())*difficultyMult);if(d<10)takeDmg(Math.max(1,cd-player.def*0.3),250);for(let i=0;i<10;i++)particles.push({x:e.x+rand(-2,2),y:e.y+rand(-2,2),dx:rand(-0.04,0.04),dy:rand(-0.04,0.04),life:500,color:['#f44','#ff0','#0ff'][i%3],size:rand(3,8)});break;}
    case 'randomBuff':{e.speed*=1.3;e.damage=Math.floor(e.damage*1.3);setTimeout(()=>{e.speed/=1.3;e.damage=Math.floor(e.damage/1.3);},5000);break;}
    case 'meteorSmash':{player.screenShake=20;setTimeout(()=>{if(d<5)takeDmg(Math.floor(e.damage*2*difficultyMult),400);spawnExplosion(player.x,player.y,'#f80');},1000);break;}
    case 'lavaBurst':{if(d<5)takeDmg(Math.floor(e.damage*1.2*difficultyMult),300);for(let i=0;i<8;i++)particles.push({x:e.x+rand(-1,1),y:e.y+rand(-1,1),dx:rand(-0.04,0.04),dy:rand(-0.04,0.04),life:600,color:'#f80',size:rand(4,9)});break;}
    case 'arcaneNova':{for(const en of enemies){if(en!==e&&en.hp>0&&dist(en,e)<4){const ed=Math.floor(e.damage*0.3*difficultyMult);takeDmg(Math.max(0,ed-player.def*0.3),100);}}if(d<5)takeDmg(Math.floor(e.damage*0.6*difficultyMult),200);spawnExplosion(e.x,e.y,'#c4f');break;}
    case 'missileSalvo':{if(canSee(e.x,e.y,player.x,player.y)){const ba=Math.atan2(player.y-e.y,player.x-e.x);for(let i=0;i<5;i++){const a=ba+(i-2)*0.12;projectiles.push({x:e.x,y:e.y,dx:Math.cos(a)*0.08,dy:Math.sin(a)*0.08,life:3000,damage:Math.floor(e.damage*0.4*difficultyMult),friendly:false,color:'#c4f',size:2});}}break;}
    case 'lightningStorm':{for(let i=0;i<4;i++){setTimeout(()=>{if(d<12&&canSee(e.x,e.y,player.x,player.y)){takeDmg(Math.floor(e.damage*0.5*difficultyMult),150);}},i*300);}player.screenShake=10;break;}
    case 'vineEntangle':{if(d<8){player.speedBuff-=0.4;setTimeout(()=>player.speedBuff+=0.4,4000);}for(const en of enemies){if(en!==e&&en.hp>0&&dist(en,e)<6){en.hp=Math.min(en.maxHp,en.hp+Math.floor(en.maxHp*0.03));}}break;}
    case 'rebirthHeal':{if(e.hp<e.maxHp*0.3){e.hp=Math.min(e.maxHp,e.hp+Math.floor(e.maxHp*0.25));addDmgNum(e.x,e.y,0,false,'REBIRTH!');}break;}
  }
}

function takeDmg(dmg,vignetteTime){
  if(player.dashing)return;
  if(player.dodgeChance>0&&Math.random()<player.dodgeChance){if(player.emblems['Thunder']>=15){chainLightning(enemies.find(e=>e.hp>0&&dist(e,player)<8)||{x:player.x,y:player.y},dmg*2,3);}return;}
  if(player.deflectProjectiles&&player.moving)return;
  if(player.parryChance>0&&Math.random()<player.parryChance){if(player.parryReflect){const ne=enemies.find(e=>e.hp>0&&dist(e,player)<10);if(ne)damageEnemy(ne,dmg,false);}return;}
  if(player.voidPhase>0&&Math.random()<player.voidPhase){if(player.emblems['Void']>=9)chainLightning(enemies.find(e=>e.hp>0&&dist(e,player)<8)||{x:player.x,y:player.y},dmg,4);return;}
  if(player.arcaneBarrier&&player.arcaneBarrierHP>0){player.arcaneBarrierHP-=dmg;if(player.arcaneBarrierHP<0){dmg=-player.arcaneBarrierHP;player.arcaneBarrierHP=0;}else return;}
  dmg=Math.floor(dmg*(1-player.dmgReduction));dmg=Math.max(1,dmg-player.def*0.3);
  player.hp-=dmg;player.damageVignette=vignetteTime||300;player.screenShake=4;playSound('playerHurt');
  if(player.thornsDmg){const ne=enemies.find(e=>e.hp>0&&dist(e,player)<6);if(ne)damageEnemy(ne,Math.floor(dmg*0.3),false);}
  if(player.natureThorns){const ne=enemies.find(e=>e.hp>0&&dist(e,player)<6);if(ne)damageEnemy(ne,Math.floor(dmg*0.18),false);}
  if(player.hp<=0){
    if(player.resurrection){player.resurrection=false;player.hp=player.maxHp;for(const e of enemies){if(e.hp>0&&dist(e,player)<6)damageEnemy(e,Math.floor(player.atk*5),false);}spawnExplosion(player.x,player.y,'#ffe');player.screenShake=18;}
    else if(player.timeLoop){player.timeLoop=false;player.hp=player.timeRewindHP>0?player.timeRewindHP:Math.floor(player.maxHp*0.5);spawnExplosion(player.x,player.y,'#8cf');addDmgNum(player.x,player.y,0,false,'TIME LOOP!');}
    else if(player.reviveAvailable){player.reviveAvailable=false;player.hp=Math.floor(player.maxHp*0.35);}
    else if(player.divineShield&&player.divineShieldTimer<=0){player.hp=1;player.divineShieldTimer=player.divineShieldCD;}
    else if(playerAbilityCards['Holy Light']!==undefined&&playerAbilityCards['Holy Light']>=2){player.hp=Math.floor(player.maxHp*0.5);addDmgNum(player.x,player.y,0,false,'DIVINE REVIVE!');}
    else gameOver();
  }
}

function enemyShoot(e,d){
  if(player.dashing)return;
  if(e.blinded&&Math.random()<0.65)return;
  if(player.dodgeChance>0&&Math.random()<player.dodgeChance)return;
  if(player.deflectProjectiles&&player.moving)return;
  if(player.parryChance>0&&Math.random()<player.parryChance){if(player.parryReflect)damageEnemy(e,Math.floor(e.damage||5)*difficultyMult,false);return;}
  if(player.emblems['Shield']>=8&&Math.random()<0.12){e.stunned=true;e.stunTimer=1200;return;}
  if(player.voidPhase>0&&Math.random()<player.voidPhase)return;
  let dmg=(e.damage||5)*difficultyMult;
  takeDmg(dmg,250);
  if(e.burns&&!player.immuneToBurn){player.hp-=Math.floor(dmg*0.2);player.damageVignette+=100;}
  if(e.freezeOnHit&&!player.immuneToSlow){player.speedBuff-=0.25;setTimeout(()=>player.speedBuff+=0.25,2200);}
  if(e.poisonOnHit){player.hp-=Math.floor(dmg*0.15);}
  if(e.chainOnHit&&Math.random()<0.3){player.hp-=Math.floor(dmg*0.3);}
  if(e.lifestealOnHit){e.hp=Math.min(e.maxHp,e.hp+Math.floor(dmg*(e.lifestealOnHit||0.1)));}
}

// ── SPAWNING ──
function spawnEnemies(dt){
  waveTimer-=dt;
  if(waveTimer<=0){
    // Faster scaling: min wave timer and more enemies per wave
    waveTimer=Math.max(800,4500-gameTime/1000*55);
    const count=Math.min(1+Math.floor(gameTime/25000),8);// More enemies faster
    for(let i=0;i<count;i++){
      if(enemies.filter(e=>e.hp>0).length>55)break;
      const pos=findSpawnPoint();
      // Unlock more enemy types as time progresses - faster
      const maxType=Math.min(ENEMY_TYPES.length-1,Math.floor(gameTime/20000)+2);
      const typeIdx=randInt(0,maxType);
      const type=ENEMY_TYPES[typeIdx];
      enemies.push({
        x:pos.x,y:pos.y,
        hp:Math.floor(type.hp*difficultyMult*diffSettings.enemyHpMult),
        maxHp:Math.floor(type.hp*difficultyMult*diffSettings.enemyHpMult),
        speed:type.speed,damage:Math.floor(type.damage*diffSettings.enemyDmgMult),
        fireRate:type.fireRate,range:type.range,color:type.color,size:type.size,
        weaponDrop:type.weaponDrop,xp:type.xp,name:type.name,hitFlash:0,
        fireTimer:type.fireRate*Math.random(),
        burns:type.burns,freezeOnHit:type.freezeOnHit,poisonOnHit:type.poisonOnHit,
        chainOnHit:type.chainOnHit,lifestealOnHit:type.lifestealOnHit,
      });
    }
  }
  // Boss spawn with 10s warning
  if(!activeBoss&&!bossWarningActive){
    const bossCount=BOSSES.length,cycle=Math.floor(nextBossIndex/bossCount),localIdx=nextBossIndex%bossCount;
    const bossInfo=BOSSES[localIdx];
    const cycleTimeOffset=cycle*(BOSSES[bossCount-1].time+300);
    const spawnTime=bossInfo.time+cycleTimeOffset;
    if(gameTime/1000>=spawnTime-10&&gameTime/1000<spawnTime){
      bossWarningActive=true;bossWarningTimer=(spawnTime-gameTime/1000)*1000;bossWarningPendingIdx=nextBossIndex;
    }else if(gameTime/1000>=spawnTime){spawnBoss(nextBossIndex);nextBossIndex++;}
  }
  if(bossWarningActive){
    const prevSec=Math.ceil(bossWarningTimer/1000);bossWarningTimer-=dt;const curSec=Math.ceil(bossWarningTimer/1000);
    if(curSec!==prevSec&&curSec>=0)playSound('bossWarning');
    if(bossWarningTimer<=0){bossWarningActive=false;spawnBoss(bossWarningPendingIdx);nextBossIndex++;bossWarningPendingIdx=-1;}
  }
  // Difficulty scaling - 30% faster
  difficultyTimer-=dt;
  if(difficultyTimer<=0){difficultyTimer=diffSettings.scalingInterval;difficultyMult+=diffSettings.scalingRate;}
}

function spawnBoss(idx){
  const bossCount=BOSSES.length,cycle=Math.floor(idx/bossCount),localIdx=idx%bossCount;
  const b=BOSSES[localIdx],cycleMult=Math.pow(2,cycle);
  if(b.duo){
    const pos1=findSpawnPoint(),pos2=findSpawnPoint();
    const fl={x:pos1.x,y:pos1.y,hp:Math.floor(b.hp*difficultyMult*cycleMult*diffSettings.bossHpMult),maxHp:Math.floor(b.hp*difficultyMult*cycleMult),speed:b.speed*1.2,damage:b.damage,fireRate:b.fireRate,range:b.range,color:'#f60',size:0.7,name:'Flame',isBoss:true,isDuo:true,duoPartner:null,weaponReward:b.weaponReward,armorReward:b.armorReward,hitFlash:0,fireTimer:b.fireRate,xp:55,bossType:'flame',bossAbils:['fireBreath']};
    const fr={x:pos2.x,y:pos2.y,hp:Math.floor(b.hp*1.4*difficultyMult*cycleMult*diffSettings.bossHpMult),maxHp:Math.floor(b.hp*1.4*difficultyMult*cycleMult),speed:b.speed*0.7,damage:b.damage*1.1,fireRate:b.fireRate*1.3,range:b.range,color:'#4cf',size:0.85,name:'Frost',isBoss:true,isDuo:true,duoPartner:null,weaponReward:b.weaponReward,armorReward:b.armorReward,hitFlash:0,fireTimer:b.fireRate,xp:55,bossType:'frost',bossAbils:['iceShardVolley']};
    fl.duoPartner=fr;fr.duoPartner=fl;enemies.push(fl,fr);
    activeBoss={isDuoBoss:true,flame:fl,frost:fr,weaponReward:b.weaponReward,armorReward:b.armorReward,hp:1};
    bossDespawnTimer=150000;playSound('bossSpawn');startBGM(true);return;
  }
  const pos=findSpawnPoint();
  const boss={x:pos.x,y:pos.y,hp:Math.floor(b.hp*difficultyMult*cycleMult*diffSettings.bossHpMult),maxHp:Math.floor(b.hp*difficultyMult*cycleMult),speed:b.speed,damage:Math.floor(b.damage*cycleMult),fireRate:b.fireRate,range:b.range,color:b.color,size:b.size,name:b.name,isBoss:true,weaponReward:b.weaponReward,armorReward:b.armorReward,hitFlash:0,fireTimer:b.fireRate,xp:60,bossAbils:b.bossAbils||[]};
  enemies.push(boss);activeBoss=boss;bossDespawnTimer=130000;playSound('bossSpawn');startBGM(true);
}

// ── EMBLEM SYSTEM ──
function showEmblemSelect(){
  gameState='emblem';paused=true;
  document.exitPointerLock&&document.exitPointerLock();
  const screen=document.getElementById('emblem-screen');screen.style.display='flex';
  const container=document.getElementById('emblem-choices');container.innerHTML='';
  const indices=[];while(indices.length<3){const r=randInt(0,EMBLEM_TYPES.length-1);if(!indices.includes(r))indices.push(r);}
  for(const i of indices){
    const em=EMBLEM_TYPES[i],currentLv=player.emblems[em.name]||0,nextLv=currentLv+1;
    const perkText=getEmblemPerk(em.name,nextLv);
    const nextPerk=nextLv<20?getEmblemPerk(em.name,nextLv+1):'';
    const card=document.createElement('div');card.className='emblem-card';card.style.borderColor=em.color;
    card.innerHTML=`<div class="em-icon">${em.icon}</div><h4 style="color:${em.color}">${em.name} Lv${nextLv}</h4>
    <p>${em.desc} (+${em.perLevel})</p>
    ${perkText?`<p style="color:${em.color};margin-top:5px;font-weight:bold">★ ${perkText}</p>`:''}
    ${nextPerk&&nextLv<19?`<p style="color:#888;font-size:0.65rem;margin-top:3px">Next(${nextLv+1}): ${nextPerk}</p>`:''}
    ${currentLv>0?`<p style="color:#666;font-size:0.65rem">Current: Lv${currentLv}</p>`:''}`;
    card.onclick=()=>pickEmblem(i);container.appendChild(card);
  }
}

function pickEmblem(typeIdx){
  const em=EMBLEM_TYPES[typeIdx];
  if(!player.emblems[em.name])player.emblems[em.name]=0;
  player.emblems[em.name]++;const lv=player.emblems[em.name];
  playSound('emblemSelect');
  switch(em.stat){
    case'atk':player.atk+=em.perLevel;break;case'def':player.def+=em.perLevel;break;
    case'spd':player.spd+=em.perLevel;break;case'crit':player.crit+=em.perLevel;break;
    case'maxHp':player.maxHp+=em.perLevel;player.hp=Math.min(player.hp+em.perLevel,player.maxHp);break;
    case'atkSpd':player.atkSpdMult*=(1+em.perLevel);break;case'dot':player.dotDamage+=em.perLevel;break;
    case'healing':player.healOnKill+=em.perLevel*0.002;break;case'allDmg':player.allDmgMult*=(1+em.perLevel);break;
    case'regen':player.natureRegen+=em.perLevel;break;case'lifesteal':player.bloodLifesteal+=em.perLevel;break;
    case'abilityPwr':player.abilityPower+=em.perLevel;break;case'cooldown':player.timeCDR+=em.perLevel;break;
    case'chaos':player.chaosChance+=em.perLevel;break;
  }
  applyEmblemPerk(em.name,lv);
  document.getElementById('emblem-screen').style.display='none';
  gameState='playing';paused=false;
  if(!isTouchDevice)C.requestPointerLock();
}

function applyEmblemPerk(name,lv){

    case'Sword':if(lv===3)player.parryChance=0.15;if(lv===5)player.parryReflect=true;if(lv===4)player.crit+=10;if(lv===6)player.cleaveDmg=true;if(lv===7)player.deflectProjectiles=true;if(lv===8)player.executeThreshold=0.2;if(lv===10)player.bladeStormCounter=0;if(lv===13)player.executeThreshold=0.15;if(lv===18)player.executeThreshold=0.1;break;
    case'Fire':if(lv===2)player.burnChance=0.15;if(lv===5)player.burnChance=1;if(lv===6)player.burnDmgMult=1.3;if(lv===7)player.fireAura=true;if(lv===8)player.burnSpread=true;if(lv===9)player.burnInfiniteStack=true;if(lv===13)player.burnDmgMult=1.5;break;
    case'Ice':if(lv===2)player.slowChance=0.1;if(lv===3)player.frozenBonusDmg=0.3;if(lv===4)player.slowChance=0.5;if(lv===7)player.shatterExplosion=true;if(lv===8)player.iceAura=true;if(lv===13)player.dmgReduction+=0.15;break;
    case'Thunder':if(lv===2){player.chainChance=0.12;player.chainTargets=2;}if(lv===3)player.spd+=0.1;if(lv===4)player.chainTargets=4;if(lv===6)player.stunChance=0.15;if(lv===7)player.dodgeChance=0.1;if(lv===8)player.chainOnKill=true;if(lv===9)player.stormActive=true;if(lv===13)player.dodgeChance=0.2;break;
    case'Shadow':if(lv===2)player.critMult=2;if(lv===3)player.shadowLifesteal=0.05;if(lv===4)player.backstabBonus=true;if(lv===5)player.critResetSkill=true;if(lv===7)player.critMult=2.5;if(lv===8)player.markOfDeath=true;if(lv===9)player.assassinate=true;if(lv===12)player.critMult=3;if(lv===16)player.critMult=3.5;break;
    case'Shield':if(lv===2)player.regenRate=0.01;if(lv===3)player.dmgReduction+=0.05;if(lv===6)player.regenRate=0.02;if(lv===7)player.dmgReduction+=0.05;if(lv===8)player.reviveAvailable=true;if(lv===9){player.dmgReduction+=0.1;player.regenRate*=2;}break;
    case'Wind':if(lv===2)player.windShockwave=true;if(lv===3)player.windProjSpeed=1.15;if(lv===4)player.windCrescentEcho=true;if(lv===5)player.atkSpdMult*=1.25;if(lv===6)player.windShockwaveSize=2;if(lv===7)player.windDashTrail=true;if(lv===8)player.windCrescentBounce=true;if(lv===9)player.windStormOfBlades=true;if(lv===13)player.atkSpdMult*=1.2;break;
    case'Death':if(lv===2)player.witherChance=0.15;if(lv===3)player.witherMaxStacks=3;if(lv===4){player.deathExecute=true;player.executeThreshold=Math.max(player.executeThreshold,0.2);}if(lv===5)player.soulHarvest=true;if(lv===6)player.witherMaxStacks=5;if(lv===7)player.reaperScytheTimer=0;if(lv===8)player.deathMark=true;if(lv===9)player.soulReaper=true;if(lv===12)player.witherMaxStacks=7;break;
    case'Holy':if(lv===2)player.healOnKill=Math.max(player.healOnKill,0.02);if(lv===3)player.purifyActive=true;if(lv===4)player.holyBlind=true;if(lv===5)player.divineShield=true;if(lv===6)player.healOnKill=Math.max(player.healOnKill,0.05);if(lv===7)player.holyJudgment=true;if(lv===8)player.holyAuraRegen=0.005;if(lv===9)player.resurrection=true;if(lv===11)player.healOnKill=0.1;break;
    case'Dragon':if(lv===2)player.dragonBreath=true;if(lv===3){player.dragonScales=0.1;player.dmgReduction+=0.1;}if(lv===4)player.dragonBreathBurn=true;if(lv===5)player.dragonRage=true;if(lv===6){player.dragonScales=0.2;player.dmgReduction+=0.1;}if(lv===7)player.dragonWingBuffet=true;if(lv===8)player.dragonForm=true;if(lv===9){player.ancientDragon=true;player.allDmgMult*=1.3;}break;

    case'Blood':if(lv===2)player.bloodLifesteal=Math.max(player.bloodLifesteal,0.03);if(lv===3)player.bloodFrenzy=true;if(lv===4)player.bloodRage=true;if(lv===5)player.bloodSiphon=true;if(lv===6)player.bloodPool=true;if(lv===7)player.bloodFeast=true;if(lv===8)player.bloodMoon=true;if(lv===9)player.bloodLord=true;break;

    case'Chaos':if(lv===2)player.chaosChance=Math.max(player.chaosChance,0.1);if(lv===3)player.chaosExplosion=true;if(lv===4)player.chaosRandom=true;if(lv===5)player.chaosWarp=true;if(lv===6)player.chaosMutate=true;if(lv===7)player.chaosMadness=true;if(lv===8)player.chaosRift=true;if(lv===9)player.chaosApocalypse=true;if(lv===11)player.chaosChance+=0.1;break;
    // New emblems give stat bonuses handled by stat switch above
  }
}

// ── BOSS REWARDS (Ability Cards) ──
function showBossReward(){
  gameState='bossReward';paused=true;
  document.exitPointerLock&&document.exitPointerLock();
  const screen=document.getElementById('boss-reward-screen');screen.style.display='flex';
  const container=document.getElementById('boss-reward-choices');container.innerHTML='';
  // Pick 3 random ability cards
  const indices=[];while(indices.length<3){const r=randInt(0,ABILITY_CARDS.length-1);if(!indices.includes(r))indices.push(r);}
  for(const i of indices){
    const ac=ABILITY_CARDS[i];
    const curTier=(playerAbilityCards[ac.name]!==undefined)?playerAbilityCards[ac.name]+1:0;
    const isMaxed=curTier>=3;
    const card=document.createElement('div');card.className='buff-card';
    card.style.borderColor=ac.color;
    const tierStars=['★','★★','★★★'];
    const tierColors=['#aaa','#4af','#ffd700'];
    card.innerHTML=`
      <p style="color:${ac.color};font-size:1rem;font-weight:bold;margin-bottom:6px">${ac.name}</p>
      ${curTier>0?`<p style="color:${tierColors[curTier-1]};font-size:0.72rem;margin-bottom:5px">Current: ${tierStars[curTier-1]||''}</p>`:''}
      <p style="color:#0f0;font-size:0.82rem;margin-bottom:4px">${isMaxed?'MAXED - Bonus Stats':ac.desc[curTier]||ac.desc[2]}</p>
      ${!isMaxed?`<p style="color:${tierColors[curTier]};font-size:0.72rem">${tierStars[curTier]||'★★★'} Tier ${curTier+1}</p>`:''}
    `;
    card.onclick=()=>{

      screen.style.display='none';gameState='playing';paused=false;

  }
}

function applyAbilityCard(name,tier){
  // tier=0 means first pick (becomes tier 1 effect)
  switch(name){
    case'Feather Storm':if(tier===0){}if(tier===1){}if(tier===2){}break;// handled in shoot
    case'Inferno Rush':if(tier===0)player.fireAura=true;if(tier===1)player.fireAuraRange=6;if(tier===2){player.immuneToBurn=true;player.burnDmgMult*=1.5;}break;
    case'Shadow Step':if(tier===0)player.skillMaxCooldown=Math.floor(player.skillMaxCooldown*0.8);if(tier===1){}if(tier===2)player.executeThreshold=Math.max(player.executeThreshold,0.15);break;
    case'Iron Skin':if(tier===0){player.maxHp=Math.floor(player.maxHp*1.2);player.hp+=Math.floor(player.maxHp*0.2);}if(tier===1){player.maxHp=Math.floor(player.maxHp*1.3);player.hp+=50;}if(tier===2)player.thornsDmg=true;break;
    case'Time Dilation':if(tier===0)player.timeCDR+=0.2;if(tier===1)player.timeCDR+=0.15;if(tier===2)player.timeCDR+=0.15;break;
    case'Soul Drain':if(tier===0)player.globalLifesteal+=0.05;if(tier===1){player.globalLifesteal+=0.05;player.arcaneNova=true;}if(tier===2)player.globalLifesteal+=0.1;break;
    case'Arcane Power':if(tier===0)player.abilityPower+=25;if(tier===1)player.abilityPower+=25;if(tier===2){}break;// handled in calcDamage
    case'Dragon Scale':if(tier===0)player.dmgReduction+=0.15;if(tier===1)player.dmgReduction+=0.1;if(tier===2)player.immuneToBurn=player.immuneToSlow=true;break;
    case'Wind Surge':if(tier===0)player.speedBuff+=0.2;if(tier===1)player.speedBuff+=0.15;if(tier===2){player.speedBuff+=0.15;player.windDashTrail=true;}break;
    case'Death Aura':if(tier===0)player.witherChance=Math.max(player.witherChance,0.2);if(tier===1){player.witherMaxStacks=Math.max(player.witherMaxStacks,4);player.iceAura=true;}if(tier===2)player.deathExecute=true;break;
    case'Holy Light':if(tier===0)player.holyAuraRegen=Math.max(player.holyAuraRegen,0.008);if(tier===1)player.holyAuraRegen=Math.max(player.holyAuraRegen,0.015);if(tier===2)player.purifyActive=true;break;
    case'Chaos Surge':if(tier===0)player.chaosChance+=0.1;if(tier===1)player.chaosExplosion=true;if(tier===2)player.chaosApocalypse=true;break;
    case'Nature Bond':if(tier===0)player.natureBloom=true;if(tier===1)player.healOnKill=Math.max(player.healOnKill,0.05);if(tier===2){player.natureGaia=true;}break;
    case'Blood Frenzy':if(tier===0)player.bloodFrenzy=true;if(tier===1)player.bloodRage=true;if(tier===2){player.atkSpdMult*=1.2;player.bloodLord=true;}break;
    case'Void Phase':if(tier===0)player.voidPhase+=0.15;if(tier===1)player.voidPhase+=0.1;if(tier===2){player.voidPhase+=0.05;player.dodgeChance+=0.1;}break;
    case'Lightning Reflexes':if(tier===0)player.dodgeChance+=0.1;if(tier===1)player.dodgeChance+=0.1;if(tier===2){player.dodgeChance+=0.05;player.chainOnKill=true;}break;
    case'Crystal Armor':if(tier===0){player.dmgReduction+=0.2;player.immuneToSlow=true;}if(tier===1){player.arcaneBarrier=true;player.arcaneBarrierHP=200;}if(tier===2){player.iceAura=true;player.shatterExplosion=true;}break;
    case'Berserker Rage':if(tier===0)player.dragonRage=true;if(tier===1){player.bloodRage=true;player.bloodFrenzy=true;}if(tier===2){player.allDmgMult*=1.2;player.bloodLifesteal+=0.1;}break;
    case'Phantom Strike':if(tier===0){}if(tier===1)player.backstabBonus=true;if(tier===2)player.critMult=Math.max(player.critMult,3);break;// ADS handled in shoot
    case'Titan Smash':if(tier===0)player.skillMaxCooldown=Math.max(3000,player.skillMaxCooldown-2000);if(tier===1)player.dragonWingBuffet=true;if(tier===2)player.chaosExplosion=true;break;
  }
}

// ── FUSION SYSTEM ──
function fuseWeapons(idx1,idx2){
  if(idx1===idx2||idx1<0||idx2<0||idx1>=player.weapons.length||idx2>=player.weapons.length)return;
  const w1=player.weapons[idx1],w2=player.weapons[idx2];
  // Create fused weapon - best of both
  const fused={
    name:`${w1.name.replace(/\+/,'')} + ${w2.name.replace(/\+/,'')}`,
    damage:Math.max(w1.damage,w2.damage)+Math.floor(Math.min(w1.damage,w2.damage)*0.5),
    fireRate:Math.floor((w1.fireRate+w2.fireRate)/2),
    range:Math.max(w1.range||10,w2.range||10),
    spread:Math.min(w1.spread||0,w2.spread||0),
    aoe:Math.max(w1.aoe||0,w2.aoe||0),
    color:w1.color,ammo:Infinity,projCount:Math.max(w1.projCount||1,w2.projCount||1),
    tier:'2+',kills:0,fused:true,
    // Combine specials
    burn:w1.burn||w2.burn,freeze:w1.freeze||w2.freeze,pierce:w1.pierce||w2.pierce,
    chainLightning:w1.chainLightning||w2.chainLightning,
    poison:w1.poison||w2.poison,
    scytheLifesteal:Math.max(w1.scytheLifesteal||0,w2.scytheLifesteal||0)+Math.min(w1.scytheLifesteal||0,w2.scytheLifesteal||0)*0.5,
    cleave:w1.cleave||w2.cleave,katana:w1.katana||w2.katana,
    energyBlade:w1.energyBlade||w2.energyBlade,
    sniperScope:w1.sniperScope||w2.sniperScope,
    highCrit:Math.max(w1.highCrit||0,w2.highCrit||0),
    execute:Math.max(w1.execute||0,w2.execute||0),
    ignoreArmor:w1.ignoreArmor||w2.ignoreArmor,
    fusionAlternate:w1.fusionAlternate||w2.fusionAlternate,
    poisonAura:w1.poisonAura||w2.poisonAura,
  };
  // Remove both, add fused
  const higher=Math.max(idx1,idx2),lower=Math.min(idx1,idx2);
  player.weapons.splice(higher,1);player.weapons.splice(lower,1);
  player.weapons.push(fused);
  player.weaponIndex=player.weapons.length-1;
  fusionSelectIndices=[];
  playSound('pickupWeapon');
  announceAbility('WEAPON FUSED!','#ff0');
  renderInventory();
}
