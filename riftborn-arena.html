const SFX={
  ctx:null,
  _init(){if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},
  _tone(freq,dur,type,vol,delay){
    this._init();if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(freq,this.ctx.currentTime+(delay||0));
    g.gain.setValueAtTime(vol||0.15,this.ctx.currentTime+(delay||0));
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+(delay||0)+dur);
    o.connect(g);g.connect(this.ctx.destination);
    o.start(this.ctx.currentTime+(delay||0));o.stop(this.ctx.currentTime+(delay||0)+dur);
  },
  _noise(dur,vol){
    this._init();if(!this.ctx)return;
    const bufSz=this.ctx.sampleRate*dur;const buf=this.ctx.createBuffer(1,bufSz,this.ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<bufSz;i++)d[i]=(Math.random()*2-1)*(vol||0.1);
    const s=this.ctx.createBufferSource();const g=this.ctx.createGain();
    s.buffer=buf;g.gain.setValueAtTime(vol||0.1,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    s.connect(g);g.connect(this.ctx.destination);s.start();s.stop(this.ctx.currentTime+dur);
  },
  click(){this._tone(800,0.05,'square',0.06)},
  hit(){this._tone(200,0.12,'sine',0.15);this._noise(0.08,0.1)},
  crit(){this._tone(600,0.1,'sawtooth',0.2);this._tone(900,0.12,'square',0.18,0.05)},
  superEff(){this._tone(500,0.08,'square',0.18);this._tone(700,0.1,'square',0.15,0.08);this._tone(1000,0.1,'square',0.12,0.16)},
  heal(){this._tone(440,0.12,'sine',0.1);this._tone(550,0.12,'sine',0.08,0.12);this._tone(660,0.15,'sine',0.06,0.24)},
  catch_(){this._tone(300,0.15,'triangle',0.12);this._tone(400,0.1,'triangle',0.1,0.15);this._tone(600,0.2,'triangle',0.08,0.25)},
  fail(){this._tone(300,0.15,'sine',0.15);this._tone(200,0.2,'sine',0.12,0.15)},
  victory(){[523,659,784,1047].forEach((f,i)=>this._tone(f,0.2,'sine',0.15,i*0.15))},
  levelUp(){[440,554,659,880].forEach((f,i)=>this._tone(f,0.15,'triangle',0.12,i*0.1))},
  faint(){this._tone(300,0.15,'sine',0.2);this._tone(200,0.2,'sine',0.15,0.15);this._tone(100,0.3,'sine',0.1,0.35)},
  evolve(){[440,554,659,784,880,1047].forEach((f,i)=>this._tone(f,0.2,'sine',0.18,i*0.12))},
};

// ============================================================
// CREATURE INSTANCE FACTORY
// ============================================================
function createCreature(specId,level){
  const spec=RB_BY_ID[specId];if(!spec)return null;
  const c={
    specId:specId,name:spec.name,type:spec.type,level:level,
    xp:0,xpNeeded:level*level*3+10,
    baseStats:{...spec.stats},
    stats:{},
    hp:0,maxHp:0,
    moves:[],maxMoves:4,
    status:null,statusTurns:0,
    statStages:{atk:0,def:0,spAtk:0,spDef:0,spd:0},
    leechSeed:false,
    isWild:false,
  };
  // Calculate actual stats
  calcStats(c);
  c.hp=c.maxHp;
  // Determine moves (base + learned by level)
  let allMoves=[...spec.moves];
  if(spec.learnset){
    Object.entries(spec.learnset).forEach(([lvl,move])=>{
      if(parseInt(lvl)<=level&&!allMoves.includes(move))allMoves.push(move);
    });
  }
  // Take last 4
  c.moves=allMoves.slice(-4).map(m=>({name:m,energy:MOVES[m]?.energy||10,maxEnergy:MOVES[m]?.energy||10}));
  return c;
}

function calcStats(c){
  const b=c.baseStats;const lv=c.level;
  c.maxHp=Math.floor((2*b.hp*lv)/100)+lv+10;
  ['atk','def','spAtk','spDef','spd'].forEach(s=>{
    c.stats[s]=Math.floor((2*b[s]*lv)/100)+5;
    // Apply stat stages
    const stage=c.statStages[s];
    if(stage>0)c.stats[s]=Math.floor(c.stats[s]*(2+stage)/2);
    else if(stage<0)c.stats[s]=Math.floor(c.stats[s]*2/(2-stage));
  });
}

function getXpYield(c){return Math.floor(c.level*c.baseStats.hp/5)+20}

function checkEvolve(c){
  const spec=RB_BY_ID[c.specId];
  if(spec&&spec.evolves&&c.level>=spec.evolves.level){
    return spec.evolves.into;
  }
  return null;
}

function evolveCreature(c,newId){
  const newSpec=RB_BY_ID[newId];if(!newSpec)return;
  const hpPct=c.hp/c.maxHp;
  c.specId=newId;c.name=newSpec.name;c.type=newSpec.type;
  c.baseStats={...newSpec.stats};
  calcStats(c);
  c.hp=Math.floor(c.maxHp*hpPct);
  // Add new moves if space
  let allMoves=c.moves.map(m=>m.name);
  newSpec.moves.forEach(m=>{
    if(!allMoves.includes(m)&&c.moves.length<4){
      c.moves.push({name:m,energy:MOVES[m]?.energy||10,maxEnergy:MOVES[m]?.energy||10});
      allMoves.push(m);
    }
  });
}

  GS.scene='battle';

    animTimer:0,

    msgQueue:[],

    // Battle intro slide-in
    introTimer:0,introDuration:60,
    slideP:0,slideE:0, // 0=offscreen, 1=in position
    // Attack particles
    particles:[],
    // Effectiveness popup
    popup:null, // {text, color, timer, maxTimer}
  };
  if(options.wild){
    const wc={...options.wild};wc.isWild=true;
    b.enemyTeam=[wc];
    b.log.push(`A wild ${wc.name} appeared!`);
    b.msgQueue.push(`A wild ${wc.name} appeared!`);
  }
  if(options.trainer){
    b.enemyTeam=options.trainer.team.map(t=>createCreature(t.id,t.level));
    b.log.push(`${options.trainer.name} wants to battle!`);
    b.msgQueue.push(`${options.trainer.name} wants to battle!`);
    if(options.trainer.greeting)b.msgQueue.push(options.trainer.greeting);
  }
  if(options.arena!==undefined){
    const a=ARENAS[options.arena];
    b.enemyTeam=a.team.map(t=>createCreature(t.id,t.level));
    b.trainerName=`${a.leader}`;
    b.log.push(`Arena Leader ${a.leader} challenges you!`);
    b.msgQueue.push(`Arena Leader ${a.leader} challenges you!`);
    b.msgQueue.push(a.greeting);
  }
  if(options.champion){
    b.enemyTeam=CHAMPION.team.map(t=>createCreature(t.id,t.level));
    b.trainerName='Champion Kyle';
    b.msgQueue.push(`Champion ${CHAMPION.name} challenges you!`);
    b.msgQueue.push(CHAMPION.greeting);
  }
  // Find first alive player
  for(let i=0;i<b.playerTeam.length;i++){
    if(b.playerTeam[i].hp>0){b.playerActive=i;break}
  }
  b.hpAnimP=b.playerTeam[b.playerActive]?.hp||0;
  b.hpAnimE=b.enemyTeam[b.enemyActive]?.hp||0;
  GS.battle=b;
  GS.menuIdx=0;
}

function spawnHitParticles(isPlayer,type){
  const b=GS.battle;if(!b)return;
  const cx=isPlayer?W*0.25:W*0.72,cy=isPlayer?H*0.4:H*0.22;

  for(let i=0;i<12;i++){

      life:20+Math.random()*15,maxLife:35,size:3+Math.random()*4,color:col});

}

  const b=GS.battle;
  if(b.msgQueue.length>0){
    b.msgCurrent=b.msgQueue.shift();b.msgCharIdx=0;b.msgDone=false;
    return true;
  }
  return false;
}

function calcDamage(attacker,defender,move){
  const m=MOVES[move.name];if(!m||m.power===0)return 0;
  if(m.ohko){
    if(attacker.stats.spd>=defender.stats.spd&&Math.random()<0.3)return defender.hp;
    return 0;
  }
  const lv=attacker.level;
  const atk=m.cat==='physical'?attacker.stats.atk:attacker.stats.spAtk;
  const def=m.cat==='physical'?defender.stats.def:defender.stats.spDef;
  const stab=m.type===attacker.type?1.5:1;
  const eff=getEff(m.type,defender.type);
  const crit=(Math.random()<(m.critBoost?0.125:0.0625))?1.5:1;
  const rng=0.85+Math.random()*0.15;
  const dmg=Math.floor(((2*lv/5+2)*m.power*atk/def/50+2)*stab*eff*crit*rng);
  return {dmg:Math.max(1,dmg),eff,crit:crit>1};
}

function applyMoveEffects(attacker,defender,move,result){
  const m=MOVES[move.name];if(!m)return;
  if(m.effect&&Math.random()*100<(m.effectChance||0)){
    switch(m.effect){
      case 'burn':
        if(!defender.status){defender.status='burn';defender.statusTurns=5;battleMsg(`${defender.name} was burned!`)}break;
      case 'poison':
        if(!defender.status){defender.status='poison';defender.statusTurns=5;battleMsg(`${defender.name} was poisoned!`)}break;
      case 'paralyze':
        if(!defender.status){defender.status='paralyze';defender.statusTurns=4;battleMsg(`${defender.name} was paralyzed!`)}break;
      case 'freeze':
        if(!defender.status){defender.status='freeze';defender.statusTurns=3;battleMsg(`${defender.name} was frozen solid!`)}break;
      case 'confuse':
        if(!defender.status){defender.status='confuse';defender.statusTurns=3;battleMsg(`${defender.name} became confused!`)}break;
      case 'flinch':
        defender._flinched=true;break;
      case 'atkDown':
        if(defender.statStages.atk>-6){defender.statStages.atk--;calcStats(defender);battleMsg(`${defender.name}'s Attack fell!`)}break;
      case 'spdUp':
        if(attacker.statStages.spd<6){attacker.statStages.spd++;calcStats(attacker);battleMsg(`${attacker.name}'s Speed rose!`)}break;
      case 'spAtkUp':
        if(attacker.statStages.spAtk<6){attacker.statStages.spAtk++;calcStats(attacker);battleMsg(`${attacker.name}'s Sp.Atk rose!`)}break;
      case 'defUp':
        if(attacker.statStages.def<6){attacker.statStages.def++;calcStats(attacker);battleMsg(`${attacker.name}'s Defense rose!`)}break;
      case 'leech':
        if(!defender.leechSeed){defender.leechSeed=true;battleMsg(`${defender.name} was seeded!`)}break;
      case 'heal50':
        const heal=Math.floor(attacker.maxHp*0.5);attacker.hp=Math.min(attacker.maxHp,attacker.hp+heal);
        battleMsg(`${attacker.name} restored health!`);break;
    }
  }
  if(m.drain&&result.dmg>0){
    const drained=Math.floor(result.dmg*m.drain);
    attacker.hp=Math.min(attacker.maxHp,attacker.hp+drained);
    battleMsg(`${attacker.name} drained energy!`);
  }
}

function executeMove(user,target,move,isPlayer){
  const b=GS.battle;const m=MOVES[move.name];if(!m)return;

  // Check status
  if(user.status==='freeze'){
    if(Math.random()<0.3){user.status=null;battleMsg(`${user.name} thawed out!`)}
    else{battleMsg(`${user.name} is frozen solid!`);return}
  }
  if(user.status==='paralyze'&&Math.random()<0.25){
    battleMsg(`${user.name} is paralyzed! It can't move!`);return;
  }
  if(user._flinched){user._flinched=false;battleMsg(`${user.name} flinched!`);return}
  if(user.status==='confuse'){
    if(user.statusTurns<=0){user.status=null;battleMsg(`${user.name} snapped out of confusion!`)}
    else{
      user.statusTurns--;
      if(Math.random()<0.33){
        const selfDmg=Math.floor(user.maxHp*0.1);
        user.hp=Math.max(0,user.hp-selfDmg);
        battleMsg(`${user.name} hurt itself in confusion!`);
        if(isPlayer)b.shakeP=10;else b.shakeE=10;
        return;
      }
    }
  }

  // Energy check
  if(move.energy<=0){battleMsg(`${user.name} has no energy for ${move.name}!`);return}
  move.energy--;

  battleMsg(`${user.name} used ${move.name}!`);

  if(m.cat==='status'){
    applyMoveEffects(user,target,move,{dmg:0});
    return;
  }

  const result=calcDamage(user,target,move);
  if(typeof result==='number'){
    if(result===0){battleMsg('But it missed!');return}
    target.hp=Math.max(0,target.hp-result);
    return;
  }

  if(result.eff===0){battleMsg("It had no effect...");return}
  target.hp=Math.max(0,target.hp-result.dmg);

  if(isPlayer){b.shakeE=8;b.flashE=8;SFX.hit();spawnHitParticles(false,m.type)}
  else{b.shakeP=8;b.flashP=8;SFX.hit();spawnHitParticles(true,m.type)}

  if(result.crit){battleMsg('A critical hit!');SFX.crit()}
  if(result.eff>=2){battleMsg("It's super effective!");SFX.superEff();showEffPopup("SUPER EFFECTIVE!",'#ffcc00')}
  else if(result.eff<=0.5){battleMsg("It's not very effective...");showEffPopup("Not very effective...",'#888')}

  applyMoveEffects(user,target,move,result);
}

function endOfTurnEffects(creature){
  if(!creature||creature.hp<=0)return;
  if(creature.status==='burn'){
    const dmg=Math.max(1,Math.floor(creature.maxHp/16));
    creature.hp=Math.max(0,creature.hp-dmg);
    battleMsg(`${creature.name} was hurt by its burn!`);
  }
  if(creature.status==='poison'){
    const dmg=Math.max(1,Math.floor(creature.maxHp/8));
    creature.hp=Math.max(0,creature.hp-dmg);
    battleMsg(`${creature.name} was hurt by poison!`);
  }
  if(creature.leechSeed&&creature.hp>0){
    const dmg=Math.max(1,Math.floor(creature.maxHp/12));
    creature.hp=Math.max(0,creature.hp-dmg);
    battleMsg(`Leech Seed saps ${creature.name}!`);
  }
  // Reduce status turns
  if(creature.statusTurns>0)creature.statusTurns--;
  if(creature.statusTurns<=0&&creature.status&&creature.status!=='confuse')creature.status=null;
}

function attemptCatch(creature,shellIdx){
  const shell=SHELLS[shellIdx];
  const hpFactor=(3*creature.maxHp-2*creature.hp)/(3*creature.maxHp);
  const statusBonus=creature.status?1.5:1;
  const lvlFactor=Math.max(0.5,1-creature.level/100);
  const chance=Math.min(0.95,hpFactor*shell.catchRate*statusBonus*lvlFactor*0.5);
  return Math.random()<chance;
}

function aiChooseMove(creature){
  const validMoves=creature.moves.filter(m=>m.energy>0);
  if(validMoves.length===0)return null;
  // Prefer super effective moves vs player active
  const target=getActiveP();
  let best=null,bestScore=-1;
  validMoves.forEach(m=>{
    const md=MOVES[m.name];if(!md)return;
    let score=md.power||30;
    score*=getEff(md.type,target.type);
    if(md.type===creature.type)score*=1.3;
    score+=Math.random()*20;
    if(score>bestScore){bestScore=score;best=m}
  });
  return best||pick(validMoves);
}

// ============================================================
// SAVE / LOAD
// ============================================================
function saveGame(){
  const data={
    player:{
      ...GS.player,
      seen:Array.from(GS.player.seen),
      caught:Array.from(GS.player.caught),
    },
    route:GS.route,arenaIdx:GS.arenaIdx,
    exploreMapId:GS.explore.mapId,explorePx:GS.explore.px,explorePy:GS.explore.py,
    defeatedTrainers:Array.from(GS.defeatedTrainers),
  };
  localStorage.setItem('riftborn_save',JSON.stringify(data));
  GS.saved=true;
}

function loadGame(){
  const raw=localStorage.getItem('riftborn_save');
  if(!raw)return false;
  try{
    const data=JSON.parse(raw);
    GS.player={...data.player,seen:new Set(data.player.seen),caught:new Set(data.player.caught)};
    GS.player.team.forEach(c=>{calcStats(c)});
    GS.player.box.forEach(c=>{calcStats(c)});
    GS.route=data.route||0;
    GS.arenaIdx=data.arenaIdx||0;
    if(data.defeatedTrainers)GS.defeatedTrainers=new Set(data.defeatedTrainers);
    // Restore trainer beaten states from defeatedTrainers
    Object.values(MAPS).forEach(m=>{m.trainers.forEach(t=>{t.beaten=GS.defeatedTrainers.has(t.name)})});
    const mid=data.exploreMapId||'town',mpx=data.explorePx||8,mpy=data.explorePy||7;
    initExplore(mid,mpx,mpy);
    return true;
  }catch(e){return false}
}

// DRAWING HELPERS
// ============================================================
function drawRect(x,y,w,h,color,radius){
  X.fillStyle=color;
  if(radius){
    X.beginPath();X.roundRect(x,y,w,h,radius);X.fill();
  }else{
    X.fillRect(x,y,w,h);
  }
}

function drawText(text,x,y,size,color,align,maxW){
  X.fillStyle=color||'#e0e0e0';X.font=`${size||14}px Consolas, monospace`;
  X.textAlign=align||'left';X.textBaseline='top';
  if(maxW)X.fillText(text,x,y,maxW);
  else X.fillText(text,x,y);
}

function drawTextCenter(text,x,y,size,color){drawText(text,x,y,size,color,'center')}

function drawButton(x,y,w,h,label,selected,color){
  const bg=selected?(color||'#3344aa'):'#1a1a3e';
  const border=selected?'#7b68ee':'#2a2a4a';
  X.fillStyle=bg;X.beginPath();X.roundRect(x,y,w,h,8);X.fill();
  X.strokeStyle=border;X.lineWidth=selected?2:1;X.stroke();
  drawTextCenter(label,x+w/2,y+h/2-7,14,'#e0e0e0');
}

function drawHPBar(x,y,w,h,current,max,animated){
  const pct=Math.max(0,Math.min(1,(animated!==undefined?animated:current)/max));
  X.fillStyle='#1a1a1a';X.beginPath();X.roundRect(x,y,w,h,4);X.fill();
  const color=pct>0.5?'#44cc44':pct>0.25?'#ccaa22':'#cc3333';
  if(pct>0){X.fillStyle=color;X.beginPath();X.roundRect(x,y,w*pct,h,4);X.fill()}
  X.strokeStyle='#444';X.lineWidth=1;X.beginPath();X.roundRect(x,y,w,h,4);X.stroke();
}

function drawEnergyBar(x,y,w,h,current,max){
  const pct=Math.max(0,current/max);
  X.fillStyle='#1a1a1a';X.beginPath();X.roundRect(x,y,w,h,3);X.fill();
  if(pct>0){X.fillStyle='#5577cc';X.beginPath();X.roundRect(x,y,w*pct,h,3);X.fill()}
}

function drawTypeTag(x,y,type){
  const color=TYPE_COLORS[type]||'#888';
  X.fillStyle=color+'44';X.beginPath();X.roundRect(x,y,60,18,4);X.fill();
  X.strokeStyle=color;X.lineWidth=1;X.stroke();
  drawTextCenter(type,x+30,y+3,11,color);
}

// ============================================================
// CREATURE DRAWING — Canvas sprites
// ============================================================
function drawCreature(cx,cy,spec,level,flip,size){
  const s=size||60;
  const tc=TYPE_COLORS[spec.type]||'#888';
  X.save();
  if(flip){X.translate(cx,cy);X.scale(-1,1);X.translate(-cx,-cy)}

  // Body shape based on type
  const t=spec.type;
  X.fillStyle=tc;

  if(t==='Fire'||t==='Shadow'){
    // Angular/fierce body
    X.beginPath();
    X.moveTo(cx,cy-s*0.6);X.lineTo(cx+s*0.4,cy-s*0.1);X.lineTo(cx+s*0.35,cy+s*0.4);
    X.lineTo(cx-s*0.35,cy+s*0.4);X.lineTo(cx-s*0.4,cy-s*0.1);X.closePath();X.fill();
    // Flame/shadow wisps
    X.globalAlpha=0.6;
    for(let i=0;i<3;i++){
      const wx=cx-s*0.2+i*s*0.2,wy=cy-s*0.5-Math.sin(Date.now()/200+i)*s*0.15;
      X.beginPath();X.arc(wx,wy,s*0.1,0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;
  }else if(t==='Water'||t==='Storm'||t==='Ice'){
    // Round/flowing body
    X.beginPath();X.ellipse(cx,cy,s*0.4,s*0.45,0,0,Math.PI*2);X.fill();
    // Fin/crest
    X.beginPath();X.moveTo(cx-s*0.1,cy-s*0.45);X.lineTo(cx+s*0.15,cy-s*0.7);
    X.lineTo(cx+s*0.25,cy-s*0.35);X.closePath();X.fill();
    // Tail
    X.beginPath();X.moveTo(cx-s*0.35,cy+s*0.1);X.quadraticCurveTo(cx-s*0.6,cy-s*0.1,cx-s*0.55,cy+s*0.3);X.lineTo(cx-s*0.3,cy+s*0.2);X.closePath();X.fill();
  }else if(t==='Grass'||t==='Bug'){
    // Organic/round body
    X.beginPath();X.ellipse(cx,cy+s*0.05,s*0.38,s*0.4,0,0,Math.PI*2);X.fill();
    // Leaf/antenna
    X.beginPath();X.moveTo(cx,cy-s*0.4);X.quadraticCurveTo(cx+s*0.3,cy-s*0.8,cx+s*0.15,cy-s*0.55);X.closePath();X.fill();
    X.beginPath();X.moveTo(cx,cy-s*0.4);X.quadraticCurveTo(cx-s*0.3,cy-s*0.75,cx-s*0.1,cy-s*0.5);X.closePath();X.fill();
  }else if(t==='Electric'||t==='Arcane'){
    // Spiky/energetic body
    X.beginPath();
    const pts=6;
    for(let i=0;i<pts;i++){
      const a=i/pts*Math.PI*2-Math.PI/2;
      const r=(i%2===0)?s*0.45:s*0.3;
      const px=cx+Math.cos(a)*r,py=cy+Math.sin(a)*r;
      if(i===0)X.moveTo(px,py);else X.lineTo(px,py);
    }
    X.closePath();X.fill();
    // Sparks
    X.globalAlpha=0.7;
    for(let i=0;i<4;i++){
      const sa=Math.random()*Math.PI*2;
      const sr=s*0.5+Math.random()*s*0.15;
      X.fillRect(cx+Math.cos(sa)*sr-2,cy+Math.sin(sa)*sr-2,4,4);
    }
    X.globalAlpha=1;
  }else if(t==='Rock'||t==='Ground'||t==='Crystal'){
    // Blocky/angular body
    X.beginPath();
    X.moveTo(cx-s*0.35,cy+s*0.4);X.lineTo(cx-s*0.4,cy-s*0.1);
    X.lineTo(cx-s*0.15,cy-s*0.5);X.lineTo(cx+s*0.2,cy-s*0.45);
    X.lineTo(cx+s*0.4,cy-s*0.05);X.lineTo(cx+s*0.35,cy+s*0.4);X.closePath();X.fill();
    if(t==='Crystal'){
      X.globalAlpha=0.4;X.fillStyle='#ffffff';
      X.beginPath();X.moveTo(cx-s*0.1,cy-s*0.45);X.lineTo(cx+s*0.05,cy-s*0.7);
      X.lineTo(cx+s*0.15,cy-s*0.4);X.closePath();X.fill();
      X.globalAlpha=1;X.fillStyle=tc;
    }
  }else if(t==='Flying'){
    // Light body with wings
    X.beginPath();X.ellipse(cx,cy,s*0.25,s*0.3,0,0,Math.PI*2);X.fill();
    // Wings
    X.beginPath();X.moveTo(cx-s*0.2,cy-s*0.1);
    X.quadraticCurveTo(cx-s*0.6,cy-s*0.5,cx-s*0.5,cy+s*0.1);X.closePath();X.fill();
    X.beginPath();X.moveTo(cx+s*0.2,cy-s*0.1);
    X.quadraticCurveTo(cx+s*0.6,cy-s*0.5,cx+s*0.5,cy+s*0.1);X.closePath();X.fill();
  }else if(t==='Poison'){
    // Slimy blob
    X.beginPath();X.ellipse(cx,cy+s*0.1,s*0.4,s*0.35,0,0,Math.PI*2);X.fill();
    // Drips
    X.globalAlpha=0.6;
    X.beginPath();X.ellipse(cx-s*0.15,cy+s*0.45,s*0.08,s*0.12,0,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(cx+s*0.2,cy+s*0.42,s*0.06,s*0.1,0,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }else if(t==='Fighting'){
    // Muscular body
    X.beginPath();X.ellipse(cx,cy,s*0.3,s*0.4,0,0,Math.PI*2);X.fill();
    // Arms
    X.fillStyle=tc;X.lineWidth=s*0.12;X.strokeStyle=tc;
    X.beginPath();X.moveTo(cx-s*0.3,cy-s*0.1);X.lineTo(cx-s*0.55,cy-s*0.3);X.stroke();
    X.beginPath();X.arc(cx-s*0.55,cy-s*0.3,s*0.1,0,Math.PI*2);X.fill();
    X.beginPath();X.moveTo(cx+s*0.3,cy-s*0.1);X.lineTo(cx+s*0.55,cy-s*0.3);X.stroke();
    X.beginPath();X.arc(cx+s*0.55,cy-s*0.3,s*0.1,0,Math.PI*2);X.fill();
  }else if(t==='Psychic'){
    // Ethereal body
    X.globalAlpha=0.8;
    X.beginPath();X.ellipse(cx,cy,s*0.35,s*0.4,0,0,Math.PI*2);X.fill();
    X.globalAlpha=0.3;
    X.beginPath();X.ellipse(cx,cy,s*0.5,s*0.55,0,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }else if(t==='Ghost'){
    // Ghost shape
    X.globalAlpha=0.7;
    X.beginPath();X.ellipse(cx,cy-s*0.1,s*0.35,s*0.3,0,Math.PI,0);X.fill();
    X.fillRect(cx-s*0.35,cy-s*0.1,s*0.7,s*0.4);
    // Wavy bottom
    for(let i=0;i<4;i++){
      const bx=cx-s*0.35+i*s*0.233;
      X.beginPath();X.arc(bx+s*0.116,cy+s*0.3,s*0.116,0,Math.PI);X.fill();
    }
    X.globalAlpha=1;
  }else{
    // Normal — simple round body
    X.beginPath();X.ellipse(cx,cy,s*0.35,s*0.4,0,0,Math.PI*2);X.fill();
    // Ears
    X.beginPath();X.ellipse(cx-s*0.2,cy-s*0.45,s*0.1,s*0.15,-.3,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(cx+s*0.2,cy-s*0.45,s*0.1,s*0.15,.3,0,Math.PI*2);X.fill();
  }

  // Eyes (all types)
  X.fillStyle='#fff';
  X.beginPath();X.ellipse(cx-s*0.12,cy-s*0.12,s*0.08,s*0.1,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(cx+s*0.12,cy-s*0.12,s*0.08,s*0.1,0,0,Math.PI*2);X.fill();
  X.fillStyle='#111';
  X.beginPath();X.arc(cx-s*0.1,cy-s*0.1,s*0.05,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(cx+s*0.14,cy-s*0.1,s*0.05,0,Math.PI*2);X.fill();
  // Eye shine
  X.fillStyle='#fff';
  X.beginPath();X.arc(cx-s*0.08,cy-s*0.13,s*0.02,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(cx+s*0.16,cy-s*0.13,s*0.02,0,Math.PI*2);X.fill();

  // Mouth
  X.strokeStyle='#333';X.lineWidth=1.5;
  X.beginPath();X.arc(cx+s*0.02,cy+s*0.08,s*0.08,0.1,Math.PI-0.1);X.stroke();

  // Unique creature features based on specId
  const vis=getCreatureVisuals(spec.id||0);
  const ac=`rgb(${vis.accentR},${vis.accentG},${vis.accentB})`;
  // Tail
  if(vis.hasTail){
    X.strokeStyle=ac;X.lineWidth=s*0.06;X.beginPath();
    const tx0=cx-s*0.35,ty0=cy+s*0.15;
    if(vis.tailStyle===0){X.moveTo(tx0,ty0);X.lineTo(tx0-s*0.3,ty0-s*0.1)}
    else if(vis.tailStyle===1){X.moveTo(tx0,ty0);X.quadraticCurveTo(tx0-s*0.3,ty0-s*0.3,tx0-s*0.15,ty0-s*0.35)}
    else if(vis.tailStyle===2){X.moveTo(tx0,ty0);X.lineTo(tx0-s*0.25,ty0);X.fillStyle='#ff6622';X.beginPath();X.arc(tx0-s*0.3,ty0,s*0.06,0,Math.PI*2);X.fill()}
    else{X.moveTo(tx0,ty0);X.quadraticCurveTo(tx0-s*0.2,ty0+s*0.15,tx0-s*0.3,ty0+s*0.05)}
    X.stroke();
  }
  // Horns
  if(vis.hasHorns){
    X.fillStyle=ac;
    X.beginPath();X.moveTo(cx-s*0.15,cy-s*0.45);X.lineTo(cx-s*0.2,cy-s*0.7);X.lineTo(cx-s*0.05,cy-s*0.45);X.fill();
    X.beginPath();X.moveTo(cx+s*0.15,cy-s*0.45);X.lineTo(cx+s*0.2,cy-s*0.7);X.lineTo(cx+s*0.05,cy-s*0.45);X.fill();
  }
  // Pattern overlay
  X.globalAlpha=0.2;X.fillStyle=ac;
  if(vis.patternType===1){for(let i=0;i<3;i++){X.fillRect(cx-s*0.3,cy-s*0.2+i*s*0.2,s*0.6,s*0.06)}}
  else if(vis.patternType===2){for(let i=0;i<4;i++){X.beginPath();X.arc(cx-s*0.15+i*s*0.12,cy-s*0.05+(i%2)*s*0.15,s*0.04,0,Math.PI*2);X.fill()}}
  else if(vis.patternType===3){X.beginPath();X.moveTo(cx,cy-s*0.2);X.lineTo(cx+s*0.12,cy);X.lineTo(cx,cy+s*0.2);X.lineTo(cx-s*0.12,cy);X.closePath();X.fill()}
  else if(vis.patternType===4){X.beginPath();X.arc(cx,cy,s*0.15,0,Math.PI,false);X.stroke()}
  X.globalAlpha=1;

  // Legendary glow
  if(spec.legendary){
    X.globalAlpha=0.15+Math.sin(Date.now()/300)*0.1;
    X.fillStyle='#ffd700';
    X.beginPath();X.arc(cx,cy,s*0.7,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }

  X.restore();
}

  X.beginPath();X.moveTo(px-35,py-10);X.lineTo(px-45,py+70);X.lineTo(px+45,py+70);X.lineTo(px+35,py-10);X.closePath();X.fill();
  // Glasses
  X.strokeStyle='#7b68ee';X.lineWidth=2;
  X.beginPath();X.arc(px-10,py-42,8,0,Math.PI*2);X.stroke();

  if(GS.introStep<INTRO_TEXT.length){

    else GS.textDone=true;

    // Word wrap
    wrapText(shown,50,H*0.6+15,W-100,18,14,'#e0e0e0');

    drawButton(W/2-60,H*0.6+85,120,30,'Confirm',true);
  }
}

function wrapText(text,x,y,maxW,lineH,size,color){
  X.fillStyle=color||'#e0e0e0';X.font=`${size||14}px Consolas, monospace`;X.textAlign='left';
  const words=text.split(' ');let line='';let ly=y;
  words.forEach(word=>{
    const test=line+word+' ';
    if(X.measureText(test).width>maxW&&line!==''){
      X.fillText(line.trim(),x,ly);ly+=lineH;line=word+' ';
    }else{line=test}
  });
  if(line.trim())X.fillText(line.trim(),x,ly);
}

// ============================================================
// SCENE: BATTLE
// ============================================================
function drawBattle(){
  const b=GS.battle;if(!b)return;
  const p=getActiveP(),e=getActiveE();

  // --- Intro slide-in animation ---
  if(b.phase==='intro'&&b.introTimer<b.introDuration){
    b.introTimer++;
    // Ease-out cubic
    const t=Math.min(1,b.introTimer/b.introDuration);
    const ease=1-Math.pow(1-t,3);
    b.slideP=ease;b.slideE=ease;
  } else if(b.phase==='intro'&&b.introTimer>=b.introDuration){
    b.slideP=1;b.slideE=1;
  } else {b.slideP=1;b.slideE=1}

  // --- Background: gradient sky ---
  const grad=X.createLinearGradient(0,0,0,H*0.55);
  grad.addColorStop(0,'#0a0a2a');grad.addColorStop(1,'#141438');
  X.fillStyle=grad;X.fillRect(0,0,W,H*0.55);
  // Bottom panel bg
  X.fillStyle='#0a0a1a';X.fillRect(0,H*0.55,W,H*0.45);

  // Ground platforms with gradient
  const platGradP=X.createRadialGradient(W*0.25,H*0.48,5,W*0.25,H*0.48,isMobile?85:125);
  platGradP.addColorStop(0,'#2a2a5a');platGradP.addColorStop(1,'#12123a');
  X.fillStyle=platGradP;
  X.beginPath();X.ellipse(W*0.25,H*0.48,isMobile?80:120,25,0,0,Math.PI*2);X.fill();
  // Platform rim
  X.strokeStyle='#3a3a6a';X.lineWidth=2;
  X.beginPath();X.ellipse(W*0.25,H*0.48,isMobile?80:120,25,0,0,Math.PI*2);X.stroke();

  const platGradE=X.createRadialGradient(W*0.72,H*0.3,5,W*0.72,H*0.3,isMobile?75:105);
  platGradE.addColorStop(0,'#2a2a5a');platGradE.addColorStop(1,'#12123a');
  X.fillStyle=platGradE;
  X.beginPath();X.ellipse(W*0.72,H*0.3,isMobile?70:100,20,0,0,Math.PI*2);X.fill();
  X.strokeStyle='#3a3a6a';X.lineWidth=2;
  X.beginPath();X.ellipse(W*0.72,H*0.3,isMobile?70:100,20,0,0,Math.PI*2);X.stroke();

  // Draw enemy (slides in from right)
  if(e&&e.hp>0){
    const slideOffE=(1-b.slideE)*W*0.6;
    const ex=W*0.72+slideOffE+(b.shakeE>0?(Math.random()-0.5)*b.shakeE:0);
    const ey=H*0.22;
    if(b.flashE>0&&b.flashE%4<2){X.globalAlpha=0.3}
    const eSpec=RB_BY_ID[e.specId];
    if(eSpec)drawCreature(ex,ey,eSpec,e.level,true,isMobile?55:70);
    X.globalAlpha=1;

    // Enemy HP plate (slides in from right)
    if(b.slideE>0.3){
      const hpAlpha=Math.min(1,(b.slideE-0.3)/0.7);
      X.globalAlpha=hpAlpha;
      const epx=isMobile?10:W*0.45,epy=10;
      drawRect(epx,epy,isMobile?W-20:W*0.5,55,'#12122a',8);
      X.strokeStyle='#2a2a4a';X.lineWidth=1;X.beginPath();X.roundRect(epx,epy,isMobile?W-20:W*0.5,55,8);X.stroke();
      drawText(e.name,epx+10,epy+5,14,'#e0e0e0');
      drawText(`Lv${e.level}`,epx+(isMobile?W-80:W*0.5-55),epy+5,12,'#aaa');
      drawTypeTag(epx+(isMobile?W-140:W*0.5-120),epy+5,e.type);
      // Colored HP bar: green > yellow > red
      const eHpPct=b.hpAnimE/e.maxHp;
      const eHpCol=eHpPct>0.5?`rgb(${Math.floor(255*(1-eHpPct)*2)},200,60)`:eHpPct>0.2?`rgb(255,${Math.floor(200*eHpPct/0.5)},30)`:'#ff3333';
      X.fillStyle='#1a1a1a';X.beginPath();X.roundRect(epx+10,epy+25,isMobile?W-45:W*0.5-25,10,5);X.fill();
      const eBarW=(isMobile?W-45:W*0.5-25)*Math.max(0,Math.min(1,b.hpAnimE/e.maxHp));
      if(eBarW>0){X.fillStyle=eHpCol;X.beginPath();X.roundRect(epx+10,epy+25,eBarW,10,5);X.fill()}
      drawText(`${Math.max(0,Math.ceil(b.hpAnimE))}/${e.maxHp}`,epx+10,epy+38,11,'#aaa');
      if(e.status){
        const sc=e.status.toUpperCase().substring(0,3);
        X.fillStyle=e.status==='burn'?'#ff4400':e.status==='poison'?'#aa44cc':e.status==='paralyze'?'#ffcc00':e.status==='freeze'?'#77ddff':'#ff66aa';
        X.beginPath();X.roundRect(epx+(isMobile?W-70:W*0.5-60),epy+38,35,14,3);X.fill();
        drawTextCenter(sc,epx+(isMobile?W-52:W*0.5-42),epy+40,10,'#fff');
      }
      X.globalAlpha=1;
    }
  }

  // Draw player creature (slides in from left)
  if(p&&p.hp>0){
    const slideOffP=(1-b.slideP)*(-W*0.5);
    const ppx=W*0.25+slideOffP+(b.shakeP>0?(Math.random()-0.5)*b.shakeP:0);
    const ppy=H*0.4;
    if(b.flashP>0&&b.flashP%4<2){X.globalAlpha=0.3}
    const pSpec=RB_BY_ID[p.specId];
    if(pSpec)drawCreature(ppx,ppy,pSpec,p.level,false,isMobile?60:80);
    X.globalAlpha=1;
  }

  // Player HP plate (fades in after slide)
  if(p){
    if(b.slideP>0.3){
      const hpAlpha=Math.min(1,(b.slideP-0.3)/0.7);
      X.globalAlpha=hpAlpha;
    }
    const ppx=isMobile?10:10,ppy=H*0.55+5;
    drawRect(ppx,ppy,isMobile?W-20:W*0.5,60,'#12122a',8);
    X.strokeStyle='#2a2a4a';X.lineWidth=1;X.beginPath();X.roundRect(ppx,ppy,isMobile?W-20:W*0.5,60,8);X.stroke();
    drawText(p.name,ppx+10,ppy+5,14,'#e0e0e0');
    drawText(`Lv${p.level}`,ppx+(isMobile?W-80:W*0.5-55),ppy+5,12,'#aaa');
    drawTypeTag(ppx+(isMobile?W-140:W*0.5-120),ppy+5,p.type);
    // Colored HP bar: green > yellow > red
    const pHpPct=b.hpAnimP/p.maxHp;
    const pHpCol=pHpPct>0.5?`rgb(${Math.floor(255*(1-pHpPct)*2)},200,60)`:pHpPct>0.2?`rgb(255,${Math.floor(200*pHpPct/0.5)},30)`:'#ff3333';
    X.fillStyle='#1a1a1a';X.beginPath();X.roundRect(ppx+10,ppy+25,isMobile?W-45:W*0.5-25,10,5);X.fill();
    const pBarW=(isMobile?W-45:W*0.5-25)*Math.max(0,Math.min(1,b.hpAnimP/p.maxHp));
    if(pBarW>0){X.fillStyle=pHpCol;X.beginPath();X.roundRect(ppx+10,ppy+25,pBarW,10,5);X.fill()}
    drawText(`${Math.max(0,Math.ceil(b.hpAnimP))}/${p.maxHp}`,ppx+10,ppy+38,11,'#aaa');
    // XP bar
    drawText(`XP`,ppx+10,ppy+48,9,'#666');
    const xpW=isMobile?W-80:W*0.5-60;
    X.fillStyle='#1a1a1a';X.beginPath();X.roundRect(ppx+30,ppy+48,xpW,6,3);X.fill();
    const xpPct=Math.min(1,p.xp/p.xpNeeded);
    if(xpPct>0){X.fillStyle='#4488ff';X.beginPath();X.roundRect(ppx+30,ppy+48,xpW*xpPct,6,3);X.fill()}
    if(p.status){
      const sc=p.status.toUpperCase().substring(0,3);
      X.fillStyle=p.status==='burn'?'#ff4400':p.status==='poison'?'#aa44cc':p.status==='paralyze'?'#ffcc00':p.status==='freeze'?'#77ddff':'#ff66aa';
      X.beginPath();X.roundRect(ppx+(isMobile?W-70:W*0.5-60),ppy+38,35,14,3);X.fill();
      drawTextCenter(sc,ppx+(isMobile?W-52:W*0.5-42),ppy+40,10,'#fff');
    }
    X.globalAlpha=1;
  }

  // --- Battle particles ---
  for(let i=b.particles.length-1;i>=0;i--){
    const pt=b.particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.12;pt.life--;
    const alpha=Math.max(0,pt.life/pt.maxLife);
    X.globalAlpha=alpha;X.fillStyle=pt.color;
    X.beginPath();X.arc(pt.x,pt.y,pt.size*alpha,0,Math.PI*2);X.fill();
    if(pt.life<=0)b.particles.splice(i,1);
  }
  X.globalAlpha=1;

  // --- Effectiveness popup ---
  if(b.popup&&b.popup.timer>0){
    b.popup.timer--;
    const pAlpha=b.popup.timer>40?Math.min(1,(50-b.popup.timer)/10):b.popup.timer/40;
    const pScale=b.popup.timer>40?0.8+0.2*((50-b.popup.timer)/10):1;
    X.save();X.globalAlpha=pAlpha;
    X.font=`bold ${Math.floor(22*pScale)}px monospace`;X.textAlign='center';
    X.fillStyle='#000';X.fillText(b.popup.text,W/2+2,H*0.38+2);
    X.fillStyle=b.popup.color;X.fillText(b.popup.text,W/2,H*0.38);
    X.restore();X.textAlign='left';
    if(b.popup.timer<=0)b.popup=null;
  }

  // Bottom area — menus/messages
  const botY=H*0.55+70;
  drawRect(0,botY,W,H-botY,'#12122a');
  X.strokeStyle='#2a2a4a';X.lineWidth=1;X.beginPath();X.moveTo(0,botY);X.lineTo(W,botY);X.stroke();

  // Message display
  if(b.msgCurrent||b.msgQueue.length>0){
    if(!b.msgCurrent&&b.msgQueue.length>0)advanceBattleMsg();
    if(b.msgCurrent){
      if(b.msgCharIdx<b.msgCurrent.length){b.msgCharIdx+=2;b.msgDone=false}
      else b.msgDone=true;
      const shown=b.msgCurrent.substring(0,Math.floor(b.msgCharIdx));
      wrapText(shown,20,botY+10,W-40,18,14,'#e0e0e0');
      if(b.msgDone)drawText('[ Tap ]',W-80,botY+10,11,'#7b68ee');
    }
    return; // Don't show menu while messages are displaying
  }

  // Check win/loss
  if(b.playerWon||b.playerLost||b.caught||b.escaped){
    return; // Handled in update
  }

  // Battle menu
  if(b.phase==='menu'){
    const menuItems=b.isWild?['Fight','Shell','Bag','Run']:['Fight','Bag','Switch','---'];
    const cols=2,rows=2;
    const bw=(W-30)/cols-5,bh=38;
    menuItems.forEach((mi,i)=>{
      if(mi==='---')return;
      const col=i%cols,row=Math.floor(i/cols);
      const bx=15+col*(bw+10),by=botY+10+row*(bh+6);
      drawButton(bx,by,bw,bh,mi,b.menuIdx===i);
    });
  }

  // Move select
  if(b.phase==='moveSelect'&&p){
    p.moves.forEach((m,i)=>{
      const mv=MOVES[m.name];
      const bx=15,by=botY+10+i*36,bw=W-30,bh=32;
      const sel=b.subIdx===i;
      drawRect(bx,by,bw,bh,sel?'#1a1a4a':'#12122a',6);
      X.strokeStyle=sel?TYPE_COLORS[mv?.type||'Normal']:'#2a2a4a';X.lineWidth=sel?2:1;
      X.beginPath();X.roundRect(bx,by,bw,bh,6);X.stroke();
      drawText(m.name,bx+10,by+5,13,TYPE_COLORS[mv?.type||'Normal']);
      drawText(`${mv?.cat||'???'}`,bx+150,by+5,11,'#888');
      drawText(`Pow:${mv?.power||'-'}`,bx+220,by+5,11,'#aaa');
      drawEnergyBar(bx+10,by+22,80,6,m.energy,m.maxEnergy);
      drawText(`${m.energy}/${m.maxEnergy}`,bx+95,by+19,9,'#5577cc');
      if(sel)drawText('Back: tap bottom',W-140,botY+H*0.35,10,'#555');
    });
  }

  // Item/Shell select
  if(b.phase==='itemSelect'||b.phase==='shellSelect'){
    const list=b.phase==='shellSelect'?
      GS.player.bag.shells.map(s=>({name:SHELLS[s.idx].name,qty:s.qty,idx:s.idx})):
      GS.player.bag.items.map(s=>({name:ITEM_DEFS[s.idx].name,qty:s.qty,idx:s.idx}));
    if(list.length===0){
      drawTextCenter('Nothing here!',W/2,botY+30,14,'#888');
      drawButton(W/2-60,botY+60,120,32,'Back',true);
    }else{
      list.forEach((item,i)=>{
        const by=botY+10+i*32,bw=W-30;
        const sel=b.subIdx===i;
        drawRect(15,by,bw,28,sel?'#1a1a4a':'#12122a',6);
        X.strokeStyle=sel?'#7b68ee':'#2a2a4a';X.lineWidth=sel?2:1;
        X.beginPath();X.roundRect(15,by,bw,28,6);X.stroke();
        drawText(`${item.name} x${item.qty}`,25,by+7,13,sel?'#e0e0e0':'#aaa');
      });
      drawButton(W/2-60,botY+10+list.length*32+5,120,28,'Back',b.subIdx===list.length);
    }
  }

  // Switch select
  if(b.phase==='switchSelect'){
    const team=b.playerTeam;
    team.forEach((c,i)=>{
      if(i===b.playerActive)return;
      const by=botY+10+(i>b.playerActive?i-1:i)*32,bw=W-30;
      const sel=b.subIdx===(i>b.playerActive?i-1:i);
      const alive=c.hp>0;
      drawRect(15,by,bw,28,sel?'#1a1a4a':'#12122a',6);
      X.strokeStyle=sel?(alive?'#7b68ee':'#ff4444'):'#2a2a4a';X.lineWidth=sel?2:1;
      X.beginPath();X.roundRect(15,by,bw,28,6);X.stroke();
      drawText(`${c.name} Lv${c.level}`,25,by+3,12,alive?'#e0e0e0':'#555');
      drawHPBar(25,by+18,100,6,c.hp,c.maxHp);
      drawText(`${c.hp}/${c.maxHp}`,130,by+15,9,'#888');
    });
    const backIdx=team.length-2;
    drawButton(W/2-60,botY+10+backIdx*32,120,28,'Back',b.subIdx===backIdx);
  }

  // Animate HP
  if(b.hpAnimP!==undefined){
    const target=p?p.hp:0;
    if(Math.abs(b.hpAnimP-target)>0.5)b.hpAnimP+=(target-b.hpAnimP)*0.15;
    else b.hpAnimP=target;
  }
  if(b.hpAnimE!==undefined){
    const target=e?e.hp:0;
    if(Math.abs(b.hpAnimE-target)>0.5)b.hpAnimE+=(target-b.hpAnimE)*0.15;
    else b.hpAnimE=target;
  }
  if(b.shakeP>0)b.shakeP-=0.5;
  if(b.shakeE>0)b.shakeE-=0.5;
  if(b.flashP>0)b.flashP--;
  if(b.flashE>0)b.flashE--;
}

}

// Keyboard input for name entry
const mobNameInput=document.getElementById('mob-name');
mobNameInput.addEventListener('input',()=>{
  if((GS.scene==='intro'&&GS.introStep>=INTRO_TEXT.length)||GS.scene==='champNameEntry'){
    GS.player.name=mobNameInput.value.replace(/[^a-zA-Z0-9 ]/g,'').slice(0,12);
    mobNameInput.value=GS.player.name;
  }
});
function focusMobileNameInput(){
  mobNameInput.value=GS.player.name;
  mobNameInput.style.top='40%';mobNameInput.style.opacity='0.01';
  mobNameInput.focus();
}
function blurMobileNameInput(){
  mobNameInput.style.top='-100px';mobNameInput.style.opacity='0';
  mobNameInput.blur();
}
document.addEventListener('keydown',e=>{
  const isNameEntry=(GS.scene==='intro'&&GS.introStep>=INTRO_TEXT.length)||GS.scene==='champNameEntry';
  if(isNameEntry){
    if(e.key==='Backspace'){GS.player.name=GS.player.name.slice(0,-1);e.preventDefault();return}
    if(e.key==='Enter'&&GS.player.name.length>=1){
      blurMobileNameInput();
      if(GS.scene==='champNameEntry'){initChampionDefense()}
      else{GS.scene='starterPick';GS.starterHighlight=0}
      e.preventDefault();return;
    }
    if(e.key.length===1&&GS.player.name.length<12&&/[a-zA-Z0-9 ]/.test(e.key)){
      GS.player.name+=e.key;e.preventDefault();
    }
  }
},true);

function handleInput(key){
  SFX.click();
  const scene=GS.scene;

  if(scene==='title'){
    if(key==='ArrowUp'||key==='w')GS.menuIdx=Math.max(0,GS.menuIdx-1);
    if(key==='ArrowDown'||key==='s')GS.menuIdx=Math.min(2,GS.menuIdx+1);
    if(key==='Enter'||key===' '){
      if(GS.menuIdx===0){GS.scene='intro';GS.introStep=0;GS.textCharIdx=0;GS.player.name=''}
      if(GS.menuIdx===1){if(!loadGame()){/* no save */}}
      if(GS.menuIdx===2){
        // Champion Defense — need name first
        GS.scene='champNameEntry';GS.player.name='';GS.textCharIdx=0;
      }
    }
  }

  else if(scene==='intro'){
    if(key==='Enter'||key===' '){
      if(GS.introStep<INTRO_TEXT.length){
        if(GS.textDone){GS.introStep++;GS.textCharIdx=0;GS.textDone=false}
        else{GS.textCharIdx=999} // Skip typewriter
      }
    }
  }

  else if(scene==='starterPick'){
    if(key==='ArrowLeft'||key==='a')GS.starterHighlight=Math.max(0,GS.starterHighlight-1);
    if(key==='ArrowRight'||key==='d')GS.starterHighlight=Math.min(2,GS.starterHighlight+1);
    if(key==='Enter'||key===' '){
      const starterIds=[1,4,7];
      const starter=createCreature(starterIds[GS.starterHighlight],5);
      GS.player.team.push(starter);
      GS.player.caught.add(starter.specId);GS.player.seen.add(starter.specId);
      initExplore('town',8,7);
      saveGame();
    }
  }

  else if(scene==='explore'){
    handleExploreInput(key);
  }

  else if(scene==='overworld'){
    if(key==='ArrowUp'||key==='w')GS.menuIdx=Math.max(0,GS.menuIdx-1);
    if(key==='ArrowDown'||key==='s')GS.menuIdx=Math.min(6,GS.menuIdx+1);
    if(key==='Enter'||key===' ')handleOverworldSelect();
  }

  else if(scene==='battle'){
    handleBattleInput(key);
  }

  else if(scene==='team'){
    if(key==='Escape'||key==='Backspace'){
      GS.scene=GS.explore.prevScene==='champHub'?'champHub':GS.explore.prevScene==='explore'?'explore':'overworld';GS.menuIdx=2;
    }
  }

  else if(scene==='bag'){
    if(key==='Escape'||key==='Backspace'){
      GS.scene=GS.explore.prevScene==='champHub'?'champHub':GS.explore.prevScene==='explore'?'explore':'overworld';GS.menuIdx=3;
    }
  }

  else if(scene==='shop'){
    if(key==='ArrowUp'||key==='w')GS.menuIdx=Math.max(-1,GS.menuIdx-1);
    if(key==='ArrowDown'||key==='s')GS.menuIdx=Math.min(11,GS.menuIdx+1);
    if(key==='Escape'||key==='Backspace'){GS.scene=GS.explore.prevScene==='champHub'?'champHub':GS.explore.prevScene==='explore'?'explore':'overworld';GS.menuIdx=4}
    if(key==='Enter'||key===' ')handleShopBuy();
  }

  else if(scene==='routeSelect'){
    if(key==='ArrowUp'||key==='w')GS.menuIdx=Math.max(-1,GS.menuIdx-1);
    if(key==='ArrowDown'||key==='s')GS.menuIdx=Math.min(ROUTES.length-1,GS.menuIdx+1);
    if(key==='Escape'||key==='Backspace'){GS.scene='overworld';GS.menuIdx=5}
    if(key==='Enter'||key===' '){
      if(GS.menuIdx===-1){GS.scene='overworld';GS.menuIdx=5}
      else{
        const unlocked=GS.menuIdx<=GS.player.badges.length+1;
        if(unlocked){GS.route=GS.menuIdx;GS.scene='overworld';GS.menuIdx=0}
      }
    }
  }

  else if(scene==='arenaSelect'){
    if(key==='Escape'||key==='Backspace'){GS.scene=GS.explore.prevScene==='explore'?'explore':'overworld';GS.menuIdx=1}
    if(key==='Enter'||key===' '){
      if(GS.menuIdx===-1){GS.scene=GS.explore.prevScene==='explore'?'explore':'overworld';GS.menuIdx=1}
      else if(GS.arenaIdx>=8){
        if(GS.explore.prevScene==='explore')GS.explore.battleReturn={mapId:GS.explore.mapId,px:GS.explore.px,py:GS.explore.py};
        startBattle({champion:true});
      }else if(GS.menuIdx===GS.arenaIdx){
        if(GS.explore.prevScene==='explore')GS.explore.battleReturn={mapId:GS.explore.mapId,px:GS.explore.px,py:GS.explore.py};
        startBattle({arena:GS.arenaIdx});
      }
    }
  }

  else if(scene==='summary'){
    if(key==='Enter'||key===' '){
      // Check for evolution
      const evolveTarget=checkTeamEvolve();
      if(evolveTarget){
        startEvolve(evolveTarget);
      }else if(GS.champDef.active&&GS.battle?.isChampDef){
        // Champion Defense mode — return to hub
        champDefBattleEnd(!!GS.battle.playerWon);
      }else if(GS.explore.battleReturn){
        // Return to exploration after battle
        const br=GS.explore.battleReturn;
        // Mark trainer as defeated if it was a trainer battle
        if(br.trainerName&&GS.battle&&GS.battle.playerWon){
          GS.defeatedTrainers.add(br.trainerName);
          Object.values(MAPS).forEach(m=>{m.trainers.forEach(t=>{if(t.name===br.trainerName)t.beaten=true})});
        }
        GS.explore.battleReturn=null;
        initExplore(br.mapId,br.px,br.py);
        saveGame();
      }else{
        GS.scene='overworld';GS.menuIdx=0;saveGame();
      }
    }
  }

  else if(scene==='evolve'){
    if(key==='Enter'||key===' '){
      if(GS.evolving&&GS.evolving.timer>=60){
        GS.evolving=null;
        const next=checkTeamEvolve();
        if(next)startEvolve(next);
        else if(GS.champDef.active&&GS.battle?.isChampDef){
          champDefBattleEnd(!!GS.battle.playerWon);
        }else if(GS.explore.prevScene==='explore'){
          const br=GS.explore.battleReturn;
          if(br){GS.explore.battleReturn=null;initExplore(br.mapId,br.px,br.py)}
          else{GS.scene='explore'}
          saveGame();
        }else{GS.scene='overworld';GS.menuIdx=0;saveGame()}
      }
    }
  }

  else if(scene==='credits'){
    if(key==='Enter'||key===' '){
      if(GS.explore.prevScene==='explore'){initExplore(GS.explore.mapId,GS.explore.px,GS.explore.py)}
      else{GS.scene='overworld';GS.menuIdx=0}
    }
  }

  else if(scene==='champNameEntry'){
    // Name entry for champion defense mode (reuse keyboard handler below)
    if(key==='Enter'&&GS.player.name.length>=1){
      blurMobileNameInput();initChampionDefense();
    }
  }

  else if(scene==='champHub'){
    handleChampHubInput(key);
  }

  else if(scene==='champDefOver'){
    if(key==='ArrowUp'||key==='w')GS.menuIdx=Math.max(0,GS.menuIdx-1);
    if(key==='ArrowDown'||key==='s')GS.menuIdx=Math.min(1,GS.menuIdx+1);
    if(key==='Enter'||key===' '){
      if(GS.menuIdx===0){initChampionDefense()}
      else{GS.champDef.active=false;GS.scene='title';GS.menuIdx=0}
    }
  }
}

function handleClick(cx,cy){
  SFX.click();
  const scene=GS.scene;

  if(scene==='title'){
    const btnY=H*0.75;
    if(cy>=btnY&&cy<=btnY+38){GS.menuIdx=0;handleInput('Enter')}
    else if(cy>=btnY+46&&cy<=btnY+84){GS.menuIdx=1;handleInput('Enter')}
    else if(cy>=btnY+92&&cy<=btnY+130){GS.menuIdx=2;handleInput('Enter')}
  }

  else if(scene==='intro'){
    if(GS.introStep>=INTRO_TEXT.length){
      // Name entry screen — check Confirm button or focus input
      if(cy>=H*0.6+85&&cy<=H*0.6+115&&cx>=W/2-60&&cx<=W/2+60&&GS.player.name.length>=1){
        blurMobileNameInput();GS.scene='starterPick';GS.starterHighlight=0;
      }else{focusMobileNameInput()}
    }else{handleInput('Enter')}
  }

  else if(scene==='starterPick'){
    const cardW=isMobile?120:200,gap=isMobile?10:30;
    const startX=W/2-(cardW*1.5+gap);
    for(let i=0;i<3;i++){
      const left=startX+i*(cardW+gap);
      if(cx>=left&&cx<=left+cardW&&cy>=70&&cy<=400){GS.starterHighlight=i;return}
    }
    if(cy>=H-60){handleInput('Enter')}
  }

  else if(scene==='explore'){
    handleExploreClick(cx,cy);
  }

  else if(scene==='overworld'){
    const btnH=44,startY=70;
    for(let i=0;i<7;i++){
      const by=startY+i*(btnH+8);
      if(cy>=by&&cy<=by+btnH){GS.menuIdx=i;handleOverworldSelect();return}
    }
  }

  else if(scene==='battle'){
    handleBattleClick(cx,cy);
  }

  else if(scene==='team'){
    if(cx>=W-80&&cy<=38){GS.scene=GS.explore.prevScene==='champHub'?'champHub':GS.explore.prevScene==='explore'?'explore':'overworld';GS.menuIdx=2}
  }

  else if(scene==='bag'){
    if(cx>=W-80&&cy<=38){GS.scene=GS.explore.prevScene==='champHub'?'champHub':GS.explore.prevScene==='explore'?'explore':'overworld';GS.menuIdx=3}
  }

  else if(scene==='shop'){
    if(cx>=W-80&&cy<=38){GS.scene=GS.explore.prevScene==='champHub'?'champHub':GS.explore.prevScene==='explore'?'explore':'overworld';GS.menuIdx=4;return}
    const allItems=[...SHELLS.filter(s=>s.cost>0),...ITEM_DEFS];
    let y=55;
    allItems.forEach((item,i)=>{
      if(cy>=y&&cy<=y+40){GS.menuIdx=i;handleShopBuy();return}
      y+=46;
    });
  }

  else if(scene==='routeSelect'){
    if(cx>=W-80&&cy<=38){GS.scene='overworld';GS.menuIdx=5;return}
    ROUTES.forEach((r,i)=>{
      const y=55+i*42;
      if(cy>=y&&cy<=y+36){GS.menuIdx=i;handleInput('Enter')}
    });
  }

  else if(scene==='arenaSelect'){
    if(cx>=W-80&&cy<=38){GS.scene=GS.explore.prevScene==='explore'?'explore':'overworld';GS.menuIdx=1;return}
    if(GS.arenaIdx>=8&&cy>=100&&cy<=128){handleInput('Enter');return}
    ARENAS.forEach((a,i)=>{
      if(i===GS.arenaIdx&&i<8){
        const startY=55,rowY=startY+25+i*42;
        const btnX=W-90,btnY=rowY+4,btnW=75,btnH=28;
        if(cx>=btnX&&cx<=btnX+btnW&&cy>=btnY&&cy<=btnY+btnH){GS.menuIdx=i;handleInput('Enter')}
      }
    });
  }

  else if(scene==='summary'||scene==='credits'){handleInput('Enter')}

  else if(scene==='evolve'){handleInput('Enter')}

  else if(scene==='champNameEntry'){
    if(cy>=H*0.55&&cy<=H*0.55+40){focusMobileNameInput()}
    else if(cy>=H*0.65&&GS.player.name.length>=1){handleInput('Enter')}
  }

  else if(scene==='champHub'){handleChampHubClick(cx,cy)}

  else if(scene==='champDefOver'){
    if(cy>=H-100&&cy<=H-60){GS.menuIdx=0;handleInput('Enter')}
    else if(cy>=H-50&&cy<=H-10){GS.menuIdx=1;handleInput('Enter')}
  }
}

function handleOverworldSelect(){
  switch(GS.menuIdx){
    case 0: // Explore
      triggerWildEncounter();break;
    case 1: // Arena
      GS.scene='arenaSelect';GS.menuIdx=GS.arenaIdx;break;
    case 2: // Team
      GS.scene='team';GS.menuIdx=0;GS.subMenu=null;break;
    case 3: // Bag
      GS.scene='bag';GS.subMenu=null;break;
    case 4: // Shop
      GS.scene='shop';GS.menuIdx=0;break;
    case 5: // Routes
      GS.scene='routeSelect';GS.menuIdx=GS.route;break;
    case 6: // Save
      saveGame();break;
  }
}

function triggerWildEncounter(){
  const route=ROUTES[GS.route];
  const specId=pick(route.encounters);
  const level=rand(route.minLvl,route.maxLvl);
  const wild=createCreature(specId,level);
  wild.isWild=true;
  GS.player.seen.add(specId);
  startBattle({wild});
}

function handleBattleInput(key){
  const b=GS.battle;if(!b)return;

  // If messages pending, advance
  if(b.msgCurrent&&!b.msgDone){b.msgCharIdx=999;return}
  if(b.msgCurrent&&b.msgDone){
    if(!advanceBattleMsg()){
      b.msgCurrent='';
      // Check if battle ended
      checkBattleEnd();
    }
    return;
  }

  if(b.phase==='menu'){
    if(key==='ArrowUp'||key==='w')b.menuIdx=Math.max(0,b.menuIdx-1);
    if(key==='ArrowDown'||key==='s')b.menuIdx=Math.min(3,b.menuIdx+1);
    if(key==='ArrowLeft'||key==='a')b.menuIdx=Math.max(0,b.menuIdx-1);
    if(key==='ArrowRight'||key==='d')b.menuIdx=Math.min(3,b.menuIdx+1);
    if(key==='Enter'||key===' '){
      if(b.menuIdx===0){b.phase='moveSelect';b.subIdx=0}
      else if(b.menuIdx===1){
        if(b.isWild){b.phase='shellSelect';b.subIdx=0}
        else{b.phase='itemSelect';b.subIdx=0}
      }
      else if(b.menuIdx===2){
        if(b.isWild){b.phase='itemSelect';b.subIdx=0}
        else{b.phase='switchSelect';b.subIdx=0}
      }
      else if(b.menuIdx===3){
        if(b.isWild){attemptRun()}
      }
    }
  }

  else if(b.phase==='moveSelect'){
    const p=getActiveP();
    if(key==='ArrowUp'||key==='w')b.subIdx=Math.max(0,b.subIdx-1);
    if(key==='ArrowDown'||key==='s')b.subIdx=Math.min((p?.moves.length||1)-1,b.subIdx+1);
    if(key==='Escape'||key==='Backspace'){b.phase='menu';b.menuIdx=0}
    if(key==='Enter'||key===' '){
      if(p&&p.moves[b.subIdx]){
        executeTurn(b.subIdx);
      }
    }
  }

  else if(b.phase==='shellSelect'){
    const shells=GS.player.bag.shells;
    if(key==='ArrowUp'||key==='w')b.subIdx=Math.max(0,b.subIdx-1);
    if(key==='ArrowDown'||key==='s')b.subIdx=Math.min(shells.length,b.subIdx+1);
    if(key==='Escape'||key==='Backspace'){b.phase='menu';b.menuIdx=1}
    if(key==='Enter'||key===' '){
      if(b.subIdx<shells.length&&shells[b.subIdx].qty>0){
        useShell(b.subIdx);
      }else{b.phase='menu';b.menuIdx=1}
    }
  }

  else if(b.phase==='itemSelect'){
    const items=GS.player.bag.items;
    if(key==='ArrowUp'||key==='w')b.subIdx=Math.max(0,b.subIdx-1);
    if(key==='ArrowDown'||key==='s')b.subIdx=Math.min(items.length,b.subIdx+1);
    if(key==='Escape'||key==='Backspace'){b.phase='menu';b.menuIdx=2}
    if(key==='Enter'||key===' '){
      if(b.subIdx<items.length&&items[b.subIdx].qty>0){
        useItem(b.subIdx);
      }else{b.phase='menu';b.menuIdx=2}
    }
  }

  else if(b.phase==='switchSelect'){
    const team=b.playerTeam.filter((_,i)=>i!==b.playerActive);
    if(key==='ArrowUp'||key==='w')b.subIdx=Math.max(0,b.subIdx-1);
    if(key==='ArrowDown'||key==='s')b.subIdx=Math.min(team.length,b.subIdx+1);
    if(key==='Escape'||key==='Backspace'){b.phase='menu';b.menuIdx=0}
    if(key==='Enter'||key===' '){
      if(b.subIdx<team.length){
        // Find actual index
        let realIdx=-1,count=0;
        for(let i=0;i<b.playerTeam.length;i++){
          if(i===b.playerActive)continue;
          if(count===b.subIdx){realIdx=i;break}
          count++;
        }
        if(realIdx>=0&&b.playerTeam[realIdx].hp>0){
          switchCreature(realIdx);
        }
      }else{b.phase='menu';b.menuIdx=0}
    }
  }
}

function handleBattleClick(cx,cy){
  const b=GS.battle;if(!b)return;
  const botY=H*0.55+70;

  // Message advance
  if(b.msgCurrent){handleBattleInput('Enter');return}

  if(b.phase==='menu'){
    const bw=(W-30)/2-5,bh=38;
    for(let i=0;i<4;i++){
      const col=i%2,row=Math.floor(i/2);
      const bx=15+col*(bw+10),by=botY+10+row*(bh+6);
      if(cx>=bx&&cx<=bx+bw&&cy>=by&&cy<=by+bh){
        b.menuIdx=i;handleBattleInput('Enter');return;
      }
    }
  }

  else if(b.phase==='moveSelect'){
    const p=getActiveP();if(!p)return;
    p.moves.forEach((m,i)=>{
      const by=botY+10+i*36;
      if(cy>=by&&cy<=by+32){b.subIdx=i;handleBattleInput('Enter');return}
    });
    // Back area
    if(cy>botY+10+p.moves.length*36){handleBattleInput('Escape')}
  }

  else if(b.phase==='shellSelect'||b.phase==='itemSelect'){
    const list=b.phase==='shellSelect'?GS.player.bag.shells:GS.player.bag.items;
    list.forEach((item,i)=>{
      const by=botY+10+i*32;
      if(cy>=by&&cy<=by+28){b.subIdx=i;handleBattleInput('Enter');return}
    });
    // Back button area
    if(cy>=botY+10+list.length*32){b.subIdx=list.length;handleBattleInput('Enter')}
  }

  else if(b.phase==='switchSelect'){
    const team=b.playerTeam.filter((_,i)=>i!==b.playerActive);
    team.forEach((c,i)=>{
      const by=botY+10+i*32;
      if(cy>=by&&cy<=by+28){b.subIdx=i;handleBattleInput('Enter');return}
    });
    if(cy>=botY+10+team.length*32){handleBattleInput('Escape')}
  }
}

function executeTurn(moveIdx){
  const b=GS.battle;
  const p=getActiveP(),e=getActiveE();
  if(!p||!e)return;

  const pMove=p.moves[moveIdx];
  const eMove=aiChooseMove(e);

  // Determine order (speed + priority)
  const pPriority=MOVES[pMove.name]?.priority||0;
  const ePriority=eMove?MOVES[eMove.name]?.priority||0:0;
  let playerFirst=pPriority>ePriority||(pPriority===ePriority&&p.stats.spd>=e.stats.spd);
  if(p.status==='paralyze')playerFirst=playerFirst&&Math.random()>0.5;

  b.phase='execute';

  if(playerFirst){
    executeMove(p,e,pMove,true);
    if(e.hp>0&&eMove)executeMove(e,p,eMove,false);
  }else{
    if(eMove)executeMove(e,p,eMove,false);
    if(p.hp>0)executeMove(p,e,pMove,true);
  }

  // End of turn effects
  if(p.hp>0)endOfTurnEffects(p);
  if(e.hp>0)endOfTurnEffects(e);

  b.turn++;

  // Reset stat stages on HP anim targets
  b.hpAnimP=b.hpAnimP;b.hpAnimE=b.hpAnimE;

  checkBattleEnd();
}

function checkBattleEnd(){
  const b=GS.battle;if(!b)return;
  const p=getActiveP(),e=getActiveE();

  // Enemy fainted
  if(e&&e.hp<=0){
    // Check if more enemies
    const nextE=b.enemyTeam.findIndex((c,i)=>i>b.enemyActive&&c.hp>0);
    if(nextE>=0){
      battleMsg(`${e.name} fainted!`);SFX.faint();
      // Award XP
      const xp=getXpYield(e);
      if(p)awardXP(p,xp);
      b.enemyActive=nextE;
      const ne=getActiveE();
      battleMsg(`${b.trainerName} sent out ${ne.name}!`);
      b.hpAnimE=ne.hp;
      b.phase='menu';b.menuIdx=0;
      return;
    }
    // Player won
    battleMsg(`${e.name} fainted!`);SFX.faint();
    const xp=getXpYield(e);
    if(p){awardXP(p,xp);b.xpGained=xp}

    b.playerWon=true;

    if(b.isArena&&GS.arenaIdx<8){
      const arena=ARENAS[GS.arenaIdx];
      battleMsg(arena.defeat);
      battleMsg(`You earned the ${arena.badge}!`);
      GS.player.badges.push(arena.badge);
      GS.player.money+=2000*(GS.arenaIdx+1);
      battleMsg(`Received $${2000*(GS.arenaIdx+1)}!`);
      GS.arenaIdx++;
    }
    if(b.isChampion){
      battleMsg(CHAMPION.defeat);
      SFX.victory();
    }
    if(b.caught){
      battleMsg(`Gotcha! ${e.name} was caught!`);SFX.catch_();
    }

    // Transition to summary after messages clear
    setTimeout(()=>{
      if(b.isChampion){GS.scene='credits'}
      else{GS.scene='summary'}
      b.phase='done';
    },500);
    return;
  }

  // Player creature fainted
  if(p&&p.hp<=0){
    battleMsg(`${p.name} fainted!`);SFX.faint();
    // Find next alive
    const nextP=b.playerTeam.findIndex(c=>c.hp>0);
    if(nextP>=0){
      // Force switch
      b.playerActive=nextP;
      const np=getActiveP();
      battleMsg(`Go, ${np.name}!`);
      b.hpAnimP=np.hp;
      b.phase='menu';b.menuIdx=0;
      return;
    }
    // Player lost
    b.playerLost=true;
    battleMsg("All your Riftborn fainted!");
    // Heal team and return to overworld
    setTimeout(()=>{
      GS.player.team.forEach(c=>{c.hp=c.maxHp;c.status=null;c.statusTurns=0;c.leechSeed=false;
        c.statStages={atk:0,def:0,spAtk:0,spDef:0,spd:0};calcStats(c);
        c.moves.forEach(m=>{m.energy=m.maxEnergy})});
      GS.player.money=Math.max(0,GS.player.money-500);
      GS.scene='summary';
    },500);
    return;
  }

  // Continue battle
  if(b.phase==='execute'||b.phase==='intro')b.phase='menu';
  b.menuIdx=0;
}

function awardXP(creature,xp){
  creature.xp+=xp;
  while(creature.xp>=creature.xpNeeded){
    creature.xp-=creature.xpNeeded;
    creature.level++;
    creature.xpNeeded=creature.level*creature.level*3+10;
    const oldHpPct=creature.hp/creature.maxHp;
    calcStats(creature);
    creature.hp=Math.min(creature.maxHp,Math.max(creature.hp,Math.floor(creature.maxHp*oldHpPct)));
    battleMsg(`${creature.name} grew to level ${creature.level}!`);
    SFX.levelUp();

    // Check for new moves
    const spec=RB_BY_ID[creature.specId];
    if(spec&&spec.learnset&&spec.learnset[creature.level]){
      const newMove=spec.learnset[creature.level];
      if(!creature.moves.find(m=>m.name===newMove)){
        if(creature.moves.length<4){
          creature.moves.push({name:newMove,energy:MOVES[newMove]?.energy||10,maxEnergy:MOVES[newMove]?.energy||10});
          battleMsg(`${creature.name} learned ${newMove}!`);
        }else{
          // Replace weakest move
          let weakest=0,weakPow=999;
          creature.moves.forEach((m,i)=>{
            const pow=MOVES[m.name]?.power||0;
            if(pow<weakPow){weakPow=pow;weakest=i}
          });
          const old=creature.moves[weakest].name;
          creature.moves[weakest]={name:newMove,energy:MOVES[newMove]?.energy||10,maxEnergy:MOVES[newMove]?.energy||10};
          battleMsg(`${creature.name} forgot ${old} and learned ${newMove}!`);
        }
      }
    }
  }
}

function checkTeamEvolve(){
  for(let i=0;i<GS.player.team.length;i++){
    const c=GS.player.team[i];
    const evo=checkEvolve(c);
    if(evo)return{creature:c,idx:i,newId:evo};
  }
  return null;
}

function startEvolve(ev){
  GS.scene='evolve';
  GS.evolving={
    creature:ev.creature,
    oldId:ev.creature.specId,
    newId:ev.newId,
    level:ev.creature.level,
    timer:0,
    idx:ev.idx,
  };
  SFX.evolve();
}

function attemptRun(){
  const b=GS.battle;
  if(!b.isWild){battleMsg("Can't run from a trainer battle!");return}
  const p=getActiveP(),e=getActiveE();
  const chance=Math.min(0.9,(p?.stats.spd||50)/((e?.stats.spd||50)+30));
  if(Math.random()<chance){
    battleMsg("Got away safely!");
    b.escaped=true;
    setTimeout(()=>{
      if(GS.champDef.active&&b.isChampDef){GS.scene='champHub';GS.champDef.hubMenuIdx=0}
      else{GS.scene='overworld';GS.menuIdx=0}
    },300);
  }else{
    battleMsg("Couldn't escape!");
    // Enemy gets a turn
    const eMove=aiChooseMove(e);
    if(eMove)executeMove(e,p,eMove,false);
    if(p.hp>0)endOfTurnEffects(p);
    if(e.hp>0)endOfTurnEffects(e);
    checkBattleEnd();
  }
}

function useShell(bagIdx){
  const b=GS.battle;
  const shell=GS.player.bag.shells[bagIdx];
  if(!shell||shell.qty<=0)return;
  const e=getActiveE();
  if(!e||!b.isWild){battleMsg("Can't use that here!");b.phase='menu';return}
  shell.qty--;
  battleMsg(`Used ${SHELLS[shell.idx].name}!`);
  SFX.catch_();

  if(attemptCatch(e,shell.idx)){
    b.caught=true;
    GS.player.caught.add(e.specId);
    // Add to team or box
    const caught=createCreature(e.specId,e.level);
    caught.hp=e.hp;caught.status=e.status;
    if(GS.player.team.length<6)GS.player.team.push(caught);
    else GS.player.box.push(caught);
    battleMsg(`${e.name} was caught!`);
    e.hp=0;
    b.playerWon=true;
    setTimeout(()=>{GS.scene='summary'},500);
  }else{
    battleMsg("Oh no! It broke free!");
    SFX.fail();
    // Enemy turn
    const eMove=aiChooseMove(e);
    if(eMove)executeMove(e,getActiveP(),eMove,false);
    endOfTurnEffects(getActiveP());
    endOfTurnEffects(e);
    checkBattleEnd();
  }
}

function useItem(bagIdx){
  const b=GS.battle;
  const item=GS.player.bag.items[bagIdx];
  if(!item||item.qty<=0)return;
  const def=ITEM_DEFS[item.idx];
  const p=getActiveP();if(!p){b.phase='menu';return}

  if(def.type==='heal'){
    if(p.hp>=p.maxHp){battleMsg(`${p.name} is already at full HP!`);b.phase='menu';return}
    item.qty--;
    const heal=Math.min(def.value,p.maxHp-p.hp);
    p.hp+=heal;
    battleMsg(`${p.name} recovered ${heal} HP!`);SFX.heal();
  }else if(def.type==='revive'){
    // Find fainted
    const fainted=b.playerTeam.find(c=>c.hp<=0);
    if(!fainted){battleMsg("No fainted Riftborn!");b.phase='menu';return}
    item.qty--;
    fainted.hp=Math.floor(fainted.maxHp*def.value);
    fainted.status=null;
    battleMsg(`${fainted.name} was revived!`);SFX.heal();
  }else if(def.type==='status'){
    if(!p.status){battleMsg(`${p.name} has no status problems!`);b.phase='menu';return}
    if(def.value!=='all'&&p.status!==def.value){battleMsg("It won't have any effect!");b.phase='menu';return}
    item.qty--;
    p.status=null;p.statusTurns=0;
    battleMsg(`${p.name} was cured!`);SFX.heal();
  }

  // Remove empty items
  GS.player.bag.items=GS.player.bag.items.filter(i=>i.qty>0);

  // Enemy turn
  const e=getActiveE();
  const eMove=aiChooseMove(e);
  if(eMove)executeMove(e,p,eMove,false);
  endOfTurnEffects(p);
  if(e)endOfTurnEffects(e);
  checkBattleEnd();
}

function switchCreature(newIdx){
  const b=GS.battle;
  const old=getActiveP();
  b.playerActive=newIdx;
  const np=getActiveP();
  battleMsg(`Come back, ${old.name}!`);
  battleMsg(`Go, ${np.name}!`);
  b.hpAnimP=np.hp;

  // Enemy gets a free turn
  const e=getActiveE();
  const eMove=aiChooseMove(e);
  if(eMove)executeMove(e,np,eMove,false);
  endOfTurnEffects(np);
  if(e)endOfTurnEffects(e);
  checkBattleEnd();
}

function handleShopBuy(){
  const allItems=[
    ...SHELLS.filter(s=>s.cost>0).map((s,i)=>({...s,shopType:'shell',origIdx:i})),
    ...ITEM_DEFS.map((it,i)=>({...it,shopType:'item',origIdx:i})),
  ];
  if(GS.menuIdx<0||GS.menuIdx>=allItems.length)return;
  const item=allItems[GS.menuIdx];
  if(GS.player.money<item.cost)return;

  GS.player.money-=item.cost;

  if(item.shopType==='shell'){
    const existing=GS.player.bag.shells.find(s=>s.idx===item.origIdx);
    if(existing)existing.qty++;
    else GS.player.bag.shells.push({idx:item.origIdx,qty:1});
  }else{
    const existing=GS.player.bag.items.find(s=>s.idx===item.origIdx);
    if(existing)existing.qty++;
    else GS.player.bag.items.push({idx:item.origIdx,qty:1});
  }
  SFX.click();
}

// ============================================================
// EXPLORATION SYSTEM
// ============================================================
function initExplore(mapId,sx,sy){
  const m=MAPS[mapId];if(!m)return;
  _camInit=false; // Reset camera on map change
  GS.scene='explore';GS.explore.mapId=mapId;
  GS.explore.px=sx!=null?sx:m.spawn[0];GS.explore.py=sy!=null?sy:m.spawn[1];
  GS.explore.walking=false;GS.explore.walkProgress=0;GS.explore.encounterCooldown=3;
  GS.explore.msgText='';GS.explore.msgTimer=0;GS.explore.interacting=false;
  GS.explore.dir=0;GS.route=m.routeIdx>=0?m.routeIdx:GS.route;
}

function getTile(map,tx,ty){
  if(tx<0||ty<0||tx>=map.w||ty>=map.h)return '#';
  return map.tiles[ty][tx]||'#';
}

function isWalkable(tile){return tile==='.'||tile==='G'||tile==='H'||tile==='S'}

function movePlayer(dx,dy){
  const ex=GS.explore,m=MAPS[ex.mapId];if(!m||ex.walking)return;
  // Set facing direction
  if(dy>0)ex.dir=0;else if(dy<0)ex.dir=1;else if(dx<0)ex.dir=2;else if(dx>0)ex.dir=3;
  const tx=ex.px+dx,ty=ex.py+dy;
  // Check exits first
  for(const e of m.exits){
    if(tx===e.x&&ty===e.y){initExplore(e.to,e.sx,e.sy);return}
  }
  if(tx<0||ty<0||tx>=m.w||ty>=m.h)return;
  const tile=getTile(m,tx,ty);
  // Check for unbeaten trainer blocking or triggering
  for(const tr of m.trainers){
    if(tr.beaten||GS.defeatedTrainers.has(tr.name))continue;
    if(tr.x===tx&&tr.y===ty){
      // Trigger trainer battle
      startTrainerBattle(tr);return;
    }
  }
  // Check NPCs
  for(const n of m.npcs){
    if(n.x===tx&&n.y===ty){ex.msgText=n.msg;ex.msgTimer=180;return}
  }
  if(!isWalkable(tile))return;
  ex.walking=true;ex.targetX=tx;ex.targetY=ty;ex.walkProgress=0;ex.walkFrame++;
}

function startTrainerBattle(tr){
  GS.explore.battleReturn={mapId:GS.explore.mapId,px:GS.explore.px,py:GS.explore.py,trainerName:tr.name};
  GS.explore.prevScene='explore';
  startBattle({trainer:{name:tr.name,team:tr.team,greeting:tr.greeting,defeat:tr.defeat}});
}

function updateExplore(){
  const ex=GS.explore;
  if(ex.walking){
    ex.walkProgress+=0.12;
    if(ex.walkProgress>=1){
      ex.px=ex.targetX;ex.py=ex.targetY;ex.walking=false;ex.walkProgress=0;ex.steps++;
      if(ex.encounterCooldown>0)ex.encounterCooldown--;
      const m=MAPS[ex.mapId];
      const tile=getTile(m,ex.px,ex.py);
      if(tile==='G'&&ex.encounterCooldown<=0&&m.routeIdx>=0){
        if(Math.random()<0.15){
          ex.encounterCooldown=4;
          ex.battleReturn={mapId:ex.mapId,px:ex.px,py:ex.py};
          ex.prevScene='explore';
          const route=ROUTES[m.routeIdx];
          const specId=pick(route.encounters);
          const level=rand(route.minLvl,route.maxLvl);
          const wild=createCreature(specId,level);wild.isWild=true;
          GS.player.seen.add(specId);
          startBattle({wild});return;
        }
      }
      if(tile==='H'){
        GS.player.team.forEach(c=>{c.hp=c.maxHp;c.status=null;c.statusTurns=0;c.leechSeed=false;
          c.statStages={atk:0,def:0,spAtk:0,spDef:0,spd:0};calcStats(c);
          c.moves.forEach(mv=>{mv.energy=mv.maxEnergy})});
        SFX.heal();ex.msgText='Your team was fully healed!';ex.msgTimer=120;
      }
      if(tile==='S'){GS.explore.prevScene='explore';GS.scene='shop';GS.menuIdx=0}
      // Check for trainer line of sight (adjacent trainers)
      if(m.trainers){
        for(const tr of m.trainers){
          if(tr.beaten||GS.defeatedTrainers.has(tr.name))continue;
          const dist=Math.abs(tr.x-ex.px)+Math.abs(tr.y-ex.py);
          if(dist===1){startTrainerBattle(tr);return}
        }
      }
    }
  }
  // Continuous movement from held keys
  if(!ex.walking&&!ex.msgTimer){
    if(keys['ArrowUp']||keys['w'])movePlayer(0,-1);
    else if(keys['ArrowDown']||keys['s'])movePlayer(0,1);
    else if(keys['ArrowLeft']||keys['a'])movePlayer(-1,0);
    else if(keys['ArrowRight']||keys['d'])movePlayer(1,0);
  }
  if(ex.msgTimer>0)ex.msgTimer--;
  if(ex.msgTimer<=0)ex.msgText='';
}

function drawPlayerSprite(px,py,dir,frame,sz){
  const s=sz||16;
  // Body
  X.fillStyle='#00d4ff';
  X.fillRect(px-s*0.3,py-s*0.15,s*0.6,s*0.5);
  // Head
  X.fillStyle='#e0e0e0';
  X.beginPath();X.arc(px,py-s*0.3,s*0.25,0,Math.PI*2);X.fill();
  // Eyes based on direction
  X.fillStyle='#111';
  if(dir===0){X.fillRect(px-s*0.12,py-s*0.28,s*0.08,s*0.08);X.fillRect(px+s*0.04,py-s*0.28,s*0.08,s*0.08)}
  else if(dir===1){X.fillRect(px-s*0.1,py-s*0.38,s*0.06,s*0.06);X.fillRect(px+s*0.04,py-s*0.38,s*0.06,s*0.06)}
  else if(dir===2){X.fillRect(px-s*0.2,py-s*0.3,s*0.08,s*0.08)}
  else{X.fillRect(px+s*0.12,py-s*0.3,s*0.08,s*0.08)}
  // Legs
  X.strokeStyle='#0088aa';X.lineWidth=Math.max(1,s*0.08);
  const legOff=(frame%2===0)?s*0.1:-s*0.1;
  X.beginPath();X.moveTo(px-s*0.15,py+s*0.35);X.lineTo(px-s*0.15+(GS.explore.walking?legOff:0),py+s*0.55);X.stroke();
  X.beginPath();X.moveTo(px+s*0.15,py+s*0.35);X.lineTo(px+s*0.15+(GS.explore.walking?-legOff:0),py+s*0.55);X.stroke();
}

// Smooth camera state
let _camX=0,_camY=0,_camInit=false;

function drawExplore(){
  const ex=GS.explore,m=MAPS[ex.mapId];if(!m)return;
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);

  // Fixed tile size — larger for zoomed-in feel
  const ts=isMobile?36:40;
  const t=Date.now()/1000;
  const headerH=28,footerH=42;
  const viewW=W,viewH=H-headerH-footerH;

  // Player world position (with walk lerp)
  const lerpX=ex.walking?ex.px+(ex.targetX-ex.px)*ex.walkProgress:ex.px;
  const lerpY=ex.walking?ex.py+(ex.targetY-ex.py)*ex.walkProgress:ex.py;
  const playerWX=(lerpX+0.5)*ts,playerWY=(lerpY+0.5)*ts;

  // Target camera: center on player
  const targetCamX=playerWX-viewW/2;
  const targetCamY=playerWY-viewH/2;
  // Clamp to map bounds
  const maxCamX=Math.max(0,m.w*ts-viewW),maxCamY=Math.max(0,m.h*ts-viewH);
  const clampedX=clamp(targetCamX,0,maxCamX),clampedY=clamp(targetCamY,0,maxCamY);
  // Smooth follow
  if(!_camInit){_camX=clampedX;_camY=clampedY;_camInit=true}
  else{_camX+=(clampedX-_camX)*0.15;_camY+=(clampedY-_camY)*0.15}

  // Draw visible tiles
  X.save();
  X.beginPath();X.rect(0,headerH,viewW,viewH);X.clip();
  const ox=-_camX,oy=-_camY+headerH;
  const startTX=Math.max(0,Math.floor(_camX/ts)),endTX=Math.min(m.w,Math.ceil((_camX+viewW)/ts)+1);
  const startTY=Math.max(0,Math.floor(_camY/ts)),endTY=Math.min(m.h,Math.ceil((_camY+viewH)/ts)+1);

  for(let ty=startTY;ty<endTY;ty++)for(let tx=startTX;tx<endTX;tx++){
    const tile=m.tiles[ty]?m.tiles[ty][tx]:undefined;if(!tile)continue;
    const dx=ox+tx*ts,dy=oy+ty*ts;
    // Ground base
    if(tile==='.'||tile==='H'||tile==='S'){
      X.fillStyle='#2a2015';X.fillRect(dx,dy,ts,ts);
      // Subtle path texture
      X.fillStyle='#2e2418';
      X.fillRect(dx+ts*0.1,dy+ts*0.4,ts*0.3,ts*0.15);
      X.fillRect(dx+ts*0.5,dy+ts*0.7,ts*0.25,ts*0.1);
    }
    else if(tile==='G'){
      X.fillStyle='#1a4a1a';X.fillRect(dx,dy,ts,ts);
      // Varied grass blades
      for(let g=0;g<4;g++){
        const gx=dx+ts*0.1+g*ts*0.22,gy=dy+ts*0.25;
        const sway=Math.sin(t*2+tx*0.7+ty*0.5+g)*ts*0.06;
        const h=ts*(0.35+((tx*3+ty*7+g)%5)*0.06);
        X.fillStyle=g%2===0?'#1a5a1a':'#2a6a2a';
        X.fillRect(gx+sway,gy,ts*0.06,h);
        X.fillRect(gx+sway-ts*0.05,gy,ts*0.16,ts*0.06);
      }
      // Flower dots on some grass tiles
      if((tx*7+ty*13)%11<3){
        X.fillStyle=[(tx+ty)%2===0?'#ffaa44':'#ff6688','#aaddff'][(tx+ty)%2];
        X.beginPath();X.arc(dx+ts*0.7,dy+ts*0.6,ts*0.06,0,Math.PI*2);X.fill();
      }
    }
    else if(tile==='T'){
      X.fillStyle='#1a2a0a';X.fillRect(dx,dy,ts,ts);
      // Tree trunk
      X.fillStyle='#3a2a1a';X.fillRect(dx+ts*0.38,dy+ts*0.5,ts*0.24,ts*0.5);
      // Tree canopy layers
      X.fillStyle='#0a4a0a';X.beginPath();X.arc(dx+ts/2,dy+ts*0.35,ts*0.38,0,Math.PI*2);X.fill();
      X.fillStyle='#0a5a0a';X.beginPath();X.arc(dx+ts*0.45,dy+ts*0.28,ts*0.22,0,Math.PI*2);X.fill();
      X.fillStyle='#1a6a1a';X.beginPath();X.arc(dx+ts*0.6,dy+ts*0.3,ts*0.18,0,Math.PI*2);X.fill();
    }
    else if(tile==='W'){
      X.fillStyle='#1a3a6a';X.fillRect(dx,dy,ts,ts);
      // Animated water waves
      X.strokeStyle='#2a5a9a';X.lineWidth=1.5;
      for(let wl=0;wl<2;wl++){
        const wy=dy+ts*(0.3+wl*0.35);
        X.beginPath();X.moveTo(dx,wy+Math.sin(t*2+tx+wl)*ts*0.08);
        X.quadraticCurveTo(dx+ts*0.33,wy+Math.sin(t*2+tx+0.7+wl)*ts*0.08,dx+ts*0.66,wy+Math.sin(t*2+tx+1.4+wl)*ts*0.08);
        X.quadraticCurveTo(dx+ts*0.83,wy+Math.sin(t*2+tx+2.1+wl)*ts*0.08,dx+ts,wy+Math.sin(t*2+tx+2.8+wl)*ts*0.08);
        X.stroke();
      }
      // Shimmer
      X.fillStyle='rgba(100,180,255,0.12)';
      X.fillRect(dx+ts*(0.2+Math.sin(t+tx)*0.1),dy+ts*0.15,ts*0.15,ts*0.08);
    }
    else if(tile==='#'){
      X.fillStyle='#3a3a4a';X.fillRect(dx,dy,ts,ts);
      X.fillStyle='#2a2a3a';X.fillRect(dx+1,dy+1,ts-2,ts*0.4);
      // Rock cracks
      X.strokeStyle='#222233';X.lineWidth=1;
      X.beginPath();X.moveTo(dx+ts*0.3,dy+ts*0.5);X.lineTo(dx+ts*0.5,dy+ts*0.7);X.lineTo(dx+ts*0.7,dy+ts*0.6);X.stroke();
    }
    // Heal center cross
    if(tile==='H'){
      X.fillStyle='#442222';X.fillRect(dx+ts*0.15,dy+ts*0.15,ts*0.7,ts*0.7);
      X.fillStyle='#ff3333';X.fillRect(dx+ts*0.35,dy+ts*0.2,ts*0.3,ts*0.6);
      X.fillRect(dx+ts*0.2,dy+ts*0.35,ts*0.6,ts*0.3);
      // Glow pulse
      X.globalAlpha=0.15+Math.sin(t*3)*0.1;X.fillStyle='#ff5555';
      X.beginPath();X.arc(dx+ts/2,dy+ts/2,ts*0.45,0,Math.PI*2);X.fill();X.globalAlpha=1;
    }
    // Shop
    if(tile==='S'){
      X.fillStyle='#223355';X.fillRect(dx+ts*0.15,dy+ts*0.1,ts*0.7,ts*0.55);
      X.fillStyle='#334477';X.fillRect(dx+ts*0.15,dy+ts*0.1,ts*0.7,ts*0.15);
      X.fillStyle='#ffcc00';X.font=`bold ${Math.max(10,ts*0.35)}px monospace`;
      X.textAlign='center';X.fillText('$',dx+ts/2,dy+ts*0.52);X.textAlign='left';
    }
  }

  // Draw exits as subtle arrows
  if(m.exits){m.exits.forEach(exit=>{
    const ex2=ox+exit.x*ts+ts/2,ey2=oy+exit.y*ts+ts/2;
    X.globalAlpha=0.3+Math.sin(t*3)*0.15;X.fillStyle='#7b68ee';
    const dir=exit.x===0?'left':exit.x>=m.w-1?'right':exit.y===0?'up':'down';
    X.beginPath();
    if(dir==='right'){X.moveTo(ex2+ts*0.1,ey2-ts*0.2);X.lineTo(ex2+ts*0.35,ey2);X.lineTo(ex2+ts*0.1,ey2+ts*0.2)}
    else if(dir==='left'){X.moveTo(ex2-ts*0.1,ey2-ts*0.2);X.lineTo(ex2-ts*0.35,ey2);X.lineTo(ex2-ts*0.1,ey2+ts*0.2)}
    X.fill();X.globalAlpha=1;
  })}

  // Draw NPCs with better sprites
  m.npcs.forEach(n=>{
    const nx=ox+n.x*ts+ts/2,ny=oy+n.y*ts+ts/2;
    // Body
    X.fillStyle='#dd8833';X.fillRect(nx-ts*0.2,ny-ts*0.05,ts*0.4,ts*0.35);
    // Head
    X.fillStyle='#ffe0b0';X.beginPath();X.arc(nx,ny-ts*0.2,ts*0.18,0,Math.PI*2);X.fill();
    // Name label
    X.fillStyle='#fff';X.font=`${Math.max(9,ts*0.25)}px monospace`;
    X.textAlign='center';X.fillText(n.name.split(' ')[0],nx,ny-ts*0.45);X.textAlign='left';
  });

  // Draw trainers with exclamation mark
  m.trainers.forEach(tr=>{
    if(tr.beaten||GS.defeatedTrainers.has(tr.name))return;
    const tx2=ox+tr.x*ts+ts/2,ty2=oy+tr.y*ts+ts/2;
    // Body
    X.fillStyle='#cc3355';X.fillRect(tx2-ts*0.2,ty2-ts*0.05,ts*0.4,ts*0.35);
    // Head
    X.fillStyle='#e0d0c0';X.beginPath();X.arc(tx2,ty2-ts*0.2,ts*0.18,0,Math.PI*2);X.fill();
    // Bouncing exclamation
    const bounce=Math.abs(Math.sin(t*4))*ts*0.1;
    X.fillStyle='#ffcc00';X.font=`bold ${Math.max(12,ts*0.4)}px monospace`;
    X.textAlign='center';X.fillText('!',tx2,ty2-ts*0.4-bounce);X.textAlign='left';
  });

  // Draw player
  const ppx=ox+lerpX*ts+ts/2,ppy=oy+lerpY*ts+ts/2;
  drawPlayerSprite(ppx,ppy,ex.dir,ex.walkFrame,ts*0.85);
  // Player shadow
  X.globalAlpha=0.2;X.fillStyle='#000';
  X.beginPath();X.ellipse(ppx,ppy+ts*0.45,ts*0.25,ts*0.08,0,0,Math.PI*2);X.fill();
  X.globalAlpha=1;

  X.restore(); // End clip

  // Map name header
  drawRect(0,0,W,headerH,'#12122aee');
  drawText(m.name,10,5,14,'#e0e0e0');
  drawText(`$${GS.player.money}`,W/2-20,5,11,'#ffcc00');
  const tp=GS.player.team;
  for(let i=0;i<tp.length;i++){
    X.fillStyle=tp[i].hp>0?TYPE_COLORS[tp[i].type]:'#333';
    X.beginPath();X.arc(W-15-i*20,14,7,0,Math.PI*2);X.fill();
    if(tp[i].hp<=0){X.strokeStyle='#ff3333';X.lineWidth=1.5;X.beginPath();X.moveTo(W-19-i*20,10);X.lineTo(W-11-i*20,18);X.stroke()}
  }

  // Quick buttons at bottom
  const btnW2=isMobile?70:80,btnH2=32,btnY2=H-38;
  drawRect(0,H-footerH,W,footerH,'#12122aee');
  const btns=[{l:'Team',k:'t'},{l:'Bag',k:'b'},{l:'Save',k:'p'},{l:'Arena',k:'r'}];
  btns.forEach((b,i)=>{
    const bx=10+i*(btnW2+6);
    drawButton(bx,btnY2,btnW2,btnH2,b.l,false);
  });

  // D-pad for mobile (overlay on map area)
  if(isMobile){
    const dp=40,dcx=55,dcy=H-130;
    X.globalAlpha=0.3;X.fillStyle='#445';
    X.beginPath();X.roundRect(dcx-dp/2,dcy-dp*1.5,dp,dp,6);X.fill();// up
    X.beginPath();X.roundRect(dcx-dp/2,dcy+dp*0.5,dp,dp,6);X.fill();// down
    X.beginPath();X.roundRect(dcx-dp*1.5,dcy-dp/2,dp,dp,6);X.fill();// left
    X.beginPath();X.roundRect(dcx+dp*0.5,dcy-dp/2,dp,dp,6);X.fill();// right
    X.globalAlpha=0.7;X.fillStyle='#aaa';X.font='18px monospace';X.textAlign='center';
    X.fillText('\u25B2',dcx,dcy-dp*0.82);X.fillText('\u25BC',dcx,dcy+dp*1.18);
    X.fillText('\u25C0',dcx-dp,dcy+6);X.fillText('\u25B6',dcx+dp,dcy+6);
    X.globalAlpha=1;X.textAlign='left';
  }

  // Message box
  if(ex.msgText){
    const mbh=50,mby=isMobile?H-180:H-95;
    drawRect(10,mby,W-20,mbh,'rgba(20,20,40,0.92)',8);
    X.strokeStyle='#4488ff';X.lineWidth=2;X.beginPath();X.roundRect(10,mby,W-20,mbh,8);X.stroke();
    drawText(ex.msgText,24,mby+15,13,'#e0e0e0');
  }
}

function handleExploreInput(key){
  const ex=GS.explore;
  if(ex.msgText&&ex.msgTimer>0){ex.msgTimer=0;ex.msgText='';return}
  if(key==='ArrowUp'||key==='w')movePlayer(0,-1);
  else if(key==='ArrowDown'||key==='s')movePlayer(0,1);
  else if(key==='ArrowLeft'||key==='a')movePlayer(-1,0);
  else if(key==='ArrowRight'||key==='d')movePlayer(1,0);
  else if(key==='t'){GS.explore.prevScene='explore';GS.scene='team';GS.menuIdx=0;GS.subMenu=null}
  else if(key==='b'){GS.explore.prevScene='explore';GS.scene='bag';GS.subMenu=null}
  else if(key==='p'){saveGame();ex.msgText='Game saved!';ex.msgTimer=90}
  else if(key==='r'){GS.explore.prevScene='explore';GS.scene='arenaSelect';GS.menuIdx=GS.arenaIdx}
  else if(key==='Enter'||key===' '){
    // Interact with facing tile
    const m=MAPS[ex.mapId],dx2=[0,0,-1,1][ex.dir],dy2=[1,-1,0,0][ex.dir];
    const fx=ex.px+dx2,fy=ex.py+dy2;
    for(const n of m.npcs){if(n.x===fx&&n.y===fy){ex.msgText=n.msg;ex.msgTimer=180;return}}
    for(const tr of m.trainers){if(tr.x===fx&&tr.y===fy&&!tr.beaten&&!GS.defeatedTrainers.has(tr.name)){startTrainerBattle(tr);return}}
    const ft=getTile(m,fx,fy);
    if(ft==='H'){
      GS.player.team.forEach(c=>{c.hp=c.maxHp;c.status=null;c.statusTurns=0;c.leechSeed=false;
        c.statStages={atk:0,def:0,spAtk:0,spDef:0,spd:0};calcStats(c);
        c.moves.forEach(mv=>{mv.energy=mv.maxEnergy})});
      SFX.heal();ex.msgText='Your team was fully healed!';ex.msgTimer=120;
    }
    if(ft==='S'){GS.explore.prevScene='explore';GS.scene='shop';GS.menuIdx=0}
  }
}

function handleExploreClick(cx,cy){
  const ex=GS.explore;
  // Dismiss message
  if(ex.msgText&&ex.msgTimer>0){ex.msgTimer=0;ex.msgText='';return}
  // Quick buttons
  const btnW2=isMobile?70:80,btnH2=32,btnY2=H-38;
  const btns=['t','b','p','r'];
  for(let i=0;i<btns.length;i++){
    const bx=10+i*(btnW2+6);
    if(cx>=bx&&cx<=bx+btnW2&&cy>=btnY2&&cy<=btnY2+btnH2){handleExploreInput(btns[i]);return}
  }
  // D-pad for mobile
  if(isMobile){
    const ts2=Math.floor(Math.min(W/16,(H-40)/12))*1.2,dcx=60,dcy=H-120;
    if(cx>=dcx-ts2/2&&cx<=dcx+ts2/2&&cy>=dcy-ts2*1.5&&cy<=dcy-ts2*0.5)movePlayer(0,-1);
    else if(cx>=dcx-ts2/2&&cx<=dcx+ts2/2&&cy>=dcy+ts2*0.5&&cy<=dcy+ts2*1.5)movePlayer(0,1);
    else if(cx>=dcx-ts2*1.5&&cx<=dcx-ts2*0.5&&cy>=dcy-ts2/2&&cy<=dcy+ts2/2)movePlayer(-1,0);
    else if(cx>=dcx+ts2*0.5&&cx<=dcx+ts2*1.5&&cy>=dcy-ts2/2&&cy<=dcy+ts2/2)movePlayer(1,0);
  }
}
