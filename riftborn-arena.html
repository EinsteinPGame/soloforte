function getCreatureVisuals(specId){
  return{
    bodyHue:(specId*37)%360,
    hasHorns:specId%7===0,
    hasTail:specId%3!==0,
    tailStyle:specId%4,
    earStyle:specId%3,
    patternType:specId%5,
    sizeModifier:0.85+(specId%5)*0.08,
    accentR:((specId*73+50)%200+55),
    accentG:((specId*31+80)%200+55),
    accentB:((specId*97+30)%200+55),
  };
}

// ============================================================
// CHAMPION DEFENSE MODE
// ============================================================
const CHALLENGER_NAMES=['Ash','Nova','Drake','Luna','Rex','Kai','Ivy','Sol','Nyx','Blaze',
  'Storm','Frost','Ember','Coral','Shade','Bolt','Lyra','Zara','Finn','Ruby',
  'Jade','Onyx','Flint','Marina','Prism','Sage','Raven','Leo','Aria','Cinder'];
const CHALLENGER_TITLES=['Rookie','Trainer','Ace','Veteran','Elite','Master','Grandmaster','Legend'];

function initChampionDefense(){
  GS.champDef.active=true;GS.champDef.streak=0;GS.champDef.difficulty=1;
  GS.champDef.healPct=0.7;GS.champDef.catchUsed=false;
  GS.champDef.bestStreak=parseInt(localStorage.getItem('riftborn_champbest')||'0');
  // Build champion team — 3 strong starters
  GS.player.name=GS.player.name||'Champion';
  GS.player.team=[
    createCreature(3,50),  // Ignivolt
    createCreature(6,48),  // Abyssurge
    createCreature(9,48),  // Elderoot
  ];
  GS.player.bag={shells:[{idx:0,qty:10},{idx:1,qty:5}],items:[{idx:0,qty:5},{idx:1,qty:3}]};
  GS.player.money=5000;
  GS.player.badges=['Ember Badge','Tide Badge','Bloom Badge','Volt Badge','Frost Badge','Phantom Badge','Crystal Badge','Eclipse Badge'];
  GS.player.seen=new Set([1,2,3,4,5,6,7,8,9]);GS.player.caught=new Set([3,6,9]);
  GS.scene='champHub';GS.champDef.hubMenuIdx=0;
  generateChallenger();
}

function generateChallenger(){
  const cd=GS.champDef;const d=cd.difficulty;
  cd.challengerName=pick(CHALLENGER_NAMES);
  const titleIdx=Math.min(CHALLENGER_TITLES.length-1,Math.floor((d-1)/2));
  cd.challengerName=CHALLENGER_TITLES[titleIdx]+' '+cd.challengerName;
  // Build team: size scales with difficulty
  const teamSize=Math.min(6,2+Math.floor(d/2));
  const baseLvl=Math.min(80,42+d*4);
  const team=[];
  const usedIds=new Set();
  for(let i=0;i<teamSize;i++){
    let specId;
    // Higher difficulty = stronger creatures (evolved forms, legendaries at high streaks)
    if(d>=8&&i===0&&Math.random()<0.4){
      specId=pick([106,107,108]); // legendaries
    }else if(d>=3){
      // Pick from evolved forms
      const evolved=RIFTBORN_DB.filter(r=>!r.evolves&&!r.legendary&&r.stats.hp>=60&&!usedIds.has(r.id));
      specId=evolved.length>0?pick(evolved).id:pick(RIFTBORN_DB.filter(r=>!usedIds.has(r.id))).id;
    }else{
      const pool=RIFTBORN_DB.filter(r=>!r.legendary&&!usedIds.has(r.id));
      specId=pick(pool).id;
    }
    usedIds.add(specId);
    const lvl=baseLvl+rand(-3,3);
    team.push({id:specId,level:Math.max(5,lvl)});
  }
  cd.challengerTeam=team;
  cd.catchUsed=false;
}

function champPartialHeal(){
  const pct=GS.champDef.healPct;
  GS.player.team.forEach(c=>{
    if(c.hp<=0){c.hp=Math.floor(c.maxHp*0.3)} // revive fainted to 30%
    else{c.hp=Math.min(c.maxHp,c.hp+Math.floor(c.maxHp*pct))}
    c.status=null;c.statusTurns=0;c.leechSeed=false;
    c.statStages={atk:0,def:0,spAtk:0,spDef:0,spd:0};calcStats(c);
    c.moves.forEach(m=>{m.energy=Math.min(m.maxEnergy,m.energy+Math.floor(m.maxEnergy*pct))});
  });
}

function drawChampNameEntry(){
  X.fillStyle='#05051a';X.fillRect(0,0,W,H);
  drawTextCenter('CHAMPION DEFENSE',W/2,H*0.15,24,'#ffd700');
  drawTextCenter('Defend your title against endless challengers!',W/2,H*0.15+35,13,'#aaa');
  drawTextCenter('Enter your name, Champion:',W/2,H*0.45,16,'#e0e0e0');
  drawRect(W/2-100,H*0.55-10,200,36,'#1a1a3e',8);
  X.strokeStyle='#ffd700';X.lineWidth=2;X.beginPath();X.roundRect(W/2-100,H*0.55-10,200,36,8);X.stroke();
  drawTextCenter(GS.player.name+(Date.now()%1000<500?'|':''),W/2,H*0.55,16,'#e0e0e0');
  if(GS.player.name.length>=1)drawButton(W/2-60,H*0.65,120,36,'START!',true,'#554400');
}

function drawChampHub(){
  X.fillStyle='#05051a';X.fillRect(0,0,W,H);
  const cd=GS.champDef;
  const t=Date.now()/1000;

  // Gold particles
  X.globalAlpha=0.15;
  for(let i=0;i<15;i++){
    X.fillStyle='#ffd700';
    X.beginPath();X.arc((Math.sin(t*0.3+i*1.3)*0.5+0.5)*W,(Math.cos(t*0.2+i*2.1)*0.5+0.5)*H,2+Math.sin(t+i)*1.5,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // Title
  drawTextCenter('CHAMPION DEFENSE',W/2,20,22,'#ffd700');
  drawTextCenter(`Streak: ${cd.streak}`,W/2,48,16,'#e0e0e0');
  if(cd.bestStreak>0)drawTextCenter(`Best: ${cd.bestStreak}`,W/2,68,12,'#888');

  // Heal info
  const healPctShow=Math.round(cd.healPct*100);
  drawTextCenter(`Heal between rounds: ${healPctShow}%`,W/2,90,12,healPctShow>50?'#44cc44':healPctShow>30?'#ccaa22':'#cc3333');

  // Next challenger info
  drawRect(20,110,W-40,70,'#12122a',10);
  X.strokeStyle='#ffd700';X.lineWidth=1;X.beginPath();X.roundRect(20,110,W-40,70,10);X.stroke();
  drawText('Next Challenger:',30,118,12,'#aaa');
  drawText(cd.challengerName,30,136,16,'#ff6644');
  const cTeamSize=cd.challengerTeam.length;
  const cLvl=cd.challengerTeam[0]?.level||50;
  drawText(`${cTeamSize} Riftborn, ~Lv ${cLvl}`,30,158,12,'#888');

  // Team preview
  drawRect(20,195,W-40,90,'#12122a',10);
  drawText('Your Team:',30,203,12,'#7b68ee');
  const tp=GS.player.team;
  tp.forEach((c,i)=>{
    const tx=30+i*(isMobile?55:80),ty=220;
    const spec=RB_BY_ID[c.specId];
    if(spec)drawCreature(tx+22,ty+18,spec,c.level,false,20);
    drawText(c.name.substring(0,6),tx,ty+42,9,c.hp>0?'#ccc':'#555');
    drawHPBar(tx,ty+53,isMobile?48:68,5,c.hp,c.maxHp);
    drawText(`L${c.level}`,tx,ty+60,8,'#888');
  });

  // Action buttons
  const btnW=W-60,btnH=40,startY=300;
  const btns=[
    {label:'BATTLE Challenger!',color:'#553322'},
    {label:cd.catchUsed?'Catch Phase (used)':'Catch Wild Riftborn',color:cd.catchUsed?'#222':'#223355'},
    {label:'View Team',color:null},
    {label:'View Bag',color:null},
  ];
  btns.forEach((b,i)=>{
    const sel=cd.hubMenuIdx===i;
    const by=startY+i*(btnH+8);
    drawButton(30,by,btnW,btnH,b.label,sel,b.color);
  });

  drawTextCenter(`$${GS.player.money}`,W/2,H-30,12,'#ffcc00');
}

function handleChampHubInput(key){
  const cd=GS.champDef;
  if(key==='ArrowUp'||key==='w')cd.hubMenuIdx=Math.max(0,cd.hubMenuIdx-1);
  if(key==='ArrowDown'||key==='s')cd.hubMenuIdx=Math.min(3,cd.hubMenuIdx+1);
  if(key==='Enter'||key===' '){
    if(cd.hubMenuIdx===0){
      // Start battle against challenger
      GS.explore.prevScene='champHub';
      startBattle({trainer:{name:cd.challengerName,team:cd.challengerTeam,
        greeting:`I'm ${cd.challengerName}! I challenge you for the Champion title!`,
        defeat:"You're too strong... The Champion title is yours!"}});
      GS.battle.isChampDef=true;
    }else if(cd.hubMenuIdx===1&&!cd.catchUsed){
      // Catch phase — one wild encounter on Champions Road
      cd.catchUsed=true;
      GS.explore.prevScene='champHub';
      const route=ROUTES[8]; // Champions Road
      const specId=pick(route.encounters);
      const level=rand(route.minLvl,route.maxLvl);
      const wild=createCreature(specId,level);wild.isWild=true;
      GS.player.seen.add(specId);
      startBattle({wild});
      GS.battle.isChampDef=true;
    }else if(cd.hubMenuIdx===2){
      GS.explore.prevScene='champHub';GS.scene='team';GS.menuIdx=0;GS.subMenu=null;
    }else if(cd.hubMenuIdx===3){
      GS.explore.prevScene='champHub';GS.scene='bag';GS.subMenu=null;
    }
  }
}

function handleChampHubClick(cx,cy){
  const cd=GS.champDef;
  const btnW=W-60,btnH=40,startY=300;
  for(let i=0;i<4;i++){
    const by=startY+i*(btnH+8);
    if(cx>=30&&cx<=30+btnW&&cy>=by&&cy<=by+btnH){
      cd.hubMenuIdx=i;handleChampHubInput('Enter');return;
    }
  }
}

function champDefBattleEnd(won){
  const cd=GS.champDef;
  if(won){
    cd.streak++;
    if(cd.streak>cd.bestStreak){cd.bestStreak=cd.streak;localStorage.setItem('riftborn_champbest',''+cd.bestStreak)}
    cd.difficulty++;
    cd.healPct=Math.max(0.2,cd.healPct-0.03); // heal decreases each round
    champPartialHeal();
    generateChallenger();
    GS.scene='champHub';cd.hubMenuIdx=0;
  }else{
    // Game over — show results
    GS.scene='champDefOver';
  }
}

function drawChampDefOver(){
  X.fillStyle='#05051a';X.fillRect(0,0,W,H);
  const cd=GS.champDef;
  const t=Date.now()/1000;

  X.globalAlpha=0.1;
  for(let i=0;i<20;i++){
    X.fillStyle=TYPE_COLORS[TYPES[i%18]];
    X.beginPath();X.arc((Math.sin(t*0.3+i)*0.5+0.5)*W,(Math.cos(t*0.2+i*1.5)*0.5+0.5)*H,3,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  drawTextCenter('TITLE LOST!',W/2,60,28,'#ff4444');
  drawTextCenter(`${cd.challengerName} defeated you...`,W/2,100,14,'#aaa');
  drawTextCenter(`Final Streak: ${cd.streak}`,W/2,150,22,'#ffd700');
  if(cd.streak===cd.bestStreak&&cd.streak>0)drawTextCenter('NEW BEST!',W/2,180,16,'#44cc44');
  else if(cd.bestStreak>0)drawTextCenter(`Best: ${cd.bestStreak}`,W/2,180,14,'#888');

  // Stats
  const statY=220;
  drawTextCenter(`Challengers Defeated: ${cd.streak}`,W/2,statY,14,'#e0e0e0');
  drawTextCenter(`Final Difficulty: ${CHALLENGER_TITLES[Math.min(CHALLENGER_TITLES.length-1,Math.floor((cd.difficulty-1)/2))]}`,W/2,statY+25,13,'#aaa');
  drawTextCenter(`Team Size: ${GS.player.team.length} Riftborn`,W/2,statY+50,13,'#aaa');

  drawButton(W/2-80,H-100,160,40,'Try Again',GS.menuIdx===0);
  drawButton(W/2-80,H-50,160,40,'Back to Title',GS.menuIdx===1);
}

// ============================================================
// MAIN LOOP
// ============================================================
function update(){
  if(GS.scene==='explore')updateExplore();
  // Evolve timer
  if(GS.scene==='evolve'&&GS.evolving){
    GS.evolving.timer++;
    if(GS.evolving.timer===60){
      // Actually evolve
      evolveCreature(GS.evolving.creature,GS.evolving.newId);
      GS.player.caught.add(GS.evolving.newId);
      GS.player.seen.add(GS.evolving.newId);
    }
  }
}

function draw(){
  update();

  switch(GS.scene){
    case 'title':drawTitle();break;
    case 'intro':drawIntro();break;
    case 'starterPick':drawStarterPick();break;
    case 'overworld':drawOverworld();break;
    case 'explore':drawExplore();break;
    case 'battle':drawBattle();break;
    case 'team':drawTeamView();break;
    case 'bag':drawBagView();break;
    case 'shop':drawShop();break;
    case 'routeSelect':drawRouteSelect();break;
    case 'arenaSelect':drawArenaSelect();break;
    case 'summary':drawSummary();break;
    case 'evolve':drawEvolveScreen();break;
    case 'credits':drawCredits();break;
    case 'champNameEntry':drawChampNameEntry();break;
    case 'champHub':drawChampHub();break;
    case 'champDefOver':drawChampDefOver();break;
  }

  requestAnimationFrame(draw);
}

// Start
requestAnimationFrame(draw);
</script>
