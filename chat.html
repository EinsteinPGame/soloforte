<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zylos (AI)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: #12122a;
      border-bottom: 1px solid #2a2a4a;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-header .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7b68ee, #00d4ff);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: #fff;
    }
    .chat-header .info { flex: 1; }
    .chat-header .name { font-weight: 600; font-size: 15px; color: #fff; }
    .chat-header .status { font-size: 12px; color: #888; }
    .chat-header .status.online { color: #00ff88; }
    .chat-header .status.busy { color: #ffaa00; }
    .chat-header .back-btn {
      background: none; border: none; color: #7b68ee; font-size: 22px;
      cursor: pointer; padding: 4px 8px; text-decoration: none;
    }
    .dark-toggle {
      background: none; border: 1px solid #2a2a4a; color: #888;
      border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 13px;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
      position: relative;
    }
    .msg.user {
      align-self: flex-end;
      background: #7b68ee;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #1a1a3e;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .msg .time {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      display: block;
    }
    .msg.bot .time { color: rgba(255,255,255,0.3); }

    .msg img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 6px;
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      padding: 10px 14px;
      background: #1a1a3e;
      border-radius: 16px;
      display: none;
    }
    .typing.visible { display: flex; gap: 4px; align-items: center; }
    .typing span {
      width: 7px; height: 7px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input area */
    .input-area {
      background: #12122a;
      border-top: 1px solid #2a2a4a;
      padding: 10px 12px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      background: #1a1a3e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      color: #e0e0e0;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      outline: none;
      line-height: 1.4;
    }
    .input-area textarea:focus { border-color: #7b68ee; }
    .input-area textarea::placeholder { color: #555; }

    .input-area .btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .send-btn {
      background: #7b68ee;
      color: #fff;
      font-size: 18px;
    }
    .send-btn:hover { background: #6a5acd; }
    .send-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

    .attach-btn {
      background: transparent;
      color: #888;
      font-size: 20px;
      border: 1px solid #2a2a4a;
    }
    .attach-btn:hover { color: #7b68ee; border-color: #7b68ee; }

    #file-input { display: none; }

    /* Image preview */
    .attach-preview {
      display: none;
      padding: 6px 12px;
      background: #12122a;
      border-top: 1px solid #2a2a4a;
    }
    .attach-preview.visible { display: flex; align-items: center; gap: 8px; }
    .attach-preview img { height: 48px; border-radius: 6px; }
    .attach-preview .name { font-size: 12px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attach-preview .remove {
      background: none; border: none; color: #ff4757; cursor: pointer;
      font-size: 18px; padding: 4px;
    }

    /* Connection status banner */
    .conn-banner {
      text-align: center;
      padding: 4px;
      font-size: 12px;
      display: none;
    }
    .conn-banner.error { display: block; background: #ff4757; color: #fff; }
    .conn-banner.connecting { display: block; background: #ffaa00; color: #000; }

    /* System messages */
    .sys-msg {
      text-align: center;
      font-size: 12px;
      color: #555;
      padding: 8px;
    }

    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .msg { max-width: 90%; font-size: 13px; }
      .chat-header { padding: 10px 12px; }
    }

    /* Auth overlay - shown if not admin */
    #auth-block {
      position: fixed; inset: 0;
      background: #0a0a1a;
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      text-align: center;
    }
    #auth-block p { color: #555; font-size: 1.1rem; }
  </style>
</head>
<body>
  <script src="auth.js"></script>
<script src="back-btn.js"></script>

  <!-- Block non-admins -->
  <div id="auth-block" style="display:none">
    <p>Access denied.</p>
  </div>

  <!-- Connection banner -->
  <div class="conn-banner" id="conn-banner"></div>

  <!-- Header -->
  <div class="chat-header">
    <a href="/admin.html" class="back-btn" title="Back to Admin">&larr;</a>
    <div class="avatar">Z</div>
    <div class="info">
      <div class="name">Zylos (AI)</div>
      <div class="status" id="bot-status">Connecting...</div>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="sys-msg">Chat with Zylos — your messages are private and persistent.</div>
  </div>

  <!-- Typing indicator -->
  <div class="typing" id="typing"><span></span><span></span><span></span></div>

  <!-- Attachment preview -->
  <div class="attach-preview" id="attach-preview">
    <img id="preview-img" src="" alt="preview">
    <span class="name" id="preview-name"></span>
    <button class="remove" id="preview-remove">&times;</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <button class="btn attach-btn" id="attach-btn" title="Attach image">&#128206;</button>
    <input type="file" id="file-input" accept="image/*,.pdf,.doc,.docx,.txt,.xlsx,.csv">
    <textarea id="msg-input" placeholder="Message Zylos..." rows="1"></textarea>
    <button class="btn send-btn" id="send-btn" title="Send" disabled>&#10148;</button>
  </div>

  <script>
  (function() {
    'use strict';

    // ── Auth check ──
    if (!window.sfAuth || !window.sfAuth.isAdmin()) {
      document.getElementById('auth-block').style.display = 'flex';
      // Hide chat UI
      document.querySelector('.chat-header').style.display = 'none';
      document.getElementById('messages').style.display = 'none';
      document.querySelector('.input-area').style.display = 'none';
      return;
    }

    // ── Config ──
    // API goes through amzcollectible.com (Caddy proxy) since soloforte.ai is on GitHub Pages
    var API_BASE = 'https://www.amzcollectible.com/zylos-chat';
    var POLL_INTERVAL = 2500;
    var WS_RETRY_DELAY = 3000;

    // ── State ──
    var lastMessageId = 0;
    var pendingFile = null;
    var ws = null;
    var wsRetryTimer = null;
    var pollTimer = null;
    var isConnected = false;
    var seenIds = new Set();

    // ── Elements ──
    var messagesEl = document.getElementById('messages');
    var inputEl = document.getElementById('msg-input');
    var sendBtn = document.getElementById('send-btn');
    var attachBtn = document.getElementById('attach-btn');
    var fileInput = document.getElementById('file-input');
    var previewEl = document.getElementById('attach-preview');
    var previewImg = document.getElementById('preview-img');
    var previewName = document.getElementById('preview-name');
    var previewRemove = document.getElementById('preview-remove');
    var statusEl = document.getElementById('bot-status');
    var typingEl = document.getElementById('typing');
    var connBanner = document.getElementById('conn-banner');

    // ── Helpers ──
    function escapeHtml(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatTime(iso) {
      var d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      sendBtn.disabled = !inputEl.value.trim() && !pendingFile;
    }

    // ── Message rendering ──
    function addMessage(content, direction, timestamp, id) {
      if (id && seenIds.has(id)) return;
      if (id) seenIds.add(id);

      var div = document.createElement('div');
      div.className = 'msg ' + (direction === 'in' ? 'user' : 'bot');

      // Check for media content
      var mediaMatch = content.match(/^\[MEDIA:(image|file)\](.*)/);
      if (mediaMatch) {
        var mediaType = mediaMatch[1];
        var mediaPath = mediaMatch[2].trim();
        if (mediaType === 'image') {
          div.innerHTML = '<img src="' + API_BASE + '/media/' + encodeURIComponent(id) + '" alt="image">';
        } else {
          div.innerHTML = '<a href="' + API_BASE + '/media/' + encodeURIComponent(id) + '" style="color:#00d4ff" download>Download file</a>';
        }
      } else {
        div.innerHTML = escapeHtml(content);
      }

      var time = document.createElement('span');
      time.className = 'time';
      time.textContent = formatTime(timestamp || new Date().toISOString());
      div.appendChild(time);

      // Insert before typing indicator
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function addSystemMessage(text) {
      var div = document.createElement('div');
      div.className = 'sys-msg';
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    // ── API calls ──
    function apiCall(method, path, body, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open(method, API_BASE + path, true);
      if (body && !(body instanceof FormData)) {
        xhr.setRequestHeader('Content-Type', 'application/json');
      }
      xhr.withCredentials = true;
      xhr.onload = function() {
        if (xhr.status === 401) {
          showConnBanner('error', 'Authentication required — check setup');
          return;
        }
        try {
          var data = JSON.parse(xhr.responseText);
          callback(null, data);
        } catch(e) {
          callback(e);
        }
      };
      xhr.onerror = function() {
        callback(new Error('Network error'));
      };
      xhr.send(body instanceof FormData ? body : (body ? JSON.stringify(body) : null));
    }

    function showConnBanner(type, msg) {
      connBanner.className = 'conn-banner ' + type;
      connBanner.textContent = msg;
    }

    function hideConnBanner() {
      connBanner.className = 'conn-banner';
    }

    // ── Load history ──
    function loadHistory() {
      apiCall('GET', '/api/conversations?limit=50', null, function(err, data) {
        if (err) {
          showConnBanner('error', 'Failed to load messages');
          return;
        }
        hideConnBanner();
        isConnected = true;

        // API returns array already in chronological order
        if (data && data.length) {
          data.forEach(function(m) {
            addMessage(m.content, m.direction, m.timestamp, m.id);
            if (m.id > lastMessageId) lastMessageId = m.id;
          });
          scrollToBottom();
        }

        // Start polling for new messages
        startPolling();
        updateStatus();
      });
    }

    // ── Poll for new messages ──
    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(pollNewMessages, POLL_INTERVAL);
    }

    function pollNewMessages() {
      apiCall('GET', '/api/poll?since_id=' + lastMessageId, null, function(err, data) {
        if (err) return;
        if (data && data.length) {
          data.forEach(function(m) {
            addMessage(m.content, m.direction, m.timestamp, m.id);
            if (m.id > lastMessageId) lastMessageId = m.id;
          });
        }
      });
      updateStatus();
    }

    function updateStatus() {
      apiCall('GET', '/api/status', null, function(err, data) {
        if (err) {
          statusEl.textContent = 'Offline';
          statusEl.className = 'status';
          return;
        }
        var state = (data.status && data.status.state) || 'unknown';
        if (state === 'processing' || state === 'busy') {
          statusEl.textContent = 'Thinking...';
          statusEl.className = 'status busy';
          typingEl.classList.add('visible');
        } else if (state === 'idle' || state === 'listening') {
          statusEl.textContent = 'Online';
          statusEl.className = 'status online';
          typingEl.classList.remove('visible');
        } else {
          statusEl.textContent = state;
          statusEl.className = 'status';
          typingEl.classList.remove('visible');
        }
      });
    }

    // ── Send message ──
    function sendMessage() {
      var text = inputEl.value.trim();
      if (!text && !pendingFile) return;

      // Show message immediately
      if (text) {
        addMessage(text, 'in', new Date().toISOString());
      }

      if (pendingFile) {
        // Upload file first, then send message with attachment ID
        var fd = new FormData();
        fd.append('file', pendingFile);
        apiCall('POST', '/api/upload', fd, function(err, data) {
          if (err || !data || !data.id) {
            addSystemMessage('Failed to upload attachment');
            return;
          }
          // Send message with attachment reference
          var sendBody = { message: text || '', attachments: [data.id] };
          apiCall('POST', '/api/send', sendBody, function(err2) {
            if (err2) addSystemMessage('Failed to send message');
          });
        });
        clearAttachment();
      } else {
        // Text only
        apiCall('POST', '/api/send', { message: text }, function(err, data) {
          if (err) addSystemMessage('Failed to send message');
        });
      }

      inputEl.value = '';
      autoResize();
      inputEl.focus();
    }

    // ── Attachments ──
    function handleFile(file) {
      if (!file) return;
      pendingFile = file;
      previewName.textContent = file.name;
      if (file.type.startsWith('image/')) {
        var reader = new FileReader();
        reader.onload = function(e) {
          previewImg.src = e.target.result;
          previewImg.style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        previewImg.style.display = 'none';
      }
      previewEl.classList.add('visible');
      sendBtn.disabled = false;
    }

    function clearAttachment() {
      pendingFile = null;
      previewEl.classList.remove('visible');
      previewImg.src = '';
      fileInput.value = '';
      autoResize();
    }

    // ── Event listeners ──
    inputEl.addEventListener('input', autoResize);
    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendBtn.addEventListener('click', sendMessage);
    attachBtn.addEventListener('click', function() { fileInput.click(); });
    fileInput.addEventListener('change', function() {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });
    previewRemove.addEventListener('click', clearAttachment);

    // Drag and drop
    messagesEl.addEventListener('dragover', function(e) { e.preventDefault(); });
    messagesEl.addEventListener('drop', function(e) {
      e.preventDefault();
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    // Paste image
    document.addEventListener('paste', function(e) {
      var items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.startsWith('image/')) {
          e.preventDefault();
          handleFile(items[i].getAsFile());
          break;
        }
      }
    });

    // ── Initialize ──
    loadHistory();

    // Log activity
    if (window.sfAuth && window.sfAuth.logActivity) {
      window.sfAuth.logActivity('page_visit', 'chat');
    }
  })();
  </script>
</body>
</html>
