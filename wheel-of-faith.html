const C=document.getElementById('g'),X=C.getContext('2d');
const isMobile=(()=>{const ua=navigator.userAgent||'';return /Mobi|Android|iPhone|iPad|iPod/i.test(ua)||('ontouchstart' in window)||window.innerWidth<768})();
const TW=isMobile?360:600,TH=isMobile?640:500;let sc=1;
function resize(){const w=innerWidth,h=innerHeight;const dpr=window.devicePixelRatio||1;sc=Math.min(w/TW,h/TH);const cssW=TW*sc,cssH=TH*sc;C.width=TW*sc*dpr;C.height=TH*sc*dpr;C.style.width=cssW+'px';C.style.height=cssH+'px';C.style.position='absolute';C.style.left=(w-cssW)/2+'px';C.style.top=(h-cssH)/2+'px';X.setTransform(dpr,0,0,dpr,0,0)}
addEventListener('resize',resize);resize();
function gmp(e){const r=C.getBoundingClientRect(),cx=(e.clientX||(e.touches&&e.touches[0]&&e.touches[0].clientX)||0)-r.left,cy=(e.clientY||(e.touches&&e.touches[0]&&e.touches[0].clientY)||0)-r.top;return{x:cx/sc,y:cy/sc}}
const W=TW,H=TH,rand=(a,b)=>a+Math.floor(Math.random()*(b-a+1)),pick=a=>a[Math.floor(Math.random()*a.length)],clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v)),lerp=(a,b,t)=>a+(b-a)*t;
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}
function darken(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}
function hexToRgba(hex,a){return 'rgba('+parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16)+','+a+')';}
function drawRoundRect(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath()}

// AUDIO
// ============================================================
const SFX={
  ctx:null,
  _init(){if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},
  _tone(freq,dur,type,vol,delay){
    this._init();if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(freq,this.ctx.currentTime+(delay||0));
    g.gain.setValueAtTime(vol||0.15,this.ctx.currentTime+(delay||0));
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+(delay||0)+dur);
    o.connect(g);g.connect(this.ctx.destination);
    o.start(this.ctx.currentTime+(delay||0));o.stop(this.ctx.currentTime+(delay||0)+dur);
  },
  click(){this._tone(800,0.05,'square',0.06)},
  tick(){this._tone(600,0.03,'sine',0.08)},
  land(){this._tone(400,0.15,'sine',0.2);this._tone(600,0.2,'sine',0.15,0.1)},
  hit(){this._tone(200,0.12,'sine',0.15)},
  crit(){this._tone(600,0.1,'sawtooth',0.2);this._tone(900,0.12,'square',0.18,0.05)},
  block(){this._tone(150,0.08,'square',0.1)},
  companionAtk(){this._tone(700,0.08,'sine',0.1);this._tone(900,0.06,'sine',0.08,0.05)},
  elemHit(){this._tone(500,0.15,'triangle',0.12);this._tone(350,0.2,'sine',0.08,0.08)},
  victory(){for(let i=0;i<6;i++)this._tone(400+i*80,0.2,'sine',0.12,i*0.12);this._tone(900,0.4,'sine',0.15,0.72)},
  defeat(){this._tone(300,0.3,'sine',0.15);this._tone(200,0.4,'sine',0.12,0.2);this._tone(150,0.5,'sine',0.1,0.5)},
  spin(){for(let i=0;i<3;i++)this._tone(500+i*50,0.05,'square',0.05,i*0.04)},
  introSlam(){this._tone(100,0.2,'square',0.2);this._tone(200,0.15,'sawtooth',0.15,0.05)},
  vsDrop(){this._tone(80,0.3,'sawtooth',0.25);this._tone(150,0.2,'square',0.2,0.1)},
};

let buttons=[];

function clearBtns(){buttons=[]}
function drawBtn(b){if(b.color==='transparent')return;X.save();drawRoundRect(b.x,b.y,b.w,b.h,6);X.fillStyle=b.hover?b.color+'44':'#0a0a2a';X.fill();X.strokeStyle=b.color;X.lineWidth=b.hover?3:2;X.stroke();X.fillStyle=b.hover?'#fff':b.color;X.font='bold '+(b.h>40?'16':'13')+'px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';X.fillText(b.label,b.x+b.w/2,b.y+b.h/2);X.restore()}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
let particles=[];
function spawnParticle(x,y,opts){
  particles.push({x,y,vx:opts.vx||0,vy:opts.vy||0,life:opts.life||30,maxLife:opts.life||30,
    color:opts.color||'#fff',size:opts.size||3,text:opts.text||null,type:opts.type||'circle',
    gravity:opts.gravity||0,friction:opts.friction||1,glow:opts.glow||false});
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=p.friction;p.vy*=p.friction;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    const alpha=p.life/p.maxLife;
    X.globalAlpha=alpha;
    if(p.text){
      X.font='bold '+(p.size)+'px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
      if(p.glow){X.shadowColor=p.color;X.shadowBlur=8;}
      X.fillStyle=p.color;X.fillText(p.text,p.x,p.y);
      X.shadowBlur=0;
    }else if(p.type==='ring'){
      X.strokeStyle=p.color;X.lineWidth=2;
      X.beginPath();X.arc(p.x,p.y,p.size*(1-alpha)*3,0,Math.PI*2);X.stroke();
    }else{
      if(p.glow){X.shadowColor=p.color;X.shadowBlur=6;}
      X.fillStyle=p.color;
      X.beginPath();X.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }
    X.globalAlpha=1;
  });
}

// WHEEL SPINNER
// ============================================================
function startSpin(){
  const wheel=WHEEL_ORDER[wheelStep];
  const items=wheel.items();
  if(items.length===0)return;
  spinState.phase='spinning';
  spinState.angle=Math.random()*Math.PI*2;
  spinState.speed=0.15+Math.random()*0.1;
  spinState.targetSlice=rand(0,items.length-1);
  spinState.result=null;
  SFX.spin();
}

function updateSpin(){
  if(spinState.phase!=='spinning')return;
  spinState.angle+=spinState.speed;
  spinState.speed*=0.985;
  if(spinState.speed<0.002){
    spinState.phase='landed';
    const wheel=WHEEL_ORDER[wheelStep];
    const items=wheel.items();
    const sliceAngle=Math.PI*2/items.length;
    const normAngle=((spinState.angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
    const idx=Math.floor(normAngle/sliceAngle)%items.length;
    spinState.result=items[idx];
    applySpinResult(wheel.id,spinState.result);
    SFX.land();
  }
}

function applySpinResult(wheelId,result){
  const d=result.data;
  switch(wheelId){
    case 'race':currentChar.race=d;break;
    case 'subrace':
      currentChar.subRace=d;
      currentChar.stats.str+=d.str;currentChar.stats.spd+=d.spd;
      currentChar.stats.iq+=d.iq;currentChar.stats.dur+=d.dur;
      currentChar.traits.push(d.trait);
      break;
    case 'archetype':
      currentChar.archetype=d;
      currentChar.stats.str+=d.str;currentChar.stats.spd+=d.spd;
      currentChar.stats.iq+=d.iq;currentChar.stats.dur+=d.dur;
      break;
    case 'element':currentChar.element=d;break;
    case 'weapon':currentChar.weapon=d;break;
    case 'companion':currentChar.companion=d;break;
    case 'weakness':currentChar.weakness=d;break;
  }
}

function drawSpin(){
  clearBtns();X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);

  const wheel=WHEEL_ORDER[wheelStep];
  const items=wheel.items();
  if(items.length===0){wheelStep++;return;}

  X.font='bold '+(isMobile?'18':'24')+'px Consolas,Courier New,monospace';
  X.textAlign='center';X.textBaseline='middle';
  X.fillStyle='#ffaa22';
  X.fillText('SPIN '+(wheelStep+1)+'/'+WHEEL_ORDER.length+': '+wheel.label,W/2,30);

  // Progress bar
  const pbW=W-60,pbH=8,pbX=30,pbY=50;
  X.fillStyle='#222';drawRoundRect(pbX,pbY,pbW,pbH,4);X.fill();
  const prog=(wheelStep/WHEEL_ORDER.length)*pbW;
  X.fillStyle='#ffaa22';drawRoundRect(pbX,pbY,Math.max(8,prog),pbH,4);X.fill();

  // Draw wheel
  const cx=W/2,cy=isMobile?220:210,wr=isMobile?110:130;
  const sliceAngle=Math.PI*2/items.length;

  X.save();X.translate(cx,cy);X.rotate(-spinState.angle);
  for(let i=0;i<items.length;i++){
    const startA=i*sliceAngle;
    const endA=(i+1)*sliceAngle;
    X.beginPath();X.moveTo(0,0);X.arc(0,0,wr,startA,endA);X.closePath();
    X.fillStyle=i%2===0?items[i].color:darken(items[i].color,30);X.fill();
    X.strokeStyle='#0a0a1a';X.lineWidth=2;X.stroke();
    const labelA=startA+sliceAngle/2;
    const lr=wr*0.65;
    X.save();X.translate(Math.cos(labelA)*lr,Math.sin(labelA)*lr);
    X.rotate(labelA+Math.PI/2);
    X.font='bold '+(items.length>12?'8':'10')+'px Consolas,Courier New,monospace';
    X.fillStyle='#fff';X.textAlign='center';X.textBaseline='middle';
    const lbl=items[i].label.length>10?items[i].label.substring(0,9)+'.':items[i].label;
    X.fillText(lbl,0,0);
    X.restore();
  }
  X.restore();

  // Pointer
  X.beginPath();X.moveTo(cx,cy-wr-15);X.lineTo(cx-10,cy-wr-30);X.lineTo(cx+10,cy-wr-30);X.closePath();
  X.fillStyle='#ffaa22';X.fill();

  // Center circle
  X.beginPath();X.arc(cx,cy,20,0,Math.PI*2);X.fillStyle='#1a1a2a';X.fill();
  X.strokeStyle='#ffaa22';X.lineWidth=2;X.stroke();

  if(spinState.phase==='idle'){
    addBtn('spin',W/2-60,cy+wr+30,120,40,'SPIN!','#ffaa22',()=>{startSpin();});
  }else if(spinState.phase==='landed'&&spinState.result){
    X.font='bold '+(isMobile?'14':'18')+'px Consolas,Courier New,monospace';
    X.fillStyle='#fff';X.textAlign='center';
    X.fillText(spinState.result.label+'!',W/2,cy+wr+30);

    const d=spinState.result.data;
    X.font=(isMobile?'11':'13')+'px Consolas,Courier New,monospace';
    X.fillStyle='#aaa';
    if(d.desc)X.fillText(d.desc,W/2,cy+wr+50);
    if(d.trait)X.fillText(d.trait,W/2,cy+wr+50);
    if(d.str!==undefined){
      const statStr='STR:'+((d.str>=0?'+':'')+d.str)+' SPD:'+((d.spd>=0?'+':'')+d.spd)+' IQ:'+((d.iq>=0?'+':'')+d.iq)+' DUR:'+((d.dur>=0?'+':'')+d.dur);
      X.fillText(statStr,W/2,cy+wr+68);
    }

    addBtn('next',W/2-60,cy+wr+85,120,36,'NEXT >>','#ffaa22',()=>{
      wheelStep++;spinState={phase:'idle',angle:0,speed:0,result:null};
      if(wheelStep>=WHEEL_ORDER.length)screen='charDone';
    });
  }

  // Current stats sidebar
  const sx=isMobile?10:W-160,sy=isMobile?cy+wr+130:70;
  X.font='bold 12px Consolas,Courier New,monospace';X.textAlign='left';
  X.fillStyle='#ffaa22';X.fillText('CURRENT BUILD:',sx,sy);
  X.font='11px Consolas,Courier New,monospace';X.fillStyle='#ccc';
  let ly=sy+18;
  if(currentChar.race){X.fillText('Race: '+currentChar.race.name,sx,ly);ly+=15;}
  if(currentChar.subRace){X.fillText('Sub: '+currentChar.subRace.name,sx,ly);ly+=15;}
  if(currentChar.archetype){X.fillText('Class: '+currentChar.archetype.name,sx,ly);ly+=15;}
  if(currentChar.element){X.fillText('Element: '+currentChar.element.name,sx,ly);ly+=15;}
  if(currentChar.weapon){X.fillText('Weapon: '+currentChar.weapon.name,sx,ly);ly+=15;}
  if(currentChar.companion){X.fillText('Companion: '+currentChar.companion.name,sx,ly);ly+=15;}
  ly+=5;
  X.fillStyle='#ff6644';X.fillText('STR: '+currentChar.stats.str,sx,ly);ly+=14;
  X.fillStyle='#44aaff';X.fillText('SPD: '+currentChar.stats.spd,sx,ly);ly+=14;
  X.fillStyle='#ffcc44';X.fillText('IQ:  '+currentChar.stats.iq,sx,ly);ly+=14;
  X.fillStyle='#44cc88';X.fillText('DUR: '+currentChar.stats.dur,sx,ly);

  addBtn('back',10,10,70,28,'< BACK','#888',()=>{screen='title';});

// ============================================================
function drawBall(x,y,r,color,opts){
  opts=opts||{};
  const g=X.createRadialGradient(x-r*0.25,y-r*0.25,r*0.1,x,y,r);
  g.addColorStop(0,lighten(color,50));g.addColorStop(0.6,color);g.addColorStop(1,darken(color,30));
  if(opts.glow){X.shadowColor=color;X.shadowBlur=opts.glow;}
  X.beginPath();X.arc(x,y,r,0,Math.PI*2);X.fillStyle=g;X.fill();
  X.strokeStyle=darken(color,40);X.lineWidth=opts.strokeW||2;X.stroke();
  X.shadowBlur=0;
  // Highlight
  X.beginPath();X.arc(x-r*0.25,y-r*0.25,r*0.18,0,Math.PI*2);X.fillStyle='rgba(255,255,255,0.35)';X.fill();
  // Element ring
  if(opts.element){
    X.strokeStyle=opts.element;X.lineWidth=2;X.setLineDash([3,3]);
    X.beginPath();X.arc(x,y,r+4,0,Math.PI*2);X.stroke();
    X.setLineDash([]);
  }
}

// ============================================================
// BATTLE ENGINE — ENHANCED v1.1
// ============================================================
function getWeaponRange(weapon){
  if(!weapon)return 60;
  const ranges={short:50,mid:70,long:90,far:120};
  return ranges[weapon.range]||60;
}

function hasTraitEffect(ch,keyword){
  if(!ch.traits)return false;
  return ch.traits.some(t=>t.toLowerCase().includes(keyword.toLowerCase()));
}

function initBattle(ch1,ch2){
  const makeHP=(dur,weakness)=>{
    let hp=50+dur*8;
    if(weakness&&weakness.effect==='glass')hp=Math.round(hp*0.7);
    if(hasTraitEffect(ch1===ch1?ch1:ch2,'Endurance'))hp=Math.round(hp*1.1);
    return hp;
  };
  const hp1=makeHP(ch1.stats.dur,ch1.weakness);
  const hp2=makeHP(ch2.stats.dur,ch2.weakness);

  battleState={
    f1:makeFighter(ch1,hp1,W*0.25,H/2,'left',1,'#4488ff'),
    f2:makeFighter(ch2,hp2,W*0.75,H/2,'right',-1,'#cc4444'),
    phase:'intro',introTimer:0,introPhase:0,winner:null,resultTimer:0,
    battleStats:{f1:{dmgDealt:0,hits:0,crits:0,dodges:0,compHits:0},f2:{dmgDealt:0,hits:0,crits:0,dodges:0,compHits:0}},
  };
  battleTime=0;particles=[];battleLog=[];
  addBattleLog(ch1.name+' vs '+ch2.name+'!','#ffaa22');
}

function makeFighter(ch,hp,x,y,side,facing,teamColor){
  const comp=ch.companion&&ch.companion.id!=='none'?{
    ...ch.companion,hp:15+ch.companion.dur*5,maxHp:15+ch.companion.dur*5,
    x:x+(side==='left'?-30:30),y:y+25,atkCd:0,alive:true
  }:null;

  return {
    ...ch,hp,maxHp:hp,x,y,vx:0,vy:0,atkCd:0,side,alive:true,facing,teamColor,
    comp,specialCd:0,specialReady:false,
    // Trait flags
    revived:false,firstAtk:true,poisonTimer:0,regenTimer:0,
    stunTimer:0,dodgeChance:0,lifesteal:false,
    // Visual
    atkAnim:0,hitFlash:0,scale:1,
  };
}

function addBattleLog(msg,color){
  battleLog.unshift({msg,color:color||'#aaa',life:180});
  if(battleLog.length>8)battleLog.pop();
}

function applyTraits(f){
  if(!f.traits)return;
  f.traits.forEach(t=>{
    const tl=t.toLowerCase();
    if(tl.includes('dodge')||tl.includes('scurry'))f.dodgeChance+=15;
    if(tl.includes('life drain')||tl.includes('life steal'))f.lifesteal=true;
    if(tl.includes('regen'))f.regenTimer=1;
    if(tl.includes('terror aura')||tl.includes('nosferatu'))f._terrorAura=true;
  });
}

function updateBattle(){
  if(!battleState)return;
  battleTime++;

  // Intro cutscene — BBA style
  if(battleState.phase==='intro'){
    battleState.introTimer++;
    // Phase 0: P1 card slide in (0-60)
    // Phase 1: VS slam (60-90)
    // Phase 2: P2 card slide in (90-150)
    // Phase 3: FIGHT flash (150-180)
    if(battleState.introTimer===1)SFX.introSlam();
    if(battleState.introTimer===60)SFX.vsDrop();
    if(battleState.introTimer===90)SFX.introSlam();
    if(battleState.introTimer===150){SFX.vsDrop();triggerShake(8);}
    if(battleState.introTimer>=180){
      battleState.phase='fight';
      applyTraits(battleState.f1);
      applyTraits(battleState.f2);
      // Terror aura
      if(battleState.f1._terrorAura){
        battleState.f2.stats={...battleState.f2.stats};
        battleState.f2.stats.str=Math.max(1,battleState.f2.stats.str-1);
        battleState.f2.stats.spd=Math.max(1,battleState.f2.stats.spd-1);
        addBattleLog(battleState.f1.name+'\'s Terror Aura!','#cc2244');
      }
      if(battleState.f2._terrorAura){
        battleState.f1.stats={...battleState.f1.stats};
        battleState.f1.stats.str=Math.max(1,battleState.f1.stats.str-1);
        battleState.f1.stats.spd=Math.max(1,battleState.f1.stats.spd-1);
        addBattleLog(battleState.f2.name+'\'s Terror Aura!','#cc2244');
      }
    }
    return;
  }

  if(battleState.phase==='result'){
    battleState.resultTimer++;
    // Victory particles
    if(battleState.resultTimer%3===0&&battleState.winner){
      const w=battleState.winner;
      for(let i=0;i<2;i++){
        spawnParticle(w.x+rand(-20,20),w.y+rand(-20,20),{
          vx:rand(-3,3)*0.5,vy:rand(-4,-1)*0.5,life:40,
          color:pick(['#ffaa22','#ffcc00','#ff8800','#fff']),size:rand(2,4),glow:true,gravity:0.05
        });
      }
    }
    updateParticles();
    return;
  }

  const f1=battleState.f1,f2=battleState.f2;

  // Check both alive
  const fighters=[f1,f2];
  fighters.forEach(f=>{
    if(!f.alive)return;

    const enemy=f===f1?f2:f1;
    const myStats=f===f1?battleState.battleStats.f1:battleState.battleStats.f2;
    if(!enemy.alive)return;

    const dx=enemy.x-f.x,dy=enemy.y-f.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const spd=1.5+Math.max(0,f.stats.spd)*0.3;
    const atkRange=getWeaponRange(f.weapon);

    // Movement AI — smarter based on IQ
    if(f.stunTimer>0){f.stunTimer--;return;}

    // Ranged characters try to keep distance
    const isRanged=f.weapon&&(f.weapon.type==='ranged'||f.weapon.type==='magic');
    const idealDist=isRanged?atkRange*0.8:atkRange*0.5;

    if(dist>idealDist+20){
      f.x+=dx/dist*spd;
      f.y+=dy/dist*spd;
    }else if(dist<idealDist-20&&isRanged){
      f.x-=dx/dist*spd*0.7;
      f.y-=dy/dist*spd*0.7;
    }

    // IQ-based evasion (lateral movement)
    const iqFactor=Math.max(0,f.stats.iq)*0.2;
    f.x+=Math.sin(battleTime*0.06+f.x*0.1)*iqFactor;
    f.y+=Math.cos(battleTime*0.05+f.y*0.1)*iqFactor*0.8;

    // Keep in bounds
    f.x=clamp(f.x,40,W-40);f.y=clamp(f.y,70,H-70);

    // Regen trait
    if(f.regenTimer&&battleTime%60===0&&f.hp<f.maxHp){
      f.hp=Math.min(f.maxHp,f.hp+1);
      spawnParticle(f.x,f.y-25,{text:'+1',color:'#44cc88',size:12,vy:-1,life:30,glow:true});
    }

    // Blood Rage trait — +2 STR below 30% HP
    if(hasTraitEffect(f,'Blood Rage')&&f.hp<f.maxHp*0.3&&!f._bloodRageActive){
      f._bloodRageActive=true;
      f.stats={...f.stats,str:f.stats.str+2};
      addBattleLog(f.name+' Blood Rage!','#ff2222');
      for(let i=0;i<8;i++)spawnParticle(f.x,f.y,{vx:rand(-3,3),vy:rand(-3,3),life:25,color:'#ff2222',size:3,glow:true});
    }

    // Attack
    if(f.atkCd<=0&&dist<atkRange){
      // Dodge check
      let dodged=false;
      const enemyDodge=enemy.dodgeChance+(enemy.weakness&&enemy.weakness.effect==='no_dodge'?-100:0);
      if(rand(1,100)<=Math.max(0,enemyDodge)){
        dodged=true;
        const es=f===f1?battleState.battleStats.f2:battleState.battleStats.f1;
        es.dodges++;
        spawnParticle(enemy.x,enemy.y-20,{text:'DODGE',color:'#88ccff',size:13,vy:-1.5,life:35,glow:true});
        f.atkCd=Math.max(10,40-Math.max(0,f.stats.spd)*3);
        return;
      }

      const baseDmg=Math.max(1,f.stats.str)+(f.weapon?f.weapon.dmg:1);
      const def=Math.max(0,enemy.stats.dur)*0.5;
      let dmg=Math.max(1,Math.round(baseDmg-def+rand(-1,2)));

      // Element bonus
      let elemBonus=false;
      if(f.element&&enemy.element&&f.element.strong===enemy.element.id){
        dmg=Math.round(dmg*1.5);elemBonus=true;
      }
      // Element weakness
      if(f.element&&enemy.element&&f.element.weak===enemy.element.id){
        dmg=Math.max(1,Math.round(dmg*0.7));
      }
      // Weakness effects
      if(enemy.weakness){
        if(enemy.weakness.effect==='light_vuln'&&f.element&&f.element.id==='light')dmg*=2;
        if(enemy.weakness.effect==='crit_vuln'){}// handled below
        if(enemy.weakness.effect==='mind_vuln'&&f.stats.iq>enemy.stats.iq)dmg=Math.round(dmg*1.5);
      }

      // Crit chance
      const critChance=5+Math.max(0,f.stats.iq)*2;
      const isCrit=rand(1,100)<=critChance;
      if(isCrit){
        let critMult=1.8;
        if(enemy.weakness&&enemy.weakness.effect==='crit_vuln')critMult=2.2;
        dmg=Math.round(dmg*critMult);
        SFX.crit();myStats.crits++;
      }else{SFX.hit();}

      // Ambush trait — first attack double
      if(f.firstAtk&&hasTraitEffect(f,'Ambush')){
        dmg*=2;
        addBattleLog(f.name+' AMBUSH!','#ffcc00');
      }
      f.firstAtk=false;

      // Shield damage reduction
      if(enemy.weapon&&enemy.weapon.id==='shield'){
        dmg=Math.max(1,Math.round(dmg*0.6));
        SFX.block();
      }

      // Thick Skin trait
      if(hasTraitEffect(enemy,'Thick Skin')||hasTraitEffect(enemy,'reduce damage')){
        dmg=Math.max(1,dmg-1);
      }

      enemy.hp-=dmg;
      myStats.dmgDealt+=dmg;myStats.hits++;

      // Lifesteal
      if(f.lifesteal&&f.hp<f.maxHp){
        f.hp=Math.min(f.maxHp,f.hp+1);
        spawnParticle(f.x,f.y-20,{text:'+1',color:'#cc2244',size:11,vy:-1,life:25});
      }

      // Poison trait
      if(hasTraitEffect(f,'Toxic')||hasTraitEffect(f,'poison')){
        if(rand(1,100)<=20){
          enemy.poisonTimer=5;
          addBattleLog(enemy.name+' poisoned!','#88cc22');
        }
      }

      // Attack animation
      f.atkAnim=10;
      enemy.hitFlash=8;
      triggerShake(isCrit?5:2);

      // Damage particle
      const pColor=isCrit?'#ffcc00':elemBonus?(f.element.color):'#ff4444';
      spawnParticle(enemy.x+rand(-10,10),enemy.y-25,{
        text:isCrit?dmg+'!!':''+dmg,color:pColor,size:isCrit?16:14,vy:-1.5,life:40,glow:isCrit
      });

      // Element hit effect
      if(elemBonus&&f.element){
        SFX.elemHit();
        for(let i=0;i<6;i++){
          spawnParticle(enemy.x,enemy.y,{vx:rand(-4,4),vy:rand(-4,4),life:20,color:f.element.color,size:rand(2,4),glow:true});
        }
        spawnParticle(enemy.x,enemy.y,{life:15,color:f.element.color,size:8,type:'ring'});
      }

      // Weapon-specific hit effects
      if(f.weapon){
        if(f.weapon.type==='ranged'){
          // Arrow trail
          for(let i=0;i<3;i++){
            spawnParticle(lerp(f.x,enemy.x,i/3),lerp(f.y,enemy.y,i/3),{life:10,color:'#aa8844',size:2});
          }
        }else if(f.weapon.type==='magic'){
          // Magic burst
          for(let i=0;i<4;i++){
            spawnParticle(enemy.x+rand(-15,15),enemy.y+rand(-15,15),{vx:0,vy:-1,life:20,color:'#aa66ff',size:3,glow:true});
          }
        }
      }

      // Attack cooldown (SPD-based)
      f.atkCd=Math.max(12,50-Math.max(0,f.stats.spd)*3-(f.weapon?f.weapon.spd*3:0));

      // Check death
      if(enemy.hp<=0){
        // Undying trait check
        if(hasTraitEffect(enemy,'Undying')&&!enemy.revived){
          enemy.hp=Math.round(enemy.maxHp*0.25);
          enemy.revived=true;
          addBattleLog(enemy.name+' REVIVES!','#ffcc00');
          for(let i=0;i<12;i++)spawnParticle(enemy.x,enemy.y,{vx:rand(-3,3),vy:rand(-4,0),life:30,color:'#ffcc00',size:3,glow:true});
          triggerShake(6);
        }else{
          enemy.hp=0;enemy.alive=false;
          battleState.winner=f;
          battleState.phase='result';
          // Kill companion too
          if(enemy.comp)enemy.comp.alive=false;

          if(f===battleState.f1)SFX.victory();else SFX.victory();
          addBattleLog(f.name+' wins!','#ffaa22');
          triggerShake(10);

          // Death explosion
          for(let i=0;i<20;i++){
            spawnParticle(enemy.x+rand(-10,10),enemy.y+rand(-10,10),{
              vx:rand(-5,5),vy:rand(-5,5),life:40,
              color:enemy.race?enemy.race.color:'#888',size:rand(2,5),gravity:0.1,friction:0.97
            });
          }
        }
      }
    }
    if(f.atkCd>0)f.atkCd--;
    if(f.atkAnim>0)f.atkAnim--;
    if(f.hitFlash>0)f.hitFlash--;

    // Poison tick
    if(f.poisonTimer>0&&battleTime%30===0){
      f.poisonTimer--;
      f.hp=Math.max(1,f.hp-2);
      spawnParticle(f.x,f.y-20,{text:'-2',color:'#88cc22',size:12,vy:-1,life:25});
    }

    // Companion AI
    if(f.comp&&f.comp.alive){
      const c=f.comp;
      const cdx=enemy.x-c.x,cdy=enemy.y-c.y;
      const cdist=Math.sqrt(cdx*cdx+cdy*cdy);
      const cspd=1+Math.max(0,c.spd)*0.25;

      // Follow owner loosely, attack enemy when close
      const ownerDx=f.x+(f.side==='left'?-25:25)-c.x;
      const ownerDy=f.y+20-c.y;
      const ownerDist=Math.sqrt(ownerDx*ownerDx+ownerDy*ownerDy);

      if(cdist<80){
        // Attack mode
        c.x+=cdx/cdist*cspd*0.8;
        c.y+=cdy/cdist*cspd*0.8;
      }else if(ownerDist>50){
        // Return to owner
        c.x+=ownerDx/ownerDist*cspd;
        c.y+=ownerDy/ownerDist*cspd;
      }
      c.x=clamp(c.x,30,W-30);c.y=clamp(c.y,70,H-60);

      if(c.atkCd<=0&&cdist<60){
        const cDmg=Math.max(1,Math.round(c.str*0.8+rand(0,2)));
        enemy.hp-=cDmg;
        c.atkCd=40;
        SFX.companionAtk();
        const cs=f===f1?battleState.battleStats.f1:battleState.battleStats.f2;
        cs.compHits++;
        spawnParticle(enemy.x+rand(-8,8),enemy.y-15,{text:''+cDmg,color:c.color,size:11,vy:-1.2,life:30});

        if(enemy.hp<=0){
          enemy.hp=0;enemy.alive=false;
          battleState.winner=f;battleState.phase='result';
          SFX.victory();addBattleLog(c.name+' finishes '+enemy.name+'!','#ffaa22');
          triggerShake(10);
          for(let i=0;i<20;i++){
            spawnParticle(enemy.x+rand(-10,10),enemy.y+rand(-10,10),{
              vx:rand(-5,5),vy:rand(-5,5),life:40,
              color:enemy.race?enemy.race.color:'#888',size:rand(2,5),gravity:0.1,friction:0.97
            });
          }
        }
      }
      if(c.atkCd>0)c.atkCd--;
    }
  });

  // Battle log fade
  battleLog.forEach(l=>{if(l.life>0)l.life--;});
  battleLog=battleLog.filter(l=>l.life>0);

  // Shake decay
  if(shakeAmount>0)shakeAmount*=shakeDecay;
  if(shakeAmount<0.5)shakeAmount=0;

  updateParticles();
}

// ============================================================
// DRAW: BATTLE
// ============================================================
function drawBattle(){
  clearBtns();

  // Apply screen shake
  X.save();
  if(shakeAmount>0){
    X.translate(rand(-1,1)*shakeAmount,rand(-1,1)*shakeAmount);
  }

  X.fillStyle='#0a0a1a';X.fillRect(-10,-10,W+20,H+20);

  // Arena grid
  X.strokeStyle='#1a1a3a';X.lineWidth=1;
  for(let i=0;i<W;i+=30){X.beginPath();X.moveTo(i,0);X.lineTo(i,H);X.stroke();}
  for(let i=0;i<H;i+=30){X.beginPath();X.moveTo(0,i);X.lineTo(W,i);X.stroke();}

  if(!battleState){X.restore();return;}

  const f1=battleState.f1,f2=battleState.f2;

  // ── INTRO CUTSCENE ──
  if(battleState.phase==='intro'){
    const t=battleState.introTimer;

    // Phase 1: P1 card slides in from left (0-60)
    if(t<60){
      const prog=Math.min(1,t/40);
      const eased=1-Math.pow(1-prog,3); // ease out cubic
      const cardX=lerp(-250,20,eased);
      drawIntroBattleCard(cardX,H/2-80,220,160,f1,'#4488ff',prog);
    }else{
      drawIntroBattleCard(20,H/2-80,220,160,f1,'#4488ff',1);
    }

    // Phase 2: VS slam (60-90)
    if(t>=60&&t<90){
      const prog=(t-60)/30;
      const scale=prog<0.5?lerp(3,1,prog*2):1;
      const alpha=Math.min(1,prog*2);
      X.save();X.translate(W/2,H/2);X.scale(scale,scale);
      X.globalAlpha=alpha;
      X.font='bold 36px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
      X.shadowColor='#ffaa22';X.shadowBlur=20;
      X.fillStyle='#ffaa22';X.fillText('VS',0,0);
      X.shadowBlur=0;X.globalAlpha=1;X.restore();
    }else if(t>=90){
      X.font='bold 36px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
      X.shadowColor='#ffaa22';X.shadowBlur=15;
      X.fillStyle='#ffaa22';X.fillText('VS',W/2,H/2);
      X.shadowBlur=0;
    }

    // Phase 3: P2 card slides in from right (90-150)
    if(t>=90&&t<150){
      const prog=Math.min(1,(t-90)/40);
      const eased=1-Math.pow(1-prog,3);
      const cardX=lerp(W+30,W-240,eased);
      drawIntroBattleCard(cardX,H/2-80,220,160,f2,'#cc4444',prog);
    }else if(t>=150){
      drawIntroBattleCard(W-240,H/2-80,220,160,f2,'#cc4444',1);
    }

    // Phase 4: FIGHT! flash (150-180)
    if(t>=150){
      const prog=(t-150)/30;
      if(prog<1){
        const flashAlpha=Math.sin(prog*Math.PI);
        X.globalAlpha=flashAlpha;
        X.fillStyle='#fff';X.fillRect(0,0,W,H);
        X.globalAlpha=1;
        const fScale=lerp(4,1,prog);
        X.save();X.translate(W/2,H/2);X.scale(fScale,fScale);
        X.font='bold 40px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
        X.fillStyle='#cc4444';X.fillText('FIGHT!',0,0);
        X.restore();
      }
    }

    X.restore();
    buttons.forEach(drawBtn);return;
  }

  // ── BATTLE PHASE ──

  // HP bars
  drawHPBar(10,10,W/2-20,f1,'#4488ff');
  drawHPBar(W/2+10,10,W/2-20,f2,'#cc4444');

  // Companion indicator under HP bars
  if(f1.comp&&f1.comp.alive){
    X.font='9px Consolas,Courier New,monospace';X.textAlign='left';X.fillStyle=f1.comp.color;
    X.fillText(f1.comp.name+' HP:'+f1.comp.hp,12,42);
  }
  if(f2.comp&&f2.comp.alive){
    X.font='9px Consolas,Courier New,monospace';X.textAlign='right';X.fillStyle=f2.comp.color;
    X.fillText(f2.comp.name+' HP:'+f2.comp.hp,W-12,42);
  }

  // Timer
  const secs=Math.floor(battleTime/60);
  X.font='bold 12px Consolas,Courier New,monospace';X.textAlign='center';X.fillStyle='#555';
  X.fillText(Math.floor(secs/60)+':'+String(secs%60).padStart(2,'0'),W/2,24);

  // Draw companions
  [f1,f2].forEach(f=>{
    if(f.comp&&f.comp.alive){
      const c=f.comp;
      const cr=10;
      drawBall(c.x,c.y,cr,c.color,{strokeW:1});
      // Companion name
      X.font='8px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
      X.fillStyle='#888';X.fillText(c.name.split(' ').pop(),c.x,c.y+cr+8);
    }
  });

  // Draw fighters
  [f1,f2].forEach(f=>{
    if(!f.alive){X.globalAlpha=0.2;}
    const rc=f.race?f.race.color:'#888';
    const br=22+(f.atkAnim>0?2:0);
    const ec=f.element?f.element.color:null;

    // Hit flash
    if(f.hitFlash>0){
      X.globalAlpha=0.5+Math.sin(f.hitFlash*2)*0.5;
    }

    drawBall(f.x,f.y,br,rc,{element:ec,glow:f.atkAnim>0?12:0});

    // Weapon indicator (small icon near ball)
    if(f.weapon&&f.alive){
      const wx=f.x+f.facing*25,wy=f.y-5;
      X.font='bold 10px Consolas,Courier New,monospace';X.textAlign='center';
      X.fillStyle=f.weapon.color;
      const wIcons={sword:'/',axe:'T',dagger:'//',spear:'|',hammer:'T',bow:')',staff:'|',scythe:'J',fists:'*',whip:'~',crossbow:'>',katana:'/',shield:'D',claws:'W',trident:'Y'};
      X.fillText(wIcons[f.weapon.id]||'?',wx,wy);
    }

    // Name tag
    X.font='bold 10px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='#fff';X.fillText(f.name||'???',f.x,f.y+br+14);

    // Poison indicator
    if(f.poisonTimer>0){
      X.fillStyle='#88cc2288';
      X.beginPath();X.arc(f.x+br+2,f.y-br+2,4,0,Math.PI*2);X.fill();
    }

    // Stun indicator
    if(f.stunTimer>0){
      X.font='10px Consolas,Courier New,monospace';X.fillStyle='#ffcc00';
      X.fillText('*',f.x,f.y-br-8);
    }

    X.globalAlpha=1;
  });

  // Draw particles
  drawParticles();

  // Battle log (bottom left)
  const logX=10,logY=H-10;
  battleLog.forEach((l,i)=>{
    if(i>5)return;
    const alpha=Math.min(1,l.life/30);
    X.globalAlpha=alpha*0.8;
    X.font='9px Consolas,Courier New,monospace';X.textAlign='left';X.textBaseline='bottom';
    X.fillStyle=l.color;
    X.fillText(l.msg,logX,logY-i*13);
  });
  X.globalAlpha=1;

  // ── RESULT SCREEN ──
  if(battleState.phase==='result'){
    const rt=battleState.resultTimer;
    const overlayAlpha=Math.min(0.7,rt/60);
    X.fillStyle='rgba(0,0,0,'+overlayAlpha+')';X.fillRect(0,0,W,H);

    if(rt>20){
      // Winner glow pulse
      const w=battleState.winner;
      const pulse=Math.sin(rt*0.1)*5+15;
      X.shadowColor=w.race?w.race.color:'#ffaa22';X.shadowBlur=pulse;
      drawBall(W/2,H/2-60,35,w.race?w.race.color:'#888',{glow:pulse,element:w.element?w.element.color:null});
      X.shadowBlur=0;

      // Winner name
      X.font='bold '+(isMobile?'22':'28')+'px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
      X.shadowColor='#ffaa22';X.shadowBlur=10;
      X.fillStyle='#ffaa22';
      X.fillText((w.name||'???')+' WINS!',W/2,H/2);
      X.shadowBlur=0;

      // Stats recap
      if(rt>50){
        const ws=w===f1?battleState.battleStats.f1:battleState.battleStats.f2;
        const ls=w===f1?battleState.battleStats.f2:battleState.battleStats.f1;
        X.font='12px Consolas,Courier New,monospace';X.fillStyle='#aaa';
        X.fillText('HP: '+w.hp+'/'+w.maxHp+'  |  DMG: '+ws.dmgDealt+'  |  Hits: '+ws.hits+'  |  Crits: '+ws.crits,W/2,H/2+30);
        if(ws.compHits>0)X.fillText('Companion hits: '+ws.compHits,W/2,H/2+48);
      }
    }

    if(rt>80){
      addBtn('again',W/2-100,H/2+65,90,32,'REMATCH','#ffaa22',()=>{initBattle(savedChars[battleSelectP1],savedChars[battleSelectP2]);});
      addBtn('menu',W/2+10,H/2+65,90,32,'MENU','#888',()=>{screen='title';battleState=null;particles=[];});
    }
  }

  X.restore();
  buttons.forEach(drawBtn);
}

function drawIntroBattleCard(x,y,w,h,f,color,prog){
  X.save();
  X.globalAlpha=Math.min(1,prog*1.5);
  drawRoundRect(x,y,w,h,10);
  X.fillStyle='#111128';X.fill();
  X.strokeStyle=color;X.lineWidth=3;X.stroke();

  // Character ball
  const rc=f.race?f.race.color:'#888';
  const ec=f.element?f.element.color:null;
  drawBall(x+w/2,y+45,28,rc,{element:ec,glow:8});

  // Name
  X.font='bold 14px Consolas,Courier New,monospace';X.textAlign='center';X.textBaseline='middle';
  X.fillStyle='#fff';X.fillText(f.name||'???',x+w/2,y+85);

  // Info
  X.font='10px Consolas,Courier New,monospace';X.fillStyle='#aaa';
  X.fillText((f.subRace?f.subRace.name+' ':'')+(f.race?f.race.name:''),x+w/2,y+100);
  if(f.archetype)X.fillText(f.archetype.name,x+w/2,y+114);

  // Stats
  X.font='10px Consolas,Courier New,monospace';X.textAlign='left';
  const sx=x+15;
  X.fillStyle='#ff6644';X.fillText('STR:'+f.stats.str,sx,y+134);
  X.fillStyle='#44aaff';X.fillText('SPD:'+f.stats.spd,sx+55,y+134);
  X.fillStyle='#ffcc44';X.fillText('IQ:'+f.stats.iq,sx+110,y+134);
  X.fillStyle='#44cc88';X.fillText('DUR:'+f.stats.dur,sx+155,y+134);

  // Weapon + Element
  X.textAlign='center';X.font='9px Consolas,Courier New,monospace';
  if(f.weapon){X.fillStyle='#ccc';X.fillText(f.weapon.name,x+w/2,y+150);}

  X.globalAlpha=1;X.restore();
}

function drawHPBar(x,y,w,f,color){
  const h=25;
  drawRoundRect(x,y,w,h,5);X.fillStyle='#111';X.fill();
  X.strokeStyle='#333';X.lineWidth=1;X.stroke();
  const pct=clamp(f.hp/f.maxHp,0,1);
  const barColor=pct>0.5?color:pct>0.25?'#ffaa22':'#cc2222';
  if(pct>0){
    drawRoundRect(x+2,y+2,Math.max(4,(w-4)*pct),h-4,4);
    X.fillStyle=barColor;X.fill();
    // Gradient overlay
    const grad=X.createLinearGradient(x,y,x,y+h);
    grad.addColorStop(0,'rgba(255,255,255,0.15)');grad.addColorStop(0.5,'rgba(255,255,255,0)');grad.addColorStop(1,'rgba(0,0,0,0.1)');
    X.fillStyle=grad;X.fill();
  }
  X.font='bold 11px Consolas,Courier New,monospace';X.textAlign='left';X.textBaseline='middle';
  X.fillStyle='#fff';X.fillText((f.name||'???')+' '+f.hp+'/'+f.maxHp,x+6,y+h/2);
}

// ============================================================
// INPUT
// ============================================================
function handleClick(mx,my){
  SFX.click();
  for(const b of buttons){
    if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){
      if(b.cb)b.cb();return;
    }
  }
}
function handleMove(mx,my){
  buttons.forEach(b=>{b.hover=mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h;});
}
C.addEventListener('click',e=>{const p=gmp(e);handleClick(p.x,p.y);});
C.addEventListener('mousemove',e=>{const p=gmp(e);handleMove(p.x,p.y);});
C.addEventListener('touchstart',e=>{e.preventDefault();const p=gmp(e);handleClick(p.x,p.y);},{passive:false});

// ============================================================
// GAME LOOP
// ============================================================
function loop(time){
  const dpr=window.devicePixelRatio||1;X.setTransform(dpr,0,0,dpr,0,0);X.save();X.scale(sc,sc);
  switch(screen){
    case 'title':drawTitle();break;
    case 'spin':updateSpin();drawSpin();break;
    case 'charDone':drawCharDone();break;
    case 'roster':drawRoster();break;
    case 'battleSelect':drawBattleSelect();break;
    case 'battle':updateBattle();drawBattle();break;
  }
  X.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{loop(t);});

</script>
