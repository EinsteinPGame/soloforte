function resize(){

const rand=(a,b)=>a+Math.floor(Math.random()*(b-a+1)),pick=a=>a[Math.floor(Math.random()*a.length)];
function hexToRgba(hex,a){return'rgba('+parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16)+','+a+')';}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}
function darken(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}

function rainbowHsl(i,n){return'hsl('+Math.round(i/n*360)+',70%,50%)';}
function rainbowHslDark(i,n){return'hsl('+Math.round(i/n*360)+',50%,18%)';}
function rainbowHslLit(i,n){return'hsl('+Math.round(i/n*360)+',80%,70%)';}

function getItemWeights(cat){
  const items=cat.items,n=items.length;
  const tierIds=new Set(['strength','speed','durability','iq','fight','weaponMastery','powerMastery']);
  if(tierIds.has(cat.id))return items.map((_,i)=>i===0?0.4:1.5-i/(n-1));
  if(cat.id==='apexForces')return items.map(item=>item==='None'?2.5:1);
  const noItems={'weapon':'No Weapon','enchantment':'No Enchantment','extraPower':'No Extra Power','weakness':'No Weakness'};
  if(noItems[cat.id])return items.map(item=>item===noItems[cat.id]?3:1);
  return null;
}

function getCumAngles(cat){
  const n=cat.items.length,w=getItemWeights(cat);
  if(!w){const a=[];for(let i=0;i<=n;i++)a.push(i*Math.PI*2/n);return a;}
  const total=w.reduce((a,b)=>a+b,0),cum=[0];
  for(let i=0;i<n;i++)cum.push(cum[i]+w[i]/total*Math.PI*2);
  return cum;
}

// AUDIO

const SFX={
  ctx:null,
  _init(){if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},
  _tone(freq,dur,type,vol,delay){
    this._init();if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(freq,this.ctx.currentTime+(delay||0));
    g.gain.setValueAtTime(vol||0.15,this.ctx.currentTime+(delay||0));
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+(delay||0)+dur);
    o.connect(g);g.connect(this.ctx.destination);
    o.start(this.ctx.currentTime+(delay||0));o.stop(this.ctx.currentTime+(delay||0)+dur);
  },
  tick(){this._tone(600,0.03,'sine',0.08)},
  land(){this._tone(400,0.15,'sine',0.2);this._tone(600,0.2,'sine',0.15,0.1)},
  spin(){for(let i=0;i<3;i++)this._tone(500+i*50,0.05,'square',0.05,i*0.04)},
  click(){this._tone(800,0.05,'square',0.06)},
  victory(){for(let i=0;i<6;i++)this._tone(400+i*80,0.2,'sine',0.12,i*0.12);this._tone(900,0.4,'sine',0.15,0.72)},
  defeat(){this._tone(300,0.3,'sine',0.15);this._tone(200,0.4,'sine',0.12,0.2)},
  hit(){this._tone(200,0.12,'sine',0.15)},
  crit(){this._tone(600,0.1,'sawtooth',0.2);this._tone(900,0.12,'square',0.18,0.05)},
  block(){this._tone(150,0.08,'square',0.1)},
};

function addBtn(id,x,y,w,h,label,color,cb,opts){buttons.push({id,x,y,w,h,label,color:color||'#fff',cb,hover:false,...(opts||{})})}

function drawBtn(b){
  if(b.color==='transparent')return;
  X.save();
  const r=b.h>40?8:6;
  X.beginPath();
  X.moveTo(b.x+r,b.y);X.lineTo(b.x+b.w-r,b.y);X.quadraticCurveTo(b.x+b.w,b.y,b.x+b.w,b.y+r);
  X.lineTo(b.x+b.w,b.y+b.h-r);X.quadraticCurveTo(b.x+b.w,b.y+b.h,b.x+b.w-r,b.y+b.h);
  X.lineTo(b.x+r,b.y+b.h);X.quadraticCurveTo(b.x,b.y+b.h,b.x,b.y+b.h-r);
  X.lineTo(b.x,b.y+r);X.quadraticCurveTo(b.x,b.y,b.x+r,b.y);X.closePath();
  X.fillStyle=b.hover?hexToRgba(b.color,0.2):'rgba(20,20,30,0.8)';X.fill();
  X.strokeStyle=b.color;X.lineWidth=b.hover?2.5:1.5;X.stroke();
  X.fillStyle=b.hover?'#fff':b.color;
  X.font='bold '+(b.fontSize||Math.min(16,b.h*0.4))+'px "Segoe UI",Arial,sans-serif';
  X.textAlign='center';X.textBaseline='middle';
  X.fillText(b.label,b.x+b.w/2,b.y+b.h/2);
  X.restore();
}

let particles=[];
function spawnParticle(x,y,opts){
  particles.push({x,y,vx:opts.vx||0,vy:opts.vy||0,life:opts.life||30,maxLife:opts.life||30,
    color:opts.color||'#fff',size:opts.size||3,text:opts.text||null,gravity:opts.gravity||0,friction:opts.friction||1,glow:opts.glow||false});
}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=p.friction;p.vy*=p.friction;p.life--;if(p.life<=0)particles.splice(i,1);}}
function drawParticles(){particles.forEach(p=>{const alpha=p.life/p.maxLife;X.globalAlpha=alpha;if(p.text){X.font='bold '+p.size+'px "Segoe UI",sans-serif';X.textAlign='center';X.textBaseline='middle';if(p.glow){X.shadowColor=p.color;X.shadowBlur=8;}X.fillStyle=p.color;X.fillText(p.text,p.x,p.y);X.shadowBlur=0;}else{if(p.glow){X.shadowColor=p.color;X.shadowBlur=6;}X.fillStyle=p.color;X.beginPath();X.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);X.fill();X.shadowBlur=0;}X.globalAlpha=1;});}

// GAME STATE
// ============================================================
let screen='title';
let wheelQueue=[];    // ordered list of wheel IDs to spin
let wheelIdx=0;       // current wheel index in queue
let charResult={};    // results keyed by wheel ID
let savedChars=[];
let selectPage=0;

// Spin state
let spin={phase:'idle',angle:0,speed:0,targetIdx:-1,result:null,landedIdx:-1};

// Battle state
let battleState=null,battleTime=0,battleLog=[];

try{savedChars=JSON.parse(localStorage.getItem('wof2_chars')||'[]');}catch(e){savedChars=[];}
function saveChars(){try{localStorage.setItem('wof2_chars',JSON.stringify(savedChars));}catch(e){}}

// Build the wheel queue (main categories + conditional)
function buildWheelQueue(){
  wheelQueue=WHEEL_CATEGORIES.map(c=>c.id);
  wheelIdx=0;
  charResult={};
}

function getCurrentWheel(){
  const id=wheelQueue[wheelIdx];
  let cat=WHEEL_CATEGORIES.find(c=>c.id===id);
  if(!cat){
    const cond=CONDITIONAL_WHEELS.find(c=>c.id===id);
    if(cond)cat=cond;
  }
  return cat;
}

// Check and insert conditional wheels after a spin
function checkConditionals(){
  const lastId=wheelQueue[wheelIdx];
  const lastResult=charResult[lastId];
  CONDITIONAL_WHEELS.forEach(cw=>{
    if(wheelQueue.includes(cw.id))return; // already added
    const t=cw.trigger;
    if(t.category===lastId){
      if(t.values===null || t.values.includes(lastResult)){
        // Insert conditional wheel right after current
        wheelQueue.splice(wheelIdx+1,0,cw.id);
      }
    }
  });
}

// ============================================================
// WHEEL SPIN MECHANICS
// ============================================================
function startSpin(cat){
  const items=cat.items;
  if(!items||items.length===0)return;
  spin.phase='spinning';
  spin.angle=Math.random()*Math.PI*2;
  spin.speed=0.2+Math.random()*0.15;
  spin.targetIdx=rand(0,items.length-1);
  spin.result=null;
  spin.landedIdx=-1;
  SFX.spin();
}

let lastTickAngle=0;
function updateSpin(){
  if(spin.phase!=='spinning')return;
  spin.angle+=spin.speed;
  spin.speed*=0.988;

  // Tick sound as segments pass
  const cat=getCurrentWheel();
  if(cat){
    const sliceAngle=Math.PI*2/cat.items.length;
    const currentSlice=Math.floor(((spin.angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2)/sliceAngle);
    const lastSlice=Math.floor(((lastTickAngle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2)/sliceAngle);
    if(currentSlice!==lastSlice&&spin.speed>0.01)SFX.tick();
  }
  lastTickAngle=spin.angle;

  if(spin.speed<0.001){
    spin.phase='landed';
    if(cat){
      const items=cat.items;
      const cum=getCumAngles(cat);
      const normAngle=(((-spin.angle-Math.PI/2)%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
      let idx=items.length-1;
      for(let i=0;i<items.length;i++){if(normAngle<cum[i+1]){idx=i;break;}}
      spin.landedIdx=idx;
      spin.result=items[idx];
      charResult[cat.id]=spin.result;
      checkConditionals();
      SFX.land();
    }
  }
}

  X.rotate(-t*0.6);X.strokeStyle='rgba(156,39,176,0.12)';

  for(let i=0;i<iconCount;i++){

// DRAW: WHEEL SPIN SCREEN (OG Style — full screen wheel)
// ============================================================
function drawSpin(){
  clearBtns();
  X.fillStyle='#000';X.fillRect(0,0,VW,VH);

  const cat=getCurrentWheel();
  if(!cat){
    // All spins done
    screen='charDone';return;
  }
  const items=cat.items;
  if(!items||items.length===0){wheelIdx++;return;}

  const totalSpins=wheelQueue.length;
  const currentSpin=wheelIdx+1;

  // === TOP SECTION: Icon + Category Label + Result ===
  const topY=isMobile?50:55;

  // Category icon (emoji)
  X.font='36px serif';X.textAlign='center';X.textBaseline='middle';
  X.fillText(cat.icon||'🎯',VW/2,topY-5);

  // Category label pill
  const pillText=(cat.num||'')+'.'+cat.label;
  X.font='bold '+(isMobile?15:18)+'px "Segoe UI",Arial,sans-serif';
  const pillW=X.measureText(pillText).width+30;
  const pillH=32;
  const pillX=VW/2-pillW/2,pillY=topY+22;
  X.beginPath();
  X.moveTo(pillX+8,pillY);X.lineTo(pillX+pillW-8,pillY);X.quadraticCurveTo(pillX+pillW,pillY,pillX+pillW,pillY+8);
  X.lineTo(pillX+pillW,pillY+pillH-8);X.quadraticCurveTo(pillX+pillW,pillY+pillH,pillX+pillW-8,pillY+pillH);
  X.lineTo(pillX+8,pillY+pillH);X.quadraticCurveTo(pillX,pillY+pillH,pillX,pillY+pillH-8);
  X.lineTo(pillX,pillY+8);X.quadraticCurveTo(pillX,pillY,pillX+8,pillY);X.closePath();
  X.fillStyle='#222';X.fill();
  X.fillStyle=cat.color||'#2196F3';
  X.font='bold '+(isMobile?14:17)+'px "Segoe UI",Arial,sans-serif';
  X.fillText(pillText,VW/2,pillY+pillH/2);

  // Result text (big bold) — only when landed
  let resultY=pillY+pillH+15;
  if(spin.phase==='landed'&&spin.result){
    X.font='bold '+(isMobile?24:36)+'px "Segoe UI",Arial,sans-serif';
    X.fillStyle='#fff';
    // Wrap long text
    const maxW=VW-40;
    const txt=spin.result;
    if(X.measureText(txt).width>maxW){
      X.font='bold '+(isMobile?18:26)+'px "Segoe UI",Arial,sans-serif';
    }
    X.fillText(txt,VW/2,resultY+15);
    resultY+=isMobile?40:55;
  }else{
    resultY+=10;
  }

  // === WHEEL ===
  const wheelCenterY=spin.phase==='landed'?(resultY+VH*0.9)/2:VH*0.52;
  const maxR=Math.min(VW*0.42,VH*0.32);
  const wr=maxR;
  const cx=VW/2,cy=wheelCenterY;

  const cum=getCumAngles(cat);
  const baseColor=cat.color||'#2196F3';
  const isRainbow=RAINBOW_CATS.has(cat.id);
  const neonColor=NEON_CATS[cat.id]||null;

  // Neon glow aura for Extra Power / Weakness wheels
  if(neonColor&&spin.phase!=='landed'){
    const t=Date.now()*0.003;
    const glowR=wr+12+Math.sin(t)*4;
    X.save();
    X.shadowColor=neonColor;X.shadowBlur=35+Math.sin(t*1.3)*10;
    X.strokeStyle=neonColor;X.lineWidth=3;
    X.beginPath();X.arc(cx,cy,glowR,0,Math.PI*2);X.stroke();
    X.shadowBlur=20+Math.sin(t*0.7)*8;
    X.beginPath();X.arc(cx,cy,glowR+6,0,Math.PI*2);X.stroke();
    X.shadowBlur=0;X.restore();
  }

  X.save();X.translate(cx,cy);X.rotate(spin.angle);

  for(let i=0;i<items.length;i++){
    const startA=cum[i]-Math.PI/2;
    const endA=cum[i+1]-Math.PI/2;
    const arcSize=cum[i+1]-cum[i];

    // Segment color
    let segColor;
    if(isRainbow){
      segColor=rainbowHsl(i,items.length);
    }else if(items[i]==='Darwizzy'){
      segColor='#1a1a1a'; // near-black for joke tier
    }else if(items.length<=15){
      const hueShift=(i/items.length)*60-30;
      segColor=i%2===0?lighten(baseColor,hueShift):darken(baseColor,20+hueShift);
    }else{
      const shades=[baseColor,darken(baseColor,25),darken(baseColor,50),lighten(baseColor,15)];
      segColor=shades[i%shades.length];
    }

    // Landed: highlight winner with category-specific glow, dim others
    if(spin.phase==='landed'){
      if(i===spin.landedIdx){
        // Category-specific highlight: bright saturated version of category color
        const catHighlights={
          race:'#42A5F5',size:'#8BC34A',strength:'#CE93D8',speed:'#42A5F5',
          durability:'#EF5350',iq:'#5C6BC0',fight:'#FF5252',weapon:'#D2691E',
          weaponMastery:'#FF1744',enchantment:'#FF4081',extraPower:'#E040FB',
          powerMastery:'#D500F9',weakness:'#26C6DA',apexForces:'#F48FB1',
          conquered:'#FFA726',backstory:'#FF7043',title:'#E0E0E0',
          cosmicPower:'#536DFE',fairyPowers:'#F8BBD0',mythicalBeast:'#FF8A65',
          boneLineage:'#CFD8DC',primordialType:'#7C4DFF',whatConquered:'#FFB74D',
          demonRank:'#EF5350',angelOrder:'#90CAF9',dragonType:'#FF9100',
          elementalAffinity:'#FFB74D',godDomain:'#FFE082',vampireBloodline:'#F48FB1',
          werebeastForm:'#8D6E63',symbionteBond:'#CE93D8',reincarnationOrigin:'#78909C'
        };
        if(isRainbow){segColor=rainbowHslLit(i,items.length);}
        else{segColor=catHighlights[cat.id]||lighten(baseColor,60);}
      }else{
        segColor=isRainbow?rainbowHslDark(i,items.length):darken(baseColor,80);
      }
    }

    X.beginPath();X.moveTo(0,0);X.arc(0,0,wr,startA,endA);X.closePath();
    X.fillStyle=segColor;X.fill();
    X.strokeStyle='rgba(0,0,0,0.5)';X.lineWidth=1.5;X.stroke();

    // Text label
    const midA=startA+arcSize/2;
    const textR=wr*0.68;
    X.save();
    X.translate(Math.cos(midA)*textR,Math.sin(midA)*textR);
    X.rotate(midA+Math.PI/2);

    // Font size based on number of items and arc size
    let fontSize=Math.min(14,Math.max(6,wr*0.08));
    if(items.length>30)fontSize=Math.min(10,Math.max(5,wr*0.05));
    if(items.length>60)fontSize=Math.min(8,Math.max(4,wr*0.035));
    if(items.length>100)fontSize=Math.min(6,Math.max(3,wr*0.025));
    // Shrink text for tiny weighted segments
    if(arcSize<Math.PI*2/items.length*0.6)fontSize=Math.max(3,fontSize*0.7);

    X.font='bold '+fontSize+'px "Segoe UI",Arial,sans-serif';
    X.textAlign='center';X.textBaseline='middle';

    // Dim non-winner text when landed; Darwizzy always dim grey
    if(spin.phase==='landed'&&i!==spin.landedIdx){
      X.fillStyle='rgba(255,255,255,0.2)';
    }else if(items[i]==='Darwizzy'){
      X.fillStyle='rgba(255,255,255,0.35)';
    }else{
      X.fillStyle='#fff';
    }

    let label=items[i];
    const maxTextW=wr*0.55*Math.min(1,arcSize/(Math.PI*2/items.length));
    if(X.measureText(label).width>maxTextW){
      label=label.substring(0,Math.max(2,Math.floor(label.length*maxTextW/X.measureText(label).width)))+'..';
    }
    X.fillText(label,0,0);
    X.restore();
  }
  X.restore();

  // Center hub
  const hubR=wr*0.12;
  X.beginPath();X.arc(cx,cy,hubR,0,Math.PI*2);
  const hubGrad=X.createRadialGradient(cx,cy,hubR*0.3,cx,cy,hubR);
  hubGrad.addColorStop(0,'#444');hubGrad.addColorStop(1,'#111');
  X.fillStyle=hubGrad;X.fill();
  X.strokeStyle='#333';X.lineWidth=3;X.stroke();

  // Inner hub ring
  X.beginPath();X.arc(cx,cy,hubR*0.5,0,Math.PI*2);
  X.strokeStyle='#555';X.lineWidth=2;X.stroke();

  // Outer rim (neon-tinted for special wheels)
  if(neonColor&&spin.phase!=='landed'){
    X.save();X.shadowColor=neonColor;X.shadowBlur=15;
    X.beginPath();X.arc(cx,cy,wr+3,0,Math.PI*2);
    X.strokeStyle=neonColor;X.lineWidth=4;X.stroke();
    X.shadowBlur=0;X.restore();
  }else{
    X.beginPath();X.arc(cx,cy,wr+3,0,Math.PI*2);
    X.strokeStyle='#222';X.lineWidth=5;X.stroke();
  }

  // Pointer at top
  const ptrY=cy-wr-12;
  X.beginPath();X.moveTo(cx,cy-wr+2);X.lineTo(cx-10,ptrY-8);X.lineTo(cx+10,ptrY-8);X.closePath();
  X.fillStyle='#fff';X.fill();
  X.strokeStyle='#888';X.lineWidth=1;X.stroke();

  // === BOTTOM: Spin button or Next button ===
  if(spin.phase==='idle'){
    const btnW=160,btnH=50;
    addBtn('spin',cx-btnW/2,VH-btnH-30,btnW,btnH,'SPIN!',cat.color||'#2196F3',()=>{startSpin(cat);},{fontSize:20});
  }else if(spin.phase==='landed'){
    const btnW=160,btnH=45;
    addBtn('next',cx-btnW/2,VH-btnH-25,btnW,btnH,'NEXT >>',cat.color||'#2196F3',()=>{
      wheelIdx++;
      spin={phase:'idle',angle:Math.random()*Math.PI*2,speed:0,result:null,landedIdx:-1};
      if(wheelIdx>=wheelQueue.length)screen='charDone';
    },{fontSize:16});
  }

  // Progress indicator (small dots at bottom)
  const dotY=VH-12;
  const dotSpacing=8;
  const totalDots=Math.min(wheelQueue.length,20);
  const dotsStartX=cx-(totalDots-1)*dotSpacing/2;
  for(let i=0;i<totalDots;i++){
    X.beginPath();X.arc(dotsStartX+i*dotSpacing,dotY,2.5,0,Math.PI*2);
    X.fillStyle=i<wheelIdx?cat.color:(i===wheelIdx?'#fff':'#333');
    X.fill();
  }

  // Spin counter
  X.font='12px "Segoe UI",sans-serif';X.fillStyle='#555';X.textAlign='center';
  X.fillText(currentSpin+'/'+totalSpins,VW/2,dotY-12);

  // Back button
  addBtn('back',10,10,60,30,'< Back','#666',()=>{screen='title';},{fontSize:12});

  buttons.forEach(drawBtn);
}

function drawRoster(){
  clearBtns();X.fillStyle='#000';X.fillRect(0,0,VW,VH);

  X.font='bold '+(isMobile?22:28)+'px "Segoe UI",Arial,sans-serif';
  X.textAlign='center';X.textBaseline='middle';
  X.fillStyle='#4CAF50';X.fillText('MY ROSTER ('+savedChars.length+')',VW/2,30);

  if(savedChars.length===0){
    X.font='14px "Segoe UI",sans-serif';X.fillStyle='#555';
    X.fillText('No characters yet. Create one!',VW/2,VH/2);
    addBtn('back',10,10,60,30,'< Back','#666',()=>{screen='title';},{fontSize:12});
    buttons.forEach(drawBtn);return;
  }

  const cardH=isMobile?75:70;const startY=55;
  const perPage=Math.floor((VH-startY-60)/cardH);
  const totalPages=Math.ceil(savedChars.length/perPage);
  if(selectPage>=totalPages)selectPage=totalPages-1;
  const pageStart=selectPage*perPage;
  const pageChars=savedChars.slice(pageStart,pageStart+perPage);

  const cardW=Math.min(VW-30,500),cardX=VW/2-cardW/2;
  pageChars.forEach((ch,i)=>{
    const cy=startY+i*cardH;

    // Card bg
    X.beginPath();
    const r=8;
    X.moveTo(cardX+r,cy);X.lineTo(cardX+cardW-r,cy);X.quadraticCurveTo(cardX+cardW,cy,cardX+cardW,cy+r);
    X.lineTo(cardX+cardW,cy+cardH-6-r);X.quadraticCurveTo(cardX+cardW,cy+cardH-6,cardX+cardW-r,cy+cardH-6);
    X.lineTo(cardX+r,cy+cardH-6);X.quadraticCurveTo(cardX,cy+cardH-6,cardX,cy+cardH-6-r);
    X.lineTo(cardX,cy+r);X.quadraticCurveTo(cardX,cy,cardX+r,cy);X.closePath();
    X.fillStyle='#111';X.fill();
    X.strokeStyle='#2196F333';X.lineWidth=1;X.stroke();

    // Color accent bar
    X.fillStyle=CAT_COLORS.race;
    X.fillRect(cardX,cy,4,cardH-6);

    const tx=cardX+15;
    X.font='bold 14px "Segoe UI",sans-serif';X.textAlign='left';X.textBaseline='middle';
    X.fillStyle='#fff';X.fillText(ch._name||'Unnamed',tx,cy+16);

    X.font='11px "Segoe UI",sans-serif';X.fillStyle='#aaa';
    const info=(ch.race||'')+' // '+(ch.fight||'')+' // '+(ch.title||'');
    X.fillText(info.substring(0,50),tx,cy+34);

    X.font='10px "Segoe UI",sans-serif';X.fillStyle='#888';
    const stats='STR:'+tierShort(ch.strength)+' SPD:'+tierShort(ch.speed)+' DUR:'+tierShort(ch.durability)+' IQ:'+tierShort(ch.iq);
    X.fillText(stats,tx,cy+50);

    // Delete button
    addBtn('del'+i,cardX+cardW-35,cy+cardH/2-14,28,28,'X','#F44336',()=>{
      savedChars.splice(pageStart+i,1);saveChars();
    },{fontSize:12});
  });

  if(totalPages>1){
    const navY=VH-35;
    X.font='13px "Segoe UI",sans-serif';X.textAlign='center';X.fillStyle='#666';
    X.fillText((selectPage+1)+'/'+totalPages,VW/2,navY);
    if(selectPage>0)addBtn('rPrev',VW/2-80,navY-12,50,24,'PREV','#4CAF50',()=>{selectPage--;},{fontSize:11});
    if(selectPage<totalPages-1)addBtn('rNext',VW/2+30,navY-12,50,24,'NEXT','#4CAF50',()=>{selectPage++;},{fontSize:11});
  }

  addBtn('back',10,10,60,30,'< Back','#666',()=>{screen='title';},{fontSize:12});
  buttons.forEach(drawBtn);
}

function tierShort(val){
  if(!val)return'—';
  if(val.length<=6)return val;
  return val.substring(0,5)+'..';
}

// ============================================================
// BATTLE SELECT
// ============================================================
let battleSelectP1=0,battleSelectP2=1;
function drawBattleSelect(){
  clearBtns();X.fillStyle='#000';X.fillRect(0,0,VW,VH);

  X.font='bold '+(isMobile?20:26)+'px "Segoe UI",sans-serif';
  X.textAlign='center';X.textBaseline='middle';
  X.fillStyle='#F44336';X.fillText('SELECT FIGHTERS',VW/2,30);

  if(savedChars.length<2){
    X.font='14px "Segoe UI",sans-serif';X.fillStyle='#555';
    X.fillText('Need at least 2 characters!',VW/2,VH/2);
    addBtn('back',10,10,60,30,'< Back','#666',()=>{screen='title';},{fontSize:12});
    buttons.forEach(drawBtn);return;
  }

  const p1=savedChars[battleSelectP1],p2=savedChars[battleSelectP2];
  const colW=(VW-50)/2;

  drawFighterPreview(20,60,colW,p1,'P1','#2196F3');
  drawFighterPreview(VW/2+5,60,colW,p2,'P2','#F44336');

  addBtn('p1prev',20,260,40,30,'<','#2196F3',()=>{battleSelectP1=(battleSelectP1-1+savedChars.length)%savedChars.length;if(battleSelectP1===battleSelectP2)battleSelectP1=(battleSelectP1-1+savedChars.length)%savedChars.length;},{fontSize:14});
  addBtn('p1next',colW-20,260,40,30,'>','#2196F3',()=>{battleSelectP1=(battleSelectP1+1)%savedChars.length;if(battleSelectP1===battleSelectP2)battleSelectP1=(battleSelectP1+1)%savedChars.length;},{fontSize:14});

  X.font='bold 24px "Segoe UI",sans-serif';X.textAlign='center';X.fillStyle='#fff';
  X.fillText('VS',VW/2,180);

  addBtn('p2prev',VW/2+5,260,40,30,'<','#F44336',()=>{battleSelectP2=(battleSelectP2-1+savedChars.length)%savedChars.length;if(battleSelectP2===battleSelectP1)battleSelectP2=(battleSelectP2-1+savedChars.length)%savedChars.length;},{fontSize:14});
  addBtn('p2next',VW-40,260,40,30,'>','#F44336',()=>{battleSelectP2=(battleSelectP2+1)%savedChars.length;if(battleSelectP2===battleSelectP1)battleSelectP2=(battleSelectP2+1)%savedChars.length;},{fontSize:14});

  addBtn('fight',VW/2-80,VH-90,160,50,'FIGHT!','#F44336',()=>{
    initBattle(savedChars[battleSelectP1],savedChars[battleSelectP2]);
    screen='battle';
  },{fontSize:20});

  addBtn('back',10,10,60,30,'< Back','#666',()=>{screen='title';},{fontSize:12});
  buttons.forEach(drawBtn);
}

function drawFighterPreview(x,y,w,ch,label,color){
  // Card
  X.beginPath();const r=8;
  X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+190-r);X.quadraticCurveTo(x+w,y+190,x+w-r,y+190);
  X.lineTo(x+r,y+190);X.quadraticCurveTo(x,y+190,x,y+190-r);
  X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath();
  X.fillStyle='#111';X.fill();X.strokeStyle=color;X.lineWidth=2;X.stroke();

  X.font='bold 14px "Segoe UI",sans-serif';X.textAlign='center';X.textBaseline='middle';
  X.fillStyle=color;X.fillText(label,x+w/2,y+16);

  X.font='bold 13px "Segoe UI",sans-serif';X.fillStyle='#fff';
  X.fillText(ch._name||'Unnamed',x+w/2,y+45);

  X.font='10px "Segoe UI",sans-serif';X.fillStyle='#aaa';
  X.fillText(ch.race||'',x+w/2,y+62);
  X.fillText(ch.title||'',x+w/2,y+76);

  X.font='10px "Segoe UI",sans-serif';X.textAlign='left';
  const sx=x+8;
  X.fillStyle='#9C27B0';X.fillText('STR: '+(ch.strength||'—'),sx,y+100);
  X.fillStyle='#1565C0';X.fillText('SPD: '+(ch.speed||'—'),sx,y+115);
  X.fillStyle='#C62828';X.fillText('DUR: '+(ch.durability||'—'),sx,y+130);
  X.fillStyle='#283593';X.fillText('IQ: '+(ch.iq||'—'),sx,y+145);
  X.fillStyle='#D32F2F';X.fillText('FGT: '+(ch.fight||'—'),sx,y+160);
  X.fillStyle='#8B4513';X.fillText('WPN: '+tierShort(ch.weapon||'—'),sx,y+175);
}

// ============================================================
// BATTLE ENGINE — Tier-based combat
// ============================================================
function tierToNum(val,tierArr){
  if(!val||!tierArr)return 3;
  const idx=tierArr.indexOf(val);
  return idx>=0?idx:3;
}

function getCharPower(ch){
  return {
    str:tierToNum(ch.strength,STRENGTH),
    spd:tierToNum(ch.speed,SPEED),
    dur:tierToNum(ch.durability,DURABILITY),
    iq:tierToNum(ch.iq,IQ_TIERS),
    fight:tierToNum(ch.fight,FIGHT),
    wm:tierToNum(ch.weaponMastery,WEAPON_MASTERY),
    pm:tierToNum(ch.powerMastery,POWER_MASTERY),
  };
}

function initBattle(ch1,ch2){
  const p1=getCharPower(ch1),p2=getCharPower(ch2);
  const hp1=50+(p1.dur*12);
  const hp2=50+(p2.dur*12);

  battleState={
    f1:{...ch1,power:p1,hp:hp1,maxHp:hp1,x:VW*0.25,y:VH/2,alive:true,atkCd:0,hitFlash:0,scale:1},
    f2:{...ch2,power:p2,hp:hp2,maxHp:hp2,x:VW*0.75,y:VH/2,alive:true,atkCd:0,hitFlash:0,scale:1},
    phase:'intro',introTimer:0,winner:null,resultTimer:0,
  };
  battleTime=0;particles=[];battleLog=[];
  addBattleLog(ch1._name+' vs '+ch2._name+'!','#fff');
}

function addBattleLog(msg,color){
  battleLog.unshift({msg,color:color||'#aaa',life:180});
  if(battleLog.length>6)battleLog.pop();
}

function updateBattle(){
  if(!battleState)return;
  battleTime++;

  if(battleState.phase==='intro'){
    battleState.introTimer++;
    if(battleState.introTimer>=120){
      battleState.phase='fight';
    }
    return;
  }

  if(battleState.phase==='result'){
    battleState.resultTimer++;
    if(battleState.resultTimer%3===0&&battleState.winner){
      const w=battleState.winner;
      spawnParticle(w.x+rand(-30,30),w.y+rand(-30,30),{
        vx:rand(-2,2)*0.5,vy:rand(-3,-1)*0.5,life:40,
        color:pick(['#FFD700','#fff','#FF6F00']),size:rand(2,4),glow:true,gravity:0.05
      });
    }
    updateParticles();return;
  }

  const f1=battleState.f1,f2=battleState.f2;
  [f1,f2].forEach(f=>{
    if(!f.alive)return;
    const enemy=f===f1?f2:f1;
    if(!enemy.alive)return;

    const dx=enemy.x-f.x,dy=enemy.y-f.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const spd=1.5+f.power.spd*0.4;

    // Move toward enemy
    if(dist>80){f.x+=dx/dist*spd;f.y+=dy/dist*spd;}

    // Attack
    f.atkCd--;
    if(f.atkCd<=0&&dist<100){
      const atkPower=f.power.str*2+f.power.fight+f.power.wm;
      const def=enemy.power.dur+enemy.power.fight*0.5;
      let dmg=Math.max(1,atkPower-def+rand(-2,3));

      // Crit chance based on IQ
      const critChance=5+f.power.iq*3;
      const isCrit=rand(1,100)<=critChance;
      if(isCrit){dmg=Math.floor(dmg*1.8);SFX.crit();}else{SFX.hit();}

      // Dodge based on speed
      const dodgeChance=(enemy.power.spd-f.power.spd)*5;
      if(rand(1,100)<=dodgeChance){
        addBattleLog(enemy._name+' dodged!','#1565C0');
        spawnParticle(enemy.x,enemy.y-20,{text:'DODGE',color:'#1565C0',size:16,vy:-1,life:30,glow:true});
      }else{
        enemy.hp-=dmg;
        enemy.hitFlash=10;
        addBattleLog(f._name+' hit for '+dmg+(isCrit?' CRIT!':''),'#F44336');
        spawnParticle(enemy.x,enemy.y-20,{text:'-'+dmg,color:isCrit?'#FFD700':'#F44336',size:isCrit?20:16,vy:-1.5,life:30,glow:true});

        if(enemy.hp<=0){
          enemy.hp=0;enemy.alive=false;
          battleState.phase='result';battleState.winner=f;
          addBattleLog(f._name+' WINS!','#FFD700');
          SFX.victory();
        }
      }
      f.atkCd=Math.max(10,40-f.power.spd*3);
    }

    f.hitFlash=Math.max(0,f.hitFlash-1);
  });
  updateParticles();
}

function drawBattle(){
  clearBtns();X.fillStyle='#000';X.fillRect(0,0,VW,VH);
  if(!battleState)return;

  // Battle gradient bg
  const grad=X.createLinearGradient(0,0,VW,VH);
  grad.addColorStop(0,'#0a0a1a');grad.addColorStop(1,'#1a0a0a');
  X.fillStyle=grad;X.fillRect(0,0,VW,VH);

  const f1=battleState.f1,f2=battleState.f2;

  if(battleState.phase==='intro'){
    const t=battleState.introTimer;
    // P1 slide in
    if(t<50){
      const alpha=t/50;
      X.globalAlpha=alpha;
      X.font='bold 20px "Segoe UI",sans-serif';X.textAlign='center';X.fillStyle='#2196F3';
      X.fillText(f1._name||'Fighter 1',VW*0.25,VH/2);
      X.font='12px "Segoe UI",sans-serif';X.fillStyle='#aaa';
      X.fillText(f1.race||'',VW*0.25,VH/2+22);
    }
    // VS
    if(t>=50&&t<80){
      X.globalAlpha=(t-50)/30;
      X.font='bold 48px "Segoe UI",sans-serif';X.textAlign='center';X.fillStyle='#fff';
      X.fillText('VS',VW/2,VH/2);
    }
    // P2 slide in
    if(t>=80&&t<120){
      X.globalAlpha=(t-80)/40;
      X.font='bold 20px "Segoe UI",sans-serif';X.textAlign='center';X.fillStyle='#F44336';
      X.fillText(f2._name||'Fighter 2',VW*0.75,VH/2);
      X.font='12px "Segoe UI",sans-serif';X.fillStyle='#aaa';
      X.fillText(f2.race||'',VW*0.75,VH/2+22);
    }
    X.globalAlpha=1;
    buttons.forEach(drawBtn);return;
  }

  // Draw fighters
  [f1,f2].forEach((f,i)=>{
    const color=i===0?'#2196F3':'#F44336';

    // Fighter circle
    X.save();
    if(f.hitFlash>0){X.shadowColor='#F44336';X.shadowBlur=20;}
    if(!f.alive){X.globalAlpha=0.3;}

    X.beginPath();X.arc(f.x,f.y,25,0,Math.PI*2);
    const fGrad=X.createRadialGradient(f.x-5,f.y-5,3,f.x,f.y,25);
    fGrad.addColorStop(0,lighten(color,40));fGrad.addColorStop(1,color);
    X.fillStyle=fGrad;X.fill();
    X.strokeStyle=darken(color,30);X.lineWidth=2;X.stroke();
    X.shadowBlur=0;

    // Name label
    X.font='bold 11px "Segoe UI",sans-serif';X.textAlign='center';X.fillStyle='#fff';
    X.fillText(f._name||'?',f.x,f.y-35);

    // HP bar
    const hpW=60,hpH=6,hpX=f.x-hpW/2,hpY=f.y-45;
    X.fillStyle='#333';X.fillRect(hpX,hpY,hpW,hpH);
    const hpPct=Math.max(0,f.hp/f.maxHp);
    X.fillStyle=hpPct>0.5?'#4CAF50':hpPct>0.25?'#FF9800':'#F44336';
    X.fillRect(hpX,hpY,hpW*hpPct,hpH);

    X.globalAlpha=1;X.restore();
  });

  // Battle log
  const logX=10,logY=VH-20;
  battleLog.forEach((l,i)=>{
    const alpha=Math.min(1,l.life/60);
    X.globalAlpha=alpha;X.font='11px "Segoe UI",sans-serif';X.textAlign='left';
    X.fillStyle=l.color;X.fillText(l.msg,logX,logY-i*16);
    l.life--;
  });
  X.globalAlpha=1;
  battleLog=battleLog.filter(l=>l.life>0);

  // Draw particles
  drawParticles();

  // Result
  if(battleState.phase==='result'&&battleState.winner){
    X.font='bold '+(isMobile?24:36)+'px "Segoe UI",sans-serif';X.textAlign='center';
    X.shadowColor='#FFD700';X.shadowBlur=20;
    X.fillStyle='#FFD700';
    X.fillText(battleState.winner._name+' WINS!',VW/2,60);
    X.shadowBlur=0;

    if(battleState.resultTimer>60){
      addBtn('back',VW/2-60,VH-80,120,40,'BACK','#666',()=>{screen='title';battleState=null;},{fontSize:14});
    }
  }

  addBtn('quit',10,10,50,28,'Quit','#666',()=>{screen='title';battleState=null;},{fontSize:11});
  buttons.forEach(drawBtn);
}

// ============================================================
// INPUT HANDLING
// ============================================================
function handleInput(mx,my){
  for(let i=buttons.length-1;i>=0;i--){
    const b=buttons[i];
    if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){
      if(b.cb){b.cb();SFX.click();}
      return true;
    }
  }
  return false;
}

C.addEventListener('click',e=>{
  const r=C.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  handleInput(mx,my);
});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.changedTouches&&e.changedTouches[0]){
    const r=C.getBoundingClientRect();
    const mx=e.changedTouches[0].clientX-r.left,my=e.changedTouches[0].clientY-r.top;
    handleInput(mx,my);
  }
},{passive:false});

// Hover tracking
C.addEventListener('mousemove',e=>{
  const r=C.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  buttons.forEach(b=>{b.hover=mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h;});
});

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(){
  switch(screen){
    case 'title':drawTitle();break;
    case 'spin':updateSpin();drawSpin();break;
    case 'charDone':drawCharDone();break;
    case 'roster':drawRoster();break;
    case 'battleSelect':drawBattleSelect();break;
    case 'battle':updateBattle();drawBattle();break;
  }
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
