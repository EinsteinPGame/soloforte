<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Randomizer Wheel - SoloForte AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      padding: 20px 20px 10px;
      width: 100%;
      background: linear-gradient(180deg, #12122a 0%, #0a0a1a 100%);
    }
    .header h1 { font-size: 1.8rem; color: #7b68ee; margin-bottom: 4px; }
    .header p { color: #888; font-size: 0.85rem; }
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 10px 16px 30px;
      width: 100%;
      max-width: 600px;
    }

    /* Tabs */
    .tabs-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      overflow-x: auto;
      padding: 4px 0;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 6px 14px;
      border: 1px solid #333;
      border-radius: 8px 8px 0 0;
      background: #12122a;
      color: #888;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: #1a1a3a;
      color: #7b68ee;
      border-color: #7b68ee;
      border-bottom-color: #1a1a3a;
    }
    .tab-btn:hover { color: #aaa; }
    .tab-close {
      font-size: 0.7rem;
      color: #666;
      cursor: pointer;
      padding: 0 2px;
      border-radius: 3px;
    }
    .tab-close:hover { color: #ff4444; background: rgba(255,68,68,0.15); }
    .tab-add {
      padding: 6px 10px;
      border: 1px dashed #444;
      border-radius: 8px 8px 0 0;
      background: transparent;
      color: #666;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .tab-add:hover { color: #7b68ee; border-color: #7b68ee; }

    .wheel-container {
      position: relative;
      width: 300px;
      height: 300px;
    }
    @media (min-width: 500px) {
      .wheel-container { width: 380px; height: 380px; }
    }
    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(123, 104, 238, 0.3);
    }
    .pointer {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 28px solid #ff4444;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      z-index: 10;
    }
    .result-box {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffcc00;
      text-align: center;
      min-height: 36px;
      padding: 8px;
      text-shadow: 0 0 10px rgba(255,204,0,0.5);
    }
    .winner-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .winner-actions button {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
    }
    .winner-actions button:active { transform: scale(0.95); }
    .btn-keep { background: #33cc66; color: #fff; }
    .btn-keep:hover { background: #44dd77; }
    .btn-remove { background: #ff4444; color: #fff; }
    .btn-remove:hover { background: #ff6666; }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.95); }
    .btn-spin { background: #7b68ee; color: #fff; font-size: 1.1rem; }
    .btn-spin:hover { background: #8b7cf8; }
    .btn-spin:disabled { background: #444; cursor: not-allowed; }
    .btn-shuffle { background: #ff8833; color: #fff; }
    .btn-shuffle:hover { background: #ffa055; }
    .btn-save { background: #33cc66; color: #fff; }
    .btn-save:hover { background: #44dd77; }
    .btn-clear { background: #444; color: #ccc; }
    .btn-clear:hover { background: #555; }
    .input-section {
      width: 100%;
    }
    .input-section label {
      display: block;
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    textarea {
      width: 100%;
      height: 220px;
      background: #12122a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: 'Consolas', monospace;
      font-size: 1.1rem;
      padding: 12px;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: #7b68ee; }
    textarea::placeholder { color: #555; }
    .entry-count {
      text-align: right;
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
    }
    .entry-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .entry-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #151528;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.85rem;
      color: #ccc;
    }
    .entry-tag .remove-entry {
      cursor: pointer;
      color: #666;
      font-size: 0.75rem;
      padding: 0 3px;
      border-radius: 3px;
      line-height: 1;
    }
    .entry-tag .remove-entry:hover { color: #ff4444; background: rgba(255,68,68,0.15); }
    .history {
      width: 100%;
      margin-top: 8px;
    }
    .history h3 { color: #888; font-size: 0.85rem; margin-bottom: 6px; }
    .history-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .history-list li {
      background: #151528;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .save-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #33cc66;
      color: #fff;
      font-weight: bold;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      pointer-events: none;
    }
    .save-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .home-link {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #7b68ee;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .home-link:hover { color: #fff; }

    /* Winner Overlay */
    .winner-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      animation: overlayIn 0.3s ease;
    }
    .winner-overlay.show { display: flex; }
    @keyframes overlayIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .winner-overlay .winner-label {
      font-size: 1.2rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .winner-overlay .winner-name {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 900;
      color: #ffcc00;
      text-align: center;
      text-shadow: 0 0 30px rgba(255,204,0,0.6), 0 0 60px rgba(255,204,0,0.3);
      padding: 0 20px;
      word-break: break-word;
      max-width: 90vw;
    }
    .winner-overlay .overlay-actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }
    .winner-overlay .overlay-actions button {
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
    }
    .winner-overlay .overlay-actions button:active { transform: scale(0.95); }
    .winner-overlay .overlay-btn-keep { background: #33cc66; color: #fff; }
    .winner-overlay .overlay-btn-keep:hover { background: #44dd77; }
    .winner-overlay .overlay-btn-remove { background: #ff4444; color: #fff; }
    .winner-overlay .overlay-btn-remove:hover { background: #ff6666; }
    .winner-overlay .overlay-btn-close { background: #444; color: #ddd; }
    .winner-overlay .overlay-btn-close:hover { background: #555; }

    /* Rename input */
    .tab-rename {
      background: #0a0a1a;
      border: 1px solid #7b68ee;
      color: #e0e0e0;
      font-size: 0.82rem;
      padding: 4px 8px;
      border-radius: 4px;
      width: 80px;
      outline: none;
    }
  </style>
</head>
<body>
  <a href="index.html" class="home-link">&larr; Home</a>
  <div class="header">
    <h1>Randomizer Wheel</h1>
    <p>Add entries, spin to pick a random one!</p>
  </div>
  <div class="main">
    <div class="tabs-bar" id="tabsBar"></div>
    <div class="wheel-container">
      <div class="pointer"></div>
      <canvas id="wheel"></canvas>
    </div>
    <div class="result-box" id="result"></div>
    <div class="winner-actions" id="winnerActions" style="display:none">
      <button class="btn-keep" onclick="keepWinner()">Keep</button>
      <button class="btn-remove" onclick="removeWinner()">Remove</button>
    </div>
    <div class="controls">
      <button class="btn btn-spin" id="spinBtn" onclick="spin()">SPIN!</button>
      <button class="btn btn-shuffle" onclick="shuffleEntries()">Shuffle</button>
      <button class="btn btn-save" onclick="saveAll()">Save</button>
      <button class="btn btn-clear" onclick="clearAll()">Clear</button>
    </div>
    <div class="input-section">
      <label>Enter items (one per line) &mdash; paste from anywhere!</label>
      <textarea id="entries" placeholder="Pizza&#10;Burger&#10;Sushi&#10;Tacos&#10;Ramen" oninput="updateWheel()"></textarea>
      <div class="entry-count" id="entryCount">0 entries</div>
      <div class="entry-list" id="entryList"></div>
    </div>
    <div class="history" id="historySection" style="display:none">
      <h3>Recent Results</h3>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>
  <div class="winner-overlay" id="winnerOverlay">
    <div class="winner-label">WINNER</div>
    <div class="winner-name" id="winnerName"></div>
    <div class="overlay-actions">
      <button class="overlay-btn-keep" onclick="overlayKeep()">Keep</button>
      <button class="overlay-btn-remove" onclick="overlayRemove()">Remove &amp; Spin Again</button>
      <button class="overlay-btn-close" onclick="closeOverlay()">Close</button>
    </div>
  </div>
  <div class="save-toast" id="saveToast">Saved!</div>

  <script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const COLORS = [
      '#ff4444','#ff8833','#ffcc00','#33cc66','#4488ff',
      '#7b68ee','#cc66ff','#ff55aa','#00cccc','#88cc44',
      '#ff6644','#44aaff','#ee5599','#66ddaa','#ddaa33',
      '#aa44cc','#33bbcc','#ff7777','#55bb55','#cc8844',
    ];
    const STORAGE_KEY = 'randomizerWheelData';

    let tabs = [];
    let activeTabIdx = 0;
    let entries = [];
    let spinning = false;
    let currentAngle = 0;
    let spinVelocity = 0;
    let history = [];
    let lastWinner = null;

    // --- Tab / Storage Management ---
    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (data.tabs && data.tabs.length > 0) {
            tabs = data.tabs;
            activeTabIdx = Math.min(data.activeTab || 0, tabs.length - 1);
            loadTab(activeTabIdx);
            return;
          }
        }
      } catch (e) {}
      // Default: one tab
      tabs = [{ name: 'Wheel 1', entries: '', history: [] }];
      activeTabIdx = 0;
      loadTab(0);
    }

    function saveData() {
      // Save current tab state first
      saveCurrentTabState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        tabs: tabs,
        activeTab: activeTabIdx
      }));
    }

    function saveCurrentTabState() {
      if (tabs[activeTabIdx]) {
        tabs[activeTabIdx].entries = document.getElementById('entries').value;
        tabs[activeTabIdx].history = history.slice();
      }
    }

    function loadTab(idx) {
      activeTabIdx = idx;
      const tab = tabs[idx];
      document.getElementById('entries').value = tab.entries || '';
      history = (tab.history || []).slice();
      currentAngle = 0;
      lastWinner = null;
      document.getElementById('result').textContent = '';
      document.getElementById('winnerActions').style.display = 'none';
      updateWheel();
      updateHistory();
      renderTabs();
    }

    function renderTabs() {
      const bar = document.getElementById('tabsBar');
      bar.innerHTML = '';
      tabs.forEach((tab, i) => {
        const btn = document.createElement('div');
        btn.className = 'tab-btn' + (i === activeTabIdx ? ' active' : '');
        const nameSpan = document.createElement('span');
        nameSpan.textContent = tab.name;
        nameSpan.ondblclick = (e) => { e.stopPropagation(); startRenameTab(i); };
        btn.appendChild(nameSpan);
        if (tabs.length > 1) {
          const close = document.createElement('span');
          close.className = 'tab-close';
          close.textContent = 'x';
          close.onclick = (e) => { e.stopPropagation(); removeTab(i); };
          btn.appendChild(close);
        }
        btn.onclick = () => switchTab(i);
        bar.appendChild(btn);
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'tab-add';
      addBtn.textContent = '+';
      addBtn.title = 'New wheel';
      addBtn.onclick = addTab;
      bar.appendChild(addBtn);
    }

    function switchTab(idx) {
      if (idx === activeTabIdx || spinning) return;
      saveCurrentTabState();
      loadTab(idx);
    }

    function addTab() {
      saveCurrentTabState();
      const newName = 'Wheel ' + (tabs.length + 1);
      tabs.push({ name: newName, entries: '', history: [] });
      saveData();
      loadTab(tabs.length - 1);
    }

    function removeTab(idx) {
      if (tabs.length <= 1 || spinning) return;
      tabs.splice(idx, 1);
      if (activeTabIdx >= tabs.length) activeTabIdx = tabs.length - 1;
      else if (idx < activeTabIdx) activeTabIdx--;
      saveData();
      loadTab(activeTabIdx);
    }

    function startRenameTab(idx) {
      const bar = document.getElementById('tabsBar');
      const tabBtns = bar.querySelectorAll('.tab-btn');
      const btn = tabBtns[idx];
      if (!btn) return;
      const nameSpan = btn.querySelector('span');
      const input = document.createElement('input');
      input.className = 'tab-rename';
      input.value = tabs[idx].name;
      input.maxLength = 20;
      nameSpan.replaceWith(input);
      input.focus();
      input.select();
      const finish = () => {
        const val = input.value.trim() || tabs[idx].name;
        tabs[idx].name = val;
        saveData();
        renderTabs();
      };
      input.onblur = finish;
      input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };
    }

    // --- Wheel Drawing ---
    function resize() {
      const container = canvas.parentElement;
      const size = container.clientWidth;
      canvas.width = size * 2;
      canvas.height = size * 2;
      drawWheel();
    }
    window.addEventListener('resize', resize);

    function getEntries() {
      const text = document.getElementById('entries').value;
      return text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    }

    function updateWheel() {
      entries = getEntries();
      document.getElementById('entryCount').textContent = entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies');
      renderEntryList();
      if (!spinning) drawWheel();
    }

    function renderEntryList() {
      const list = document.getElementById('entryList');
      if (entries.length === 0) { list.innerHTML = ''; return; }
      list.innerHTML = entries.map((e, i) =>
        '<span class="entry-tag">' + e.replace(/</g, '&lt;') +
        ' <span class="remove-entry" onclick="removeEntry(' + i + ')">✕</span></span>'
      ).join('');
    }

    function removeEntry(idx) {
      const textarea = document.getElementById('entries');
      const lines = textarea.value.split('\n');
      let count = 0;
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].trim().length > 0) {
          if (count === idx) { lines.splice(i, 1); break; }
          count++;
        }
      }
      textarea.value = lines.join('\n');
      updateWheel();
    }

    function drawWheel() {
      const w = canvas.width, h = canvas.height;
      const cx = w / 2, cy = h / 2, r = Math.min(cx, cy) - 4;
      ctx.clearRect(0, 0, w, h);

      if (entries.length === 0) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#151528';
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#555';
        ctx.font = 'bold ' + (r * 0.12) + 'px Consolas, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Add entries below', cx, cy);
        return;
      }

      const n = entries.length;
      const sliceAngle = (Math.PI * 2) / n;

      entries.forEach((entry, i) => {
        const startAngle = currentAngle + i * sliceAngle;
        const endAngle = startAngle + sliceAngle;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        ctx.strokeStyle = '#0a0a1a';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        const maxLen = n > 12 ? 8 : n > 6 ? 12 : 18;
        const label = entry.length > maxLen ? entry.slice(0, maxLen - 1) + '\u2026' : entry;
        const fontSize = Math.min(r * 0.1, n < 5 ? 28 : n < 10 ? 20 : n < 16 ? 14 : 10);
        ctx.font = 'bold ' + fontSize + 'px Consolas, monospace';
        ctx.fillStyle = '#fff';
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 4;
        ctx.fillText(label, r - 12, 0);
        ctx.shadowBlur = 0;
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.12, 0, Math.PI * 2);
      ctx.fillStyle = '#0a0a1a';
      ctx.fill();
      ctx.strokeStyle = '#7b68ee';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // --- Spin ---
    function spin() {
      entries = getEntries();
      if (entries.length < 2) {
        document.getElementById('result').textContent = 'Need at least 2 entries!';
        document.getElementById('result').style.color = '#ff4444';
        return;
      }
      if (spinning) return;
      spinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('result').textContent = '';
      document.getElementById('result').style.color = '#ffcc00';
      document.getElementById('winnerActions').style.display = 'none';
      lastWinner = null;

      spinVelocity = 0.3 + Math.random() * 0.2;
      const friction = 0.985 + Math.random() * 0.005;

      function animate() {
        currentAngle += spinVelocity;
        spinVelocity *= friction;
        drawWheel();

        if (spinVelocity > 0.002) {
          requestAnimationFrame(animate);
        } else {
          spinning = false;
          document.getElementById('spinBtn').disabled = false;
          spinVelocity = 0;

          const n = entries.length;
          const sliceAngle = (Math.PI * 2) / n;
          const pointerAngle = (Math.PI * 2 - (currentAngle % (Math.PI * 2)) + Math.PI * 1.5) % (Math.PI * 2);
          const winnerIdx = Math.floor(pointerAngle / sliceAngle) % n;
          const winner = entries[winnerIdx];
          lastWinner = winner;

          document.getElementById('result').textContent = winner;
          document.getElementById('result').style.color = '#ffcc00';
          document.getElementById('winnerActions').style.display = 'flex';

          // Show fullscreen overlay
          document.getElementById('winnerName').textContent = winner;
          document.getElementById('winnerOverlay').classList.add('show');

          history.unshift(winner);
          if (history.length > 10) history.pop();
          updateHistory();
        }
      }
      requestAnimationFrame(animate);
    }

    // --- Keep / Remove Winner ---
    function keepWinner() {
      document.getElementById('winnerActions').style.display = 'none';
      lastWinner = null;
    }

    function removeWinner() {
      if (!lastWinner) return;
      const textarea = document.getElementById('entries');
      const lines = textarea.value.split('\n');
      // Remove first matching line
      const idx = lines.findIndex(l => l.trim() === lastWinner);
      if (idx !== -1) lines.splice(idx, 1);
      textarea.value = lines.join('\n');
      document.getElementById('winnerActions').style.display = 'none';
      lastWinner = null;
      updateWheel();
    }

    // --- Overlay Actions ---
    function closeOverlay() {
      document.getElementById('winnerOverlay').classList.remove('show');
    }
    function overlayKeep() {
      closeOverlay();
      keepWinner();
    }
    function overlayRemove() {
      closeOverlay();
      removeWinner();
    }

    // --- Shuffle / Clear / Save ---
    function shuffleEntries() {
      entries = getEntries();
      if (entries.length < 2) return;
      for (let i = entries.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [entries[i], entries[j]] = [entries[j], entries[i]];
      }
      document.getElementById('entries').value = entries.join('\n');
      updateWheel();
    }

    function saveAll() {
      saveData();
      showToast('Saved!');
    }

    function clearAll() {
      document.getElementById('entries').value = '';
      document.getElementById('result').textContent = '';
      document.getElementById('winnerActions').style.display = 'none';
      history = [];
      lastWinner = null;
      updateHistory();
      updateWheel();
    }

    function showToast(msg) {
      const toast = document.getElementById('saveToast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function updateHistory() {
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      list.innerHTML = history.map((h, i) =>
        '<li>' + (i + 1) + '. ' + h.replace(/</g, '&lt;') + '</li>'
      ).join('');
    }

    // --- Init ---
    loadData();
    resize();

    document.getElementById('entries').addEventListener('paste', () => {
      setTimeout(updateWheel, 50);
    });
  </script>
  <script src="auth.js"></script>
<script src="back-btn.js"></script>
</body>
</html>
