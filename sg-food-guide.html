<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SG Food Guide - Restaurants Near Every MRT Station</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --border: #2a2a4a;
      --text: #e0e0f0;
      --text-muted: #8888aa;
      --accent: #f0a500;
      --accent2: #e8638c;

      --nsl: #d42e12;
      --ewl: #009645;
      --ccl: #fa9e0d;
      --dtl: #005ec4;
      --nel: #9b0fac;
      --tel: #9d5b25;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }
    .header-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .legend-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .legend-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== LEGEND ===== */
    #legend {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: none;
      flex-wrap: wrap;
      gap: 10px;
    }
    #legend.open { display: flex; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ===== MAP CONTAINER ===== */
    #map-wrapper {
      width: 100%;
      overflow: hidden;
      position: relative;
      background: var(--bg);
      touch-action: none;
    }
    #map-svg-container {
      width: 100%;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: 0 0;
    }
    #map-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ===== STATION PANEL ===== */
    #station-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 2px solid var(--accent);
      border-radius: 20px 20px 0 0;
      padding: 0;
      max-height: 75vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      z-index: 200;
    }
    #station-panel.open {
      transform: translateY(0);
    }
    .panel-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .panel-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    .panel-station-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }
    .panel-station-code {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .panel-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .panel-close:hover { border-color: var(--accent2); color: var(--accent2); }

    .shops-container {
      padding: 16px 20px 24px;
    }
    .shops-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* ===== SHOP CARDS ===== */
    .shop-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .shop-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .shop-card:hover, .shop-card:active {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .shop-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .shop-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .shop-location {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ===== DETAIL PANEL ===== */
    #detail-panel {
      position: fixed;
      inset: 0;
      background: var(--surface);
      z-index: 300;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #detail-panel.open {
      transform: translateX(0);
    }
    .detail-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    .detail-back {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .detail-back:hover { border-color: var(--accent); }
    .detail-title-block { flex: 1; }
    .detail-shop-name {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .detail-shop-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .detail-body {
      padding: 20px;
    }

    .section-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      margin-top: 22px;
    }
    .section-title:first-child { margin-top: 0; }

    /* Menu items */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .menu-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .menu-item-name {
      font-size: 0.9rem;
      color: var(--text);
    }
    .menu-item-price {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      margin-left: 10px;
    }

    /* Options chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Location block */
    .location-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .location-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .location-pin {
      font-size: 1.1rem;
      line-height: 1.4;
      flex-shrink: 0;
    }
    .location-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .location-floor {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }
    .location-directions {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }

    /* ===== SVG STATION STYLES (applied via JS) ===== */
    .station-dot {
      cursor: pointer;
      transition: r 0.15s;
    }
    .station-dot:hover { opacity: 0.85; }

    /* ===== BACKDROP ===== */
    #backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 150;
    }
    #backdrop.visible { display: block; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== FILTER BAR ===== */
    #filter-bar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
      width: 52px;
    }
    .filter-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
      user-select: none;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 600;
    }
    .search-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input::placeholder { color: var(--text-muted); }
    #search-input:focus { border-color: var(--accent); }
    #surprise-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #f0a500, #e8638c);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #surprise-btn:hover { transform: scale(1.05); box-shadow: 0 0 12px rgba(240,165,0,0.4); }
    #surprise-btn:active { transform: scale(0.95); }

    @media (min-width: 600px) {
      #station-panel {
        max-width: 500px;
        left: auto;
        right: 20px;
        bottom: 20px;
        border-radius: 16px;
        border: 1px solid var(--accent);
        max-height: 80vh;
      }
      #detail-panel {
        max-width: 500px;
        left: auto;
        right: 0;
        border-left: 1px solid var(--border);
      }
      .shop-cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <script src="auth.js"></script>
<script src="back-btn.js"></script>

<header>
  <div>
    <div class="header-title">SG Food Guide</div>
    <div class="header-sub">Restaurants near every MRT station</div>
  </div>
  <button class="legend-toggle" onclick="toggleLegend()">Lines</button>
</header>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--nsl)"></div>North-South</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--ewl)"></div>East-West</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--ccl)"></div>Circle</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--dtl)"></div>Downtown</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--nel)"></div>North East</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--tel)"></div>Thomson-East Coast</div>
</div>

<div id="filter-bar">
  <div class="search-row">
    <input id="search-input" type="text" placeholder="Search restaurants or stations..." oninput="applyFilters()">
    <button id="surprise-btn" onclick="surpriseMe()" title="Pick a random restaurant">Surprise Me!</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Line</span>
    <span class="filter-chip active" data-filter="line" data-value="all" onclick="toggleFilter(this)">All</span>
    <span class="filter-chip" data-filter="line" data-value="nsl" onclick="toggleFilter(this)" style="border-color:#d42e1240">NSL</span>
    <span class="filter-chip" data-filter="line" data-value="ewl" onclick="toggleFilter(this)" style="border-color:#00964540">EWL</span>
    <span class="filter-chip" data-filter="line" data-value="ccl" onclick="toggleFilter(this)" style="border-color:#fa9e0d40">CCL</span>
    <span class="filter-chip" data-filter="line" data-value="dtl" onclick="toggleFilter(this)" style="border-color:#005ec440">DTL</span>
    <span class="filter-chip" data-filter="line" data-value="nel" onclick="toggleFilter(this)" style="border-color:#9b0fac40">NEL</span>
    <span class="filter-chip" data-filter="line" data-value="tel" onclick="toggleFilter(this)" style="border-color:#9d5b2540">TEL</span>
  </div>
  <div class="filter-row">
    <span class="filter-label">Cuisine</span>
    <span class="filter-chip active" data-filter="cuisine" data-value="all" onclick="toggleFilter(this)">All</span>
    <span class="filter-chip" data-filter="cuisine" data-value="Chinese" onclick="toggleFilter(this)">Chinese</span>
    <span class="filter-chip" data-filter="cuisine" data-value="Malay" onclick="toggleFilter(this)">Malay</span>
    <span class="filter-chip" data-filter="cuisine" data-value="Indian" onclick="toggleFilter(this)">Indian</span>
    <span class="filter-chip" data-filter="cuisine" data-value="Japanese" onclick="toggleFilter(this)">Japanese</span>
    <span class="filter-chip" data-filter="cuisine" data-value="Korean" onclick="toggleFilter(this)">Korean</span>
    <span class="filter-chip" data-filter="cuisine" data-value="Western" onclick="toggleFilter(this)">Western</span>
    <span class="filter-chip" data-filter="cuisine" data-value="Thai" onclick="toggleFilter(this)">Thai</span>
    <span class="filter-chip" data-filter="cuisine" data-value="Cafe" onclick="toggleFilter(this)">Cafe</span>
    <span class="filter-chip" data-filter="cuisine" data-value="Fast Food" onclick="toggleFilter(this)">Fast Food</span>
  </div>
  <div class="filter-row">
    <span class="filter-label">Budget</span>
    <span class="filter-chip active" data-filter="budget" data-value="all" onclick="toggleFilter(this)">All</span>
    <span class="filter-chip" data-filter="budget" data-value="1" onclick="toggleFilter(this)">$</span>
    <span class="filter-chip" data-filter="budget" data-value="2" onclick="toggleFilter(this)">$$</span>
    <span class="filter-chip" data-filter="budget" data-value="3" onclick="toggleFilter(this)">$$$</span>
    <span class="filter-chip" data-filter="budget" data-value="4" onclick="toggleFilter(this)">$$$$</span>
  </div>
</div>

<div id="map-wrapper">
  <div id="map-svg-container">
    <svg id="map-svg" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
      <!-- Background -->
      <rect width="1000" height="800" fill="#0f0f1a"/>

      <!-- ===== TRACK LINES ===== -->
      <g id="lines" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">

        <!-- North-South Line (NSL) Red -->
        <path stroke="#d42e12" stroke-width="5" d="M130,600 L130,540 130,480 130,420 130,360 Q160,335 190,310 Q220,290 250,270 L310,240 370,210 420,180 460,155 500,140 540,140 570,140 Q590,140 600,160 Q610,180 616,200 L616,250 616,300 616,350 616,400 616,440 Q630,458 640,470 L648,510 648,560 648,610 648,660"/>

        <!-- East-West Line (EWL) Green -->
        <path stroke="#009645" stroke-width="5" d="M60,620 L130,600 200,590 270,575 340,560 400,545 460,530 520,520 580,510 624,510 654,510 700,500 760,490 810,480 860,470 900,460 940,450"/>

        <!-- Circle Line (CCL) Orange -->
        <path stroke="#fa9e0d" stroke-width="4" d="M624,300 Q645,288 660,280 L700,270 740,275 770,290 790,320 800,360 795,400 780,430 760,455 730,470 700,480 670,490 654,510"/>
        <path stroke="#fa9e0d" stroke-width="4" d="M624,300 Q610,285 575,265 Q555,256 545,258 520,260 495,268 Q480,275 472,282 L455,300 Q448,315 445,325 L440,355 Q442,375 445,385 L455,410 Q462,422 470,430 L490,448 515,460 540,468 565,472 590,472 620,470 650,460 680,455 700,480"/>

        <!-- Downtown Line (DTL) Blue -->
        <path stroke="#005ec4" stroke-width="4" d="M160,310 L220,330 280,345 330,355 380,365 420,380 460,395 490,410 Q502,422 510,430 L520,448 530,465 540,468"/>
        <path stroke="#005ec4" stroke-width="4" d="M540,468 L580,460 620,445 660,430 700,420 740,415 780,415 820,420 860,428 900,435 940,445"/>

        <!-- North East Line (NEL) Purple -->
        <path stroke="#9b0fac" stroke-width="4" d="M654,610 L644,565 634,520 624,480 614,450 604,420 594,395 584,370 584,340 Q586,325 594,315 Q602,302 614,295 L634,280 654,270 674,265 704,265 734,270 764,280"/>

        <!-- Thomson-East Coast Line (TEL) Brown -->
        <path stroke="#9d5b25" stroke-width="4" d="M310,180 L310,210 310,240 Q314,260 320,275 L340,305 360,330 390,355 420,380 450,405 475,430 500,455 520,470 Q540,465 560,460 L620,440 Q612,465 604,490 L624,510 Q632,520 640,530 L660,555 670,575 670,600 Q666,620 660,640 L650,680"/>
      </g>

      <!-- ===== STATIONS ===== (rendered by JS) -->
      <g id="stations-layer"></g>
      <g id="labels-layer"></g>
    </svg>
  </div>
</div>

<div id="backdrop" onclick="closePanel()"></div>

<!-- Station Panel -->
<div id="station-panel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div>
      <div class="panel-station-name" id="panel-station-name">Station Name</div>
      <div class="panel-station-code" id="panel-station-code">Code</div>
    </div>
    <button class="panel-close" onclick="closePanel()">&#x2715;</button>
  </div>
  <div class="shops-container" id="shops-container"></div>
</div>

<!-- Detail Panel (shop menu) -->
<div id="detail-panel">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail()">&#x2190;</button>
    <div class="detail-title-block">
      <div class="detail-shop-name" id="detail-shop-name"></div>
      <div class="detail-shop-sub" id="detail-shop-sub"></div>
    </div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================

// Station data: id, name, code, lines[], x, y, shops[]
// shops: { name, cuisine, budget(1-4), rating(1-5), mall, description, mustTry[] }
const STATIONS = [
  // === North-South Line ===
  { id: "jurong-east", name: "Jurong East", code: "NS1/EW24", lines: ["nsl","ewl"], x: 130, y: 600, shops: [
    { name: "Din Tai Fung", cuisine: "Chinese", budget: 3, rating: 5, mall: "JEM", description: "World-famous Taiwanese chain known for handcrafted xiao long bao and refined dumplings.", mustTry: ["Xiao Long Bao", "Steamed Shrimp & Pork Dumplings", "Braised Pork Chop Fried Rice"] },
    { name: "Nando's", cuisine: "Western", budget: 2, rating: 4, mall: "JEM", description: "Portuguese-style flame-grilled peri-peri chicken with a range of spice levels.", mustTry: ["Full Chicken (Extra Hot)", "Garlic Bread", "Peri-Peri Fries"] },
    { name: "Ichiban Boshi", cuisine: "Japanese", budget: 2, rating: 4, mall: "Westgate", description: "Popular Japanese casual dining serving sushi, donburi and teishoku sets.", mustTry: ["Salmon Mentaiyaki Don", "Ebi Katsu Curry", "Aburi Salmon Sushi"] },
    { name: "Thai Express", cuisine: "Thai", budget: 2, rating: 3, mall: "JEM", description: "Fast-casual Thai chain with bold flavours — great for a quick pad thai fix.", mustTry: ["Pad Thai", "Green Curry", "Tom Yum Soup"] },
    { name: "Song Fa Bak Kut Teh", cuisine: "Chinese", budget: 1, rating: 5, mall: "JEM", description: "Singapore institution for peppery pork rib soup, open since 1969.", mustTry: ["Pork Ribs Bak Kut Teh", "You Tiao", "Braised Pig Trotters"] }
  ]},
  { id: "bukit-batok", name: "Bukit Batok", code: "NS2", lines: ["nsl"], x: 130, y: 540, shops: [
    { name: "Koufu Food Court", cuisine: "Chinese", budget: 1, rating: 3, mall: "West Mall", description: "Affordable hawker-style food court with a wide range of local dishes.", mustTry: ["Chicken Rice", "Wonton Noodles", "Tze Char"] },

  nsl: "#d42e12",

  tel: "#9d5b25"

// ============================================================
// RENDER STATIONS
// ============================================================
function renderStations() {
  const stLayer = document.getElementById("stations-layer");
  const lblLayer = document.getElementById("labels-layer");

  // Render a representative set to avoid extreme clutter
  const toRender = UNIQUE_STATIONS.filter(s => KEY_STATIONS.has(s.id));

  toRender.forEach(station => {
    const isInterchange = station.lines.length > 1;
    const hasShops = station.shops && station.shops.length > 0;
    const primaryColor = LINE_COLORS[station.lines[0]] || "#888";

    // Outer glow for shops
    if (hasShops) {
      const glow = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      glow.setAttribute("cx", station.x);
      glow.setAttribute("cy", station.y);
      glow.setAttribute("r", isInterchange ? 14 : 10);
      glow.setAttribute("fill", "none");
      glow.setAttribute("stroke", "#f0a500");
      glow.setAttribute("stroke-width", "2");
      glow.setAttribute("opacity", "0.6");
      stLayer.appendChild(glow);
    }

    // Main dot
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", station.x);
    circle.setAttribute("cy", station.y);
    circle.setAttribute("r", isInterchange ? 9 : 6);
    circle.setAttribute("fill", isInterchange ? "#fff" : primaryColor);
    circle.setAttribute("stroke", primaryColor);
    circle.setAttribute("stroke-width", isInterchange ? 3 : 0);
    circle.setAttribute("class", "station-dot");
    circle.setAttribute("data-id", station.id);
    circle.style.cursor = "pointer";
    stLayer.appendChild(circle);

    // Food indicator dot
    if (hasShops) {
      const foodIndicator = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      foodIndicator.setAttribute("cx", station.x + (isInterchange ? 9 : 6));
      foodIndicator.setAttribute("cy", station.y - (isInterchange ? 9 : 6));
      foodIndicator.setAttribute("r", 4);
      foodIndicator.setAttribute("fill", "#f0a500");
      foodIndicator.style.pointerEvents = "none";
      stLayer.appendChild(foodIndicator);
    }

    // Label
    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", station.x + 13);
    text.setAttribute("y", station.y + 4);
    text.setAttribute("font-size", "9");
    text.setAttribute("fill", "#c0c0d0");
    text.setAttribute("font-family", "system-ui, sans-serif");
    text.setAttribute("pointer-events", "none");
    text.textContent = station.name;
    lblLayer.appendChild(text);

    // Click handler
    circle.addEventListener("click", () => openStation(station.id));

    // Touch handler
    circle.addEventListener("touchend", (e) => {
      e.preventDefault();
      openStation(station.id);
    });
  });
}

// ============================================================
// PANEL LOGIC
// ============================================================
let currentStation = null;

function openStation(stationId) {
  const station = UNIQUE_STATIONS.find(s => s.id === stationId);
  if (!station) return;
  currentStation = station;

  document.getElementById("panel-station-name").textContent = station.name;
  document.getElementById("panel-station-code").textContent = station.code;

  const container = document.getElementById("shops-container");
  container.innerHTML = "";

  // Get active filters
  const activeCuisine = document.querySelector('.filter-chip.active[data-filter="cuisine"]')?.dataset.value || "all";
  const activeBudget = document.querySelector('.filter-chip.active[data-filter="budget"]')?.dataset.value || "all";
  const searchQuery = document.getElementById("search-input")?.value.toLowerCase() || "";

  let shops = station.shops || [];
  if (activeCuisine !== "all") shops = shops.filter(s => s.cuisine === activeCuisine);
  if (activeBudget !== "all") shops = shops.filter(s => String(s.budget) === activeBudget);
  if (searchQuery) shops = shops.filter(s => s.name.toLowerCase().includes(searchQuery) || s.cuisine.toLowerCase().includes(searchQuery));

  if (shops.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🍽️</div>
        <p>No restaurants match your current filters for this station.<br>Try adjusting your cuisine or budget filter.</p>
      </div>`;
  } else {
    const label = document.createElement("div");
    label.className = "shops-label";
    label.textContent = `${shops.length} restaurant${shops.length > 1 ? "s" : ""} nearby`;
    container.appendChild(label);

    const grid = document.createElement("div");
    grid.className = "shop-cards";

    shops.forEach((shopData) => {
      const budgetStr = "$".repeat(shopData.budget);
      const stars = "★".repeat(shopData.rating) + "☆".repeat(5 - shopData.rating);
      const cuisineColors = {
        Chinese: "#c0392b", Malay: "#27ae60", Indian: "#f39c12", Japanese: "#2980b9",
        Korean: "#8e44ad", Western: "#2c3e50", Thai: "#16a085", Cafe: "#795548",
        "Fast Food": "#e74c3c", Vietnamese: "#1abc9c"
      };
      const color = cuisineColors[shopData.cuisine] || "#888";
      const card = document.createElement("div");
      card.className = "shop-card";
      card.innerHTML = `
        <div class="shop-badge" style="background:${color}22;color:${color};border:1px solid ${color}55">
          ${shopData.cuisine}
        </div>
        <div class="shop-name">${shopData.name}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
          <span style="font-size:0.78rem;color:var(--accent);font-weight:700">${budgetStr}</span>
          <span style="font-size:0.78rem;color:#f0a500">${stars}</span>
        </div>
        <div class="shop-location">📍 ${shopData.mall}</div>
      `;
      card.addEventListener("click", () => openDetail(shopData, station.name));
      grid.appendChild(card);
    });

    container.appendChild(grid);
  }

  document.getElementById("station-panel").classList.add("open");
  document.getElementById("backdrop").classList.add("visible");
}

function closePanel() {
  document.getElementById("station-panel").classList.remove("open");
  document.getElementById("backdrop").classList.remove("visible");
  closeDetail();
}

function openDetail(shopData, stationName) {
  const cuisineColors = {
    Chinese: "#c0392b", Malay: "#27ae60", Indian: "#f39c12", Japanese: "#2980b9",
    Korean: "#8e44ad", Western: "#2c3e50", Thai: "#16a085", Cafe: "#795548",
    "Fast Food": "#e74c3c", Vietnamese: "#1abc9c"
  };
  const color = cuisineColors[shopData.cuisine] || "#888";
  const budgetStr = "$".repeat(shopData.budget);
  const budgetLabel = ["", "Budget", "Moderate", "Pricey", "Fine Dining"][shopData.budget] || "";
  const stars = "★".repeat(shopData.rating) + "☆".repeat(5 - shopData.rating);

  document.getElementById("detail-shop-name").textContent = shopData.name;
  document.getElementById("detail-shop-sub").textContent = `${shopData.mall} · near ${stationName}`;

  const body = document.getElementById("detail-body");
  body.innerHTML = "";

  // Badges row
  const badgeRow = document.createElement("div");
  badgeRow.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px";
  badgeRow.innerHTML = `
    <span class="shop-badge" style="background:${color}22;color:${color};border:1px solid ${color}55">${shopData.cuisine}</span>
    <span class="shop-badge" style="background:#f0a50020;color:#f0a500;border:1px solid #f0a50055">${budgetStr} · ${budgetLabel}</span>
    <span class="shop-badge" style="background:#ffffff10;color:#f0a500;border:1px solid #f0a50033;font-size:0.85rem">${stars}</span>
  `;
  body.appendChild(badgeRow);

  // Location
  const locBlock = document.createElement("div");
  locBlock.className = "location-block";
  locBlock.innerHTML = `
    <div class="location-row">
      <span class="location-pin">📍</span>
      <div class="location-text">
        <div class="location-floor">${shopData.mall}</div>
        <div class="location-directions">Near ${stationName} MRT</div>
      </div>
    </div>
  `;
  body.appendChild(locBlock);

  // Description
  if (shopData.description) {
    const descTitle = document.createElement("div");
    descTitle.className = "section-title";
    descTitle.textContent = "About";
    body.appendChild(descTitle);
    const desc = document.createElement("div");
    desc.style.cssText = "font-size:0.9rem;color:var(--text);line-height:1.6;margin-bottom:8px";
    desc.textContent = shopData.description;
    body.appendChild(desc);
  }

  // Must Try
  if (shopData.mustTry && shopData.mustTry.length > 0) {
    const mustTryTitle = document.createElement("div");
    mustTryTitle.className = "section-title";
    mustTryTitle.textContent = "Must Try";
    body.appendChild(mustTryTitle);

    const menuList = document.createElement("div");
    menuList.className = "menu-list";
    shopData.mustTry.forEach(item => {
      const row = document.createElement("div");
      row.className = "menu-item";
      row.innerHTML = `
        <span class="menu-item-name">🍴 ${item}</span>
      `;
      menuList.appendChild(row);
    });
    body.appendChild(menuList);
  }

  // Google Maps link
  const mapsLink = document.createElement("a");
  const mapsQuery = encodeURIComponent(shopData.name + " " + shopData.mall + " Singapore");
  mapsLink.href = "https://www.google.com/maps/search/" + mapsQuery;
  mapsLink.target = "_blank";
  mapsLink.rel = "noopener noreferrer";
  mapsLink.style.cssText = "display:block;text-align:center;padding:12px;background:rgba(66,133,244,0.15);color:#4285f4;border:1px solid rgba(66,133,244,0.3);border-radius:10px;text-decoration:none;font-weight:600;font-size:0.9rem;margin-top:12px";
  mapsLink.textContent = "📍 View on Google Maps";
  body.appendChild(mapsLink);

  // Spacer
  const spacer = document.createElement("div");
  spacer.style.height = "24px";
  body.appendChild(spacer);

  document.getElementById("detail-panel").classList.add("open");
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("open");
}

function toggleLegend() {
  const l = document.getElementById("legend");
  l.classList.toggle("open");
}

// ============================================================
// FILTER LOGIC
// ============================================================
function toggleFilter(el) {
  const filterType = el.dataset.filter;
  // Deactivate all chips of same filter type
  document.querySelectorAll(`.filter-chip[data-filter="${filterType}"]`).forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  // If line filter changed, update map highlights
  if (filterType === "line") applyLineFilter(el.dataset.value);
  // If station panel is open, re-render it
  if (currentStation) openStation(currentStation.id);
}

function applyLineFilter(lineVal) {
  const stLayer = document.getElementById("stations-layer");
  const lblLayer = document.getElementById("labels-layer");
  if (!stLayer) return;
  // Dim stations not matching the line filter
  UNIQUE_STATIONS.forEach(station => {
    const dots = stLayer.querySelectorAll(`[data-id="${station.id}"]`);
    const matches = lineVal === "all" || station.lines.includes(lineVal);
    dots.forEach(d => { d.style.opacity = matches ? "1" : "0.2"; });
  });
  // Also dim/show labels
  lblLayer.querySelectorAll("text").forEach((txt, idx) => {
    const st = UNIQUE_STATIONS.filter(s => KEY_STATIONS.has(s.id))[idx];
    if (!st) return;
    const matches = lineVal === "all" || st.lines.includes(lineVal);
    txt.style.opacity = matches ? "1" : "0.15";
  });
}

function applyFilters() {
  // If station panel is open, re-render with new search/filter
  if (currentStation) openStation(currentStation.id);
}

// ============================================================
// MAP HEIGHT
// ============================================================
function setMapHeight() {
  const header = document.querySelector("header");
  const h = window.innerHeight - header.offsetHeight;
  document.getElementById("map-wrapper").style.height = h + "px";
}

// ============================================================
// PINCH-ZOOM + PAN
// ============================================================
let scale = 1, minScale = 0.5, maxScale = 4;
let panX = 0, panY = 0;
let lastDist = 0, isDragging = false;
let dragStartX, dragStartY, panStartX, panStartY;

function applyTransform(animate) {
  const el = document.getElementById("map-svg-container");
  el.style.transition = animate ? "transform 0.3s ease" : "none";
  el.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

const mapWrapper = document.getElementById("map-wrapper");

mapWrapper.addEventListener("wheel", (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(maxScale, Math.max(minScale, scale * delta));
  const rect = mapWrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  applyTransform(false);
}, { passive: false });

mapWrapper.addEventListener("mousedown", (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
});
window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  applyTransform(false);
});
window.addEventListener("mouseup", () => { isDragging = false; });

// Touch pan + pinch
let lastTouchX, lastTouchY, touchStartPanX, touchStartPanY;

mapWrapper.addEventListener("touchstart", (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastDist = Math.hypot(dx, dy);
  } else if (e.touches.length === 1) {
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    touchStartPanX = panX;
    touchStartPanY = panY;
  }
}, { passive: true });

mapWrapper.addEventListener("touchmove", (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const pinchScale = dist / lastDist;
    const newScale = Math.min(maxScale, Math.max(minScale, scale * pinchScale));
    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const rect = mapWrapper.getBoundingClientRect();
    const cx = mx - rect.left;
    const cy = my - rect.top;
    panX = cx - (cx - panX) * (newScale / scale);
    panY = cy - (cy - panY) * (newScale / scale);
    scale = newScale;
    lastDist = dist;
    applyTransform(false);
  } else if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - lastTouchX;
    const dy = e.touches[0].clientY - lastTouchY;
    panX = touchStartPanX + (e.touches[0].clientX - lastTouchX + (panX - touchStartPanX));
    panY = touchStartPanY + (e.touches[0].clientY - lastTouchY + (panY - touchStartPanY));
    // simpler:
    panX += dx * 0.5;
    panY += dy * 0.5;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    applyTransform(false);
  }
}, { passive: false });

// ============================================================
// SURPRISE ME
// ============================================================
function surpriseMe() {
  const allShops = [];
  UNIQUE_STATIONS.forEach(st => {
    if (st.shops) st.shops.forEach(sh => allShops.push({ shop: sh, station: st }));
  });
  if (allShops.length === 0) return;
  const pick = allShops[Math.floor(Math.random() * allShops.length)];
  openDetail(pick.shop, pick.station.name);
}

renderStations();
setMapHeight();
window.addEventListener("resize", setMapHeight);
